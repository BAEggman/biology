0));\n    var wrongs=(q.opts||[]).filter(function(o){return o.wrong;});\n    if(wrongs.length!==1) errs.push((q.id||i)+\": must have exactly 1 wrong opt, got \"+wrongs.length);\n    (q.opts||[]).forEach(function(o,j){\n      if(!o.t) errs.push((q.id||i)+\"[\"+j+\"] missing text\");\n      if(!o.why) errs.push((q.id||i)+\"[\"+j+\"] missing why\");\n      if(o.wrong && !o.trap) errs.push((q.id||i)+\"[\"+j+\"] wrong opt missing trap type\");\n    });\n  });\n  return errs;\n}\n\n/* ---------- \uc774\uc911 \uc800\uc7a5 (localStorage + window.storage) ---------- */\nfunction saveState(state){\n  var json = serialize(state);\n  try{ localStorage.setItem(STORE_KEY, json); }catch(e){}\n  try{\n    if(typeof window!==\"undefined\" && window.storage && window.storage.set){\n      var p = window.storage.set(STORE_KEY, json, false);\n      if(p && p.catch) p.catch(function(){});\n    }\n  }catch(e){}\n}\nfunction loadState(cb){\n  var done=false;\n  function finish(json){ if(done) return; done=true; cb(deserialize(json)); }\n  // 1) window.storage \uc6b0\uc120 \uc2dc\ub3c4\n  try{\n    if(typeof window!==\"undefined\" && window.storage && window.storage.get){\n      var p = window.storage.get(STORE_KEY, false);\n      if(p && p.then){\n        p.then(function(r){\n          if(r && r.value) finish(r.value);\n          else fallbackLocal();\n        }).catch(function(){ fallbackLocal(); });\n        // \uc548\uc804\ub9dd: 700ms \ub0b4 \uc751\ub2f5 \uc5c6\uc73c\uba74 \ub85c\uceec\n        setTimeout(function(){ if(!done) fallbackLocal(); }, 700);\n        return;\n      }\n    }\n  }catch(e){}\n  fallbackLocal();\n  function fallbackLocal(){\n    var j=null; try{ j=localStorage.getItem(STORE_KEY); }catch(e){}\n    finish(j);\n  }\n}\n\n/* ---------- UI ---------- */\nfunction boot(){\n  var TRAP_CLASS = \"trap\";\n  var els = {\n    card: document.getElementById(\"card\"),\n    cat: document.getElementById(\"catChip\"),\n    num: document.getElementById(\"numChip\"),\n    q: document.getElementById(\"qText\"),\n    opts: document.getElementById(\"opts\"),\n    verdict: document.getElementById(\"verdict\"),\n    prev: document.getElementById(\"prevBtn\"),\n    next: document.getElementById(\"nextBtn\"),\n    jump: document.getElementById(\"jumpBtn\"),\n    reset: document.getElementById(\"resetBtn\"),\n    review: document.getElementById(\"reviewBtn\"),\n    doneAll: document.getElementById(\"doneAll\"),\n    doneN: document.getElementById(\"doneN\"),\n    totN: document.getElementById(\"totN\"),\n    hitN: document.getElementById(\"hitN\"),\n    bar: document.getElementById(\"barFill\")\n  };\n  var state = defaultState();\n  var orderCache = {}; // \uc8fc\uc81c\ubcc4 \ubcf4\uae30 \ud45c\uc2dc \uc21c\uc11c\n\n  var vErr = validateAll(QUESTIONS);\n  if(vErr.length){ console.warn(\"\ub370\uc774\ud130 \uac80\uc99d \uacbd\uace0:\", vErr); }\n\n  function shuffledOrder(q){\n    if(orderCache[q.id]) return orderCache[q.id];\n    var idx = q.opts.map(function(_,i){return i;});\n    for(var i=idx.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=idx[i];idx[i]=idx[j];idx[j]=t; }\n    orderCache[q.id]=idx; return idx;\n  }\n\n  function counts(){\n    var done=0, hit=0;\n    QUESTIONS.forEach(function(q){\n      var r=state.results[q.id];\n      if(r && r.answered){ done++; if(r.correct) hit++; }\n    });\n    return {done:done, hit:hit, total:QUESTIONS.length};\n  }\n\n  function firstUnanswered(){\n    for(var i=0;i<QUESTIONS.length;i++){\n      var r=state.results[QUESTIONS[i].id];\n      if(!(r && r.answered)) return i;\n    }\n    return -1;\n  }\n\n  function render(){\n    var c = counts();\n    els.doneN.textContent = c.done;\n    els.totN.textContent = c.total;\n    els.hitN.textContent = c.hit;\n    els.bar.style.width = (c.total? Math.round(c.done/c.total*100):0) + \"%\";\n    els.doneAll.classList.toggle(\"show\", c.done===c.total && c.total>0);\n\n    if(state.current<0) state.current=0;\n    if(state.current>=QUESTIONS.length) state.current=QUESTIONS.length-1;\n    var q = QUESTIONS[state.current];\n    var res = state.results[q.id];\n\n    els.cat.textContent = q.cat;\n    els.num.textContent = (state.current+1) + \" / \" + QUESTIONS.length;\n    els.q.textContent = q.q;\n    els.opts.innerHTML = \"\";\n    els.verdict.className = \"verdict\";\n    els.verdict.innerHTML = \"\";\n\n    var order = shuffledOrder(q);\n    var answered = !!(res && res.answered);\n\n    order.forEach(function(optIdx, displayPos){\n      var o = q.opts[optIdx];\n      var btn = document.createElement(\"button\");\n      btn.className = \"opt\";\n      btn.type = \"button\";\n      var letter = String.fromCharCode(65+displayPos);\n      var inner = '<span class=\"mk\">'+letter+'<\/span>' + escapeHtml(o.t);\n\n      if(answered){\n        btn.disabled = true;\n        if(o.wrong){\n          btn.classList.add(\"is-wrong\");\n          inner += '<span class=\"tag answer\">\u2713 \uc633\uc9c0 \uc54a\uc740 \ubcf4\uae30 (\uc815\ub2f5)<\/span>';\n          inner += '<span class=\"tag trap\">\ud568\uc815 \u00b7 '+escapeHtml(o.trap)+'<\/span>';\n          inner += '<div class=\"why\">'+o.why+'<\/div>';\n        } else {\n          btn.classList.add(\"is-right\");\n          if(res.picked===optIdx){\n            btn.classList.remove(\"is-right\");\n            btn.classList.add(\"picked-bad\");\n            inner += '<span class=\"tag bad\">\u2715 \ub0b4\uac00 \uace0\ub978 \uc624\ub2f5<\/span>';\n          } else {\n            inner += '<span class=\"tag fine\">\uc633\uc74c<\/span>';\n          }\n          inner += '<div class=\"why\">'+o.why+'<\/div>';\n        }\n      } else {\n        btn.addEventListener(\"click\", function(){ choose(q, optIdx); });\n      }\n      btn.innerHTML = inner;\n      els.opts.appendChild(btn);\n    });\n\n    if(answered){\n      var good = res.correct;\n      els.verdict.className = \"verdict show \" + (good? \"good\":\"miss\");\n      if(good){\n        els.verdict.innerHTML = '<span class=\"em\">\u2713<\/span><div>\uc815\ub2f5\uc785\ub2c8\ub2e4!<small>\uc633\uc9c0 \uc54a\uc740 \ubcf4\uae30\ub97c \uc815\ud655\ud788 \ucc3e\uc558\uc5b4\uc694.<\/small><\/div>';\n      } else {\n        // \uc815\ub2f5 \ubcf4\uae30 \uc704\uce58(\ud45c\uc2dc \ubb38\uc790) \ucc3e\uae30\n        var ansDisplay = \"\";\n        order.forEach(function(oi,dp){ if(q.opts[oi].wrong) ansDisplay = String.fromCharCode(65+dp); });\n        els.verdict.innerHTML = '<span class=\"em\">\u2715<\/span><div>\uc544\uc26c\uc6cc\uc694. \uc633\uc9c0 \uc54a\uc740 \ubcf4\uae30\ub294 <b>'+ansDisplay+'<\/b>\uc600\uc5b4\uc694.<small>\uc544\ub798 \ube68\uac04 \ud45c\uc2dc\uac00 \uace0\ub978 \ubcf4\uae30, \uccad\ub85d \ud45c\uc2dc\uac00 \uc815\ub2f5\uc785\ub2c8\ub2e4.<\/small><\/div>';\n      }\n    }\n\n    els.prev.disabled = (state.current===0);\n    els.next.textContent = (state.current===QUESTIONS.length-1)? \"\ucc98\uc74c\uc73c\ub85c \u21ba\" : \"\ub2e4\uc74c \u203a\";\n    els.jump.disabled = (firstUnanswered()===-1);\n  }\n\n  function choose(q, optIdx){\n    var g = gradeAnswer(q, optIdx);\n    state.results[q.id] = { answered:true, correct:g.correct, picked:optIdx };\n    saveState(state);\n    render();\n  }\n\n  function go(delta){\n    if(delta>0 && state.current===QUESTIONS.length-1){ state.current=0; }\n    else { state.current += delta; }\n    saveState(state);\n    render();\n    if(els.card && els.card.scrollIntoView) els.card.scrollIntoView({behavior:\"smooth\", block:\"start\"});\n  }\n\n  els.prev.addEventListener(\"click\", function(){ go(-1); });\n  els.next.addEventListener(\"click\", function(){ go(1); });\n  els.jump.addEventListener(\"click\", function(){\n    var i=firstUnanswered();\n    if(i>=0){ state.current=i; saveState(state); render(); if(els.card.scrollIntoView) els.card.scrollIntoView({behavior:\"smooth\",block:\"start\"}); }\n  });\n  els.reset.addEventListener(\"click\", function(){\n    if(!confirm(\"\uc9c4\ud589\uc744 \ubaa8\ub450 \uc9c0\uc6b0\uace0 \ucc98\uc74c\ubd80\ud130 \ub2e4\uc2dc \uc2dc\uc791\ud560\uae4c\uc694?\")) return;\n    state = defaultState();\n    orderCache = {};\n    try{ localStorage.removeItem(STORE_KEY); }catch(e){}\n    try{ if(window.storage && window.storage.delete){ var p=window.storage.delete(STORE_KEY,false); if(p&&p.catch)p.catch(function(){}); } }catch(e){}\n    saveState(state);\n    render();\n  });\n  if(els.review){\n    els.review.addEventListener(\"click\", function(){ state.current=0; saveState(state); render(); if(els.card.scrollIntoView) els.card.scrollIntoView({behavior:\"smooth\",block:\"start\"}); });\n  }\n\n  document.addEventListener(\"keydown\", function(e){\n    if(e.key===\"ArrowRight\"){ go(1); }\n    else if(e.key===\"ArrowLeft\"){ go(-1); }\n  });\n\n  loadState(function(loaded){\n    state = loaded;\n    render();\n  });\n}\n\nfunction escapeHtml(s){\n  return String(s).replace(/[&<>\"']/g, function(c){\n    return {\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",\"\\\"\":\"&quot;\",\"'\":\"&#39;\"}[c];\n  });\n}\n\n/* node \uac80\uc99d\uc744 \uc704\ud574 \uc21c\uc218 \ubd80\ubd84 \ub178\ucd9c (DOM \uc5c6\uc73c\uba74 boot \uc548 \ud568) */\nif(typeof module!==\"undefined\" && module.exports){\n  module.exports = { QUESTIONS:QUESTIONS, gradeAnswer:gradeAnswer, defaultState:defaultState, serialize:serialize, deserialize:deserialize, validateAll:validateAll, saveState:saveState, loadState:loadState, STORE_KEY:STORE_KEY };\n}\nif(typeof document!==\"undefined\" && document.getElementById){\n  if(document.readyState===\"loading\") document.addEventListener(\"DOMContentLoaded\", boot);\n  else boot();\n}\n<\/script>\n<\/body>\n<\/html>\n"</script>
<script type="application/json" id="ann2">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover\">\n<title>\uc218\uce58 \ub4dc\ub9b4 \u2014 \ud3b8\uc785\u00b7\ud55c\uc758\ub300 \uc0dd\ubb3c<\/title>\n<style>\n:root{--ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;--bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;--vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;--ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;--sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{font-family:var(--sans);color:var(--ink);background:linear-gradient(170deg,#EFF4F2 0%,var(--bg) 46%,#E3EBE8 100%);background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}\n#app{max-width:760px;margin:0 auto;padding:18px 16px 56px}\n.screen{display:flex;flex-direction:column;gap:14px}\n.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 6px 22px -14px rgba(16,48,46,.30),0 1px 3px rgba(16,48,46,.05)}\n.card.center{text-align:center}\n.card-h{display:flex;justify-content:space-between;align-items:baseline;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:4px}\n.card-h .big{font-size:26px;font-weight:800;color:var(--teal);font-variant-numeric:tabular-nums}\n/* hero */\n.hero{padding:6px 4px 2px}\n.eyebrow{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:700}\n.title{font-size:34px;font-weight:800;letter-spacing:-.02em;margin:6px 0 8px;color:var(--ink)}\n.lede{margin:0;color:var(--ink2);font-size:14px;max-width:60ch}\n/* labels */\n.label{font-size:12px;font-weight:700;color:var(--ink3);margin:14px 0 7px;letter-spacing:.02em}\n.label:first-of-type{margin-top:6px}\n.muted{color:var(--ink3)}.small{font-size:12.5px}\n/* catbars */\n.catbars{margin-top:12px;display:flex;flex-direction:column;gap:9px}\n.catrow{display:grid;grid-template-columns:96px 1fr 40px;align-items:center;gap:10px}\n.catname{font-size:12.5px;color:var(--ink2);font-weight:600}\n.catpct{font-size:12px;color:var(--ink3);text-align:right;font-variant-numeric:tabular-nums}\n.track{background:var(--line2);border-radius:99px;height:8px;overflow:hidden}\n.track.thin{height:6px}\n.fill{height:100%;border-radius:99px;background:var(--teal);transition:width .35s ease}\n.fill.teal{background:var(--teal)}.fill.amber{background:var(--amb);transition:width .1s linear}\n.fill.atp{background:var(--teal)}.fill.hw{background:var(--vio)}.fill.rec{background:#2563A8}.fill.enz{background:var(--teal-d)}.fill.rq{background:var(--amb)}.fill.ratio{background:#8A5A2B}\n/* seg + chips */\n.seg{display:flex;gap:8px;flex-wrap:wrap}\n.segbtn{font-family:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--ink2);cursor:pointer;transition:.15s}\n.segbtn:hover{border-color:var(--teal)}\n.segbtn.on{background:var(--teal-soft);border-color:var(--teal);color:var(--teal-d)}\n.chips{display:flex;gap:8px;flex-wrap:wrap}\n.chip{font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--ink3);cursor:pointer;transition:.15s}\n.chip.on{color:#fff;border-color:transparent}\n.chip.atp.on{background:var(--teal)}.chip.hw.on{background:var(--vio)}.chip.rec.on{background:#2563A8}.chip.enz.on{background:var(--teal-d)}.chip.rq.on{background:var(--amb)}.chip.ratio.on{background:#8A5A2B}\n/* actions / buttons */\n.actions{display:flex;gap:10px;flex-wrap:wrap}\n.btn{font-family:inherit;font-weight:700;font-size:15px;padding:13px 20px;border-radius:14px;border:1px solid transparent;cursor:pointer;flex:1;min-width:130px;transition:.15s}\n.btn.primary{background:var(--teal);color:#fff;box-shadow:0 6px 16px -8px rgba(15,118,110,.6)}\n.btn.primary:hover{background:var(--teal-d)}\n.btn.ghost{background:#fff;color:var(--teal-d);border-color:var(--line)}\n.btn.ghost:hover{border-color:var(--teal)}\n.btn.wide{width:100%;flex:none;margin-top:14px}\n.btn.sm{flex:none;min-width:0;padding:8px 12px;font-size:12.5px;font-weight:600}\n.foot{text-align:center;margin-top:4px}\n/* quiz top */\n.qtop{display:flex;align-items:center;justify-content:space-between}\n.iconbtn{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink2);background:none;border:none;cursor:pointer;padding:6px 2px}\n.qcount{font-size:13px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}\n.qscore{font-size:12.5px;color:var(--teal-d);font-weight:700}\n.card.q{padding:18px}\n.tag{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:var(--teal-soft);color:var(--teal-d);margin-bottom:12px}\n.tag.atp{background:var(--teal-soft);color:var(--teal-d)}.tag.hw{background:var(--vio-soft);color:var(--vio)}.tag.rec{background:#E3ECF7;color:#2563A8}.tag.enz{background:var(--teal-soft);color:var(--teal-d)}.tag.rq{background:var(--amb-soft);color:var(--amb)}.tag.ratio{background:#F1E7DA;color:#8A5A2B}\n.timer{display:flex;align-items:center;gap:10px;margin-bottom:12px}\n.timer .track{flex:1}.tlab{font-size:12px;font-weight:700;color:var(--amb);font-variant-numeric:tabular-nums;min-width:36px;text-align:right}\n.qtext{font-size:16.5px;line-height:1.55;color:var(--ink);margin-bottom:16px}\n.qtext b{color:var(--teal-d)}\n.qtext .sub{display:block;margin-top:8px;font-size:12.5px;color:var(--ink3);line-height:1.5;font-weight:500}\n/* inputs */\n.numrow{display:flex;gap:10px}\n.numinput{flex:1;font-family:var(--mono);font-size:17px;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:#fff;color:var(--ink);outline:none;min-width:0}\n.numinput:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}\n.numinput.sm{font-size:15px;padding:10px 12px}\n.numrow .btn{flex:none;min-width:96px}\n.choices{display:flex;flex-direction:column;gap:9px}\n.choice{display:flex;align-items:center;gap:11px;text-align:left;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);padding:13px 14px;border-radius:13px;border:1.5px solid var(--line);background:#fff;cursor:pointer;transition:.13s}\n.choice:hover{border-color:var(--teal);background:var(--teal-soft)}\n.choice .ci{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:99px;background:var(--teal-soft);color:var(--teal-d);font-weight:800;font-size:13px;flex:none}\n/* result box */\n.resultbox:empty{display:none}\n.verdict{font-size:17px;font-weight:800;margin:18px 0 10px}\n.verdict.ok{color:var(--ok)}.verdict.no{color:var(--no)}\n.answerline{font-size:15px;color:var(--ink);background:var(--ok-soft);border:1px solid #CDE8DC;padding:11px 13px;border-radius:11px}\n.verdict.no ~ .answerline{background:var(--no-soft);border-color:#F2D2CD}\n.steps{margin-top:14px;border-top:1px solid var(--line2);padding-top:14px}\n.steps-h{font-size:12px;font-weight:700;color:var(--ink3);letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase}\n.steplist{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:6px}\n.steplist li{font-size:14px;color:var(--ink2);line-height:1.5;font-family:var(--mono)}\n.formula{margin-top:12px;font-size:13px;color:var(--teal-d);background:var(--teal-soft);padding:10px 12px;border-radius:10px;font-weight:600;line-height:1.5}\n.src{margin-top:8px;font-size:11.5px;color:var(--ink3);line-height:1.4}\n/* lwb */\n.lwb{width:100%;height:auto;display:block;background:#FBFDFC;border:1px solid var(--line);border-radius:12px;touch-action:none}\n.lwb .axis{stroke:var(--ink3);stroke-width:1.2}\n.lwb .axis.faint{stroke:var(--line);stroke-width:1}\n.lwb .axlab{fill:var(--ink3);font:600 10px var(--sans)}\n.lwb .axlab.end{text-anchor:end}\n.lwb .datapt{fill:#2563A8;stroke:#fff;stroke-width:1.5}\n.lwb .fitline{stroke:var(--teal);stroke-width:2.4;stroke-linecap:round}\n.lwb .handle{fill:var(--amb);stroke:#fff;stroke-width:2;cursor:grab}\n.lwb .handle:active{cursor:grabbing}\n.readout{margin-top:9px;font-family:var(--mono);font-size:12.5px;color:var(--ink2);background:var(--card);border:1px dashed var(--line);border-radius:9px;padding:8px 10px;line-height:1.5}\n.readout b{color:var(--teal-d)}\n.lwbinputs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}\n.lwbinputs .numinput{flex:1;min-width:90px}\n/* result screen */\n.score-big{font-size:46px;font-weight:800;color:var(--teal);letter-spacing:-.02em;margin:6px 0 4px;font-variant-numeric:tabular-nums}\n.distrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:14px 0 4px}\n@media (max-width:420px){.title{font-size:29px}.catrow{grid-template-columns:84px 1fr 38px}.numrow .btn{min-width:78px}}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\/style>\n<\/head>\n<body>\n<div id=\"app\"><\/div>\n<script>/* ============================================================\n   \uc218\uce58 \ub4dc\ub9b4 \u2014 \ud575\uc2ec \ub85c\uc9c1 (DOM \ube44\uc758\uc874, node\ub85c \uac80\uc99d \uac00\ub2a5)\n   \uadfc\uac70: \ucea0\ubca8 \ubcf8\ubb38(2\ub2e8\uc6d0 10 \uc138\ud3ec\ud638\ud761), BM\ud3b8\uc785 \uae30\ucd9c, \uc9c0\uc5fd_\uc815\ub9ac(\ud6a8\uc18c\ub3d9\uc5ed\ud559),\n        \ud558\ub514-\ubc14\uc778\ubca0\ub974\ud06c/\uc5f0\uad00 \uae30\ucd9c. \ucd94\uce21 \ud56d\ubaa9 \uc5c6\uc74c.\n   ============================================================ */\n(function (root) {\n  \"use strict\";\n\n  /* ---------- \ub09c\uc218 / \uc720\ud2f8 ---------- */\n  function mkRng(seed) {\n    if (seed == null) return Math.random;\n    var s = seed >>> 0;\n    return function () { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; };\n  }\n  function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }\n  function ri(rng, lo, hi) { return lo + Math.floor(rng() * (hi - lo + 1)); }\n  function round(x, d) { var f = Math.pow(10, d); return Math.round(x * f) / f; }\n\n  /* ---------- \ucc44\uc810 ---------- */\n  function checkNumeric(user, answer, tol) {\n    if (typeof user !== \"number\" || !isFinite(user)) return false;\n    var t = (tol == null) ? Math.max(1e-6, Math.abs(answer) * 1e-4) : tol;\n    return Math.abs(user - answer) <= t + 1e-9;\n  }\n  function checkLWB(user, ans, tol) {\n    if (!user || typeof user.Vmax !== \"number\" || typeof user.Km !== \"number\") return false;\n    if (!isFinite(user.Vmax) || !isFinite(user.Km)) return false;\n    var rel = (tol && tol.rel) || 0.08;\n    return Math.abs(user.Vmax - ans.Vmax) <= ans.Vmax * rel + 1e-9 &&\n           Math.abs(user.Km - ans.Km) <= ans.Km * rel + 1e-9;\n  }\n  function checkAnswer(q, user) {\n    if (q.type === \"choice\") return user === q.answer;        // answer = index\n    if (q.type === \"lwb\") return checkLWB(user, q.answer, q.tol);\n    return checkNumeric(user, q.answer, q.tol);\n  }\n\n  /* ---------- \ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc218\ud559 (\uc2dc\uadf8\ub2c8\ucc98 \uc778\ud130\ub799\ud2f0\ube0c) ---------- */\n  function lineFromPoints(x1, y1, x2, y2) { var m = (y2 - y1) / (x2 - x1); return { m: m, b: y1 - m * x1 }; }\n  function readKineticsFromLine(m, b) { return { Vmax: 1 / b, Km: m / b }; }       // y=mx+b, x\uc808\ud3b8=-1/Km, y\uc808\ud3b8=1/Vmax\n  function lwbPoints(Vmax, Km, sList) {\n    return sList.map(function (S) { return { S: S, x: 1 / S, y: (Km / Vmax) * (1 / S) + 1 / Vmax }; });\n  }\n\n  /* ============================================================\n     \ubb38\ud56d \uc0dd\uc131\uae30 (6 \uc601\uc5ed) \u2014 \ub9e4 \ud638\ucd9c \ud30c\ub77c\ubbf8\ud130\ud654\n     \ubc18\ud658: {cat,type,q,answer,tol,unit,choices?,steps,formula,source,lwb?}\n     ============================================================ */\n\n  /* 1) ATP \uc218\uc728 \u2014 \ucea0\ubca8 10.4 / \uae30\ucd9c(NADH=2.5\u00b7FADH\u2082=1.5, \uace0\uc804 3\u00b72) */\n  function genATP(rng) {\n    var t = ri(rng, 0, 3);\n    if (t === 0) {                       // \ud604\ub300\uac12 \ud3ec\ub3c4\ub2f9 n\ubd84\uc790\n      var n = ri(rng, 1, 4), ans = 32 * n;\n      return {\n        cat: \"atp\", type: \"num\", unit: \"ATP\", answer: ans, tol: 0.001,\n        q: \"\ud3ec\ub3c4\ub2f9 <b>\" + n + \"\ubd84\uc790<\/b>\uac00 \uc644\uc804 \uc0b0\ud654\ub420 \ub54c \uc0dd\uc131\ub418\ub294 <b>\ucd1d ATP<\/b> \uc218\ub294?<br><span class='sub'>\ud604\ub300\uac12(\ud6a8\uc728\uc801 \uc154\ud2c0): \ud3ec\ub3c4\ub2f9 1\ubd84\uc790\ub2f9 10 NADH\u00b72 FADH\u2082\u00b74 \uae30\uc9c8\uc218\uc900 ATP, NADH=2.5\u00b7FADH\u2082=1.5<\/span>\",\n        formula: \"\ucd1d ATP = (10\u00d72.5 + 2\u00d71.5 + 4) \u00d7 \ud3ec\ub3c4\ub2f9\uc218 = 32 n\",\n        steps: [\"NADH: 10 \u00d7 2.5 = 25\", \"FADH\u2082: 2 \u00d7 1.5 = 3\", \"\uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654: 4\", \"\ud3ec\ub3c4\ub2f9 1\ubd84\uc790 = 25+3+4 = 32 ATP\", n + \"\ubd84\uc790 \u2192 32 \u00d7 \" + n + \" = \" + ans],\n        source: \"\ucea0\ubca8 10.4(\ud6a8\uc728\uc801 \uc154\ud2c0 32) \u00b7 \uae30\ucd9c\"\n      };\n    }\n    if (t === 1) {                       // \uc784\uc758 NADH/FADH\u2082/SLP (\ud604\ub300\uac12)\n      var a = ri(rng, 2, 12), b = ri(rng, 0, 4), c = ri(rng, 0, 4);\n      var ans1 = round(2.5 * a + 1.5 * b + c, 1);\n      return {\n        cat: \"atp\", type: \"num\", unit: \"ATP\", answer: ans1, tol: 0.05,\n        q: \"<b>NADH \" + a + \"\uac1c, FADH\u2082 \" + b + \"\uac1c, \uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654 \" + c + \"\uac1c<\/b>\uac00 \uc0b0\ud654\uc801 \uc778\uc0b0\ud654\ub97c \uac70\uce60 \ub54c \uc0dd\uc131\ub418\ub294 \ucd1d ATP\ub294?<br><span class='sub'>\ud604\ub300\uac12 NADH=2.5\u00b7FADH\u2082=1.5 (\uc18c\uc218 \uccab\uc9f8 \uc790\ub9ac)<\/span>\",\n        formula: \"ATP = 2.5\u00d7NADH + 1.5\u00d7FADH\u2082 + \uae30\uc9c8\uc218\uc900\",\n        steps: [\"NADH: \" + a + \" \u00d7 2.5 = \" + round(2.5 * a, 1), \"FADH\u2082: \" + b + \" \u00d7 1.5 = \" + round(1.5 * b, 1), \"\uae30\uc9c8\uc218\uc900: \" + c, \"\ud569 = \" + ans1],\n        source: \"\ucea0\ubca8 10.4 \u00b7 \uae30\ucd9c(NADH 2.5/FADH\u2082 1.5)\"\n      };\n    }\n    if (t === 2) {                       // \uace0\uc804\uac12 \ud3ec\ub3c4\ub2f9 n\ubd84\uc790\n      var n2 = ri(rng, 1, 4), ans2 = 38 * n2;\n      return {\n        cat: \"atp\", type: \"num\", unit: \"ATP\", answer: ans2, tol: 0.001,\n        q: \"\ud3ec\ub3c4\ub2f9 <b>\" + n2 + \"\ubd84\uc790<\/b>\uc758 \ucd1d ATP\ub97c <b>\uace0\uc804\uac12<\/b>\uc73c\ub85c \uacc4\uc0b0\ud558\uba74?<br><span class='sub'>\uace0\uc804\uac12: NADH=3\u00b7FADH\u2082=2 (10 NADH\u00b72 FADH\u2082\u00b74 \uae30\uc9c8\uc218\uc900)<\/span>\",\n        formula: \"\ucd1d ATP = (10\u00d73 + 2\u00d72 + 4) \u00d7 \ud3ec\ub3c4\ub2f9\uc218 = 38 n\",\n        steps: [\"NADH: 10 \u00d7 3 = 30\", \"FADH\u2082: 2 \u00d7 2 = 4\", \"\uae30\uc9c8\uc218\uc900: 4\", \"1\ubd84\uc790 = 38 ATP\", n2 + \"\ubd84\uc790 \u2192 \" + ans2],\n        source: \"\uae30\ucd9c(\uace0\uc804\uac12 36~38)\"\n      };\n    }\n    // \uc5d0\ub108\uc9c0 \ud6a8\uc728 \u2014 \uae30\ucd9c [\uc804\ub0a8\ub300] 686kcal, ATP\ub2f9 7.5kcal\n    var atpN = pick(rng, [36, 38]);\n    var eff = round(7.5 * atpN / 686 * 100, 1);\n    return {\n      cat: \"atp\", type: \"num\", unit: \"%\", answer: eff, tol: 0.2,\n      q: \"\ud3ec\ub3c4\ub2f9 1\ubd84\uc790(686 kcal)\uac00 \uc644\uc804 \ubd84\ud574\ub418\uc5b4 <b>\" + atpN + \" ATP<\/b>\ub97c \uc0dd\uc131\ud588\ub2e4. ATP 1\ubd84\uc790\ub2f9 7.5 kcal\ub85c \uc800\uc7a5\ub420 \ub54c <b>\uc5d0\ub108\uc9c0 \ud6a8\uc728(%)<\/b>\uc740?<br><span class='sub'>\uc18c\uc218 \uccab\uc9f8 \uc790\ub9ac<\/span>\",\n      formula: \"\ud6a8\uc728 = (7.5 \u00d7 ATP\uc218) / 686 \u00d7 100\",\n      steps: [\"\uc800\uc7a5 \uc5d0\ub108\uc9c0 = 7.5 \u00d7 \" + atpN + \" = \" + round(7.5 * atpN, 1) + \" kcal\", \"\ud6a8\uc728 = \" + round(7.5 * atpN, 1) + \" / 686 \u00d7 100 = \" + eff + \" %\"],\n      source: \"\uae30\ucd9c [\uc804\ub0a8\ub300] 686kcal\u00b7~40%\"\n    };\n  }\n\n  /* 2) \ud558\ub514-\ubc14\uc778\ubca0\ub974\ud06c \u2014 \uae30\ucd9c \ub2e4\uc218 */\n  function genHW(rng) {\n    var t = ri(rng, 0, 3);\n    if (t === 0) {                       // q\u00b2 \uc8fc\uace0 \ubcf4\uc778\uc790(\ub9cc\uba85\ub2f9)\n      var q = pick(rng, [0.01, 0.02, 0.1, 0.2, 0.3]);\n      var carrier = Math.round(2 * q * (1 - q) * 10000);\n      var qsq = round(q * q, 4);\n      return {\n        cat: \"hw\", type: \"num\", unit: \"\uba85\", answer: carrier, tol: 2,\n        q: \"\uc5b4\ub5a4 \uc0c1\uc5fc\uc0c9\uccb4 \uc5f4\uc131 \uc720\uc804\ubcd1\uc758 <b>\ubc1c\ubcd1\ub960(q\u00b2) = \" + qsq + \"<\/b> \uc774\ub2e4. \ud558\ub514-\ubc14\uc778\ubca0\ub974\ud06c \ud3c9\ud615\uc5d0\uc11c <b>\ub9cc \uba85\ub2f9 \ubcf4\uc778\uc790(2pq)<\/b> \uc218\ub294? (\uc815\uc218)\",\n        formula: \"q = \u221a(q\u00b2),  p = 1 \u2212 q,  \ubcf4\uc778\uc790 = 2pq \u00d7 10000\",\n        steps: [\"q = \u221a\" + qsq + \" = \" + q, \"p = 1 \u2212 \" + q + \" = \" + round(1 - q, 2), \"2pq = \" + round(2 * q * (1 - q), 4), \"\ub9cc \uba85\ub2f9 = \" + carrier + \" \uba85\"],\n        source: \"\uae30\ucd9c [PKU\u00b7\uc0c9\ub9f9 \ub4f1] q\u00b2\u2192q\u21922pq\"\n      };\n    }\n    if (t === 1) {                       // q\u00b2 \uc8fc\uace0 p\n      var q2 = pick(rng, [0.04, 0.09, 0.16, 0.25, 0.36]);\n      var p = round(1 - Math.sqrt(q2), 2);\n      return {\n        cat: \"hw\", type: \"num\", unit: \"\", answer: p, tol: 0.005,\n        q: \"\uc5f4\uc131 \ub3d9\ud615\uc811\ud569(aa) \ube48\ub3c4\uac00 <b>q\u00b2 = \" + q2 + \"<\/b> \uc77c \ub54c, \uc6b0\uc131 \ub300\ub9bd\uc720\uc804\uc790 \ube48\ub3c4 <b>p<\/b>\ub294? (\uc18c\uc218 \ub458\uc9f8 \uc790\ub9ac)\",\n        formula: \"q = \u221a(q\u00b2),  p = 1 \u2212 q\",\n        steps: [\"q = \u221a\" + q2 + \" = \" + round(Math.sqrt(q2), 2), \"p = 1 \u2212 \" + round(Math.sqrt(q2), 2) + \" = \" + p],\n        source: \"\uae30\ucd9c \u2014 HW \ub300\ub9bd\uc720\uc804\uc790 \ube48\ub3c4\"\n      };\n    }\n    if (t === 2) {                       // O\ud615 \ube44\uc728 \u2192 i \ube48\ub3c4 (\uae30\ucd9c \uac15\uc6d0\ub300 0.6)\n      var r = pick(rng, [0.4, 0.5, 0.6, 0.7]);\n      var oPct = round(r * r * 100, 0);\n      return {\n        cat: \"hw\", type: \"num\", unit: \"\", answer: r, tol: 0.005,\n        q: \"\uc5b4\ub5a4 \uc9d1\ub2e8\uc758 <b>O\ud615(ii) \ube44\uc728\uc774 \" + oPct + \"%<\/b> \uc774\ub2e4. \ub300\ub9bd\uc720\uc804\uc790 <b>i \uc758 \ube48\ub3c4<\/b>\ub294? (\uc18c\uc218 \uccab\uc9f8 \uc790\ub9ac)\",\n        formula: \"O\ud615 = i\u00b2 \u2192 i = \u221a(O\ud615 \ube44\uc728)\",\n        steps: [\"i\u00b2 = \" + oPct + \"% = \" + round(r * r, 2), \"i = \u221a\" + round(r * r, 2) + \" = \" + r],\n        source: \"\uae30\ucd9c [\uac15\uc6d0\ub300] O\ud615 36%\u21920.6\"\n      };\n    }\n    // X \uc5f0\uad00 \u2014 \ub0a8\uc131 \ubc1c\ubcd1\ub960 = q, \uc5ec\uc131 \ubcf4\uc778\uc790 2pq (\uae30\ucd9c \uc601\ub0a8\ub300 0.18)\n    var k = pick(rng, [0.05, 0.1, 0.2]);\n    var carr = round(2 * k * (1 - k), 4);\n    return {\n      cat: \"hw\", type: \"num\", unit: \"\", answer: carr, tol: 0.002,\n      q: \"\uc801\ub85d\uc0c9\ub9f9(X \uc5f0\uad00 \uc5f4\uc131)\uc5d0\uc11c <b>\ub0a8\uc131\uc758 \" + round(k * 100, 0) + \"%<\/b>\uac00 \uc0c9\ub9f9\uc774\ub2e4. \uc774 \uc9d1\ub2e8 <b>\uc5ec\uc131 \ubcf4\uc778\uc790(2pq) \ube44\uc728<\/b>\uc740? (\uc18c\uc218)<br><span class='sub'>\ub0a8\uc131 \ubc1c\ubcd1\ub960 = q<\/span>\",\n      formula: \"\ub0a8\uc131 \ubc1c\ubcd1\ub960 = q,  \uc5ec\uc131 \ubcf4\uc778\uc790 = 2pq = 2q(1\u2212q)\",\n      steps: [\"q = \" + k + \", p = \" + round(1 - k, 2), \"2pq = 2\u00d7\" + k + \"\u00d7\" + round(1 - k, 2) + \" = \" + carr],\n      source: \"\uae30\ucd9c [\uc601\ub0a8\ub300] \ub0a8\uc131 10%\u2192\uc5ec\uc131 \ubcf4\uc778\uc790 0.18\"\n    };\n  }\n\n  /* 3) \uc7ac\uc870\ud569 \ube48\ub3c4\u00b7\uc9c0\ub3c4 \uac70\ub9ac(cM) \u2014 \uae30\ucd9c */\n  function genRec(rng) {\n    var t = ri(rng, 0, 2);\n    if (t === 0) {                       // \uc7ac\uc870\ud569\ud615 \uc218 \u2192 cM\n      var unit = pick(rng, [200, 400, 500, 1000]);\n      var cm = pick(rng, [5, 8, 10, 12, 15, 20, 25]);\n      var rec = Math.round(unit * cm / 100);\n      return {\n        cat: \"rec\", type: \"num\", unit: \"cM\", answer: cm, tol: 0.05,\n        q: \"\uac80\uc815\uad50\ubc30 \uc790\uc190 <b>\" + unit + \"\uac1c\uccb4<\/b> \uc911 <b>\uc7ac\uc870\ud569\ud615\uc774 \" + rec + \"\uac1c\uccb4<\/b> \ub098\uc654\ub2e4. \ub450 \uc720\uc804\uc790 \uc0ac\uc774 <b>\uc9c0\ub3c4 \uac70\ub9ac(cM)<\/b>\ub294?\",\n        formula: \"\uc7ac\uc870\ud569 \ube48\ub3c4(=cM) = \uc7ac\uc870\ud569\ud615 / \uc804\uccb4 \u00d7 100\",\n        steps: [\"RF = \" + rec + \" / \" + unit + \" \u00d7 100 = \" + cm + \" %\", \"\uc9c0\ub3c4 \uac70\ub9ac = \" + cm + \" cM\"],\n        source: \"\uae30\ucd9c \u2014 RF(%) = \uc9c0\ub3c4 \uac70\ub9ac(cM)\"\n      };\n    }\n    if (t === 1) {                       // trans \ub450 \uc6b0\uc131\ud615\uc9c8 \ud568\uaed8 = cM/2 (\uae30\ucd9c 2012)\n      var d = pick(rng, [10, 14, 15, 20, 24, 30]);\n      var ans = round(d / 2, 1);\n      return {\n        cat: \"rec\", type: \"num\", unit: \"%\", answer: ans, tol: 0.05,\n        q: \"\ub450 \uc6b0\uc131\ud615\uc9c8 \uc720\uc804\uc790\uac00 \uac19\uc740 \uc5fc\uc0c9\uccb4\uc5d0 <b>\" + d + \" cM \uac70\ub9ac<\/b>\ub85c <b>\uc0c1\ubc18(trans)<\/b> \ubc30\uc5f4\ub418\uc5b4 \uc788\ub2e4. \ub450 \uc6b0\uc131\ud615\uc9c8\uc744 <b>\ub3d9\uc2dc\uc5d0<\/b> \uac00\uc9c4 \uc790\uc190\uc774 \ub098\uc62c \ud655\ub960(%)\uc740?<br><span class='sub'>\ub450 \ud615\uc9c8 \ub3d9\uc2dc = \uc7ac\uc870\ud569\ud615 \ubc30\uc6b0\uc790<\/span>\",\n        formula: \"\uc0c1\ubc18 \ubc30\uc5f4 \u2192 \uc7ac\uc870\ud569\ud615 \ubc30\uc6b0\uc790 \ud655\ub960 = \uc7ac\uc870\ud569 \ube48\ub3c4 / 2\",\n        steps: [\"\uc7ac\uc870\ud569 \ube48\ub3c4 = \" + d + \"%\", \"\uc7ac\uc870\ud569\ud615 \ubc30\uc6b0\uc790 = \" + d + \" / 2 = \" + ans + \" %\"],\n        source: \"\uae30\ucd9c [2012] 15cM trans \u2192 7.5%\"\n      };\n    }\n    // 3\uc810: \uac00\uc6b4\ub370 \uc720\uc804\uc790, a-b + b-c = a-c\n    var ab = pick(rng, [8, 11, 14, 16, 20]);\n    var bc = pick(rng, [9, 12, 15, 18]);\n    var ac = ab + bc;\n    return {\n      cat: \"rec\", type: \"num\", unit: \"cM\", answer: ac, tol: 0.05,\n      q: \"\uc138 \uc720\uc804\uc790 \uc21c\uc11c\uac00 <b>a \u2014 b \u2014 c<\/b> \uc774\uace0 <b>a\u2013b = \" + ab + \" cM, b\u2013c = \" + bc + \" cM<\/b> \uc774\ub2e4. <b>a\u2013c \uac70\ub9ac(cM)<\/b>\ub294? (\uc774\uc911\uad50\ucc28 \ubb34\uc2dc)\",\n      formula: \"\uac00\uc6b4\ub370\uac00 b \u2192 a\u2013c = (a\u2013b) + (b\u2013c)\",\n      steps: [\"a\u2013c = \" + ab + \" + \" + bc + \" = \" + ac + \" cM\"],\n      source: \"\uae30\ucd9c \u2014 3\uc810 \uad50\ubc30 \uc9c0\ub3c4 \uac70\ub9ac \uac00\uc0b0\"\n    };\n  }\n\n  /* 4) \ud6a8\uc18c \ub3d9\uc5ed\ud559 \u2014 \uc9c0\uc5fd_\uc815\ub9ac \ub77c\uc778\uc704\ubc84-\ubc84\ud06c / \uae30\ucd9c */\n  function genEnz(rng) {\n    var t = ri(rng, 0, 4);\n    if (t === 0) {                       // y\uc808\ud3b8 \u2192 Vmax\n      var Vmax = pick(rng, [50, 80, 100, 125, 200]);\n      var yint = round(1 / Vmax, 4);\n      return {\n        cat: \"enz\", type: \"num\", unit: \"\", answer: Vmax, tol: 0.5,\n        q: \"\ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc791\ub3c4(1/V vs 1/[S])\uc5d0\uc11c <b>y\uc808\ud3b8 = \" + yint + \"<\/b> \uc774\ub2e4. <b>Vmax<\/b>\ub294?\",\n        formula: \"y\uc808\ud3b8 = 1/Vmax \u2192 Vmax = 1 / y\uc808\ud3b8\",\n        steps: [\"Vmax = 1 / \" + yint + \" = \" + Vmax],\n        source: \"\uc9c0\uc5fd_\uc815\ub9ac \u00b7 \uae30\ucd9c \u2014 y\uc808\ud3b8 = 1/Vmax\"\n      };\n    }\n    if (t === 1) {                       // x\uc808\ud3b8 \u2192 Km\n      var Km = pick(rng, [2, 4, 5, 8, 10]);\n      var xint = round(-1 / Km, 4);\n      return {\n        cat: \"enz\", type: \"num\", unit: \"mM\", answer: Km, tol: 0.05,\n        q: \"\ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc791\ub3c4\uc5d0\uc11c <b>x\uc808\ud3b8 = \" + xint + \"<\/b> \uc774\ub2e4. <b>Km<\/b>\uc740? (mM)\",\n        formula: \"x\uc808\ud3b8 = \u22121/Km \u2192 Km = \u22121 / x\uc808\ud3b8\",\n        steps: [\"Km = \u22121 / (\" + xint + \") = \" + Km + \" mM\"],\n        source: \"\uc9c0\uc5fd_\uc815\ub9ac \u00b7 \uae30\ucd9c \u2014 x\uc808\ud3b8 = \u22121/Km\"\n      };\n    }\n    if (t === 2) {                       // \ubbf8\uce74\uc5d8\ub9ac\uc2a4-\uba58\ud150 v\n      var Vm = pick(rng, [60, 80, 100, 120]);\n      var K = pick(rng, [2, 4, 5, 10]);\n      var S = pick(rng, [K, 2 * K, 3 * K, 4 * K]); // \uae54\ub054\ud55c \ube44\n      var v = round(Vm * S / (K + S), 1);\n      return {\n        cat: \"enz\", type: \"num\", unit: \"\", answer: v, tol: 0.15,\n        q: \"\ud6a8\uc18c\uc758 <b>Vmax = \" + Vm + \", Km = \" + K + \" mM<\/b> \uc774\ub2e4. \uae30\uc9c8 \ub18d\ub3c4 <b>[S] = \" + S + \" mM<\/b>\uc5d0\uc11c \ubc18\uc751\uc18d\ub3c4 <b>v<\/b>\ub294? (\uc18c\uc218 \uccab\uc9f8 \uc790\ub9ac)\",\n        formula: \"v = Vmax\u00b7[S] / (Km + [S])\",\n        steps: [\"v = \" + Vm + \" \u00d7 \" + S + \" / (\" + K + \" + \" + S + \")\", \"= \" + (Vm * S) + \" / \" + (K + S) + \" = \" + v],\n        source: \"\uc9c0\uc5fd_\uc815\ub9ac \ubbf8\uce74\uc5d8\ub9ac\uc2a4-\uba58\ud150\"\n      };\n    }\n    if (t === 3) {                       // v=Vmax/2 \u2192 [S]=Km (\uc815\uc758)\n      var K2 = pick(rng, [2, 3, 5, 8, 12]);\n      return {\n        cat: \"enz\", type: \"num\", unit: \"mM\", answer: K2, tol: 0.05,\n        q: \"<b>Km = \" + K2 + \" mM<\/b>\uc778 \ud6a8\uc18c\uc5d0\uc11c \ubc18\uc751\uc18d\ub3c4\uac00 <b>Vmax\uc758 \uc808\ubc18<\/b>\uc774 \ub418\ub294 \uae30\uc9c8 \ub18d\ub3c4 <b>[S]<\/b>\ub294? (mM)\",\n        formula: \"v = Vmax/2 \u21d4 [S] = Km (Km\uc758 \uc815\uc758)\",\n        steps: [\"v = Vmax/2 \uac00 \ub418\ub294 [S]\ub294 \uc815\uc758\uc0c1 Km\", \"[S] = \" + K2 + \" mM\"],\n        source: \"\uc9c0\uc5fd_\uc815\ub9ac \u2014 Km \uc815\uc758\"\n      };\n    }\n    // \uc800\ud574\uc81c \ud6a8\uacfc \u2014 \uc120\ud0dd\ud615 (\uc9c0\uc5fd_\uc815\ub9ac)\n    var inh = pick(rng, [\n      { name: \"\uacbd\uc7c1\uc801 \uc800\ud574\uc81c\", correct: 0 },\n      { name: \"\ube44\uacbd\uc7c1\uc801(\uc21c\uc218) \uc800\ud574\uc81c\", correct: 1 },\n      { name: \"\ubb34\uacbd\uc7c1\uc801 \uc800\ud574\uc81c\", correct: 2 }\n    ]);\n    var choices = [\"Vmax \ubd88\ubcc0 \u00b7 Km \uc99d\uac00\", \"Vmax \uac10\uc18c \u00b7 Km \ubd88\ubcc0\", \"Vmax \uac10\uc18c \u00b7 Km \uac10\uc18c(\ud3c9\ud589 \uc774\ub3d9)\"];\n    return {\n      cat: \"enz\", type: \"choice\", unit: \"\", answer: inh.correct, choices: choices,\n      q: \"<b>\" + inh.name + \"<\/b>\ub97c \ucc98\ub9ac\ud588\uc744 \ub54c Vmax\u00b7Km \ubcc0\ud654\ub85c \uc633\uc740 \uac83\uc740?\",\n      formula: \"\uacbd\uc7c1=\ud65c\uc131\ubd80\uc704 \uacbd\uc7c1(Km\u2191,Vmax\u2500) \u00b7 \ube44\uacbd\uc7c1=\ub2e4\ub978\uc790\ub9ac(Km\u2500,Vmax\u2193) \u00b7 \ubb34\uacbd\uc7c1=ES\uacb0\ud569(Km\u2193,Vmax\u2193 \ud3c9\ud589)\",\n      steps: [\"\uacbd\uc7c1\uc801: \uae30\uc9c8\uacfc \ud65c\uc131\ubd80\uc704 \uacbd\uc7c1 \u2192 Km\u2191, Vmax \ubd88\ubcc0(\uae30\uc9c8 \uacfc\ub7c9\uc73c\ub85c \uadf9\ubcf5)\", \"\ube44\uacbd\uc7c1\uc801: \ud65c\uc131\ubd80\uc704 \ubc16 \uacb0\ud569 \u2192 Km \ubd88\ubcc0, Vmax\u2193\", \"\ubb34\uacbd\uc7c1\uc801: ES \ubcf5\ud569\uccb4\uc5d0\ub9cc \uacb0\ud569 \u2192 Km\u2193\u00b7Vmax\u2193, \uae30\uc6b8\uae30 \ubd88\ubcc0(\ud3c9\ud589)\"],\n      source: \"\uc9c0\uc5fd_\uc815\ub9ac \ubbf8\ud558\uc5d8\ub9ac\uc2a4\uba58\ud150 \u00b7 \ub3d9\uad6d/\uc138\uba85/\ub300\uad6c\ud55c\uc758 \uae30\ucd9c\ubcf5\uc6d0\"\n    };\n  }\n\n  /* 5) \ud638\ud761\uc9c0\uc218 RQ \u2014 \ud45c\uc900 \ucea0\ubca8(RQ=CO\u2082/O\u2082; \ud0c4\uc218\ud654\ubb3c1.0\u00b7\uc9c0\ubc290.7\u00b7\ub2e8\ubc31\uc9c80.8) */\n  function genRQ(rng) {\n    var t = ri(rng, 0, 1);\n    if (t === 0) {                       // \ubd80\ud53c \u2192 RQ\n      var fuel = pick(rng, [\n        { name: \"\ud3ec\ub3c4\ub2f9(\ud0c4\uc218\ud654\ubb3c)\", o2: 6, co2: 6, rq: 1.0 },\n        { name: \"\ud2b8\ub77c\uc774\uc62c\ub808\uc778(\uc9c0\ubc29)\", o2: 80, co2: 57, rq: 0.71 },\n        { name: \"\ud314\ubbf8\ud2b8\uc0b0(\uc9c0\ubc29\uc0b0)\", o2: 23, co2: 16, rq: 0.7 }\n      ]);\n      var scale = ri(rng, 1, 5);\n      var o2 = fuel.o2 * scale, co2 = fuel.co2 * scale;\n      var rq = round(co2 / o2, 2);\n      return {\n        cat: \"rq\", type: \"num\", unit: \"\", answer: rq, tol: 0.01,\n        q: \"\uc5b4\ub5a4 \uc5f0\ub8cc\ub97c \ud638\ud761\ud560 \ub54c <b>O\u2082 \" + o2 + \" \ubd80\ud53c<\/b>\ub97c \uc18c\ube44\ud558\uace0 <b>CO\u2082 \" + co2 + \" \ubd80\ud53c<\/b>\ub97c \ubc29\ucd9c\ud588\ub2e4. <b>\ud638\ud761\uc9c0\uc218(RQ)<\/b>\ub294? (\uc18c\uc218 \ub458\uc9f8 \uc790\ub9ac)\",\n        formula: \"RQ = \ubc29\ucd9c CO\u2082 / \uc18c\ube44 O\u2082\",\n        steps: [\"RQ = \" + co2 + \" / \" + o2 + \" = \" + rq],\n        source: \"\ucea0\ubca8 \u2014 \ud638\ud761\uc9c0\uc218 \uc815\uc758\"\n      };\n    }\n    // RQ \u2192 \uc8fc \uae30\uc9c8 (\uc120\ud0dd\ud615)\n    var item = pick(rng, [\n      { rq: \"1.0\", correct: 0 },\n      { rq: \"\uc57d 0.7\", correct: 1 },\n      { rq: \"\uc57d 0.8\", correct: 2 }\n    ]);\n    return {\n      cat: \"rq\", type: \"choice\", unit: \"\", answer: item.correct,\n      choices: [\"\ud0c4\uc218\ud654\ubb3c\", \"\uc9c0\ubc29\", \"\ub2e8\ubc31\uc9c8\"],\n      q: \"<b>\ud638\ud761\uc9c0\uc218(RQ)\uac00 \" + item.rq + \"<\/b> \uc77c \ub54c, \uc8fc\ub85c \ud638\ud761 \uae30\uc9c8\ub85c \uc4f0\uc774\ub294 \uc601\uc591\uc18c\ub294?\",\n      formula: \"\ud0c4\uc218\ud654\ubb3c RQ\u22481.0 \u00b7 \uc9c0\ubc29 RQ\u22480.7 \u00b7 \ub2e8\ubc31\uc9c8 RQ\u22480.8\",\n      steps: [\"\ud0c4\uc218\ud654\ubb3c: C\u00b7H\u00b7O \ube44\uc728\uc0c1 RQ \u2248 1.0\", \"\uc9c0\ubc29: \uc0b0\uc18c \uc801\uc5b4 O\u2082 \ub354 \uc18c\ubaa8 \u2192 RQ \u2248 0.7\", \"\ub2e8\ubc31\uc9c8: RQ \u2248 0.8\"],\n      source: \"\ucea0\ubca8 \u2014 \uc601\uc591\uc18c\ubcc4 \ud638\ud761\uc9c0\uc218\"\n    };\n  }\n\n  /* 6) \uc720\uc804 \ubd84\ub9ac\ube44 \u2014 \uae30\ucd9c */\n  function genRatio(rng) {\n    var t = ri(rng, 0, 3);\n    if (t === 0) {                       // Aa\u00d7Aa \u2192 aa = N/4\n      var N = pick(rng, [4, 8, 12, 16, 20, 40, 80]) * pick(rng, [1, 2, 3]);\n      var ans = N / 4;\n      return {\n        cat: \"ratio\", type: \"num\", unit: \"\uac1c\uccb4\", answer: ans, tol: 0.001,\n        q: \"<b>Aa \u00d7 Aa<\/b> \uad50\ubc30\uc5d0\uc11c \uc790\uc190 <b>\" + N + \"\uac1c\uccb4<\/b>\uac00 \ub098\uc654\ub2e4. \uc774\ub860\uc0c1 <b>\uc5f4\uc131 \ud45c\ud604\ud615(aa)<\/b> \uae30\ub300 \uac1c\uccb4 \uc218\ub294?\",\n        formula: \"Aa\u00d7Aa \u2192 \uc6b0\uc131:\uc5f4\uc131 = 3:1, aa = N \u00d7 1/4\",\n        steps: [\"aa \ube44\uc728 = 1/4\", N + \" \u00d7 1/4 = \" + ans + \" \uac1c\uccb4\"],\n        source: \"\uae30\ucd9c \u2014 \uba58\ub378 3:1\"\n      };\n    }\n    if (t === 1) {                       // AaBb\u00d7AaBb \u2192 A_B_ = 9N/16\n      var base = pick(rng, [16, 32, 48, 64, 160]);\n      var ans2 = base * 9 / 16;\n      return {\n        cat: \"ratio\", type: \"num\", unit: \"\uac1c\uccb4\", answer: ans2, tol: 0.001,\n        q: \"<b>AaBb \u00d7 AaBb<\/b>(\ub3c5\ub9bd\uc720\uc804) \uad50\ubc30\uc5d0\uc11c \uc790\uc190 <b>\" + base + \"\uac1c\uccb4<\/b> \uc911 <b>\ub450 \ud615\uc9c8 \ubaa8\ub450 \uc6b0\uc131(A_B_)<\/b> \uae30\ub300 \uac1c\uccb4 \uc218\ub294?\",\n        formula: \"\ub3c5\ub9bd \uc591\uc131\uc7a1\uc885 9:3:3:1 \u2192 A_B_ = N \u00d7 9/16\",\n        steps: [\"A_B_ \ube44\uc728 = 9/16\", base + \" \u00d7 9/16 = \" + ans2 + \" \uac1c\uccb4\"],\n        source: \"\uae30\ucd9c \u2014 9:3:3:1\"\n      };\n    }\n    if (t === 2) {                       // \uac80\uc815\uad50\ubc30 Aa\u00d7aa \u2192 1:1\n      var M = pick(rng, [10, 20, 50, 100, 300]) * pick(rng, [1, 2]);\n      var ans3 = M / 2;\n      return {\n        cat: \"ratio\", type: \"num\", unit: \"\uac1c\uccb4\", answer: ans3, tol: 0.001,\n        q: \"<b>\uac80\uc815\uad50\ubc30 Aa \u00d7 aa<\/b>\uc5d0\uc11c \uc790\uc190 <b>\" + M + \"\uac1c\uccb4<\/b>\uac00 \ub098\uc654\ub2e4. <b>\uc5f4\uc131 \ud45c\ud604\ud615<\/b> \uae30\ub300 \uac1c\uccb4 \uc218\ub294?\",\n        formula: \"Aa\u00d7aa \u2192 \uc6b0\uc131:\uc5f4\uc131 = 1:1, \uc5f4\uc131 = N/2\",\n        steps: [\"\uc5f4\uc131 \ube44\uc728 = 1/2\", M + \" \u00d7 1/2 = \" + ans3 + \" \uac1c\uccb4\"],\n        source: \"\uae30\ucd9c \u2014 \uac80\uc815\uad50\ubc30 1:1\"\n      };\n    }\n    // \ubcf4\uc778\uc790 \ubd80\ubd80 \uc790\ub140 k\uba85 \ubaa8\ub450 \uc815\uc0c1 = (3/4)^k (\uae30\ucd9c \uc5f0\uc138\ub300 (3/4)\u00b3)\n    var kk = pick(rng, [2, 3]);\n    var ans4 = round(Math.pow(0.75, kk), 3);\n    return {\n      cat: \"ratio\", type: \"num\", unit: \"\", answer: ans4, tol: 0.002,\n      q: \"\uc0c1\uc5fc\uc0c9\uccb4 \uc5f4\uc131 \ubcf4\uc778\uc790 \ubd80\ubd80(<b>Aa \u00d7 Aa<\/b>)\uac00 \uc790\ub140 <b>\" + kk + \"\uba85<\/b>\uc744 \ub0b3\uc744 \ub54c, <b>\ubaa8\ub450 \uc815\uc0c1 \ud45c\ud604\ud615<\/b>\uc77c \ud655\ub960\uc740? (\uc18c\uc218 \uc14b\uc9f8 \uc790\ub9ac)\",\n      formula: \"\uc815\uc0c1 \ud45c\ud604\ud615 \ud655\ub960 = 3/4, \ub3c5\ub9bd \uc2dc\ud589 \u2192 (3/4)^\uc790\ub140\uc218\",\n      steps: [\"1\uba85\uc774 \uc815\uc0c1\uc77c \ud655\ub960 = 3/4\", \"(3/4)^\" + kk + \" = \" + ans4],\n      source: \"\uae30\ucd9c [\uc5f0\uc138\ub300] (3/4)\u00b3 = 27/64\"\n    };\n  }\n\n  /* \uc2dc\uadf8\ub2c8\ucc98: \ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc778\ud130\ub799\ud2f0\ube0c (\uadf8\ub798\ud504 \uc9c1\uc811 \uc870\uc791 \u2192 Vmax\u00b7Km \uc77d\uae30) */\n  function genLWB(rng) {\n    var Vmax = pick(rng, [60, 80, 100, 120, 150, 200]);\n    var Km = pick(rng, [2, 4, 5, 8, 10]);\n    var sList = [Km / 2, Km, 2 * Km, 4 * Km];\n    return {\n      cat: \"enz\", type: \"lwb\", unit: \"\",\n      lwb: { Vmax: Vmax, Km: Km, sList: sList },\n      answer: { Vmax: Vmax, Km: Km }, tol: { rel: 0.08 },\n      q: \"\ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc791\ub3c4\uc785\ub2c8\ub2e4. <b>\ud30c\ub780 \uc810<\/b>\ub4e4\uc744 \uc9c0\ub098\ub3c4\ub85d \uc9c1\uc120\uc758 <b>\ub450 \uc190\uc7a1\uc774\ub97c \ub4dc\ub798\uadf8<\/b>\ud55c \ub4a4, \uc808\ud3b8\uc73c\ub85c\ubd80\ud130 <b>Vmax\u00b7Km<\/b>\uc744 \uc77d\uc5b4 \uc785\ub825\ud558\uc138\uc694.\",\n      formula: \"y\uc808\ud3b8 = 1/Vmax,  x\uc808\ud3b8 = \u22121/Km,  \uae30\uc6b8\uae30 = Km/Vmax\",\n      steps: [\"\uc9c1\uc120\uc744 \ub370\uc774\ud130 \uc810\uc5d0 \ub9de\ucd98\ub2e4\", \"y\uc808\ud3b8 = 1/Vmax \u2192 Vmax = 1 / y\uc808\ud3b8\", \"x\uc808\ud3b8 = \u22121/Km \u2192 Km = \u22121 / x\uc808\ud3b8\", \"\uc815\ub2f5: Vmax = \" + Vmax + \", Km = \" + Km + \" mM\"],\n      source: \"\uc9c0\uc5fd_\uc815\ub9ac \u00b7 \ucea0\ubca8 \u2014 \ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc791\ub3c4\"\n    };\n  }\n\n  var GENS = { atp: genATP, hw: genHW, rec: genRec, enz: genEnz, rq: genRQ, ratio: genRatio };\n  var CATS = [\"atp\", \"hw\", \"rec\", \"enz\", \"rq\", \"ratio\"];\n  var CAT_LABEL = { atp: \"ATP \uc218\uc728\", hw: \"\ud558\ub514-\ubc14\uc778\ubca0\ub974\ud06c\", rec: \"\uc7ac\uc870\ud569\u00b7\uc9c0\ub3c4\uac70\ub9ac\", enz: \"\ud6a8\uc18c \ub3d9\uc5ed\ud559\", rq: \"\ud638\ud761\uc9c0\uc218\", ratio: \"\uc720\uc804 \ubd84\ub9ac\ube44\" };\n  // \ud6a8\uc18c \ub3d9\uc5ed\ud559 = S\uae09 \uc608\uce21 \u2192 \uac00\uc911\uce58 \u2191\n  var CAT_WEIGHT = { atp: 1, hw: 1, rec: 1, enz: 1.6, rq: 0.8, ratio: 1 };\n\n  function genOne(cat, rng) { return GENS[cat](rng || Math.random); }\n\n  /* \uc138\uc158 \ucd94\ucca8 \u2014 \uac00\uc911 \uce74\ud14c\uace0\ub9ac\uc5d0\uc11c count\uac1c (\uc5f0\uc18d \uc911\ubcf5 \uc644\ud654) */\n  function drawSession(opts) {\n    opts = opts || {};\n    var rng = opts.rng || Math.random;\n    var cats = (opts.cats && opts.cats.length) ? opts.cats : CATS.slice();\n    var count = opts.count || 40;\n    var bag = [];\n    cats.forEach(function (c) {\n      var w = Math.max(1, Math.round((CAT_WEIGHT[c] || 1) * 10));\n      for (var i = 0; i < w; i++) bag.push(c);\n    });\n    var out = [], last = null, guard = 0;\n    while (out.length < count) {\n      var c = bag[Math.floor(rng() * bag.length)];\n      if (c === last && cats.length > 1 && guard < 6) { guard++; continue; }\n      guard = 0; last = c;\n      var q = genOne(c, rng);\n      q.id = out.length;\n      out.push(q);\n    }\n    // \ud6a8\uc18c \ub3d9\uc5ed\ud559 \ubc94\uc704\uac00 \ucf1c\uc838 \uc788\uc73c\uba74 \ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc778\ud130\ub799\ud2f0\ube0c 1\uac1c \ubcf4\uc7a5\n    if (cats.indexOf(\"enz\") >= 0 && count >= 1) {\n      var hasLWB = out.some(function (x) { return x.type === \"lwb\"; });\n      if (!hasLWB) {\n        var lwb = genLWB(rng);\n        var pos = Math.floor(rng() * out.length);\n        lwb.id = pos;\n        out[pos] = lwb;\n        for (var i = 0; i < out.length; i++) out[i].id = i;\n      }\n    }\n    return out;\n  }\n\n  /* ---------- \ud1b5\uacc4 ---------- */\n  function emptyStats() {\n    var s = { total: 0, correct: 0, byCat: {} };\n    CATS.forEach(function (c) { s.byCat[c] = { total: 0, correct: 0 }; });\n    return s;\n  }\n  function applyResult(stats, cat, ok) {\n    stats.total++; if (ok) stats.correct++;\n    if (!stats.byCat[cat]) stats.byCat[cat] = { total: 0, correct: 0 };\n    stats.byCat[cat].total++; if (ok) stats.byCat[cat].correct++;\n    return stats;\n  }\n\n  /* ---------- \uc800\uc7a5 \uc9c1\ub82c\ud654(\uc21c\uc218) ---------- */\n  var SCHEMA = 1;\n  function serializeState(state) {\n    return JSON.stringify({\n      v: SCHEMA,\n      settings: state.setting
