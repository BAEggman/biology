비분리의 결과 생성되는 배우자 조합은?", "a": "n, n, n+1, n-1"}, {"id": "E0-125", "q": "1염색체성이란?", "a": "특정 염색체가 하나 부족한 상태"}, {"id": "E0-126", "q": "3염색체성이란?", "a": "특정 염색체가 하나 더 많은 상태"}, {"id": "E0-127", "q": "다운 증후군은 어떤 염색체 이상인가?", "a": "21번 3염색체성"}, {"id": "E0-128", "q": "클라인펠터 증후군은 어떤 범주의 이상인가?", "a": "성염색체 3염색체성"}, {"id": "E0-129", "q": "터너 증후군은 어떤 범주의 이상인가?", "a": "성염색체 1염색체성(X 하나만 존재)"}, {"id": "E0-130", "q": "결실(deletion)이란?", "a": "염색체 일부가 없어지는 구조 이상"}, {"id": "E0-131", "q": "중복(duplication)이란?", "a": "염색체 일부가 반복되어 많아지는 구조 이상"}, {"id": "E0-132", "q": "역위(inversion)란?", "a": "염색체 일부가 뒤집혀 다시 삽입되는 구조 이상"}, {"id": "E0-133", "q": "전좌(translocation)란?", "a": "염색체 일부가 다른 염색체로 옮겨가는 구조 이상"}, {"id": "E0-134", "q": "필라델피아 염색체는 어떤 구조 이상과 관련되는가?", "a": "전좌"}, {"id": "E0-135", "q": "큰 결실을 가진 X염색체를 가진 남성 배아가 대개 치명적인 이유는?", "a": "필수 유전자가 많이 없어 생존이 어렵기 때문"}, {"id": "E0-136", "q": "비분리 문제가 감수 I에서 일어났는지 구별하는 가장 쉬운 수치 패턴은?", "a": "정상 배우자가 하나도 없이 n+1, n+1, n-1, n-1만 나온다"}, {"id": "E0-137", "q": "염색체 이상 단원에서 시험 포인트는 크게 두 가지로 나누면?", "a": "수적 이상(이수성)과 구조적 이상(결실·중복·역위·전좌)"}, {"id": "E0-138", "q": "초파리 연관지도 문제에서 거리를 구한 뒤 바로 연결되는 개념은?", "a": "재조합빈도"}, {"id": "E0-139", "q": "성결정 체계 그림에서 암컷이 hetero인 체계는?", "a": "Z-W 체계"}, {"id": "E0-140", "q": "성결정 체계 그림에서 수컷이 hetero인 체계는?", "a": "X-Y와 X-O 체계"}, {"id": "E0-141", "q": "X연관 열성 유전에서 여성이 발병하려면 어떤 조건이 필요한가?", "a": "열성 대립유전자를 양쪽 X에서 모두 받아야 한다"}, {"id": "E0-142", "q": "반접합성(hemizygous)의 뜻은?", "a": "한 유전자좌위에 대립유전자가 하나만 존재하는 상태"}, {"id": "E0-143", "q": "X연관 유전 문제에서 딸이 아버지의 X를 반드시 받는가?", "a": "예"}, {"id": "E0-144", "q": "X연관 유전 문제에서 아들이 어머니의 X를 반드시 받는가?", "a": "예"}, {"id": "E0-145", "q": "사람에서 XY 체계의 배우자 생산을 쓰면?", "a": "난자는 X만, 정자는 X 또는 Y를 낸다"}, {"id": "E0-146", "q": "ZW 체계의 배우자 생산을 쓰면?", "a": "수컷은 Z만, 암컷은 Z 또는 W를 낸다"}, {"id": "E0-147", "q": "XO 체계의 배우자 생산을 쓰면?", "a": "암컷은 X만, 수컷은 X 또는 O를 낸다"}, {"id": "E0-148", "q": "한성유전이 '절대 한쪽 성에서만' 보이는 이유는?", "a": "발현에 필요한 호르몬 환경이 한 성에서만 존재하거나 매우 강하기 때문"}, {"id": "E0-149", "q": "모건 초파리 실험에서 F2에서 흰눈 수컷이 많이 보이는 이유는?", "a": "X연관 열성 대립유전자가 수컷에서 반접합으로 바로 표현되기 때문"}, {"id": "E0-150", "q": "초파리 연관지도에서 검은 몸(48.5)과 흔적 날개(67.0) 사이 거리를 이용한 예상 교차율은?", "a": "18.5%"}, {"id": "E0-151", "q": "초파리 연관지도에서 주홍색 눈(57.5)과 아래로 휘어진 날개(75.5) 사이 예상 교차율은?", "a": "18.0%"}, {"id": "E0-152", "q": "초파리 연관지도에서 짧은 더듬이(0)와 검은 몸(48.5) 사이 예상 교차율은?", "a": "48.5%"}, {"id": "E0-153", "q": "초파리 연관지도에서 짧은 더듬이(0)와 흔적 날개(67.0) 사이 예상 교차율은?", "a": "67.0%"}, {"id": "E0-154", "q": "초파리 연관지도에서 48.5와 57.5 사이 유전자가 서로 가까운 이유를 수치로 설명하면?", "a": "거리가 9.0 cM로 짧기 때문"}, {"id": "E0-155", "q": "초파리 연관지도에서 0과 16.5 사이 유전자는 어떤 관계로 볼 수 있는가?", "a": "상대적으로 가까운 연관"}, {"id": "E0-156", "q": "초파리 연관지도에서 75.5와 104.5 사이 거리는?", "a": "29.0 cM"}, {"id": "E0-157", "q": "초파리 연관지도에서 16.5와 104.5 사이 거리는?", "a": "88.0 cM"}, {"id": "E0-158", "q": "초파리 지도에서 9.0 cM와 9.5 cM 구간을 합치면 얼마인가?", "a": "18.5 cM"}, {"id": "E0-159", "q": "초파리 지도에서 32.0 cM와 9.0 cM를 합치면 얼마인가?", "a": "41.0 cM"}, {"id": "E0-160", "q": "초파리 지도에서 멀리 떨어진 두 유전자의 재조합 빈도가 단순 합과 다를 수 있는 이유는?", "a": "이중교차가 실제 빈도를 왜곡할 수 있기 때문"}, {"id": "E0-161", "q": "재조합 빈도로 유전자 순서를 결정할 때 필요한 것은?", "a": "여러 유전자쌍의 거리 비교"}, {"id": "E0-162", "q": "b-vg 17%, cn-b 9%, cn-vg 9.5%일 때 가운데 유전자는?", "a": "cn (b-vg 17%가 가장 크므로 b·vg가 양끝, cn이 가운데)"}, {"id": "E0-163", "q": "세 유전자 순서가 b-cn-vg이고 b-cn=9 cM, cn-vg=9.5 cM일 때, 양 끝 b-vg의 관측 재조합빈도(17%)가 인접 구간 합과 다른 이유는?", "a": "인접 구간 합은 18.5%이지만, 이중교차가 재조합으로 나타나지 않아 실제 관측값(17%)이 더 작아진다"}, {"id": "E0-164", "q": "두 유전자 거리 9 cM는 시험에서 무엇과 거의 동치로 취급하는가?", "a": "재조합형 9%"}, {"id": "E0-165", "q": "두 유전자 거리 32 cM는 시험에서 무엇과 거의 동치로 취급하는가?", "a": "재조합형 32%"}, {"id": "E0-166", "q": "초파리 검정교배에서 부모형이 760마리, 재조합형이 240마리면 교차율은?", "a": "24%"}, {"id": "E0-167", "q": "초파리 검정교배에서 전체 1000마리 중 부모형이 830마리면 재조합형 비율은?", "a": "17%"}, {"id": "E0-168", "q": "초파리 검정교배에서 전체 600마리 중 재조합형이 54마리면 지도거리는?", "a": "9 cM"}, {"id": "E0-169", "q": "초파리 검정교배에서 전체 1000마리 중 재조합형이 95마리면 지도거리는?", "a": "9.5 cM"}, {"id": "E0-170", "q": "초파리 검정교배에서 전체 1000마리 중 재조합형이 320마리면 지도거리는?", "a": "32 cM"}, {"id": "E0-171", "q": "초파리 검정교배에서 교차율이 29%면 부모형 총 비율은?", "a": "71%"}, {"id": "E0-172", "q": "초파리 검정교배에서 부모형 두 클래스가 각각 355, 355이고 재조합형 두 클래스가 각각 145, 145이면 교차율은?", "a": "29%"}, {"id": "E0-173", "q": "감수 I 비분리와 감수 II 비분리를 구별하는 핵심은?", "a": "정상 배우자가 있는지 없는지"}, {"id": "E0-174", "q": "감수 I 비분리라면 정상 배우자가 존재하는가?", "a": "아니오"}, {"id": "E0-175", "q": "감수 II 비분리라면 정상 배우자가 존재하는가?", "a": "예, 2개 존재"}, {"id": "E0-176", "q": "1염색체성 배아가 치명적인 경우가 많은 이유는?", "a": "필수 유전자 수가 부족해 정상 발달이 어렵기 때문"}, {"id": "E0-177", "q": "3염색체성 배아가 살아남을 수 있어도 표현형 이상이 생기는 이유는?", "a": "유전자 용량 불균형이 발생하기 때문"}, {"id": "E0-178", "q": "유전체 각인(genomic imprinting)이란?", "a": "같은 대립유전자라도 아버지에게서 왔는지 어머니에게서 왔는지에 따라 발현이 달라지는 현상; 주된 기작은 DNA 메틸화 — 멘델 법칙의 예외"}, {"id": "E0-179", "q": "세포질 유전(핵외유전)과 모계유전이란?", "a": "미토콘드리아·엽록체 DNA에 있는 유전자의 유전으로, 대개 난자 세포질을 통해 전달되어 모계유전을 보임(미토콘드리아 유전병, 엽록체 잎 얼룩 등) — 멘델 법칙의 예외"}, {"id": "E0-180", "q": "삼점 검정교배에서 가운데(중앙) 유전자를 찾는 방법은?", "a": "가장 적게 나온 두 클래스(이중교차형)를 가장 많은 두 클래스(부모형)와 비교해, 위치(대립유전자)가 바뀐 유전자가 가운데 유전자다"}, {"id": "E0-181", "q": "바소체(Barr body) 수를 구하는 공식은?", "a": "(X 염색체 수 − 1); 예: 정상 여성 XX=1개, XXX=2개, XXYY=2개, 정상 남성 XY=0개"}]}, {"label": "16 핵산과 유전", "cards": [{"id": "E1-0", "q": "20세기 초에 단백질이 유전물질로 더 유력하게 여겨진 이유는?", "a": "단백질이 더 복잡하고 다양해서"}, {"id": "E1-1", "q": "그리피스(Griffith) 폐렴쌍구균 실험의 결론은?", "a": "비병원성 R형이 죽은 병원성 S형의 물질로 병원성으로 바뀐다(형질전환)"}, {"id": "E1-2", "q": "그리피스 실험에서 R형과 S형의 차이는?", "a": "R형=비병원성(거친 집락), S형=병원성(매끄러운 집락)"}, {"id": "E1-3", "q": "그리피스 실험에서 살아있는 R형 + 죽은 S형을 쥐에 주입하면?", "a": "쥐가 죽고 살아있는 S형이 검출된다(형질전환)"}, {"id": "E1-4", "q": "형질전환(transformation)이란?", "a": "외부 DNA가 세포 안으로 들어가 형질이 바뀌는 현상"}, {"id": "E1-5", "q": "에이버리·매클라우드·매카티 실험이 밝힌 형질전환 물질은?", "a": "단백질이 아니라 DNA"}, {"id": "E1-6", "q": "에이버리 실험에서 DNA 분해효소를 처리하면?", "a": "형질전환이 일어나지 않는다(형질전환 물질=DNA 확인)"}, {"id": "E1-7", "q": "허시-체이스 실험에서 단백질과 DNA를 표지한 동위원소는?", "a": "단백질=35S, DNA=32P"}, {"id": "E1-8", "q": "허시-체이스 실험의 결론은?", "a": "세균 안으로 들어가 다음 세대 파지를 만드는 물질은 DNA"}, {"id": "E1-9", "q": "35S가 단백질 표지에 적합한 이유는?", "a": "단백질엔 황 함유 아미노산이 있지만 DNA엔 황이 거의 없다"}, {"id": "E1-10", "q": "32P가 DNA 표지에 적합한 이유는?", "a": "DNA의 당-인산 골격에 인이 들어 있다"}, {"id": "E1-11", "q": "허시-체이스에서 원심분리 후 침전물·상등액에 남는 표지는?", "a": "침전물(세균)에 32P(DNA), 상등액에 35S(단백질 껍질)"}, {"id": "E1-12", "q": "파지를 매개로 DNA가 전달되는 현상은? (형질전환과 혼동 주의)", "a": "형질도입(transduction)"}, {"id": "E1-13", "q": "세균의 유전물질 전달 3가지는?", "a": "형질전환(외부 DNA), 형질도입(파지 매개), 접합(F인자)"}, {"id": "E1-14", "q": "DNA의 기본 단위체는?", "a": "뉴클레오타이드"}, {"id": "E1-15", "q": "하나의 뉴클레오타이드를 이루는 세 가지는?", "a": "인산, 디옥시리보스(당), 질소염기"}, {"id": "E1-16", "q": "DNA를 구성하는 당은? (리보스와 혼동 주의)", "a": "디옥시리보스 — RNA의 리보스가 아니다"}, {"id": "E1-17", "q": "디옥시리보스가 리보스와 다른 점은?", "a": "2번 탄소의 -OH가 -H로 바뀌어 있다(디옥시)"}, {"id": "E1-18", "q": "DNA 한 가닥의 두 말단은?", "a": "5' 말단과 3' 말단(방향성)"}, {"id": "E1-19", "q": "DNA 두 가닥이 서로 반대 방향으로 배열된 구조를 뭐라 하는가?", "a": "역평행(antiparallel)"}, {"id": "E1-20", "q": "DNA 이중나선에서 당-인산 골격과 염기의 위치는?", "a": "골격은 바깥쪽, 염기는 안쪽"}, {"id": "E1-21", "q": "DNA 두 가닥을 묶어주는 결합은?", "a": "염기 사이의 수소결합"}, {"id": "E1-22", "q": "A-T와 G-C의 수소결합 수는?", "a": "A-T 2개, G-C 3개"}, {"id": "E1-23", "q": "인접한 뉴클레오타이드(당-인산)를 잇는 결합은?", "a": "인산이에스터 결합(phosphodiester)"}, {"id": "E1-24", "q": "Chargaff 법칙의 핵심은?", "a": "한 DNA 안에서 A=T, G=C (종마다 염기 조성은 다를 수 있다)"}, {"id": "E1-25", "q": "왓슨과 크릭이 이중나선 모델의 근거로 삼은 두 가지는?", "a": "프랭클린의 X선 회절 사진과 Chargaff 법칙"}, {"id": "E1-26", "q": "DNA에서 아데닌(A)은 무엇과 결합하는가? (우라실 주의)", "a": "티민(T) — 우라실(U)은 RNA"}, {"id": "E1-27", "q": "퓨린과 피리미딘 염기를 구분하면?", "a": "퓨린=A·G(2고리), 피리미딘=C·T(1고리)"}, {"id": "E1-28", "q": "이중나선의 폭이 일정하게 유지되는 이유는?", "a": "항상 퓨린+피리미딘이 짝을 이루기 때문"}, {"id": "E1-29", "q": "DNA에 유전정보가 저장되는 방식은?", "a": "염기서열의 순서"}, {"id": "E1-30", "q": "DNA 이중나선이 한 바퀴 도는 길이와 염기쌍 수는?", "a": "3.4nm, 10 bp (0.34nm×10)"}, {"id": "E1-31", "q": "어떤 DNA에서 C가 40%이면 T는?", "a": "10% (C=G=40%, A+T=20%, A=T=10%)"}, {"id": "E1-32", "q": "(G+C)/(A+T)=1.8, 총 168염기일 때 A의 수는?", "a": "30개 (A+T=60 → A=T=30)"}, {"id": "E1-33", "q": "21,000 bp 이중나선의 완전한 회전 수는?", "a": "2,100 (21,000÷10)"}, {"id": "E1-34", "q": "DNA 복제의 기본 원리는?", "a": "주형가닥에 대한 상보적 염기쌍 형성"}, {"id": "E1-35", "q": "반보존적 복제(semiconservative)란?", "a": "각 딸 DNA가 기존 가닥 하나와 새 가닥 하나를 가지는 복제"}, {"id": "E1-36", "q": "'반보존적'의 의미는?", "a": "딸 DNA의 절반(한 가닥)이 부모에게서 보존된다는 뜻"}, {"id": "E1-37", "q": "보존적(conservative) 복제 모델이란?", "a": "부모 DNA 두 가닥이 그대로 함께 남는 모델"}, {"id": "E1-38", "q": "분산적(dispersive) 복제 모델이란?", "a": "기존 가닥과 새 가닥 조각이 섞이는 모델"}, {"id": "E1-39", "q": "반보존적 복제를 입증한 실험과 동위원소는?", "a": "메셀슨-스탈 실험, 무거운 질소(15N)·가벼운 질소(14N)"}, {"id": "E1-40", "q": "15N 세포를 14N으로 옮겨 1회 복제하면 밴드는?", "a": "모두 중간 밀도 밴드"}, {"id": "E1-41", "q": "14N에서 2회 복제 후 DNA 비율은?", "a": "hybrid 1/2, 가벼움(14N) 1/2"}, {"id": "E1-42", "q": "14N에서 3세대 배양 후 DNA 분포는?", "a": "hybrid 1/4, 가벼움 3/4"}, {"id": "E1-43", "q": "메셀슨-스탈에서 보존적 모델이 부정되는 근거는?", "a": "1회 복제 후 무거운/가벼운 밴드가 따로 나와야 하는데 실제로는 중간 밴드만 나옴"}, {"id": "E1-44", "q": "DNA 복제가 일어나는 세포주기 시기는?", "a": "S기"}, {"id": "E1-45", "q": "새 가닥이 5'→3'로 합성되므로 주형가닥은 어느 방향으로 읽히는가?", "a": "3'→5'"}, {"id": "E1-46", "q": "DNA 복제가 시작되는 특정 염기서열은?", "a": "복제 원점(origin of replication)"}, {"id": "E1-47", "q": "세균 원형 염색체의 복제 원점 수와 방식은?", "a": "보통 1개, 양방향 복제"}, {"id": "E1-48", "q": "진핵 선형 염색체의 복제 원점 수는?", "a": "많은 복제 원점 사용"}, {"id": "E1-49", "q": "복제 원점이 많으면 유리한 점은?", "a": "큰 DNA를 짧은 시간 안에 복제할 수 있다"}, {"id": "E1-50", "q": "복제가 진행되는 Y자 모양 부위는?", "a": "복제분기점(replication fork)"}, {"id": "E1-51", "q": "복제 원점에서 양쪽으로 열리며 생기는 거품 구조는?", "a": "복제 기포(replication bubble)"}, {"id": "E1-52", "q": "한 복제 기포에 복제분기점은 몇 개 있으며 어디로 이동하는가?", "a": "2개 — 원점에서 서로 반대 방향으로 이동(양방향)"}, {"id": "E1-53", "q": "진핵 DNA 복제가 세균과 다른 핵심 이유는?", "a": "진핵은 복제 원점이 여러 개, 세균은 한 개"}, {"id": "E1-54", "q": "DNA 중합효소는 기존 가닥의 어느 말단에만 붙이는가?", "a": "3' 말단 (합성은 항상 5'→3')"}, {"id": "E1-55", "q": "새 DNA 가닥 합성에 필요한 프라이머는? (DNA 주의)", "a": "RNA 프라이머"}, {"id": "E1-56", "q": "DNA 중합효소가 새 가닥을 스스로 시작 못 하는 한계를 보완하는 것은?", "a": "RNA 프라이머(프리메이스가 합성)"}, {"id": "E1-57", "q": "RNA 프라이머가 필요한 과정은 복제·전사 중 어느 쪽인가?", "a": "DNA 복제 — 전사에는 프라이머가 필요 없다"}, {"id": "E1-58", "q": "선도가닥(leading)의 합성 방식은?", "a": "복제분기점 진행 방향으로 연속 합성"}, {"id": "E1-59", "q": "지연가닥(lagging)의 합성 방식은?", "a": "분기점에서 멀어지는 방향으로 불연속 합성"}, {"id": "E1-60", "q": "선도/지연가닥의 합성 방향이 분기점 기준 어떻게 다른가?", "a": "선도=분기점과 같은 방향, 지연=반대 방향(절편별)"}, {"id": "E1-61", "q": "지연가닥이 '지연'이라 불리는 이유는?", "a": "분기점이 열린 뒤에야 절편을 끊어 합성하므로 늦게 진행되기 때문"}, {"id": "E1-62", "q": "지연가닥에서 만들어지는 짧은 DNA 조각은?", "a": "오카자키 절편(Okazaki fragment)"}, {"id": "E1-63", "q": "오카자키 절편이 하나의 가닥이 되는 마무리 과정은?", "a": "프라이머 제거 → DNA로 대체 → ligase 연결"}, {"id": "E1-64", "q": "선도가닥과 지연가닥의 프라이머 수 차이는?", "a": "선도=보통 1개, 지연=절편마다 여러 개"}, {"id": "E1-65", "q": "선도가닥과 지연가닥의 중간 산물 차이는?", "a": "선도=하나의 긴 새 가닥, 지연=오카자키 절편"}, {"id": "E1-66", "q": "복제분기점 효소 7종을 쓰면?", "a": "헬리케이스·SSB·토포아이소머레이스·프리메이스·DNA pol III·DNA pol I·ligase"}, {"id": "E1-67", "q": "헬리케이스(helicase)의 기능은?", "a": "부모 DNA 이중나선을 푼다"}, {"id": "E1-68", "q": "단일가닥 결합 단백질(SSB)의 기능은?", "a": "분리된 가닥이 다시 붙지 않게 안정화한다"}, {"id": "E1-69", "q": "토포아이소머레이스의 기능은?", "a": "복제분기점 앞쪽의 비틀림 장력을 완화한다"}, {"id": "E1-70", "q": "프리메이스(primase)의 기능은?", "a": "RNA 프라이머를 합성한다"}, {"id": "E1-71", "q": "DNA 중합효소 III의 기능은?", "a": "프라이머의 3' 말단에서 새 DNA를 5'→3'로 합성한다"}, {"id": "E1-72", "q": "DNA 중합효소 I의 기능은?", "a": "RNA 프라이머를 제거하고 그 자리를 DNA로 대체한다"}, {"id": "E1-73", "q": "DNA 중합효소 I이 프라이머를 제거하는 데 쓰는 활성은?", "a": "5'→3' 핵산말단가수분해효소(exonuclease) 활성"}, {"id": "E1-74", "q": "DNA 연결효소(ligase)의 기능은?", "a": "오카자키 절편 사이 당-인산 골격(nick)을 연결한다"}, {"id": "E1-75", "q": "수선·오카자키 절편 연결에서 nick에 작용하는 효소는?", "a": "DNA 연결효소(ligase)"}, {"id": "E1-76", "q": "방향성 문제를 푸는 핵심 규칙은?", "a": "DNA 중합효소는 3' 말단에만 붙인다(새 가닥 5'→3')"}, {"id": "E1-77", "q": "DNA 복제 정확도를 높이는 두 축은?", "a": "DNA 중합효소의 교정 기능과 여러 수선 체계"}, {"id": "E1-78", "q": "교정(proofreading)이란?", "a": "복제 중 잘못 들어간 뉴클레오타이드를 DNA 중합효소가 제거·재합성하는 것"}, {"id": "E1-79", "q": "교정(proofreading)과 불일치 수선의 타이밍 차이는?", "a": "교정=복제 중 즉시, 불일치 수선=복제 후"}, {"id": "E1-80", "q": "복제 후 남은 염기쌍 오류를 고치는 수선은?", "a": "불일치 수선(mismatch repair)"}, {"id": "E1-81", "q": "불일치 수선에서 새 가닥과 모가닥을 구분하는 단서는?", "a": "GATC 서열의 메틸화 여부"}, {"id": "E1-82", "q": "티민 이합체처럼 구조를 왜곡하는 손상을 제거하는 수선은?", "a": "뉴클레오타이드 절제 수선(NER)"}, {"id": "E1-83", "q": "티민 이합체를 만드는 대표 원인은?", "a": "자외선(UV)"}, {"id": "E1-84", "q": "색소성 건피증(XP)과 관련된 수선 결함은?", "a": "뉴클레오타이드 절제 수선(NER) 결함"}, {"id": "E1-85", "q": "시토신이 탈아미노되어 우라실로 바뀐 손상을 고치는 수선은?", "a": "염기 절제 수선(BER)"}, {"id": "E1-86", "q": "뉴클레오타이드 절제 수선의 단계는?", "a": "손상 부위 절제 → DNA 합성 → 연결(ligase)"}, {"id": "E1-87", "q": "DNA 손상이 수선되지 않고 다음 세대로 전달되면?", "a": "돌연변이가 된다"}, {"id": "E1-88", "q": "돌연변이의 결과는 항상 해로운가?", "a": "아니오 — 해로울·중립·드물게 유리할 수도 있다"}, {"id": "E1-89", "q": "수선 기능이 떨어지면 커지는 위험은?", "a": "돌연변이 축적과 암 발생 위험 증가"}, {"id": "E1-90", "q": "선형 DNA의 말단 복제 문제란?", "a": "마지막 RNA 프라이머 제거 후 그 자리를 못 채워 복제할수록 말단이 짧아지는 문제"}, {"id": "E1-91", "q": "말단 복제 문제가 선형 DNA에서만 생기는 이유는?", "a": "환형 DNA(세균)는 말단이 없어 이 문제가 없기 때문"}, {"id": "E1-92", "q": "텔로미어(telomere)란?", "a": "염색체 말단의 반복적 비암호화 서열로 유전자 손실을 지연시킴"}, {"id": "E1-93", "q": "텔로머라아제(telomerase)의 기능은?", "a": "텔로미어를 연장하는 효소"}, {"id": "E1-94", "q": "텔로머라아제가 주형으로 쓰는 것은?", "a": "자신이 가진 RNA"}, {"id": "E1-95", "q": "텔로머라아제 활성이 중요한 세포는?", "a": "생식세포, 줄기세포, 일부 암세포"}, {"id": "E1-96", "q": "대부분의 체세포에서 텔로머라아제 활성은?", "a": "낮거나 없다"}, {"id": "E1-97", "q": "암세포에서 텔로머라아제 활성화의 결과는?", "a": "세포가 제한 없이 분열하는 데 기여"}, {"id": "E1-98", "q": "진핵세포 DNA가 여러 단계로 포장되어야 하는 이유는?", "a": "DNA가 매우 길어 핵 안에 들어가기 위해"}, {"id": "E1-99", "q": "DNA와 단백질의 복합체를 뭐라 하는가?", "a": "염색질(chromatin)"}, {"id": "E1-100", "q": "염색질 포장의 기본 단위는?", "a": "뉴클레오솜(nucleosome)"}, {"id": "E1-101", "q": "뉴클레오솜의 구조는?", "a": "히스톤 단백질 주위에 DNA가 감긴 구조"}, {"id": "E1-102", "q": "진핵세포 DNA 포장 단계 순서는?", "a": "DNA→뉴클레오솜→30nm 섬유→고리(loop)→응축된 염색체"}, {"id": "E1-103", "q": "히스톤이 DNA와 잘 결합하는 이유는?", "a": "양전하 아미노산(Lys·Arg)이 풍부해 음전하 DNA와 결합"}, {"id": "E1-104", "q": "진핵세포의 히스톤은 양전하인가 음전하인가?", "a": "양전하(염기성 아미노산) — DNA는 음전하"}, {"id": "E1-105", "q": "히스톤과 DNA의 결합 종류는? (공유결합 주의)", "a": "이온결합(정전기적 인력)"}, {"id": "E1-106", "q": "원핵생물에 히스톤 단백질이 있는가?", "a": "없다 (진핵세포에만 있음)"}, {"id": "E1-107", "q": "히스톤의 종류 다섯 가지는?", "a": "H1, H2A, H2B, H3, H4"}, {"id": "E1-108", "q": "H1 히스톤의 역할은?", "a": "뉴클레오솜 사이 연결부(linker)에 결합해 더 높은 차원으로 응축"}, {"id": "E1-109", "q": "진정염색질(euchromatin)의 특징은?", "a": "덜 응축, 발현 잘 됨, 밝게 염색"}, {"id": "E1-110", "q": "이질염색질(heterochromatin)의 특징은?", "a": "더 응축, 접근성 낮음, 진하게 염색"}, {"id": "E1-111", "q": "느슨하고 밝게 염색되는 염색질은? (이질염색질과 혼동 주의)", "a": "진정염색질(euchromatin)"}, {"id": "E1-112", "q": "히스톤 아세틸화와 탈아세틸화가 전사에 미치는 영향은?", "a": "아세틸화=느슨(촉진), 탈아세틸화=응축(억제)"}, {"id": "E1-113", "q": "염색체가 가장 강하게 응축되어 관찰이 쉬운 시기는?", "a": "유사분열 중기"}, {"id": "E1-114", "q": "간기의 염색질은 핵 안에서 어떻게 분포하는가?", "a": "무작위가 아니라 일정 영역(영토)을 차지"}, {"id": "E1-115", "q": "세포 당 DNA 함량이 가장 적은 시기는?", "a": "G1기 (S기 복제 전)"}, {"id": "E1-116", "q": "세균과 사람 염색체의 공통점·차이점은?", "a": "둘 다 DNA+단백질·슈퍼코일; 세균=원형, 사람=선형"}, {"id": "E1-117", "q": "이 단원의 한 줄 핵심은?", "a": "DNA가 정보를 저장하고, 상보적 염기쌍·효소로 정확히 복제되며, 단백질과 함께 염색체로 포장돼 전달된다"}, {"id": "E1-118", "q": "활주 클램프(sliding clamp)의 기능은?", "a": "DNA 중합효소를 주형 가닥에 붙잡아 두어 복제 진행성(processivity)을 높이는 고리형 단백질"}, {"id": "E1-119", "q": "대장균 DNA 복제의 개시 순서는?", "a": "DnaA(AT 풍부한 복제기점 인식) → DnaB(헬리케이스, 이중나선 풀기) → SSB → DnaG(프라이메이스, RNA 프라이머 합성). 복제기점이 AT-rich인 이유는 A-T가 수소결합 2개라 풀기 쉽기 때문"}, {"id": "E1-120", "q": "텔로머라아제가 수행하는 반응의 종류는?", "a": "역전사 — 자신이 가진 RNA를 주형으로 삼아 DNA(텔로미어 반복서열)를 합성한다(RNA-의존 DNA 중합효소)"}]}]}, {"id": "F", "name": "유전자 발현과 조절", "chapters": [{"label": "17 유전자의 발현", "cards": [{"id": "F0-0", "q": "유전자가 전사와 번역을 통해 단백질을 지정하는 전체 과정을 무엇이라 하는가?", "a": "유전자 발현"}, {"id": "F0-1", "q": "DNA 정보를 이용해 RNA를 합성하는 과정은?", "a": "전사"}, {"id": "F0-2", "q": "mRNA 정보를 이용해 폴리펩타이드를 합성하는 과정은?", "a": "번역"}, {"id": "F0-3", "q": "DNA와 단백질 합성 사이의 중간 다리 역할을 하는 핵산은?", "a": "RNA"}, {"id": "F0-4", "q": "RNA의 염기 4가지는?", "a": "A, G, C, U"}, {"id": "F0-5", "q": "RNA가 DNA와 다른 염기를 하나만 고르면?", "a": "우라실(U)"}, {"id": "F0-6", "q": "RNA의 일반적인 구조는?", "a": "단일 가닥"}, {"id": "F0-7", "q": "유전자가 특정 효소 생성을 지시한다는 가설은?", "a": "1유전자 1효소설"}, {"id": "F0-8", "q": "1유전자 1효소설이 1유전자 1폴리펩타이드설로 발전한 이유는?", "a": "단백질이 여러 폴리펩타이드로 이루어질 수 있기 때문"}, {"id": "F0-9", "q": "비들과 테이텀이 사용한 실험 생물은?", "a": "붉은빵곰팡이 Neurospora"}, {"id": "F0-10", "q": "비들과 테이텀이 돌연변이를 유도하기 위해 사용한 것은?", "a": "X선"}, {"id": "F0-11", "q": "Neurospora가 유전 연구에 유리한 이유는?", "a": "반수체라 단일 유전자 변화가 표현형에 바로 드러나기 때문"}, {"id": "F0-12", "q": "1유전자 1폴리펩타이드설의 예외 두 가지는?", "a": "선택적 스플라이싱과 기능성 RNA"}, {"id": "F0-13", "q": "단백질로 번역되지 않지만 중요한 기능을 하는 RNA의 예시는?", "a": "rRNA와 tRNA"}, {"id": "F0-14", "q": "효소처럼 작용하는 RNA를 무엇이라 하는가?", "a": "리보자임"}, {"id": "F0-15", "q": "겸상적혈구 빈혈증이 보여주는 점은?", "a": "단백질의 폴리펩타이드 하나가 유전자 하나에 의해 지정된다는 것"}, {"id": "F0-16", "q": "진핵세포에서 전사는 어디서 일어나는가?", "a": "핵"}, {"id": "F0-17", "q": "진핵세포에서 번역은 어디서 일어나는가?", "a": "세포질의 리보솜"}, {"id": "F0-18", "q": "원핵세포에서 전사와 번역이 동시에 가능한 이유는?", "a": "핵막이 없어 공간적으로 분리되지 않기 때문"}, {"id": "F0-19", "q": "3개의 염기가 1개의 아미노산을 지정하는 단위를 무엇이라 하는가?", "a": "코돈"}, {"id": "F0-20", "q": "개시 코돈은?", "a": "AUG"}, {"id": "F0-21", "q": "종결 코돈 3가지는?", "a": "UAA, UAG, UGA"}, {"id": "F0-22", "q": "AUG가 지정하는 아미노산은?", "a": "메티오닌"}, {"id": "F0-23", "q": "가능한 코돈의 총 개수와 그 구성은?", "a": "총 64개(4³) — 61개가 아미노산 지정, 3개는 종결 코돈"}, {"id": "F0-24", "q": "유전암호의 중복성(degeneracy)이란?", "a": "한 아미노산을 여러 코돈이 지정하는 성질 (예: UCU·UCC·UCG=세린) — 주로 코돈 3번째 염기만 다름"}, {"id": "F0-25", "q": "유전 정보 흐름의 중심 원리를 쓰면?", "a": "DNA -> RNA -> 단백질"}, {"id": "F0-26", "q": "전사에 사용되는 DNA 가닥의 이름은?", "a": "주형 가닥"}, {"id": "F0-27", "q": "주형 가닥은 어떤 방향으로 읽히는가?", "a": "3' -> 5'"}, {"id": "F0-28", "q": "RNA는 어떤 방향으로 합성되는가?", "a": "5' -> 3'"}, {"id": "F0-29", "q": "RNA를 합성하는 효소는?", "a": "RNA 중합효소"}, {"id": "F0-30", "q": "진핵세포에서 mRNA 합성을 담당하는 효소는?", "a": "RNA 중합효소 II"}, {"id": "F0-31", "q": "진핵세포에서 rRNA를 주로 합성하는 효소는?", "a": "RNA 중합효소 I"}, {"id": "F0-32", "q": "진핵세포에서 tRNA를 주로 합성하는 효소는?", "a": "RNA 중합효소 III"}, {"id": "F0-33", "q": "전사가 시작되는 DNA 서열은?", "a": "프로모터"}, {"id": "F0-34", "q": "세균에서 전사 종결을 알리는 DNA 서열은?", "a": "종결자"}, {"id": "F0-35", "q": "전사 개시점은 무엇인가?", "a": "RNA 합성이 실제로 시작되는 뉴클레오타이드 위치"}, {"id": "F0-36", "q": "전사가 진행되는 방향을 무엇이라 하는가?", "a": "하부 downstream"}, {"id": "F0-37", "q": "프로모터 쪽 반대 방향을 무엇이라 하는가?", "a": "상부 upstream"}, {"id": "F0-38", "q": "진핵세포에서 RNA 중합효소 II의 부착을 돕는 단백질들은?", "a": "전사인자"}, {"id": "F0-39", "q": "전사인자와 RNA 중합효소 II가 함께 이룬 완전체는?", "a": "전사 개시복합체"}, {"id": "F0-40", "q": "진핵세포 핵심 프로모터의 대표 서열은?", "a": "TATA box"}, {"id": "F0-41", "q": "TATA box의 기능은?", "a": "전사 개시복합체 형성을 돕는다"}, {"id": "F0-42", "q": "세균과 진핵세포의 전사 개시 차이 한 가지는?", "a": "세균은 RNA 중합효소가 직접 프로모터를 인식하지만 진핵은 전사인자가 필요하다"}, {"id": "F0-43", "q": "지용성 호르몬(스테로이드·성호르몬)은 전사에 어떻게 작용하는가?", "a": "세포막을 통과해 직접 전사인자로 작용 (수용성 호르몬은 직접 작용하지 않음)"}, {"id": "F0-44", "q": "RNA 중합효소가 DNA 이중나선을 푸는 범위는 대략 몇 염기쌍인가?", "a": "약 10~20개"}, {"id": "F0-45", "q": "RNA 중합효소가 지나간 뒤 DNA는 어떻게 되는가?", "a": "다시 이중나선으로 결합한다"}, {"id": "F0-46", "q": "진핵세포에서 전사 종결과 관련한 대표 RNA 신호 서열은?", "a": "AAUAAA"}, {"id": "F0-47", "q": "AAUAAA 신호 뒤 RNA는 어떻게 되는가?", "a": "잘려 나가며 방출된다"}, {"id": "F0-48", "q": "암호 가닥의 서열이 mRNA와 거의 같은 이유는?", "a": "둘 다 주형 가닥과 상보적이기 때문"}, {"id": "F0-49", "q": "암호 가닥과 mRNA의 차이 한 가지는?", "a": "DNA는 T를 쓰고 RNA는 U를 쓴다"}, {"id": "F0-50", "q": "하나의 유전자는 항상 같은 DNA 가닥을 주형으로 사용하는가?", "a": "예"}, {"id": "F0-51", "q": "서로 다른 유전자는 같은 염색체에서 반대 가닥을 주형으로 쓸 수 있는가?", "a": "예"}, {"id": "F0-52", "q": "전사 단위란?", "a": "하나의 RNA 분자로 전사되는 DNA 구간"}, {"id": "F0-53", "q": "전사에서 상보성과 방향성이 모두 중요한 이유는?", "a": "주형 가닥을 정확히 읽어 올바른 RNA를 만들어야 하기 때문"}, {"id": "F0-54", "q": "원핵세포에서 mRNA는 대개 가공이 많은가 적은가?", "a": "적다"}, {"id": "F0-55", "q": "진핵세포 전사물이 바로 번역되지 않는 이유는?", "a": "전구 mRNA 단계에서 가공이 필요하기 때문"}, {"id": "F0-56", "q": "진핵세포 전사 후 RNA 가공의 대표 3가지는?", "a": "5' 캡, 3' poly-A tail, 스플라이싱"}, {"id": "F0-57", "q": "mRNA 전구체의 5' 말단에 붙는 변형된 구조는?", "a": "5' 캡"}, {"id": "F0-58", "q": "5' 캡의 핵심 염기 종류는?", "a": "변형된 구아닌"}, {"id": "F0-59", "q": "5' 캡의 기능 두 가지는?", "a": "분해 방지와 리보솜 결합 도움"}, {"id": "F0-60", "q": "5' 캡은 전사 도중 언제쯤 붙는가?", "a": "약 20~40개 뉴클레오타이드가 전사된 직후"}, {"id": "F0-61", "q": "mRNA 전구체의 3' 말단에 붙는 아데닌 꼬리는?", "a": "poly-A tail"}, {"id": "F0-62", "q": "poly-A tail의 대략적인 길이는?", "a": "약 50~250개 A"}, {"id": "F0-63", "q": "poly-A tail의 기능은?", "a": "mRNA 안정성 증가와 핵 밖 이동 및 번역 도움"}, {"id": "F0-64", "q": "번역되지 않지만 조절 기능을 하는 3' 말단 부위는?", "a": "3' UTR"}, {"id": "F0-65", "q": "인트론이란?", "a": "전사되지만 번역되지 않고 제거되는 구간"}, {"id": "F0-66", "q": "엑손이란?", "a": "최종 mRNA에 남아 번역 가능한 구간"}, {"id": "F0-67", "q": "인트론 제거와 엑손 연결 과정을 무엇이라 하는가?", "a": "스플라이싱"}, {"id": "F0-68", "q": "스플라이싱을 수행하는 복합체는?", "a": "스플라이소좀"}, {"id": "F0-69", "q": "스플라이소좀의 주요 구성 요소는?", "a": "단백질과 작은 RNA"}, {"id": "F0-70", "q": "스플라이싱 중 인트론이 빠져나갈 때 형성되는 고리 구조는?", "a": "라리아트"}, {"id": "F0-71", "q": "스플라이싱에서 인트론의 시작과 끝에 흔한 염기 서열은?", "a": "GU ... AG"}, {"id": "F0-72", "q": "잘려 나간 인트론이 빠르게 분해되는 이유는?", "a": "캡과 tail이 없어 보호되지 않기 때문"}, {"id": "F0-73", "q": "선택적 RNA 스플라이싱이란?", "a": "하나의 유전자에서 엑손 조합을 달리해 여러 폴리펩타이드를 만드는 현상"}, {"id": "F0-74", "q": "선택적 스플라이싱의 결과는?", "a": "유전자 수보다 훨씬 다양한 단백질 생성"}, {"id": "F0-75", "q": "사람이 적은 유전자 수로도 복잡한 이유 중 하나는?", "a": "선택적 스플라이싱"}, {"id": "F0-76", "q": "엑손 셔플링이란?", "a": "엑손 조합의 재배열을 통해 새로운 단백질 조합이 생기는 것"}, {"id": "F0-77", "q": "엑손 셔플링이 진화에 유리한 이유는?", "a": "새로운 도메인 조합 단백질 출현 가능성을 높이기 때문"}, {"id": "F0-78", "q": "인트론이 엑손 셔플링·진화를 촉진하는 구조적 이유는?", "a": "엑손(유전자 좌위) 사이 거리를 늘려 교차(재조합) 확률을 높이기 때문"}, {"id": "F0-79", "q": "도메인이란?", "a": "단백질 내에서 특정 기능을 담당하는 구조적 단위"}, {"id": "F0-80", "q": "RNA가 효소 기능을 가질 수 있는 구조적 이유는?", "a": "단일 가닥이라 복잡한 3차원 구조를 형성할 수 있기 때문"}, {"id": "F0-81", "q": "RNA가 DNA보다 리보자임에 더 적합한 이유는?", "a": "단일 가닥이라 더 자유롭게 접힐 수 있기 때문"}, {"id": "F0-82", "q": "리보자임의 존재가 시사하는 진화적 가설은?", "a": "RNA가 단백질보다 먼저 등장했을 가능성(RNA world)"}, {"id": "F0-83", "q": "핵에서 만들어진 진핵 mRNA가 번역 전에 꼭 해야 하는 일은?", "a": "핵공을 통해 세포질로 이동"}, {"id": "F0-84", "q": "cap과 tail의 공통 기능 3가지는?", "a": "핵 밖 이동, 분해 방지, 번역 도움"}, {"id": "F0-85", "q": "전구 mRNA에서 평균적인 암호화 구간보다 실제 유전자가 더 긴 이유는?", "a": "인트론이 많이 포함되기 때문"}, {"id": "F0-86", "q": "번역에서 mRNA의 역할은?", "a": "코돈 정보를 제공하는 주형"}, {"id": "F0-87", "q": "번역에서 아미노산을 리보솜으로 운반하는 RNA는?", "a": "tRNA"}, {"id": "F0-88", "q": "리보솜의 주요 구성 성분 두 가지는?", "a": "rRNA와 단백질"}, {"id": "F0-89", "q": "테트라사이클린·스트렙토마이신이 억제하는 것은?", "a": "세균 리보솜만 불활성화(진핵 리보솜에는 영향 X) — 선택적 독성"}, {"id": "F0-90", "q": "리보솜의 rRNA 분자 수는 세균과 진핵에서 각각 몇 개인가?", "a": "세균 3개, 진핵 4개"}, {"id": "F0-91", "q" a": "들어옴-펩타이드 보유-나감"}, {"id": "F0-173", "q": "원핵생물에서 RNA 중합효소가 프로모터를 인식하게 돕는 인자는?", "a": "σ(시그마) 인자 — RNA 중합효소에 결합해 프로모터를 인식하게 한다(진핵의 전사인자에 해당)"}, {"id": "F0-174", "q": "스플라이소좀을 구성하는 snRNP는 몇 종이며 무엇인가?", "a": "5종 — U1·U2·U4·U5·U6 (각 snRNP = snRNA + 단백질)"}, {"id": "F0-175", "q": "원핵과 진핵 mRNA의 시스트론 차이는?", "a": "원핵=폴리시스트론성(한 mRNA에 여러 유전자·오페론) / 진핵=모노시스트론성(한 mRNA에 한 유전자)"}, {"id": "F0-176", "q": "진핵 번역 개시에서 스캐닝하는 소단위체가 인식하는 개시 AUG 주변 최적 서열은?", "a": "코작(Kozak) 서열 — 샤인-달가노처럼 리보솜이 직접 결합하는 자리가 아니라, 스캐닝 중 인식되는 문맥 서열"}, {"id": "F0-177", "q": "펩타이드 결합을 실제로 촉매하는 성분과 에너지 소모 여부는?", "a": "큰 소단위체의 rRNA(리보자임=펩티딜 전이효소)가 촉매하며, ATP/GTP 같은 별도 에너지 소모는 없다(에너지는 이미 아미노아실-tRNA 결합에 저장)"}]}, {"label": "18 유전자 발현 조절", "cards": [{"id": "F1-0", "q": "세균이 효소 생산량을 조절하는 두 방법은?", "a": "효소 활성 조절과 유전자 발현 조절"}, {"id": "F1-1", "q": "오페론을 구성하는 핵심 DNA 요소 3가지는?", "a": "프로모터, 작동자, 구조유전자"}, {"id": "F1-2", "q": "오페론 바깥에서 억제단백질을 만드는 유전자는?", "a": "조절유전자"}, {"id": "F1-3", "q": "오페론에서 스위치 역할을 하는 DNA 부위는?", "a": "작동자"}, {"id": "F1-4", "q": "억제성 오페론의 대표 예시는?", "a": "trp 오페론"}, {"id": "F1-5", "q": "유도성 오페론의 대표 예시는?", "a": "lac 오페론"}, {"id": "F1-6", "q": "trp 오페론이 켜지는 조건은?", "a": "트립토판이 부족할 때"}, {"id": "F1-7", "q": "trp 오페론이 꺼지는 조건은?", "a": "트립토판이 충분할 때"}, {"id": "F1-8", "q": "트립토판은 trp 오페론에서 어떤 역할을 하는가?", "a": "보조억제자(corepressor)"}, {"id": "F1-9", "q": "trp 억제단백질은 트립토판이 없을 때 어떤 상태인가?", "a": "비활성 상태"}, {"id": "F1-10", "q": "trp 억제단백질은 트립토판이 있을 때 어떤 상태가 되는가?", "a": "활성화되어 작동자에 결합한다"}, {"id": "F1-11", "q": "trp 오페론이 동화 경로 조절의 예인 이유는?", "a": "최종산물인 트립토판이 충분하면 합성 효소 생산을 멈추기 때문"}, {"id": "F1-12", "q": "lac 오페론이 켜지는 첫 번째 조건은?", "a": "젖당이 존재해 억제자가 비활성화될 것"}, {"id": "F1-13", "q": "lac 오페론이 최대한 켜지는 두 번째 조건은?", "a": "포도당이 부족할 것"}, {"id": "F1-14", "q": "lac 오페론의 유도물질은?", "a": "알로락토오스"}, {"id": "F1-15", "q": "알로락토오스는 lac 오페론에서 어떤 역할을 하는가?", "a": "유도자(inducer)"}, {"id": "F1-16", "q": "lac 억제단백질은 젖당이 없을 때 어떤 상태인가?", "a": "활성 상태로 작동자에 결합한다"}, {"id": "F1-17", "q": "lac 억제단백질은 알로락토오스가 결합하면 어떻게 되는가?", "a": "비활성화되어 작동자에서 떨어진다"}, {"id": "F1-18", "q": "lacZ 유전자가 만드는 효소는?", "a": "β-갈락토시다아제"}, {"id": "F1-19", "q": "lacY 유전자가 만드는 단백질은?", "a": "퍼메이스(permease)"}, {"id": "F1-20", "q": "lacA 유전자가 만드는 효소는?", "a": "트랜스아세틸화효소"}, {"id": "F1-21", "q": "trp와 lac 오페론의 공통 조절 방식은?", "a": "둘 다 억제자에 의한 음성 조절을 받는다"}, {"id": "F1-22", "q": "양성 조절의 뜻은?", "a": "조절 단백질이 전사를 직접 촉진하는 것"}, {"id": "F1-23", "q": "lac 오페론의 양성 조절에 필요한 두 분자는?", "a": "cAMP와 CRP(CAP)"}, {"id": "F1-24", "q": "포도당 농도가 낮을 때 세포 내 cAMP 농도는?", "a": "높아진다"}, {"id": "F1-25", "q": "포도당 농도가 높을 때 세포 내 cAMP 농도는?", "a": "낮아진다"}, {"id": "F1-26", "q": "cAMP와 결합한 CRP의 역할은?", "a": "RNA 중합효소가 프로모터에 잘 결합하도록 도와 전사를 촉진한다"}, {"id": "F1-27", "q": "lac 오페론이 가장 강하게 발현되는 조건은?", "a": "젖당이 있고 포도당이 없을 때"}, {"id": "F1-28", "q": "젖당이 있어도 포도당이 많으면 lac 오페론 발현이 낮은 이유는?", "a": "cAMP-CRP가 형성되지 않아 양성 조절이 약하기 때문"}, {"id": "F1-29", "q": "젖당이 없고 포도당도 없으면 lac 오페론은 어떻게 되는가?", "a": "억제자가 작동자에 결합해 거의 발현되지 않는다"}, {"id": "F1-30", "q": "trp 오페론을 한 문장으로 요약하면?", "a": "최종산물인 트립토판이 충분하면 꺼지는 억제성 오페론"}, {"id": "F1-31", "q": "lac 오페론을 한 문장으로 요약하면?", "a": "젖당이 있을 때 켜지고 포도당이 없을 때 가장 강하게 켜지는 유도성 오페론"}, {"id": "F1-32", "q": "오페론이 세균에 유리한 이유는?", "a": "관련 효소들을 한꺼번에 조절해 에너지를 절약할 수 있기 때문"}, {"id": "F1-33", "q": "세균 조절에서 음성 조절과 양성 조절의 차이는?", "a": "음성 조절은 억제자가 전사를 막고, 양성 조절은 활성자가 전사를 촉진한다"}, {"id": "F1-34", "q": "trp 오페론에서 조절유전자는 왜 별도 유전자라 하는가?", "a": "별도의 프로모터를 가지고 오페론과 떨어져 있기 때문"}, {"id": "F1-35", "q": "오페론 개념이 가장 직접적으로 보여주는 것은?", "a": "세균은 환경에 따라 전사를 조절해 필요한 효소만 만든다는 것"}, {"id": "F1-36", "q": "포도당이 젖당보다 우선적으로 사용되는 현상과 관련된 조절은?", "a": "catabolite repression"}, {"id": "F1-37", "q": "lac operon에서 CRP의 다른 이름은?", "a": "CAP"}, {"id": "F1-38", "q": "cAMP-CRP 복합체는 어떤 DNA 부위에 작용하는가?", "a": "lac 프로모터 인근 조절 부위"}, {"id": "F1-39", "q": "조절유전자가 만드는 억제자는 단백질인가 DNA인가?", "a": "단백질"}, {"id": "F1-40", "q": "오페론의 구조유전자는 보통 몇 개인가?", "a": "여러 개일 수 있다"}, {"id": "F1-41", "q": "세균 오페론에서 만들어지는 mRNA의 특징은?", "a": "여러 구조유전자가 하나의 mRNA로 함께 전사됨 = 폴리시스트론 mRNA (진핵은 보통 유전자 1개당 mRNA 1개)"}, {"id": "F1-42", "q": "세균에서 효소 양 조절이 느리지만 에너지 절약에 유리한 방식은?", "a": "유전자 발현 조절"}, {"id": "F1-43", "q": "세균에서 이미 존재하는 효소를 즉시 조절하는 빠른 방식은?", "a": "효소 활성 조절"}, {"id": "F1-44", "q": "trp와 lac 오페론을 비교할 때 핵심 대비는?", "a": "합성 경로 억제성 대 분해 경로 유도성"}, {"id": "F1-45", "q": "진핵생물의 유전자 발현이 세균보다 복잡한 이유는?", "a": "전사 이전부터 번역 후까지 여러 단계에서 조절되기 때문"}, {"id": "F1-46", "q": "차등적 유전자 발현이란?", "a": "세포마다 같은 DNA를 가지면서도 다른 유전자 집합을 발현하는 것"}, {"id": "F1-47", "q": "대부분의 세포에서 공통적으로 발현되는 유전자는?", "a": "하우스키핑 유전자"}, {"id": "F1-48", "q": "인간 세포는 보유 유전자 중 얼마나 발현하며 그중 공통 발현 비율은?", "a": "약 1/3~1/2을 발현 / 그중 약 35%가 housekeeping 유전자"}, {"id": "F1-49", "q": "차등적 유전자 발현이 중요한 이유는?", "a": "다양한 세포 유형과 기능을 가능하게 하기 때문"}, {"id": "F1-50", "q": "염색질이 덜 응축되어 전사에 유리한 상태는?", "a": "진정염색질"}, {"id": "F1-51", "q": "염색질이 강하게 응축되어 전사에 불리한 상태는?", "a": "이질염색질"}, {"id": "F1-52", "q": "뉴클레오솜은 무엇으로 이루어지는가?", "a": "DNA와 히스톤 단백질"}, {"id": "F1-53", "q": "히스톤 꼬리(histone tail)란?", "a": "뉴클레오솜 밖으로 돌출된 히스톤 N말단 영역"}, {"id": "F1-54", "q": "히스톤 꼬리에 일어나는 대표 화학적 변형 3가지는?", "a": "아세틸화, 메틸화, 인산화"}, {"id": "F1-55", "q": "히스톤 아세틸화의 일반적 효과는?", "a": "염색질을 느슨하게 하여 전사를 촉진한다"}, {"id": "F1-56", "q": "DNA 메틸화의 일반적 효과는?", "a": "전사를 억제한다"}, {"id": "F1-57", "q": "히스톤 아세틸화가 전사를 촉진하는 이유를 구조적으로 설명하면?", "a": "뉴클레오솜 사이 결합을 약화시켜 DNA 접근성을 높이기 때문"}, {"id": "F1-58", "q": "DNA 메틸화가 세포분열 후에도 유지될 수 있는 현상은?", "a": "후성유전"}, {"id": "F1-59", "q": "유전체 각인(genomic imprinting)이란?", "a": "모계 또는 부계 대립유전자 중 한쪽의 발현이 선택적으로 조절되는 현상"}, {"id": "F1-60", "q": "삼색(calico) 고양이 무늬가 생기는 후성유전적 기전은?", "a": "암컷 두 X 중 하나가 발생 중 메틸화로 불활성화(X 불활성화)되어 부위별로 다른 X가 발현되기 때문"}, {"id": "F1-61", "q": "후성유전이란?", "a": "DNA 염기서열 변화 없이 발현 양상이 세포 세대에 걸쳐 유지되는 현상"}, {"id": "F1-62", "q": "원거리 조절 요소의 대표 두 종류는?", "a": "인핸서와 사일렌서"}, {"id": "F1-63", "q": "근거리 조절 요소는 주로 무엇과 관련되는가?", "a": "전사인자 결합"}, {"id": "F1-64", "q": "보편전사인자란?", "a": "대부분의 유전자 전사에 공통으로 필요한 단백질"}, {"id": "F1-65", "q": "보편전사인자 중 일부가 직접 결합하는 대표 서열은?", "a": "TATA box"}, {"id": "F1-66", "q": "인핸서는 유전자에서 가까이에만 존재하는가?", "a": "아니오, 수천 뉴클레오타이드 떨어져 있거나 인트론 안에도 있을 수 있다"}, {"id": "F1-67", "q": "활성자(activator)란?", "a": "인핸서에 결합해 전사를 촉진하는 조절 단백질"}, {"id": "F1-68", "q": "억제자(repressor)란?", "a": "전사를 억제하는 조절 단백질"}, {"id": "F1-69", "q": "DNA 굽힘 단백질의 역할은?", "a": "인핸서 부위와 프로모터 부위를 물리적으로 가깝게 만든다"}, {"id": "F1-70", "q": "매개자 단백질군(mediator complex)의 역할은?", "a": "활성자와 전사 개시 복합체를 연결한다"}, {"id": "F1-71", "q": "RNA 중합효소 II가 효율적으로 작동하려면 무엇이 모여야 하는가?", "a": "전사 개시복합체"}, {"id": "F1-72", "q": "인핸서를 통한 전사 활성화 과정을 순서대로 쓰면?", "a": "활성자가 인핸서에 결합 → DNA 굽힘 → 매개자·보편전사인자·RNA 중합효소 II 모집 → 전사 개시"}, {"id": "F1-73", "q": "하나의 유전자는 하나의 인핸서만 갖는가?", "a": "아니오, 여러 인핸서를 가질 수 있다"}, {"id": "F1-74", "q": "여러 인핸서를 가질 수 있다는 말의 의미는?", "a": "유전자가 서로 다른 세포나 시기에 다르게 조절될 수 있다는 뜻"}, {"id": "F1-75", "q": "진핵 전사 조절에서 조합적 조절(combinatorial control)이란?", "a": "여러 조절 단백질 조합에 의해 발현이 결정되는 것"}, {"id": "F1-76", "q": "간세포에서 주로 발현되는 대표 유전자는?", "a": "알부민 유전자"}, {"id": "F1-77", "q": "수정체 세포에서 주로 발현되는 대표 유전자는?", "a": "크리스탈린 유전자"}, {"id": "F1-78", "q": "간세포와 수정체세포가 같은 DNA를 가져도 다른 단백질을 만드는 이유는?", "a": "세포 유형별로 다른 조절 단백질이 활성화되기 때문"}, {"id": "F1-79", "q": "진핵 유전자의 구조 요소를 순서대로 쓰면?", "a": "인핸서·조절요소, 프로모터, 엑손·인트론, poly-A 신호, 전사 종결 부위"}, {"id": "F1-80", "q": "전사 직후의 1차 전사물(가공 전)을 무엇이라 하는가?", "a": "pre-mRNA(전구 mRNA)"}, {"id": "F1-81", "q": "진핵 mRNA 가공의 세 단계는?", "a": "5' cap 첨가, poly-A 꼬리 첨가, 스플라이싱"}, {"id": "F1-82", "q": "성숙한 mRNA의 주요 구성 요소 6가지는?", "a": "5' cap, 5' UTR, 시작 코돈, 종결 코돈, 3' UTR, poly-A tail"}, {"id": "F1-83", "q": "비번역부위 UTR의 역할 한 가지는?", "a": "번역 개시나 mRNA 안정성 조절"}, {"id": "F1-84", "q": "번역 조절은 주로 어느 단계에서 일어나는가?", "a": "번역 개시 단계"}, {"id": "F1-85", "q": "mRNA 번역 개시를 막을 수 있는 대표 방법은?", "a": "UTR에 결합하는 조절 단백질이 리보솜 결합을 방해하는 것"}, {"id": "F1-86", "q": "mRNA의 세포질 내 수명을 좌우하는 데 중요한 부위는?", "a": "3' UTR"}, {"id": "F1-87", "q": "mRNA 분해가 중요한 이유는?", "a": "단백질 합성량을 조절하기 때문"}, {"id": "F1-88", "q": "번역 후 조절의 예 두 가지는?", "a": "특정 펩타이드 제거에 의한 활성화와 단백질 분해"}, {"id": "F1-89", "q": "프로인슐린과 펩시노겐이 보여주는 것은?", "a": "번역 후 가공이 단백질 활성에 중요하다는 점"}, {"id": "F1-90", "q": "유비퀴틴의 역할은?", "a": "분해할 단백질에 표지를 붙인다"}, {"id": "F1-91", "q": "프로테아좀의 역할은?", "a": "유비퀴틴 표지된 단백질을 분해한다"}, {"id": "F1-92", "q": "사이클린 단백질이 이 단원에서 중요한 이유는?", "a": "단백질 수명이 엄격히 조절되는 예이기 때문"}, {"id": "F1-93", "q": "진핵 유전자 발현 조절 단계를 큰 순서로 쓰면?", "a": "염색질 구조, 전사, RNA 가공, 번역, 단백질 가공·분해"}, {"id": "F1-94", "q": "염색질 수준 조절과 전사 개시 조절의 차이는?", "a": "전자는 DNA 접근성 자체를, 후자는 전사 기계 모집을 조절한다"}, {"id": "F1-95", "q": "진핵생물에서 전사가 일어나도 단백질이 안 만들어질 수 있는 단계 두 곳은?", "a": "RNA 가공 단계와 번역 개시 단계"}, {"id": "F1-96", "q": "인핸서가 멀리 떨어져도 작동할 수 있는 직접 이유는?", "a": "DNA 굽힘으로 프로모터와 가까워질 수 있기 때문"}, {"id": "F1-97", "q": "활성자와 보편전사인자의 차이는?", "a": "활성자는 특정 유전자·세포에서 조절하고 보편전사인자는 대부분의 유전자 전사에 공통 필요하다"}, {"id": "F1-98", "q": "사일렌서의 역할은?", "a": "전사를 억제하는 DNA 조절 서열"}, {"id": "F1-99", "q": "후성유전과 일반 전사 조절의 차이를 한 문장으로?", "a": "후성유전은 발현 상태가 세포 세대에 걸쳐 유지되기 쉽다"}, {"id": "F1-100", "q": "비번역 RNA(ncRNA)란?", "a": "단백질로 번역되지 않으면서 기능을 하는 RNA"}, {"id": "F1-101", "q": "예전의 junk DNA 개념이 수정된 이유는?", "a": "일부 비번역 영역이 조절성 ncRNA를 만든다는 사실이 밝혀졌기 때문"}, {"id": "F1-102", "q": "miRNA와 siRNA의 공통점은?", "a": "mRNA 발현을 억제한다"}, {"id": "F1-103", "q": "miRNA의 길이는 대략 얼마인가?", "a": "약 22개 뉴클레오타이드"}, {"id": "F1-104", "q": "miRNA는 어떻게 만들어지는가?", "a": "긴 RNA 전구체가 효소에 의해 가공되어 형성된다"}, {"id": "F1-105", "q": "miRNA는 단독으로 작용하는가?", "a": "아니오, 단백질과 복합체를 이룬다"}, {"id": "F1-106", "q": "miRNA가 표적 mRNA에 결합하려면 최소 몇 개의 상보적 염기쌍이 필요한가?", "a": "최소 7개"}, {"id": "F1-107", "q": "miRNA와 표적 mRNA가 완전히 일치하면 어떤 일이 일어나는가?", "a": "mRNA 분해"}, {"id": "F1-108", "q": "miRNA와 표적 mRNA가 불완전히 일치하면 어떤 일이 일어나는가?", "a": "번역 억제"}, {"id": "F1-109", "q": "miRNA가 단백질과 이루는 복합체를 일반적으로 무엇이라 부르는가?", "a": "miRNA-단백질 복합체"}, {"id": "F1-110", "q": "siRNA의 작용이 특히 RNAi라 불리는 이유는?", "a": "표적 RNA를 직접 분해하거나 억제하는 간섭 현상과 연결되기 때문"}, {"id": "F1-111", "q": "siRNA가 진화적으로 바이러스 방어와 관련 있다고 보는 이유는?", "a": "외래 RNA를 분해하는 기작으로 작동할 수 있기 때문"}, {"id": "F1-112", "q": "miRNA와 siRNA의 차이 한 가지는?", "a": "miRNA는 주로 세포 자체 전구체에서, siRNA는 긴 이중가닥 RNA 등에서 유래한다"}, {"id": "F1-113", "q": "miRNA가 유전자 발현 조절에서 중요한 이유는?", "a": "전사 후 단계에서 mRNA의 수명과 번역을 조절하기 때문"}, {"id": "F1-114", "q": "ncRNA가 중요한 생물학적 메시지는?", "a": "단백질로 번역되지 않아도 기능적으로 매우 중요할 수 있다는 것"}, {"id": "F1-115", "q": "miRNA는 전사 조절 RNA인가 번역 후 조절 RNA인가?", "a": "주로 전사 후 조절 RNA"}, {"id": "F1-116", "q": "siRNA가 자가세포 유전자 발현도 억제할 수 있다는 말의 의미는?", "a": "바이러스 방어 외에도 정상 유전자 조절에 관여할 수 있다는 뜻"}, {"id": "F1-117", "q": "miRNA는 표적 mRNA에 완전 일치해야만 작동하는가?", "a": "아니오, 불완전 일치로도 번역 억제가 가능하다"}, {"id": "F1-118", "q": "다세포 생물에서 여러 세포 유형이 만들어지는 핵심 원리는?", "a": "차등적 유전자 발현"}, {"id": "F1-119", "q": "호메오 유전자(homeotic gene)란?", "a": "몸의 특정 부위 정체성과 발생 패턴을 조절하는 유전자"}, {"id": "F1-120", "q": "루이스가 초파리 연구로 발견한 핵심은?", "a": "호메오 유전자가 발생 패턴을 조절한다는 것"}, {"id": "F1-121", "q": "초파리 몸의 다른 부위에 다리나 날개가 생기는 돌연변이가 시사하는 바는?", "a": "특정 유전자가 체절 정체성을 결정한다는 것"}, {"id": "F1-122", "q": "발생 중 열성 돌연변이를 관찰하기 위해 이형접합 초파리를 교배한 이유는?", "a": "배아 치사를 피하면서 열성 표현형을 확인하기 위해"}, {"id": "F1-123", "q": "차등적 유전자 발현이 줄기세포와 연결되는 이유는?", "a": "같은 유전체를 가진 세포가 다른 발현 패턴으로 다른 세포 유형이 되기 때문"}, {"id": "F1-124", "q": "배아줄기세포가 여러 기관 세포로 분화할 수 있는 이유는?", "a": "발현되는 유전자 조합이 점차 달라지기 때문"}, {"id": "F1-125", "q": "성체줄기세포가 제한된 세포로만 분화하는 이유는?", "a": "이미 일부 유전자 발현 프로그램이 고정되었기 때문"}, {"id": "F1-126", "q": "성체줄기세포의 대표 위치와 분화 범위 예시는?", "a": "골수에 존재 — 혈구(적혈구·백혈구·혈소판·림프구 등)로만 분화"}, {"id": "F1-127", "q": "암의 기본 원인은?", "a": "세포 주기와 성장 조절 유전자의 돌연변이 축적"}, {"id": "F1-128", "q": "원종양유전자(proto-oncogene)란?", "a": "정상적으로 세포 성장과 분열을 돕는 유전자"}, {"id": "F1-129", "q": "암유전자(oncogene)란?", "a": "과활성화되어 암을 유발할 수 있는 변이 원종양유전자"}, {"id": "F1-130", "q": "종양억제유전자(tumor suppressor gene)란?", "a": "세포 분열을 억제하거나 DNA 손상을 감시해 암을 막는 유전자"}, {"id": "F1-131", "q": "원종양유전자가 암유전자가 되는 방법 3가지는?", "a": "이동, 증폭, 점돌연변이"}, {"id": "F1-132", "q": "Ras 유전자는 어떤 범주의 대표 예시인가?", "a": "원종양유전자 또는 암유전자"}, {"id": "F1-133", "q": "Ras 단백질의 정상 역할은?", "a": "성장 신호 전달"}, {"id": "F1-134", "q": "돌연변이 Ras가 암을 유발하는 이유는?", "a": "성장 신호가 없어도 계속 활성 상태를 유지할 수 있기 때문"}, {"id": "F1-135", "q": "p53은 어떤 범주의 대표 예시인가?", "a": "종양억제유전자"}, {"id": "F1-136", "q": "p53이 게놈의 수호자라 불리는 이유는?", "a": "DNA 손상을 감지해 세포 주기 정지나 세포 자살을 유도하기 때문"}, {"id": "F1-137", "q": "p53이 활성화하는 대표적 세포주기 억제 단백질은?", "a": "p21"}, {"id": "F1-138", "q": "p21의 역할은?", "a": "CDK를 억제해 세포 주기를 멈춘다"}, {"id": "F1-139", "q": "DNA 손상이 회복 불가능할 때 p53이 유도할 수 있는 것은?", "a": "세포 자살"}, {"id": "F1-140", "q": "암 발생의 다단계 모델이 뜻하는 것은?", "a": "여러 돌연변이가 축적되어야 암이 형성된다는 것"}, {"id": "F1-141", "q": "상피세포의 비정상적 과증식으로 생긴 초기 덩어리는?", "a": "폴립 또는 선종"}, {"id": "F1-142", "q": "유전성 암이 위험한 이유는?", "a": "이미 한 단계의 돌연변이를 지닌 채 태어나기 때문"}, {"id": "F1-143", "q": "BRCA1과 BRCA2는 어떤 범주의 유전자인가?", "a": "DNA 수복 관련 종양억제유전자"}, {"id": "F1-144", "q": "HPV가 암을 일으킬 수 있는 이유는?", "a": "종양억제 단백질 기능을 방해할 수 있기 때문"}, {"id": "F1-145", "q": "암과 유전자 발현 조절이 연결되는 이유는?", "a": "성장·분열·수복 유전자의 조절이 무너지기 때문"}, {"id": "F1-146", "q": "후성유전 변화도 암에 기여할 수 있는 이유는?", "a": "종양억제유전자 발현을 메틸화 등으로 억제할 수 있기 때문"}, {"id": "F1-147", "q": "이 단원에서 오페론과 진핵 조절의 가장 큰 차이는?", "a": "세균은 주로 전사 수준의 단순 조절, 진핵은 여러 단계의 다층 조절을 한다"}, {"id": "F1-148", "q": "trp 오페론에서 억제자가 작동자에 붙으면 직접 막히는 것은?", "a": "구조유전자의 전사"}, {"id": "F1-149", "q": "lac 오페론에서 알로락토오스가 없으면 억제자는 어디에 결합하는가?", "a": "작동자"}, {"id": "F1-150", "q": "lac 오페론에서 포도당이 낮을 때 cAMP가 늘어나는 이유를 한 문장으로?", "a": "세포가 대체 당원 사용을 촉진하도록 신호하기 때문"}, {"id": "F1-151", "q": "trp 오페론과 lac 오페론의 공통점 한 가지는?", "a": "둘 다 조절유전자 산물이 작동자 부근에서 전사를 조절한다"}, {"id": "F1-152", "q": "trp 오페론과 lac 오페론의 차이 한 가지는?", "a": "trp는 최종산물이 corepressor, lac은 기질 유도자가 repressor를 비활성화한다"}, {"id": "F1-153", "q": "뉴클레오솜의 구조를 정확히 쓰면?", "a": "DNA가 히스톤 8량체(팔량체)를 감싼 구조"}, {"id": "F1-154", "q": "miRNA가 번역 억제를 일으키는 상황은?", "a": "표적 mRNA와 불완전 상보 결합할 때"}, {"id": "F1-155", "q": "miRNA가 mRNA 분해를 일으키는 상황은?", "a": "표적 mRNA와 완전 또는 매우 높은 상보 결합할 때"}, {"id": "F1-156", "q": "housekeeping 유전자란?", "a": "대부분의 세포에서 기본 생명 유지 기능을 위해 발현되는 유전자"}, {"id": "F1-157", "q": "조직 특이적 유전자란?", "a": "특정 세포 유형의 고유 기능을 가능하게 하는 유전자"}, {"id": "F1-158", "q": "DNA 메틸화가 발생 과정에서 중요한 이유는?", "a": "특정 조직에서 특정 유전자 발현 패턴을 안정적으로 유지할 수 있기 때문"}, {"id": "F1-159", "q": "산모의 엽산 섭취가 후성유전에 영향을 줄 수 있는 이유는?", "a": "메틸기 공급을 통해 DNA 메틸화 수준에 영향을 줄 수 있기 때문"}, {"id": "F1-160", "q": "부모의 DNA 메틸화 양상이 배우자 형성 때 대부분 제거되는 이유는?", "a": "배아 발생에서 새 발현 프로그램을 재설정하기 위해"}, {"id": "F1-161", "q": "보편전사인자가 없으면 어떤 문제가 생기는가?", "a": "RNA 중합효소 II가 많은 유전자의 전사를 제대로 시작하지 못한다"}, {"id": "F1-162", "q": "활성자와 억제자가 같은 유전자에 동시에 영향을 줄 수 있는가?", "a": "예"}, {"id": "F1-163", "q": "한 유전자가 여러 인핸서를 가지는 생물학적 이점은?", "a": "상황과 세포 유형에 따라 정교하게 발현을 조절할 수 있다"}, {"id": "F1-164", "q": "번역 개시 조절이 효율적인 이유는?", "a": "단백질 합성의 가장 초기에 자원 낭비를 막을 수 있기 때문"}, {"id": "F1-165", "q": "mRNA 수명이 짧아지면 단백질 양은 일반적으로 어떻게 되는가?", "a": "감소한다"}, {"id": "F1-166", "q": "유비퀴틴-프로테아좀 경로가 중요한 이유는?", "a": "이미 합성된 단백질의 양과 수명을 신속히 조절할 수 있기 때문"}, {"id": "F1-167", "q": "사이클린이 축적과 분해를 반복해야 하는 이유는?", "a": "세포 주기를 단계적으로 진행시키기 위해"}, {"id": "F1-168", "q": "원종양유전자와 종양억제유전자의 기능 차이는?", "a": "전자는 성장 촉진, 후자는 성장 억제·손상 감시"}, {"id": "F1-169", "q": "암유전자는 보통 유전학적으로 우성처럼 행동하는 이유는?", "a": "한 대립유전자 과활성화만으로도 효과가 나타날 수 있기 때문"}, {"id": "F1-170", "q": "종양억제유전자는 보통 열성처럼 행동하는 이유는?", "a": "기능 상실이 두 대립유전자 모두에서 일어나야 하는 경우가 많기 때문"}, {"id": "F1-171", "q": "Ras와 p53을 비교하면?", "a": "Ras는 성장 촉진 측, p53은 성장 억제·손상 감시 측이다"}, {"id": "F1-172", "q": "BRCA 유전자가 고장 나면 특히 문제가 되는 것은?", "a": "DNA 손상 수복"}, {"id": "F1-173", "q": "후성유전 변화가 돌연변이 없이도 암 관련 유전자에 영향을 주는 이유는?", "a": "메틸화 등으로 발현을 켜고 끌 수 있기 때문"}, {"id": "F1-174", "q": "호메오 유전자의 돌연변이가 발생에 치명적인 이유는?", "a": "몸 부위의 정체성과 배치를 바꿔 심각한 형태 이상을 유발하기 때문"}, {"id": "F1-175", "q": "차등적 유전자 발현이 없다면 다세포 생물에서 어떤 문제가 생기는가?", "a": "모든 세포가 비슷해져 조직과 기관 분화가 불가능해진다"}, {"id": "F1-176", "q": "trp 오페론의 약화(attenuation)란?", "a": "억제와 별개의 2차 조절 — 트립토판이 충분하면 리보솜이 선도(leader) 서열을 빠르게 번역해 3-4 종결 헤어핀이 형성돼 전사가 조기 종결되고, 부족하면 리보솜이 멈춰 2-3 항종결 헤어핀이 형성돼 전사가 계속된다"}, {"id": "F1-177", "q": "Hox(호메오틱) 유전자의 핵심 특징 두 가지는?", "a": "① 체절(몸 부위)의 정체성을 결정 ② 염색체상 유전자 배열 순서가 몸의 앞-뒤 축과 일치(동일선상성, colinearity) — 이들은 공통 DNA 서열인 호메오박스(homeobox)를 가진다"}, {"id": "F1-178", "q": "초파리 비코이드(bicoid) 유전자의 역할은?", "a": "모체효과(maternal effect) 유전자 — 난자에 mRNA가 미리 저장되어 농도 구배(형태형성인자, morphogen)를 만들고, 이 구배가 배아의 앞(전방) 구조를 결정한다"}]}]}, {"id": "G", "name": "동물의 몸·내분비·소화", "chapters": [{"label": "40·41 동물의 몸·내분비", "cards": [{"id": "G0-0", "q": "포유동물의 소화계 주요 기관은?", "a": "입, 인두, 식도, 위, 소장, 간, 이자, 항문"}, {"id": "G0-1", "q": "포유동물의 순환계 구성요소 3가지는?", "a": "심장, 혈관, 혈액"}, {"id": "G0-2", "q": "포유동물의 호흡계 주요 구성은?", "a": "허파, 기관 및 호흡관"}, {"id": "G0-3", "q": "면역계와 림프계의 대표 기관은?", "a": "골수, 림프절, 흉선, 비장, 림프관"}, {"id": "G0-4", "q": "배설계의 주요 기관은?", "a": "신장, 요관, 방광, 요도"}, {"id": "G0-5", "q": "내분비계의 대표 기관은?", "a": "뇌하수체, 갑상샘, 이자, 부신 등"}, {"id": "G0-6", "q": "생식계의 대표 기관은?", "a": "난소, 정소 및 관련 기관"}, {"id": "G0-7", "q": "신경계의 대표 구성은?", "a": "뇌, 척수, 신경, 감각기관"}, {"id": "G0-8", "q": "피부계는 무엇으로 이루어지는가?", "a": "피부와 그 유도체"}, {"id": "G0-9", "q": "골격계는 무엇으로 이루어지는가?", "a": "뼈, 인대, 힘줄, 연골"}, {"id": "G0-10", "q": "근육계의 대표 구성은?", "a": "골격근"}, {"id": "G0-11", "q": "기관계 수준 통합이 중요한 이유는?", "a": "개별 기관계가 서로 협력해 생존과 항상성을 유지하기 때문이다"}, {"id": "G0-12", "q": "인간에서 소화계·호흡계·순환계의 교환 표면적이 피부보다 큰 생리적 의미는?", "a": "물질 교환 효율을 크게 높인다는 뜻이다"}, {"id": "G0-13", "q": "세포사이액(interstitial fluid)의 역할은?", "a": "교환 표면과 체세포를 연결한다"}, {"id": "G0-14", "q": "세포사이액과 순환계액의 교환이 중요한 이유는?", "a": "영양 공급과 노폐물 제거를 가능하게 하기 때문이다"}, {"id": "G0-15", "q": "동물에서 조절과 통합의 핵심 두 시스템은?", "a": "내분비계와 신경계"}, {"id": "G0-16", "q": "중층편평상피의 특징은?", "a": "다층이며 빠르게 재생되고 마찰에 강하다"}, {"id": "G0-17", "q": "중층편평상피가 잘 발견되는 곳은?", "a": "피부 바깥층, 입, 항문, 질 내벽"}, {"id": "G0-18", "q": "입방상피의 특징은?", "a": "분비에 특수화된 큐브형 세포로 이루어진다"}, {"id": "G0-19", "q": "입방상피가 잘 발견되는 곳은?", "a": "신장세관, 갑상샘, 침샘 등"}, {"id": "G0-20", "q": "단층원주상피의 특징은?", "a": "흡수와 분비에 유리한 큰 기둥 모양 세포로 구성된다"}, {"id": "G0-21", "q": "단층원주상피가 잘 발견되는 곳은?", "a": "소장 내강"}, {"id": "G0-22", "q": "단층편평상피의 특징은?", "a": "얇아서 확산에 의한 물질교환에 유리하다"}, {"id": "G0-23", "q": "단층편평상피가 잘 발견되는 곳은?", "a": "폐포, 혈관벽"}, {"id": "G0-24", "q": "거짓중층원주상피의 특징은?", "a": "호흡관 점막을 이루며 섬모로 점액을 이동시킨다"}, {"id": "G0-25", "q": "상피조직의 공통적 특징 중 하나는?", "a": "극성이 있다"}, {"id": "G0-26", "q": "성긴결합조직의 기능은?", "a": "상피를 아래 조직에 연결하고 기관을 제자리에 고정한다"}, {"id": "G0-27", "q": "섬유성결합조직의 대표 예 2가지는?", "a": "힘줄과 인대"}, {"id": "G0-28", "q": "힘줄(tendon)의 연결은?", "a": "근육과 뼈"}, {"id": "G0-29", "q": "인대(ligament)의 연결은?", "a": "뼈와 뼈"}, {"id": "G0-30", "q": "뼈가 결합조직인 이유는?", "a": "광물화된 세포외기질을 가진 결합조직이기 때문이다"}, {"id": "G0-31", "q": "조골세포와 파골세포의 역할은?", "a": "조골세포는 뼈를 만들고, 파골세포는 뼈를 분해한다"}, {"id": "G0-32", "q": "골단위(osteon)의 중심 구조는?", "a": "중심관(central canal)"}, {"id": "G0-33", "q": "지방조직은 어떤 결합조직의 특수형인가?", "a": "성긴결합조직"}, {"id": "G0-34", "q": "연골세포(chondrocyte)가 분비하는 대표 성분은?", "a": "콜라겐과 콘드로이틴황산염"}, {"id": "G0-35", "q": "혈액이 결합조직으로 분류되는 이유는?", "a": "세포와 액체성 기질(혈장)을 가진 조직이기 때문이다"}, {"id": "G0-36", "q": "골격근의 별칭 두 가지는?", "a": "가로무늬근, 수의근"}, {"id": "G0-37", "q": "골격근 세포가 다핵성인 이유는?", "a": "발생 과정에서 여러 세포가 융합해 형성되기 때문이다"}, {"id": "G0-38", "q": "근절(sarcomere)이 중요한 이유는?", "a": "골격근의 줄무늬와 수축 단위의 기초이기 때문이다"}, {"id": "G0-39", "q": "성체에서 근육 발달의 기본 방식은?", "a": "세포 수 증가보다 기존 세포 비대가 중심이다"}, {"id": "G0-40", "q": "평활근의 특징은?", "a": "불수의적이며 소화관·방광·동맥 벽 등에 존재한다"}, {"id": "G0-41", "q": "평활근의 대표 기능은?", "a": "위장운동과 혈관 수축"}, {"id": "G0-42", "q": "심장근의 특징 두 가지는?", "a": "줄무늬가 있고 불수의적이다"}, {"id": "G0-43", "q": "심장근의 개재판(intercalated disc)이 중요한 이유는?", "a": "세포 간 신호 전달로 규칙적인 수축을 가능하게 하기 때문이다"}, {"id": "G0-44", "q": "뉴런의 기본 구조 3가지는?", "a": "수상돌기, 세포체, 축삭"}, {"id": "G0-45", "q": "시냅스에서 신호 전달 방향은?", "a": "기본적으로 일방향"}, {"id": "G0-46", "q": "신경아교세포의 대표 기능 3가지는?", "a": "영양 공급, 절연, 뉴런 기능 보조"}, {"id": "G0-47", "q": "신경신호와 호르몬신호의 차이는?", "a": "신경신호는 빠르고 짧고, 호르몬신호는 느리지만 오래간다"}, {"id": "G0-48", "q": "신경신호가 반드시 전기신호만은 아닌 이유는?", "a": "시냅스에서는 화학적 신호전달이 일어나기 때문이다"}, {"id": "G0-49", "q": "문제에서 '줄무늬는 있지만 불수의적'이면 어떤 근육인가?", "a": "심장근"}, {"id": "G0-50", "q": "문제에서 '다핵성, 수의적, 근절'이 같이 나오면 어떤 근육인가?", "a": "골격근"}, {"id": "G0-51", "q": "문제에서 '개재판'이 나오면 어떤 조직을 떠올려야 하는가?", "a": "심장근"}, {"id": "G0-52", "q": "문제에서 '섬모가 점액을 이동'이 나오면 어떤 상피를 떠올려야 하는가?", "a": "거짓중층원주상피"}, {"id": "G0-53", "q": "문제에서 '가장 얇아 확산에 유리'가 나오면 어떤 상피를 떠올려야 하는가?", "a": "단층편평상피"}, {"id": "G0-54", "q": "문제에서 '분비선 상피'가 나오면 가장 먼저 떠올릴 상피는?", "a": "입방상피"}, {"id": "G0-55", "q": "문제에서 '소장 흡수 표면'이 나오면 가장 먼저 떠올릴 상피는?", "a": "단층원주상피"}, {"id": "G0-56", "q": "체온조절의 정의는?", "a": "내부 온도를 정상 범위 내에서 유지하는 과정"}, {"id": "G0-57", "q": "정상 범위를 벗어난 체온이 위험한 이유 3가지는?", "a": "효소 반응 효율 저하, 세포막 유동성 변화, 온도 민감 과정 이상"}, {"id": "G0-58", "q": "내온동물(endotherm)이란?", "a": "대사열에 크게 의존해 체온을 유지하는 동물"}, {"id": "G0-59", "q": "외온동물(ectotherm)이란?", "a": "외부 환경 열원에 크게 의존하는 동물"}, {"id": "G0-60", "q": "내온/외온과 항온/변온은 같은 개념인가?", "a": "아니오, 서로 독립적이다"}, {"id": "G0-61", "q": "열 손실/획득 방식 4가지는?", "a": "복사, 증발, 대류, 전도"}, {"id": "G0-62", "q": "복사(radiation)란?", "a": "절대영도보다 높은 물체가 전자기파 형태로 열을 주고받는 것"}, {"id": "G0-63", "q": "증발(evaporation)이 체온을 낮추는 이유는?", "a": "액체가 기체가 되며 많은 열을 흡수하기 때문이다"}, {"id": "G0-64", "q": "대류(convection)란?", "a": "표면을 지나는 공기나 액체의 흐름에 의한 열 이동"}, {"id": "G0-65", "q": "전도(conduction)란?", "a": "접촉한 물체 사이 분자 충돌에 의한 열 전달"}, {"id": "G0-66", "q": "혈류 조절이 체온조절에 중요한 이유는?", "a": "피부와 몸속 사이 열 이동량을 조절할 수 있기 때문이다"}, {"id": "G0-67", "q": "vasodilation의 체온조절 효과는?", "a": "피부 혈류를 늘려 열 방출을 증가시킨다"}, {"id": "G0-68", "q": "역류교환(countercurrent exchange)의 장점은?", "a": "열 손실을 줄이면서 열 교환 효율을 높인다"}, {"id": "G0-69", "q": "역류교환에서 효율이 큰 이유는?", "a": "반대 방향 흐름 전 길이에 걸쳐 지속적으로 열 교환이 일어나기 때문이다"}, {"id": "G0-70", "q": "땀샘의 냉각 원리는?", "a": "증발 냉각"}, {"id": "G0-71", "q": "내온동물이 열 손실을 보상해야 하는 이유는?", "a": "환경보다 높은 체온을 유지하기 때문이다"}, {"id": "G0-72", "q": "UCP(탈결합단백질)의 열생산 원리는?", "a": "H⁺가 ATP synthase를 거치지 않고 다시 내막을 통과하게 해 열을 만든다"}, {"id": "G0-73", "q": "갈색지방의 생리적 의의는?", "a": "빠른 비떨림 열발생(non-shivering thermogenesis)에 특화된다"}, {"id": "G0-74", "q": "기초대사율(BMR)은 누구에게 쓰는가?", "a": "쉬고 있고 공복이며 스트레스 없고 성장하지 않는 내온동물"}, {"id": "G0-75", "q": "표준대사율(SMR)은 누구에게 쓰는가?", "a": "특정 온도에서 쉬고 있고 공복이며 스트레스 없는 외온동물"}, {"id": "G0-76", "q": "휴면(torpor)이란?", "a": "활동과 대사가 감소된 단기적 생리 상태"}, {"id": "G0-77", "q": "동면(hibernation)이란?", "a": "추위와 음식 부족에 대한 장기간의 휴면"}, {"id": "G0-78", "q": "휴면이 행동적 적응과 연결되는 이유는?", "a": "에너지 소비를 줄여 불리한 환경을 버티게 하기 때문이다"}, {"id": "G0-79", "q": "박쥐가 낮에 휴면에 들어가는 이유를 한 문장으로 쓰면?", "a": "야행성 생활과 에너지 절약을 위해서"}, {"id": "G0-80", "q": "벌새/박새 같은 작은 동물이 휴면을 잘 이용하는 이유는?", "a": "체표면적 대비 부피가 커 열 손실이 빠르고 대사 부담이 크기 때문이다"}, {"id": "G0-81", "q": "내온동물의 열생산 방식 두 가지는?", "a": "대사율 증가와 행동적/형태적 조절"}, {"id": "G0-82", "q": "내온동물이 추울 때 열 방출을 줄이는 대표 혈관 반응은?", "a": "혈관수축(vasoconstriction)"}, {"id": "G0-83", "q": "문제에서 '표면 혈류 증가'가 나오면 체온은 대체로 어느 방향으로 변하는가?", "a": "열 방출 증가"}, {"id": "G0-84", "q": "문제에서 '표면 혈류 감소'가 나오면 체온 보존은 어떻게 되는가?", "a": "보존이 증가한다"}, {"id": "G0-85", "q": "몸집이 큰 동물일수록 체중당 에너지 요구가 상대적으로 낮은 경향이 있는 이유는?", "a": "부피 대비 표면적 비가 작아 열 손실이 상대적으로 적기 때문이다"}, {"id": "G0-86", "q": "몸집이 작은 동물이 체중당 대사율이 높은 경향이 있는 이유는?", "a": "표면적 비가 커 열 손실을 더 빠르게 보상해야 하기 때문이다"}, {"id": "G0-87", "q": "문제에서 '열 손실 보상 실패'가 나오면 가장 먼저 의심할 생리적 결과는?", "a": "체온 저하"}, {"id": "G0-88", "q": "문제에서 '효소 활성이 떨어지고 막 유동성 변화'가 같이 나오면 가장 먼저 떠올릴 개념은?", "a": "체온 항상성 붕괴"}, {"id": "G0-89", "q": "문제에서 '수중 조류 다리'가 나오면 함께 떠올릴 개념은?", "a": "역류교환"}, {"id": "G0-90", "q": "문제에서 '빠른 열 생산'이 나오면 함께 떠올릴 조직은?", "a": "갈색지방"}, {"id": "G0-91", "q": "문제에서 'ATP 대신 열 생산'이 나오면 함께 떠올릴 단백질은?", "a": "UCP"}, {"id": "G0-92", "q": "문제에서 '환경과 무관하게 내부 온도 유지'가 나오면 먼저 떠올릴 개념은?", "a": "항상성적 체온조절"}, {"id": "G0-93", "q": "외온동물도 항온일 수 있다는 문장의 의미는?", "a": "외부 환경이 일정하면 외온동물도 안정된 체온을 유지할 수 있다는 뜻"}, {"id": "G0-94", "q": "내온동물도 변온일 수 있다는 문장의 의미는?", "a": "예를 들어 휴면 시 체온이 떨어질 수 있다는 뜻"}, {"id": "G0-95", "q": "문제에서 '분류어의 함정'으로 자주 나오는 조합은?", "a": "내온/외온과 항온/변온은 서로 다른 축이라는 점"}, {"id": "G0-96", "q": "호르몬이 모든 세포에 도달해도 모든 세포가 반응하지 않는 이유는?", "a": "특이적 수용체를 가진 표적세포만 반응하기 때문이다"}, {"id": "G0-97", "q": "표적세포(target cell)란?", "a": "특정 호르몬의 수용체를 가진 반응 세포"}, {"id": "G0-98", "q": "호르몬 특이적 수용체가 없는 세포는 어떤가?", "a": "해당 호르몬의 영향을 거의 받지 않는다"}, {"id": "G0-99", "q": "내분비계와 신경계의 공통점은?", "a": "둘 다 신호를 전달하고 신체 기능을 조절한다"}, {"id": "G0-100", "q": "내분비 신호전달의 대표 기능은?", "a": "항상성 유지"}, {"id": "G0-101", "q": "국소 조절자(local regulator)란?", "a": "짧은 거리에서 작용하는 신호분자"}, {"id": "G0-102", "q": "국소 조절자는 보통 어떻게 표적세포에 도달하는가?", "a": "확산"}, {"id": "G0-103", "q": "프로스타글란딘은 어떤 범주의 신호분자인가?", "a": "국소 조절자"}, {"id": "G0-104", "q": "아스피린과 이부프로펜이 프로스타글란딘 작용을 줄이는 이유는?", "a": "프로스타글란딘 합성 경로를 억제하기 때문이다"}, {"id": "G0-105", "q": "프로스타글란딘은 어떤 분자에서 유래하는가?", "a": "지방산(아라키돈산 계열)"}, {"id": "G0-106", "q": "사이토카인의 대표 기능은?", "a": "면역·염증반응과 림프구 성장/분화 조절"}, {"id": "G0-107", "q": "산화질소(NO)가 혈관에서 하는 대표 작용은?", "a": "평활근 이완에 의한 혈관 확장"}, {"id": "G0-108", "q": "NO가 기체 신호분자로 중요하다는 뜻은?", "a": "막을 쉽게 통과하며 국소적으로 빠르게 작용할 수 있다는 뜻"}, {"id": "G0-109", "q": "시냅스 신호란?", "a": "뉴런이 신경전달물질을 분비해 표적세포에 신호를 전달하는 방식"}, {"id": "G0-110", "q": "신경내분비 신호란?", "a": "신경세포가 혈류로 직접 신호분자를 분비하는 방식"}, {"id": "G0-111", "q": "ADH는 어떤 신호 방식의 대표 예인가?", "a": "신경내분비 신호"}, {"id": "G0-112", "q": "자극→수용기→감각신경→CNS→운동신경→반응기 순서는 무엇을 나타내는가?", "a": "신경계의 기본 정보 처리 경로"}, {"id": "G0-113", "q": "중추신경계(CNS)는 무엇으로 이루어지는가?", "a": "뇌와 척수"}, {"id": "G0-114", "q": "말초신경계(PNS)는 무엇을 포함하는가?", "a": "감각신경과 운동신경을 포함한 말초 신경들"}, {"id": "G0-115", "q": "문제에서 '혈류로 퍼져 전신 작용'이 나오면 가장 먼저 떠올릴 신호 유형은?", "a": "내분비 신호"}, {"id": "G0-116", "q": "호르몬의 대표 화학적 종류 3가지는?", "a": "폴리펩타이드, 스테로이드, 아민"}, {"id": "G0-117", "q": "인슐린은 어떤 종류의 호르몬인가?", "a": "폴리펩타이드 호르몬"}, {"id": "G0-118", "q": "코르티솔은 어떤 종류의 호르몬인가?", "a": "스테로이드 호르몬"}, {"id": "G0-119", "q": "에피네프린과 티록신은 어떤 종류의 호르몬인가?", "a": "아민 호르몬"}, {"id": "G0-120", "q": "수용성 호르몬은 보통 어디의 수용체에 결합하는가?", "a": "세포 표면 수용체"}, {"id": "G0-121", "q": "지용성 호르몬은 보통 어디의 수용체에 결합하는가?", "a": "세포질 또는 핵 내 수용체"}, {"id": "G0-122", "q": "신호전달(signal transduction)이란?", "a": "세포 외부 신호를 세포 내부 반응으로 바꾸는 연속적 변화"}, {"id": "G0-123", "q": "에피네프린의 대표 세포막 수용체 예는?", "a": "GPCR"}, {"id": "G0-124", "q": "에피네프린-간세포 경로의 대표 2차 전달자는?", "a": "cAMP"}, {"id": "G0-125", "q": "cAMP가 활성화하는 대표 효소는?", "a": "단백질 인산화효소 A(PKA)"}, {"id": "G0-126", "q": "에피네프린-cAMP-PKA 경로의 최종 효과는?", "a": "글리코젠 분해 촉진과 혈당 상승"}, {"id": "G0-127", "q": "신호전달 카스케이드(cascade)의 의미는?", "a": "단계적 활성화를 통해 신호가 증폭되는 것"}, {"id": "G0-128", "q": "지용성 호르몬이 세포내 수용체를 쓰는 이유는?", "a": "막을 통과할 수 있기 때문이다"}, {"id": "G0-129", "q": "스테로이드 호르몬-수용체 복합체가 핵으로 가는 이유는?", "a": "유전자 전사를 조절하기 위해"}, {"id": "G0-130", "q": "지용성 호르몬에 대한 반응이 자주 오래 지속되는 이유는?", "a": "유전자 발현 변화가 동반되기 쉽기 때문이다"}, {"id": "G0-131", "q": "에스트로젠 수용체가 활성화되면 대표적으로 어떤 수준의 변화가 일어나는가?", "a": "전사 조절"}, {"id": "G0-132", "q": "문제에서 '세포막 수용체, 2차 전달자, 증폭'이 같이 나오면 어떤 호르몬 경로를 떠올려야 하는가?", "a": "수용성 호르몬 경로"}, {"id": "G0-133", "q": "문제에서 '핵 이동, 전사 조절'이 같이 나오면 어떤 호르몬 경로를 떠올려야 하는가?", "a": "지용성 호르몬 경로"}, {"id": "G0-134", "q": "문제에서 'ATP를 소모해 cAMP 생성'이 나오면 어떤 효소를 떠올려야 하는가?", "a": "아데닐산 고리화효소"}, {"id": "G0-135", "q": "문제에서 '세포 밖 신호를 세포 안 반응으로 번역'이 나오면 떠올릴 핵심 개념은?", "a": "신호전달"}, {"id": "G0-136", "q": "갑상샘의 대표 호르몬 3가지는?", "a": "T3, T4, 칼시토닌"}, {"id": "G0-137", "q": "부갑상샘의 대표 호르몬은?", "a": "PTH"}, {"id": "G0-138", "q": "부신수질의 대표 호르몬은?", "a": "에피네프린, 노르에피네프린"}, {"id": "G0-139", "q": "부신피질의 대표 호르몬 두 범주는?", "a": "당질코르티코이드, 무기질코르티코이드"}, {"id": "G0-140", "q": "코르티솔은 어떤 범주의 호르몬인가?", "a": "당질코르티코이드"}, {"id": "G0-141", "q": "알도스테론은 어떤 범주의 호르몬인가?", "a": "무기질코르티코이드"}, {"id": "G0-142", "q": "난소의 대표 호르몬은?", "a": "에스트로겐, 프로게스테론"}, {"id": "G0-143", "q": "정소의 대표 호르몬은?", "a": "안드로겐(테스토스테론 등)"}, {"id": "G0-144", "q": "송과샘의 대표 호르몬은?", "a": "멜라토닌"}, {"id": "G0-145", "q": "췌장의 대표 호르몬 두 가지는?", "a": "인슐린, 글루카곤"}, {"id": "G0-146", "q": "시상하부의 핵심 역할은?", "a": "뇌하수체와 여러 내분비 축의 상위 조절자"}, {"id": "G0-147", "q": "뇌하수체 전엽을 조절하는 시상하부 호르몬 예 3가지는?", "a": "TRH, CRH, GnRH"}, {"id": "G0-148", "q": "시상하부는 방출호르몬만 분비하는가?", "a": "아니오 — 방출호르몬(TRH·CRH·GnRH·GHRH 등)과 억제호르몬(GHIH=소마토스타틴, PIH=도파민)을 모두 분비"}, {"id": "G0-149", "q": "뇌하수체 전엽의 대표 호르몬 5가지는?", "a": "GH, PRL, ACTH, TSH, FSH/LH"}, {"id": "G0-150", "q": "뇌하수체 전엽 호르몬 중 색소세포를 자극하는 것은?", "a": "MSH(색소세포자극호르몬)"}, {"id": "G0-151", "q": "뇌하수체 후엽에서 분비되는 대표 호르몬 2가지는?", "a": "ADH, 옥시토신"}, {"id": "G0-152", "q": "ADH와 옥시토신은 실제로 어디서 합성되는가?", "a": "시상하부"}, {"id": "G0-153", "q": "ADH와 옥시토신은 어디에 저장되었다가 분비되는가?", "a": "뇌하수체 후엽"}, {"id": "G0-154", "q": "전엽 호르몬을 tropic hormone이라 부르는 이유는?", "a": "다른 내분비기관을 자극하기 때문이다"}, {"id": "G0-155", "q": "FSH와 LH를 gonadotropin이라 부르는 이유는?", "a": "생식샘을 표적으로 하기 때문이다"}, {"id": "G0-156", "q": "내분비샘과 외분비샘의 차이는?", "a": "내분비샘은 체액으로 직접 분비하고, 외분비샘은 관이나 표면/체강으로 분비한다"}, {"id": "G0-157", "q": "문제에서 '문맥(portal vein) 통해 직접 전엽 조절'이 나오면 무엇을 떠올려야 하는가?", "a": "시상하부-뇌하수체 전엽 연결"}, {"id": "G0-158", "q": "갑상샘 호르몬의 대표 기능은?", "a": "대사율 촉진 및 유지"}, {"id": "G0-159", "q": "T3와 T4 중 더 활성적인 형태는?", "a": "T3"}, {"id": "G0-160", "q": "T3와 T4의 혈중 비율은?", "a": "T3 약 7%(활성형) / T4 약 93%(대부분, 말초에서 T3로 전환)"}, {"id": "G0-161", "q": "갑상샘 호르몬 합성에 중요한 무기질은?", "a": "요오드"}, {"id": "G0-162", "q": "혈중 갑상샘 호르몬이 낮을 때 활성화되는 축은?", "a": "TRH → TSH → 갑상샘 호르몬"}, {"id": "G0-163", "q": "갑상샘기능저하증의 대표 증상 예는?", "a": "무기력, 체중 증가, 추위 민감"}, {"id": "G0-164", "q": "갑상샘기능항진증의 반대 방향 특징은?", "a": "대사 항진, 체중 감소, 더위 민감 등"}, {"id": "G0-165", "q": "그레이브스병의 핵심 기전은?", "a": "자가항체에 의한 갑상샘 자극"}, {"id": "G0-166", "q": "하시모토병의 핵심 기전은?", "a": "자가면역성 갑상샘 파괴"}, {"id": "G0-167", "q": "GH의 대표 표적기관은?", "a": "간"}, {"id": "G0-168", "q": "GH에 의해 간에서 분비되는 성장 매개자는?", "a": "IGF-1"}, {"id": "G0-169", "q": "GH/IGF 축의 대표 효과는?", "a": "뼈와 연골 성장 촉진"}, {"id": "G0-170", "q": "말단비대증(acromegaly)의 핵심은?", "a": "성장 종료 후에도 말단 뼈와 연부조직 성장이 증가하는 것"}, {"id": "G0-171", "q": "혈중 Ca²⁺가 감소할 때 분비가 증가하는 호르몬은?", "a": "PTH"}, {"id": "G0-172", "q": "PTH는 혈중 Ca²⁺를 어떻게 바꾸는가?", "a": "증가시킨다"}, {"id": "G0-173", "q": "PTH가 혈중 Ca²⁺를 높이는 3경로는?", "a": "뼈 흡수 촉진, 신장 Ca²⁺ 재흡수 증가, 비타민 D 활성화 통한 장 흡수 증가"}, {"id": "G0-174", "q": "칼시토닌은 혈중 Ca²⁺를 어떻게 바꾸는가?", "a": "감소시키는 방향으로 작용한다"}, {"id": "G0-175", "q": "에피네프린/노르에피네프린의 핵심 생리 효과는?", "a": "즉각적 에너지 동원과 심혈관·호흡계 활성화"}, {"id": "G0-176", "q": "코르티솔의 핵심 효과는?", "a": "포도당 생성 촉진과 면역/염증 억제"}, {"id": "G0-177", "q": "알도스테론의 핵심 효과는?", "a": "신장에서 Na⁺ 재흡수 증가와 K⁺ 배설 촉진"}, {"id": "G0-178", "q": "멜라토닌 분비를 조절하는 상위 중추는?", "a": "시상하부의 시교차상핵(SCN)"}, {"id": "G0-179", "q": "내온/외온과 항온/변온이 독립적임을 보여주는 대표 예는?", "a": "열대 물에 사는 외온 물고기는 항온을 유지하고, 휴면 중 내온 박쥐는 체온이 떨어진다"}, {"id": "G0-180", "q": "소화·호흡·순환계의 교환 표면적은 피부의 약 몇 배인가?", "a": "약 25배"}, {"id": "G0-181", "q": "다음 중 결합조직이 아닌 것을 고르는 함정(뼈/혈액/지방/연골/근육)에서 답은?", "a": "근육(나머지는 모두 결합조직)"}, {"id": "G0-182", "q": "혈액에서 CO₂는 혈장과 혈구가 각각 몇 %씩 운반하는가?", "a": "혈장 약 65%, 혈구 약 35%"}, {"id": "G0-183", "q": "골격근·심장근·평활근의 칼슘 수축 기전 차이는?", "a": "골격근=DHP수용체-RyR1 물리적 연결, 심장근=Ca²⁺ 유입→RyR2(CICR), 평활근=트로포닌 없이 칼모듈린-MLCK 경로"}, {"id": "G0-184", "q": "2차 전달자(second messenger)의 대표 예는?", "a": "cAMP, cGMP, Ca²⁺, DAG, IP₃ 등"}, {"id": "G0-185", "q": "호르몬의 화학적 종류를 4가지로 보면?", "a": "펩티드, 스테로이드, 아민, 그리고 지방산 유래(예: 프로스타글란딘)"}, {"id": "G0-186", "q": "에스트로겐이 간세포에 작용해 만드는 난황 전구물질은?", "a": "비텔로제닌(vitellogenin) — 지용성 호르몬의 전사 조절 대표 예"}, {"id": "G0-187", "q": "십이지장 S세포가 낮은 pH를 감지해 분비하는 호르몬은?", "a": "세크레틴(secretin)"}, {"id": "G0-188", "q": "세크레틴의 작용은?", "a": "췌장에서 중탄산염(HCO₃⁻) 분비를 유도해 위산을 중화한다"}, {"id": "G0-189", "q": "인슐린의 핵심 기능은?", "a": "혈당을 낮춘다"}, {"id": "G0-190", "q": "글루카곤의 핵심 기능은?", "a": "혈당을 높인다(인슐린과 길항)"}, {"id": "G0-191", "q": "옥시토신의 기능은?", "a": "자궁 수축과 젖 분비(사출) 조절 — 대표적 양성 피드백 호르몬"}, {"id": "G0-192", "q": "ADH(바소프레신)의 기능은?", "a": "신장 집합관에서 물 재흡수를 촉진해 혈중 용질 농도를 정상 유지한다"}, {"id": "G0-193", "q": "에스트로겐의 기능은?", "a": "자궁 내벽 성장 촉진, 여성 2차 성징 발달·유지"}, {"id": "G0-194", "q": "프로게스테론의 기능은?", "a": "자궁 내벽 유지(임신·착상 지원); 에스트로겐과 함께 배란 억제(경구피임약 성분)"}, {"id": "G0-195", "q": "안드로겐(테스토스테론)의 기능은?", "a": "정자 생성 지원, 남성 2차 성징 발달·유지"}, {"id": "G0-196", "q": "테스토스테론을 분비하는 정소의 세포는?", "a": "레이디히(Leydig) 세포"}, {"id": "G0-197", "q": "에스트로겐을 분비하는 난소 구조는?", "a": "여포(난포)"}, {"id": "G0-198", "q": "프로게스테론을 분비하는 난소 구조는?", "a": "황체(corpus luteum)"}, {"id": "G0-199", "q": "카테콜아민(catecholamine)이란?", "a": "티로신에서 만든 아민 호르몬 — 에피네프린, 노르에피네프린"}, {"id": "G0-200", "q": "카테콜아민의 혈류 재분배 효과는?", "a": "심장·뇌·골격근 혈류는 늘리고 피부·소화기·신장 혈류는 줄인다"}, {"id": "G0-201", "q": "아드레날린 수용체 β1/β2/α의 기능은?", "a": "β1=심박·수축력↑, β2=기관지 확장·평활근 이완, α=혈관 수축"}, {"id": "G0-202", "q": "코르티솔이 혈당을 높이는 기전은?", "a": "근육 단백질 분해→아미노산→간·신장에서 포도당 생성(당신생, gluconeogenesis)"}, {"id": "G0-203", "q": "부신피질 3층(G-F-R)과 분비 호르몬은?", "a": "사구대=알도스테론, 다발대=코르티솔, 망상대=안드로겐(DHEA)"}, {"id": "G0-204", "q": "PTH가 활성화한 비타민 D의 작용과 활성화 경로는?", "a": "소장에서 Ca²⁺ 흡수 촉진; 비타민 D 활성화는 간에서 시작해 신장에서 완성"}, {"id": "G0-205", "q": "저칼슘혈증(hypocalcemia)의 대표 증상은?", "a": "골격근의 강직성 경련(테타니)"}, {"id": "G0-206", "q": "고칼슘혈증(hypercalcemia)의 대표 결과는?", "a": "인산칼슘 침전으로 조직·기관 손상"}, {"id": "G0-207", "q": "혈당 조절과 가장 무관한 내분비샘은?", "a": "부갑상선(PTH는 Ca²⁺ 조절 담당)"}, {"id": "G0-208", "q": "비활성형 T4가 활성형 T3로 전환되는 주요 장소는?", "a": "간(및 심장 등 말초 조직)"}, {"id": "G0-209", "q": "갑상샘종(goiter)이 음성피드백 이상으로 생기는 기전은?", "a": "자극호르몬(TSH 등)을 과도하게 받아 갑상샘이 비대해진다"}, {"id": "G0-210", "q": "크레틴병(cretinism)이란?", "a": "영유아기 갑상샘기능저하로 인한 발달 장애"}, {"id": "G0-211", "q": "성장호르몬(GH)의 대사 효과는?", "a": "지방 이화↑, 단백질 동화↑, 간 당신생으로 혈당↑; 운동·스트레스·저혈당 시 분비"}, {"id": "G0-212", "q": "ADH의 V2와 V1 수용체 차이는?", "a": "V2=신장 집합관(cAMP→아쿠아포린, 수분 재흡수), V1=혈관 평활근(IP₃/Ca²⁺→혈관 수축)"}, {"id": "G0-213", "q": "남성 발생에서 AMH(항뮐러관호르몬)의 역할은?", "a": "뮐러관을 퇴화시킨다"}, {"id": "G0-214", "q": "남성 발생에서 테스토스테론의 역할은?", "a": "볼프관을 유지시켜 남성 생식기를 형성한다"}, {"id": "G0-215", "q": "옥시토신 분비가 양성 피드백인 이유는?", "a": "자궁 수축·젖 분비가 자극을 더 키워 분비를 증폭시키기 때문이다"}, {"id": "G0-216", "q": "배란 직전 LH 급증(LH surge)을 일으키는 피드백은?", "a": "고농도 에스트로겐이 시상하부에 가하는 양성 피드백(피드백 예외)"}, {"id": "G0-217", "q": "이자섬(랑게르한스섬)의 세포 종류와 분비 호르몬은?", "a": "α세포=글루카곤, β세포=인슐린, δ세포=소마토스타틴(인슐린·글루카곤 분비 억제), F(PP)세포=췌장폴리펩타이드"}, {"id": "G0-218", "q": "제1형과 제2형 당뇨병의 차이는?", "a": "제1형=자가면역으로 β세포 파괴 → 인슐린 결핍(인슐린 의존성) / 제2형=인슐린 저항성(표적세포 반응 저하), 비만과 연관"}]}, {"label": "42 소화계", "cards": [{"id": "G1-0", "q": "동물이 음식을 통해 반드시 얻어야 하는 세 가지는?", "a": "화학적 에너지, 유기 구성요소, 필수 영양소"}, {"id": "G1-1", "q": "음식 처리 과정 4단계는?", "a": "섭취, 소화, 흡수, 배설"}, {"id": "G1-2", "q": "기계적 소화란?", "a": "음식을 잘게 부수어 표면적을 늘리는 과정"}, {"id": "G1-3", "q": "화학적 소화란?", "a": "큰 분자를 흡수 가능한 작은 분자로 가수분해하는 과정"}, {"id": "G1-4", "q": "효소 가수분해란?", "a": "소화효소가 물을 이용해 결합을 끊는 반응"}, {"id": "G1-5", "q": "포유류 소화계는 크게 무엇으로 구성되는가?", "a": "소화관과 부속샘"}, {"id": "G1-6", "q": "포유류 소화계 부속샘 4가지는?", "a": "침샘, 췌장, 간, 담낭"}, {"id": "G1-7", "q": "필수 영양소란?", "a": "체내 합성이 불가능하거나 부족해 음식으로 반드시 섭취해야 하는 영양소"}, {"id": "G1-8", "q": "필수 아미노산 8가지는?", "a": "아이소류신, 류신, 라이신, 메티오닌, 페닐알라닌, 트레오닌, 트립토판, 발린"}, {"id": "G1-9", "q": "유아에서 추가로 필수 아미노산인 것은?", "a": "히스티딘"}, {"id": "G1-10", "q": "대부분의 식물성 단백질이 불완전단백질인 이유는?", "a": "하나 이상의 필수 아미노산이 부족하기 때문"}, {"id": "G1-11", "q": "옥수수에 특히 부족한 필수 아미노산 두 가지는?", "a": "라이신과 트립토판"}, {"id": "G1-12", "q": "콩에 특히 부족한 필수 아미노산은?", ", "a": "아밀레이스에 의한 탄수화물 소화"}, {"id": "G1-77", "q": "위의 두 가지 핵심 기능은?", "a": "저장과 음식의 액체화"}, {"id": "G1-78", "q": "위액과 음식이 섞인 혼합물을 무엇이라 하는가?", "a": "유미즙"}, {"id": "G1-79", "q": "위의 연동·휘젓기 운동의 목적은?", "a": "음식과 위액을 잘 섞어 소화를 촉진하기 위해"}, {"id": "G1-80", "q": "위액의 대표 pH는?", "a": "약 2"}, {"id": "G1-81", "q": "위의 강산성이 하는 일 두 가지는?", "a": "세포외기질 파괴와 단백질 변성"}, {"id": "G1-82", "q": "위에서 단백질 소화의 핵심 효소는?", "a": "펩신"}, {"id": "G1-83", "q": "펩신은 어떤 형태로 분비되는가?", "a": "비활성형인 펩시노겐"}, {"id": "G1-84", "q": "펩시노겐을 분비하는 세포는?", "a": "주세포"}, {"id": "G1-85", "q": "염산을 분비하는 세포는?", "a": "벽세포"}, {"id": "G1-86", "q": "벽세포가 염산을 만들기 위해 내보내는 두 이온은?", "a": "H+와 Cl-"}, {"id": "G1-87", "q": "벽세포가 H⁺를 내강으로 내보내는 막 단백질은?", "a": "양성자 펌프(proton pump) — Cl⁻는 별도의 막단백질로 분비"}, {"id": "G1-88", "q": "염산이 펩시노겐에 하는 직접 작용은?", "a": "활성 부위를 노출시켜 일부를 펩신으로 바꾼다"}, {"id": "G1-89", "q": "활성화된 펩신이 추가 펩시노겐을 펩신으로 바꾸는 것은 어떤 예인가?", "a": "양성 되먹임"}, {"id": "G1-90", "q": "펩신이 작동하기 좋은 환경은?", "a": "강산성"}, {"id": "G1-91", "q": "위가 자신을 소화하지 않는 직접 이유는?", "a": "펩신을 비활성형으로 분비하고 염산도 세포 내부가 아니라 내강으로 내보내기 때문"}, {"id": "G1-92", "q": "주세포와 벽세포를 비교하면?", "a": "주세포는 펩시노겐, 벽세포는 HCl 분비"}, {"id": "G1-93", "q": "대부분의 소화가 일어나는 곳은?", "a": "소장"}, {"id": "G1-94", "q": "소장의 첫 부분 약 25cm를 무엇이라 하는가?", "a": "십이지장"}, {"id": "G1-95", "q": "소장의 세 부분을 순서대로 쓰면?", "a": "십이지장(duodenum) → 공장(jejunum) → 회장(ileum)"}, {"id": "G1-96", "q": "위에서 온 산성 유미즙이 십이지장에 들어오면 분비되는 대표 호르몬은?", "a": "세크레틴"}, {"id": "G1-97", "q": "세크레틴의 표적기관은?", "a": "췌장"}, {"id": "G1-98", "q": "세크레틴이 췌장에 유도하는 분비는?", "a": "중탄산염"}, {"id": "G1-99", "q": "중탄산염의 역할은?", "a": "산성 유미즙을 중화하고 소장 소화의 완충환경을 만든다"}, {"id": "G1-100", "q": "췌장은 어떤 종류의 영양소 소화효소를 분비하는가?", "a": "탄수화물, 단백질, 핵산, 지방 소화효소"}, {"id": "G1-101", "q": "췌장의 트립신과 키모트립신은 어떤 형태로 분비되는가?", "a": "비활성형"}, {"id": "G1-102", "q": "트립신·키모트립신이 분비되는 비활성형(zymogen) 이름은?", "a": "트립시노겐, 키모트립시노겐 (십이지장 내강에서 활성화)"}, {"id": "G1-103", "q": "트립신이 주로 절단하는 아미노산의 C말단은?", "a": "Lys와 Arg"}, {"id": "G1-104", "q": "키모트립신이 주로 절단하는 아미노산의 C말단은?", "a": "Phe, Trp, Tyr"}, {"id": "G1-105", "q": "카르복시펩티데이스의 역할은?", "a": "폴리펩타이드의 C말단에서 아미노산을 제거한다"}, {"id": "G1-106", "q": "아미노펩티데이스의 역할은?", "a": "폴리펩타이드의 N말단에서 아미노산을 제거한다"}, {"id": "G1-107", "q": "디펩티데이스의 역할은?", "a": "두 개 붙은 아미노산을 절단한다"}, {"id": "G1-108", "q": "소장 상피가 소화에 중요한 이유는?", "a": "표면 효소가 최종 소화를 마무리하기 때문"}, {"id": "G1-109", "q": "십이지장 상피세포 표면 효소의 목적은?", "a": "흡수 가능한 최종 단위까지 소화를 끝내는 것"}, {"id": "G1-110", "q": "췌장의 뉴클레이스가 하는 일은?", "a": "DNA와 RNA를 뉴클레오타이드 수준까지 분해"}, {"id": "G1-111", "q": "소장 효소가 뉴클레오타이드를 더 분해하면 무엇이 되는가?", "a": "뉴클레오사이드와 이후 당·염기·인산"}, {"id": "G1-112", "q": "담즙산염의 핵심 기능은?", "a": "지방을 유화하여 표면적을 늘린다"}, {"id": "G1-113", "q": "담즙은 어디서 만들어지는가?", "a": "간"}, {"id": "G1-114", "q": "담즙은 어디에 저장·농축되는가?", "a": "담낭"}, {"id": "G1-115", "q": "지방 소화의 핵심 효소는?", "a": "라이페이스"}, {"id": "G1-116", "q": "라이페이스가 트리글리세리드를 분해하면 무엇이 되는가?", "a": "지방산과 모노글리세리드"}, {"id": "G1-117", "q": "담즙산염이 없으면 지방 소화가 비효율적인 이유는?", "a": "큰 지방 덩어리의 표면적이 작아 효소 접근이 어렵기 때문"}, {"id": "G1-118", "q": "담즙 색소가 축적되면 생기는 대표 증상은?", "a": "황달"}, {"id": "G1-119", "q": "소장 융모와 미세융모의 가장 큰 기능은?", "a": "흡수 표면적을 극대화하는 것"}, {"id": "G1-120", "q": "과당은 소장에서 주로 어떤 방식으로 흡수되는가?", "a": "촉진확산"}, {"id": "G1-121", "q": "포도당은 소장에서 주로 어떤 방식으로 흡수되는가?", "a": "능동수송"}, {"id": "G1-122", "q": "아미노산은 소장에서 주로 어떤 방식으로 흡수되는가?", "a": "능동수송"}, {"id": "G1-123", "q": "작은 펩타이드는 소장에서 주로 어떤 방식으로 흡수되는가?", "a": "능동수송"}, {"id": "G1-124", "q": "소장에서 물은 주로 어떤 원리로 재흡수되는가?", "a": "이온 기울기에 따른 삼투"}, {"id": "G1-125", "q": "소장에는 물을 직접 능동수송하는 기작이 있는가?", "a": "없다"}, {"id": "G1-126", "q": "흡수된 당과 아미노산은 먼저 어디로 가는가?", "a": "소장 융모의 모세혈관"}, {"id": "G1-127", "q": "소장 모세혈관 혈액은 어떤 정맥으로 모이는가?", "a": "간문맥"}, {"id": "G1-128", "q": "간문맥의 목적지는?", "a": "간"}, {"id": "G1-129", "q": "지방 소화산물은 상피세포 안에서 무엇으로 다시 조립되는가?", "a": "트리글리세리드"}, {"id": "G1-130", "q": "재형성된 지방은 무엇과 합쳐져 킬로미크론이 되는가?", "a": "인지질과 단백질"}, {"id": "G1-131", "q": "킬로미크론이 수용성인 이유는?", "a": "표면에 인지질과 단백질이 있어서"}, {"id": "G1-132", "q": "킬로미크론은 어떤 방식으로 상피세포 밖으로 나가는가?", "a": "세포외배출"}, {"id": "G1-133", "q": "킬로미크론이 먼저 들어가는 곳은?", "a": "유미관"}, {"id": "G1-134", "q": "유미관의 다른 이름은?", "a": "림프 모세관"}, {"id": "G1-135", "q": "지방이 당·아미노산과 다른 경로로 가는 이유는?", "a": "킬로미크론이 커서 곧바로 모세혈관으로 잘 못 들어가기 때문"}, {"id": "G1-136", "q": "지방 흡수 경로를 순서대로 쓰면?", "a": "지방산/모노글리세리드 -> 상피세포 -> 트리글리세리드 재형성 -> 킬로미크론 -> 유미관 -> 림프관 -> 혈액"}, {"id": "G1-137", "q": "지용성 비타민은 주로 어느 경로로 흡수되는가?", "a": "유미관/림프 경로"}, {"id": "G1-138", "q": "당과 아미노산은 주로 어느 경로로 흡수되는가?", "a": "간문맥 경로"}, {"id": "G1-139", "q": "간의 소화 관련 핵심 기능 두 가지는?", "a": "영양분 재분배와 유해성분 제거"}, {"id": "G1-140", "q": "간이 영양분 재분배 기관인 이유는?", "a": "유입된 유기분자를 다양한 형태로 전환할 수 있기 때문"}, {"id": "G1-141", "q": "간은 아미노산 분해로 생긴 질소(암모니아)를 무엇으로 전환하는가?", "a": "요소(urea) — 이후 신장으로 배설"}, {"id": "G1-142", "q": "대장은 무엇으로 이루어지는가?", "a": "맹장, 결장, 직장, 항문"}, {"id": "G1-143", "q": "충수돌기의 추정 기능은?", "a": "공생 미생물 저장소"}, {"id": "G1-144", "q": "결장의 핵심 기능은?", "a": "물 흡수 완료와 대변 농축"}, {"id": "G1-145", "q": "대변 속 소화되지 않는 셀룰로오스 섬유의 역할은?", "a": "소화관을 따라 음식 이동을 돕는다"}, {"id": "G1-146", "q": "직장의 역할은?", "a": "배설 전 대변 저장"}, {"id": "G1-147", "q": "결장과 항문 사이 괄약근 두 개의 특징은?", "a": "하나는 수의근, 하나는 불수의근"}, {"id": "G1-148", "q": "대변이 결장을 지나며 단단해지는 이유는?", "a": "물이 계속 재흡수되기 때문"}, {"id": "G1-149", "q": "초식동물 치아의 일반적 특징은?", "a": "넓고 갈기 쉽다"}, {"id": "G1-150", "q": "육식동물 치아의 일반적 특징은?", "a": "찢고 뜯기 쉽다"}, {"id": "G1-151", "q": "잡식동물 치아의 일반적 특징은?", "a": "초식과 육식 기능을 둘 다 어느 정도 가진다"}, {"id": "G1-152", "q": "인간과 장내 미생물의 관계는?", "a": "상리공생"}, {"id": "G1-153", "q": "장내 미생물이 숙주에게 주는 다른 이점 두 가지는?", "a": "장 상피 발달 도움, 선천 면역 기능 보조"}, {"id": "G1-154", "q": "숙주가 장내 미생물에게 주는 이점 두 가지는?", "a": "꾸준한 영양 공급과 안정적 환경"}, {"id": "G1-155", "q": "헬리코박터 파일로리가 중요한 예시인 이유는?", "a": "위에 살며 위궤양을 일으킬 수 있기 때문"}, {"id": "G1-156", "q": "분변 이식이 사용되는 이유를 한 문장으로 쓰면?", "a": "건강한 미생물군집을 회복시켜 장 기능을 회복시키기 위해"}, {"id": "G1-157", "q": "초식동물이 셀룰로오스를 직접 분해하지 못하는 이유는?", "a": "셀룰레이스가 없기 때문"}, {"id": "G1-158", "q": "초식동물의 셀룰로오스 소화는 누가 도와주는가?", "a": "장내 미생물과 원생생물"}, {"id": "G1-159", "q": "흰개미가 셀룰로오스를 소화할 수 있는 이유는?", "a": "공생 미생물/원생생물의 도움 때문"}, {"id": "G1-160", "q": "초식동물 공생 미생물이 주는 영양상 이점은?", "a": "셀룰로오스를 분해해 비타민·아미노산 등 유용한 물질을 제공한다"}, {"id": "G1-161", "q": "소화가 단계적으로 활성되는 이유는?", "a": "음식이 도달한 위치에 맞춰 필요한 소화액만 분비하기 위해"}, {"id": "G1-162", "q": "장신경계의 역할은?", "a": "소화액 분비와 연동운동 조절"}, {"id": "G1-163", "q": "위벽이 늘어나면 분비되는 호르몬은?", "a": "가스트린"}, {"id": "G1-164", "q": "가스트린의 핵심 작용은?", "a": "위액 생성을 촉진한다"}, {"id": "G1-165", "q": "유미즙이 십이지장에 들어오면 분비되는 두 호르몬은?", "a": "CCK와 세크레틴"}, {"id": "G1-166", "q": "CCK의 핵심 작용 두 가지는?", "a": "췌장 소화효소 분비 촉진, 담즙 분비 촉진"}, {"id": "G1-167", "q": "세크레틴의 핵심 작용은?", "a": "췌장의 중탄산염 분비 촉진"}, {"id": "G1-168", "q": "유미즙에 지방이 많을 때 위 연동운동이 억제되는 이유는?", "a": "지방 소화를 위해 소장에서 더 오래 머물게 하려는 조절"}, {"id": "G1-169", "q": "가스트린·CCK·세크레틴을 비교하면?", "a": "가스트린은 위, CCK·세크레틴은 십이지장 중심 조절"}, {"id": "G1-170", "q": "CCK가 특히 많이 분비되는 상황은?", "a": "십이지장에 지방이 많을 때"}, {"id": "G1-171", "q": "세크레틴이 특히 중요한 이유는?", "a": "위산성 유미즙을 중화해 소장 효소가 작동할 환경을 만들기 때문"}, {"id": "G1-172", "q": "정상 혈당 범위는?", "a": "70~110 mg/100 mL"}, {"id": "G1-173", "q": "포도당 항상성을 주로 조절하는 두 호르몬은?", "a": "인슐린과 글루카곤"}, {"id": "G1-174", "q": "인슐린의 핵심 작용은?", "a": "혈당을 낮춘다"}, {"id": "G1-175", "q": "혈당을 낮추는 호르몬은 몇 가지인가?", "a": "인슐린 하나뿐(유일) — 혈당을 높이는 호르몬은 글루카곤·에피네프린·코르티솔·GH 등 여럿"}, {"id": "G1-176", "q": "글루카곤의 핵심 작용은?", "a": "혈당을 높인다"}, {"id": "G1-177", "q": "인슐린은 어디서 분비되는가?", "a": "췌장 베타세포"}, {"id": "G1-178", "q": "글루카곤은 어디서 분비되는가?", "a": "췌장 알파세포"}, {"id": "G1-179", "q": "이자섬(islet)의 정의는?", "a": "췌장 안에 흩어진 내분비세포 덩어리"}, {"id": "G1-180", "q": "간이 포도당 항상성에서 중요한 이유는?", "a": "글리코젠 저장·분해와 포도당 방출의 중심 기관이기 때문"}, {"id": "G1-181", "q": "글루카곤이 간에서 촉진하는 세 가지는?", "a": "글리코젠 분해, 아미노산·글리세롤의 포도당 전환, 포도당 방출"}, {"id": "G1-182", "q": "인슐린이 자극하는 것은?", "a": "대부분 체세포의 포도당 흡수"}, {"id": "G1-183", "q": "인슐린 의존성이 낮은 대표 조직은?", "a": "뇌"}, {"id": "G1-184", "q": "뇌가 인슐린 없이도 포도당을 흡수할 수 있는 이유는?", "a": "저혈당에서도 뇌 연료 공급을 유지하기 위해"}, {"id": "G1-185", "q": "당뇨병(diabetes mellitus)의 기본 정의는?", "a": "인슐린 생성 부족이나 반응 이상으로 혈당이 높아지는 질환"}, {"id": "G1-186", "q": "당뇨병에서 포도당이 소변으로 나갈 수 있는 이유는?", "a": "혈당이 신장의 재흡수 한계를 넘기기 때문"}, {"id": "G1-187", "q": "당뇨병에서 지방이 많이 사용되는 이유는?", "a": "세포가 포도당을 충분히 이용하지 못하기 때문"}, {"id": "G1-188", "q": "당뇨병성 케톤산증의 핵심은?", "a": "지방 대사가 과도해져 혈액 pH가 낮아지는 것"}, {"id": "G1-189", "q": "1형 당뇨병의 원인은?", "a": "자가면역에 의한 베타세포 파괴"}, {"id": "G1-190", "q": "1형 당뇨병의 특징은?", "a": "인슐린 생성이 거의 없다"}, {"id": "G1-191", "q": "2형 당뇨병의 핵심 문제는?", "a": "인슐린 저항성"}, {"id": "G1-192", "q": "2형 당뇨병에서 혈당이 높은 이유는?", "a": "인슐린은 있어도 표적세포가 반응하지 않기 때문"}, {"id": "G1-193", "q": "2형 당뇨병의 이상 부위 두 가지는?", "a": "인슐린 수용체 또는 세포내 반응 경로"}, {"id": "G1-194", "q": "포만중추(satiety center)의 역할은?", "a": "소화계 신호를 통합해 식욕을 조절한다"}, {"id": "G1-195", "q": "그렐린의 분비 장소는?", "a": "위"}, {"id": "G1-196", "q": "그렐린의 효과는?", "a": "허기를 느끼게 하고 식욕을 증가시킨다"}, {"id": "G1-197", "q": "PYY의 분비 장소는?", "a": "소장"}, {"id": "G1-198", "q": "PYY의 효과는?", "a": "식욕을 억제한다"}, {"id": "G1-199", "q": "렙틴의 분비 장소는?", "a": "지방조직"}, {"id": "G1-200", "q": "렙틴의 효과는?", "a": "장기적으로 식욕을 억제하고 체지방량을 조절한다"}, {"id": "G1-201", "q": "식욕을 억제하는 호르몬 세 가지는?", "a": "인슐린, PYY, 렙틴"}, {"id": "G1-202", "q": "식욕을 자극하는 대표 호르몬은?", "a": "그렐린"}, {"id": "G1-203", "q": "그렐린이 식사 전 상승하는 이유는?", "a": "먹이를 기대하게 하여 섭취를 유도하기 위해"}, {"id": "G1-204", "q": "구강, 위, 소장의 소화 역할을 순서대로 비교하면?", "a": "구강은 기계적 소화 시작, 위는 저장·단백질 소화, 소장은 대부분의 화학적 소화·흡수"}, {"id": "G1-205", "q": "위와 소장의 pH 차이가 중요한 이유는?", "a": "펩신은 산성에서, 대부분의 소장 효소는 중성~약알칼리성에서 작동하기 때문"}, {"id": "G1-206", "q": "당·아미노산과 지방의 흡수 경로를 비교하면?", "a": "당·아미노산은 간문맥, 지방은 유미관/림프 경로"}, {"id": "G1-207", "q": "담즙과 라이페이스를 비교하면?", "a": "담즙은 유화, 라이페이스는 실제 가수분해"}, {"id": "G1-208", "q": "세크레틴과 CCK를 비교하면?", "a": "세크레틴은 중탄산염, CCK는 소화효소와 담즙 분비 촉진"}, {"id": "G1-209", "q": "인슐린과 글루카곤을 비교하면?", "a": "인슐린은 혈당 감소, 글루카곤은 혈당 증가"}, {"id": "G1-210", "q": "1형 당뇨와 2형 당뇨를 비교하면?", "a": "1형은 인슐린 부족, 2형은 인슐린 저항성"}, {"id": "G1-211", "q": "그렐린과 렙틴을 비교하면?", "a": "그렐린은 배고픔 증가, 렙틴은 포만감 증가"}, {"id": "G1-212", "q": "장내 미생물의 공생 이점을 숙주 관점에서 쓰면?", "a": "비타민 공급, 장 발달 도움, 면역 보조"}, {"id": "G1-213", "q": "초식동물 적응의 핵심을 한 문장으로 쓰면?", "a": "치아와 장내 공생 미생물을 통해 셀룰로오스 식이에 적응한다"}, {"id": "G1-214", "q": "벽세포가 HCl 외에 분비하는 물질과 그 중요성은?", "a": "내인자(intrinsic factor) — 회장에서 비타민 B₁₂ 흡수에 필요; 결핍 시 악성빈혈(pernicious anemia) 발생"}, {"id": "G1-215", "q": "위샘의 G세포·ECL세포·D세포가 분비하는 것은?", "a": "G세포=가스트린, ECL세포=히스타민(벽세포 자극해 위산 분비 촉진), D세포=소마토스타틴(위산 분비 억제)"}, {"id": "G1-216", "q": "십이지장에서 트립시노겐을 트립신으로 활성화하는 효소는?", "a": "엔테로펩티데이스(엔테로키네이스) — 활성화된 트립신이 다시 키모트립시노겐·프로카르복시펩티데이스 등을 연쇄 활성화"}, {"id": "G1-217", "q": "위 활동을 억제하는 십이지장 호르몬(엔테로가스트론)은?", "a": "CCK·세크레틴·GIP(위 억제 펩타이드) — 특히 지방 많은 유미즙이 자극해 위 배출·연동을 늦춘다"}, {"id": "G1-218", "q": "반추동물(소·양)의 위 4실과 소화 순서는?", "a": "혹위(rumen)·벌집위(reticulum)에서 미생물이 셀룰로오스 발효 → 되새김(cud 재저작) → 겹주름위(omasum, 수분 흡수) → 주름위(abomasum, 효소 소화·진짜 위)"}]}]}, {"id": "H", "name": "동물의 수송과 배설", "chapters": [{"label": "43 수송 시스템", "cards": [{"id": "H0-0", "q": "확산(diffusion)이란?", "a": "분자들이 열운동에 의해 농도차를 따라 이동하는 현상"}, {"id": "H0-1", "q": "다세포 동물에서 순환계가 필요한 이유는?", "a": "교환표면과 각 세포 사이 거리가 멀어 단순확산만으로는 물질 이동이 비효율적이기 때문"}, {"id": "H0-2", "q": "폐쇄순환계(closed circulatory system)란?", "a": "혈액이 혈관 안에서만 순환하는 순환계"}, {"id": "H0-3", "q": "개방순환계(open circulatory system)란?", "a": "혈림프가 혈관을 떠나 체강을 직접 적시는 순환계"}, {"id": "H0-4", "q": "폐쇄순환계에서 혈액과 세포사이액은 구별되는가?", "a": "예, 구별된다"}, {"id": "H0-5", "q": "개방순환계의 순환액을 무엇이라 하는가?", "a": "혈림프"}, {"id": "H0-6", "q": "곤충의 개방순환계에서 혈림프 순환이 촉진되는 이유 한 가지는?", "a": "몸의 움직임이 체강을 눌러 순환을 돕기 때문"}, {"id": "H0-7", "q": "척추동물 순환계 기본 경로를 쓰면?", "a": "심장 -> 동맥 -> 세동맥 -> 모세혈관 -> 세정맥 -> 정맥 -> 심장"}, {"id": "H0-8", "q": "문맥(portal vein)이란?", "a": "두 모세혈관망 사이를 연결하는 정맥"}, {"id": "H0-9", "q": "대표적 문맥의 예는?", "a": "간문맥"}, {"id": "H0-10", "q": "심장으로 들어오는 혈액을 받아들이는 방은?", "a": "심방"}, {"id": "H0-11", "q": "심장에서 혈액을 내보내는 방은?", "a": "심실"}, {"id": "H0-12", "q": "동맥의 정의를 한 문장으로 쓰면?", "a": "혈액을 심장에서 바깥으로 보내는 혈관"}, {"id": "H0-13", "q": "정맥의 정의를 한 문장으로 쓰면?", "a": "혈액을 심장으로 되돌리는 혈관"}, {"id": "H0-14", "q": "정맥혈의 일반적 특징은?", "a": "산소가 적고 이산화탄소가 많다"}, {"id": "H0-15", "q": "동맥혈의 일반적 특징은?", "a": "산소가 많고 이산화탄소가 적다"}, {"id": "H0-16", "q": "어류의 심장 구조는?", "a": "1심방 1심실"}, {"id": "H0-17", "q": "양서류의 심장 구조는?", "a": "2심방 1심실"}, {"id": "H0-18", "q": "파충류의 일반적 심장 구조는?", "a": "2심방 불완전 2심실"}, {"id": "H0-19", "q": "조류의 심장 구조는?", "a": "2심방 2심실"}, {"id": "H0-20", "q": "포유류의 심장 구조는?", "a": "2심방 2심실"}, {"id": "H0-21", "q": "심방과 심실이 가장 완전히 분리된 척추동물 두 무리는?", "a": "조류와 포유류"}, {"id": "H0-22", "q": "단일순환을 하는 대표 척추동물은?", "a": "어류"}, {"id": "H0-23", "q": "이중순환을 하는 대표 척추동물은?", "a": "양서류, 파충류, 조류, 포유류"}, {"id": "H0-24", "q": "이중순환(double circulation)이란?", "a": "혈액이 한 바퀴 도는 동안 심장을 두 번 지나는 순환"}, {"id": "H0-25", "q": "포유류의 두 순환 고리는?", "a": "폐순환과 체순환"}, {"id": "H0-26", "q": "양서류의 폐 쪽 순환 고리 이름은?", "a": "폐피순환고리"}, {"id": "H0-27", "q": "폐순환이란?", "a": "심장과 폐 사이를 오가며 기체교환을 담당하는 순환"}, {"id": "H0-28", "q": "체순환이란?", "a": "심장과 몸조직 사이를 오가며 물질교환을 담당하는 순환"}, {"id": "H0-29", "q": "우심실에서 시작하는 순환은?", "a": "폐순환"}, {"id": "H0-30", "q": "좌심실에서 시작하는 순환은?", "a": "체순환"}, {"id": "H0-31", "q": "좌심방으로 돌아오는 혈액은 어디서 오는가?", "a": "폐정맥을 통해 폐에서 온다"}, {"id": "H0-32", "q": "우심방으로 돌아오는 혈액은 어디서 오는가?", "a": "상·하대정맥을 통해 몸조직에서 온다"}, {"id": "H0-33", "q": "포유류 순환에서 우심실 다음 혈관은?", "a": "폐동맥"}, {"id": "H0-34", "q": "폐모세혈관에서 일어나는 핵심은?", "a": "산소와 이산화탄소의 교환"}, {"id": "H0-35", "q": "폐에서 좌심방으로 돌아오는 혈관은?", "a": "폐정맥"}, {"id": "H0-36", "q": "좌심실에서 전신으로 혈액을 내보내는 큰 혈관은?", "a": "대동맥"}, {"id": "H0-37", "q": "심장 자체에 혈액을 공급하는 동맥은?", "a": "관상동맥"}, {"id": "H0-38", "q": "머리·목·팔에서 온 혈액이 모이는 큰 정맥은?", "a": "상대정맥"}, {"id": "H0-39", "q": "몸통·하체에서 온 혈액이 모이는 큰 정맥은?", "a": "하대정맥"}, {"id": "H0-40", "q": "방실판막(AV valve)이란?", "a": "심방과 심실 사이의 판막"}, {"id": "H0-41", "q": "오른쪽 방실판막의 이름은?", "a": "삼첨판"}, {"id": "H0-42", "q": "왼쪽 방실판막의 이름은?", "a": "이첨판 또는 승모판"}, {"id": "H0-43", "q": "반달판막(semilunar valve)이란?", "a": "심실과 동맥 사이에 있는 판막"}, {"id": "H0-44", "q": "폐동맥 쪽 반달판막은?", "a": "폐동맥판"}, {"id": "H0-45", "q": "대동맥 쪽 반달판막은?", "a": "대동맥판"}, {"id": "H0-46", "q": "판막의 기능은?", "a": "혈액의 역류를 막는 것"}, {"id": "H0-47", "q": "좌심실이 우심실보다 벽이 더 두꺼운 이유는?", "a": "전신으로 더 높은 압력의 혈액을 보내야 하기 때문"}, {"id": "H0-48", "q": "좌심실과 우심실의 일회박출량은 같은가?", "a": "예, 같다"}, {"id": "H0-49", "q": "수축기(systole)란?", "a": "심실이 수축해 혈액을 내보내는 시기"}, {"id": "H0- a": "4개"}, {"id": "H0-249", "q": "헤모글로빈 4 단위체의 구성은?", "a": "α사슬 2개 + β사슬 2개 (각 단위체의 헴에 Fe 1개)"}, {"id": "H0-250", "q": "헤모글로빈의 헴(heme) 중심 금속 이온은?", "a": "철(Fe)"}, {"id": "H0-251", "q": "헤모글로빈이 S자형(sigmoidal) 해리곡선을 보이는 이유는?", "a": "4차구조와 협동적 결합 때문"}, {"id": "H0-252", "q": "sigmoidal curve의 뜻은?", "a": "중간 구간에서 작은 변화가 큰 포화도 변화를 만드는 S자형 곡선"}, {"id": "H0-253", "q": "산소해리곡선의 x축은?", "a": "산소분압 PO2"}, {"id": "H0-254", "q": "산소해리곡선의 y축은?", "a": "헤모글로빈의 산소포화도"}, {"id": "H0-255", "q": "폐에서 PO2가 높은 이유로 헤모글로빈은 어떻게 되는가?", "a": "높게 산소화된다"}, {"id": "H0-256", "q": "휴식 조직에서 헤모글로빈이 산소를 일부 놓는 이유는?", "a": "조직 PO2가 폐보다 낮기 때문"}, {"id": "H0-257", "q": "운동 조직에서 더 많은 산소가 방출되는 이유는?", "a": "PO2가 더 낮고 CO2·H+·온도 등이 높기 때문"}, {"id": "H0-258", "q": "보어효과(Bohr effect)란?", "a": "pH 감소나 CO2 증가로 헤모글로빈의 산소친화도가 감소하는 현상"}, {"id": "H0-259", "q": "보어효과가 중요한 이유는?", "a": "대사 활발한 조직에 더 많은 산소를 전달할 수 있기 때문"}, {"id": "H0-260", "q": "산소친화도를 떨어뜨리는 조건 여섯 가지는?", "a": "PO2 감소, PCO2 증가, H+ 증가, pH 감소, 온도 증가, 2,3-BPG 증가"}, {"id": "H0-261", "q": "조건이 위와 같이 변하면 해리곡선은 어느 쪽으로 이동하는가?", "a": "오른쪽"}, {"id": "H0-262", "q": "오른쪽 이동의 의미는?", "a": "같은 PO2에서 산소를 더 쉽게 놓는다"}, {"id": "H0-263", "q": "왼쪽 이동의 의미는?", "a": "같은 PO2에서 산소를 더 잘 붙잡는다"}, {"id": "H0-264", "q": "미오글로빈(myoglobin)의 구조 수준은?", "a": "3차구조의 단일 폴리펩타이드"}, {"id": "H0-265", "q": "잠수 포유류 근육이 붉은 이유는?", "a": "미오글로빈 농도가 높기 때문"}, {"id": "H0-266", "q": "미오글로빈의 기능은?", "a": "근육 내 산소 저장"}, {"id": "H0-267", "q": "이산화탄소의 일부가 혈장에 용해된 형태로 직접 운반되는 비율은?", "a": "약 7%"}, {"id": "H0-268", "q": "대부분의 이산화탄소는 어떤 형태로 운반되는가?", "a": "탄산수소이온(HCO3-) 형태"}, {"id": "H0-269", "q": "CO2가 적혈구 안에서 물과 반응해 되는 것은?", "a": "탄산(H2CO3)"}, {"id": "H0-270", "q": "탄산은 곧 무엇으로 해리되는가?", "a": "H+와 HCO3-"}, {"id": "H0-271", "q": "이 과정의 핵심 효소는?", "a": "탄산탈수효소(carbonic anhydrase)"}, {"id": "H0-272", "q": "탄산탈수효소가 중요한 이유는?", "a": "CO2를 빠르게 HCO3- 형태로 전환해 운반과 배출을 돕기 때문"}, {"id": "H0-273", "q": "CO2 운반에서 혈장의 HCO3-가 중요한 이유는?", "a": "완충용액으로도 작용하기 때문"}, {"id": "H0-274", "q": "일산화탄소(CO)가 위험한 이유는?", "a": "헤모글로빈에 O2보다 훨씬 강하게 결합하기 때문"}, {"id": "H0-275", "q": "CO의 헤모글로빈 친화도는 O2의 대략 몇 배인가?", "a": "약 400배"}, {"id": "H0-276", "q": "일산화탄소 중독이 치명적인 이유를 한 문장으로 쓰면?", "a": "헤모글로빈이 산소 대신 CO를 잡아 산소 운반이 크게 줄기 때문"}, {"id": "H0-277", "q": "원심분리한 혈액의 세 층을 위에서부터 쓰면?", "a": "혈장(위) / 백혈구·혈소판(중간, buffy coat) / 적혈구(아래)"}, {"id": "H0-278", "q": "혈액응고의 3단계를 순서대로 쓰면?", "a": "혈관 손상·콜라겐 노출 → 혈소판 마개 → 피브린 응결체(혈병 안정화)"}, {"id": "H0-279", "q": "개방순환계와 폐쇄순환계를 비교하면?", "a": "개방순환은 혈림프가 체강을 적시고, 폐쇄순환은 혈액이 혈관 안에만 있다"}, {"id": "H0-280", "q": "동맥과 정맥을 비교하면?", "a": "동맥은 심장에서 나가고 벽이 두껍고, 정맥은 심장으로 돌아오며 판막이 있다"}, {"id": "H0-281", "q": "심방과 심실을 비교하면?", "a": "심방은 받는 방, 심실은 내보내는 방"}, {"id": "H0-282", "q": "단일순환과 이중순환을 비교하면?", "a": "단일순환은 한 바퀴에 심장을 한 번, 이중순환은 두 번 지난다"}, {"id": "H0-283", "q": "폐순환과 체순환을 비교하면?", "a": "폐순환은 폐와의 기체교환, 체순환은 몸조직과의 물질교환"}, {"id": "H0-284", "q": "혈압과 혈류속도를 비교하면 모세혈관이 특별한 이유는?", "a": "혈압과 유속이 낮아 물질교환에 유리하다"}, {"id": "H0-285", "q": "정맥 귀환과 림프 흐름의 공통점은?", "a": "둘 다 판막과 골격근 도움을 받아 심장 쪽으로 이동한다"}, {"id": "H0-286", "q": "혈장과 세포성 요소를 비교하면?", "a": "혈장은 운반·완충·삼투, 세포성 요소는 기체운반·면역·응고 담당"}, {"id": "H0-287", "q": "적혈구와 백혈구를 비교하면?", "a": "적혈구는 산소운반, 백혈구는 방어·면역"}, {"id": "H0-288", "q": "혈소판과 피브리노겐을 비교하면?", "a": "혈소판은 마개 형성, 피브리노겐은 피브린으로 바뀌어 응결체 형성"}, {"id": "H0-289", "q": "환기와 기체교환의 차이는?", "a": "환기는 공기를 들이마시고 내쉬는 것, 기체교환은 폐포와 혈액 또는 조직과 혈액 사이의 확산"}, {"id": "H0-290", "q": "헤모시아닌과 헤모글로빈을 비교하면?", "a": "헤모시아닌은 구리 기반, 헤모글로빈은 철 기반"}, {"id": "H0-291", "q": "헤모글로빈과 미오글로빈을 비교하면?", "a": "헤모글로빈은 혈액에서 운반, 미오글로빈은 근육에서 저장"}, {"id": "H0-292", "q": "물고기 아가미의 역류교환(countercurrent exchange)이란?", "a": "아가미 모세혈관의 혈액이 물 흐름과 반대 방향으로 흘러, 아가미 전 길이에서 물의 산소분압이 항상 혈액보다 높게 유지 → 산소 추출 효율을 극대화"}, {"id": "H0-293", "q": "태아 헤모글로빈(HbF)의 사슬 구성과 산소 친화도 특징은?", "a": "2α + 2γ 사슬로 구성; 모체 헤모글로빈(HbA, 2α2β)보다 산소 친화도가 높아 태반에서 모체의 산소를 태아 쪽으로 끌어온다"}, {"id": "H0-294", "q": "혈액에서 이산화탄소가 운반되는 3가지 형태와 대략 비율은?", "a": "혈장에 용해 약 7%, 카바미노헤모글로빈(Hb에 결합) 약 23%, 탄산수소이온(HCO₃⁻) 약 70%"}]}, {"label": "44 배설계", "cards": [{"id": "H1-0", "q": "삼투조절(osmoregulation)이란?", "a": "물과 용질의 획득·손실을 조절해 체액 농도를 좁은 범위로 유지하는 과정"}, {"id": "H1-1", "q": "질소 노폐물 3종류와 주로 배출하는 동물군은?", "a": "암모니아(수생·어류) / 요소(포유류·양서류·상어) / 요산(조류·파충류·곤충)"}, {"id": "H1-2", "q": "암모니아(ammonia)의 특징은?", "a": "독성이 매우 강해 많은 물로 즉시 희석·배출 — 수생동물이 주로 배출 (질소당 H 3개)"}, {"id": "H1-3", "q": "요소(urea)의 특징과 생성 장소는?", "a": "독성이 낮아 농축 배출 가능 / 간에서 암모니아+CO₂ 결합으로 생성 (질소당 H 2개)"}, {"id": "H1-4", "q": "요산(uric acid)의 장점과 비용은?", "a": "물에 안 녹아 물 손실을 최소화하며 배출 / 합성에 ATP가 많이 듦 (질소당 H 1개) — 사람은 축적 시 통풍(gout)"}, {"id": "H1-5", "q": "질소 노폐물의 독성·필요 물량 vs ATP 비용 순서는?", "a": "독성·물량: 암모니아 > 요소 > 요산 / ATP 비용: 요산 > 요소 > 암모니아"}, {"id": "H1-6", "q": "포유류 신장의 기본 구조는?", "a": "겉질(피질, cortex) + 속질(수질, medulla) + 속질 안의 빈 공간 신우(renal pelvis)"}, {"id": "H1-7", "q": "네프론(nephron)의 구성 3요소는?", "a": "사구체(토리) + 보우먼주머니(Bowman's capsule) + 세뇨관(tubule)"}, {"id": "H1-8", "q": "세뇨관에서 여과액이 흐르는 순서는?", "a": "보우먼주머니 → 근위세뇨관 → 헨레고리 하행지 → 상행지 → 원위세뇨관 → 집합관"}, {"id": "H1-9", "q": "여과액 처리(배설)의 4단계는?", "a": "여과 → 재흡수 → 분비 → 배설"}, {"id": "H1-10", "q": "사구체 여과막의 3층은?", "a": "유창내피세포, 사구체기저막, 족세포 틈막(slits)"}, {"id": "H1-11", "q": "사구체 여과를 가장 직접적으로 결정하는 힘은?", "a": "정수압과 교질삼투압의 균형"}, {"id": "H1-12", "q": "사구체 모세혈관 정수압은 여과를 촉진하는가 억제하는가?", "a": "촉진한다"}, {"id": "H1-13", "q": "보우만주머니 공간의 정수압은 여과를 촉진하는가 억제하는가?", "a": "억제한다"}, {"id": "H1-14", "q": "혈장 단백질의 교질삼투압은 여과를 촉진하는가 억제하는가?", "a": "억제한다"}, {"id": "H1-15", "q": "사구체에서 적혈구가 거의 여과되지 않는 가장 직접적 이유는?", "a": "크기가 너무 크기 때문이다"}, {"id": "H1-16", "q": "사구체에서 알부민이 거의 여과되지 않는 중요한 이유 두 가지는?", "a": "크기가 크고 음전하를 띠기 때문이다"}, {"id": "H1-17", "q": "사구체 여과율(GFR)이란?", "a": "단위 시간당 보우만주머니로 여과되는 혈장량"}, {"id": "H1-18", "q": "원심세동맥이 수축하면 GFR은 대체로 어떻게 변하는가?", "a": "증가하는 경향이 있다"}, {"id": "H1-19", "q": "수입세동맥이 수축하면 GFR은 대체로 어떻게 변하는가?", "a": "감소하는 경향이 있다"}, {"id": "H1-20", "q": "여과분획(filtration fraction)이란?", "a": "신혈장유량 중 실제로 여과된 비율"}, {"id": "H1-21", "q": "사구체에서 자유롭게 여과되기 가장 쉬운 물질 유형은?", "a": "작고 비전하성인 용질"}, {"id": "H1-22", "q": "포도당은 사구체에서 정상적으로 여과되는가?", "a": "예"}, {"id": "H1-23", "q": "요소는 사구체에서 정상적으로 여과되는가?", "a": "예"}, {"id": "H1-24", "q": "이눌린이 GFR 측정에 쓰이는 이유는?", "a": "자유롭게 여과되고 재흡수·분비되지 않기 때문이다"}, {"id": "H1-25", "q": "크레아티닌이 GFR 추정에 쓰이는 이유는?", "a": "여과가 주이고 분비는 소량이라 근사적으로 GFR을 반영하기 때문이다"}, {"id": "H1-26", "q": "사구체 여과장벽 손상 시 소변에서 가장 먼저 비정상적으로 검출되기 쉬운 단백질은?", "a": "알부민"}, {"id": "H1-27", "q": "여과된 물질이 신세뇨관으로 들어간 뒤 다시 혈액으로 돌아가는 과정을 무엇이라 하는가?", "a": "재흡수"}, {"id": "H1-28", "q": "혈액에서 세뇨관 내강으로 추가로 이동하는 과정을 무엇이라 하는가?", "a": "분비"}, {"id": "H1-29", "q": "세뇨관에서 능동수송으로 재흡수되는 물질 vs 수동수송으로 재흡수되는 물질은?", "a": "능동: 포도당·아미노산·Na⁺·K⁺ / 수동: HCO₃⁻·Cl⁻·H₂O·요산"}, {"id": "H1-30", "q": "세뇨관에서 능동수송으로 분비되는 대표 물질은?", "a": "H⁺·K⁺·히스타민·유기산(약물·독소 등)"}, {"id": "H1-31", "q": "근위세뇨관(PCT)에서 가장 많은 양이 재흡수되는 것은?", "a": "여과된 물과 Na+의 대부분"}, {"id": "H1-32", "q": "근위세뇨관 세포의 솔가장자리(brush border)가 중요한 이유는?", "a": "재흡수 표면적을 크게 늘리기 때문이다"}, {"id": "H1-33", "q": "근위세뇨관 기저외측막의 핵심 펌프는?", "a": "Na+/K+-ATPase"}, {"id": "H1-34", "q": "근위세뇨관에서 Na+/K+-ATPase가 중요한 이유는?", "a": "세포 내 Na+를 낮게 유지해 여러 2차 능동수송을 가능하게 하기 때문이다"}, {"id": "H1-35", "q": "근위세뇨관에서 포도당 재흡수는 주로 어떤 방식인가?", "a": "Na+-포도당 공동수송(SGLT)에 의한 2차 능동수송"}, {"id": "H1-36", "q": "근위세뇨관에서 아미노산 재흡수는 주로 어떤 방식인가?", "a": "Na+와의 2차 능동수송"}, {"id": "H1-37", "q": "근위세뇨관에서 포도당은 정상적으로 거의 어느 정도 재흡수되는가?", "a": "거의 100%"}, {"id": "H1-38", "q": "포도당이 소변으로 나오기 시작하는 직접적 이유는?", "a": "수송 최대치(Tm)를 초과해 재흡수기가 포화되기 때문이다"}, {"id": "H1-39", "q": "근위세뇨관 초기에 포도당 재흡수에 주로 관여하는 운반체는?", "a": "SGLT2"}, {"id": "H1-40", "q": "근위세뇨관 말단에서 남은 포도당 재흡수에 더 관여하는 운반체는?", "a": "SGLT1"}, {"id": "H1-41", "q": "SGLT2와 SGLT1의 Na⁺:포도당 비율·친화도 차이는?", "a": "SGLT2(초기 PCT): Na:G=1:1, 저친화·고용량(대부분 재흡수) / SGLT1(후반 PCT): Na:G=2:1, 고친화·저용량(남은 포도당)"}, {"id": "H1-42", "q": "근위세뇨관 세포 기저외측막에서 포도당이 혈액으로 나가는 방식은?", "a": "촉진확산(GLUT)"}, {"id": "H1-43", "q": "근위세뇨관에서 HCO3- 재흡수는 H+ 분비와 어떤 관계가 있는가?", "a": "분비된 H+가 여과된 HCO3-와 반응한 뒤 탄산무수효소를 거쳐 간접적으로 재흡수된다"}, {"id": "H1-44", "q": "근위세뇨관 관강막에서 H+ 분비에 중요한 대표 운반체는?", "a": "Na+/H+ exchanger (NHE3)"}, {"id": "H1-45", "q": "근위세뇨관에서 탄산무수효소가 중요한 이유는?", "a": "H2CO3와 CO2/H2O 전환을 촉진해 HCO3- 재흡수를 가능하게 하기 때문이다"}, {"id": "H1-46", "q": "근위세뇨관에서 물 재흡수는 주로 어떤 성격을 가지는가?", "a": "등삼투성 재흡수"}, {"id": "H1-47", "q": "근위세뇨관에서 물 이동은 주로 무엇을 따라가는가?", "a": "Na+와 다른 용질 재흡수로 생긴 삼투기울기"}, {"id": "H1-48", "q": "근위세뇨관에서 물 이동에 중요한 수로 단백질은?", "a": "AQP1"}, {"id": "H1-49", "q": "근위세뇨관에서 Cl- 재흡수는 초기보다 후반부에서 상대적으로 더 중요한 이유는?", "a": "초기에는 HCO3-와 유기용질 재흡수가 많아 관강 내 Cl- 농도가 상대적으로 증가하기 때문이다"}, {"id": "H1-50", "q": "근위세뇨관에서 요소(urea)는 주로 어떤 방식으로 재흡수되는가?", "a": "물 재흡수에 따른 농도 상승 후 수동적 재흡수"}, {"id": "H1-51", "q": "근위세뇨관에서 인산(phosphate) 재흡수는 주로 어떤 방식인가?", "a": "Na+와의 공동수송"}, {"id": "H1-52", "q": "PTH는 근위세뇨관의 인산 재흡수에 어떤 영향을 주는가?", "a": "억제한다"}, {"id": "H1-53", "q": "근위세뇨관에서 요산은 어떤 특징을 보이는가?", "a": "재흡수와 분비가 모두 일어난다"}, {"id": "H1-54", "q": "PAH가 신혈장유량 측정에 이용되는 이유는?", "a": "여과되고 강하게 분비되어 거의 한 번 통과 시 제거되기 때문이다"}, {"id": "H1-55", "q": "근위세뇨관에서 유기산·유기염기 분비의 의미는?", "a": "약물·독성물질 제거에 중요하다"}, {"id": "H1-56", "q": "근위세뇨관에서 재흡수된 용질과 물이 혈액으로 돌아갈 때 주로 들어가는 혈관은?", "a": "주위모세혈관(peritubular capillaries)"}, {"id": "H1-57", "q": "사구체보다 주위모세혈관이 재흡수에 유리한 이유는?", "a": "정수압이 낮고 교질삼투압이 높기 때문이다"}, {"id": "H1-58", "q": "근위세뇨관에서 Na+ 재흡수의 주요 구동력은?", "a": "기저외측 Na+/K+-ATPase"}, {"id": "H1-59", "q": "근위세뇨관에서 K+는 주로 어떻게 재흡수되는가?", "a": "물 이동을 따라가는 용매견인(solvent drag)과 수동 이동"}, {"id": "H1-60", "q": "근위세뇨관 손상 시 가장 먼저 소변에 증가하기 쉬운 정상 재흡수 물질의 예는?", "a": "포도당 또는 아미노산"}, {"id": "H1-61", "q": "Fanconi syndrome의 핵심은 어느 부위 재흡수 장애인가?", "a": "근위세뇨관"}, {"id": "H1-62", "q": "SGLT2 억제제가 혈당을 낮추는 직접 기전은?", "a": "근위세뇨관 포도당 재흡수를 줄여 요당 배출을 늘리는 것"}, {"id": "H1-63", "q": "근위세뇨관에서 H+ 분비 증가는 산-염기 항상성에 어떤 의미가 있는가?", "a": "HCO3- 재흡수와 산 배설에 기여한다"}, {"id": "H1-64", "q": "근위세뇨관에서 NH4+ 생성의 전구 아미노산으로 중요한 것은?", "a": "글루타민"}, {"id": "H1-65", "q": "근위세뇨관 암모니아 생성(ammoniagenesis)의 의미는?", "a": "H+ 배설과 새로운 HCO3- 생성에 기여한다"}, {"id": "H1-66", "q": "근위세뇨관 재흡수의 전체적 특징을 한 문장으로 쓰면?", "a": "대량의 용질과 물을 등삼투성으로 회수하는 구간이다"}, {"id": "H1-67", "q": "얇은 하행각(thin descending limb)의 가장 큰 특징은?", "a": "물에 매우 잘 투과되고 NaCl에는 상대적으로 덜 투과된다"}, {"id": "H1-68", "q": "얇은 하행각에서 물 이동의 방향은?", "a": "세뇨관 내강 → 고삼투성 수질 간질"}, {"id":
