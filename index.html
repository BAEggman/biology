"H1-69", "q": "얇은 하행각에서 물 재흡수의 직접 원인은?", "a": "수질 간질의 높은 삼투압"}, {"id": "H1-70", "q": "얇은 하행각에 AQP1이 풍부하다는 사실의 의미는?", "a": "물이 쉽게 재흡수된다는 뜻"}, {"id": "H1-71", "q": "얇은 하행각을 따라 내려갈수록 세뇨관액 삼투농도는 어떻게 되는가?", "a": "증가한다"}, {"id": "H1-72", "q": "얇은 하행각에서 용질보다 물 이동이 더 중요한 이유는?", "a": "이 구간은 주로 물 투과성이 매우 높기 때문이다"}, {"id": "H1-73", "q": "헨레고리 하행각이 농축뇨 형성에 중요한 이유는?", "a": "물이 빠져나가 세뇨관액을 농축시키기 때문이다"}, {"id": "H1-74", "q": "수질 삼투기울기가 소실되면 하행각에서 가장 직접적으로 줄어드는 것은?", "a": "물 재흡수"}, {"id": "H1-75", "q": "하행각에서 물이 빠져나가면 세뇨관액과 간질 사이의 차이는 어떻게 변하는가?", "a": "세뇨관액이 간질과 비슷하게 더 농축된다"}, {"id": "H1-76", "q": "하행각의 기능을 한 문장으로 쓰면?", "a": "고삼투성 수질 환경을 이용해 물을 재흡수하는 구간"}, {"id": "H1-77", "q": "하행각이 물에는 잘 투과되지만 NaCl에는 상대적으로 덜 투과된다는 점의 생리적 의미는?", "a": "물만 빠져나가 세뇨관액이 효과적으로 농축된다"}, {"id": "H1-78", "q": "하행각에서 요소는 어느 정도 이동할 수 있는가?", "a": "일부 수동 이동 가능"}, {"id": "H1-79", "q": "짧은 loop보다 긴 loop of Henle가 농축뇨에 유리한 이유는?", "a": "더 큰 수질 삼투기울기를 형성·활용할 수 있기 때문이다"}, {"id": "H1-80", "q": "얇은 하행각에서 수동적 물 이동이 가능한 에너지원은?", "a": "삼투기울기"}, {"id": "H1-81", "q": "얇은 하행각과 굵은 상행각의 가장 큰 대비점은?", "a": "하행각은 물이 잘 통과하고, 굵은 상행각은 물이 거의 통과하지 않는다"}, {"id": "H1-82", "q": "얇은 상행각(thin ascending limb)의 핵심 특징은?", "a": "NaCl은 수동적으로 나가지만 물은 거의 통과하지 않는다"}, {"id": "H1-83", "q": "굵은 상행각(thick ascending limb, TAL)의 핵심 특징은?", "a": "Na+, K+, Cl-를 능동적으로 재흡수하지만 물은 거의 통과하지 않는다"}, {"id": "H1-84", "q": "굵은 상행각 관강막의 대표 수송체는?", "a": "NKCC2"}, {"id": "H1-85", "q": "NKCC2의 의미는?", "a": "Na+-K+-2Cl- 공동수송체"}, {"id": "H1-86", "q": "굵은 상행각 기저외측막에서 Na+를 혈액 쪽으로 내보내는 핵심 펌프는?", "a": "Na+/K+-ATPase"}, {"id": "H1-87", "q": "굵은 상행각에서 K+가 관강으로 되새는 이유는?", "a": "NKCC2 작동에 필요한 K+ 순환을 위해 ROMK 등을 통해 다시 관강으로 나가기 때문이다"}, {"id": "H1-88", "q": "굵은 상행각이 '희석 분절(diluting segment)'이라 불리는 이유는?", "a": "용질은 재흡수하지만 물은 따라가지 못해 세뇨관액이 묽어지기 때문이다"}, {"id": "H1-89", "q": "굵은 상행각에서 물이 거의 재흡수되지 않는 직접 이유는?", "a": "물 투과성이 매우 낮기 때문이다"}, {"id": "H1-90", "q": "굵은 상행각의 NaCl 재흡수가 수질 삼투기울기에 중요한 이유는?", "a": "수질 간질을 고삼투성으로 만드는 핵심 단계이기 때문이다"}, {"id": "H1-91", "q": "loop diuretic이 작용하는 주요 부위는?", "a": "굵은 상행각"}, {"id": "H1-92", "q": "furosemide의 직접 표적은?", "a": "NKCC2"}, {"id": "H1-93", "q": "loop diuretic 투여 시 소변량이 증가하는 직접 이유는?", "a": "NaCl 재흡수 감소와 수질 삼투기울기 약화로 물 재흡수가 줄기 때문이다"}, {"id": "H1-94", "q": "굵은 상행각에서 양전하의 관강전위가 생기는 이유는?", "a": "K+가 일부 관강으로 되새기기 때문이다"}, {"id": "H1-95", "q": "굵은 상행각의 관강 양전위는 어떤 이온의 세포사이(paracellular) 재흡수를 돕는가?", "a": "Ca2+와 Mg2+"}, {"id": "H1-96", "q": "굵은 상행각이 Ca2+와 Mg2+ 재흡수에 중요한 이유는?", "a": "관강 양전위가 세포사이 수동 이동을 촉진하기 때문이다"}, {"id": "H1-97", "q": "굵은 상행각 기능 저하 시 저마그네슘혈증이 생길 수 있는 이유는?", "a": "Mg2+ 재흡수가 감소하기 때문이다"}, {"id": "H1-98", "q": "굵은 상행각에서 염 재흡수는 되지만 물이 못 따라간다는 사실의 결과는?", "a": "관강액의 삼투농도 감소"}, {"id": "H1-99", "q": "상행각 전체의 공통된 중요한 특징은?", "a": "물 투과성이 낮다는 점"}, {"id": "H1-100", "q": "하행각과 상행각의 물질 이동 차이를 한 문장으로 쓰면?", "a": "하행각은 물 재흡수, 상행각은 주로 염 재흡수에 특화된다"}, {"id": "H1-101", "q": "헨레고리 상행각의 역할을 압축하면?", "a": "수질 삼투기울기 형성과 관강액 희석"}, {"id": "H1-102", "q": "Bartter syndrome이 NKCC2와 관련되는 이유는?", "a": "굵은 상행각의 염 재흡수 이상이기 때문이다"}, {"id": "H1-103", "q": "굵은 상행각이 정상이어야 집합관에서 ADH가 잘 작동하는 이유는?", "a": "수질 삼투기울기가 유지되어야 ADH에 의한 물 재흡수가 가능하기 때문이다"}, {"id": "H1-104", "q": "굵은 상행각에서 Cl-는 최종적으로 어떻게 혈액 쪽으로 나가는가?", "a": "기저외측 Cl- 통로를 통해 확산된다"}, {"id": "H1-105", "q": "얇은 상행각보다 굵은 상행각이 더 강력한 수질 기울기 형성에 기여하는 이유는?", "a": "능동적 NaCl 재흡수가 가능하기 때문이다"}, {"id": "H1-106", "q": "상행각 차단 시 농축뇨 능력이 떨어지는 핵심 이유는?", "a": "수질 간질 고삼투성이 약화되기 때문이다"}, {"id": "H1-107", "q": "초기 원위세뇨관(early DCT)의 대표 기능은?", "a": "NaCl 재흡수와 관강액 추가 희석"}, {"id": "H1-108", "q": "초기 원위세뇨관 관강막의 대표 수송체는?", "a": "NCC"}, {"id": "H1-109", "q": "NCC의 의미는?", "a": "Na+-Cl- 공동수송체"}, {"id": "H1-110", "q": "thiazide 이뇨제의 대표 작용 부위는?", "a": "초기 원위세뇨관"}, {"id": "H1-111", "q": "thiazide의 직접 표적은?", "a": "NCC"}, {"id": "H1-112", "q": "초기 원위세뇨관도 희석 분절인 이유는?", "a": "NaCl은 재흡수하지만 물 투과성이 낮기 때문이다"}, {"id": "H1-113", "q": "초기 원위세뇨관에서 Ca2+ 재흡수는 어떤 호르몬에 의해 증가하는가?", "a": "PTH"}, {"id": "H1-114", "q": "PTH가 초기 원위세뇨관에서 증가시키는 물질 이동은?", "a": "Ca2+ 재흡수"}, {"id": "H1-115", "q": "초기 원위세뇨관에서 물 투과성이 낮다는 의미는?", "a": "용질 재흡수 후 관강액이 더 묽어진다는 뜻"}, {"id": "H1-116", "q": "굵은 상행각과 초기 원위세뇨관의 공통점은?", "a": "둘 다 염 재흡수에 비해 물 투과성이 낮아 관강액을 희석시킨다"}, {"id": "H1-117", "q": "초기 원위세뇨관에서 Na+ 재흡수의 기본 구동력은?", "a": "기저외측 Na+/K+-ATPase"}, {"id": "H1-118", "q": "thiazide 투여 시 소변 NaCl 배설이 늘어나는 직접 이유는?", "a": "NCC 억제로 NaCl 재흡수가 줄기 때문이다"}, {"id": "H1-119", "q": "초기 원위세뇨관의 핵심 임상 포인트를 한 문장으로 쓰면?", "a": "NCC를 통한 NaCl 재흡수와 PTH에 의한 Ca2+ 재흡수 조절"}, {"id": "H1-120", "q": "초기 원위세뇨관에서 Ca2+ 재흡수 증가가 혈중 Ca2+에 미치는 영향은?", "a": "증가시키는 방향"}, {"id": "H1-121", "q": "초기 원위세뇨관 기능이 강하면 관강액 삼투농도는 어떻게 되는가?", "a": "더 감소한다"}, {"id": "H1-122", "q": "후기 원위세뇨관과 피질 집합관의 주세포(principal cell)가 주로 다루는 물질은?", "a": "Na+, K+, 물"}, {"id": "H1-123", "q": "주세포 관강막의 대표 Na+ 통로는?", "a": "ENaC"}, {"id": "H1-124", "q": "주세포에서 Na+가 재흡수되면 K+ 분비가 촉진되는 이유는?", "a": "관강이 상대적으로 음전하가 되어 K+ 분비가 유리해지기 때문이다"}, {"id": "H1-125", "q": "주세포에서 K+가 관강으로 나가는 대표 통로는?", "a": "ROMK"}, {"id": "H1-126", "q": "알도스테론은 주세포에서 무엇을 증가시키는가?", "a": "ENaC, Na+/K+-ATPase, K+ 분비"}, {"id": "H1-127", "q": "알도스테론의 결과로 소변 Na+ 배설은 어떻게 되는가?", "a": "감소한다"}, {"id": "H1-128", "q": "알도스테론의 결과로 소변 K+ 배설은 어떻게 되는가?", "a": "증가한다"}, {"id": "H1-129", "q": "ADH는 주세포의 어느 단백질을 증가시켜 물 재흡수를 늘리는가?", "a": "AQP2"}, {"id": "H1-130", "q": "AQP2는 어느 막에 삽입되는가?", "a": "관강막(apical membrane)"}, {"id": "H1-131", "q": "AQP3와 AQP4는 주로 어디에 존재하는가?", "a": "기저외측막"}, {"id": "H1-132", "q": "ADH가 없으면 집합관의 물 투과성은 어떻게 되는가?", "a": "낮다"}, {"id": "H1-133", "q": "ADH가 증가하면 소변 삼투농도는 어떻게 되는가?", "a": "증가한다"}, {"id": "H1-134", "q": "ADH가 증가하면 소변량은 어떻게 되는가?", "a": "감소한다"}, {"id": "H1-135", "q": "주세포에서 물 재흡수의 직접 구동력은?", "a": "고삼투성 수질 간질"}, {"id": "H1-136", "q": "주세포 기능을 한 문장으로 요약하면?", "a": "Na+를 재흡수하고 K+를 분비하며 ADH에 따라 물 투과성을 조절한다"}, {"id": "H1-137", "q": "ENaC를 차단하는 이뇨제가 K+ 보존성인 이유는?", "a": "Na+ 재흡수와 그에 연동된 K+ 분비를 줄이기 때문이다"}, {"id": "H1-138", "q": "고칼륨혈증이 알도스테론 분비를 자극하는 생리적 의미는?", "a": "K+ 배설을 늘리기 위해서"}, {"id": "H1-139", "q": "주세포에서 Na+ 재흡수가 증가하면 체액량에 어떤 방향의 영향을 주는가?", "a": "증가시키는 방향"}, {"id": "H1-140", "q": "집합관에서 최종 소변 농축 정도가 크게 결정되는 직접 요소 두 가지는?", "a": "ADH와 수질 삼투기울기"}, {"id": "H1-141", "q": "A형 사이세포(alpha-intercalated cell)의 핵심 기능은?", "a": "H+ 분비와 HCO3- 재흡수"}, {"id": "H1-142", "q": "B형 사이세포(beta-intercalated cell)의 핵심 기능은?", "a": "HCO3- 분비와 H+ 재흡수"}, {"id": "H1-143", "q": "산증에서 특히 활성화되기 쉬운 세포는?", "a": "A형 사이세포"}, {"id": "H1-144", "q": "알칼리증에서 특히 활성화되기 쉬운 세포는?", "a": "B형 사이세포"}, {"id": "H1-145", "q": "A형 사이세포 관강막의 대표 H+ 분비 기전은?", "a": "H+-ATPase 또는 H+/K+-ATPase"}, {"id": "H1-146", "q": "A형 사이세포에서 새로 생성된 HCO3-는 어디로 이동하는가?", "a": "혈액 쪽으로 재흡수된다"}, {"id": "H1-147", "q": "B형 사이세포에서는 Cl-/HCO3- 교환기의 방향이 A형과 어떻게 다른가?", "a": "반대 방향이다"}, {"id": "H1-148", "q": "집합관이 산-염기 항상성에 중요한 이유는?", "a": "가변적으로 H+와 HCO3- 이동을 조절할 수 있기 때문이다"}, {"id": "H1-149", "q": "암모니아(NH3)가 집합관에서 중요한 이유는?", "a": "H+와 결합해 NH4+로 trapping되어 산 배설을 돕기 때문이다"}, {"id": "H1-150", "q": "NH4+ trapping의 생리적 의미는?", "a": "산을 비휘발성 형태로 소변에 배설할 수 있게 하는 것"}, {"id": "H1-151", "q": "산증에서 암모니아 생성과 배설이 증가하는 이유는?", "a": "H+를 더 많이 제거하고 새 HCO3-를 보충하기 위해"}, {"id": "H1-152", "q": "집합관에서 H+ 분비가 증가하면 소변 pH는 대체로 어떻게 되는가?", "a": "감소한다"}, {"id": "H1-153", "q": "산-염기 조절에서 근위세뇨관과 집합관의 역할 차이를 한 문장으로 쓰면?", "a": "근위세뇨관은 대량 HCO3- 회수, 집합관은 미세조정과 최종 산 배설을 담당한다"}, {"id": "H1-154", "q": "A형 사이세포가 H+/K+ 교환을 통해 가질 수 있는 추가 기능은?", "a": "K+ 재흡수"}, {"id": "H1-155", "q": "심한 저칼륨혈증에서 H+/K+-ATPase 활성 변화가 중요한 이유는?", "a": "K+ 보존과 산-염기 상태 변화에 영향을 주기 때문이다"}, {"id": "H1-156", "q": "A형 사이세포 활성 증가가 혈액에 미치는 직접 효과는?", "a": "HCO3- 증가와 산성부하 감소"}, {"id": "H1-157", "q": "B형 사이세포 활성 증가가 혈액에 미치는 직접 효과는?", "a": "HCO3- 감소와 알칼리부하 완화"}, {"id": "H1-158", "q": "사이세포는 주세포와 달리 무엇에 더 특화되어 있는가?", "a": "산-염기 조절"}, {"id": "H1-159", "q": "집합관에서 최종적으로 산 배설이 가능해지는 두 방식은?", "a": "적정산 배설과 NH4+ 배설"}, {"id": "H1-160", "q": "산-염기 이상에서 집합관 문제를 의심하는 핵심 단서는?", "a": "소변 pH 조절 이상과 H+/HCO3- 이동 장애"}, {"id": "H1-161", "q": "내수질 집합관(IMCD)에서 ADH가 증가시키는 중요한 물질 이동 두 가지는?", "a": "물 재흡수와 요소(urea) 투과성 증가"}, {"id": "H1-162", "q": "ADH가 내수질 집합관 요소 투과성을 높이는 이유는?", "a": "수질 삼투기울기를 강화해 물 재흡수를 돕기 위해"}, {"id": "H1-163", "q": "요소 재순환(urea recycling)이란?", "a": "집합관에서 나온 요소가 헨레고리와 수질 간질을 거쳐 다시 집합관에 기여하는 현상"}, {"id": "H1-164", "q": "요소 재순환의 핵심 생리적 의미는?", "a": "신수질 고삼투성 유지"}, {"id": "H1-165", "q": "내수질의 높은 삼투농도는 주로 무엇들로 이루어지는가?", "a": "NaCl과 요소"}, {"id": "H1-166", "q": "바사 렉타(vasa recta)의 기능은?", "a": "수질 삼투기울기를 보존하면서 재흡수된 물과 용질을 운반하는 것"}, {"id": "H1-167", "q": "바사 렉타가 역류교환기(countercurrent exchanger)인 이유는?", "a": "내려갈 때와 올라갈 때 용질·물 교환으로 수질 기울기를 보존하기 때문"}, {"id": "H1-168", "q": "헨레고리 굵은 상행각은 역류증폭기(countercurrent multiplier)라고 불리는 이유는?", "a": "작은 수평 기울기를 길이 방향 큰 수질 기울기로 증폭하기 때문"}, {"id": "H1-169", "q": "역류증폭기의 핵심 조건 두 가지는?", "a": "상행각의 NaCl 재흡수와 하행각의 물 투과성"}, {"id": "H1-170", "q": "수질 삼투기울기가 크면 집합관에서 어떤 일이 가능해지는가?", "a": "ADH 존재 시 강한 물 재흡수와 농축뇨 형성"}, {"id": "H1-171", "q": "ADH가 없어도 수질 삼투기울기가 존재할 수 있는가?", "a": "예"}, {"id": "H1-172", "q": "수질 삼투기울기는 있는데 ADH가 없으면 소변은 어떻게 되는가?", "a": "묽고 양이 많다"}, {"id": "H1-173", "q": "ADH는 있는데 수질 삼투기울기가 무너지면 소변 농축이 어려운 이유는?", "a": "물을 끌어낼 삼투 구동력이 부족하기 때문이다"}, {"id": "H1-174", "q": "loop diuretic이 농축뇨를 약화시키는 핵심 이유는?", "a": "수질 NaCl 기울기를 약화시키기 때문이다"}, {"id": "H1-175", "q": "내수질 집합관에서 요소 투과성이 낮으면 물 재흡수는 어떻게 되는가?", "a": "감소하는 경향이 있다"}, {"id": "H1-176", "q": "장기간 탈수 시 요소 재순환이 중요한 이유는?", "a": "극대 농축뇨 형성에 기여하기 때문이다"}, {"id": "H1-177", "q": "역류교환기인 바사 렉타가 너무 빠른 혈류를 가지면 문제가 되는 이유는?", "a": "수질 기울기가 washout되기 때문이다"}, {"id": "H1-178", "q": "수질 기울기 보존에 유리한 바사 렉타의 구조적 특징은?", "a": "U자형의 느린 혈류"}, {"id": "H1-179", "q": "집합관-요소-바사 렉타의 관계를 한 문장으로 쓰면?", "a": "집합관과 요소 재순환이 기울기를 만들고 바사 렉타가 그 기울기를 보존한다"}, {"id": "H1-180", "q": "ADH 분비의 가장 직접적인 자극 두 가지는?", "a": "혈장 삼투농도 증가, 유효순환혈량 감소"}, {"id": "H1-181", "q": "알도스테론 분비의 주요 자극 두 가지는?", "a": "안지오텐신 II 증가, 혈중 K+ 증가"}, {"id": "H1-182", "q": "ANP의 신장 작용을 한 문장으로 쓰면?", "a": "Na+ 재흡수와 RAAS를 억제해 나트륨과 물 배설을 늘린다"}, {"id": "H1-183", "q": "PTH는 신장에서 Ca2+와 인산 이동에 각각 어떤 영향을 주는가?", "a": "Ca2+ 재흡수 증가, 인산 재흡수 감소"}, {"id": "H1-184", "q": "안지오텐신 II가 근위세뇨관 Na+ 재흡수에 미치는 영향은?", "a": "증가시킨다"}, {"id": "H1-185", "q": "ADH와 알도스테론의 공통점은?", "a": "둘 다 체액량 유지에 기여한다"}, {"id": "H1-186", "q": "ADH와 알도스테론의 차이를 한 문장으로 쓰면?", "a": "ADH는 물 투과성, 알도스테론은 Na+/K+ 수송을 주로 조절한다"}, {"id": "H1-187", "q": "고칼륨혈증에서 신장이 보상적으로 증가시키는 호르몬과 세포는?", "a": "알도스테론, 주세포"}, {"id": "H1-188", "q": "대량 출혈 시 ADH와 RAAS가 동시에 활성화되는 이유는?", "a": "혈압과 유효순환혈량을 회복하기 위해"}, {"id": "H1-189", "q": "체액 과다 시 ANP가 이뇨와 나트륨배설을 늘리는 이유는?", "a": "혈액량과 혈압을 낮추기 위해"}, {"id": "H1-190", "q": "배설계의 진화적 계열(동물군별)은?", "a": "불꽃세포/원신관(편형동물, 플라나리아) → 후신관/신관(환형동물, 지렁이) → 말피기관(절지동물, 곤충) → 신장(척추동물)"}, {"id": "H1-191", "q": "사구체곁장치(JGA)의 구성과 세뇨관사구체 되먹임(TGF)은?", "a": "구성 = 수입세동맥 과립세포(레닌 분비) + 치밀반(macula densa, 원위세뇨관 NaCl 농도 감지) + 사구체간질세포(mesangial). 치밀반이 NaCl↑를 감지하면 수입세동맥을 수축시켜 GFR을 낮춤(TGF); 혈압↓ 시 과립세포가 레닌을 분비"}]}]}, {"id": "I", "name": "바이러스·생명공학", "chapters": [{"label": "19 바이러스", "cards": [{"id": "I0-1", "q": "바이러스의 기본 정의는?", "a": "세포 구조가 없는 절대 세포 내 기생체(obligate intracellular parasite); 대사효소·리보솜이 없어 숙주의 효소·리보솜·뉴클레오티드·ATP를 빌려 증식"}, {"id": "I0-2", "q": "숙주 밖에서 바이러스의 상태는?", "a": "'전달 중인 유전자 꾸러미'에 불과(비활성)"}, {"id": "I0-3", "q": "베이에링크(Beijerinck)가 담배모자이크병으로 밝힌 것은?", "a": "병원체가 세균 여과기를 통과하고(세균 아님) 식물 안에서 스스로 증식한다는 것 → 바이러스 개념의 출발"}, {"id": "I0-4", "q": "스탠리(Stanley)가 보인 바이러스의 특징은?", "a": "일부 바이러스는 결정(crystal)으로 정제됨 (세포는 결정화 불가)"}, {"id": "I0-5", "q": "바이러스의 크기 범위는?", "a": "약 20 nm(리보솜보다 작음) ~ 1,500 nm"}, {"id": "I0-6", "q": "바이러스의 유전자 수 범위는?", "a": "가장 작은 것 3개 ~ 큰 것 수백~2,000개"}, {"id": "I0-7", "q": "바이러스의 숙주 범위(감염 대상)는?", "a": "세균·고세균·진균·원생생물·동물·식물 모두 감염"}, {"id": "I0-8", "q": "바이러스 입자의 기본 구성 3요소는?", "a": "핵산(유전체) + 단백질 캡시드 ± 외피(envelope)"}, {"id": "I0-9", "q": "캡시드를 이루는 반복 단백질 소단위의 이름은?", "a": "캡소미어(capsomere)"}, {"id": "I0-10", "q": "캡시드 3가지 형태와 대표 예는?", "a": "나선형(helical, TMV) / 정이십면체(icosahedral, 아데노바이러스) / 복잡형(complex, T-even 파지)"}, {"id": "I0-11", "q": "TMV의 캡시드 형태는?", "a": "나선형(단백질 1,000여 개가 나선 배열, 막대 모양)"}, {"id": "I0-12", "q": "아데노바이러스의 캡시드 형태는?", "a": "정이십면체(20개 삼각면, 252개 단백질)"}, {"id": "I0-13", "q": "T-even 파지(T2·T4·T6)의 캡시드 형태는?", "a": "복잡형(정이십면체 머리 + 꼬리·꼬리섬유)"}, {"id": "I0-14", "q": "외피(envelope)의 구성은?", "a": "숙주세포 막 유래 인지질 + 숙주 막단백 + 바이러스 당단백(글리코단백); 인플루엔자 등 동물 바이러스에 흔함"}, {"id": "I0-15", "q": "가장 복잡한 캡시드를 가진 바이러스 부류는?", "a": "박테리오파지(파지)"}, {"id": "I0-16", "q": "세포 생물 vs 바이러스의 유전물질 차이는?", "a": "세포는 항상 dsDNA / 바이러스는 ds·ssDNA 또는 ds·ssRNA 모두 가능"}, {"id": "I0-17", "q": "인플루엔자 입자 내부 유전체 구성은?", "a": "8개의 분절 (−)RNA-단백질 복합체(각각 바이러스 중합효소 결합)"}, {"id": "I0-18", "q": "바이러스 복제의 5단계는?", "a": "결합(부착) → 유전체 진입 → 숙주 재프로그래밍(복제+단백질 합성) → 자가조립 → 방출"}, {"id": "I0-19", "q": "캡소미어와 핵산이 만나 껍질이 만들어지는 현상은?", "a": "자발적 자가조립(self-assembly) (TMV는 분리 후 섞으면 재조립)"}, {"id": "I0-20", "q": "바이러스가 숙주를 인식하는 방식은?", "a": "바이러스 표면 단백질과 숙주 표면 수용체의 '악수(handshake)' 결합"}, {"id": "I0-21", "q": "인간만 감염시키는 협소한 숙주 범위 바이러스 예는?", "a": "홍역(measles)"}, {"id": "I0-22", "q": "DNA 바이러스와 RNA 바이러스의 복제 효소 차이는?", "a": "DNA 바이러스는 대개 숙주 DNA 중합효소 / RNA 바이러스는 바이러스가 암호화한 RNA 의존 RNA 중합효소 사용"}, {"id": "I0-23", "q": "용균 회로(lytic cycle)란?", "a": "침입 후 즉시 증식해 숙주를 용해(터뜨림)시켜 자손 방출"}, {"id": "I0-24", "q": "용균만 하는 파지를 뭐라 하는가?", "a": "독성 파지(virulent phage), 예: T4"}, {"id": "I0-25", "q": "T4 용균 회로 소요 시간과 자손 수는?", "a": "37°C에서 약 20~30분, 자손 100~200개"}, {"id": "I0-26", "q": "T4 파지 DNA가 자기 효소에 잘리지 않는 이유는?", "a": "변형된 시토신을 가지기 때문(주입과 동시에 숙주 DNA는 분해)"}, {"id": "I0-27", "q": "용원 회로(lysogenic cycle)란?", "a": "파지 유전체가 숙주 염색체에 삽입되어 프로파지(prophage)로 잠복"}, {"id": "I0-28", "q": "용균·용원 모두 가능한 파지와 대표 예는?", "a": "온건성 파지(temperate phage); 대표 예 λ(람다) 파지"}, {"id": "I0-29", "q": "λ 파지의 삽입 경로는?", "a": "선형 DNA 주입 → 환형화 → 프로파지 삽입; 억제 단백질이 다른 프로파지 유전자 전사를 막아 침묵"}, {"id": "I0-30", "q": "프로파지가 용균 회로로 전환되는 계기는?", "a": "자외선·화학물질 같은 스트레스가 유도(induce)"}, {"id": "I0-31", "q": "용균 vs 용원 — 숙주의 운명 차이는?", "a": "용균=숙주 용해되어 죽음 / 용원=당장은 생존, 프로파지가 함께 복제"}, {"id": "I0-32", "q": "용원성으로 생기는 대표 세균 독소 4가지는?", "a": "디프테리아·보툴리눔·성홍열 독소, 대장균 O157:H7 독소(모두 프로파지 유전자 산물)"}, {"id": "I0-33", "q": "세균의 파지 방어 3가지는?", "a": "① 수용체 단백질 돌연변이 ② 제한효소(자기 DNA는 메틸화 보호) ③ CRISPR-Cas 시스템"}, {"id": "I0-34", "q": "CRISPR-Cas 시스템의 작동 원리는?", "a": "과거 감염 파지 DNA를 유전체에 저장 → 재감염 시 RNA로 전사 → Cas 단백질(예: Cas9)과 복합체로 침입 DNA 인식·절단"}, {"id": "I0-35", "q": "외피 바이러스의 외피 획득 방식(출아)은?", "a": "당단백이 ER에서 합성·골지에서 당 부착→세포막 이동, 새 캡시드가 막을 두르고 출아(budding); 숙주를 반드시 죽이지는 않음"}, {"id": "I0-36", "q": "헤르페스 바이러스의 잠복 부위와 재발 계기는?", "a": "신경세포 핵에 미니염색체로 잠복 → 물리·정서 스트레스에 재활성(평생 재발)"}, {"id": "I0-37", "q": "(+)가닥 RNA 바이러스(IV군)의 번역 경로는?", "a": "유전체 자체가 mRNA → 바로 번역"}, {"id": "I0-38", "q": "(−)가닥 RNA 바이러스(V군)의 번역 경로는?", "a": "먼저 (+)가닥 합성 후 번역; 입자에 RNA 의존 RNA 중합효소를 싣고 들어옴"}, {"id": "I0-39", "q": "(−)가닥 바이러스가 중합효소를 직접 싣고 오는 이유는?", "a": "숙주에 그 효소가 없어 들어가자마자 (+)가닥을 만들어야 하기 때문"}, {"id": "I0-40", "q": "'모든 RNA 바이러스가 바로 번역된다'가 틀린 이유는?", "a": "(−)가닥은 (+)합성 후, 레트로는 역전사 후 번역되므로 바로 번역되지 않음"}, {"id": "I0-41", "q": "볼티모어 I군(dsDNA)의 대표 예는?", "a": "아데노, 파필로마(자궁경부암), 헤르페스(EBV 포함), 폭스(천연두)"}, {"id": "I0-42", "q": "볼티모어 II군은?", "a": "ssDNA — 파보바이러스(B19)"}, {"id": "I0-43", "q": "볼티모어 III군은?", "a": "dsRNA — 레오바이러스(로타-설사)"}, {"id": "I0-44", "q": "볼티모어 IV군(ssRNA +)의 특징과 예는?", "a": "유전체가 곧 mRNA(바로 번역); 피코르나(감기·폴리오·A형간염), 코로나, 플라비(지카·황열·뎅기·C형간염)"}, {"id": "I0-45", "q": "볼티모어 V군(ssRNA −)의 특징과 예는?", "a": "mRNA 주형(RNA→RNA 효소 필요); 필로(에볼라), 오르토믹소(인플루엔자), 파라믹소(홍역·볼거리), 랍도(광견병)"}, {"id": "I0-46", "q": "볼티모어 VI군은?", "a": "ssRNA-역전사(레트로); HIV, HTLV-1"}, {"id": "I0-47", "q": "인플루엔자와 HIV의 볼티모어 군은?", "a": "인플루엔자=V군 분절형 (−)RNA / HIV=VI군 레트로"}, {"id": "I0-48", "q": "레트로바이러스의 핵심 효소와 작용은?", "a": "역전사효소로 RNA를 DNA로 역전사해 숙주 염색체에 삽입"}, {"id": "I0-49", "q": "숙주 염색체에 삽입된 레트로바이러스 형태를 뭐라 하는가?", "a": "프로바이러스(provirus)"}, {"id": "I0-50", "q": "'retro(거꾸로)'라는 이름의 유래는?", "a": "정보 흐름이 RNA→DNA로 거꾸로 가기 때문"}, {"id": "I0-51", "q": "프로바이러스 vs 프로파지의 핵심 차이는?", "a": "프로바이러스는 숙주 유전체를 영구히 떠나지 않음 / 프로파지는 용균 회로 시작 시 숙주 염색체를 빠져나옴"}, {"id": "I0-52", "q": "HIV 입자의 내부 구성은?", "a": "외피 + 다면체 캡시드 안에 단일가닥 RNA 2개 + 역전사효소 2개"}, {"id": "I0-53", "q": "HIV 침입의 첫 단계(수용체)는?", "a": "외피 당단백 gp120이 표적세포의 CD4에 결합 → 보조수용체로 막 융합·침입"}, {"id": "I0-54", "q": "HIV 보조수용체의 초기·후기 향성은?", "a": "초기: 대식세포의 CCR5(R5 향성) / 후기: T세포의 CXCR4(X4 향성)"}, {"id": "I0-55", "q": "HIV 감염 저항성을 보이는 변이는?", "a": "CCR5 결손 변이"}, {"id": "I0-56", "q": "HIV 감염의 면역학적 지표(CD4:CD8)는?", "a": "CD4⁺가 파괴되어 정상 약 2:1인 CD4:CD8 비가 1 미만으로 역전"}, {"id": "I0-57", "q": "CD4↔MHC, CD8↔MHC 연결 암기는?", "a": "CD4×MHC II, CD8×MHC I (곱이 8)"}, {"id": "I0-58", "q": "HIV 치료 약물 3종의 표적은?", "a": "AZT(아지도티미딘)=역전사 차단, 프로테아제 억제제=조립 효소 차단, 마라비록=CCR5 차단"}, {"id": "I0-59", "q": "HIV 표준 치료법(칵테일)은?", "a": "뉴클레오시드 유사체 2종 + 프로테아제 억제제 병용"}, {"id": "I0-60", "q": "바이러스가 생명계와 진화적으로 연결됨을 보이는 근거는?", "a": "생명의 보편적 유전암호를 사용함"}, {"id": "I0-61", "q": "바이러스 기원에 대한 유력 가설은?", "a": "세포 간을 오가던 벌거벗은 핵산 조각에서 기원, 캡시드 유전자 진화로 세포막 결합 가능"}, {"id": "I0-62", "q": "바이러스 기원 후보 원천 2가지의 공통점은?", "a": "플라스미드·트랜스포존; 바이러스와 함께 모두 이동성 유전인자"}, {"id": "I0-63", "q": "거대바이러스 예와 논쟁 이유는?", "a": "미미바이러스(1.2 Mb, 번역·DNA 복구 유전자 보유), 판도라바이러스, 피토바이러스; 생명의 나무 위치가 미해결"}, {"id": "I0-64", "q": "감기와 폴리오의 손상 회복 차이는?", "a": "감기=상기도 상피 재생으로 완전 회복 / 폴리오=신경세포 손상 영구적"}, {"id": "I0-65", "q": "바이러스가 증상을 일으키는 방식은?", "a": "리소좀 가수분해효소 방출, 독소 생산, 독성 외피단백 등 (발열·몸살은 몸의 방어 반응인 경우 많음)"}, {"id": "I0-66", "q": "백신의 원리와 대표 전략 2가지는?", "a": "병원체의 무해한 유도체로 면역 유도; 약독화 바이러스 또는 재조합 바이러스 DNA 주사"}, {"id": "I0-67", "q": "천연두 박멸이 성공한 이유는?", "a": "1980년 WHO 프로그램; 숙주가 인간뿐이라 성공"}, {"id": "I0-68", "q": "인플루엔자가 새 대유행 균주를 쉽게 만드는 기전은?", "a": "8개 분절 (−)RNA 유전체 → 다른 균주 동시 감염 시 분절이 뒤섞이는 유전적 재편성(reassortment)"}, {"id": "I0-69", "q": "대표 종양 바이러스와 유발 암은?", "a": "파필로마(자궁경부암), EBV(버킷림프종), B형간염(간암), HTLV-1(백혈병)"}, {"id": "I0-70", "q": "항생제가 바이러스에 무효인 이유는?", "a": "항생제는 세균 효소를 표적하기 때문"}, {"id": "I0-71", "q": "신종 바이러스 출현 3원인은?", "a": "① 기존 바이러스 돌연변이 ② 소규모 고립 집단에서 확산 ③ 동물→인간 종간 전파"}, {"id": "I0-72", "q": "RNA 바이러스의 변이율이 높은 이유는?", "a": "RNA 중합효소가 교정(proofreading)을 하지 않기 때문"}, {"id": "I0-73", "q": "신종 인체질병의 약 3/4이 오는 경로와 매개 동물 명칭은?", "a": "동물→인간 종간 전파; 바이러스를 옮기는 동물 = 자연숙주(natural reservoir)"}, {"id": "I0-74", "q": "HIV의 자연숙주(기원 동물)는?", "a": "침팬지"}, {"id": "I0-75", "q": "지카 바이러스의 태아 위험은?", "a": "임신부 감염 시 태아 소두증"}, {"id": "I0-76", "q": "식물 바이러스의 대부분 유전체 종류는?", "a": "RNA"}, {"id": "I0-77", "q": "식물 바이러스 수평전파(horizontal)란?", "a": "외부에서 감염; 표피 통과 필요(바람·상처·초식동물 손상 식물이 취약, 곤충 매개)"}, {"id": "I0-78", "q": "식물 바이러스 수직전파(vertical)란?", "a": "부모→자손; 무성생식(꺾꽂이)·감염 종자를 통한 유성생식"}, {"id": "I0-79", "q": "식물 바이러스가 식물 전체로 퍼지는 통로는?", "a": "원형질연락사(plasmodesmata); 바이러스 단백질이 넓혀 이동 도움"}, {"id": "I0-80", "q": "세균의 수평적 유전자 전달 3가지는?", "a": "형질전환, 형질도입, 접합"}, {"id": "I0-81", "q": "형질전환(transformation)이란?", "a": "환경의 벌거벗은 DNA를 직접 흡수(매개체 없음)"}, {"id": "I0-82", "q": "형질도입(transduction)이란?", "a": "박테리오파지가 한 세균의 DNA를 다른 세균으로 운반"}, {"id": "I0-83", "q": "접합(conjugation)이란?", "a": "성선모를 통해 DNA를 직접 전달(F 플라스미드/F인자; F⁺→F⁻)"}, {"id": "I0-84", "q": "'파지가 매개 = ?' 함정 정답은?", "a": "형질도입(transduction)"}, {"id": "I0-85", "q": "프리온(prion)의 정의는?", "a": "핵산이 전혀 없이 단백질만으로 된 감염원"}, {"id": "I0-86", "q": "프리온의 병원성 기전은?", "a": "정상형(PrPᶜ)이 잘못 접힌 형(PrPˢᶜ)과 접촉→정상형이 비정상형으로 전환되는 연쇄→뇌 응집→신경퇴행"}, {"id": "I0-87", "q": "프리온 질환 예 3가지는?", "a": "양 스크래피, 소 광우병, 인간 크로이츠펠트-야코프병(CJD)"}, {"id": "I0-88", "q": "쿠루(kuru)의 전파 경로는?", "a": "뉴기니 식인 풍습(죽은 이의 뇌 조직 섭취); 뇌를 먹은 여성·아동에 다발"}, {"id": "I0-89", "q": "프리온의 물리·화학적 특징은?", "a": "가열·약품에 매우 저항성이 크다"}, {"id": "I0-90", "q": "'프리온이 작은 RNA를 유전자로 가진다'가 틀린 이유는?", "a": "프리온은 DNA도 RNA도 없다(핵산 0)"}, {"id": "I0-91", "q": "바이로이드(viroid)와 프리온의 차이는?", "a": "바이로이드=RNA 유전체를 가진 감염원 / 프리온=핵산 없는 단백질 감염원"}, {"id": "I0-92", "q": "I형 인터페론(α·β)의 기능은?", "a": "감염된 세포가 분비해 이웃 세포가 미리 항바이러스 상태를 갖추게 함(자기보다 주변 보호)"}, {"id": "I0-93", "q": "I형 인터페론의 항바이러스 기전 2가지는?", "a": "① eIF2 인산화로 단백질 합성 정지 ② RNase L 활성화로 바이러스 RNA 분해"}, {"id": "I0-94", "q": "II형 인터페론(γ)의 기능은?", "a": "활성 T세포·NK세포가 분비해 대식세포 활성화"}, {"id": "I0-95", "q": "RNAi의 항바이러스 작용은?", "a": "이중가닥 RNA를 잘라 바이러스 mRNA 분해"}, {"id": "I0-96", "q": "바이러스 RNA(A30·U40·G10·C20)가 역전사·삽입된 dsDNA의 염기 조성은?", "a": "A:T:G:C = 35:35:15:15 (RNA U→T, dsDNA에서 A=T·G=C로 평준화)"}]}, {"label": "20 생명공학", "cards": [{"id": "I1-1", "q": "핵산 혼성화(nucleic acid hybridization)란?", "a": "한 핵산 가닥이 상보적 서열의 다른 가닥(DNA/RNA)과 염기쌍을 이루는 것; 거의 모든 유전공학 기법의 기반"}, {"id": "I1-2", "q": "유전공학(genetic engineering)의 정의는?", "a": "실용 목적으로 유전자를 직접 조작하는 것"}, {"id": "I1-3", "q": "최초의 자동화 DNA 시퀀싱 방법과 개발자는?", "a": "다이데옥시(dideoxy) 시퀀싱, 프레더릭 생어(Sanger, 1980 노벨상)"}, {"id": "I1-4", "q": "생어 시퀀싱에서 사슬 신장이 종결되는 이유는?", "a": "ddNTP가 끼면 3′-OH가 없어 다음 인산다이에스터 결합을 못 만들어 그 자리에서 종결"}, {"id": "I1-5", "q": "생어 시퀀싱에서 단편을 어떻게 읽는가?", "a": "길이가 1염기씩 다른 단편을 전기영동으로 크기순 분리, 짧은 것부터 읽어 5′→3′ 서열 확인"}, {"id": "I1-6", "q": "차세대 시퀀싱(NGS)의 원리는?", "a": "단편을 PCR로 대량 증폭 후 한 뉴클레오티드씩 합성하며 실시간 검출(합성에 의한 시퀀싱), 수십만 단편 병렬 처리"}, {"id": "I1-7", "q": "나노포어(nanopore) 시퀀싱의 특징은?", "a": "DNA를 자르거나 증폭하지 않고, 단일 가닥을 막의 작은 구멍에 통과시켜 각 염기가 전류를 방해하는 방식으로 서열 읽음"}, {"id": "I1-8", "q": "제한효소(restriction endonuclease)의 기능은?", "a": "DNA를 특정 위치에서 자르는 효소; 세균이 외래 DNA(파지) 방어에 사용"}, {"id": "I1-9", "q": "세균이 자기 DNA를 제한효소로부터 보호하는 방법은?", "a": "메틸기 부착"}, {"id": "I1-10", "q": "제한효소가 인식하는 서열의 특징은?", "a": "보통 4~8 bp의 회문(대칭) 서열 — 양 가닥을 5′→3′로 읽으면 같음"}, {"id": "I1-11", "q": "점착 말단(sticky end)이란?", "a": "제한효소가 두 가닥을 엇갈리게(staggered) 절단해 남긴 단일가닥 돌출부"}, {"id": "I1-12", "q": "재조합 DNA(recombinant DNA)를 만드는 효소는?", "a": "DNA 라이게이스(ligase) — 점착 말단끼리 결합한 당-인산 골격을 공유결합으로 봉합"}, {"id": "I1-13", "q": "재조합 플라스미드는 어떻게 만드는가?", "a": "EcoRI 등으로 자른 플라스미드에 같은 효소로 자른 외래 DNA를 점착 말단으로 결합, 라이게이스로 봉합"}, {"id": "I1-14", "q": "전기영동(gel electrophoresis)의 원리는?", "a": "아가로스 젤이 분자체 역할, 음전하 DNA가 양극으로 이동하며 짧은 단편이 더 빨리 이동"}, {"id": "I1-15", "q": "유전자 클로닝의 정의는?", "a": "목적 유전자를 벡터에 넣어 숙주세포에서 대량 복제하는 것"}, {"id": "I1-16", "q": "삽입 불활성화(insertional inactivation)란?", "a": "외래 DNA를 벡터의 특정 유전자(항생제 저항성 또는 lacZ) 안에 끼워 망가뜨려 재조합 세포 선별"}, {"id": "I1-17", "q": "청백 선별(blue-white screening)에서 재조합체는 어느 색?", "a": "흰 군락 — 외래 DNA가 lacZ 안에 끼면 β-갈락토시데이스가 안 만들어짐; 파란 군락은 비재조합"}, {"id": "I1-18", "q": "진핵 유전자를 세균에서 발현할 때 cDNA가 필요한 이유는?", "a": "세균은 스플라이싱 기구가 없어 인트론을 못 자르므로, 성숙 mRNA를 역전사한 인트론 없는 cDNA 사용"}, {"id": "I1-19", "q": "cDNA만으로 단백질 생산이 안 되는 이유와 해결책은?", "a": "세균이 인식하는 프로모터·리보솜 결합부위를 갖춘 발현 벡터가 필요"}, {"id": "I1-20", "q": "척추동물 Pax-6 유전자를 초파리에 넣으면?", "a": "(초파리식) 눈 형성 유도 → 모든 생물이 공통 조상 유래의 같은 유전자 발현 기구를 공유함을 보임"}, {"id": "I1-21", "q": "PCR(중합효소 연쇄반응)의 기능은?", "a": "특정 표적 DNA를 시험관에서 수십억 배 증폭"}, {"id": "I1-22", "q": "PCR의 3단계는?", "a": "변성(가열로 가닥 분리) → 프라이머 결합(냉각) → 신장; 반복"}, {"id": "I1-23", "q": "PCR에 쓰는 내열성 중합효소는?", "a": "Taq 중합효소"}, {"id": "I1-24", "q": "PCR 한 주기당 표적 증가와 30주기 후 배수는?", "a": "한 주기당 2배(2ⁿ), 약 30주기면 10억 배"}, {"id": "I1-25", "q": "in situ 혼성화(in situ hybridization)란?", "a": "추적할 mRNA에 상보적인 형광 표지 탐침(probe)을 조직에 넣어, 그 유전자가 전사되는 세포에서 발현 위치 확인"}, {"id": "I1-26", "q": "여러 유전자 발현을 한 번에 분석하는 기법은?", "a": "마이크로어레이(DNA microarray) 또는 RNA 시퀀싱(RNA-seq)"}, {"id": "I1-27", "q": "RT-PCR의 용도는?", "a": "역전사 후 PCR로 특정 mRNA의 발현을 검출·정량"}, {"id": "I1-28", "q": "유전자 기능 분석의 기본 접근과 표준 도구는?", "a": "유전자를 망가뜨려(knockout) 표현형 관찰; 표준 도구는 CRISPR-Cas9 편집"}, {"id": "I1-29", "q": "CRISPR-Cas9의 작동은?", "a": "가이드 RNA로 표적 부위 지정 → Cas9이 그 DNA 절단 → 수선 과정으로 유전자 비활성화/교정"}, {"id": "I1-30", "q": "체세포 핵치환(SCNT)이란?", "a": "핵 제거 난자에 분화한 체세포 핵을 이식 → 난자 세포질의 재프로그래밍 인자가 핵을 초기 상태로 되돌려 개체 발생(복제양 돌리)"}, {"id": "I1-31", "q": "SCNT가 증명하는 것은?", "a": "분화한 세포도 완전한 유전체를 그대로 간직한다(유전체 동등성)"}, {"id": "I1-32", "q": "배아 줄기세포(ES)와 유도만능줄기세포(iPS)의 차이는?", "a": "ES=배아 유래, 모든 세포 분화 가능 / iPS=분화한 세포에 전사인자 도입해 만능성 회복(배아 불필요)"}, {"id": "I1-33", "q": "유전자 치료(gene therapy)란?", "a": "결함 유전자를 정상 유전자로 보완; 아데노바이러스·레트로바이러스를 벡터로 사용"}, {"id": "I1-34", "q": "하이브리도마(hybridoma)란?", "a": "한 에피토프만 인식하는 B세포(수명 짧음) + 골수종(불멸)을 융합한 세포주 → 단클론항체 대량 생산"}, {"id": "I1-35", "q": "단클론항체 vs 다클론항체의 차이는?", "a": "단클론=한 에피토프 인식 / 다클론=여러 클론에서 나와 여러 에피토프 인식"}, {"id": "I1-36", "q": "ELISA란?", "a": "항원-항체 결합에 효소 발색을 연결해 특정 단백질을 정량하는 면역 분석법(임신 진단·감염 선별 1차)"}, {"id": "I1-37", "q": "DNA 지문에 쓰이는 반복서열 3가지는?", "a": "STR(짧은 연쇄반복), VNTR, RFLP(제한효소 단편 길이 다형성)"}, {"id": "I1-38", "q": "DNA 지문에서 모계 추적에 쓰는 것은?", "a": "mtDNA"}, {"id": "I1-39", "q": "DNA 지문에 세균 클로닝이 불필요한 이유는?", "a": "PCR로 반복서열을 증폭해 전기영동으로 비교하면 되므로"}, {"id": "I1-40", "q": "GM 식물 형질전환에 흔히 쓰는 벡터는?", "a": "Agrobacterium tumefaciens의 Ti 플라스미드"}, {"id": "I1-41", "q": "말단 복제 문제(end-replication problem)란?", "a": "선형 염색체가 복제 때마다 지연가닥 끝 RNA 프라이머 자리를 못 메워 3′ 말단이 조금씩 짧아짐"}, {"id": "I1-42", "q": "텔로머레이스(telomerase)의 작동은?", "a": "자체 RNA 주형을 본떠 3′ 말단에 텔로미어 반복서열(척추동물 TTAGGG)을 새로 합성·연장(RNA 주형 역전사효소)"}, {"id": "I1-43", "q": "텔로머레이스가 활성인 세포는?", "a": "생식세포·줄기세포·대부분의 암세포(분화한 체세포에서는 억제)"}, {"id": "I1-44", "q": "닉 트랜슬레이션과 교정의 방향 차이는?", "a": "닉 트랜슬레이션=DNA 중합효소 I의 5′→3′ 외부절단(틈 앞쪽 제거하며 채움) / 교정=3′→5′ 외부절단(잘못 낀 뉴클레오티드 제거) — 방향·목적 반대"}]}]}, {"id": "J", "name": "진화와 집단유전", "chapters": [{"label": "22 진화", "cards": [{"id": "J0-1", "q": "다윈이 진화를 요약한 표현은?", "a": "변화 수반 계승(descent with modification) — 공통 조상에서 갈라져 환경에 적응하며 세대에 걸쳐 차이를 축적"}, {"id": "J0-2", "q": "진화가 만든 생명의 두 특징은?", "a": "공통 조상 유래의 공통성(unity) + 적응이 빚은 다양성(diversity)"}, {"id": "J0-3", "q": "진화의 또 다른 정의(집단 관점)는?", "a": "집단의 유전적 구성이 세대마다 변하는 것"}, {"id": "J0-4", "q": "진화의 '패턴'과 '과정'의 차이는?", "a": "패턴=진화가 일어났다는 사실(관찰) / 과정=그것을 일으키는 메커니즘(자연선택 등)"}, {"id": "J0-5", "q": "아리스토텔레스의 종 관점(스칼라 나투라이)은?", "a": "종을 고정된 것으로 보고 생물을 복잡성에 따라 사다리처럼 배열"}, {"id": "J0-6", "q": "린네(Linnaeus)의 기여와 원래 의도는?", "a": "이명법 분류 체계; 진화가 아니라 창조의 질서를 드러내려는 것"}, {"id": "J0-7", "q": "허턴(Hutton)의 점진주의(gradualism)란?", "a": "지형이 느리고 연속적인 과정으로 형성된다는 것"}, {"id": "J0-8", "q": "라이엘(Lyell)의 현재주의(uniformitarianism)란?", "a": "현재 작용하는 과정이 과거에도 같은 속도로 작용했다는 것"}, {"id": "J0-9", "q": "라이엘이 다윈에게 준 깨달음은?", "a": "지구가 훨씬 오래되었고 느린 과정이 큰 변화를 만들 수 있음"}, {"id": "J0-10", "q": "맬서스(Malthus)가 자연선택 착상에 준 영향은?", "a": "인구론의 과잉 번식과 생존 경쟁"}, {"id": "J0-11", "q": "진화 메커니즘을 처음 제안한 사람과 두 원리는?", "a": "라마르크(1809); 용불용설 + 획득형질의 유전"}, {"id": "J0-12", "q": "라마르크의 용불용설이란?", "a": "많이 쓰는 부위는 발달하고 안 쓰는 부위는 퇴화(기린이 목을 뻗어 높은 잎을 먹음)"}, {"id": "J0-13", "q": "라마르크의 획득형질 유전이 반증된 근거는?", "a": "생전 사용으로 얻은 형질은 그 방식으로 유전되지 않음(가지친 분재의 씨앗은 정상 크기로 자람)"}, {"id": "J0-14", "q": "라마르크 이론의 의의는?", "a": "적응을 점진적 진화로 설명하고 검증 가능한 가설을 제시(반면 퀴비에는 진화 자체를 부정)"}, {"id": "J0-15", "q": "다윈이 비글호 항해에서 관찰한 갈라파고스 생물의 특징은?", "a": "남미 본토 종과 닮았으나 대부분 고유종, 섬마다 조금씩 다름"}, {"id": "J0-16", "q": "갈라파고스 핀치 부리가 보여주는 개념은?", "a": "적응(adaptation) — 섬마다 먹이(선인장·곤충·씨앗)에 맞게 부리가 달라짐"}, {"id": "J0-17", "q": "자연선택(natural selection)의 핵심 원리는?", "a": "유리한 유전 형질을 가진 개체가 더 많이 살아남아 번식 → 그 형질이 집단에 퍼짐"}, {"id": "J0-18", "q": "다윈이 종의 기원을 서둘러 출간한 계기는?", "a": "1858년 월리스(Wallace)가 같은 착상을 보내옴 → 1859년 출간"}, {"id": "J0-19", "q": "자연선택이 '창조가 아니라 편집'이라는 뜻은?", "a": "약이 내성균을 만드는 게 아니라 이미 있던 내성 개체를 선택"}, {"id": "J0-20", "q": "세대가 짧은 종의 진화 속도는?", "a": "빠름(MRSA는 몇 년, 곤충은 수십 년)"}, {"id": "J0-21", "q": "자연선택이 선호하는 형질의 조건은?", "a": "현재·국지 환경에 유리한 형질(다른 상황에선 무용하거나 해로울 수 있음)"}, {"id": "J0-22", "q": "인위선택(artificial selection)의 예는?", "a": "야생 겨자→양배추·브로콜리·케일·콜리플라워, 테오신트→옥수수"}, {"id": "J0-23", "q": "인위선택이 자연선택을 뒷받침하는 이유는?", "a": "선택으로 짧은 시간에도 형질이 크게 바뀜을 보여, 선택압의 원리를 입증"}, {"id": "J0-24", "q": "진화 증거 (1) 직접 관찰의 예는?", "a": "항생제 내성(MRSA), 트리니다드 구피, 갈라파고스 핀치 부리 변화"}, {"id": "J0-25", "q": "트리니다드 구피 실험의 결과는?", "a": "포식압이 약한 못으로 옮기자 여러 세대 뒤 수컷이 더 화려해짐(암컷이 화려한 수컷 선호)"}, {"id": "J0-26", "q": "상동(homology)의 정의는?", "a": "공통 조상에서 유래한 유사성"}, {"id": "J0-27", "q": "포유류 앞다리(상동기관)가 공유하는 골격 구성은?", "a": "상완골 → 요골·척골 → 수근골 → 중수골 → 지골"}, {"id": "J0-28", "q": "상동기관이 증명하는 진화는?", "a": "공통 조상에서 갈라진 발산진화"}, {"id": "J0-29", "q": "척추동물 배아가 공유하는 발생학적 상동 구조는?", "a": "항문 뒤 꼬리(post-anal tail)와 인두궁(pharyngeal arch)"}, {"id": "J0-30", "q": "흔적기관(vestigial structure)의 예는?", "a": "뱀의 골반·다리 흔적, 동굴어의 눈, 사람의 꼬리뼈·맹장"}, {"id": "J0-31", "q": "흔적기관은 어떤 증거인가?", "a": "상동의 한 예로 공통 조상의 증거"}, {"id": "J0-32", "q": "분자 상동의 예는?", "a": "거의 같은 유전암호 공유, 상동 유전자, 기능 잃은 위유전자(pseudogene)"}, {"id": "J0-33", "q": "상사기관(analogous structure)이란?", "a": "기원은 다른데 기능이 비슷해 닮은 기관(새 날개 vs 곤충 날개)"}, {"id": "J0-34", "q": "상사기관은 무엇의 결과이며 공통 조상 증거인가?", "a": "수렴진화(convergent evolution)의 결과; 공통 조상의 증거가 아님"}, {"id": "J0-35", "q": "상동기관과 상사기관의 핵심 대비는?", "a": "상동=공통 조상(발산진화) / 상사=수렴진화 (최빈출 함정)"}, {"id": "J0-36", "q": "화석 기록이 보여주는 것과 전이 화석 예는?", "a": "생물이 시간에 따라 변해 온 패턴; 육상 포유류→고래 이행"}, {"id": "J0-37", "q": "생물지리(biogeography)가 진화를 증언하는 예는?", "a": "멀리 떨어진 섬의 고유종, 대륙 이동으로 갈라진 지역의 생물상 차이"}, {"id": "J0-38", "q": "계통수의 가지점(branch point)이 뜻하는 것은?", "a": "두 계통의 가장 최근 공통 조상"}, {"id": "J0-39", "q": "상동 형질의 내포 패턴(nested pattern) 예는?", "a": "모든 척추동물=척추, 그중 사지동물=사지, 그중 양막류=양막, 그중 조류=깃털"}, {"id": "J0-40", "q": "'포유류는 양서류보다 조류와 더 가깝다'의 근거는?", "a": "포유류와 조류가 더 최근의 공통 조상을 공유하기 때문(유연관계는 최근 공통 조상으로 판단)"}, {"id": "J0-41", "q": "과학에서 '이론(theory)'의 의미는?", "a": "일상어의 추측과 달리, 방대한 관찰을 설명·통합하는 포괄적 설명"}, {"id": "J0-42", "q": "자연선택이 진화의 유일한 메커니즘이 아님을 보이는 예는?", "a": "유전적 부동 등"}, {"id": "J0-43", "q": "적응도(fitness)의 측정 기준은?", "a": "힘이나 수명이 아니라 다음 세대에 남기는 생식 성공도(번식한 자손 수)"}, {"id": "J0-44", "q": "계통점진설과 단속평형설의 차이는?", "a": "계통점진설=변화가 오랜 시간 일정·점진적 / 단속평형설='긴 정체 + 짧은 급변' 패턴"}]}, {"label": "23 집단진화", "cards": [{"id": "J1-1", "q": "진화의 단위 — 개체와 집단 중 무엇이 진화하는가?", "a": "개체는 진화하지 않는다; 집단이 세대에 걸쳐 진화한다"}, {"id": "J1-2", "q": "미시진화(microevolution)의 정의는?", "a": "세대에 걸친 집단의 대립유전자 빈도 변화"}, {"id": "J1-3", "q": "미시진화를 일으키는 3메커니즘은?", "a": "자연선택, 유전적 부동(우연한 빈도 변동), 유전자 흐름(집단 간 대립유전자 이동)"}, {"id": "J1-4", "q": "3메커니즘 중 적응을 일관되게 일으키는 것은?", "a": "자연선택뿐"}, {"id": "J1-5", "q": "유전적 변이의 두 양상은?", "a": "이산형(단일 유전자좌, 완두 꽃색) / 연속형(다인자 형질, 사람 키)"}, {"id": "J1-6", "q": "유전적 변이의 원천 3가지는?", "a": "돌연변이(새 대립유전자의 궁극적 원천), 유전자 중복, 유성생식(재조합)"}, {"id": "J1-7", "q": "유성생식이 만드는 변이의 한계는?", "a": "새 대립유전자를 만들지 않고 기존 대립유전자를 새 조합으로 재배열만 함"}, {"id": "J1-8", "q": "유전자 풀(gene pool)이란?", "a": "집단의 모든 대립유전자를 모은 것"}, {"id": "J1-9", "q": "하디-바인베르크 평형의 대립유전자 빈도 식은?", "a": "p + q = 1"}, {"id": "J1-10", "q": "하디-바인베르크 유전자형 빈도 식은?", "a": "p² + 2pq + q² = 1"}, {"id": "J1-11", "q": "하디-바인베르크 평형은 무엇을 계산하는 기준점인가?", "a": "진화하지 않는 집단의 빈도(평형 이탈 = 진화)"}, {"id": "J1-12", "q": "p=0.8, q=0.2일 때 이형접합자 빈도는?", "a": "2pq = 2(0.8)(0.2) = 0.32"}, {"id": "J1-13", "q": "하디-바인베르크 5조건은?", "a": "① 돌연변이 없음 ② 무작위 교배 ③ 자연선택 없음 ④ 집단 크기 무한대(부동 없음) ⑤ 유전자 흐름 없음"}, {"id": "J1-14", "q": "하디-바인베르크 조건이 하나라도 깨지면?", "a": "그 집단은 진화한다"}, {"id": "J1-15", "q": "자연선택이 '우연과 선별의 결합'인 이유는?", "a": "돌연변이로 변이 생성(우연) + 유리한 대립유전자 선호(선별)"}, {"id": "J1-16", "q": "상대적응도(relative fitness)란?", "a": "다른 개체에 비해 다음 세대 유전자 풀에 기여하는 정도"}, {"id": "J1-17", "q": "자연선택은 유전자형과 표현형 중 무엇에 직접 작용하는가?", "a": "표현형(개체 전체)"}, {"id": "J1-18", "q": "유전적 부동(genetic drift)의 정의와 집단 크기 관계는?", "a": "우연한 사건으로 대립유전자 빈도가 무작위로 변동; 집단이 작을수록 효과가 큼"}, {"id": "J1-19", "q": "유전적 부동의 3특징은?", "a": "① 빈도 무작위 출렁임 ② 유전적 변이 손실 ③ 중립·약간 해로운 대립유전자도 우연히 고정(100%) 가능"}, {"id": "J1-20", "q": "병목 효과(bottleneck effect)란?", "a": "재해 등으로 집단이 급감해 생존자의 유전자 풀이 우연히 원래와 달라짐"}, {"id": "J1-21", "q": "창시자 효과(founder effect)란?", "a": "소수 개체가 새 지역에 정착해 그 작은 표본의 유전자 풀이 원집단과 다름"}, {"id": "J1-22", "q": "유전자 흐름(gene flow)의 정의와 일반적 효과는?", "a": "집단 간 대립유전자 이동; 흔히 집단 간 차이를 줄임"}, {"id": "J1-23", "q": "레이크이리 물뱀에서 유전자 흐름의 효과는?", "a": "본토(줄무늬)에서 유입되는 줄무늬 대립유전자가 섬 집단의 완전한 국지 적응을 막음"}, {"id": "J1-24", "q": "유전자 흐름이 적응에 도움이 되는 예는?", "a": "모기의 살충제 내성 대립유전자가 한 곳에서 생겨 전 세계로 퍼짐"}, {"id": "J1-25", "q": "부동 vs 흐름의 차이는?", "a": "부동=우연에 의한 집단 내 변동(변이 감소) / 흐름=집단 간 대립유전자 이동(차이 감소)"}, {"id": "J1-26", "q": "방향성 선택(directional selection)이란?", "a": "한쪽 극단이 유리해 평균이 한 방향으로 이동(항생제 내성균, 가뭄 시 큰 부리 핀치)"}, {"id": "J1-27", "q": "분단성 선택(disruptive selection)이란?", "a": "양 극단이 유리하고 중간형 감소, 분포가 둘로 갈림(카메룬 검은배 핀치)"}, {"id": "J1-28", "q": "안정화 선택(stabilizing selection)이란?", "a": "중간형이 유리하고 양 극단 도태, 변이 감소(사람 신생아 체중 3~4kg)"}, {"id": "J1-29", "q": "분단성 선택이 종분화와 연결되는 이유는?", "a": "중간형이 줄고 양극단이 갈라져 같은 지역 동소적 종분화의 단초가 될 수 있음"}, {"id": "J1-30", "q": "성선택(sexual selection)이 낳는 결과는?", "a": "성적 이형(sexual dimorphism); 짝짓기 성공도 차이로 인한 선택"}, {"id": "J1-31", "q": "균형선택(balancing selection)이란?", "a": "집단에 둘 이상의 표현형을 유지하는 선택"}, {"id": "J1-32", "q": "이형접합 우세(heterozygote advantage)의 대표 예는?", "a": "겸형적혈구 대립유전자 — 이형접합자가 말라리아 저항성을 얻어 유행 지역에서 열성 대립유전자가 유지"}, {"id": "J1-33", "q": "빈도의존 선택(frequency-dependent selection)이란?", "a": "어떤 표현형의 적응도가 그 빈도가 낮을수록 높아질 때 여러 표현형 공존"}, {"id": "J1-34", "q": "자연선택이 완벽한 생물을 못 만드는 4이유는?", "a": "역사적 제약, 절충(trade-off), 변이 의존, 부동 등 비적응 과정"}, {"id": "J1-35", "q": "적응도(fitness)의 측정 기준은?", "a": "힘이나 수명이 아니라 다음 세대에 남기는 생식 성공도(번식한 자손 수)"}]}]}, {"id": "K", "name": "종분화·생명사·계통", "chapters": [{"label": "24 종분화", "cards": [{"id": "K0-1", "q": "종분화(speciation)의 정의와 개념적 위치는?", "a": "한 종이 둘 이상으로 갈라지는 과정; 미시진화와 거시진화를 잇는 개념적 다리"}, {"id": "K0-2", "q": "생물학적 종 개념(마이어)의 정의는?", "a": "자연에서 교배해 생존·번식 가능한 자손을 낳는 집단; 기준은 형태가 아니라 생식적 격리"}, {"id": "K0-3", "q": "유전자 흐름과 종분화의 관계는?", "a": "유전자 흐름이 한 종의 유전자 풀을 결속; 흐름이 줄거나 끊기면 종분화 시작"}, {"id": "K0-4", "q": "생물학적 종 개념의 3한계는?", "a": "① 화석은 생식 격리 평가 불가 ② 무성생식 생물에 적용 불가 ③ 형태 달라도 유전자 흐름 있는 쌍(그롤라곰)"}, {"id": "K0-5", "q": "형태종·생태종·계통종의 구분 기준은?", "a": "형태종=몸 형태·구조 / 생태종=생태적 지위(niche) / 계통종=공통 조상에서 갈라진 최소 계통 단위"}, {"id": "K0-6", "q": "접합전 장벽(prezygotic barrier)이 막는 것은?", "a": "수정 자체"}, {"id": "K0-7", "q": "접합전 장벽 5종은?", "a": "서식지·시간·행동·기계적·배우자 격리"}, {"id": "K0-8", "q": "서식지 격리의 예는?", "a": "Rhagoletis 파리(산사나무 vs 사과)"}, {"id": "K0-9", "q": "시간 격리의 예는?", "a": "점박이스컹크(늦여름 vs 늦겨울 교미)"}, {"id": "K0-10", "q": "행동 격리의 예는?", "a": "푸른발부비새의 구애 춤"}, {"id": "K0-11", "q": "기계적 격리의 예는?", "a": "달팽이 껍질 나선 방향"}, {"id": "K0-12", "q": "배우자 격리의 예는?", "a": "성게(난자·정자 표면 단백질 결합 실패)"}, {"id": "K0-13", "q": "접합후 장벽(postzygotic barrier)이 작용하는 시점은?", "a": "잡종 접합자가 생긴 뒤 — 잡종이 건강한 번식 가능 성체로 자라는 것을 막음"}, {"id": "K0-14", "q": "접합후 장벽 3종은?", "a": "잡종 생존력 저하, 잡종 불임, 잡종 붕괴"}, {"id": "K0-15", "q": "노새(말×당나귀)는 어떤 장벽인가?", "a": "접합후(잡종 불임) — 부모 염색체 수·구조가 달라 감수분열 실패 (함정: 접합전 아님)"}, {"id": "K0-16", "q": "잡종 붕괴(hybrid breakdown)란?", "a": "F₁은 정상이나 F₂ 이후가 약하거나 불임(재배 벼의 열성 대립유전자 누적)"}, {"id": "K0-17", "q": "이소적 종분화(allopatric speciation)란?", "a": "지리적 격리(산맥·강·바다) 상태에서 새 종이 생김; 선택·부동·성선택으로 생식 장벽이 부산물로 생김"}, {"id": "K0-18", "q": "동소적 종분화(sympatric speciation)란?", "a": "같은 지역에서 일부가 생식적으로 격리되며 생김(이소적보다 드묾)"}, {"id": "K0-19", "q": "이소적 vs 동소적의 핵심 차이는?", "a": "이소적=지리적 장벽으로 분리 후 분화 / 동소적=같은 지역에서 배수체화·지위 분화·교배 선호 변화"}, {"id": "K0-20", "q": "동소적 종분화의 3경로는?", "a": "배수성, 성선택(빅토리아호 시클리드), 서식지·자원 분화(Rhagoletis 사과파리)"}, {"id": "K0-21", "q": "배수성(polyploidy)과 이수성(aneuploidy)의 차이는?", "a": "배수성=염색체 세트 전체가 늘어남(3n,4n) / 이수성=특정 염색체 1~2개 더하거나 빠짐(2n±1)"}, {"id": "K0-22", "q": "동질배수체(autopolyploid)란?", "a": "같은 종 안에서 세트가 늘어난 것(감수·체세포분열 오류로 배가)"}, {"id": "K0-23", "q": "이질배수체(allopolyploid)란?", "a": "서로 다른 두 종의 잡종에서 양쪽 세트가 합쳐진 것(Tragopogon)"}, {"id": "K0-24", "q": "홀수배수체(3n)가 불임이 되는 이유는?", "a": "감수분열에서 상동염색체가 둘씩 짝지어야 하는데 세트가 홀수라 짝이 안 맞아 균형 배우자를 못 만듦(씨 없는 수박)"}, {"id": "K0-25", "q": "이질배수체화가 한 세대 만에 종분화를 일으키는 이유는?", "a": "세트가 합쳐지는 순간 원래 종과 염색체 수가 달라져 교배해도 정상 자손이 안 나오므로 즉시 생식적 격리"}, {"id": "K0-26", "q": "배수체 대표 작물은?", "a": "밀(6배체), 귀리, 목화, 감자, 담배"}, {"id": "K0-27", "q": "잡종 지대(hybrid zone)란?", "a": "생식 장벽이 불완전한 두 종이 만나 교배해 혼합 자손을 내는 지역"}, {"id": "K0-28", "q": "잡종 지대의 시간적 변화 3가지는?", "a": "강화(reinforcement), 융합(fusion), 안정(stability)"}, {"id": "K0-29", "q": "강화(reinforcement)란?", "a": "잡종 적응도가 낮으면 접합전 장벽이 더 강해져 두 종이 더 분리됨"}, {"id": "K0-30", "q": "종분화 속도에 대한 단속평형설(굴드·엘드리지)이란?", "a": "종은 오랜 형태적 정체기 후 종분화 시점에 짧은 기간 급변; 화석의 갑작스러운 출현·정체 패턴 설명(계통점진설과 대비)"}]}, {"label": "25 생명의 역사", "cards": [{"id": "K1-1", "q": "거시진화(macroevolution)란?", "a": "종 수준 위의 큰 진화 패턴(새 분류군 출현, 대멸종 영향, 핵심 적응의 기원)"}, {"id": "K1-2", "q": "자연발생설을 반박한 두 실험은?", "a": "레디(고기를 천으로 덮어 파리 차단), 파스퇴르(백조목 플라스크로 미생물 차단)"}, {"id": "K1-3", "q": "파스퇴르 실험이 확립한 원리는?", "a": "생물속생(biogenesis) — 생물은 오직 기존 생물에서만 생김"}, {"id": "K1-4", "q": "생명의 기원(화학진화) 4단계는?", "a": "① 소분자 무생물적 합성 ② 거대분자로 결합 ③ 원시세포로 포장 ④ 자기복제 분자 출현"}, {"id": "K1-5", "q": "원시대기의 성질과 그 가설을 낸 사람은?", "a": "산소가 거의 없는 환원성; 오파린·홀데인('원시 수프')"}, {"id": "K1-6", "q": "밀러-유리(1953) 실험이 보인 것은?", "a": "환원성 대기를 모사해 아미노산 합성"}, {"id": "K1-7", "q": "원시세포(protocell)의 자가조립을 촉진하는 물질은?", "a": "점토(몬모릴로나이트)"}, {"id": "K1-8", "q": "첫 유전물질은 무엇이며 왜 유리했는가?", "a": "RNA(DNA 아님); 정보 저장 + 효소처럼 촉매(리보자임) 기능"}, {"id": "K1-9", "q": "리보자임(ribozyme)이란?", "a": "효소처럼 촉매로 작동하는 RNA"}, {"id": "K1-10", "q": "정보가 RNA에서 DNA로 옮겨간 이유는?", "a": "DNA가 더 안정·정확하기 때문"}, {"id": "K1-11", "q": "화석이 주로 기록되는 암석은?", "a": "퇴적암의 지층(strata)"}, {"id": "K1-12", "q": "화석 기록의 편향은?", "a": "오래 존속·널리 퍼지고 단단한 부분을 가진 종 쪽으로 편향"}, {"id": "K1-13", "q": "반감기(half-life)의 정의와 특징은?", "a": "모핵종의 50%가 딸핵종으로 붕괴하는 시간; 온도·압력 등 환경에 영향받지 않음"}, {"id": "K1-14", "q": "탄소-14의 반감기와 용도는?", "a": "5,730년; 약 75,000년 이내 젊은 화석"}, {"id": "K1-15", "q": "우라늄-238의 반감기와 측정 방식은?", "a": "45억년; 오래된 화석을 둘러싼 화산암으로 간접 측정"}, {"id": "K1-16", "q": "지질연대의 4누대 순서는?", "a": "선캄브리아 → 고생대 → 중생대 → 신생대"}, {"id": "K1-17", "q": "첫 생명의 형태와 직접 증거는?", "a": "바다의 단세포 원핵생물(35억 년 전); 스트로마톨라이트(남세균이 만든 층상암)"}, {"id": "K1-18", "q": "대기 산소(O₂)의 기원은?", "a": "남세균 같은 광합성 원핵생물의 물 분해(생물 기원)"}, {"id": "K1-19", "q": "산소가 처음 바다에서 남긴 증거는?", "a": "줄무늬철광층(banded iron formation) — O₂가 철과 반응해 침전"}, {"id": "K1-20", "q": "산소 혁명이 생물에 미친 영향은?", "a": "많은 혐기성 원핵생물 멸종, 생존 계통에서 세포호흡 진화"}, {"id": "K1-21", "q": "내공생설(endosymbiosis)이란?", "a": "원핵세포가 작은 세포를 삼켜 소기관(미토콘드리아·색소체)이 됨"}, {"id": "K1-22", "q": "연속내공생설에서 미토콘드리아와 색소체의 순서는?", "a": "미토콘드리아가 색소체보다 먼저 생김"}, {"id": "K1-23", "q": "내공생 숙주와 두 소기관 조상은?", "a": "숙주=고세균(또는 근연) / 미토콘드리아=호기성 세균 / 색소체=광합성 세균"}, {"id": "K1-24", "q": "내공생의 증거 4가지는?", "a": "① 내막 효소·수송계가 세균과 상동 ② 자체 환형 DNA(히스톤 없음) ③ 리보솜·전사번역 기구 보유 ④ 리보솜이 세균형(크기·항생제 민감성)"}, {"id": "K1-25", "q": "미토콘드리아·엽록체가 모계 유전을 보이는 이유는?", "a": "유전자가 거의 난자(세포질)로만 전달되기 때문"}, {"id": "K1-26", "q": "다세포 진핵생물과 에디아카라 동물군의 출현 시기는?", "a": "다세포 ~13억 년 전, 에디아카라(크고 다양한 다세포) ~6억 년 전"}, {"id": "K1-27", "q": "판구조론과 대륙이동이란?", "a": "대륙은 맨틀 위를 떠다니는 지각 판; 맨틀 운동으로 판이 움직이는 것이 대륙이동"}, {"id": "K1-28", "q": "판게아(Pangaea)의 형성 시기와 영향은?", "a": "약 2.5억 년 전; 얕은 바다 소멸(해양종 멸종)·내륙 건조, 이후 로라시아·곤드와나로 분리"}, {"id": "K1-29", "q": "대륙이동이 일으키는 진화적 결과는?", "a": "대규모 이소적 종분화(호주 유대류 vs 다른 대륙 태반류)"}, {"id": "K1-30", "q": "최대 대멸종과 그 규모는?", "a": "페름기말(2.5억 년 전), 해양 동물 약 96% 멸종"}, {"id": "K1-31", "q": "공룡을 멸종시킨 대멸종과 유력 원인은?", "a": "백악기말(K-Pg, 6,600만 년 전); 소행성 충돌(이리듐 층, 칙술루브 분화구)"}, {"id": "K1-32", "q": "대멸종 후 나타나는 현상은?", "a": "생태적 공백을 채우는 적응방산(공룡 멸종 후 포유류 번성)"}, {"id": "K1-33", "q": "적응방산(adaptive radiation)이란?", "a": "한 계통이 새 생태 역할을 맡으며 폭발적으로 다양해지는 것"}, {"id": "K1-34", "q": "지역 적응방산의 예는?", "a": "하와이 은검초(silversword) — 북미 타르위드가 건너와 분화"}, {"id": "K1-35", "q": "이시성(heterochrony)이란?", "a": "발생 사건의 속도·시기 변화(사람 vs 침팬지 두개골)"}, {"id": "K1-36", "q": "유형성숙(paedomorphosis)이란?", "a": "성체가 조상의 유생(어린) 특징을 유지(아홀로틀 도롱뇽)"}, {"id": "K1-37", "q": "Hox 유전자와 Ubx의 역할은?", "a": "부위의 위치를 정함; 곤충에서 Ubx가 다리 형성을 억제해 6다리 곤충 진화"}, {"id": "K1-38", "q": "진화의 방향성에 대한 핵심 명제는?", "a": "진화에는 목표·진보 방향이 없음; 우연한 사건과 역사적 제약에 좌우"}]}, {"label": "26 계통분류", "cards": [{"id": "K2-1", "q": "계통(phylogeny)이란?", "a": "한 종 또는 종군의 진화사"}, {"id": "K2-2", "q": "이명법(binomial nomenclature)의 표기 규칙은?", "a": "속명+종소명을 라틴어 이탤릭으로, 속명만 첫 글자 대문자(예: Homo sapiens)"}, {"id": "K2-3", "q": "일상 이름(common name)의 문제는?", "a": "모호함(jellyfish·crayfish·silverfish는 다 다른 분류군)"}, {"id": "K2-4", "q": "린네의 8계급 순서는?", "a": "역-계-문-강-목-과-속-종 (Domain-Kingdom-Phylum-Class-Order-Family-Genus-Species)"}, {"id": "K2-5", "q": "분류군(taxon)이란?", "a": "각 계급의 명명된 그룹"}, {"id": "K2-6", "q": "상위 계급과 공유 형질의 관계는?", "a": "상위일수록 포함 범위가 넓고 공유 형질은 더 적음(하위로 갈수록 범위 좁고 공유 형질 많음)"}, {"id": "K2-7", "q": "계통수의 가지점(branch point)과 자매군은?", "a": "가지점=두 계통이 갈라진 공통 조상 / 자매군=가장 가까운 두 갈래"}, {"id": "K2-8", "q": "계통수에서 유연관계를 판단하는 기준은?", "a": "가지 간격이 아니라 가장 최근 공통 조상"}, {"id": "K2-9", "q": "계통 추론에서 상동과 상사 중 쓰는 것은?", "a": "상동(공통 조상 유래)만 진화사를 반영; 상사(수렴진화)는 제외"}, {"id": "K2-10", "q": "분기분류학(cladistics)의 기준과 분기군(clade)이란?", "a": "공통 조상을 기준; 분기군=한 조상종과 그 모든 후손"}, {"id": "K2-11", "q": "단계통(monophyletic)의 정의는?", "a": "조상 + 모든 후손(=분기군), 최근 공통 조상 포함"}, {"id": "K2-12", "q": "측계통(paraphyletic)의 정의는?", "a": "조상 + 일부 후손(일부 누락), 최근 공통 조상은 포함"}, {"id": "K2-13", "q": "다계통(polyphyletic)의 정의는?", "a": "먼 관계 종들을 묶음, 최근 공통 조상 미포함"}, {"id": "K2-14", "q": "측계통과 다계통의 핵심 차이는?", "a": "측계통=최근 공통 조상 포함(일부 후손 뺌) / 다계통=최근 공통 조상 미포함 (최빈출 함정)"}, {"id": "K2-15", "q": "공유조상형질(shared ancestral character)이란?", "a": "더 옛 조상에서 유래해 분류군을 구별 못 함(척추는 모든 척추동물이 가짐)"}, {"id": "K2-16", "q": "공유파생형질(shared derived character)이란?", "a": "특정 분기군에만 있는 진화적 신형질(포유류의 털); 형질 상실도 파생형질(뱀·고래의 다리 상실)"}, {"id": "K2-17", "q": "계통 추론에 쓰는 형질은?", "a": "공유파생형질(공유조상형질 아님)"}, {"id": "K2-18", "q": "외군 분석(outgroup analysis)의 원리는?", "a": "외군과 내군이 함께 가진 형질=조상형질, 내군 일부에만 있는 형질=파생형질"}, {"id": "K2-19", "q": "최대절약법(maximum parsimony)이란?", "a": "가장 적은 진화 사건으로 설명되는 나무 선택(오컴의 면도날)"}, {"id": "K2-20", "q": "현생 생물의 진화 시간에 대한 사실은?", "a": "모두 공통 조상으로부터 같은 시간 진화(세균도 인간도 30억 년; 형태 변화가 적어도 시간은 같음)"}, {"id": "K2-21", "q": "직교유전자(orthologous)란?", "a": "종분화로 갈라진 서로 다른 종의 같은 유전자(사람·개의 시토크롬 c); 종분화 역사를 반영해 계통 추론에 적합"}, {"id": "K2-22", "q": "병렬유전자(paralogous)란?", "a": "유전자 중복으로 생긴 한 종 내 여러 사본(후각수용체 유전자)"}, {"id": "K2-23", "q": "계통 추론에 쓰는 유전자는?", "a": "직교유전자(병렬유전자 아님)"}, {"id": "K2-24", "q": "유전자 수와 표현형 복잡성의 관계는?", "a": "비례하지 않음(사람은 효모의 약 4배뿐; 한 유전자가 여러 단백질 생성)"}, {"id": "K2-25", "q": "분자시계(molecular clock)란?", "a": "일부 유전자가 일정 속도로 진화한다는 관찰에 기반해 절대 시간 추정; 직교유전자 염기 치환 수가 분기 후 경과 시간에 비례"}, {"id": "K2-26", "q": "분자시계가 일정한 이유는?", "a": "대부분의 변화가 적응도에 영향 없는 중립 돌연변이이기 때문(필수 유전자는 느리게, 덜 중요한 유전자는 빠르게)"}, {"id": "K2-27", "q": "HIV-1 M의 인간 전파 시점(분자시계 추정)은?", "a": "약 1930년대(침팬지 기원, RNA 바이러스라 빠른 진화)"}, {"id": "K2-28", "q": "3역(three domains)과 제안자·근거는?", "a": "세균·고세균·진핵생물; 우즈(Woese), rRNA 서열 비교"}, {"id": "K2-29", "q": "3역 체계로 폐기된 계는?", "a": "모네라계(Monera) — 세균과 고세균이 별개의 역으로 밝혀짐"}, {"id": "K2-30", "q": "고세균의 세포 특징(세균과 다른 점)은?", "a": "세포벽에 펩티도글리칸 없음, 막지질이 에터 결합에 가지 곁사슬(극한 환경 안정)"}, {"id": "K2-31", "q": "고세균이 진핵생물에 더 가까운 이유는?", "a": "히스톤 닮은 단백질로 DNA를 감고 TATA 결합 단백질 계열 전사 기구를 가짐"}, {"id": "K2-32", "q": "수평적 유전자 전달(horizontal gene transfer)이란?", "a": "전이인자·플라스미드 교환·바이러스 감염·내공생 등으로 유전자가 다른 유전체로 이동(원핵 평균 80%)"}, {"id": "K2-33", "q": "수평적 유전자 전달이 생명의 나무에 주는 함의는?", "a": "생명의 나무 기부는 단순 가지가 아니라 그물망으로 그리는 게 더 정확할 수 있음"}, {"id": "K2-34", "q": "사람의 진화 계보 순서는?", "a": "오스트랄로피테쿠스(직립)→호모 하빌리스(도구)→호모 에렉투스(불·이주)→호모 사피엔스; 사람은 침팬지와 공통 조상에서 분기(침팬지에서 진화한 것 아님)"}]}]}, {"id": "L", "name": "원핵·원생생물", "chapters": [{"label": "27 원핵생물", "cards": [{"id": "L0-1", "q": "원핵생물(prokaryote)의 두 역과 크기는?", "a": "세균(Bacteria) + 고세균(Archaea); 0.5~5 µm(진핵보다 작음)"}, {"id": "L0-2", "q": "원핵생물의 3가지 모양은?", "a": "구균(cocci, 공), 간균(bacilli, 막대), 나선균(spiral)"}, {"id": "L0-3", "q": "세균·고세균·진핵의 세포벽 성분 차이는?", "a": "세균=펩티도글리칸 / 고세균=펩티도글리칸 없음(다당류·단백질) / 진핵(식물·균류)=셀룰로오스·키틴"}, {"id": "L0-4", "q": "그람양성균의 세포벽 특징은?", "a": "두꺼운 펩티도글리칸 층, 외막 없음, 진한 보라 염색"}, {"id": "L0-5", "q": "그람음성균의 세포벽 특징은?", "a": "얇은 펩티도글리칸 + 외막(LPS 포함), 분홍 염색, 항생제 저항 높음(외막이 약물 차단)"}, {"id": "L0-6", "q": "페니실린의 작용 기전은?", "a": "펩티도글리칸 교차결합 억제 — 펩티도글리칸 많은 그람양성에 효과적, 사람 세포엔 무해"}, {"id": "L0-7", "q": "협막(capsule)/점액층의 기능은?", "a": "끈끈한 다당류·단백질 층; 부착·탈수 방지·숙주 면역 회피"}, {"id": "L0-8", "q": "내생포자(endospore)의 특징은?", "a": "물·영양 부족 시 만드는 저항성 세포; 끓는 물 생존(사멸엔 121°C 필요), 수세기 휴면 후 부활(탄저균)"}, {"id": "L0-9", "q": "선모(fimbriae)와 성선모(pilus)의 차이는?", "a": "선모=짧은 털, 부착용 / 성선모=길고 굵음, 접합 시 DNA 전달"}, {"id": "L0-10", "q": "원핵생물의 무성생식 방식은?", "a": "이분법(binary fission)"}, {"id": "L0-11", "q": "유성생식 없이도 변이가 큰 이유는?", "a": "빠른 생식 + 돌연변이(개체 수가 많아 드문 돌연변이도 대량 발생)"}, {"id": "L0-12", "q": "원핵생물의 유전적 재조합 3방식은?", "a": "형질전환(벌거벗은 DNA 흡수), 형질도입(파지 매개), 접합(성선모+F인자)"}, {"id": "L0-13", "q": "형질전환(transformation)이란?", "a": "주변 환경의 벌거벗은 외부 DNA를 흡수해 유전형이 바뀜(그리피스 폐렴구균)"}, {"id": "L0-14", "q": "형질도입(transduction)이란?", "a": "파지(박테리오파지)가 한 세균의 DNA 조각을 다른 세균으로 옮김"}, {"id": "L0-15", "q": "접합(conjugation)이란?", "a": "성선모로 접촉해 F인자 등 DNA를 직접 전달(F⁺→F⁻, 일방향)"}, {"id": "L0-16", "q": "F⁺, F⁻, Hfr의 차이는?", "a": "F⁺=F인자 플라스미드 보유(공여) / F⁻=미보유(수용) / Hfr=F인자가 염색체에 삽입(염색체 유전자 효율 전달)"}, {"id": "L0-17", "q": "R 플라스미드의 의의는?", "a": "항생제 저항 유전자를 담아 접합으로 퍼져 내성 확산"}, {"id": "L0-18", "q": "원핵 영양 4방식의 분류 기준은?", "a": "에너지원(빛=photo / 화학=chemo) × 탄소원(CO₂=독립 / 유기물=종속)"}, {"id": "L0-19", "q": "광독립영양(photoautotroph)의 예는?", "a": "시아노박테리아(빛+CO₂)"}, {"id": "L0-20", "q": "화학독립영양(chemoautotroph)의 예는?", "a": "열수구 황세균(무기물 산화+CO₂)"}, {"id": "L0-21", "q": "화학종속영양(chemoheterotroph)의 예는?", "a": "대부분 세균(유기물+유기물, 분해자)"}, {"id": "L0-22", "q": "절대호기성·절대혐기성·통성혐기성의 차이는?", "a": "절대호기=O₂ 필수 / 절대혐기=O₂ 중독(발효·무산소호흡) / 통성혐기=O₂ 있으면 사용, 없으면 발효(E. coli)"}, {"id": "L0-23", "q": "무산소호흡에서 전자수용체 예는?", "a": "NO₃⁻, SO₄²⁻ 등"}, {"id": "L0-24", "q": "질소고정(nitrogen fixation)이란?", "a": "일부 원핵이 대기 질소(N₂)를 암모니아(NH₃)로 전환; 진핵이 못 쓰는 대기 질소를 식물이 쓸 형태로"}, {"id": "L0-25", "q": "이형세포(heterocyst)의 역할은?", "a": "Anabaena에서 두꺼운 벽으로 O₂를 차단하고 질소고정만 전담(광합성의 O₂가 질소고정효소를 불활성화하므로)"}, {"id": "L0-26", "q": "생물막(biofilm)이 문제되는 이유는?", "a": "표면 덮는 군집으로 의료기구 오염·만성감염·항생제 저항의 원인"}, {"id": "L0-27", "q": "고세균이 사는 극한환경 3종은?", "a": "극호염성(고염), 극호열성(고온), 메탄생성균(무산소에서 CH₄ 생성)"}, {"id": "L0-28", "q": "고세균이 분자적으로 진핵에 더 가까운 근거는?", "a": "히스톤 닮은 단백질로 DNA를 감고 TATA 결합 단백질 전사 기구 보유"}, {"id": "L0-29", "q": "세균의 생태 역할 4가지는?", "a": "화학 재순환(분해자), 광합성(시아노, O₂), 질소고정, 공생(상리·편리·기생)"}, {"id": "L0-30", "q": "외독소(exotoxin)의 특징은?", "a": "세균이 분비하는 단백질; 그람양성·음성 모두, 세균이 없어져도 발병 가능(콜레라, 보툴리누스)"}, {"id": "L0-31", "q": "내독소(endotoxin)의 특징은?", "a": "그람음성균 외막의 LPS 성분; 세균이 죽어 세포벽 붕괴 시에만 방출(장티푸스)"}, {"id": "L0-32", "q": "외독소 vs 내독소의 핵심 대비는?", "a": "외독소=분비 단백질(세균 부재 시도 발병) / 내독소=그람음성 LPS(세균 사멸 시 방출)"}, {"id": "L0-33", "q": "녹조와 적조의 원인 생물 차이는?", "a": "녹조=남세균(민물) / 적조=와편모조류(바다)"}]}, {"label": "28 원생생물", "cards": [{"id": "L1-1", "q": "원생생물(protist)의 정의는?", "a": "진핵생물 중 식물·동물·균류가 아닌 것(편의 용어; Protista 계 폐기); 대부분 단세포"}, {"id": "L1-2", "q": "원생생물의 3가지 영양방식은?", "a": "광독립영양(엽록체), 종속영양(흡수·섭취), 혼합영양(mixotroph, 광합성+종속)"}, {"id": "L1-3", "q": "미토콘드리아와 색소체의 기원과 순서는?", "a": "미토콘드리아=알파프로테오박테리아(먼저) / 색소체=시아노박테리아(나중)"}, {"id": "L1-4", "q": "1차 내공생(primary endosymbiosis)이란?", "a": "종속영양 진핵이 시아노박테리아를 삼켜 색소체(2중막)를 얻음 → 홍조·녹조로 분화"}, {"id": "L1-5", "q": "2차 내공생(secondary endosymbiosis)의 증거는?", "a": "홍조·녹조류를 다른 진핵이 삼킴 → 색소체가 3~4중막(2중막 초과)으로 싸임; 핵형질체(nucleomorph) 잔존"}, {"id": "L1-6", "q": "'2중막 초과 색소체'가 의미하는 것은?", "a": "2차 내공생의 증거"}, {"id": "L1-7", "q": "진핵생물의 4 슈퍼그룹은?", "a": "Excavata, SAR, Archaeplastida, Unikonta"}, {"id": "L1-8", "q": "Giardia(람블편모충)와 소속 그룹은?", "a": "Excavata(디플로모나드); 사람 장에 기생해 설사"}, {"id": "L1-9", "q": "유글레나(Euglena)의 특징과 소속은?", "a": "Excavata(유글레노조아); 엽록체+안점(eyespot), 혼합영양, 빛 쪽으로 이동"}, {"id": "L1-10", "q": "트리파노소마(Trypanosoma)가 일으키는 병은?", "a": "아프리카 수면병(체체파리 매개, 큰 미토콘드리아 DNA=키네토플라스트)"}, {"id": "L1-11", "q": "규조류(diatom)의 특징은?", "a": "SAR-스트라메노파일; 규질(SiO₂) 껍질(상하 뚜껑), 죽으면 규조토; 바다 주요 광합성 생산자"}, {"id": "L1-12", "q": "갈조류(brown algae)의 특징은?", "a": "다세포 해조류; 다시마·켈프 등 가장 크고 복잡한 조류; 갈색은 푸코잔틴"}, {"id": "L1-13", "q": "난균류(oomycete)가 일으킨 재앙은?", "a": "Phytophthora의 감자 역병(아일랜드 대기근); 균류와 닮았으나 별개 계통"}, {"id": "L1-14", "q": "와편모조류(dinoflagellate)의 특징은?", "a": "SAR-알베올라타; 셀룰로오스 갑옷판, 두 편모, 대량 번식 시 적조(일부 독소)"}, {"id": "L1-15", "q": "아피콤플렉사(apicomplexan) 대표와 특징은?", "a": "말라리아원충(Plasmodium); 모기(Anopheles) 매개, 변형 색소체(아피코플라스트=2차 내공생 흔적)"}, {"id": "L1-16", "q": "섬모충(ciliate) 대표와 핵 구조는?", "a": "짚신벌레(Paramecium); 대핵(macronucleus, 일상 기능)·소핵(micronucleus, 유성생식)"}, {"id": "L1-17", "q": "짚신벌레의 수축포와 접합의 기능은?", "a": "수축포=과잉 수분 배출 / 접합=소핵 교환으로 유전적 변이(생식 아닌 재조합)"}, {"id": "L1-18", "q": "유공충(foraminiferan)의 특징은?", "a": "SAR-리자리아; 석회질(CaCO₃) 껍질, 화석이 잘 남아 지층 연대·기후 마커"}, {"id": "L1-19", "q": "방산충(radiolarian)의 특징은?", "a": "규질 내골격, 방사상 위족"}, {"id": "L1-20", "q": "홍조류(red algae)의 색소와 예는?", "a": "피코에리트린(phycoerythrin, 붉은색)이 녹색을 가림; 김(Porphyra)·우뭇가사리; 깊은 바다 적응"}, {"id": "L1-21", "q": "녹조류의 두 계통은?", "a": "클로로파이트(Chlamydomonas, Ulva, Volvox)와 차축조류(charophyte)"}, {"id": "L1-22", "q": "식물의 가장 가까운 조상은?", "a": "차축조류(charophyte)"}, {"id": "L1-23", "q": "아메보조아(amoebozoan)에 속하는 것은?", "a": "점균(변형체점균·세포성점균 Dictyostelium), 엔타메바(아메바성 이질)"}, {"id": "L1-24", "q": "오피스토콘타(opisthokont)에 포함되는 것은?", "a": "깃편모충(동물의 가장 가까운 원생생물 친척), 동물, 균류"}, {"id": "L1-25", "q": "광합성 원생생물의 생태적 지위는?", "a": "수생 군집의 가장 중요한 1차 생산자(먹이그물의 토대)"}, {"id": "L1-26", "q": "적조·녹조가 어패류를 폐사시키는 기전은?", "a": "조류 사체 분해로 산소 고갈(DO↓·BOD↑)"}, {"id": "L1-27", "q": "가우스의 짚신벌레 실험이 보인 원리는?", "a": "경쟁 배제 원리(같은 지위를 공유하는 두 종은 공존 못 함)"}, {"id": "L1-28", "q": "세포성 점균 Dictyostelium의 특이 행동은?", "a": "굶주리면 집합해 이동성 군체 형성"}]}]}, {"id": "M", "name": "식물 다양성·균류", "chapters": [{"label": "29 식물의 다양성Ⅰ", "cards": [{"id": "M0-1", "q": "육상식물의 조상은?", "a": "녹조류 중 차축조류(charophyte), 특히 접합조류(Zygnema 등)"}, {"id": "M0-2", "q": "스포로폴레닌(sporopollenin)의 역할은?", "a": "내구성 고분자로 노출된 접합자·포자 벽을 건조에서 보호"}, {"id": "M0-3", "q": "식물의 4대 파생형질은?", "a": "① 세대교번 ② 다세포 의존 배 ③ 포자낭의 벽 있는 포자 ④ 정단분열조직"}, {"id": "M0-4", "q": "'유배식물(embryophyte)'의 어원이 된 파생형질은?", "a": "다세포 의존 배(접합자가 모체 배우체 안에서 보호·영양받으며 발생)"}, {"id": "M0-5", "q": "큐티클(cuticle)의 기능은?", "a": "표피를 덮는 왁스층; 수분 손실·미생물 침입 방지(방수)"}, {"id": "M0-6", "q": "기공(stomata)의 기능과 조절은?", "a": "CO₂·O₂ 교환 통로(광합성); 한 쌍의 공변세포가 여닫음, 덥고 건조하면 닫아 수분 보존"}, {"id": "M0-7", "q": "균근(mycorrhizae)의 역할은?", "a": "균류와의 공생; 균사가 무기물을 식물에 공급(초기 식물 육상 정착 도움)"}, {"id": "M0-8", "q": "배우체(gametophyte)의 배수성과 만드는 것은?", "a": "n(반수체); 체세포분열로 배우자(난자·정자)를 만듦"}, {"id": "M0-9", "q": "포자체(sporophyte)의 배수성과 만드는 것은?", "a": "2n(2배체); 감수분열로 포자(spore)를 만듦"}, {"id": "M0-10", "q": "배우자와 포자의 형성 방식 차이는?", "a": "배우자=체세포분열(이미 반수체 배우체에서) / 포자=감수분열(2n 포자체에서)"}, {"id": "M0-11", "q": "세대교번 5단계는?", "a": "배우체→배우자(체세포분열)→수정→접합자(2n)→포자체→포자(감수분열)→배우체"}, {"id": "M0-12", "q": "관속조직 유무로 나눈 두 분류는?", "a": "관속식물(물·양분 수송관 있음) / 비관속식물(선태식물)"}, {"id": "M0-13", "q": "선태식물·비종자 관속식물이 단계통이 아닌 이유는?", "a": "공통 형질로 묶은 등급일 뿐(양치류는 종자식물과 더 가까운 공통 조상)"}, {"id": "M0-14", "q": "선태식물의 우세 세대는?", "a": "배우체(n) 우세; 포자체(2n)가 배우체에 영양 의존"}, {"id": "M0-15", "q": "헛뿌리(rhizoid)란?", "a": "뿌리가 아니라 부착용 가닥(흡수 기능 약함)"}, {"id": "M0-16", "q": "장정기(antheridium)와 장란기(archegonium)는?", "a": "장정기=정자 생성 / 장란기=난자 생성"}, {"id": "M0-17", "q": "선태식물·양치류의 수정에 물이 필요한 이유는?", "a": "정자가 물 속을 헤엄쳐 난자로 가야 하므로"}, {"id": "M0-18", "q": "관속식물의 우세 세대는?", "a": "포자체(2n) 우세"}, {"id": "M0-19", "q": "목부(xylem)의 물관요소·헛물관의 상태는?", "a": "성숙하며 죽어 속 빈 관이 되어 물·무기양분을 위로 나름"}, {"id": "M0-20", "q": "사부(phloem)의 체관요소의 상태는?", "a": "핵·리보솜을 잃은 채 살아 있어 동반세포(반세포)의 도움으로 양분을 나름"}, {"id": "M0-21", "q": "소엽(microphyll)과 대엽(megaphyll)의 차이는?", "a": "소엽=작고 단일 관속(석송류만) / 대엽=가지친 관속, 크고 광합성 효율 높음"}, {"id": "M0-22", "q": "포자엽(sporophyll)이란?", "a": "포자낭을 단 잎(양치류=소낭퇴, 석송·겉씨=구과, 속씨=심피·수술)"}, {"id": "M0-23", "q": "동형포자와 이형포자의 차이는?", "a": "동형포자=한 종류 포자(양성 배우체) / 이형포자=대포자(암배우체)·소포자(수배우체)"}, {"id": "M0-24", "q": "모든 종자식물의 포자 유형은?", "a": "이형포자(heterosporous)"}, {"id": "M0-25", "q": "석송류(Lycophyta)의 특징은?", "a": "소엽; 석탄기에 거목으로 번성(석탄층 형성), 페름기 건조로 쇠퇴; 이름과 달리 진짜 이끼 아님"}, {"id": "M0-26", "q": "양치류(Monilophyta)의 특징은?", "a": "대엽; 잎 뒷면 소낭퇴(sorus)에서 포자, 어린잎은 fiddlehead"}, {"id": "M0-27", "q": "양치류 생활사의 주세대와 수정 방식은?", "a": "큰 포자체(2n)가 주세대; 작은 배우체의 장정기·장란기에서 정자가 헤엄쳐 수정"}]}, {"label": "30 종자식물", "cards": [{"id": "M1-1", "q": "종자식물의 4대 파생형질은?", "a": "배우체 축소, 이형포자, 밑씨(ovule), 화분(pollen) (+종자)"}, {"id": "M1-2", "q": "종자식물 배우체의 상태는?", "a": "미세하며 포자체 조직에 영양 의존(모체 포자낭 안에서 발생, UV·건조 보호)"}, {"id": "M1-3", "q": "세 식물군의 우세 세대 정리는?", "a": "선태=배우체 우세 / 비종자 관속=포자체 우세·배우체 독립 / 종자식물=포자체 우세·배우체 미세·의존"}, {"id": "M1-4", "q": "이형포자에서 대포자·소포자가 되는 것은?", "a": "대포자낭→대포자(1개)→암배우체 / 소포자낭→소포자(다수)→수배우체"}, {"id": "M1-5", "q": "밑씨(ovule)의 구성은?", "a": "대포자낭 + 대포자 + 주피(integument)"}, {"id": "M1-6", "q": "겉씨식물과 속씨식물의 주피 겹 수 차이는?", "a": "겉씨=1겹 / 속씨=보통 2겹"}, {"id": "M1-7", "q": "화분(pollen grain)이란?", "a": "소포자가 발달한 수배우체(스포로폴레닌 벽 보호, 바람·동물 운반)"}, {"id": "M1-8", "q": "수분(pollination)이란?", "a": "화분이 밑씨가 있는 부분에 도달하는 것"}, {"id": "M1-9", "q": "종자식물이 수정에 물이 필요 없는 이유는?", "a": "화분이 바람·동물로 운반되고 화분관으로 정자를 직접 전달(↔ 선태·양치는 정자 헤엄)"}, {"id": "M1-10", "q": "종자(seed)의 구성은?", "a": "배(embryo) + 저장 양분 + 종피(seed coat, 주피 유래)"}, {"id": "M1-11", "q": "종자가 포자보다 유리한 점은?", "a": "다세포라 장기 휴면 가능, 저장 양분으로 발아 지원, 먼 곳까지 산포"}, {"id": "M1-12", "q": "겉씨식물(gymnosperm)의 종자 특징은?", "a": "씨방에 싸이지 않은 벌거벗은(naked) 종자, 보통 구과 위 노출"}, {"id": "M1-13", "q": "겉씨식물 4문은?", "a": "소철, 은행, 마황류, 구과식물(conifer, 대부분)"}, {"id": "M1-14", "q": "소나무 화분구과와 밑씨구과에서 일어나는 것은?", "a": "화분구과=소포자모세포 감수분열→화분(수배우체) / 밑씨구과=대포자모세포 감수분열→대포자(1개)→암배우체"}, {"id": "M1-15", "q": "소나무의 수분~수정 시간과 배 발생은?", "a": "수정은 보통 수분 1년 후; 보통 1개의 접합자만 배로 발생"}, {"id": "M1-16", "q": "속씨식물 꽃의 4기관(밖→안)은?", "a": "꽃받침(악편) → 꽃잎(화판) → 수술 → 암술(심피)"}, {"id": "M1-17", "q": "수술(stamen)의 구조와 기능은?", "a": "소포자엽; 꽃밥(anther)의 소포자낭에서 소포자→화분(정자 2개 생식세포 + 화분관 관세포)"}, {"id": "M1-18", "q": "심피(carpel)의 구조는?", "a": "대포자엽; 씨방(ovary) 안 밑씨, 끝에 암술머리(stigma), 아래 암술대(style)"}, {"id": "M1-19", "q": "배낭(embryo sac)의 구성은?", "a": "난자·조세포·2개의 극핵(중앙세포)·반족세포"}, {"id": "M1-20", "q": "중복수정(double fertilization)의 두 결과는?", "a": "정자 1개+난자=접합자(배, 2n) / 정자 1개+2극핵=배젖(endosperm, 3n)"}, {"id": "M1-21", "q": "중복수정은 어느 식물의 고유 특징인가?", "a": "속씨식물"}, {"id": "M1-22", "q": "수정 후 접합자·밑씨·씨방의 발달은?", "a": "접합자→배 / 밑씨→종자 / 씨방→열매"}, {"id": "M1-23", "q": "열매(fruit)란?", "a": "씨방이 발달한 것(종자 보호·산포)"}, {"id": "M1-24", "q": "단자엽과 진정쌍자엽의 잎맥 차이는?", "a": "단자엽=평행맥 / 진정쌍자엽=그물맥"}, {"id": "M1-25", "q": "단자엽과 진정쌍자엽의 자엽(떡잎) 수는?", "a": "단자엽=1개 / 진정쌍자엽=2개"}, {"id": "M1-26", "q": "단자엽과 진정쌍자엽의 뿌리 차이는?", "a": "단자엽=수염뿌리(주근 없음) / 진정쌍자엽=곧은뿌리(주근)"}, {"id": "M1-27", "q": "단자엽과 진정쌍자엽의 줄기 관속 배열은?", "a": "단자엽=산재(흩어짐) / 진정쌍자엽=고리 배열"}, {"id": "M1-28", "q": "단자엽과 진정쌍자엽의 꽃 기관 수는?", "a": "단자엽=3의 배수 / 진정쌍자엽=4·5의 배수"}]}, {"label": "31 균류", "cards": [{"id": "M2-1", "q": "균류의 영양 방식은?", "a": "흡수영양(absorptive) — 효소를 몸 밖으로 분비해 외부 소화 후 양분 흡수(삼키지 않음)"}, {"id": "M2-2", "q": "균류의 영양 방식 3분류는?", "a": "분해자(죽은 유기물), 기생(살아있는 숙주, 일부 병원성), 상리공생"}, {"id": "M2-3", "q": "균사(hypha)와 균사체(mycelium)란?", "a": "균사=가는 관 모양 / 균사체=균사가 얽힌 그물(표면적/부피 극대화로 흡수 효율↑)"}, {"id": "M2-4", "q": "균류 세포벽의 성분은?", "a": "키틴(chitin) — 식물의 셀룰로오스와 대비"}, {"id": "M2-5", "q": "격벽균사(septate)와 다핵균사(coenocytic)의 차이는?", "a": "격벽균사=가로벽으로 칸 나뉨(핵 이동 가능) / 다핵균사=격벽 없어 다핵(세포질분열 없는 반복 핵분열)"}, {"id": "M2-6", "q": "흡기(haustoria)란?", "a": "균사가 식물 세포에 넣어 양분을 빼내는 구조"}, {"id": "M2-7", "q": "균근(mycorrhizae)이란?", "a": "균류와 식물 뿌리의 상리공생(균류는 무기물[인], 식물은 당 제공)"}, {"id": "M2-8", "q": "수지상균근(AM)과 외생균근(ECM)의 차이는?", "a": "AM(글로메로균)=균사가 뿌리 세포벽 뚫고 수지상체 형성, 식물 80% / ECM(자낭·담자균)=뿌리 표면·세포 사이 감쌈(세포 내 침투 없음), 나무"}, {"id": "M2-9", "q": "원형질융합(plasmogamy)이란?", "a": "두 균사의 세포질이 합쳐짐(핵은 바로 안 합쳐짐)"}, {"id": "M2-10", "q": "이핵체(heterokaryon)와 2핵균사(dikaryotic)란?", "a": "한 세포에 서로 다른 반수체 핵 공존; 핵이 쌍으로 있으면 2핵균사(n+n) — 2배체와 다름"}, {"id": "M2-11", "q": "핵융합(karyogamy)의 결과는?", "a": "반수체 핵끼리 융합→2배체(2n) 접합자(대부분 균류의 유일한 2배체 단계)"}, {"id": "M2-12", "q": "균류 생활사의 우세 배수성은?", "a": "반수체(n) 우세(2배체는 핵융합 직후 잠깐)"}, {"id": "M2-13", "q": "균류 유성생식의 순서는?", "a": "원형질융합(세포질) → 이핵체/2핵 → 핵융합(핵, 2n) → 감수분열 → 반수체 포자"}, {"id": "M2-14", "q": "곰팡이(mold)와 효모(yeast)의 무성생식은?", "a": "곰팡이=체세포분열로 분생포자(conidia) / 효모=출아(budding)"}, {"id": "M2-15", "q": "불완전균(deuteromycete)이란?", "a": "유성 단계가 알려지지 않은 균류의 편의상 분류"}, {"id": "M2-16", "q": "균류가 식물보다 가까운 생물과 소속 그룹은?", "a": "동물; 둘 다 오피스토콘타(opisthokont)"}, {"id": "M2-17", "q": "편모를 가진 균류는?", "a": "병꼴균(chytrid) — 균류 중 유일하게 편모 포자, 양서류 떼죽음(Bd) 원인"}, {"id": "M2-18", "q": "접합균(Rhizopus)의 특징은?", "a": "다핵균사, 저항성 접합포자낭(zygosporangium) 형성(빵곰팡이)"}, {"id": "M2-19", "q": "글로메로균(Glomeromycota)의 특징은?", "a": "수지상균근(AM)을 만들어 대부분 식물 뿌리와 공생"}, {"id": "M2-20", "q": "자낭균(Ascomycota)의 특징은?", "a": "자낭(ascus) 안에 자낭포자, 무성포자=분생포자, 대부분 지의류의 균류"}, {"id": "M2-21", "q": "담자균(Basidiomycota)의 특징은?", "a": "담자기(basidium)에 담자포자, 2핵균사가 자실체(버섯) 형성"}, {"id": "M2-22", "q": "균류의 생태적 핵심 역할은?", "a": "분해자(셀룰로오스·리그닌까지 분해, 탄소·질소 재순환)"}, {"id": "M2-23", "q": "내생균(endophyte)이란?", "a": "잎·조직 안에 무해히 살며(주로 자낭균) 독소로 초식 방어·내열/내건성 부여"}, {"id": "M2-24", "q": "지의류(lichen)의 구성은?", "a": "광합성 미생물(녹조 또는 남세균) + 균류(주로 자낭균)의 공생체"}, {"id": "M2-25", "q": "지의류에서 각 파트너의 역할은?", "a": "균류=전체 형태·구조(질량 대부분) / 조류=탄소(당), 남세균=질소도"}, {"id": "M2-26", "q": "지의류의 생태적 역할은?", "a": "1차 천이의 개척자(맨 땅에서 토양 형성)"}, {"id": "M2-27", "q": "식물병의 약 몇 %가 균류인가?", "a": "약 80%(녹병·깜부기 등)"}]}]}, {"id": "N", "name": "동물의 다양성", "chapters": [{"label": "32 동물의 다양성", "cards": [{"id": "N0-1", "q": "동물(Animalia)의 영양 방식은?", "a": "종속영양; 먹이를 섭취(ingest)한 뒤 몸 안에서 소화(균류=흡수와 대비)"}, {"id": "N0-2", "q": "동물이 식물·균류와 다른 구조적 특징은?", "a": "세포벽이 없음(콜라겐 등 세포외기질과 카드헤린으로 결합)"}, {"id": "N0-3", "q": "동물만의 조직 2가지는?", "a": "신경 조직·근육 조직(빠른 자극 전달과 운동)"}, {"id": "N0-4", "q": "동물의 배수성과 반수체 단계는?", "a": "2배체 우세; 반수체는 정자·난자뿐"}, {"id": "N0-5", "q": "동물 발생의 공통 단계 순서는?", "a": "접합자→난할(cleavage)→포배(blastula)→낭배형성(gastrulation)→낭배"}, {"id": "N0-6", "q": "낭배형성에서 생기는 원장과 원구는?", "a": "원장(archenteron, 미래 소화관)과 입구인 원구(blastopore)"}, {"id": "N0-7", "q": "세 배엽과 각 유래 기관은?", "a": "외배엽=외피·중추신경 / 내배엽=소화관 내벽·간·폐 내벽 / 중배엽=근육·대부분 기관"}, {"id": "N0-8", "q": "동물의 가장 가까운 원생생물 친척은?", "a": "깃편모충(choanoflagellate)"}, {"id": "N0-9", "q": "캄브리아 대폭발(약 5.35~5.25억 년 전)의 특징은?", "a": "현생 동물문의 약 절반이 갑자기 등장(대부분 좌우대칭동물)"}, {"id": "N0-10", "q": "방사대칭(radial symmetry)의 특징과 예는?", "a": "중심축 하나 기준, 앞뒤·좌우 구분 없음(해면 일부·자포동물); 고착·부유 생활"}, {"id": "N0-11", "q": "좌우대칭(bilateral symmetry)의 두 축과 특징은?", "a": "전후축·배복축; 두화(cephalization, 감각기관이 머리에 모임), 능동적 이동에 유리"}, {"id": "N0-12", "q": "2배엽성과 3배엽성의 배엽 구성은?", "a": "2배엽=외배엽+내배엽(자포동물·유즐동물) / 3배엽=외+중+내(모든 좌우대칭동물)"}, {"id": "N0-13", "q": "진체강(coelom)의 정의는?", "a": "중배엽에서 유래한 조직이 완전히 둘러싼 체강"}, {"id": "N0-14", "q": "위체강(pseudocoelom)의 정의와 예는?", "a": "중배엽과 내배엽 사이의 체강(완전히 중배엽으로 안 싸임); 선충·윤형동물"}, {"id": "N0-15", "q": "무체강(acoelomate)의 예는?", "a": "편형동물(플라나리아); 몸이 얇아 표면으로 물질교환"}, {"id": "N0-16", "q": "체강 유무가 계통 지표로 부적절한 이유는?", "a": "진화 과정에서 여러 번 독립적으로 생기거나 사라졌기 때문"}, {"id": "N0-17", "q": "선구동물의 난할 양식은?", "a": "나선난할(spiral) + 결정난할(determinate, 운명 일찍 고정)"}, {"id": "N0-18", "q": "후구동물의 난할 양식은?", "a": "방사난할(radial) + 부정난할(indeterminate, 할구가 전능성 유지)"}, {"id": "N0-19", "q": "선구동물과 후구동물의 체강 형성 차이는?", "a": "선구=분열체강(중배엽 덩어리가 갈라짐) / 후구=장체강(원장 벽에서 주머니로 떨어짐)"}, {"id": "N0-20", "q": "선구동물과 후구동물의 원구 운명은?", "a": "선구=원구가 입 / 후구=원구가 항문(입은 나중에 따로)"}, {"id": "N0-21", "q": "선구동물과 후구동물의 예는?", "a": "선구=연체·환형·절지동물 / 후구=극피·척삭동물(사람)"}, {"id": "N0-22", "q": "일란성 쌍둥이가 후구동물에서 가능한 이유는?", "a": "부정난할 덕분(4세포기 할구를 분리해도 각각 완전한 개체)"}, {"id": "N0-23", "q": "해면(Porifera)의 조직 특징은?", "a": "진정한 조직이 없음(측생동물, 기저 동물)"}, {"id": "N0-24", "q": "진정후생동물(Eumetazoa)이란?", "a": "조직이 있는 동물(자포동물·유즐동물 + 좌우대칭동물)"}, {"id": "N0-25", "q": "좌우대칭동물(Bilateria)의 3그룹은?", "a": "후구동물(극피·척삭) / 촉수담륜동물(연체·환형·편형) / 탈피동물(절지·선충)"}, {"id": "N0-26", "q": "탈피동물(Ecdysozoa)의 이름 유래는?", "a": "외골격을 탈피(ecdysis)함"}]}, {"label": "33 무척추동물", "cards": [{"id": "N1-1", "q": "해면동물(Porifera)의 조직 특징과 섭식은?", "a": "진정한 조직·기관 없음(측생동물); 깃세포(choanocyte)로 세균·먹이 여과섭식"}, {"id": "N1-2", "q": "해면의 변형세포(amoebocyte)의 기능은?", "a": "양분 운반·골격(골편 spicule·해면질 spongin) 생성"}, {"id": "N1-3", "q": "자포동물(Cnidaria)의 배엽·대칭은?", "a": "2배엽성·방사대칭"}, {"id": "N1-4", "q": "위수강(gastrovascular cavity)의 특징은?", "a": "입과 항문이 하나인 소화강(수압골격 역할도)"}, {"id": "N1-5", "q": "자포동물의 먹이 포획 기관은?", "a": "자포세포(cnidocyte) 안의 자포낭(nematocyst, 독침)"}, {"id": "N1-6", "q": "자포동물의 신경계는?", "a": "뇌가 없고 신경망(nerve net)으로 사방에서 감지"}, {"id": "N1-7", "q": "자포동물의 두 형태는?", "a": "폴립(polyp, 고착)과 메두사(medusa, 유영)"}, {"id": "N1-8", "q": "산호충(Anthozoa)의 형태 특징은?", "a": "폴립만(메두사 없음); 말미잘·산호, 산호초 형성"}, {"id": "N1-9", "q": "촉수담륜동물(Lophotrochozoa)의 이름 유래는?", "a": "담륜자 유생(trochophore) 또는 촉수관(lophophore)을 가진 무리(분자 데이터로 묶임)"}, {"id": "N1-10", "q": "편형동물(Platyhelminthes)의 체강·형태는?", "a": "무체강·등배로 납작·좌우대칭"}, {"id": "N1-11", "q": "편형동물의 소화·삼투조절은?", "a": "위수강(입만, 항문 없음) 또는 소화관 없음; 불꽃세포(flame cell, 원신관)로 삼투조절"}, {"id": "N1-12", "q": "편형동물의 예 3가지는?", "a": "플라나리아(자유생활), 흡충(fluke, 기생), 촌충(tapeworm, scolex로 부착)"}, {"id": "N1-13", "q": "연체동물(Mollusca)의 공통 3부분은?", "a": "발(foot), 내장낭(visceral mass), 외투막(mantle, 껍질 분비)"}, {"id": "N1-14", "q": "치설(radula)이란?", "a": "연체동물의 줄 모양 먹이 긁는 기관"}, {"id": "N1-15", "q": "연체동물의 순환·배설·유생은?", "a": "개방순환계(두족류 제외), 후신관 배설, 담륜자 유생"}, {"id": "N1-16", "q": "복족류(Gastropoda)의 특징은?", "a": "달팽이·민달팽이(연체동물의 3/4); 나선 껍질, 육상 달팽이는 외투강이 폐"}, {"id": "N1-17", "q": "이매패류(Bivalvia)의 특징은?", "a": "조개·굴·홍합; 두 껍질, 머리·치설 없음, 아가미로 여과섭식"}, {"id": "N1-18", "q": "두족류(Cephalopoda)의 특징은?", "a": "오징어·문어; 폐쇄순환계, 발달한 뇌·눈, 외투강 물 분사로 유영, 활발한 포식자"}, {"id": "N1-19", "q": "환형동물(Annelida)의 핵심 형질은?", "a": "체절(segment)로 반복(체절동물), 진체강, 강모, 폐쇄순환계, 후신관"}, {"id": "N1-20", "q": "환형동물의 예는?", "a": "지렁이(빈모류), 거머리, 갯지렁이(다모류)"}, {"id": "N1-21", "q": "탈피동물(Ecdysozoa)의 공통 특징은?", "a": "질긴 큐티클(cuticle), 자라면서 탈피(ecdysis)로 벗음"}, {"id": "N1-22", "q": "선충동물(Nematoda)의 특징은?", "a": "위체강·원통형(양 끝 뾰족)·큐티클 탈피; 순환계 없음, 종단근만"}, {"id": "N1-23", "q": "선충동물의 예는?", "a": "회충·요충(기생), C. elegans(연구 모델)"}, {"id": "N1-24", "q": "절지동물(Arthropoda)의 3대 핵심 형질은?", "a": "외골격(exoskeleton, 단백질+키틴, 탈피), 체절, 관절지(jointed appendage)"}, {"id": "N1-25", "q": "협각류(Chelicerata)의 특징은?", "a": "협각(chelicerae); 더듬이 없음, 투구게·거미류, 책허파(book lung)"}, {"id": "N1-26", "q": "다지류(Myriapoda)의 노래기와 지네 차이는?", "a": "노래기=초식, 마디당 2쌍 다리 / 지네=육식, 마디당 1쌍 다리, 독발톱"}, {"id": "N1-27", "q": "갑각류(Crustacea)의 고유 특징은?", "a": "유일하게 더듬이 2쌍; 십각류(새우·게·가재), 등각류(쥐며느리)"}, {"id": "N1-28", "q": "곤충이 진화한 조상은?", "a": "갑각류(범갑각류 Pancrustacea)"}, {"id": "N1-29", "q": "극피동물(Echinodermata)의 대칭(유생·성체)은?", "a": "유생은 좌우대칭, 성체는 5방사대칭(오방사)"}, {"id": "N1-30", "q": "극피동물의 고유 기관계는?", "a": "수관계(water vascular system) — 관족(tube feet)으로 운동·섭식·호흡"}, {"id": "N1-31", "q": "극피동물의 골격과 소속은?", "a": "내골격(석회판), 후구동물"}, {"id": "N1-32", "q": "척삭동물(Chordata)의 4대 특징은?", "a": "척삭(notochord), 등쪽 속 빈 신경관, 인두열(pharyngeal slits), 근절 있는 항문 뒤 꼬리"}, {"id": "N1-33", "q": "체절을 가진 두 문은?", "a": "환형동물 + 절지동물"}]}, {"label": "34 척추동물", "cards": [{"id": "N2-1", "q": "척추동물 계통의 단계적 형질 획득 순서는?", "a": "척삭동물→척추동물(두개골·척주·신경능선)→유악류(턱)→사지동물(사지)→양막류(양막란)→포유류(털·젖)"}, {"id": "N2-2", "q": "두삭동물(창고기)의 특징은?", "a": "성체도 4대 특징 유지, 척삭동물 기저; 조상 척삭동물이 창고기와 비슷했을 것"}, {"id": "N2-3", "q": "피낭동물(멍게)의 특징은?", "a": "유생만 4대 특징, 성체는 고착·여과섭식; 신경능선 비슷한 세포로 척추동물 기원 단서"}, {"id": "N2-4", "q": "척추동물 고유의 파생형질은?", "a": "신경능선(neural crest) — 이빨·두개골 일부·신경·감각기관 형성"}, {"id": "N2-5", "q": "척추동물의 Hox 유전자 수 특징은?", "a": "유전자 중복으로 2벌 이상(창고기·멍게는 1벌)"}, {"id": "N2-6", "q": "무악류(원구류)에 속하는 현생 동물은?", "a": "먹장어(Myxini)와 칠성장어(Petromyzontida); 턱 없음, 척삭을 성체까지 유지"}, {"id": "N2-7", "q": "유악류(Gnathostome)의 턱은 무엇에서 진화했는가?", "a": "인두를 지지하던 인두궁(아가미 지지대)"}, {"id": "N2-8", "q": "유악류의 파생형질은?", "a": "턱, 측선(lateral line), 쌍지느러미"}, {"id": "N2-9", "q": "연골어류(Chondrichthyes)의 특징은?", "a": "상어·가오리; 골격이 주로 연골, 방패비늘 (조상은 경골 → 연골은 2차 진화)"}, {"id": "N2-10", "q": "경골어류(Osteichthyes)의 특징은?", "a": "골격이 주로 경골; 부레(swim bladder), 아가미뚜껑(operculum)"}, {"id": "N2-11", "q": "조기어류와 육기어류의 차이는?", "a": "조기어류=지느러미가 뼈살로 지지(대부분 어류) / 육기어류=근육질 지느러미(실러캔스·폐어), 사지동물 조상"}, {"id": "N2-12", "q": "사지동물의 조상 어류 계통은?", "a": "육기어류(경골어류의 한 갈래)"}, {"id": "N2-13", "q": "Tiktaalik의 의의는?", "a": "지느러미→사지 전이를 보여주는 화석(손목·갈비·목)"}, {"id": "N2-14", "q": "양서류(Amphibia)의 3목은?", "a": "도롱뇽(Urodela, 꼬리 있음), 개구리(Anura, 꼬리 없음), 무족영원(Apoda, 다리 없음)"}, {"id": "N2-15", "q": "양서류의 생활사는?", "a": "수생 올챙이(아가미·꼬리·초식)→변태→육상 성체(폐·다리·육식)"}, {"id": "N2-16", "q": "양서류가 습한 곳에 의존하는 이유는?", "a": "축축한 피부로 기체교환(피부 호흡), 껍질 없는 알을 물에 산란"}, {"id": "N2-17", "q": "양막류(amniote)란?", "a": "양막란을 가진 사지동물(파충류+포유류); 물 없는 육상 번식 가능"}, {"id": "N2-18", "q": "양막란의 4배막과 기능은?", "a": "양막(보호), 융모막(기체교환), 요막(노폐물 저장), 난황막(양분 공급)"}, {"id": "N2-19", "q": "양막(amnion)의 기능은?", "a": "양수로 배아를 감싸 충격·건조 방지"}, {"id": "N2-20", "q": "융모막(chorion)의 기능은?", "a": "알 전체를 싸며 기체교환(O₂/CO₂)"}, {"id": "N2-21", "q": "요막(allantois)의 기능은?", "a": "노폐물 저장 + 기체교환 보조"}, {"id": "N2-22", "q": "난황막(yolk sac)의 기능은?", "a": "난황(양분)을 감싸 배아에 공급"}, {"id": "N2-23", "q": "파충류(Reptilia)의 특징은?", "a": "비늘(케라틴, 방수)·양막란, 대부분 외온동물(ectotherm)"}, {"id": "N2-24", "q": "조류를 제외한 공룡의 멸종 시기는?", "a": "약 6,600만 년 전(백악기말, 소행성 충돌 관련)"}, {"id": "N2-25", "q": "뱀의 진화적 유래는?", "a": "다리를 잃은 도마뱀(흔적 골반·다리뼈)"}, {"id": "N2-26", "q": "지배파충류(Archosauria)에 속하는 것은?", "a": "악어류 + 조류"}, {"id": "N2-27", "q": "조류(Aves)가 진화한 계통은?", "a": "지배파충류 중 수각류 공룡(분류상 파충류의 한 갈래)"}, {"id": "N2-28", "q": "조류의 비행 적응은?", "a": "깃털, 속 빈 뼈, 기낭(air sac), 내온동물(endotherm), 부리(이빨 없음)"}, {"id": "N2-29", "q": "포유류(Mammalia)의 두 특징은?", "a": "털(hair)과 젖(젖샘 milk)"}, {"id": "N2-30", "q": "포유류의 계통과 가운데귀 뼈의 유래는?", "a": "단궁류(synapsid); 단궁류의 턱뼈(관절골·방형골)가 가운데귀 뼈(망치뼈·모루뼈)로 편입"}, {"id": "N2-31", "q": "단공류(Monotremata)의 특징은?", "a": "알을 낳는 유일한 포유류(오리너구리·가시두더지); 젖꼭지 없음"}, {"id": "N2-32", "q": "유대류(Marsupialia)의 특징은?", "a": "매우 미성숙한 새끼 출산→육아낭(marsupium)에서 발생 완성; 호주에서 수렴진화"}, {"id": "N2-33", "q": "진수류(태반류, Eutheria)의 특징은?", "a": "자궁 내 복잡한 태반으로 오래 발생, 긴 임신(대부분의 포유류)"}, {"id": "N2-34", "q": "영장류(Primates)의 파생형질은?", "a": "쥘 수 있는 손발·납작한 손톱·마주보는 엄지(opposable thumb), 큰 뇌, 앞쪽으로 모인 눈"}, {"id": "N2-35", "q": "사람의 진화 계보 순서는?", "a": "오스트랄로피테쿠스(직립)→호모 하빌리스(도구)→호모 에렉투스(불·이주)→호모 사피엔스"}, {"id": "N2-36", "q": "침팬지와 사람의 관계는?", "a": "침팬지는 조상이 아니라 공통 조상에서 갈라진 '사촌'(진화는 사다리가 아니라 가지치기)"}]}]}, {"id": "O", "name": "식물 구조·수송·영양", "chapters": [{"label": "35 식물의 구조", "cards": [{"id": "O0-1", "q": "식물의 3대 기관은?", "a": "뿌리, 줄기, 잎(줄기계=줄기+잎)"}, {"id": "O0-2", "q": "뿌리와 줄기계의 상호의존은?", "a": "뿌리는 광합성 못 해 줄기계의 당에 의존, 줄기계는 뿌리의 물·무기물에 의존"}, {"id": "O0-3", "q": "곧은뿌리계와 수염뿌리계의 분포는?", "a": "곧은뿌리=대부분 쌍자엽(굵은 주근 1개) / 수염뿌리=대부분 단자엽(가는 뿌리 그물)"}, {"id": "O0-4", "q": "뿌리털(root hair)의 기능은?", "a": "표피세포가 길게 돌출해 흡수 면적 확대"}, {"id": "O0-5", "q": "줄기의 마디·마디사이·정단눈·곁눈은?", "a": "마디(잎 붙는 곳)·마디사이·정단눈(끝)·곁눈(잎겨드랑이)"}, {"id": "O0-6", "q": "식물의 3대 조직계는?", "a": "표피조직계(dermal), 관속조직계(vascular), 기본조직계(ground)"}, {"id": "O0-7", "q": "표피조직계의 변형 구조 3가지는?", "a": "공변세포(기공 여닫음), 뿌리털(흡수), 모용(trichome, 방어)"}, {"id": "O0-8", "q": "관속조직계의 구성과 위치는?", "a": "물관부+체관부; 뿌리=중심 관속주(중심주), 줄기/잎=관속"}, {"id": "O0-9", "q": "기본조직계의 위치(속·피층)는?", "a": "관속 안쪽=속(pith), 바깥쪽=피층(cortex)"}, {"id": "O0-10", "q": "기본조직 3세포의 구별 기준은?", "a": "살아있는지 + 세포벽 종류"}, {"id": "O0-11", "q": "유조직(parenchyma)의 특징은?", "a": "살아있음, 얇은 1차벽; 광합성·저장·분비·상처 회복(분열능 유지)"}, {"id": "O0-12", "q": "후각조직(collenchyma)의 특징은?", "a": "살아있음, 모서리가 두꺼운 1차벽; 자라는 줄기·잎자루를 유연하게 지지(셀러리 심)"}, {"id": "O0-13", "q": "후벽조직(sclerenchyma)의 특징은?", "a": "성숙 시 죽음, 리그닌 2차벽; 단단한 지지(석세포 sclereid, 섬유 fiber)"}, {"id": "O0-14", "q": "물관부(xylem)의 두 세포와 상태는?", "a": "헛물관(모든 관속식물)·물관요소(대부분 속씨식물); 성숙하며 죽어 속 빈 관"}, {"id": "O0-15", "q": "체관요소의 상태와 보조 세포는?", "a": "핵·리보솜 잃은 채 살아있음; 속씨식물=동반세포(반세포), 겉씨식물=알부민세포가 보조"}, {"id": "O0-16", "q": "잎 엽육의 두 층(쌍자엽)은?", "a": "책상조직(위, 길쭉·엽록체 많음·광흡수), 해면조직(아래, 공기 공간·기체교환)"}, {"id": "O0-17", "q": "유관속초(bundle sheath)가 발달하는 식물은?", "a": "C4 식물"}, {"id": "O0-18", "q": "정단분열조직과 측생분열조직의 생장 차이는?", "a": "정단=1차생장(길이, 모든 식물) / 측생=2차생장(지름, 겉씨·많은 쌍자엽)"}, {"id": "O0-19", "q": "측생분열조직 2가지는?", "a": "관속형성층 + 코르크형성층"}, {"id": "O0-20", "q": "뿌리 끝의 뿌리골무와 세 영역 순서는?", "a": "뿌리골무(보호); 분열대→신장대→성숙대"}, {"id": "O0-21", "q": "뿌리의 조직 배열(바깥→안)은?", "a": "표피→피층→관속주(중심주)"}, {"id": "O0-22", "q": "내초(pericycle)와 내피(endodermis)의 기능은?", "a": "내초=측근 형성 / 내피=물 선택 통과"}, {"id": "O0-23", "q": "관속형성층(vascular cambium)이 만드는 것은?", "a": "안쪽에 2차물관부(목재), 바깥쪽에 2차체관부"}, {"id": "O0-24", "q": "코르크형성층과 주피(periderm)는?", "a": "코르크형성층이 코르크 세포 생성해 표피 대체; 코르크형성층+산물=주피"}, {"id": "O0-25", "q": "수피(bark)의 정의는?", "a": "관속형성층 바깥의 모든 조직(2차체관부+주피)"}, {"id": "O0-26", "q": "나이테(growth ring)의 구성은?", "a": "봄나무(early wood, 큰 세포·물 수송)+여름나무(late wood, 두꺼운 벽·지지)"}]}, {"label": "36 식물의 수송", "cards": [{"id": "O1-1", "q": "식물의 자원 획득 부위는?", "a": "잎(빛·CO₂), 뿌리(물·무기물)"}, {"id": "O1-2", "q": "식물이 잃는 물의 90% 이상이 나가는 경로는?", "a": "기공을 통한 증발(증산)"}, {"id": "O1-3", "q": "아포플라스트(apoplast)의 정의는?", "a": "살아있는 세포의 원형질막 바깥 전부(세포벽·세포외 공간·죽은 세포 내부인 물관요소·헛물관)"}, {"id": "O1-4", "q": "심플라스트(symplast)의 정의는?", "a": "모든 살아있는 세포의 세포질 + 원형질연락사(plasmodesmata)"}, {"id": "O1-5", "q": "물질 이동의 세 경로는?", "a": "아포플라스트 경로(세포벽 따라), 심플라스트 경로(원형질연락사 통해), 막관통 경로(막 거듭 가로질러)"}, {"id": "O1-6", "q": "물의 이동 방향을 정하는 물 포텐셜(Ψ)의 규칙은?", "a": "물은 Ψ가 높은 곳에서 낮은 곳으로 이동(순수 물=0 MPa)"}, {"id": "O1-7", "q": "물 포텐셜의 식은?", "a": "Ψ = Ψs(용질 포텐셜) + Ψp(압력 포텐셜)"}, {"id": "O1-8", "q": "용질 포텐셜(Ψs)의 부호는?", "a": "항상 음수(용질이 자유 물을 줄임; 농도↑→더 음수)"}, {"id": "O1-9", "q": "압력 포텐셜(Ψp)의 부호 범위는?", "a": "양수·음수 모두 가능(살아있는 세포=팽압 양압 / 죽은 물관=음압 장력)"}, {"id": "O1-10", "q": "팽압(turgor pressure)이란?", "a": "살아있는 세포가 물 흡수로 원형질체가 세포벽을 눌러 만드는 양압(조직 빳빳함·세포 신장 동력)"}, {"id": "O1-11", "q": "내피(endodermis)의 역할은?", "a": "피층 가장 안쪽에서 무기물의 마지막 선택 관문"}, {"id": "O1-12", "q": "카스파리대(Casparian strip)의 성분과 기능은?", "a": "내피세포 벽의 수베린(suberin, 왁스) 띠; 물·무기물이 통과 못 해 아포플라스트를 차단"}, {"id": "O1-13", "q": "카스파리대가 강제하는 것은?", "a": "아포플라스트로 이동하던 물·무기물이 반드시 내피세포의 선택적 원형질막을 통과(심플라스트로 진입)해야 관속주로 들어감"}, {"id": "O1-14", "q": "내피의 3가지 역할은?", "a": "① 필요한 무기물만 선택 ② 독성 물질 차단 ③ 물관 용질의 역류 방지"}, {"id": "O1-15", "q": "증산(transpiration)이란?", "a": "잎 등에서 수증기가 빠져나가는 것"}, {"id": "O1-16", "q": "뿌리압(root pressure)의 한계와 부작용은?", "a": "약해서(몇 m) 키 큰 식물엔 부족; 과하면 일액현상(guttation, 잎 끝 물방울)"}, {"id": "O1-17", "q": "물관 수송의 주된 기작은?", "a": "응집-장력설(cohesion-tension hypothesis, 끌어올림)"}, {"id": "O1-18", "q": "응집-장력설의 3요소는?", "a": "증산당김(잎 표면 음압), 응집(물 분자 수소결합), 부착(물이 물관벽에 달라붙음)"}, {"id": "O1-19", "q": "물관액이 오르는 압력 상태는?", "a": "음압(장력) — 끌어올림(밀어올림 아님), 살아있는 세포 없이도 가능"}, {"id": "O1-20", "q": "기공을 여닫는 세포는?", "a": "한 쌍의 공변세포(guard cell)"}, {"id": "O1-21", "q": "기공이 열리는 기작은?", "a": "K⁺이 공변세포로 유입→물이 삼투로 따라 들어와 팽압↑→구멍 열림"}, {"id": "O1-22", "q": "기공 열림·닫힘의 신호는?", "a": "열림=빛(청색광)·낮은 CO₂·생체시계 / 닫힘=건조 스트레스 시 ABA(앱시스산)"}, {"id": "O1-23", "q": "체관 수송의 기작은?", "a": "압류설(pressure-flow hypothesis) — 공급원(source)에서 수용부(sink)로"}, {"id": "O1-24", "q": "공급원(source)과 수용부(sink)의 예는?", "a": "공급원=성숙한 잎(당 생산) / 수용부=뿌리·열매·어린 잎·덩이줄기(당 소비·저장)"}, {"id": "O1-25", "q": "압류설의 흐름 원리는?", "a": "공급원에서 당 적재(능동수송)→체관 Ψs↓→물 유입→압력↑→압력차 따라 수용부로 흐름→당 하역→압력↓"}, {"id": "O1-26", "q": "원형질연락사가 동물 간극연접과 다른 점은?", "a": "단백질·RNA를 옮길 수 있음(동적 통로, 팽압·Ca²⁺에 따라 여닫힘)"}]}, {"label": "37 토양과 영양", "cards": [{"id": "O2-1", "q": "토양 조직(soil texture)에서 작물에 가장 좋은 것은?", "a": "양토(loam, 모래·미사·점토가 적절히 섞임)"}, {"id": "O2-2", "q": "부식질(humus)이란?", "a": "분해 중 유기물; 물·양분 보유, 토양을 푸석하게 함"}, {"id": "O2-3", "q": "양이온 교환(cation exchange)이란?", "a": "음전하 점토·부식질이 양이온(K⁺·Ca²⁺·Mg²⁺)을 붙잡아 씻겨가지 않게 함(뿌리가 H⁺ 내보내 떼어 흡수)"}, {"id": "O2-4", "q": "필수 원소(essential element)를 확인하는 방법은?", "a": "수경재배(hydroponic culture, 무기물 용액에서 재배)"}, {"id": "O2-5", "q": "필수 원소의 총 개수는?", "a": "17종(다량 9 + 미량 8)"}, {"id": "O2-6", "q": "다량영양소 9종은?", "a": "C·O·H·N·P·S·K·Ca·Mg"}, {"id": "O2-7", "q": "생장·수확량에 가장 크게 기여하는 원소는?", "a": "질소(N) — 단백질·핵산·엽록소 성분"}, {"id": "O2-8", "q": "미량영양소 8종은?", "a": "Cl·Fe·Mn·B·Zn·Cu·Ni·Mo (주로 효소 보조인자)"}, {"id": "O2-9", "q": "백화증(chlorosis)을 일으키는 결핍 원소는?", "a": "Mg(엽록소 성분), Fe(엽록소 합성 효소 보조인자)"}, {"id": "O2-10", "q": "이동성·비이동성 무기물 결핍의 나타나는 부위는?", "a": "이동성(Mg 등)=오래된 잎부터 / 비이동성(Fe 등)=어린 부분부터"}, {"id": "O2-11", "q": "가장 흔한 결핍 원소 3가지는?", "a": "질소·인·칼륨"}, {"id": "O2-12", "q": "식물이 흡수할 수 있는 질소 형태는?", "a": "NO₃⁻(질산)·NH₄⁺(암모늄); 식물은 주로 NO₃⁻ 흡수"}, {"id": "O2-13", "q": "암모늄(NH₄⁺) 생성 2경로는?", "a": "① 질소고정세균이 N₂→NH₃ ② 암모니아화(분해자가 죽은 유기질소를 NH₄⁺로)"}, {"id": "O2-14", "q": "질화작용(nitrification)의 단계는?", "a": "NH₃ → NO₂⁻(아질산) → NO₃⁻(질산), 각 단계를 다른 질화세균이 매개"}, {"id": "O2-15", "q": "탈질작용(denitrification)이란?", "a": "혐기성 토양에서 탈질세균이 NO₃⁻→N₂로 바꿔 대기로 잃음"}, {"id": "O2-16", "q": "대기 질소(N₂)를 식물이 못 쓰는 이유는?", "a": "삼중결합으로 거의 불활성"}, {"id": "O2-17", "q": "질소 고정(nitrogen fixation)을 하는 생물은?", "a": "모든 질소고정생물은 세균(Rhizobium·Azotobacter·시아노박테리아)"}, {"id": "O2-18", "q": "질소 고정 효소와 그 약점은?", "a": "니트로게나아제(nitrogenase); 산소에 의해 불활성화(혐기 조건/산소 차단 필요)"}, {"id": "O2-19", "q": "콩과식물 뿌리혹(root nodule)에서 세균의 분화형은?", "a": "박테로이드(bacteroid, 질소 고정형)"}, {"id": "O2-20", "q": "레그헤모글로빈(leghemoglobin)의 역할은?", "a": "산소를 완충해 니트로게나아제를 보호하면서 세균 호흡에 O₂를 적절히 공급"}, {"id": "O2-21", "q": "윤작(crop rotation)으로 콩과를 심는 효과는?", "a": "토양 질소 회복"}, {"id": "O2-22", "q": "균근(mycorrhizae)에서 균류와 식물의 교환은?", "a": "균류가 무기물(특히 인)·물, 식물이 당"}, {"id": "O2-23", "q": "수지상균근(AM)과 외생균근(ECM)의 균류·분포는?", "a": "AM=글로메로균, 수지상체, 육상식물 80% / ECM=자낭·담자균, 나무"}, {"id": "O2-24", "q": "기생식물의 예(반기생·전기생)는?", "a": "겨우살이(반기생, 광합성도) / 새삼(전기생, 엽록소 없음)"}, {"id": "O2-25", "q": "식충식물이 곤충을 잡는 이유는?", "a": "질소 등을 보충(광합성은 함); 질소 부족한 습지·산성 토양"}, {"id": "O2-26", "q": "착생식물(epiphyte)이란?", "a": "다른 식물 위에 붙어 살되 기생은 아님; 공기·빗물에서 양분(난·브로멜리아드)"}]}]}, {"id": "P", "name": "식물 생식·반응", "chapters": [{"label": "38 속씨식물 생식", "cards": [{"id": "P0-1", "q": "꽃의 네 기관(밖→안)은?", "a": "꽃받침(악편) → 꽃잎(화판) → 수술(꽃밥+수술대) → 심피(암술머리+암술대+씨방)"}, {"id": "P0-2", "q": "밑씨(ovule)를 감싸는 것과 틈은?", "a": "주피 2겹(→종피)이 감싸며 주공(micropyle)이라는 틈"}, {"id": "P0-3", "q": "배낭 형성 시작 세포와 감수분열 결과는?", "a": "대포자모세포(2n) 감수분열→대포자 4개, 보통 1개만 생존(3개 퇴화)"}, {"id": "P0-4", "q": "생존한 대포자가 배낭이 되는 과정은?", "a": "체세포분열 3회(세포질분열 없음)→8개 핵을 가진 1세포→막으로 나뉘어 배낭"}, {"id": "P0-5", "q": "성숙한 배낭의 구성은?", "a": "8핵 7세포: 난세포 1 + 조세포 2 + 극핵 2(중앙세포) + 반족세포 3"}, {"id": "P0-6", "q": "배낭이 핵 8개인데 세포는 7개인 이유는?", "a": "극핵 2개가 한 중앙세포에 들어 있어서"}, {"id": "P0-7", "q": "조세포(synergid)의 역할은?", "a": "화분관 유인·유도(주공 쪽)"}, {"id": "P0-8", "q": "화분립(수배우체) 형성 과정은?", "a": "소포자모세포(2n) 감수분열→소포자 4개, 각 소포자 체세포분열→2세포(생식세포+관세포)"}, {"id": "P0-9", "q": "화분립의 두 세포와 각 운명은?", "a": "생식세포→체세포분열→정자 2개 / 관세포→화분관"}, {"id": "P0-10", "q": "수분(pollination)이란?", "a": "화분립이 암술머리에 도달하는 것"}, {"id": "P0-11", "q": "중복수정(double fertilization)의 두 결과는?", "a": "정자1+난세포=접합자(배, 2n) / 정자1+극핵2(중앙세포)=배젖(endosperm, 3n)"}, {"id": "P0-12", "q": "중복수정의 의의는?", "a": "수정된 밑씨에만 배젖이 생겨 무수정 밑씨에 자원 낭비를 막음(속씨식물 고유)"}, {"id": "P0-13", "q": "종자(seed)의 구성과 각 배수성은?", "a": "배(2n) + 배젖(3n) + 종피(주피 유래, 2n)"}, {"id": "P0-14", "q": "쌍자엽·단자엽 종자의 배젖 처리 차이는?", "a": "쌍자엽=자엽 2개, 배젖 흡수해 자엽에 저장(콩) / 단자엽=자엽 1개(scutellum), 배젖 유지(옥수수)"}, {"id": "P0-15", "q": "발아(germination)의 순서는?", "a": "흡수(imbibition)→유근이 먼저 나옴→떡잎"}, {"id": "P0-16", "q": "열매(fruit)란?", "a": "씨방이 발달한 것(종자 보호·산포)"}, {"id": "P0-17", "q": "열매의 4유형은?", "a": "단순과(1심피/1꽃), 집합과(한 꽃의 여러 심피, 딸기), 복합과(여러 꽃, 파인애플), 위과(씨방 외 조직, 사과)"}, {"id": "P0-18", "q": "전능성(totipotency)이란?", "a": "한 세포가 분열해 완전한 개체로 발생할 수 있는 능력"}, {"id": "P0-19", "q": "꺾꽂이(cutting)에서 캘러스(callus)란?", "a": "상처 끝의 미분화 전능세포 덩이(→뿌리)"}, {"id": "P0-20", "q": "접목(grafting)의 대목과 접수는?", "a": "대목(stock, 뿌리 제공) + 접수(scion, 접붙이는 가지)"}, {"id": "P0-21", "q": "접목에서 열매의 질을 결정하는 것은?", "a": "접수(scion)의 유전자"}, {"id": "P0-22", "q": "무수정생식(apomixis)이란?", "a": "수정 없이 종자 형성(민들레); 유전적으로 모체와 동일"}, {"id": "P0-23", "q": "조직배양이 바이러스 제거에 이용되는 이유는?", "a": "분열조직이 보통 무바이러스라서"}, {"id": "P0-24", "q": "무성생식의 단점은?", "a": "유전적 다양성 없어 병원체에 똑같이 취약(전염병에 약함, 씨 없는 바나나)"}, {"id": "P0-25", "q": "자가불화합성(self-incompatibility)이란?", "a": "자기 화분을 거부(생화학적 차단) — 가장 흔한 자가수분 방지 장치"}, {"id": "P0-26", "q": "식물 자가불화합성과 동물 면역의 차이는?", "a": "식물=자기 거부 / 동물 면역=비자기 거부"}, {"id": "P0-27", "q": "배우체·포자체 자가불화합성의 차이는?", "a": "배우체형=화분의 반수체 S 대립유전자가 차단 / 포자체형=화분벽에 묻은 포자체(2n) 조직의 S 산물이 차단"}, {"id": "P0-28", "q": "식물 형질전환에 흔히 쓰는 것은?", "a": "아그로박테리움(Ti 플라스미드)"}, {"id": "P0-29", "q": "GM 작물 사례 3가지는?", "a": "Bt 작물(살충 단백질), 제초제 내성, 황금쌀(베타카로틴→비타민A)"}]}, {"label": "39 식물의 반응", "cards": [{"id": "P1-1", "q": "식물 신호 전달의 3단계는?", "a": "수용(reception)→전달(transduction)→반응(response)"}, {"id": "P1-2", "q": "식물 호르몬(hormone)의 정의는?", "a": "저농도로 한 부위에서 만들어져 다른 부위로 이동, 수용체에 결합해 표적 세포 반응을 일으키는 신호 분자"}, {"id": "P1-3", "q": "옥신(auxin, IAA)의 생산 부위와 주요 기능은?", "a": "줄기 끝·어린 잎; 세포(줄기) 신장(저농도), 정단우성, 굴광성·굴중성"}, {"id": "P1-4", "q": "시토키닌(cytokinin)의 생산 부위와 주요 기능은?", "a": "뿌리; 세포분열 촉진, 정단우성 억제(곁눈 성장), 잎 노화 지연"}, {"id": "P1-5", "q": "지베렐린(gibberellin, GA)의 주요 기능은?", "a": "줄기 신장, 종자 발아, 열매 생장"}, {"id": "P1-6", "q": "앱시스산(ABA)의 주요 기능은?", "a": "생장 억제, 기공 닫기(건조 스트레스), 종자 휴면, 건조 내성"}, {"id": "P1-7", "q": "에틸렌(ethylene)의 주요 기능은?", "a": "과일 성숙, 낙엽(잎 탈리), 삼중반응, 노화 촉진"}, {"id": "P1-8", "q": "브라시노스테로이드(brassinosteroid)의 주요 기능은?", "a": "세포 신장·분열, 관속 분화, 종자 발아"}, {"id": "P1-9", "q": "다윈 부자(1880) 굴광성 실험의 결론은?", "a": "풀 자엽초의 끝(tip)이 빛을 감지함(끝 제거·불투명 캡→굴광 없음)"}, {"id": "P1-10", "q": "보이센-옌센(1913) 실험이 입증한 것은?", "a": "투과성 젤라틴은 굴광 O, 불투과성 운모는 굴광 X → 화학 신호(옥신)의 이동"}, {"id": "P1-11", "q": "옥신에 의한 굴광성 기작은?", "a": "옥신이 빛의 반대(어두운) 쪽으로 이동→어두운 쪽 세포가 더 신장→줄기가 빛 쪽으로 굽음"}, {"id": "P1-12", "q": "산생장설(acid growth hypothesis)이란?", "a": "옥신이 H⁺ 펌프 활성화→세포벽 산성화→익스팬신(expansin) 활성→세포벽 느슨→팽압으로 물 유입→세포 신장"}, {"id": "P1-13", "q": "옥신 농도와 줄기 신장의 관계는?", "a": "저농도에서만 촉진, 고농도면 억제(제초제로 응용)"}, {"id": "P1-14", "q": "정단우성(apical dominance)과 관여 호르몬은?", "a": "줄기 끝의 옥신이 곁눈 생장을 억제; 시토키닌은 곁눈 촉진(옥신과 길항)"}, {"id": "P1-15", "q": "피토크롬(phytochrome)이 수용하는 빛은?", "a": "적색광/근적외선광"}, {"id": "P1-16", "q": "피토크롬 Pr과 Pfr의 전환은?", "a": "Pr(적색광 660nm 흡수)↔Pfr(근적외선 730nm 흡수); 적색광→Pfr, 근적외선→Pr"}, {"id": "P1-17", "q": "피토크롬의 활성형과 결과 결정 원칙은?", "a": "Pfr이 활성형; 마지막에 쪼인 광질이 결과를 결정"}, {"id": "P1-18", "q": "청색광 수용체 2가지와 기능은?", "a": "크립토크롬(cryptochrome, 하배축 신장 억제), 포토트로핀(phototropin, 굴광성)"}, {"id": "P1-19", "q": "굴광성(phototropism)의 원인은?", "a": "빛 쪽으로(양성, 줄기); 옥신의 비대칭 분포"}, {"id": "P1-20", "q": "굴중성(gravitropism)에서 뿌리와 줄기의 방향은?", "a": "뿌리=양성(아래), 줄기=음성(위)"}, {"id": "P1-21", "q": "굴중성에서 중력을 감지하는 구조는?", "a": "평형석(statolith, 녹말이 든 녹말체 amyloplast)이 중력 방향으로 가라앉음"}, {"id": "P1-22", "q": "굴촉성(thigmotropism)의 예는?", "a": "덩굴손이 지지대를 감음(접촉 자극에 반응)"}, {"id": "P1-23", "q": "생물시계(circadian rhythm)의 주기와 동조 요인은?", "a": "약 24시간 주기; 빛이 매일 24시간으로 동조(entrain)"}, {"id": "P1-24", "q": "광주기성(photoperiodism)이란?", "a": "일장(낮 길이) 변화로 계절을 감지하는 반응(개화·휴면)"}, {"id": "P1-25", "q": "단일식물(short-day plant)의 개화 조건과 예는?", "a": "임계 일장보다 짧을 때 개화(국화·포인세티아·콩); 늦여름·가을·겨울"}, {"id": "P1-26", "q": "장일식물(long-day plant)의 개화 조건과 예는?", "a": "임계 일장보다 길 때 개화(시금치·무·상추); 늦봄·초여름"}, {"id": "P1-27", "q": "중일식물(day-neutral plant)의 예는?", "a": "토마토·벼·민들레(일장과 무관)"}, {"id": "P1-28", "q": "개화를 실제로 결정하는 것은?", "a": "낮 길이가 아니라 연속된 밤(암기)의 길이"}, {"id": "P1-29", "q": "광중단(밤을 빛 섬광으로 중단) 시 단일·장일식물의 반응은?", "a": "단일식물(장야)=개화 못 함 / 장일식물(단야)=개화 유도됨"}, {"id": "P1-30", "q": "단일식물과 장일식물의 별칭은?", "a": "단일식물=장야식물(최소 암기 필요) / 장일식물=단야식물(최대 암기)"}, {"id": "P1-31", "q": "광중단 효과의 가역성은?", "a": "적색광(효과)↔근적외선광(취소), 피토크롬 매개"}, {"id": "P1-32", "q": "개화 신호 물질과 그 이동은?", "a": "플로리겐(florigen, FT 단백질); 잎에서 만들어져 분열조직으로 이동"}, {"id": "P1-33", "q": "병원체 방어의 과민반응과 전신획득저항성은?", "a": "과민반응(감염 부위 세포 사멸로 격리), 전신획득저항성(SAR, 살리실산 신호로 식물 전체 방어)"}, {"id": "P1-34", "q": "초식 방어의 상처 신호 물질은?", "a": "자스모네이트(방어 물질 생산); 휘발성 물질로 초식자의 천적 유인"}]}]}, {"id": "Q", "name": "내분비·동물 생식", "chapters": [{"label": "45 내분비계", "cards": [{"id": "Q0-1", "q": "세포간 신호 6종은?", "a": "내분비(혈액), 주변분비(인접), 자가분비(자기), 시냅스(신경전달물질), 신경내분비(신경호르몬), 페로몬(개체 간)"}, {"id": "Q0-2", "q": "신경내분비 신호(neuroendocrine)란?", "a": "뉴런이 신경호르몬(neurohormone)을 혈액으로 분비(예: ADH)"}, {"id": "Q0-3", "q": "페로몬(pheromone)이란?", "a": "같은 종의 다른 개체 사이로 방출되는 체외 신호"}, {"id": "Q0-4", "q": "호르몬의 3가지 화학 부류는?", "a": "폴리펩티드, 아민, 스테로이드"}, {"id": "Q0-5", "q": "수용성 호르몬에 해당하는 부류는?", "a": "폴리펩티드 + 대부분 아민"}, {"id": "Q0-6", "q": "지용성 호르몬에 해당하는 부류는?", "a": "스테로이드 + 티록신"}, {"id": "Q0-7", "q": "아민 중 예외적으로 지용성인 것은?", "a": "티록신"}, {"id": "Q0-8", "q": "수용성 호르몬의 수용체 위치와 반응 경로는?", "a": "세포 표면(원형질막) 수용체 → 신호 전달(2차 전령)"}, {"id": "Q0-9", "q": "에피네프린의 신호 전달 경로 예는?", "a": "GPCR→아데닐산 고리화효소→cAMP(2차 전령)→PKA→글리코겐 분해(혈당↑)"}, {"id": "Q0-10", "q": "신호 증폭(amplification)이란?", "a": "효소 캐스케이드 각 단계가 증폭 → 에피네프린 1분자가 글루코스 수억 분자 방출"}, {"id": "Q0-11", "q": "지용성 호르몬의 수용체 위치와 반응은?", "a": "세포내 수용체(세포질 또는 핵) → 호르몬-수용체 복합체가 DNA에 결합→유전자 전사 변화"}, {"id": "Q0-12", "q": "티록신·비타민D의 수용체 위치는?", "a": "핵(스테로이드는 보통 세포질)"}, {"id": "Q0-13", "q": "한 호르몬이 여러 효과를 내는 이유는?", "a": "표적세포의 수용체 종류·반응 분자가 다르면 다른 반응(에피네프린=투쟁-도피 조합)"}, {"id": "Q0-14", "q": "음성 피드백(negative feedback)의 역할은?", "a": "반응이 자극을 줄여 기존 상태 회복(항상성 경로의 기본, 인슐린↔글루카곤)"}, {"id": "Q0-15", "q": "양성 피드백(positive feedback)의 대표 예는?", "a": "분만·수유(옥시토신이 자궁 수축 강화→다시 옥시토신 분비 증가)"}, {"id": "Q0-16", "q": "곤충 변태의 호르몬 경로는?", "a": "뇌 PTTH(신경호르몬)→전흉선→엑디스테로이드→탈피"}, {"id": "Q0-17", "q": "유충호르몬(JH)의 역할은?", "a": "농도 높으면 탈피만(유충 유지), 낮아지면 번데기→변태→성충"}, {"id": "Q0-18", "q": "뇌하수체 후엽과 전엽의 본질 차이는?", "a": "후엽=시상하부 신경조직의 연장(신경호르몬 저장·방출만) / 전엽=독립 내분비샘(자체 합성·분비)"}, {"id": "Q0-19", "q": "뇌하수체 후엽이 분비하는 호르몬은?", "a": "ADH(바소프레신), 옥시토신 (시상하부에서 합성)"}, {"id": "Q0-20", "q": "ADH(항이뇨호르몬)의 기능은?", "a": "신장에서 물 재흡수↑ → 혈장 삼투압 유지"}, {"id": "Q0-21", "q": "옥시토신(oxytocin)의 기능은?", "a": "자궁 수축·젖 분비, 사회 행동"}, {"id": "Q0-22", "q": "뇌하수체 전엽의 자극호르몬(tropic)은?", "a": "FSH·LH(생식선), TSH(갑상선), ACTH(부신 피질)"}, {"id": "Q0-23", "q": "전엽의 비자극호르몬은?", "a": "프로락틴(젖), GH(성장호르몬), MSH(멜라닌세포)"}, {"id": "Q0-24", "q": "성장호르몬(GH)의 작용 경로와 이상은?", "a": "간이 IGF를 내보내 뼈·연골 생장; 소아 과다=거인증, 성인 과다=말단비대증, 소아 부족=난쟁이증"}, {"id": "Q0-25", "q": "갑상선 호르몬 T3·T4의 조절 경로는?", "a": "시상하부 TRH→전엽 TSH→갑상선 T3/T4→(음성 피드백으로 TRH·TSH 억제)"}, {"id": "Q0-26", "q": "그레이브스병(Graves' disease)의 원인은?", "a": "TSH 수용체 자가항체가 갑상선을 계속 자극하는 자가면역 질환(T3·T4 높지만 TSH 낮음)"}, {"id": "Q0-27", "q": "혈중 칼슘을 조절하는 두 길항 호르몬은?", "a": "PTH(부갑상선호르몬, 혈중 Ca↑) vs 칼시토닌(갑상선, 혈중 Ca↓)"}, {"id": "Q0-28", "q": "PTH(부갑상선호르몬)의 3작용은?", "a": "뼈(Ca²⁺ 방출), 신장(Ca²⁺ 재흡수+비타민D 활성화), 장(활성 비타민D가 흡수↑)"}, {"id": "Q0-29", "q": "부신 수질과 피질의 조절 경로 차이는?", "a": "수질=신경 자극(즉각) / 피질=ACTH(전엽) 호르몬 자극"}, {"id": "Q0-30", "q": "부신 수질이 분비하는 호르몬과 효과는?", "a": "에피네프린·노르에피네프린(카테콜아민); 혈당·혈압·심박↑(투쟁-도피)"}, {"id": "Q0-31", "q": "부신 피질의 두 코르티코스테로이드는?", "a": "당질코르티코이드(코르티솔, 혈당↑·면역 억제), 염류코르티코이드(알도스테론, Na⁺·물 재흡수)"}, {"id": "Q0-32", "q": "혈당을 조절하는 췌장 랑게르한스섬의 두 호르몬은?", "a": "인슐린(β세포, 혈당↓), 글루카곤(α세포, 혈당↑)"}, {"id": "Q0-33", "q": "당뇨병 1형과 2형의 차이는?", "a": "1형=β세포 파괴로 인슐린 부족(자가면역) / 2형=표적세포 인슐린 저항성(흔함)"}, {"id": "Q0-34", "q": "송과선(pineal gland)이 분비하는 호르몬과 기능은?", "a": "멜라토닌(
