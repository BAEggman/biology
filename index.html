nfunction normalize(s){\n  if(!s||typeof s!==\"object\") return makeInitialState();\n  if(typeof s.last!==\"number\") s.last=0;\n  if(!s.completed||typeof s.completed!==\"object\") s.completed={};\n  if(!s.answers||typeof s.answers!==\"object\") s.answers={};\n  if(!s.graded||typeof s.graded!==\"object\") s.graded={};\n  if(typeof s.v!==\"number\") s.v=1;\n  return s;\n}\n\n/* ---------- \uc800\uc7a5: localStorage + window.storage \uc774\uc911 (try/catch) ---------- */\nfunction serialize(state){ return JSON.stringify(state); }\nfunction deserialize(str){ try{ var o=JSON.parse(str); if(o&&typeof o===\"object\") return o; }catch(e){} return null; }\n\nfunction saveLocal(state){ try{ localStorage.setItem(STORE_KEY, serialize(state)); return true; }catch(e){ return false; } }\nfunction loadLocal(){ try{ var s=localStorage.getItem(STORE_KEY); if(s) return deserialize(s); }catch(e){} return null; }\nfunction saveRemote(state){ try{ if(typeof window!==\"undefined\" && window.storage && window.storage.set){ window.storage.set(STORE_KEY, serialize(state), false); return true; } }catch(e){} return false; }\nfunction loadRemote(){\n  try{ if(typeof window!==\"undefined\" && window.storage && window.storage.get){\n    return Promise.resolve(window.storage.get(STORE_KEY, false)).then(function(r){\n      if(r && r.value!=null) return deserialize(r.value);\n      return null;\n    }).catch(function(){ return null; });\n  } }catch(e){}\n  return Promise.resolve(null);\n}\nfunction saveState(state){ saveLocal(state); saveRemote(state); }\nfunction loadState(){\n  return loadRemote().then(function(r){\n    if(!r) r=loadLocal();\n    if(!r) r=makeInitialState();\n    return normalize(r);\n  });\n}\n\n/* node \ud14c\uc2a4\ud2b8\uc6a9\uc73c\ub85c \ud575\uc2ec API \ub178\ucd9c (\ube0c\ub77c\uc6b0\uc800\uc5d0\uc11c\ub294 \ubb34\ud574) */\ntry{\n  if(typeof window!==\"undefined\"){\n    window.__CORE__={\n      STORE_KEY:STORE_KEY, DIAGRAMS:DIAGRAMS,\n      makeInitialState:makeInitialState, uniq:uniq, chipBank:chipBank,\n      computeScore:computeScore, recordCompletion:recordCompletion, progressCount:progressCount,\n      normalize:normalize, serialize:serialize, deserialize:deserialize,\n      saveLocal:saveLocal, loadLocal:loadLocal, saveRemote:saveRemote, loadRemote:loadRemote,\n      saveState:saveState, loadState:loadState\n    };\n  }\n}catch(e){}\n\n/* ---------- UI \uc0c1\ud0dc ---------- */\nvar STATE=null;\nvar cur=0;\nvar selectedChip=null;\nvar peekOn=false;\nvar dragJustHappened=false;\nvar els={};\n\nfunction placements(d){ if(!STATE.answers[d.id]) STATE.answers[d.id]={}; return STATE.answers[d.id]; }\nfunction removeChipEverywhere(pl,label){ for(var k in pl){ if(pl.hasOwnProperty(k) && pl[k]===label) delete pl[k]; } }\nfunction clearGrade(d){ if(STATE.graded[d.id]) STATE.graded[d.id]=false; }\nfunction shortTitle(t){ return t.split(\" \u2014 \")[0].split(\" \u2013 \")[0]; }\n\n/* ---------- \ub80c\ub354 ---------- */\nfunction buildPicker(){\n  els.picker.innerHTML=\"\";\n  DIAGRAMS.forEach(function(d,i){\n    var b=document.createElement(\"button\");\n    b.className=\"pchip\";\n    b.setAttribute(\"data-i\", i);\n    b.innerHTML='<span class=\"dot\"><\/span><span class=\"n\">'+(i+1)+'<\/span>'+shortTitle(d.title);\n    b.addEventListener(\"click\", function(){ go(i); });\n    els.picker.appendChild(b);\n  });\n  refreshPicker();\n}\nfunction refreshPicker(){\n  var nodes=els.picker.querySelectorAll(\".pchip\");\n  for(var j=0;j<nodes.length;j++){\n    var b=nodes[j]; var i=+b.getAttribute(\"data-i\"); var c=STATE.completed[DIAGRAMS[i].id];\n    b.classList.remove(\"cur\",\"done\",\"part\");\n    if(i===cur) b.classList.add(\"cur\");\n    if(c){ if(c.total>0 && c.correct===c.total) b.classList.add(\"done\"); else if(c.correct>0) b.classList.add(\"part\"); }\n  }\n}\nfunction updateProgress(){\n  var done=progressCount(STATE);\n  els.pdone.textContent=done;\n  els.pbar.style.width=(DIAGRAMS.length? (done/DIAGRAMS.length*100):0)+\"%\";\n}\nfunction render(){\n  var d=DIAGRAMS[cur];\n  els.dtitle.textContent=d.title;\n  els.didx.textContent=(cur+1)+\" / \"+DIAGRAMS.length;\n  els.dnote.innerHTML=d.note;\n  els.svg.setAttribute(\"viewBox\",\"0 0 \"+d.vbW+\" \"+d.vbH);\n  var leaders=\"\";\n  d.slots.forEach(function(s){ leaders+='<line class=\"ldr\" x1=\"'+s.sx+'\" y1=\"'+s.sy+'\" x2=\"'+s.ax+'\" y2=\"'+s.ay+'\"/><circle class=\"ldot\" cx=\"'+s.sx+'\" cy=\"'+s.sy+'\" r=\"3.4\"/>'; });\n  els.svg.innerHTML=d.bg+\"<g>\"+leaders+\"<\/g>\";\n  peekOn=false;\n  var pk=document.getElementById(\"peek\"); pk.classList.remove(\"on\"); pk.textContent=\"\uc815\ub2f5 \ubcf4\uae30\";\n  renderSlots(); renderBank(); renderScore(); refreshPicker(); updateProgress();\n}\nfunction renderSlots(){\n  var d=DIAGRAMS[cur]; var pl=placements(d); var graded=!!STATE.graded[d.id];\n  els.overlay.innerHTML=\"\";\n  d.slots.forEach(function(s){\n    var btn=document.createElement(\"button\");\n    btn.className=\"slot\";\n    btn.style.left=(s.ax/d.vbW*100)+\"%\";\n    btn.style.top=(s.ay/d.vbH*100)+\"%\";\n    btn.style.width=s.w+\"px\";\n    btn.setAttribute(\"data-slot\", s.id);\n    var val=pl[s.id];\n    if(val){ btn.classList.add(\"filled\"); btn.innerHTML='<span class=\"u\">'+val+'<\/span>'; }\n    else { btn.innerHTML='<span class=\"u\" style=\"opacity:.55\">\uff0b<\/span>'; }\n    if(graded){\n      var ok=(val!=null && val===s.answer);\n      btn.classList.add(ok?\"ok\":\"no\");\n      if(!ok){\n        var uhtml = val? ('<span class=\"u\">'+val+'<\/span>') : '<span class=\"u miss\">\ubbf8\uc785\ub825<\/span>';\n        btn.innerHTML = uhtml + '<span class=\"c\">\uc815\ub2f5 '+s.answer+'<\/span>';\n      }\n    }\n    btn.addEventListener(\"click\", function(){ onSlotClick(s.id); });\n    els.overlay.appendChild(btn);\n  });\n  if(peekOn) applyPeek();\n}\nfunction renderBank(){\n  var d=DIAGRAMS[cur]; var pl=placements(d);\n  var used={}; for(var k in pl){ if(pl.hasOwnProperty(k) && pl[k]!=null) used[pl[k]]=1; }\n  els.bank.innerHTML=\"\";\n  chipBank(d).forEach(function(label){\n    var c=document.createElement(\"button\");\n    c.className=\"chip\";\n    c.textContent=label;\n    c.setAttribute(\"data-chip\", label);\n    if(used[label]) c.classList.add(\"placed\");\n    if(selectedChip===label) c.classList.add(\"sel\");\n    c.addEventListener(\"click\", function(){ onChipClick(label); });\n    attachDrag(c, label);\n    els.bank.appendChild(c);\n  });\n}\nfunction renderScore(){\n  var d=DIAGRAMS[cur];\n  if(!STATE.graded[d.id]){ els.score.className=\"score\"; els.score.innerHTML=\"\"; return; }\n  var pl=placements(d); var res=computeScore(d.slots, pl);\n  var perfect=res.correct===res.total;\n  els.score.className=\"score show \"+(perfect?\"good\":\"mid\");\n  var msg=perfect? \"\uc644\ubcbd\ud569\ub2c8\ub2e4 \u2014 \ub2e4\uc74c \ub2e4\uc774\uc5b4\uadf8\ub7a8\uc73c\ub85c!\" : \"\uc624\ub2f5 \uce78\uc5d0 \uc815\ub2f5\uc774 \ud45c\uc2dc\ub410\uc5b4\uc694. \ub2e4\uc2dc \ucc44\uc6cc \ubcf4\uc138\uc694.\";\n  els.score.innerHTML='<span class=\"num\">'+res.correct+' / '+res.total+'<\/span><span>'+msg+'<\/span>';\n}\nfunction applyPeek(){\n  var d=DIAGRAMS[cur];\n  var nodes=els.overlay.querySelectorAll(\".slot\");\n  for(var n=0;n<nodes.length;n++){\n    var btn=nodes[n]; var sid=btn.getAttribute(\"data-slot\"); var slot=null;\n    for(var i=0;i<d.slots.length;i++){ if(d.slots[i].id===sid){ slot=d.slots[i]; break; } }\n    var ex=btn.querySelector(\".c.peek\"); if(ex) ex.parentNode.removeChild(ex);\n    if(peekOn && slot && !btn.classList.contains(\"no\") && !btn.classList.contains(\"ok\")){\n      var cap=document.createElement(\"span\"); cap.className=\"c peek\"; cap.textContent=\"\uc815\ub2f5 \"+slot.answer; btn.appendChild(cap);\n    }\n  }\n}\n\n/* ---------- \uc0c1\ud638\uc791\uc6a9 ---------- */\nfunction onChipClick(label){\n  if(dragJustHappened){ dragJustHappened=false; return; }\n  selectedChip=(selectedChip===label)? null : label;\n  renderBank();\n}\nfunction onSlotClick(slotId){\n  if(dragJustHappened){ dragJustHappened=false; return; }\n  var d=DIAGRAMS[cur]; var pl=placements(d);\n  if(selectedChip){\n    removeChipEverywhere(pl, selectedChip);\n    pl[slotId]=selectedChip; selectedChip=null;\n    clearGrade(d); saveState(STATE);\n    renderSlots(); renderBank(); renderScore(); refreshPicker();\n  } else if(pl[slotId]){\n    delete pl[slotId];\n    clearGrade(d); saveState(STATE);\n    renderSlots(); renderBank(); renderScore(); refreshPicker();\n  }\n}\nfunction placeChipInSlot(label, slotId){\n  var d=DIAGRAMS[cur]; var pl=placements(d);\n  removeChipEverywhere(pl, label);\n  pl[slotId]=label; selectedChip=null;\n  clearGrade(d); saveState(STATE);\n  renderSlots(); renderBank(); renderScore(); refreshPicker();\n}\nfunction onGrade(){\n  var d=DIAGRAMS[cur]; var pl=placements(d);\n  var res=computeScore(d.slots, pl);\n  STATE.graded[d.id]=true;\n  recordCompletion(STATE, d.id, res.correct, res.total);\n  saveState(STATE);\n  renderSlots(); renderScore(); refreshPicker(); updateProgress();\n}\nfunction onReset(){\n  var d=DIAGRAMS[cur];\n  STATE.answers[d.id]={}; STATE.graded[d.id]=false; selectedChip=null;\n  saveState(STATE); render();\n}\nfunction onPeek(){\n  peekOn=!peekOn;\n  var btn=document.getElementById(\"peek\");\n  btn.classList.toggle(\"on\", peekOn);\n  btn.textContent=peekOn? \"\uc815\ub2f5 \uc228\uae30\uae30\":\"\uc815\ub2f5 \ubcf4\uae30\";\n  applyPeek();\n}\nfunction go(i){\n  if(i<0) i=0; if(i>DIAGRAMS.length-1) i=DIAGRAMS.length-1;\n  cur=i; STATE.last=i; selectedChip=null; saveState(STATE); render();\n  try{ window.scrollTo({top:0,behavior:\"smooth\"}); }catch(e){}\n}\n\n/* ---------- \ub4dc\ub798\uadf8(\ud3ec\uc778\ud130) ---------- */\nfunction attachDrag(el, label){\n  el.addEventListener(\"pointerdown\", function(ev){ startDrag(ev, label, el); });\n}\nfunction startDrag(ev, label, el){\n  if(el.classList.contains(\"placed\")) return;\n  var startX=ev.clientX, startY=ev.clientY, moved=false, ghost=null;\n  function move(e){\n    var dx=e.clientX-startX, dy=e.clientY-startY;\n    if(!moved && (Math.abs(dx)>6 || Math.abs(dy)>6)){\n      moved=true;\n      ghost=document.createElement(\"div\"); ghost.className=\"ghost\"; ghost.textContent=label;\n      document.body.appendChild(ghost);\n    }\n    if(moved && ghost){\n      ghost.style.left=e.clientX+\"px\"; ghost.style.top=e.clientY+\"px\";\n      highlightDropTarget(e.clientX, e.clientY);\n      if(e.cancelable) e.preventDefault();\n    }\n  }\n  function up(e){\n    document.removeEventListener(\"pointermove\", move);\n    document.removeEventListener(\"pointerup\", up);\n    document.removeEventListener(\"pointercancel\", up);\n    clearDropHighlight();\n    if(ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);\n    if(moved){\n      dragJustHappened=true;\n      setTimeout(function(){ dragJustHappened=false; }, 60);\n      var t=dropTargetAt(e.clientX, e.clientY);\n      if(t && t!==\"bank\"){ placeChipInSlot(label, t); }\n    }\n  }\n  document.addEventListener(\"pointermove\", move);\n  document.addEventListener(\"pointerup\", up);\n  document.addEventListener(\"pointercancel\", up);\n}\nfunction closestOf(el, sel){ return (el && el.closest) ? el.closest(sel) : null; }\nfunction dropTargetAt(x,y){\n  var el=document.elementFromPoint(x,y); if(!el) return null;\n  var slot=closestOf(el, \".slot\"); if(slot) return slot.getAttribute(\"data-slot\");\n  if(closestOf(el, \".bank\")) return \"bank\";\n  return null;\n}\nfunction highlightDropTarget(x,y){\n  clearDropHighlight();\n  var el=document.elementFromPoint(x,y); if(!el) return;\n  var slot=closestOf(el, \".slot\"); if(slot){ slot.classList.add(\"drop\"); return; }\n  var bank=closestOf(el, \".bank\"); if(bank) bank.classList.add(\"drop\");\n}\nfunction clearDropHighlight(){\n  var s=els.overlay.querySelectorAll(\".slot.drop\");\n  for(var i=0;i<s.length;i++) s[i].classList.remove(\"drop\");\n  els.bank.classList.remove(\"drop\");\n}\n\n/* ---------- \ubd80\ud305 ---------- */\nfunction main(){\n  els.picker=document.getElementById(\"picker\");\n  els.svg=document.getElementById(\"svg\");\n  els.overlay=document.getElementById(\"overlay\");\n  els.bank=document.getElementById(\"bank\");\n  els.dtitle=document.getElementById(\"dtitle\");\n  els.didx=document.getElementById(\"didx\");\n  els.dnote=document.getElementById(\"dnote\");\n  els.score=document.getElementById(\"score\");\n  els.pbar=document.getElementById(\"pbar\");\n  els.pdone=document.getElementById(\"pdone\");\n  els.ptot=document.getElementById(\"ptot\");\n  els.ptot.textContent=DIAGRAMS.length;\n  document.getElementById(\"grade\").addEventListener(\"click\", onGrade);\n  document.getElementById(\"reset\").addEventListener(\"click\", onReset);\n  document.getElementById(\"peek\").addEventListener(\"click\", onPeek);\n  document.getElementById(\"prev\").addEventListener(\"click\", function(){ go(cur-1); });\n  document.getElementById(\"next\").addEventListener(\"click\", function(){ go(cur+1); });\n  loadState().then(function(s){\n    STATE=s;\n    cur=Math.min(Math.max(STATE.last||0,0), DIAGRAMS.length-1);\n    buildPicker(); render();\n  });\n}\nfunction boot(){ try{ main(); }catch(e){} }\ntry{\n  if(typeof document!==\"undefined\"){\n    if(document.readyState && document.readyState!==\"loading\"){ boot(); }\n    else { document.addEventListener(\"DOMContentLoaded\", boot); }\n  }\n}catch(e){}\n<\/script>\n<\/body>\n<\/html>\n"</script>
<script type="application/json" id="ann5">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<meta name=\"theme-color\" content=\"#0F766E\">\n<title>\ube44\uad50\ud45c \ube48\uce78 \ucc44\uc6b0\uae30 \u00b7 \uc0dd\ubb3c \uac1c\ub150 \uad6c\ubd84<\/title>\n<style>\n:root{--ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;--bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;--vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;--ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;--sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace}\n\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:var(--sans);color:var(--ink);\n  background:linear-gradient(170deg,#F1F6F4 0%,var(--bg) 45%,#E3EBE8 100%);\n  background-attachment:fixed;min-height:100vh;\n  -webkit-font-smoothing:antialiased;line-height:1.5;\n  font-size:15px;\n}\n.container{max-width:760px;margin:0 auto;padding:0 16px 56px}\n\n/* app bar */\n.appbar{max-width:760px;margin:0 auto;padding:22px 16px 12px}\n.brand{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}\n.brand .dot{color:var(--teal)}\n.sub{margin-top:2px;font-size:12.5px;color:var(--ink3);letter-spacing:.01em}\n\n/* cards */\n.card{\n  background:linear-gradient(180deg,#FFF 0%,#FCFEFD 100%);\n  border:1px solid var(--line);border-radius:16px;\n  box-shadow:0 1px 2px rgba(16,48,46,.04),0 8px 24px rgba(16,48,46,.06);\n}\n\n/* ---------- HOME ---------- */\n.overview{padding:18px 18px 16px;margin-bottom:22px}\n.ov-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}\n.ov-num{font-size:38px;font-weight:800;line-height:1;color:var(--teal-d);letter-spacing:-.02em}\n.ov-num span{font-size:19px;color:var(--ink3);font-weight:700}\n.ov-label{margin-top:5px;font-size:12.5px;color:var(--ink2)}\n.ov-stats{display:flex;gap:18px;text-align:right;padding-top:3px}\n.ov-stats div{display:flex;flex-direction:column}\n.ov-stats b{font-size:20px;color:var(--ink);font-weight:800;line-height:1.1}\n.ov-stats span{font-size:11px;color:var(--ink3);margin-top:2px}\n.bar{height:8px;border-radius:99px;background:var(--line2);overflow:hidden;margin:16px 0 14px}\n.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),#15A08F);transition:width .5s ease}\n\n.cat{margin-bottom:20px}\n.cat-head{font-size:12.5px;font-weight:700;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;\n  padding:0 4px 9px;display:flex;align-items:center;gap:8px}\n.cat-head span{font-family:var(--mono);font-size:11px;color:var(--ink3);background:var(--teal-soft);\n  padding:1px 7px;border-radius:99px;letter-spacing:0}\n\n.tablecard{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;\n  text-align:left;padding:14px 15px;margin-bottom:9px;cursor:pointer;font:inherit;color:inherit;\n  transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}\n.tablecard:hover{border-color:#C3D2CF;box-shadow:0 2px 4px rgba(16,48,46,.05),0 12px 28px rgba(16,48,46,.09)}\n.tablecard:active{transform:translateY(1px)}\n.tc-title{font-size:15.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em}\n.tc-src{font-size:11.5px;color:var(--ink3);margin-top:3px}\n.badge{flex:none;font-size:12px;font-weight:700;padding:5px 11px;border-radius:99px;white-space:nowrap}\n.badge.done{background:var(--ok-soft);color:var(--ok)}\n.badge.partial{background:var(--amb-soft);color:var(--amb)}\n.badge.none{background:var(--line2);color:var(--ink3);font-family:var(--mono);font-weight:600}\n\n.footer{margin-top:26px;text-align:center}\n\n/* ---------- buttons ---------- */\n.btn{font-family:inherit;font-size:14.5px;font-weight:700;border-radius:12px;padding:12px 18px;\n  border:1px solid transparent;cursor:pointer;min-height:46px;transition:filter .12s ease,transform .1s ease,background .12s ease}\n.btn:active{transform:translateY(1px)}\n.btn:focus-visible{outline:3px solid color-mix(in srgb,var(--teal) 45%,transparent);outline-offset:2px}\n.btn.primary{background:var(--teal);color:#fff}\n.btn.primary:hover{filter:brightness(1.06)}\n.btn.primary[disabled]{background:#B7C9C6;color:#EAF1EF;cursor:not-allowed;filter:none}\n.btn.ghost{background:#fff;color:var(--ink2);border-color:var(--line)}\n.btn.ghost:hover{border-color:#C3D2CF;color:var(--ink)}\n.btn.wide{width:100%;margin-top:4px}\n.btn.back{background:transparent;border:none;color:var(--teal-d);padding:8px 4px;min-height:auto;\n  font-size:14px;font-weight:700;margin:2px 0 6px}\n.actions{display:flex;gap:10px;margin-top:18px}\n.actions .btn{flex:1}\n.actions .ghost{flex:0 0 34%}\n\n/* ---------- PLAY ---------- */\n.play-title{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:2px 0 4px}\n.play-src{font-size:12px;color:var(--ink3);margin-bottom:12px}\n.play-hint{font-size:12.5px;color:var(--ink2);background:var(--vio-soft);border:1px solid #DAD0F0;\n  border-radius:12px;padding:10px 13px;margin:0 0 16px;line-height:1.5}\n\n.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:16px;background:#fff;\n  box-shadow:0 1px 2px rgba(16,48,46,.04),0 8px 24px rgba(16,48,46,.06);-webkit-overflow-scrolling:touch}\ntable.cmp{border-collapse:separate;border-spacing:0;width:100%;min-width:100%}\ntable.cmp th,table.cmp td{padding:10px 11px;text-align:center;vertical-align:middle;\n  border-bottom:1px solid var(--line2);border-right:1px solid var(--line2)}\ntable.cmp thead th{background:var(--teal-soft);color:var(--teal-d);font-size:13px;font-weight:800;\n  letter-spacing:-.01em;position:sticky;top:0}\ntable.cmp th.corner,table.cmp th.attr{position:sticky;left:0;z-index:2;text-align:left;\n  background:#F4F8F7;color:var(--ink2);font-size:12.5px;font-weight:700;min-width:104px;max-width:130px}\ntable.cmp thead th.corner{z-index:3;background:#DCEDEA;color:var(--teal-d)}\ntable.cmp td.ref{color:var(--ink3);font-size:12.5px;background:#fff;min-width:96px}\ntable.cmp tr:last-child th,table.cmp tr:last-child td{border-bottom:none}\ntable.cmp th:last-child,table.cmp td:last-child{border-right:none}\n\ntd.blank{min-width:104px;cursor:pointer;font-size:12.5px;background:#fff}\ntd.blank.empty{background:repeating-linear-gradient(135deg,#F3F8F7,#F3F8F7 6px,#EAF1EF 6px,#EAF1EF 12px)}\ntd.blank.empty .slot{display:inline-flex;align-items:center;justify-content:center;\n  min-width:30px;min-height:30px;border:1.5px dashed #9CC0BB;border-radius:9px;color:var(--teal);\n  font-size:16px;font-weight:700}\ntd.blank.empty.target{background:var(--teal-soft)}\ntd.blank.empty.target .slot{border-color:var(--teal);border-style:solid;background:#fff;\n  animation:pulse 1.1s ease-in-out infinite}\n@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(15,118,110,.0)}50%{box-shadow:0 0 0 5px rgba(15,118,110,.14)}}\ntd.blank.filled{background:var(--teal-soft);position:relative}\ntd.blank.filled .placed{font-weight:700;color:var(--ink)}\ntd.blank.filled .x{position:absolute;top:3px;right:5px;font-size:9px;color:var(--ink3)}\ntd.blank.g-ok{background:var(--ok-soft)}\ntd.blank.g-ok .placed{color:var(--ink);font-weight:700}\ntd.blank.g-no{background:var(--no-soft)}\ntd.blank.g-no .placed{color:var(--no);font-weight:700;text-decoration:line-through;opacity:.7}\ntd.blank .mk{display:block;font-size:13px;font-weight:800;margin-top:2px}\ntd.blank.g-ok .mk{color:var(--ok)}\ntd.blank.g-no .mk{color:var(--no)}\ntd.blank .ans{display:block;font-size:11px;color:var(--ok);font-weight:700;margin-top:2px}\n\n/* word bank */\n.bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}\n.tile{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:#fff;\n  border:1.5px solid var(--line);border-radius:11px;padding:9px 13px;min-height:42px;cursor:pointer;\n  transition:border-color .1s ease,background .1s ease,transform .1s ease}\n.tile:hover{border-color:#BBCFCB}\n.tile:active{transform:translateY(1px)}\n.tile:focus-visible{outline:3px solid color-mix(in srgb,var(--teal) 40%,transparent);outline-offset:2px}\n.tile.sel{border-color:var(--teal);background:var(--teal-soft);color:var(--teal-d);box-shadow:0 0 0 1px var(--teal)}\n.tile.used{opacity:.32;cursor:default;text-decoration:line-through}\n\n/* result */\n.result{padding:18px 18px 8px;margin-top:18px;text-align:center}\n.score{font-size:42px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.02em}\n.score span{font-size:20px;color:var(--ink3);font-weight:700}\n.score.perfect{color:var(--ok)}\n.score-label{font-size:13px;color:var(--ink2);margin:7px 0 14px;font-weight:600}\nul.notes{list-style:none;margin:0;padding:0;text-align:left}\nul.notes li{display:flex;gap:9px;padding:11px 12px;border-radius:11px;margin-bottom:8px;\n  font-size:13px;line-height:1.5;border:1px solid var(--line2)}\nul.notes li.ok{background:#F6FBF8}\nul.notes li.no{background:var(--no-soft);border-color:#F1D2CE}\nul.notes .ic{flex:none;font-weight:800;font-size:13px;width:16px;text-align:center}\nul.notes li.ok .ic{color:var(--ok)}\nul.notes li.no .ic{color:var(--no)}\nul.notes .nt{color:var(--ink2)}\nul.notes li.no .nt{color:var(--ink)}\n\n@media (max-width:420px){\n  body{font-size:14.5px}\n  .ov-stats{gap:12px}\n  .ov-num{font-size:34px}\n  table.cmp th,table.cmp td{padding:9px 9px}\n}\n@media (prefers-reduced-motion:reduce){\n  *{transition:none!important;animation:none!important}\n}\n\n<\/style>\n<\/head>\n<body>\n<header class=\"appbar\">\n  <div class=\"brand\">\ube44\uad50\ud45c \ube48\uce78 \ucc44\uc6b0\uae30<span class=\"dot\">.<\/span><\/div>\n  <div class=\"sub\">\ud5f7\uac08\ub9ac\ub294 \uac1c\ub150 \uc30d\u00b7\uc0bc\ucd1d\uc0ac \uad6c\ubd84 \u00b7 \ucea0\ubca8 \ubcf8\ubb38/\uc9c0\uc5fd \uae30\ubc18<\/div>\n<\/header>\n<main class=\"container\">\n  <section id=\"home\"><\/section>\n  <section id=\"play\" style=\"display:none\"><\/section>\n<\/main>\n<script>\n/* ===== data ===== */\n/* ============================================================\n   \ube44\uad50\ud45c \ub370\uc774\ud130  (\ubaa8\ub4e0 \ubb38\ud56d\uc740 \uc774 \ud504\ub85c\uc81d\ud2b8\uc758 \ucea0\ubca8 \ubcf8\ubb38 + \uc9c0\uc5fd_\uc815\ub9ac \uadfc\uac70)\n   table = {\n     id, cat(\uce74\ud14c\uace0\ub9ac), title, src(\ucd9c\ucc98),\n     rowLabel,                       // \uc18d\uc131 \uc5f4 \uba38\ub9ac\uae00\n     cols: [\uac1c\ub150...],                 // \ube44\uad50 \ub300\uc0c1 (\uc5f4 \uba38\ub9ac\uae00)\n     rows: [ {a:\uc18d\uc131, c:[\uc140\uac12...]} ], // c.length === cols.length\n     blanks: [[row,col]...],          // \ube48\uce78\uc73c\ub85c \uac00\ub9b4 \uc140(\ud5f7\uac08\ub9ac\uae30 \uc26c\uc6b4 \uce78)\n     distract: [\uc624\ub2f5\ud0c0\uc77c...],          // \ucd94\uac00 \ud568\uc815 \ud0c0\uc77c(\uc120\ud0dd)\n     notes: { \"row,col\": \"\ud574\uc124\" }      // \ucc44\uc810 \ud6c4 \uac15\uc870 \ud574\uc124\n   }\n   ============================================================ */\nvar TABLES = [\n/* 1 \u2500\u2500 \uad11\ud569\uc131: C3 / C4 / CAM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n{\n  id:\"photo_c3c4cam\", cat:\"\uad11\ud569\uc131\", title:\"C3 \u00b7 C4 \u00b7 CAM \uc2dd\ubb3c\",\n  src:\"\ucea0\ubca8 11\ub2e8\uc6d0 \uad11\ud569\uc131\",\n  rowLabel:\"\uad6c\ubd84\", cols:[\"C3 \uc2dd\ubb3c\",\"C4 \uc2dd\ubb3c\",\"CAM \uc2dd\ubb3c\"],\n  rows:[\n    {a:\"1\ucc28 \ud0c4\uc18c\uace0\uc815 \ud6a8\uc18c\", c:[\"\ub8e8\ube44\uc2a4\ucf54\",\"PEP \uce74\ub974\ubcf5\uc2e4\ud654\ud6a8\uc18c\",\"PEP \uce74\ub974\ubcf5\uc2e4\ud654\ud6a8\uc18c\"]},\n    {a:\"1\ucc28 \uace0\uc815 \uc0b0\ubb3c\", c:[\"3-\uc778\uc0b0\uae00\ub9ac\uc138\ub974\uc0b0(C3)\",\"\uc625\uc0b4\uc544\uc138\ud2b8\uc0b0(C4)\",\"\uc720\uae30\uc0b0(C4)\"]},\n    {a:\"CO\u2082 \ub18d\ucd95 \ubc29\uc2dd\", c:[\"\uc5c6\uc74c\",\"\uacf5\uac04\uc801 \ubd84\ub9ac\",\"\uc2dc\uac04\uc801 \ubd84\ub9ac\"]},\n    {a:\"\uad11\ud638\ud761\", c:[\"\ub9ce\uc74c\",\"\uc801\uc74c\",\"\uc801\uc74c\"]},\n    {a:\"\uae30\uacf5(\uace0\uc628\u00b7\uac74\uc870 \uc2dc)\", c:[\"\ub2eb\uc74c\u2192CO\u2082 \ubd80\uc871\",\"\ub2eb\uc544\ub3c4 CO\u2082 \uacf5\uae09\",\"\ub0ae \ub2eb\uace0 \ubc24 \uc5f6\"]},\n    {a:\"\ub300\ud45c \uc2dd\ubb3c\", c:[\"\ubcbc\u00b7\ubc00\u00b7\ub300\ub450\",\"\uc625\uc218\uc218\u00b7\uc0ac\ud0d5\uc218\uc218\",\"\ub3cc\ub098\ubb3c\uacfc(\ub2e4\uc721)\"]}\n  ],\n  blanks:[[0,1],[0,2],[1,0],[1,1],[2,1],[2,2],[5,1],[5,2]],\n  distract:[\"\ub8e8\ube44\uc2a4\ucf54\"],\n  notes:{\n    \"0,1\":\"C4\u00b7CAM \ubaa8\ub450 1\ucc28 \uace0\uc815\uc740 O\u2082 \uce5c\ud654\ub3c4\uac00 \uc5c6\ub294 PEP \uce74\ub974\ubcf5\uc2e4\ud654\ud6a8\uc18c, \ucd5c\uc885 \ud658\uc6d0\ub9cc \ub8e8\ube44\uc2a4\ucf54.\",\n    \"0,2\":\"CAM\ub3c4 \ubc24\uc5d0 PEP \uce74\ub974\ubcf5\uc2e4\ud654\ud6a8\uc18c\ub85c 1\ucc28 \uace0\uc815.\",\n    \"1,1\":\"\uccab \uc0b0\ubb3c\uc774 \ud0c4\uc18c 4\uac1c\uc9dc\ub9ac \uc625\uc0b4\uc544\uc138\ud2b8\uc0b0\uc774\ub77c 'C4'.\",\n    \"2,1\":\"C4 = \uc5fd\uc721\uc138\ud3ec\u00b7\uc720\uad00\uc18d\ucd08\uc138\ud3ec\ub85c '\uacf5\uac04' \ubd84\ub9ac.\",\n    \"2,2\":\"CAM = \ubc24\u00b7\ub0ae\uc73c\ub85c '\uc2dc\uac04' \ubd84\ub9ac. C4 \uacf5\uac04 \u2194 CAM \uc2dc\uac04\uc744 \uac00\uc7a5 \uc790\uc8fc \ubc14\uafd4 \ucd9c\uc81c.\"\n  }\n},\n/* 2 \u2500\u2500 \uc138\ud3ec\ub9c9: \ub2e8\uc21c\ud655\uc0b0 / \ucd09\uc9c4\ud655\uc0b0 / \ub2a5\ub3d9\uc218\uc1a1 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n{\n  id:\"mem_transport\", cat:\"\uc138\ud3ec\ub9c9\u00b7\uc218\uc1a1\", title:\"\ub2e8\uc21c\ud655\uc0b0 \u00b7 \ucd09\uc9c4\ud655\uc0b0 \u00b7 \ub2a5\ub3d9\uc218\uc1a1\",\n  src:\"\ucea0\ubca8 8\ub2e8\uc6d0 \uc138\ud3ec\ub9c9\",\n  rowLabel:\"\uad6c\ubd84\", cols:[\"\ub2e8\uc21c\ud655\uc0b0\",\"\ucd09\uc9c4\ud655\uc0b0\",\"\ub2a5\ub3d9\uc218\uc1a1\"],\n  rows:[\n    {a:\"\uc218\uc1a1\ub2e8\ubc31\uc9c8\", c:[\"\ubd88\ud544\uc694\",\"\ud544\uc694\",\"\ud544\uc694\"]},\n    {a:\"\uc5d0\ub108\uc9c0(ATP)\", c:[\"\ubd88\ud544\uc694\",\"\ubd88\ud544\uc694\",\"\ud544\uc694\"]},\n    {a:\"\ub18d\ub3c4 \uae30\uc6b8\uae30 \ubc29\ud5a5\", c:[\"\uace0\u2192\uc800(\uc21c\ud589)\",\"\uace0\u2192\uc800(\uc21c\ud589)\",\"\uc800\u2192\uace0(\uc5ed\ud589)\"]},\n    {a:\"\uc0ac\uc6a9 \ub2e8\ubc31\uc9c8\", c:[\"\uc5c6\uc74c\",\"\ud1b5\ub85c/\uc6b4\ubc18\ub2e8\ubc31\uc9c8\",\"\uc6b4\ubc18\ub2e8\ubc31\uc9c8\ub9cc\"]},\n    {a:\"\uc608\uc2dc\", c:[\"O\u2082\u00b7CO\u2082\u00b7\uc9c0\uc6a9\uc131\ud638\ub974\ubaac\",\"\ud3ec\ub3c4\ub2f9\u00b7\uc774\uc628(\ucd09\uc9c4)\",\"Na\u207a/K\u207a \ud38c\ud504\"]}\n  ],\n  blanks:[[0,1],[0,2],[1,2],[2,2],[3,2],[4,0],[4,2]],\n  distract:[\"\ubd88\ud544\uc694\",\"\uace0\u2192\uc800(\uc21c\ud589)\"],\n  notes:{\n    \"1,2\":\"\ub2a5\ub3d9\uc218\uc1a1\ub9cc ATP \uc0ac\uc6a9. \ucd09\uc9c4\ud655\uc0b0\uc740 \ub2e8\ubc31\uc9c8\uc744 \uc4f0\uc9c0\ub9cc \uc5d0\ub108\uc9c0\ub294 X.\",\n    \"2,2\":\"\ub2a5\ub3d9\uc218\uc1a1\ub9cc \ub18d\ub3c4\uae30\uc6b8\uae30\ub97c \uac70\uc2ac\ub7ec \uc800\ub18d\ub3c4\u2192\uace0\ub18d\ub3c4\ub85c \uc774\ub3d9.\",\n    \"3,2\":\"\ub2a5\ub3d9\uc218\uc1a1\uc740 \ud1b5\ub85c\ub2e8\ubc31\uc9c8\uc774 \uc544\ub2c8\ub77c \ubaa8\ub450 \uc6b4\ubc18\ub2e8\ubc31\uc9c8(carrier).\",\n    \"4,0\":\"\ube44\uadf9\uc131\u00b7\uc18c\uc218\uc131 \ubd84\uc790\ub294 \ub9c9\uc744 \uc9c1\uc811 \ud1b5\uacfc(\ub2e8\uc21c\ud655\uc0b0).\"\n  }\n},\n/* 3 \u2500\u2500 \uc138\ud3ec\ubd84\uc5f4: \uc720\uc0ac\ubd84\uc5f4 / \uac10\uc218\ubd84\uc5f4 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n{\n  id:\"div_mito_meio\", cat:\"\uc138\ud3ec\ubd84\uc5f4\", title:\"\uc720\uc0ac\ubd84\uc5f4 \u00b7 \uac1 cea0\ubca8 16\ub2e8\uc6d0 \ud575\uc0b0\u00b7\ubcf5\uc81c(\ubcf8\ubb38 \ube44\uad50\ud45c)\",\n  rowLabel:\"\uad6c\ubd84\", cols:[\"\uc120\ub3c4\uac00\ub2e5(leading)\",\"\uc9c0\uc5f0\uac00\ub2e5(lagging)\"],\n  rows:[\n    {a:\"\ud569\uc131 \ubc29\uc2dd\", c:[\"\uc5f0\uc18d \ud569\uc131\",\"\ubd88\uc5f0\uc18d \ud569\uc131\"]},\n    {a:\"\ubd84\uae30\uc810 \uae30\uc900 \ubc29\ud5a5\", c:[\"\ubd84\uae30\uc810 \uc9c4\ud589 \ubc29\ud5a5\uacfc \uac19\uc74c\",\"\ubd84\uae30\uc810\uc5d0\uc11c \uba40\uc5b4\uc9c0\uba70 \uc808\ud3b8\ubcc4\"]},\n    {a:\"\ud504\ub77c\uc774\uba38 \uc218\", c:[\"\ubcf4\ud1b5 1\uac1c\",\"\uc808\ud3b8\ub9c8\ub2e4 \uc5ec\ub7ec \uac1c\"]},\n    {a:\"\uc911\uac04 \uc0b0\ubb3c\", c:[\"\ud558\ub098\uc758 \uae34 \uc0c8 \uac00\ub2e5\",\"\uc624\uce74\uc790\ud0a4 \uc808\ud3b8\"]},\n    {a:\"\ub9c8\ubb34\ub9ac\", c:[\"\uc0c1\ub300\uc801\uc73c\ub85c \ub2e8\uc21c\",\"\ud504\ub77c\uc774\uba38 \uc81c\uac70\u00b7DNA \ub300\uccb4\u00b7\ub77c\uc774\uac8c\uc774\uc2a4 \uc5f0\uacb0\"]}\n  ],\n  blanks:[[0,0],[0,1],[2,1],[3,1],[4,1]],\n  distract:[\"\uc5f0\uc18d \ud569\uc131\"],\n  notes:{\n    \"0,1\":\"\ub458 \ub2e4 5'\u21923'\ub85c \ud569\uc131\ub418\uc9c0\ub9cc \ubd84\uae30\uc810 \uae30\uc900 \ubc29\ud5a5\uc774 \ubc18\ub300\ub77c \uc9c0\uc5f0\uac00\ub2e5\uc740 \ubd88\uc5f0\uc18d.\",\n    \"3,1\":\"\uc9c0\uc5f0\uac00\ub2e5\ub9cc \uc624\uce74\uc790\ud0a4 \uc808\ud3b8\uc73c\ub85c \ud1a0\ub9c9\ud1a0\ub9c9 \ud569\uc131 \ud6c4 \uc5f0\uacb0.\",\n    \"4,1\":\"\uc9c0\uc5f0\uac00\ub2e5\uc740 RNA \ud504\ub77c\uc774\uba38 \uc81c\uac70\u2192DNA \ub300\uccb4\u2192\ub77c\uc774\uac8c\uc774\uc2a4\ub85c \uc774\uc5b4\uc57c \uc644\uc131.\"\n  }\n},\n/* 5 \u2500\u2500 \ubd84\uc790\uc720\uc804: DNA / RNA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n{\n  id:\"dna_vs_rna\", cat:\"\ubd84\uc790\uc720\uc804\", title:\"DNA \ \"\ud638\ub974\ubaac\uc740 \u7a2e \ud2b9\uc774\uc131 \uc5c6\uc774 \uc628\ubab8\uc5d0 \ub3c4\ub2ec\ud558\ub098, \uc218\uc6a9\uccb4 \uac00\uc9c4 \ud45c\uc801\uc138\ud3ec\ub9cc \ubc18\uc751.\"\n  }\n},\n/* 12 \u2500\u2500 \ub3d9\ubb3c\uc0dd\ub9ac: \uace8\uaca9\uadfc / \uc2ec\uc7a5\uadfc / \ud3c9\ud65c\uadfc \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n{\n  id:\"phys_muscle\", cat:\"\ub3d9\ubb3c\uc0dd\ub9ac\", title:\"\uace8\uaca9\uadfc \u00b7 \uc2ec\uc7a5\uadfc \u00b7 \ud3c9\ud65c\uadfc\",\n  src:\"\ucea0\ubca8 40\ub2e8\uc6d0 + \uc9c0\uc5fd(\uc2ec\uc7a5\u00b7\uadfc\uc721 \uc0dd\ub9ac)\",\n  rowLabel:\"\uad6c\ubd84\", cols:[\"\uace8\uaca9\uadfc\",\"\uc2ec\uc7a5\uadfc\",\"\ud3c9\ud65c\uadfc\"],\n  rows:[\n    {a:\"\ud6a1\ubb38(\uc904\ubb34\ub2ac)\", c:[\"\uc788\uc74c\",\"\uc788\uc74c\",\"\uc5c6\uc74c\"]},\n    {a:\"\uc218\uc758\uc131\", c:[\"\uc218\uc758\uadfc\",\"\ubd88\uc218\uc758\uadfc\",\"\ubd88\uc218\uc758\uadfc\"]},\n    {a:\"Ca\u00b2\u207a \ubc29\ucd9c \ubc29\uc2dd\", c:[\"DHP\uc218\uc6a9\uccb4-RyR1 \ubb3c\ub9ac\uc5f0\uacb0\",\"CICR(\uce7c\uc298\uc720\ub3c4 \uce7c\uc298\ubc29\ucd9c)\",\"\uce7c\ubaa8\ub4c8\ub9b0-MLCK(\ud2b8\ub85c\ud3ec\ub2ccX)\"]},\n    {a:\"\ud2b9\uc218 \uad6c\uc870\u00b7\uc704\uce58\", c:[\"\ubf08\uc5d0 \ubd80\ucc29\u00b7\ub2e4\ud575\",\"\uac1c\uc7ac\ud310(\uc138\ud3ec\uac04 \uc804\uae30\uc5f0\uacb0)\",\"\uc18c\ud654\uad00\u00b7\ud608\uad00\u00b7\ubc29\uad11 \ubcbd\"]}\n  ],\n  blanks:[[0,2],[1,0],[1,2],[2,0],[2,1],[2,2],[3,1]],\n  distract:[\"CICR(\uce7c\uc298\uc720\ub3c4 \uce7c\uc298\ubc29\ucd9c)\",\"\uc788\uc74c\"],\n  notes:{\n    \"2,0\":\"\uace8\uaca9\uadfc\uc740 DHP\uc218\uc6a9\uccb4\uc640 RyR1\uc774 \ubb3c\ub9ac\uc801\uc73c\ub85c \uc9c1\uc811 \uc5f0\uacb0.\",\n    \"2,1\":\"\uc2ec\uc7a5\uadfc\uc740 \uc678\ubd80 Ca\u00b2\u207a\uc774 \ub4e4\uc5b4\uc640 RyR2\ub97c \uc5ec\ub294 CICR \ubc29\uc2dd.\",\n    \"2,2\":\"\ud3c9\ud65c\uadfc\uc740 \ud2b8\ub85c\ud3ec\ub2cc\uc774 \uc5c6\uc5b4 \uce7c\ubaa8\ub4c8\ub9b0-MLCK \uacbd\ub85c\ub85c \uc218\ucd95 \u2014 \ud55c\uc758\ub300 \ub2e8\uace8.\",\n    \"0,2\":\"\ud3c9\ud65c\uadfc\ub9cc \ud6a1\ubb38\uc774 \uc5c6\uc74c.\",\n    \"3,1\":\"\uac1c\uc7ac\ud310\uc740 \uc2ec\uc7a5\uadfc\ub9cc\uc758 \ud2b9\uc9d5(\uc138\ud3ec\uac04 \uc2e0\ud638 \ub3d9\uae30\ud654).\"\n  }\n},\n/* 13 \u2500\u2500 \uc0dd\ud654\ud559: \ud6a8\uc18c \uc800\ud574\uc81c (\uacbd\uc7c1/\ube44\uacbd\uc7c1/\ubb34\uacbd\uc7c1) \u2605 S\uae09 \u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n{\n  id:\"biochem_inhibitor\", cat:\"\uc0dd\ud654\ud559\", title:\"\uacbd\uc7c1\uc801 \u00b7 \ube44\uacbd\uc7c1\uc801 \u00b7 \ubb34\uacbd\uc7c1\uc801 \uc800\ud574\uc81c\",\n  src:\"\uc9c0\uc5fd(\ud6a8\uc18c \ub3d9\uc5ed\ud559\u00b7\ub77c\uc778\uc704\ubc84-\ubc84\ud06c) \u2014 \uae30\ucd9c \ub2e4\uc218 \ubcf5\uc6d0\",\n  rowLabel:\"\uad6c\ubd84\", cols:[\"\uacbd\uc7c1\uc801\",\"\ube44\uacbd\uc7c1\uc801\",\"\ubb34\uacbd\uc7c1\uc801\"],\n  rows:[\n    {a:\"\uacb0\ud569 \ubd80\uc704\", c:[\"\ud65c\uc131 \ubd80\uc704(\uae30\uc9c8\uacfc \uacbd\uc7c1)\",\"\uc54c\ub85c\uc2a4\ud14c\ub9ad \ubd80\uc704\",\"ES \ubcf5\ud569\uccb4\"]},\n    {a:\"Vmax\", c:[\"\ubd88\ubcc0\",\"\uac10\uc18c\",\"\uac10\uc18c\"]},\n    {a:\"Km\", c:[\"\uc99d\uac00\",\"\ubd88\ubcc0\",\"\uac10\uc18c\"]},\n    {a:\"L-B y\uc808\ud3b8(1/Vmax)\", c:[\"\ubd88\ubcc0\",\"\uc99d\uac00\",\"\uc99d\uac00\"]},\n    {a:\"L-B x\uc808\ud3b8(-1/Km)\", c:[\"\uc6d0\uc810 \ucabd \uc774\ub3d9\",\"\ubd88\ubcc0\",\"\uc67c\ucabd \uc774\ub3d9(\uc808\ub313\uac12\u2191)\"]},\n    {a:\"L-B \uae30\uc6b8\uae30(Km/Vmax)\", c:[\"\uc99d\uac00(\uac00\ud314\ub77c\uc9d0)\",\"\uc99d\uac00\",\"\ubd88\ubcc0(\ud3c9\ud589 \uc774\ub3d9)\"]}\n  ],\n  blanks:[[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2],[5,2]],\n  distract:[\"\uc99d\uac00\",\"\ubd88\ubcc0\"],\n  notes:{\n    \"1,0\":\"\uacbd\uc7c1\uc801: Vmax \ubd88\ubcc0(\uae30\uc9c8 \ubb34\ud55c \ud22c\uc785 \uc2dc \uadf9\ubcf5).\",\n    \"2,0\":\"\uacbd\uc7c1\uc801: \uae30\uc9 c800\uc7a5\uc740 io = { local:{getItem,setItem}|null, remote:{get,set}|null } \uc8fc\uc785\uc2dd\n   ============================================================ */\nvar STORAGE_KEY = \"bio_compare_v1\";\n\nfunction cellKey(r, c) { return r + \",\" + c; }\n\nfunction blankSet(table) {\n  var s = {};\n  for (var i = 0; i < table.blanks.length; i++) {\n    s[cellKey(table.blanks[i][0], table.blanks[i][1])] = true;\n  }\n  return s;\n}\n\nfunction correctValue(table, r, c) { return table.rows[r].c[c]; }\n\n/* \ube48\uce78 \uc815\ub2f5\uac12 + \ud568\uc815 \ud0c0\uc77c (UI\uc5d0\uc11c \uc11e\uc5b4 \uc0ac\uc6a9) */\nfunction bankValues(table) {\n  var vals = [];\n  for (var i = 0; i < table.blanks.length; i++) {\n    vals.push(correctValue(table, table.blanks[i][0], table.blanks[i][1]));\n  }\n  if (table.distract) {\n    for (var j = 0; j < table.distract.length; j++) vals.push(table.distract[j]);\n  }\n  return vals;\n}\n\n/* \ucc44\uc810: fills = { \"r,c\": \"\ub123\uc740 \uac12\" }  \u2192  \uacb0\uacfc \uac1d\uccb4 */\nfunction gradeTable(table, fills) {\n  var total = table.blanks.length, correct = 0, perCell = {};\n  for (var i = 0; i < table.blanks.length; i++) {\n    var r = table.blanks[i][0], c = table.blanks[i][1], k = cellKey(r, c);\n    var ok = fills[k] != null && fills[k] === correctValue(table, r, c);\n    perCell[k] = ok;\n    if (ok) correct++;\n  }\n  return { total: total, correct: correct, perCell: perCell, score: total ? correct / total : 0 };\n}\n\nfunction allFilled(table, fills) {\n  for (var i = 0; i < table.blanks.length; i++) {\n    var k = cellKey(table.blanks[i][0], table.blanks[i][1]);\n    if (fills[k] == null) return false;\n  }\n  return true;\n}\n\n/* ---- \ud1b5\uacc4 ---- */\nfunction emptyStats() {\n  return { tables: {}, streak: 0, bestStreak: 0, cellsCorrect: 0, cellsGraded: 0, lastId: null };\n}\n\nfunction applyResult(stats, tableId, result) {\n  if (!stats || typeof stats !== \"object\") stats = emptyStats();\n  if (!stats.tables) stats.tables = {};\n  var prev = stats.tables[tableId] || { best: 0, total: result.total, done: false, attempts: 0 };\n  var best = Math.max(prev.best, result.correct);\n  var done = prev.done || (result.correct === result.total);\n  stats.tables[tableId] = {\n    best: best, total: result.total, done: done,\n    attempts: (prev.attempts || 0) + 1, lastCorrect: result.correct\n  };\n  var perfect = (result.correct === result.total);\n  stats.streak = perfect ? (stats.streak || 0) + 1 : 0;\n  stats.bestStreak = Math.max(stats.bestStreak || 0, stats.streak);\n  stats.cellsCorrect = (stats.cellsCorrect || 0) + result.correct;\n  stats.cellsGraded = (stats.cellsGraded || 0) + result.total;\n  stats.lastId = tableId;\n  return stats;\n}\n\nfunction completedCount(stats, tables) {\n  if (!stats || !stats.tables) return 0;\n  var n = 0;\n  for (var i = 0; i < tables.length; i++) {\n    var t = stats.tables[tables[i].id];\n    if (t && t.done) n++;\n  }\n  return n;\n}\n\nfunction progressPct(stats, tables) {\n  if (!tables.length) return 0;\n  return Math.round(completedCount(stats, tables) / tables.length * 100);\n}\n\n/* \ub2e4\uc74c\uc5d0 \ud480 \ud45c(\ubbf8\uc644\ub8cc \uc6b0\uc120, lastId \ub2e4\uc74c\ubd80\ud130 \uc21c\ud658) */\nfunction nextTableId(stats, tables) {\n  if (!tables.length) return null;\n  var start = 0;\n  if (stats && stats.lastId) {\n    for (var i = 0; i < tables.length; i++) if (tables[i].id === stats.lastId) { start = i + 1; break; }\n  }\n  for (var off = 0; off < tables.length; off++) {\n    var idx = (start + off) % tables.length;\n    var t = stats && stats.tables ? stats.tables[tables[idx].id] : null;\n    if (!t || !t.done) return tables[idx].id;\n  }\n  return tables[0].id; // \uc804\ubd80 \uc644\ub8cc \uc2dc \ucc98\uc74c\ubd80\ud130\n}\n\n/* ---- \uc800\uc7a5(\uc774\uc911) ---- */\nfunction saveState(state, io) {\n  var json;\n  try { json = JSON.stringify(state); } catch (e) { return Promise.resolve(false); }\n  if (io && io.local) { try { io.local.setItem(STORAGE_KEY, json); } catch (e) {} }\n  var p = Promise.resolve();\n  if (io && io.remote && io.remote.set) {\n    p = Promise.resolve().then(function () { return io.remote.set(STORAGE_KEY, json); }).catch(function () {});\n  }\n  return p.then(function () { return true; });\n}\n\nfunction loadState(io) {\n  function fromLocal() {\n    if (io && io.local) { try { return io.local.getItem(STORAGE_KEY); } catch (e) {} }\n    return null;\n  }\n  function parse(json) {\n    if (json == null) return null;\n    try { return JSON.parse(json); } catch (e) { return null; }\n  }\n  var remoteP = Promise.resolve(null);\n  if (io && io.remote && io.remote.get) {\n    remoteP = Promise.resolve().then(function () { return io.remote.get(STORAGE_KEY); }).catch(function () { return null; });\n  }\n  return remoteP.then(function (rv) {\n    if (rv != null) return parse(rv);\n    return parse(fromLocal());\n  });\n}\n\nif (typeof module !== \"undefined\" && module.exports) {\n  module.exports = {\n    STORAGE_KEY: STORAGE_KEY, cellKey: cellKey, blankSet: blankSet, correctValue: correctValue,\n    bankValues: bankValues, gradeTable: gradeTable, allFilled: allFilled,\n    emptyStats: emptyStats, applyResult: applyResult, completedCount: completedCount,\n    progressPct: progressPct, nextTableId: nextTableId, saveState: saveState, loadState: loadState\n  };\n}\n\n/* ===== ui ===== */\n/* ============================================================\n   UI \u2014 \uc804\uc5ed TABLES / \ub85c\uc9c1 \ud568\uc218(gradeTable \ub4f1)\ub97c \uadf8\ub300\ub85c \uc0ac\uc6a9\n   ============================================================ */\n(function () {\n  \"use strict\";\n\n  /* \uce74\ud14c\uace0\ub9ac \uadf8\ub8f9\ud654(\uccab \ub4f1\uc7a5 \uc21c\uc11c \uc720\uc9c0) */\n  var BY_CAT = {}, CAT_ORDER = [];\n  TABLES.forEach(function (t) {\n    if (!BY_CAT[t.cat]) { BY_CAT[t.cat] = []; CAT_ORDER.push(t.cat); }\n    BY_CAT[t.cat].push(t);\n  });\n\n  /* \uc800\uc7a5 \uc785\ucd9c\ub825(\uc774\uc911) \u2014 window.storage + localStorage, \uac01\uac01 try/catch */\n  var io = {\n    local: (function () { try { return window.localStorage || null; } catch (e) { return null; } })(),\n    remote: {\n      get: function (k) {\n        try {\n          if (window.storage && window.storage.get) {\n            return Promise.resolve(window.storage.get(k, false))\n              .then(function (r) { return r && r.value != null ? r.value : null; })\n              .catch(function () { return null; });\n          }\n        } catch (e) {}\n        return Promise.resolve(null);\n      },\n      set: function (k, v) {\n        try {\n          if (window.storage && window.storage.set) {\n            return Promise.resolve(window.storage.set(k, v, false)).catch(function () {});\n          }\n        } catch (e) {}\n        return Promise.resolve();\n      }\n    }\n  };\n\n  var stats = emptyStats();\n  var session = null;\n\n  var $home = document.getElementById(\"home\");\n  var $play = document.getElementById(\"play\");\n\n  function esc(s) {\n    return String(s).replace(/[&<>\"]/g, function (c) {\n      return { \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c];\n    });\n  }\n  function tableById(id) { for (var i = 0; i < TABLES.length; i++) if (TABLES[i].id === id) return TABLES[i]; return null; }\n  function persist() { return saveState(stats, io); }\n  function showScreen(name) {\n    $home.style.display = name === \"home\" ? \"block\" : \"none\";\n    $play.style.display = name === \"play\" ? \"block\" : \"none\";\n    window.scrollTo(0, 0);\n  }\n\n  /* boot */\n  loadState(io).then(function (s) {\n    if (s && s.tables) stats = s;\n    renderHome(); showScreen(\"home\");\n  });\n\n  /* ---------------- HOME ---------------- */\n  function badgeFor(t) {\n    var s = stats.tables[t.id];\n    if (s && s.done) return '<span class=\"badge done\">\uc644\ub8cc ' + s.best + '/' + s.total + '<\/span>';\n    if (s && s.best > 0) return '<span class=\"badge partial\">' + s.best + '/' + s.total + '<\/span>';\n    return '<span class=\"badge none\">' + t.blanks.length + '\uce78<\/span>';\n  }\n  function renderHome() {\n    var done = completedCount(stats, TABLES), pct = progressPct(stats, TABLES);\n    var h = \"\";\n    h += '<div class=\"card overview\">';\n    h +=   '<div class=\"ov-top\">';\n    h +=     '<div><div class=\"ov-num\">' + done + '<span>/' + TABLES.length + '<\/span><\/div>';\n    h +=       '<div class=\"ov-label\">\uc644\ub8cc\ud55c \ube44\uad50\ud45c<\/div><\/div>';\n    h +=     '<div class=\"ov-stats\">';\n    h +=       '<div><b>' + (stats.bestStreak || 0) + '<\/b><span>\ucd5c\uace0 \uc5f0\uc18d \ub9cc\uc810<\/span><\/div>';\n    h +=       '<div><b>' + (stats.cellsCorrect || 0) + '<\/b><span>\ub9de\ud78c \uce78 \ub204\uc801<\/span><\/div>';\n    h +=     '<\/div><\/div>';\n    h +=   '<div class=\"bar\"><i style=\"width:' + pct + '%\"><\/i><\/div>';\n    h +=   '<button class=\"btn primary wide\" id=\"resumeBtn\">\uc774\uc5b4\uc11c \ud480\uae30<\/button>';\n    h += '<\/div>';\n\n    CAT_ORDER.forEach(function (cat) {\n      var list = BY_CAT[cat];\n      h += '<div class=\"cat\"><div class=\"cat-head\">' + esc(cat) + ' <span>' + list.length + '<\/span><\/div>';\n      list.forEach(function (t) {\n        h += '<button class=\"card tablecard\" data-open=\"' + t.id + '\">' +\n               '<div class=\"tc-main\"><div class=\"tc-title\">' + esc(t.title) + '<\/div>' +\n               '<div class=\"tc-src\">' + esc(t.src) + '<\/div><\/div>' +\n               badgeFor(t) + '<\/button>';\n      });\n      h += '<\/div>';\n    });\n    h += '<div class=\"footer\"><button class=\"btn ghost\" id=\"resetBtn\">\uc804\uccb4 \uae30\ub85d \ucd08\uae30\ud654<\/button><\/div>';\n    $home.innerHTML = h;\n  }\n\n  $home.addEventListener(\"click\", function (e) {\n    var open = e.target.closest(\"[data-open]\");\n    if (open) { startTable(open.getAttribute(\"data-open\")); return; }\n    if (e.target.id === \"resumeBtn\") { startTable(nextTableId(stats, TABLES)); return; }\n    if (e.target.id === \"resetBtn\") {\n      if (window.confirm(\"\ubaa8\ub4e0 \uc9c4\ud589 \uae30\ub85d\uc744 \uc9c0\uc6b8\uae4c\uc694? \ub418\ub3cc\ub9b4 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.\")) {\n        stats = emptyStats(); persist(); renderHome();\n      }\n      return;\n    }\n  });\n\n  /* ---------------- PLAY ---------------- */\n  function startTable(id) {\n    var t = tableById(id); if (!t) return;\n    var vals = bankValues(t).slice();\n    for (var i = vals.length - 1; i > 0; i--) {       // \uc154\ud50c\n      var j = Math.floor(Math.random() * (i + 1));\n      var tmp = vals[i]; vals[i] = vals[j]; vals[j] = tmp;\n    }\n    var bank = vals.map(function (v, idx) { return { id: \"tile\" + idx, value: v, used: false }; });\n    session = { id: id, table: t, fills: {}, bank: bank, sel: null, graded: false, result: null };\n    renderPlay(); showScreen(\"play\");\n  }\n\n  function tileOf(tid) { for (var i = 0; i < session.bank.length; i++) if (session.bank[i].id === tid) return session.bank[i]; return null; }\n  function fillsToValues() {\n    var out = {};\n    Object.keys(session.fills).forEach(function (k) { var t = tileOf(session.fills[k]); out[k] = t ? t.value : null; });\n    return out;\n  }\n\n  function renderPlay() {\n    var t = session.table, s = session, bset = blankSet(t);\n    var h = \"\";\n    h += '<button class=\"btn back\" id=\"backBtn\">\u2190 \ubaa9\ub85d<\/button>';\n    h += '<h2 class=\"play-title\">' + esc(t.title) + '<\/h2>';\n    h += '<div class=\"play-src\">' + esc(t.src) + '<\/div>';\n    if (!s.graded) {\n      h += '<p class=\"play-hint\">\uc544\ub798 \ud0c0\uc77c\uc744 \uace8\ub77c \ud45c\uc758 <b>\ube48\uce78(\uc810\uc120)<\/b>\uc5d0 \ub123\uc73c\uc138\uc694. \ucc44\uc6b4 \uce78\uc744 \ub2e4\uc2dc \ub204\ub974\uba74 \ud0c0\uc77c\uc774 \ub3cc\uc544\uc635\ub2c8\ub2e4. \ube48\uce78\uc740 \uac00\uc7a5 \ud5f7\uac08\ub9ac\ub294 \uce78\ub4e4\uc774\uc5d0\uc694.<\/p>';\n    }\n\n    h += '<div class=\"tablewrap\"><table class=\"cmp\"><thead><tr><th class=\"corner\">' + esc(t.rowLabel) + '<\/th>';\n    t.cols.forEach(function (c) { h += '<th>' + esc(c) + '<\/th>'; });\n    h += '<\/tr><\/thead><tbody>';\n    t.rows.forEach(function (row, ri) {\n      h += '<tr><th class=\"attr\">' + esc(row.a) + '<\/th>';\n      row.c.forEach(function (val, ci) {\n        var k = ri + \",\" + ci;\n        if (!bset[k]) { h += '<td class=\"ref\">' + esc(val) + '<\/td>'; return; }\n        if (s.graded) {\n          var ok = s.result.perCell[k];\n          var placed = s.fills[k] != null ? tileOf(s.fills[k]).value : \"\u2014\";\n          h += '<td class=\"blank ' + (ok ? \"g-ok\" : \"g-no\") + '\">' +\n                 '<span class=\"placed\">' + esc(placed) + '<\/span>' +\n                 (ok ? '<span class=\"mk\">\u2713<\/span>'\n                     : '<span class=\"mk\">\u2717<\/span><span class=\"ans\">\uc815\ub2f5 ' + esc(val) + '<\/span>') +\n               '<\/td>';\n        } else if (s.fills[k] != null) {\n          h += '<td class=\"blank filled\" data-cell=\"' + k + '\">' +\n                 '<span class=\"placed\">' + esc(tileOf(s.fills[k]).value) + '<\/span><span class=\"x\">\u2715<\/span><\/td>';\n        } else {\n          h += '<td class=\"blank empty' + (s.sel ? \" target\" : \"\") + '\" data-cell=\"' + k + '\"><span class=\"slot\">\uff0b<\/span><\/td>';\n        }\n      });\n      h += '<\/tr>';\n    });\n    h += '<\/tbody><\/table><\/div>';\n\n    if (!s.graded) {\n      h += '<div class=\"bank\" id=\"bank\">';\n      s.bank.forEach(function (tile) {\n        h += '<button class=\"tile' + (tile.used ? \" used\" : \"\") + (s.sel === tile.id ? \" sel\" : \"\") + '\"' +\n             ' data-tile=\"' + tile.id + '\"' + (tile.used ? \" disabled\" : \"\") + '>' + esc(tile.value) + '<\/button>';\n      });\n      h += '<\/div>';\n      var filled = allFilled(t, s.fills);\n      h += '<div class=\"actions\">' +\n             '<button class=\"btn ghost\" id=\"clearBtn\">\uc9c0\uc6b0\uae30<\/button>' +\n             '<button class=\"btn primary\" id=\"gradeBtn\"' + (filled ? \"\" : \" disabled\") + '>\ucc44\uc810\ud558\uae30<\/button>' +\n           '<\/div>';\n    } else {\n      var r = s.result, perfect = (r.correct === r.total);\n      h += '<div class=\"card result\">';\n      h +=   '<div class=\"score' + (perfect ? \" perfect\" : \"\") + '\">' + r.correct + ' <span>/ ' + r.total + '<\/span><\/div>';\n      h +=   '<div class=\"score-label\">' + (perfect ? \"\uc644\ubcbd\ud574\uc694! \ubaa8\ub4e0 \uce78 \uc815\ub2f5\" : \"\uc544\ub798 \ud5f7\uac08\ub9ac\ub294 \uce78\uc744 \ud655\uc778\ud558\uc138\uc694\") + '<\/div>';\n      h +=   '<ul class=\"notes\">';\n      t.blanks.forEach(function (b) {\n        var k = b[0] + \",\" + b[1], ok = r.perCell[k];\n        var note = t.notes && t.notes[k] ? t.notes[k] : null;\n        if (!note && ok) return;                       // \uc815\ub2f5 + \ud574\uc124 \uc5c6\uc74c \u2192 \uc0dd\ub7b5\n        var text = note || (\"\uc815\ub2f5: \" + correctValue(t, b[0], b[1]));\n        h += '<li class=\"' + (ok ? \"ok\" : \"no\") + '\"><span class=\"ic\">' + (ok ? \"\u2713\" : \"\u2717\") +\n             '<\/span><span class=\"nt\">' + esc(text) + '<\/span><\/li>';\n      });\n      h +=   '<\/ul>';\n      h += '<\/div>';\n      h += '<div class=\"actions\">' +\n             '<button class=\"btn ghost\" id=\"retryBtn\">\ub2e4\uc2dc \ud480\uae30<\/button>' +\n             '<button class=\"btn primary\" id=\"nextBtn\">\ub2e4\uc74c \ud45c \u2192<\/button>' +\n           '<\/div>';\n    }\n    $play.innerHTML = h;\n  }\n\n  $play.addEventListener(\"click\", function (e) {\n    if (!session) return;\n    if (e.target.id === \"backBtn\") { renderHome(); showScreen(\"home\"); return; }\n\n    if (!session.graded) {\n      var tileBtn = e.target.closest(\"[data-tile]\");\n      if (tileBtn) {\n        var tid = tileBtn.getAttribute(\"data-tile\"), tile = tileOf(tid);\n        if (!tile || tile.used) return;\n        session.sel = (session.sel === tid) ? null : tid;\n        renderPlay(); return;\n      }\n      var cell = e.target.closest(\"[data-cell]\");\n      if (cell) {\n        var k = cell.getAttribute(\"data-cell\");\n        if (session.fills[k] != null) {                 // \ucc44\uc6b4 \uce78 \u2192 \ud0c0\uc77c \ud68c\uc218\n          var freed = tileOf(session.fills[k]); if (freed) freed.used = false;\n          delete session.fills[k]; session.sel = null; renderPlay(); return;\n        }\n        if (session.sel) {                              // \ube48 \uce78 + \uc120\ud0dd\ub41c \ud0c0\uc77c \u2192 \ubc30\uce58\n          var pick = tileOf(session.sel); if (pick) { pick.used = true; session.fills[k] = session.sel; }\n          session.sel = null; renderPlay(); return;\n        }\n        return;\n      }\n      if (e.target.id === \"clearBtn\") {\n        session.fills = {}; session.bank.forEach(function (t) { t.used = false; }); session.sel = null;\n        renderPlay(); return;\n      }\n      if (e.target.id === \"gradeBtn\") {\n        if (!allFilled(session.table, session.fills)) return;\n        var res = gradeTable(session.table, fillsToValues());\n        session.graded = true; session.result = res;\n        stats = applyResult(stats, session.id, res); persist();\n        renderPlay(); return;\n      }\n    } else {\n      if (e.target.id === \"retryBtn\") { startTable(session.id); return; }\n      if (e.target.id === \"nextBtn\") { startTable(nextTableId(stats, TABLES)); return; }\n    }\n  });\n})();\n\n<\/script>\n<\/body>\n<\/html>\n"</script>
<script type="application/json" id="ann6">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<title>생물 그래프·실험 해석<\/title>\n<style>\n:root{--ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;--bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;--vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;--ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;--sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:var(--sans);color:var(--ink);\n  background:linear-gradient(180deg,#EFF4F2 0%,var(--bg) 55%,#E3EBE8 100%);\n  background-attachment:fixed;min-height:100vh;\n  -webkit-font-smoothing:antialiased;line-height:1.5;\n}\n.wrap{max-width:760px;margin:0 auto;padding:18px 16px 56px;}\n\n/* header */\n.top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:6px 2px 14px;}\n.top h1{font-size:19px;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--ink);}\n.top .sub{font-size:12px;color:var(--ink3);margin-top:3px;font-weight:600;}\n.top .right{display:flex;align-items:center;gap:8px;flex-shrink:0;}\n#reset{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink2);\n  width:34px;height:34px;border-radius:10px;font-size:15px;cursor:pointer;line-height:1;\n  display:grid;place-items:center;transition:background .15s,border-color .15s;}\n#reset:hover{background:var(--teal-soft);border-color:var(--teal);color:var(--teal-d);}\n\n/* meta + progress */\n#meta{display:flex;align-items:center;gap:8px;font-weight:700;}\n#meta .count{font-size:14px;color:var(--ink2);font-variant-numeric:tabular-nums;}\n#meta .count i{color:var(--ink3);font-style:normal;font-weight:600;}\n#meta .chip-score{font-size:12px;background:var(--teal-soft);color:var(--teal-d);\n  padding:4px 9px;border-radius:999px;font-weight:700;}\n.progress{height:6px;background:var(--line2);border-radius:999px;overflow:hidden;margin:0 2px 16px;}\n#bar{height:100%;width:0;background:linear-gradient(90deg,var(--teal),#14938a);\n  border-radius:999px;transition:width .35s ease;}\n\n/* card */\n.card{background:var(--card);border:1px solid var(--line2);border-radius:16px;\n  padding:18px 16px 16px;\n  box-shadow:0 1px 2px rgba(16,48,46,.06),0 10px 26px -14px rgba(16,48,46,.22);}\n.tags{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap;}\n.chip-topic{font-size:12px;font-weight:700;background:var(--teal-soft);color:var(--teal-d);\n  padding:4px 10px;border-radius:999px;}\n.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;}\n.badge.g{background:var(--vio-soft);color:var(--vio);}\n.badge.e{background:var(--amb-soft);color:var(--amb);}\n\n/* media */\n.graph{background:#FAFCFB;border:1px solid var(--line2);border-radius:12px;\n  padding:8px 6px;margin-bottom:14px;}\n.graph svg{display:block;width:100%;height:auto;}\n.scenario{background:#F5F9F8;border-left:3px solid var(--teal);border-radius:8px;\n  padding:12px 13px;margin-bottom:14px;font-size:14px;line-height:1.65;color:var(--ink2);}\n\n.stem{font-size:15.5px;font-weight:700;line-height:1.55;margin:0 0 14px;color:var(--ink);\n  letter-spacing:-.005em;}\n\n/* choices */\n.choices{display:flex;flex-direction:column;gap:9px;}\n.choice{appearance:none;text-align:left;width:100%;display:flex;align-items:flex-start;gap:11px;\n  background:var(--card);border:1.5px solid var(--line);border-radius:12px;\n  padding:12px 13px;min-height:48px;cursor:pointer;font-family:inherit;font-size:14.5px;\n  color:var(--ink);line-height:1.5;transition:background .14s,border-color .14s,transform .05s;}\n.choice:hover:not([disabled]){background:var(--teal-soft);border-color:var(--teal);}\n.choice:active:not([disabled]){transform:translateY(1px);}\n.choice .lab{flex-shrink:0;width:22px;height:22px;border-radius:7px;background:var(--line2);\n  color:var(--ink2);font-weight:800;font-size:12.5px;display:grid;place-items:center;margin-top:1px;\n  font-family:var(--mono);}\n.choice .txt{flex:1;padding-top:1px;}\n.choice .mk{flex-shrink:0;font-weight:900;font-size:16px;line-height:1.3;}\n.choice .mk.ok{color:var(--ok);}\n.choice .mk.no{color:var(--no);}\n.choice[disabled]{cursor:default;}\n.choice.correct{background:var(--ok-soft);border-color:var(--ok);}\n.choice.correct .lab{background:var(--ok);color:#fff;}\n.choice.wrong{background:var(--no-soft);border-color:var(--no);}\n.choice.wrong .lab{background:var(--no);color:#fff;}\n.choice.muted{opacity:.5;}\n\n/* feedback */\n.feedback{margin-top:14px;border-radius:12px;padding:13px 14px;border:1px solid;}\n.feedback.good{background:var(--ok-soft);border-color:#BFE3D2;}\n.feedback.bad{background:var(--no-soft);border-color:#F0CDC8;}\n.feedback .verdict{font-weight:800;font-size:14px;margin-bottom:6px;}\n.feedback.good .verdict{color:var(--ok);}\n.feedback.bad .verdict{color:var(--no);}\n.feedback .explain{margin:0;font-size:14px;line-height:1.6;color:var(--ink);}\n.feedback .src{margin:8px 0 0;font-size:11.5px;color:var(--ink3);font-weight:600;}\n\n/* nav + buttons */\n.nav{margin-top:16px;}\n.btn{appearance:none;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;\n  border:none;border-radius:12px;padding:13px 18px;width:100%;transition:background .15s,transform .05s;}\n.btn:active{transform:translateY(1px);}\n.btn.primary{background:var(--teal);color:#fff;}\n.btn.primary:hover{background:var(--teal-d);}\n\n/* end */\n.card.end{text-align:center;padding:30px 20px 22px;}\n.done-emoji{font-size:38px;line-height:1;margin-bottom:6px;}\n.end-title{font-size:18px;font-weight:800;margin:0 0 14px;color:var(--ink);}\n.score-big{font-size:46px;font-weight:800;color:var(--teal-d);line-height:1;letter-spacing:-.02em;\n  font-variant-numeric:tabular-nums;}\n.score-big span{font-size:22px;color:var(--ink3);font-weight:700;}\n.score-pct{font-size:14px;color:var(--ink2);font-weight:700;margin-top:8px;}\n.end-note{font-size:13.5px;color:var(--ink3);line-height:1.6;margin:14px auto 4px;max-width:34ch;}\n.card.end .nav{max-width:280px;margin-left:auto;margin-right:auto;}\n\n.loading{text-align:center;color:var(--ink3);padding:48px 0;font-weight:600;}\n\n/* a11y */\n:focus-visible{outline:2.5px solid var(--teal);outline-offset:2px;border-radius:8px;}\n@media (prefers-reduced-motion:reduce){\n  *{transition:none!important;animation:none!important;scroll-behavior:auto!important;}\n}\n@media (max-width:380px){\n  .wrap{padding:14px 12px 48px;}\n  .stem{font-size:15px;}\n  .choice{font-size:14px;}\n}\n<\/style>\n<\/head>\n<body>\n<main class=\"wrap\">\n  <header class=\"top\">\n    <div>\n      <h1>생물 그래프·실험 해석<\/h1>\n      <div class=\"sub\">편입·한의대 · 캠벨 기반 · 27문항<\/div>\n    <\/div>\n    <div class=\"right\">\n      <div id=\"meta\"><\/div>\n      <button id=\"reset\" type=\"button\" aria-label=\"처음부터 다시 풀기\" title=\"처음부터\">↺<\/button>\n    <\/div>\n  <\/header>\n  <div class=\"progress\" aria-hidden=\"true\"><div id=\"bar\"><\/div><\/div>\n  <section id=\"screen\"><\/section>\n<\/main>\n<script>\n/* ============================================================\n   생물 그래프·실험 해석 — 핵심 로직 (DOM 비의존, 테스트 가능)\n   - 문항 데이터(근거: 캠벨 본문 / BM편입 기출 / 한의편 기출 / 지엽정리)\n   - 세션/채점/저장(localStorage + window.storage 이중) 로직\n   ============================================================ */\n(function (root) {\n  'use strict';\n\n  var KEY = 'bio_graph_exam_v1';\n  var SCHEMA = 1;\n\n  /* ---------- 문항 은행 ----------\n     type: 'svg'(인라인 그래프) | 'text'(짧은 실험 서술)\n     graph: SVG 렌더러용 서술자(kind + 옵션)\n     answer: choices 배열의 정답 인덱스(0-base) — 자기검증 완료\n     explain: 답 확인 후 1줄 핵심 포인트\n     src: 근거 출처(투명성용) */\n  var QUESTIONS = [\n    /* ===== B·C 에너지: 효소 동역학 ===== */\n    {\n      id: 'enz_ph', topic: '효소·pH', type: 'svg', graph: { kind: 'enzymePH' },\n      stem: '두 소화효소 A, B의 pH에 따른 활성 그래프다. 가장 옳은 해석은?',\n      choices: [\n        'A는 강산성, B는 약염기성에서 최적 활성을 보인다',\n        '두 효소 모두 중성(pH 7)에서 최대 활성을 보인다',\n        'pH는 효소 활성에 영향을 주지 않는다',\n        'A는 모든 pH 구간에서 B보다 활성이 높다'\n      ],\n      answer: 0,\n      explain: '효소마다 최적 pH가 다르다(펩신≈pH2, 트립신≈pH8). 극단 pH는 수소결합을 깨 활성부위 모양을 바꾼다.',\n      src: '지엽정리·연세대 기출(pH→수소결합→활성부위)'\n    },\n    {\n      id: 'enz_temp', topic: '효소·온도', type: 'svg', graph: { kind: 'enzymeTemp' },\n      stem: '효소 활성–온도 그래프에서 최적온도(약 40℃)를 넘어 활성이 급감하는 가장 큰 원인은?',\n      choices: [\n        '고온에서 효소 단백질이 변성되어 활성부위 입체구조가 망가지기 때문',\n        '고온에서 기질의 자유에너지가 감소하기 때문',\n        '고온에서 효소가 반응의 평형상수를 낮추기 때문',\n        '고온에서 활성화 에너지가 증가하기 때문'\n      ],\n      answer: 0,\n      explain: '최적온도까지는 분자운동↑로 반응↑, 이후엔 열변성으로 구조 붕괴→급감. 효소는 ΔG·평형상수를 바꾸지 않는다.',\n      src: 'BM기출·영남대(효소 온도 영향·평형 불변)'\n    },\n    {\n      id: 'lb_comp', topic: '라인위버-버크', type: 'svg', graph: { kind: 'lbCompetitive' },\n      stem: '어떤 효소의 라인위버-버크 작도(1/V vs 1/[S])다. 점선(저해제 처리)이 실선과 같은 y절편을 공유하며 기울기가 더 가파르다. 저해 양상과 Km·Vmax 변화는?',\n      choices: [\n        '경쟁적 저해 — Km 증가, Vmax 불변',\n        '비경쟁적 저해 — Km 불변, Vmax 감소',\n        '무경쟁적 저해 — Km 감소, Vmax 감소',\n        '경쟁적 저해 — Km 불변, Vmax 감소'\n      ],\n      answer: 0,\n      explain: 'y절편(1/Vmax) 고정=Vmax 불변, x절편(−1/Km)이 원점 쪽으로=Km 증가 → 경쟁적 저해.',\n      src: '지엽정리 동국대 2023(경쟁적: y절편 불변·기울기↑)'\n    },\n    {\n      id: 'lb_noncomp', topic: '라인위버-버크', type: 'svg', graph: { kind: 'lbNoncompetitive' },\n      stem: '라인위버-버크 작도에서 두 직선이 x절편(−1/Km)을 공유하고, 점선(저해제)의 y절편이 더 크다. 이 저해 양상은?',\n      choices: [\n        '비경쟁적 저해 — Km 불변, Vmax 감소',\n        '경쟁적 저해 — Km 증가, Vmax 불변',\n        '무경쟁적 저해 — Km 감소, Vmax 감소',\n        '비경쟁적 저해 — Km 증가, Vmax 증가'\n      ],\n      answer: 0,\n      explain: 'x절편 공유=Km 불변, y절편(1/Vmax) 증가=Vmax 감소 → 비경쟁적 저해(활성부위 밖 결합).',\n      src: '지엽정리 대구한의대 2025(비경쟁: x절편 불변·y절편↑)'\n    },\n    {\n      id: 'km_cmp', topic: '효소 친화도(Km)', type: 'svg', graph: { kind: 'kmCompare' },\n      stem: '두 효소 A, B의 기질농도–반응속도 그래프다(Vmax 동일). 옳은 것은? (Km이 작을수록 친화도가 큼)',\n      choices: [\n        'A가 친화도가 커서 낮은 기질농도에서도 반응이 잘 일어난다',\n        'B가 A보다 기질 친화도가 크다',\n        'A의 Km이 B의 Km보다 크다',\n        '두 효소의 Km은 같다'\n      ],\n      answer: 0,\n      explain: '½Vmax에 먼저 도달하는 A의 Km이 더 작다 → 친화도↑ → 저농도에서 유리.',\n      src: '원광대 기출(Km↓=친화력↑·저농도 유리)'\n    },\n    {\n      id: 'allo_sig', topic: '알로스테릭 효소', type: 'svg', graph: { kind: 'sigmoidVsHyperbola' },\n      stem: '기질농도–반응속도 곡선이 S자형(굵은 선)을 보이는 효소에는 라인위버-버크 작도를 적용할 수 없다. 그 이유로 가장 타당한 것은?',\n      choices: [\n        '협동성(cooperativity)이 있어 미카엘리스–멘텐 식을 따르지 않으므로 이중역수를 취해도 직선이 되지 않는다',\n        '기질 친화도가 0이기 때문',\n        'Vmax가 무한대이기 때문',\n        '효소가 단량체(1개 소단위)이기 때문'\n      ],\n      answer: 0,\n      explain: 'S자형=다량체 알로스테릭 효소의 협동성(힐계수>1). MM식을 안 따라 LB 직선화가 불가능.',\n      src: '지엽정리 원광대 2024·삼육대(S자형=알로스테릭)'\n    },\n\n    /* ===== 생리: 산소해리곡선 / 활동전위 ===== */\n    {\n      id: 'bohr_shift', topic: '보어 효과', type: 'svg', graph: { kind: 'bohrShift' },\n      stem: '산소–헤모글로빈 해리곡선이 점선처럼 오른쪽으로 이동(산소 방출↑)하는 원인이 아닌 것은?',\n      choices: [\n        '혈액 pH 상승(알칼리화)',\n        'CO₂ 분압 증가',\n        '온도 상승',\n        '2,3-BPG 농도 증가'\n      ],\n      answer: 0,\n      explain: '우측 이동은 ↑CO₂·↑H⁺(pH↓)·↑온도·↑2,3-BPG에서 발생(보어 효과). pH 상승은 오히려 좌측 이동.',\n      src: '캠벨 43장 본문·지엽정리(보어 효과)'\n    },\n    {\n      id: 'hb_myo', topic: '산소 친화도 비교', type: 'svg', graph: { kind: 'hbMyoglobin' },\n      stem: '미오글로빈·태아헤모글로빈·성인헤모글로빈의 산소 해리곡선이다. 옳은 것은?',\n      choices: [\n        '미오글로빈은 성인 헤모글로빈보다 산소 친화도가 높다(곡선이 왼쪽)',\n        '태아 헤모글로빈은 모체(성인)보다 산소 친화도가 낮다',\n        '미오글로빈은 4차 구조로 S자형 협동성을 보인다',\n        '곡선이 오른쪽에 있을수록 산소 친화도가 높다'\n      ],\n      answer: 0,\n      explain: '왼쪽 곡선=높은 친화도. 미오글로빈(3차구조, 협동성 없음)·태아Hb는 성인Hb보다 친화도↑.',\n      src: '캠벨 43장(미오글로빈 3차구조)·전남대·원광대 기출'\n    },\n    {\n      id: 'ap_rise', topic: '활동전위', type: 'svg', graph: { kind: 'actionPotential', mark: 'rise' },\n      stem: '활동전위 그래프에서 강조된 ②(상승기)에 일어나는 일로 옳은 것은?',\n \"' + py1 + '\" width=\"' +\n        Math.abs(x1 - x0).toFixed(1) + '\" height=\"' + (py0 - py1).toFixed(1) + '\" fill=\"' + b.fill + '\" rx=\"2\"/>');\n    });\n    // 축\n    o.push('<line x1=\"' + px0 + '\" y1=\"' + py0 + '\" x2=\"' + px1 + '\" y2=\"' + py0 + '\" stroke=\"' + INK3 + '\" stroke-width=\"1.2\"/>');\n    if (!cfg.hideYBorder)\n      o.push('<line x1=\"' + px0 + '\" y1=\"' + py0 + '\" x2=\"' + px0 + '\" y2=\"' + py1 + '\" stroke=\"' + INK3 + '\" stroke-width=\"1.2\"/>');\n    if (cfg.yAxisAtZero && cfg.xmin < 0 && cfg.xmax > 0) {\n      var xz = sx(0);\n      o.push('<line x1=\"' + xz.toFixed(1) + '\" y1=\"' + py1 + '\" x2=\"' + xz.toFixed(1) + '\" y2=\"' + py0 + '\" stroke=\"' + INK3 + '\" stroke-width=\"1.2\"/>');\n    }\n    // 기준선\n    (cfg.hlines || []).forEach(function (h) {\n      var y = sy(h.y);\n      o.push('<line x1=\"' + px0 + '\" y1=\"' + y.toFixed(1) + '\" x2=\"' + px1 + '\" y2=\"' + y.toFixed(1) +\n        '\" stroke=\"' + (h.color || LINE) + '\" stroke-width=\"1\" stroke-dasharray=\"' + (h.dash || '4 3') + '\"/>');\n    });\n    (cfg.vlines || []).forEach(function (v) {\n      var x = sx(v.x), y2 = (v.toY != null) ? sy(v.toY) : py1;\n      o.push('<line x1=\"' + x.toFixed(1) + '\" y1=\"' + py0 + '\" x2=\"' + x.toFixed(1) + '\" y2=\"' + y2.toFixed(1) +\n        '\" stroke=\"' + (v.color || LINE) + '\" stroke-width=\"1\" stroke-dasharray=\"' + (v.dash || '4 3') + '\"/>');\n    });\n    // 눈금\n    (cfg.xticks || []).forEach(function (tk) {\n      var x = sx(tk.v);\n      o.push('<line x1=\"' + x.toFixed(1) + '\" y1=\"' + py0 + '\" x2=\"' + x.toFixed(1) + '\" y2=\"' + (py0 + 4) + '\" stroke=\"' + INK3 + '\" stroke-width=\"1\"/>');\n      if (tk.t != null) o.push('<text x=\"' + x.toFixed(1) + '\" y=\"' + (py0 + 14) + '\" font-size=\"9\" fill=\"' + INK3 + '\" text-anchor=\"middle\">' + tk.t + '<\/text>');\n    });\n    (cfg.yticks || []).forEach(function (tk) {\n      var y = sy(tk.v);\n      o.push('<line x1=\"' + (px0 - 4) + '\" y1=\"' + y ---------- */\n  function renderGraph(g) {\n    switch (g.kind) {\n      case 'enzymePH': {\n        var A = function (p) { return Math.exp(-Math.pow(p - 2, 2) / (2 * 1.7 * 1.7)); };\n        var Bf = function (p) { return Math.exp(-Math.pow(p - 8, 2) / (2 * 1.9 * 1.9)); };\n        return plot({\n          xmin: 0, xmax: 14, ymin: 0, ymax: 1.12, xlabel: 'pH', ylabel: '효소 활성',\n          xticks: [{ v: 0, t: '0' }, { v: 2, t: '2' }, { v: 7, t: '7' }, { v: 14, t: '14' }],\n          series: [{ pts: samp(A, 0, 14, 90), color: TEAL, width: 2.4 }, { pts: samp(Bf, 0, 14, 90), color: VIO, width: 2.4 }],\n          notes: [{ x: 2, y: 1.07, text: 'A', color: TEAL, weight: 800, anchor: 'middle' },\n                  { x: 8, y: 1.07, text: 'B', color: VIO, weight: 800, anchor: 'middle' }]\n        });\n      }\n      case 'enzymeTemp': {\n        var f = function (t) { var s = (t <= 40) ? 14 : 5.5; return Math.exp(-Math.pow(t - 40, 2) / (2 * s * s)); };\n        return plot({\n          xmin: 0, xmax: 60, ymin: 0, ymax: 1.12, xlabel: '온도 (℃)', ylabel: '효소 활성',\n          xticks: [{ v: 0, t: '0' }, { v: 20, t: '20' }, { v: 40, t: '40' }, { v: 60, t: '60' }],\n          series: [{ pts: samp(f, 0, 60, 90), color: TEAL, width: 2.4 }],\n          notes: [{ x: 40, y: 1.08, text: '최적온도', color: INK2, anchor: 'middle' },\n                  { x: 49, y: 0.4, text: '열변성', color: AMB, weight: 700 }]\n        });\n      }\n      case 'lbCompetitive': {\n        var ctl = function (x) { return 1 * x + 1; }, inh = function (x) { return 2 * x + 1; };\n        return plot({\n          xmin: -1.2, xmax: 2.2, ymin: 0, ymax: 5.6, hideYBorder: true, yAxisAtZero: true,\n          xlabel: '1/[S]', ylabel: '1/V', xticks: [{ v: 0, t: '0' }],\n          series: [{ pts: [[-1, 0], [2.2, ctl(2.2)]], color: TEAL, width: 2.3 },\n                   { pts: [[-0.5, 0], [2.2, inh(2.2)]], color: VIO, width: 2.3, dash: '6 4' }],\n          dots: [{ x: 0, y: 1, fill: INK, r: 3.2 }],\n          notes: [{ x: 0.12, y: 1.55, text: '공통 y절편', color: INK2, size: 9 },\n                  { x: 1.5, y: 2.4, text: '대조', color: TEAL, weight: 700 },\n                  { x: 0.95, y: 3.65, text: '저해제', color: VIO, weight: 700 },\n                  { x: -1.05, y: 0.5, text: 'Km↑', color: INK3, size: 9, anchor: 'middle' }]\n        });\n      }\n      case 'lbNoncompetitive': {\n        var ctl2 = function (x) { return 1 * x + 1; }, inh2 = function (x) { return 2 * x + 2; };\n        return plot({\n          xmin: -1.4, xmax: 2.2, ymin: 0, ymax: 6.6, hideYBorder: true, yAxisAtZero: true,\n          xlabel: '1/[S]', ylabel: '1/V', xticks: [{ v: 0, t: '0' }],\n          series: [{ pts: [[-1, 0], [2.2, ctl2(2.2)]], color: TEAL, width: 2.3 },\n                   { pts: [[-1, 0], [2.2, inh2(2.2)]], color: VIO, width: 2.3, dash: '6 4' }],\n          dots: [{ x: -1, y: 0, fill: INK, r: 3.2 }],\n          notes: [{ x: -1, y: 0.7, text: '공통 x절편', color: INK2, size: 9, anchor: 'middle' },\n                  { x: 0.12, y: 2.5, text: 'Vmax↓', color: VIO, weight: 700, size: 9 },\n                  { x: 1.5, y: 2.5, text: '대조', color: TEAL, weight: 700 },\n                  { x: 1.1, y: 4.6, text: '저해제', color: VIO, weight: 700 }]\n        });\n      }\n      case 'kmCompare': {\n        var A2 = function (s) { return s / (1 + s); }, B2 = function (s) { return s / (3 + s); };\n        return plot({\n          xmin: 0, xmax: 12, ymin: 0, ymax: 1.12, xlabel: '[기질]', ylabel: '반응속도 V',\n          xticks: [{ v: 0, t: '0' }],\n          hlines: [{ y: 1, dash: '4 3', color: LINE }, { y: 0.5, dash: '4 3', color: LINE }],\n          vlines: [{ x: 1, toY: 0.5, color: TEAL, dash: '3 3' }, { x: 3, toY: 0.5, color: VIO, dash: '3 3' }],\n          series: [{ pts: samp(A2, 0, 12, 90), color: TEAL, width: 2.4 }, { pts: samp(B2, 0, 12, 90), color: VIO, width: 2.4 }],\n          notes: [{ x: 2.2, y: 0.78, text: 'A', color: TEAL, weight: 800 },\n                  { x: 5.2, y: 0.66, text: 'B', color: VIO, weight: 800 },\n                  { x: 11.6, y: 1.03, text: 'Vmax', color: INK3, size: 8.5, anchor: 'end' },\n                  { x: 11.6, y: 0.53, text: '½Vmax', color: INK3, size: 8.5, anchor: 'end' },\n                  { x: 1, y: 0.06, text: 'Km(A)', color: TEAL, size: 8, anchor: 'middle' },\n                  { x: 3, y: 0.06, text: 'Km(B)', color: VIO, size: 8, anchor: 'middle' }]\n        });\n      }\n      case 'sigmoidVsHyperbola': {\n        var hyp = function (s) { return s / (2 + s); };\n        var sig = function (s) { var n = 3, k = 27; return Math.pow(s, n) / (k + Math.pow(s, n)); };\n        return plot({\n          xmin: 0, xmax: 12, ymin: 0, ymax: 1.08, xlabel: '[기질]', ylabel: '반응속도 V',\n          xticks: [{ v: 0, t: '0' }],\n          series: [{ pts: samp(hyp, 0, 12, 90), color: VIO, width: 1.8, dash: '5 4' },\n                   { pts: samp(sig, 0, 12, 90), color: TEAL, width: 2.8 }],\n          notes: [{ x: 5.4, y: 0.74, text: 'S자형(알로스테릭)', color: TEAL, weight: 700, size: 9 },\n                  { x: 3.5, y: 0.46, text: '쌍곡선(MM)', color: VIO, size: 9 }]\n        });\n      }\n      case 'bohrShift': {\n        var sat = function (p, P) { var n = 2.8; return 100 * Math.pow(p, n) / (Math.pow(P, n) + Math.pow(p, n)); };\n        return plot({\n          xmin: 0, xmax: 100, ymin: 0, ymax: 104, xlabel: 'pO₂ (mmHg)', ylabel: 'O₂ 포화도 (%)',\n          xticks: [{ v: 0, t: '0' }, { v: 40, t: '40' }, { v: 80, t: '80' }],\n          yticks: [{ v: 0, t: '0' }, { v: 50, t: '50' }, { v: 100, t: '100' }],\n          series: [{ pts: samp(function (p) { return sat(p, 26); }, 0, 100, 90), color: TEAL, width: 2.5 },\n                   { pts: samp(function (p) { return sat(p, 42); }, 0, 100, 90), color: VIO, width: 2.5, dash: '6 4' }],\n          notes: [{ x: 30, y: 78, text: '정상', color: TEAL, weight: 700 },\n                  { x: 56, y: 40, text: '우측 이동 →', color: VIO, weight: 700, size: 9 }]\n        });\n      }\n      case 'hbMyoglobin': {\n        var myo = function (p) { return 100 * p / (2.8 + p); };\n        var fet = function (p) { var n = 2.6, P = 19; return 100 * Math.pow(p, n) / (Math.pow(P, n) + Math.pow(p, n)); };\n        var adu = function (p) { var n = 2.8, P = 26; return 100 * Math.pow(p, n) / (Math.pow(P, n) + Math.pow(p, n)); };\n        return plot({\n          xmin: 0, xmax: 100, ymin: 0, ymax: 104, xlabel: 'pO₂ (mmHg)', ylabel: 'O₂ 포화도 (%)',\n          xticks: [{ v: 0, t: '0' }, { v: 40, t: '40' }, { v: 80, t: '80' }],\n          yticks: [{ v: 0, t: '0' }, { v: 50, t: '50' }, { v: 100, t: '100' }],\n          series: [{ pts: samp(myo, 0, 100, 90), color: AMB, width: 2.3 },\n                   { pts: samp(fet, 0, 100, 90), color: VIO, width: 2.3 },\n                   { pts: samp(adu, 0, 100, 90), color: TEAL, width: 2.3 }],\n          notes: [{ x: 17, y: 88, text: '미오글로빈', color: AMB, weight: 700, size: 9 },\n                  { x: 30, y: 55, text: '태아 Hb', color: VIO, weight: 700, size: 9 },\n                  { x: 52, y: 72, text: '성인 Hb', color: TEAL, weight: 700, size: 9 }]\n        });\n      }\n      case 'actionPotential': {\n        var pts = [[0, -70], [0.7, -70], [0.92, -58], [1.12, 0], [1.34, 40], [1.62, 18],\n                   [1.95, -22], [2.4, -64], [2.85, -80], [3.5, -78], [4.4, -72], [6, -70]];\n        var cfg = {\n          xmin: 0, xmax: 6, ymin: -95, ymax: 55, xlabel: '시간 (ms)', ylabel: '막전위 (mV)',\n          xticks: [{ v: 0, t: '0' }, { v: 1, t: '1' }, { v: 2, t: '2' }, { v: 3, t: '3' }, { v: 4, t: '4' }, { v: 5, t: '5' }],\n          yticks: [{ v: 40, t: '+40' }, { v: 0, t: '0' }, { v: -70, t: '−70' }],\n          hlines: [{ y: -55, dash: '3 3', color: LINE }, { y: -70, dash: '3 3', color: LINE }],\n          series: [{ pts: pts, color: TEAL, width: 2.6 }],\n          notes: [{ x: 3.55, y: -48, text: '역치', color: INK3, size: 8.5 },\n                  { x: 3.3, y: -80, text: '휴지전위', color: INK3, size: 8.5 }]\n        };\n        if (g.mark === 'rise') {\n          cfg.bands = [{ x0: 0.92, x1: 1.4, fill: 'var(--teal-soft)' }];\n          cfg.notes.push({ x: 0.62, y: 6, text: '②', color: TEAL, weight: 800, size: 12 });\n          cfg.notes.push({ x: 1.5, y: 44, text: '상승기', color: TEAL, weight: 700, size: 9 });\n        } else if (g.mark === 'refractory') {\n          cfg.bands = [{ x0: 0.92, x1: 2.5, fill: 'var(--amb-soft)' }];\n          cfg.notes.push({ x: 0.98, y: -90, text: '절대 불응기', color: AMB, weight: 700, size: 9 });\n        }\n        return plot(cfg);\n      }\n      case 'growthJvsS': {\n        var K = 100, r = 0.8, N0 = 3;\n        var J = function (t) { return Math.min(N0 * Math.exp(0.5 * t), 118); };\n        var S = function (t) { return K / (1 + ((K - N0) / N0) * Math.exp(-r * t)); };\n        return plot({\n          xmin: 0, xmax: 10, ymin: 0, ymax: 122, xlabel: '시간', ylabel: '개체수 N',\n          xticks: [{ v: 0, t: '0' }],\n          hlines: [{ y: 100, dash: '4 3', color: LINE }],\n          series: [{ pts: samp(J, 0, 10, 90), color: VIO, width: 2.4 },\n                   { pts: samp(S, 0, 10, 90), color: TEAL, width: 2.4 }],\n          notes: [{ x: 6.4, y: 114, text: '(가) J자형', color: VIO, weight: 700, size: 9 },\n                  { x: 6.6, y: 92, text: '(나) S자형', color: TEAL, weight: 700, size: 9 },\n                  { x: 9.6, y: 105, text: '환경수용력 K', color: INK3, size: 8.5, anchor: 'end' }]\n        });\n      }\n      case 'logistic': {\n        var K2 = 100, r2 = 0.8, N02 = 3;\n        var S2 = function (t) { return K2 / (1 + ((K2 - N02) / N02) * Math.exp(-r2 * t)); };\n        var tstar = Math.log((K2 - N02) / N02) / r2;\n        return plot({\n          xmin: 0, xmax: 12, ymin: 0, ymax: 122, xlabel: '시간', ylabel: '개체수 N',\n          xticks: [{ v: 0, t: '0' }],\n          yticks: [{ v: 50, t: 'K/2' }, { v: 100, t: 'K' }],\n          hlines: [{ y: 100, dash: '4 3', color: LINE }, { y: 50, dash: '4 3', color: LINE }],\n          vlines: [{ x: tstar, toY: 50, color: AMB, dash: '3 3' }],\n          series: [{ pts: samp(S2, 0, 12, 90), color: TEAL, width: 2.6 }],\n          notes: [{ x: tstar + 0.3, y: 58, text: '증가속도 최대', color: AMB, weight: 700, size: 8.5 }]\n        });\n      }\n      case 'photoLight': {\n        var f2 = function (I) { return 1 - Math.exp(-0.55 * I); };\n        return plot({\n          xmin: 0, xmax: 10, ymin: 0, ymax: 1.1, xlabel: '광도', ylabel: '광합성 속도',\n          xticks: [{ v: 0, t: '0' }],\n          vlines: [{ x: 3, color: LINE, dash: '3 3' }],\n          series: [{ pts: samp(f2, 0, 10, 90), color: TEAL, width: 2.6 }],\n          notes: [{ x: 1.3, y: 0.42, text: '빛이 제한', color: INK3, size: 8.5 },\n                  { x: 6.6, y: 1.04, text: '광포화(빛 외 요인 제한)', color: INK2, size: 8.5, anchor: 'middle' }]\n        });\n      }\n      case 'photoC3C4': {\n        var C4 = function (I) { return 1 - Math.exp(-0.6 * I); };\n        var C3 = function (I) { return 0.62 * (1 - Math.exp(-0.5 * I)); };\n        return plot({\n          xmin: 0, xmax: 10, ymin: 0, ymax: 1.1, xlabel: '광도', ylabel: '광합성 효율',\n          xticks: [{ v: 0, t: '0' }],\n          series: [{ pts: samp(C4, 0, 10, 90), color: TEAL, width: 2.5 },\n                   { pts: samp(C3, 0, 10, 90), color: VIO, width: 2.5 }],\n          notes: [{ x: 8.3, y: 1.02, text: 'C₄', color: TEAL, weight: 800, size: 11 },\n                  { x: 8.3, y: 0.55, text: 'C₃', color: VIO, weight: 800, size: 11 }]\n        });\n      }\n      default:\n        return '<svg viewBox=\"0 0 340 230\" xmlns=\"http://www.w3.org/2000/svg\"><text x=\"170\" y=\"115\" text-anchor=\"middle\" fill=\"' + INK3 + '\">graph<\/text><\/svg>';\n    }\n  }\n  window.renderGraph = renderGraph;\n  window._plot = plot;\n\n  /* ---------- DOM 헬퍼 ---------- */\n  function el(id) { return document.getElementById(id); }\n  function esc(s) {\n    return String(s).replace(/[&<>]/g, function (c) { return c === '&' ? '&amp;' : c === '<' ? '&lt;' : '&gt;'; });\n  }\n  function save() { if (session) B.saveState(session); }\n  function total() { return QS.length; }\n  fu
