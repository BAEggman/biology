nction curQ() { return B.getQuestionById(QS, session.order[session.idx]); }\n\n  function updateMeta() {\n    var sc = B.scoreSession(QS, session);\n    var pos = (session.idx >= total()) ? total() : (session.idx + 1);\n    el('meta').innerHTML =\n      '<span class=\"count\">' + pos + ' <i>/ ' + total() + '<\/i><\/span>' +\n      '<span class=\"chip-score\">맞힘 ' + sc.correct + '<\/span>';\n    var pct = (session.idx >= total()) ? 100 : Math.round(session.idx / total() * 100);\n    el('bar').style.width = pct + '%';\n  }\n\n  function renderQuestion() {\n    var q = curQ();\n    var revealed = (q.id in session.answers);\n    var disp = B.displayedChoices(q, session);\n    var correctPos = B.correctDisplayPos(q, session);\n    var sel = session.answers[q.id];\n    var media = (q.type === 'svg')\n      ? '<div class=\"graph\">' + renderGraph(q.graph) + '<\/div>'\n      : '<div class=\"scenario\">' + esc(q.scenario) + '<\/div>';\n    var badge = (q.type === 'svg') ? '<span class=\"badge g\">그래프<\/span>' : '<span class=\"badge e\">실험<\/span>';\n\n    var html = '<article class=\"card\">' +\n      '<div class=\"tags\"><span class=\"chip-topic\">' + esc(q.topic) + '<\/span>' + badge + '<\/div>' +\n      media +\n      '<h2 class=\"stem\">' + esc(q.stem) + '<\/h2>' +\n      '<div class=\"choices\" role=\"group\" aria-label=\"보기\">';\n    disp.forEach(function (c, i) {\n      var cls = 'choice', mark = '';\n      if (revealed) {\n        if (i === correctPos) { cls += ' correct'; mark = '<span class=\"mk ok\">✓<\/span>'; }\n        else if (i === sel) { cls += ' wrong'; mark = '<span class=\"mk no\">✗<\/span>'; }\n        else { cls += ' muted'; }\n      }\n      html += '<button type=\"button\" class=\"' + cls + '\" data-pos=\"' + i + '\"' + (revealed ? ' disabled' : '') + '>' +\n        '<span class=\"lab\">' + String.fromCharCode(65 + i) + '<\/span>' +\n        '<span class=\"txt\">' + esc(c) + '<\/span>' + mark + '<\/button>';\n    });\n    html += '<\/div>';\n\n    if (revealed) {\n      var ok = (sel === correctPos);\n      html += '<div class=\"feedback ' + (ok ? 'good' : 'bad') + '\">' +\n        '<div class=\"verdict\">' + (ok ? '정답' : '오답') + '<\/div>' +\n        '<p class=\"explain\">' + esc(q.explain) + '<\/p>' +\n        '<p class=\"src\">근거 · ' + esc(q.src) + '<\/p>' +\n        '<\/div>' +\n        '<div class=\"nav\"><button type=\"button\" class=\"btn primary\" id=\"next\">' +\n        ((session.idx + 1 >= total()) ? '결과 보기' : '다음 문제') + '<\/button><\/div>';\n    }\n    html += '<\/article>';\n    el('screen').innerHTML = html;\n\n    if (!revealed) {\n      Array.prototype.forEach.call(el('screen').querySelectorAll('.choice'), function (b) {\n        b.addEventListener('click', function () { pick(parseInt(b.getAttribute('data-pos'), 10)); });\n      });\n    } else {\n      el('next').addEventListener('click', next);\n    }\n    updateMeta();\n  }\n\n  function pick(pos) {\n    var q = curQ();\n    if (q.id in session.answers) return;\n    B.recordAnswer(session, q.id, pos);\n    save();\n    renderQuestion();\n    var n = el('next'); if (n) n.focus();\n  }\n\n  function next() {\n    session.idx++;\n    save();\n    if (session.idx >= total()) renderEnd(); else renderQuestion();\n    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }\n  }\n\n  function renderEnd() {\n    var sc = B.scoreSession(QS, session);\n    el('screen').innerHTML = '<article class=\"card end\">' +\n      '<div class=\"done-emoji\" aria-hidden=\"true\">🧫<\/div>' +\n      '<h2 class=\"end-title\">풀이 완료<\/h2>' +\n      '<div class=\"score-big\">' + sc.correct + ' <span>/ ' + sc.total + '<\/span><\/div>' +\n      '<div class=\"score-pct\">정답률 ' + sc.pct + '%<\/div>' +\n      '<p class=\"end-note\">틀린 문항의 핵심 포인트를 한 번 더 보고 다시 풀어 보세요.<\/p>' +\n      '<div class=\"nav\"><button type=\"button\" class=\"btn primary\" id=\"again\">다시 풀기<\/button><\/div>' +\n      '<\/article>';\n    el('again').addEventListener('click', restart);\n    updateMeta();\n  }\n\n  function restart() {\n    B.clearState();\n    session = B.createSession(QS, shuf);\n    save();\n    renderQuestion();\n    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }\n  }\n\n  function ready() {\n    if (session.idx >= total()) renderEnd(); else renderQuestion();\n  }\n\n  function boot() {\n    var s = B.loadStateSync();\n    if (s) { session = s; ready(); return; }\n    el('screen').innerHTML = '<div class=\"loading\">불러오는 중…<\/div>';\n    B.loadStateAsync().then(function (a) {\n      session = a || B.createSession(QS, shuf);\n      if (!a) save();\n      ready();\n    });\n  }\n\n  function bindHeader() {\n    var r = el('reset');\n    if (r) r.addEventListener('click', function () {\n      if (window.confirm('처음부터 다시 풀까요? 지금까지의 진행도가 사라집니다.')) restart();\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () { bindHeader(); boot(); });\n  } else { bindHeader(); boot(); }\n\n})();\n\n<\/script>\n<\/body>\n<\/html>\n"</script>
<script type="application/json" id="ann7">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<meta name=\"theme-color\" content=\"#EEF3F1\">\n<title>하류 효과 예측 · 편입·한의대 생물<\/title>\n<style>\n:root{\n  --ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;\n  --bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;\n  --vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;\n  --ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;\n  --sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;\n  --mono:ui-monospace,Menlo,Consolas,monospace;\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:var(--sans);color:var(--ink);\n  background:\n    radial-gradient(120% 70% at 50% -10%, #F2F6F4 0%, rgba(242,246,244,0) 60%),\n    linear-gradient(180deg,#EEF3F1 0%,var(--bg) 38%,#E4EAE8 100%);\n  background-attachment:fixed;\n  -webkit-font-smoothing:antialiased;line-height:1.5;\n}\n.wrap{max-width:760px;margin:0 auto;padding:0 16px 40px;min-height:100vh}\n\n/* ---------- header ---------- */\nheader{position:sticky;top:0;z-index:20;padding:14px 0 10px;\n  background:linear-gradient(180deg,#EEF3F1 70%,rgba(238,243,241,0));\n  -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}\n.htop{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}\n.brand h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0;color:var(--ink)}\n.brand p{margin:2px 0 0;font-size:12.5px;color:var(--ink3);font-weight:500}\n.acc{flex:none;text-align:right}\n.acc b{display:block;font-size:19px;font-weight:800;color:var(--teal-d);line-height:1}\n.acc span{font-size:10.5px;color:var(--ink3);font-weight:600;letter-spacing:.02em}\n.bar{margin-top:10px;height:7px;border-radius:99px;background:#DCE5E3;overflow:hidden}\n.bar>i{display:block;height:100%;border-radius:99px;\n  background:linear-gradient(90deg,var(--teal),var(--teal-d));\n  transition:width .35s cubic-bezier(.4,0,.2,1)}\n.cnt{margin-top:5px;font-size:11px;color:var(--ink3);font-weight:600;text-align:right}\n\n/* ---------- chips ---------- */\n.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;-ms-overflow-style:none}\n.chips::-webkit-scrollbar{display:none}\n.chip{flex:none;border:1px solid var(--line);background:var(--card);color:var(--ink2);\n  font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;\n  white-space:nowrap;transition:.15s}\n.chip:hover{border-color:var(--ink3)}\n.chip[aria-pressed=\"true\"]{background:var(--ink);border-color:var(--ink);color:#fff}\n.chip .n{font-size:10.5px;opacity:.6;margin-left:4px;font-weight:700}\n\n/* ---------- card ---------- */\n.card{background:var(--card);border:1px solid var(--line2);border-radius:16px;\n  box-shadow:0 1px 2px rgba(16,48,46,.04),0 10px 30px rgba(16,48,46,.06);\n  padding:18px 17px 17px;margin-top:6px}\n.ctag{display:flex;align-items:center;gap:8px;margin-bottom:13px}\n.dot{font-size:11.5px;font-weight:800;letter-spacing:.01em;padding:3px 10px;border-radius:99px}\n.badge{font-size:10.5px;font-weight:700;color:var(--ink3);border:1px solid var(--line);\n  padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:4px}\n.badge.chain{color:var(--vio);border-color:var(--vio-soft);background:var(--vio-soft)}\n\n.premise{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.45;color:var(--ink);\n  background:linear-gradient(180deg,#FBFDFC,#F4F8F6);border:1px solid var(--line2);\n  border-radius:12px;padding:13px 14px;margin-bottom:14px}\n.premise .q{color:var(--ink3);font-weight:600;font-size:15px}\n.ar{font-weight:900;font-variant-numeric:tabular-nums}\n.ar.up{color:var(--teal)}\n.ar.dn{color:var(--vio)}\n\n/* ---------- steps ---------- */\n.steps{display:flex;flex-direction:column;gap:9px}\n.step{border:1px solid var(--line2);border-radius:13px;padding:11px 12px;background:#fff;transition:.15s}\n.step.active{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}\n.step.locked{background:#F6F8F7;border-style:dashed;opacity:.7}\n.srow{display:flex;align-items:flex-start;gap:9px}\n.num{flex:none;width:21px;height:21px;border-radius:7px;font-size:11.5px;font-weight:800;\n  display:flex;align-items:center;justify-content:center;background:var(--teal-soft);color:var(--teal-d);margin-top:1px}\n.step.locked .num{background:#E4EAE8;color:var(--ink3)}\n.step.done.right .num{background:var(--ok-soft);color:var(--ok)}\n.step.done.wrong .num{background:var(--no-soft);color:var(--no)}\n.node{flex:1;font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.4}\n.lockmsg{font-size:13px;color:var(--ink3);font-weight:600}\n\n.opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px}\n.opt{font-family:inherit;border:1.5px solid var(--line);background:#fff;border-radius:10px;\n  padding:10px 4px 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;\n  min-height:52px;justify-content:center;transition:.12s;color:var(--ink2)}\n.opt:hover:not(:disabled){border-color:var(--ink3);background:#FAFCFB}\n.opt:disabled{cursor:default}\n.opt .g{font-size:21px;font-weight:900;line-height:1}\n.opt .l{font-size:11px;font-weight:700;letter-spacing:.02em}\n.opt[data-val=\"up\"] .g{color:var(--teal)}\n.opt[data-val=\"down\"] .g{color:var(--vio)}\n.opt[data-val=\"same\"] .g{color:var(--amb);font-size:13px;padding:3px 0}\n.opt.pick.right{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}\n.opt.pick.wrong{border-color:var(--no);background:var(--no-soft);color:var(--no)}\n.opt.solution{border-color:var(--ok);box-shadow:0 0 0 2px var(--ok-soft) inset}\n.opt.dim{opacity:.4}\n.opt .mk{font-size:10px;font-weight:800;letter-spacing:.02em}\n\n/* result line on a done step (non-active reveal) */\n.verdict{margin-top:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}\n.verdict.right{color:var(--ok)}\n.verdict.wrong{color:var(--no)}\n.verdict .pill{font-size:11px;border-radius:99px;padding:2px 8px;background:var(--line2);color:var(--ink2);font-weight:700}\n\n/* ---------- chain reveal ---------- */\n.reveal{margin-top:15px;border-left:3px solid var(--teal);background:var(--teal-soft);\n  border-radius:0 12px 12px 0;padding:13px 14px}\n.reveal .lab{font-size:10.5px;font-weight:800;letter-spacing:.06em;color:var(--teal-d);text-transform:uppercase;margin-bottom:6px}\n.reveal .chain{font-size:14.5px;font-weight:700;color:var(--ink);line-height:1.55}\n.reveal .src{margin-top:9px;font-size:11.5px;color:var(--ink3);font-weight:600;font-family:var(--mono)}\n.outcome{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;\n  margin-bottom:10px;padding:5px 11px;border-radius:99px}\n.outcome.right{background:var(--ok-soft);color:var(--ok)}\n.outcome.wrong{background:var(--no-soft);color:var(--no)}\n\n/* ---------- nav ---------- */\n.nav{display:flex;gap:9px;margin-top:14px}\n.btn{flex:1;font-family:inherit;font-size:14.5px;font-weight:700;border-radius:12px;padding:13px;\n  cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink2);transition:.15s}\n.btn:hover:not(:disabled){border-color:var(--ink3)}\n.btn:disabled{opacity:.45;cursor:default}\n.btn.prev{flex:0 0 84px}\n.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;flex:1}\n.btn.primary:hover:not(:disabled){background:var(--teal-d);border-color:var(--teal-d)}\n\n/* ---------- footer ---------- */\n.foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px;\n  padding-top:14px;border-top:1px solid var(--line2)}\n.streak{font-size:12.5px;color:var(--ink2);font-weight:600}\n.streak b{color:var(--teal-d);font-weight:800}\n.fbtns{display:flex;gap:7px}\n.tool{font-family:inherit;font-size:12px;font-weight:700;border:1px solid var(--line);background:#fff;\n  color:var(--ink2);border-radius:99px;padding:7px 12px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}\n.tool:hover{border-color:var(--ink3)}\n.tool[aria-pressed=\"true\"]{background:var(--teal-soft);border-color:var(--teal-soft);color:var(--teal-d)}\n\n/* ---------- completion ---------- */\n.done-card{text-align:center;padding:28px 20px 22px}\n.done-card .em{font-size:34px}\n.done-card h2{margin:8px 0 4px;font-size:21px;font-weight:800;letter-spacing:-.01em}\n.done-card .sub{font-size:13px;color:var(--ink3);font-weight:500;margin-bottom:18px}\n.kgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px}\n.kpi{background:#F6F9F8;border:1px solid var(--line2);border-radius:13px;padding:13px 8px}\n.kpi b{display:block;font-size:23px;font-weight:800;color:var(--teal-d);line-height:1}\n.kpi span{font-size:10.5px;color:var(--ink3);font-weight:700;letter-spacing:.02em}\n\n@media (max-width:380px){\n  .premise{font-size:16.5px}\n  .opt .g{font-size:19px}\n  .btn.prev{flex:0 0 64px}\n}\n@media (prefers-reduced-motion:reduce){\n  *{transition:none!important}\n  .bar>i{transition:none}\n}\n:focus-visible{outline:2.5px solid var(--teal);outline-offset:2px;border-radius:6px}\n\n<\/style>\n<\/head>\n<body>\n<div id=\"app\"><\/div>\n<script>\n/* ============================================================\n * 하류 효과 예측 (Downstream Effect Direction Prediction)\n * 순수 로직 + 검증된 문항 은행. DOM 비의존 → Node 테스트 가능.\n * 답 인코딩: \"up\"(↑) / \"down\"(↓) / \"same\"(불변)\n * ============================================================ */\n(function (root, factory) {\n  var api = factory();\n  // 브라우저: window.* 노출\n  if (typeof window !== 'undefined') {\n    for (var k in api) { if (api.hasOwnProperty(k)) window[k] = api[k]; }\n    window.DEP = api;\n  }\n  // Node: module.exports\n  if (typeof module !== 'undefined' && module.exports) { module.exports = api; }\n})(this, function () {\n  'use strict';\n\n  var SCHEMA = 1;\n  var APP_KEY = 'bio_downstream_predict_v1';\n  var VALID = ['up', 'down', 'same'];\n\n  var DOMAINS = ['내분비', '삼투조절', '순환', '신경', '호흡조절', '유전자조절'];\n\n  // s(node, ans) 헬퍼로 단계 생성\n  function s(node, ans) { return { node: node, ans: ans }; }\n\n  /* ---------------- 문항 은행 (자기검증 완료) ----------------\n   * 모든 항목은 캠벨 본문 / BM편입 기출 / 한의대 기출 / 지엽노트에 근거.\n   * \"옳은\" 방향은 진짜 옳게, 함정(불변)도 실제로 변하지 않는 것만 사용.\n   */\n  var QUESTIONS = [\n    /* ===== 내분비 (12) ===== */\n    { id: 'E01', domain: '내분비', premise: '혈당이 ↑하면', single: true,\n      steps: [s('이자 β세포의 인슐린 분비', 'up')],\n      chain: '혈당↑ → 인슐린↑(β세포) → 조직 포도당 흡수↑ → 혈당↓',\n      src: 'Ch.45 내분비 / 기출 580' },\n\n    { id: 'E02', domain: '내분비', premise: '혈당이 ↓하면',\n      steps: [s('이자 α세포의 글루카곤 분비', 'up'), s('간의 글리코겐 분해', 'up'), s('혈중 포도당 (보상 후)', 'up')],\n      chain: '혈당↓ → 글루카곤↑(α세포) → 간 글리코겐 분해↑ → 혈당↑(회복)',\n      src: 'Ch.45 내분비 / 기출 577·578' },\n\n    { id: 'E03', domain: '내분비', premise: '부교감신경(미주신경) 활성이 ↑하면',\n      steps: [s('인슐린 분비', 'up'), s('혈당', 'down')],\n      chain: '부교감↑ → 인슐린 분비↑ → 조직 포도당 흡수↑ → 혈당↓',\n      src: '기출 577' },\n\n    { id: 'E04', domain: '내분비', premise: '코르티솔(당질코르티코이드)이 ↑하면', single: true,\n      steps: [s('혈당', 'up')],\n      chain: '코르티솔↑ → 단백질 분해·당신생(포도당 신생)↑ → 혈당↑',\n      src: 'Ch.45 내분비 / 기출 564·578' },\n\n    { id: 'E05', domain: '내분비', premise: '에피네프린이 ↑하면', single: true,\n      steps: [s('혈당', 'up')],\n      chain: '에피네프린↑ → 간 cAMP↑ → 글리코겐 분해↑ → 혈당↑',\n      src: 'Ch.45 내분비 / 9장 신호전달' },\n\n    { id: 'E06', domain: '내분비', premise: '혈중 Ca²⁺가 ↓하면',\n      steps: [s('부갑상선의 PTH 분비', 'up'), s('파골세포 활성(뼈에서 Ca²⁺ 방출)', 'up'), s('혈중 Ca²⁺ (보상 후)', 'up')],\n      chain: '혈중 Ca²⁺↓ → PTH↑ → 뼈 흡수↑·신장 재흡수↑·활성 비타민D↑ → 혈중 Ca²⁺↑',\n      src: 'Ch.45 내분비 / 기출 565·567' },\n\n    { id: 'E07', domain: '내분비', premise: '혈중 Ca²⁺가 ↑하면',\n      steps: [s('갑상선 C세포의 칼시토닌 분비', 'up'), s('뼈에서 Ca²⁺ 방출', 'down')],\n      chain: '혈중 Ca²⁺↑ → 칼시토닌↑(갑상선) → 뼈 Ca²⁺ 방출↓·신장 배출↑ → 혈중 Ca²⁺↓',\n      src: 'Ch.45 내분비 / 기출 566' },\n\n    { id: 'E08', domain: '내분비', premise: 'PTH(부갑상선호르몬)가 ↑하면', single: true,\n      steps: [s('신세뇨관에서 Ca²⁺ 재흡수', 'up')],\n      chain: 'PTH↑ → 신세뇨관 Ca²⁺ 재흡수↑ (+ 뼈 흡수↑, 활성 비타민D↑)',\n      src: '40동물 본문 / 기출 567' },\n\n    { id: 'E09', domain: '내분비', premise: '혈중 갑상선호르몬(T3·T4)이 ↓하면',\n      steps: [s('시상하부의 TRH 분비', 'up'), s('뇌하수체 전엽의 TSH 분비', 'up'), s('대사율 (갑상선 반응 후)', 'up')],\n      chain: 'T3·T4↓ → TRH↑ → TSH↑ → 갑상선 자극 → 대사율↑',\n      src: '40동물 본문 / 기출 571' },\n\n    { id: 'E10', domain: '내분비', premise: '식이 요오드가 부족하면(요오드↓)',\n      steps: [s('갑상선호르몬(티록신) 합성', 'down'), s('혈중 TSH', 'up')],\n      chain: '요오드↓ → 티록신 합성↓ → 음성피드백 해제 → TSH↑ (갑상선종)',\n      src: '기출 571·572' },\n\n    { id: 'E11', domain: '내분비', premise: '그레이브스병에서 자가항체가 TSH 수용체를 과자극하면',\n      steps: [s('갑상선호르몬 분비', 'up'), s('뇌하수체 TSH 분비', 'down')],\n      chain: '자가항체→갑상선 과자극 → 갑상선호르몬↑ → 음성피드백 → TSH↓',\n      src: '기출 574' },\n\n    { id: 'E12', domain: '내분비', premise: '인슐린이 ↑하면', single: true,\n      steps: [s('세포의 포도당 흡수(GLUT4)', 'up')],\n      chain: '인슐린↑ → GLUT4 막삽입↑ → 포도당 흡수↑ → 혈당↓',\n      src: 'Ch.45 내분비 / 기출 549·580' },\n\n    /* ===== 삼투조절 (10) ===== */\n    { id: 'O01', domain: '삼투조절', premise: '혈장 삼투압이 ↑하면(탈수)',\n      steps: [s('뇌하수체 후엽의 ADH 분비', 'up'), s('집합관 수분 재흡수', 'up'), s('소변량', 'down')],\n      chain: '삼투압↑ → ADH↑ → 아쿠아포린↑·물 재흡수↑ → 소변량↓·농축↑',\n      src: '기출 763' },\n\n    { id: 'O02', domain: '삼투조절', premise: '술(알코올)을 마셔 ADH 분비가 ↓하면', single: true,\n      steps: [s('소변량', 'up')],\n      chain: '알코올 → ADH↓ → 집합관 물 재흡수↓ → 소변량↑',\n      src: '기출 763' },\n\n    { id: 'O03', domain: '삼투조절', premise: '출혈로 혈액량이 ↓하면', single: true,\n      steps: [s('ADH(바소프레신) 분비', 'up')],\n      chain: '혈량↓ → 혈압↓ → ADH↑ → 물 보존·혈관수축',\n      src: '기출 729' },\n\n    { id: 'O04', domain: '삼투조절', premise: '혈압이 ↓하면(저혈압)',\n      steps: [s('사구체 곁세포(JG)의 레닌 분비', 'up'), s('안지오텐신 II', 'up'), s('부신피질의 알도스테론 분비', 'up')],\n      chain: '혈압↓ → 레닌↑(JG세포) → 안지오텐신 II↑ → 알도스테론↑',\n      src: '지엽노트(RAAS) / 기출 730·731·784' },\n\n    { id: 'O05', domain: '삼투조절', premise: '안지오텐신 II가 ↑하면',\n      steps: [s('세동맥 혈관수축', 'up'), s('혈압', 'up')],\n      chain: 'Ang II↑ → 세동맥 혈관수축↑ → 말초저항↑ → 혈압↑',\n      src: '기출 730' },\n\n    { id: 'O06', domain: '삼투조절', premise: '알도스테론이 ↑하면',\n      steps: [s('원위세뇨관·집합관의 Na⁺ 재흡수', 'up'), s('K⁺ 분비(오줌으로 배출)', 'up')],\n      chain: '알도스테론↑ → Na⁺ 재흡수↑·K⁺ 분비↑ → 혈량↑',\n      src: '기출 784 / 44 배설계' },\n\n    { id: 'O07', domain: '삼투조절', premise: '교감신경이 ↑하여 JG세포의 β1 수용체가 자극되면', single: true,\n      steps: [s('레닌 분비', 'up')],\n      chain: '교감↑ → JG세포 β1 자극 → 레닌↑ (레닌 분비 3대 자극의 하나)',\n      src: '지엽노트(레닌 분비 자극)' },\n\n    { id: 'O08', domain: '삼투조절', premise: '짠 음식을 많이 먹어 Na⁺ 섭취가 ↑하면',\n      steps: [s('혈액량(혈장량)', 'up'), s('레닌 분비', 'down')],\n      chain: 'Na⁺ 섭취↑ → 혈량↑·GFR↑ → 신장 관류↑ → 레닌↓',\n      src: '기출 782' },\n\n    { id: 'O09', domain: '삼투조절', premise: 'ADH가 ↑하면', single: true,\n      steps: [s('집합관 세포의 아쿠아포린(물 통로)', 'up')],\n      chain: 'ADH↑ → 집합관에 아쿠아포린 삽입↑ → 물 재흡수↑',\n      src: '기출 763 / 44 배설계' },\n\n    { id: 'O10', domain: '삼투조절', premise: 'ADH가 ↑해도 헨레고리 하행지(AQP1)에서', single: true, trap: true,\n      steps: [s('하행지의 물 재흡수', 'same')],\n      chain: '하행지 AQP1은 ADH 비의존 → ADH↑여도 하행지 물 재흡수 불변(ADH는 집합관에만 작용)',\n      src: '44 배설계(하행지 AQP1, ADH 무관)' },\n\n    /* ===== 순환 (10) ===== */\n    { id: 'C01', domain: '순환', premise: '동맥 혈압이 ↑하면',\n      steps: [s('대동맥궁·경동맥동 압력수용기 발화', 'up'), s('(연수 경유) 부교감 활성', 'up'), s('심박수', 'down')],\n      chain: '혈압↑ → 압력수용기 발화↑ → 연수 → 부교감↑·교감↓ → 심박↓·혈관확장 → 혈압↓',\n      src: 'Ch.42 순환 / 압력수용기 반사' },\n\n    { id: 'C02', domain: '순환', premise: '출혈로 혈압이 ↓하면',\n      steps: [s('압력수용기 발화', 'down'), s('교감신경 활성', 'up'), s('심박수', 'up')],\n      chain: '혈압↓ → 압력수용기 발화↓ → 교감↑ → 심박↑·혈관수축↑ → 혈압↑(보상)',\n      src: '기출 729(출혈→압수용체 흥분 감소)' },\n\n    { id: 'C03', domain: '순환', premise: '세동맥이 수축하면(혈관수축↑)', single: true,\n      steps: [s('총말초저항', 'up')],\n      chain: '혈관수축↑ → 총말초저항↑ → (혈압=심박출량×저항) 혈압↑',\n      src: '기출 728' },\n\n    { id: 'C04', domain: '순환', premise: '심박수가 ↑하면',\n      steps: [s('심박출량(cardiac output)', 'up'), s('동맥 혈압', 'up')],\n      chain: '심박↑ → 심박출량↑ → 혈압↑ (평균동맥압=심박출량×총말초저항)',\n      src: '기출 728' },\n\n    { id: 'C05', domain: '순환', premise: '출혈로 정맥환류(심장으로 돌아오는 혈액)가 ↓하면',\n      steps: [s('좌심실 이완기말 용적(EDV)', 'down'), s('1회 박출량(프랭크-스털링)', 'down'), s('심박출량', 'down')],\n      chain: '출혈 → 정맥환류↓ → EDV↓ → (프랭크-스털링) 박출량↓ → 심박출량↓',\n      src: '기출 726·729' },\n\n    { id: 'C06', domain: '순환', premise: '에피네프린이 ↑하면', single: true,\n      steps: [s('심박수', 'up')],\n      chain: '에피네프린↑ → 심장 β1 수용체 → 심박수·박출량↑',\n      src: '40동물 본문 / 9장(심장에서 심박↑)' },\n\n    { id: 'C07', domain: '순환', premise: '혈중 산소가 ↓하여 내피세포의 산화질소(NO) 분비가 ↑하면',\n      steps: [s('혈관 평활근 이완(혈관 확장)', 'up'), s('조직 혈류량', 'up')],\n      chain: 'O₂↓ → 내피 NO↑ → 평활근 이완 → 혈관확장 → 국소 혈류↑',\n      src: '40동물 본문(국소조절자 NO) / 9장' },\n\n    { id: 'C08', domain: '순환', premise: '운동 시 골격근으로 가는 혈류가 ↑하면', single: true,\n      steps: [s('소화기관·신장으로 가는 혈류', 'down')],\n      chain: '운동 → 혈류 재분배 → 골격근↑·내장/신장↓',\n      src: '기출 728(운동 중 혈류 재분배)' },\n\n    { id: 'C09', domain: '순환', premise: '안지오텐신 II가 ↑하여 알도스테론·ADH가 함께 ↑하면',\n      steps: [s('신장의 Na⁺·물 재흡수', 'up'), s('혈액량(혈압)', 'up')],\n      chain: 'Ang II↑ → 알도스테론↑·ADH↑ → Na⁺·물 재흡수↑ → 혈량↑·혈압↑',\n      src: '기출 731·784' },\n\n    { id: 'C10', domain: '순환', premise: '교감신경이 활성화되어도 모세혈관 자체에서', single: true, trap: true,\n      steps: [s('모세혈관 벽의 평활근 수축', 'same')],\n      chain: '모세혈관엔 평활근·교감 수용체 없음 → 직접 수축 불변(전·후 세동맥/괄약근이 혈류 조절)',\n      src: '기출 727(모세혈관 평활근 없음)' },\n\n    /* ===== 신경·시냅스 (6) ===== */\n    { id: 'N01', domain: '신경', premise: '자극으로 전압개폐성 Na⁺ 통로가 열리면',\n      steps: [s('Na⁺의 세포 안으로 유입', 'up'), s('막전위(탈분극: 더 양성 쪽으로)', 'up'), s('역치 도달 시 활동전위 발생 가능성', 'up')],\n      chain: '자극 → Na⁺ 통로 열림 → Na⁺ 유입↑ → 탈분극(막전위↑) → 역치 도달 → 활동전위 발생',\n      src: '기출 원광대38 / 동국대16' },\n\n    { id: 'N02', domain: '신경', premise: '활동전위 정점 이후 전압개폐성 K⁺ 통로가 열리면',\n      steps: [s('K⁺의 세포 밖으로 유출', 'up'), s('막전위(재분극: 다시 음성 쪽으로)', 'down')],\n      chain: '정점 후 → K⁺ 통로 열림 → K⁺ 유출↑ → 재분극(막전위↓)',\n      src: '기출 원광대38' },\n\n    { id: 'N03', domain: '신경', premise: '이미 역치를 넘은 자극의 세기를 더 ↑시키면', single: true, trap: true,\n      steps: [s('단일 활동전위의 진폭(크기)', 'same')],\n      chain: '활동전위는 실무율(전부 아니면 전무) → 자극이 더 커져도 진폭 불변(빈도만 증가)',\n      src: '신경 본문(실무율) / 동국대16' },\n\n    { id: 'N04', domain: '신경', premise: '흥분성 시냅스후전위(EPSP, 예: ACh)가 ↑하면',\n      steps: [s('시냅스후막의 탈분극', 'up'), s('활동전위 발생 가능성', 'up')],\n      chain: 'EPSP↑ → 탈분극↑ → 역치 도달 쉬움 → 활동전위 발생 가능성↑',\n      src: '동국대16(EPSP 흥분성)' },\n\n    { id: 'N05', domain: '신경', premise: '억제성 시냅스후전위(IPSP, 예: GABA)가 ↑하면',\n      steps: [s('막전위(과분극: 더 음성 쪽으로)', 'down'), s('활동전위 발생 가능성', 'down')],\n      chain: 'IPSP↑ → 과분극(막전위↓) → 역치 도달 어려움 → 활동전위 발생 가능성↓',\n      src: '동국대16(IPSP·GABA 억제성)' },\n\n    { id: 'N06', domain: '신경', premise: '역치에 도달하지 못하는 약한 자극(역치 이하)을 주면', single: true, trap: true,\n      steps: [s('활동전위 발생(휴지 상태 대비)', 'same')],\n      chain: '역치 이하 자극 → 탈분극 부족 → 활동전위 발생 안 함(실무율: 변화 없음)',\n      src: '동국대16(역치 이하→활동전위 없음)' },\n\n    /* ===== 호흡조절 (7) ===== */\n    { id: 'R01', domain: '호흡조절', premise: '세포 내 ATP 농도가 ↑하면',\n      steps: [s('PFK(인산과당인산화효소) 활성', 'down'), s('해당과정 속도', 'down')],\n      chain: 'ATP↑ → PFK 알로스테릭 부위에 결합·억제 → 해당과정↓',\n      src: '10장 세포호흡 본문(피드백 조절)' },\n\n    { id: 'R02', domain: '호흡조절', premise: '세포 내 AMP·ADP 농도가 ↑하면(에너지 부족)',\n      steps: [s('PFK 활성', 'up'), s('해당과정 속도', 'up')],\n      chain: 'AMP·ADP↑ → PFK 활성화 → 해당과정↑',\n      src: '10장 세포호흡 본문(피드백 조절)' },\n\n    { id: 'R03', domain: '호흡조절', premise: '시트르산(시트르산 회로 중간산물)이 ↑하면',\n      steps: [s('PFK 활성', 'down'), s('해당과정 속도', 'down')],\n      chain: '시트르산↑(연료 충분 신호) → PFK 억제 → 해당과정↓',\n      src: '10장 세포호흡(피드백 조절)' },\n\n    { id: 'R04', domain: '호흡조절', premise: '일산화탄소(CO)로 전자전달계가 차단되면', single: true,\n      steps: [s('해당과정 속도', 'up')],\n      chain: 'ETC 차단 → ATP↓ → PFK 억제 해제 → 해당과정↑(보상)',\n      src: '기출 100·92' },\n\n    { id: 'R05', domain: '호흡조절', premise: '무산소 조건이 되어 산소(O₂)가 ↓하면',\n      steps: [s('NAD⁺ 재생을 위한 발효(젖산 발효)', 'up'), s('(동일 ATP 필요 시) 포도당 소비 속도', 'up')],\n      chain: 'O₂↓ → 발효↑(NAD⁺ 재생) → 효율 낮아 포도당 소비↑(파스퇴르 효과)',\n      src: '10장 세포호흡(발효 시 당 소비↑)' },\n\n    { id: 'R06', domain: '호흡조절', premise: '해당과정에서 ATP/AMP 비율이 ↑하면', single: true,\n      steps: [s('PFK 활성', 'down')],\n      chain: 'ATP/AMP↑ → PFK 억제 → 해당과정↓',\n      src: '10장 세포호흡 본문' },\n\n    { id: 'R07', domain: '호흡조절', premise: '시안화물(ETC 억제제)을 처리해도 적혈구에서는', single: true, trap: true,\n      steps: [s('적혈구의 ATP 생성', 'same')],\n      chain: '적혈구엔 미토콘드리아·ETC 없음 → 시안화물 무관 → 해당과정으로 ATP 생성 불변',\n      src: '기출 93(적혈구 시안화물 영향 없음)' },\n\n    /* ===== 유전자조절 (6) ===== */\n    { id: 'G01', domain: '유전자조절', premise: '대장균 배지에 젖당(락토스)이 ↑하면(포도당 없음)',\n      steps: [s('lac 억제자(repressor)의 작동부위 결합', 'down'), s('lac 오페론 전사', 'up')],\n      chain: '젖당↑ → 알로락토스가 억제자 불활성화 → 작동부위 결합↓ → lac 전사↑',\n      src: '18장 / 기출 452·455' },\n\n    { id: 'G02', domain: '유전자조절', premise: '배지에 포도당이 ↑하면',\n      steps: [s('세포 내 cAMP 농도', 'down'), s('lac 오페론 전사(이화물질 억제)', 'down')],\n      chain: '포도당↑ → cAMP↓ → CAP(CRP) 비활성 → lac 전사↓',\n      src: '18장 / 기출 451·454·456' },\n\n    { id: 'G03', domain: '유전자조절', premise: '포도당이 ↓하면(고갈)', single: true,\n      steps: [s('세포 내 cAMP 농도', 'up')],\n      chain: '포도당↓ → cAMP↑ → CAP 활성 → (젖당 있으면) lac 전사↑',\n      src: '18장 / 기출 451' },\n\n    { id: 'G04', domain: '유전자조절', premise: '젖당이 없으면(락토스↓)', single: true,\n      steps: [s('lac 억제자의 작동부위 결합', 'up')],\n      chain: '젖당↓ → 억제자 활성 유지 → 작동부위 결합↑ → lac 전사 억제',\n      src: '기출 455·456' },\n\n    { id: 'G05', domain: '유전자조절', premise: '트립토판(Trp)이 ↑하면',\n      steps: [s('trp 억제자 활성(보조억제자 결합)', 'up'), s('trp 오페론 전사', 'down')],\n      chain: 'Trp↑ → 보조억제자로 작용 → 억제자 활성↑ → 작동부위 결합 → trp 전사↓',\n      src: '18장 / 기출 452·457·동국대4' },\n\n    { id: 'G06', domain: '유전자조절', premise: '트립토판(Trp)이 ↓하면(고갈)', single: true,\n      steps: [s('trp 오페론 전사', 'up')],\n      chain: 'Trp↓ → 억제자 비활성 → 작동부위 결합 못함 → trp 전사↑(효소 합성)',\n      src: '18장 / 동국대4·기출 457' }\n  ];\n\n  /* ---------------- 유틸 ---------------- */\n  function questionIdSet() {\n    var set = {};\n    for (var i = 0; i < QUESTIONS.length; i++) set[QUESTIONS[i].id] = true;\n    return { has: function (id) { return !!set[id]; } };\n  }\n  function byId(id) {\n    for (var i = 0; i < QUESTIONS.length; i++) if (QUESTIONS[i].id === id) return QUESTIONS[i];\n    return null;\n  }\n\n  // 문항 데이터 자기검증\n  function validateQuestions() {\n    var errors = [];\n    var seen = {};\n    for (var i = 0; i < QUESTIONS.length; i++) {\n      var q = QUESTIONS[i];\n      if (!q.id) errors.push('[' + i + '] id 없음');\n      if (seen[q.id]) errors.push(q.id + ' 중복 id');\n      seen[q.id] = true;\n      if (DOMAINS.indexOf(q.domain) < 0) errors.push(q.id + ' 알 수 없는 domain: ' + q.domain);\n      if (!q.premise) errors.push(q.id + ' premise 없음');\n      if (!q.chain) errors.push(q.id + ' chain(인과 사슬) 없음');\n      if (!q.src) errors.push(q.id + ' src(출처) 없음');\n      if (!Array.isArray(q.steps) || q.steps.length < 1) errors.push(q.id + ' steps 없음');\n      else {\n        for (var j = 0; j < q.steps.length; j++) {\n          var st = q.steps[j];\n          if (!st.node) errors.push(q.id + ' step' + j + ' node 없음');\n          if (VALID.indexOf(st.ans) < 0) errors.push(q.id + ' step' + j + ' 잘못된 ans: ' + st.ans);\n        }\n      }\n    }\n    return { ok: errors.length === 0, errors: errors, count: QUESTIONS.length };\n  }\n\n  // 채점: picks(배열)을 정답과 비교\n  function gradeQuestion(id, picks) {\n    var q = byId(id);\n    if (!q) return { correct: false, perStep: [] };\n    var perStep = [];\n    var allRight = true;\n    for (var i = 0; i < q.steps.length; i++) {\n      var ok = picks[i] === q.steps[i].ans;\n      perStep.push(ok);\n      if (!ok) allRight = false;\n    }\n    // 답을 다 채우지 않았으면 미완 → 정답 아님\n    if (picks.length < q.steps.length) allRight = false;\n    return { correct: allRight, perStep: perStep };\n  }\n\n  /* ---------------- 순서/필터 ---------------- */\n  function filteredIds(filter) {\n    var out = [];\n    for (var i = 0; i < QUESTIONS.length; i++) {\n      if (filter === 'all' || !filter || QUESTIONS[i].domain === filter) out.push(QUESTIONS[i].id);\n    }\n    return out;\n  }\n  function shuffleArr(arr, rng) {\n    rng = rng || Math.random;\n    var a = arr.slice();\n    for (var i = a.length - 1; i > 0; i--) {\n      var j = Math.floor(rng() * (i + 1));\n      var t = a[i]; a[i] = a[j]; a[j] = t;\n    }\n    return a;\n  }\n  function buildOrder(filter, shuffle, rng) {\n    var ids = filteredIds(filter);\n    return shuffle ? shuffleArr(ids, rng) : ids;\n  }\n\n  /* ---------------- 상태 ---------------- */\n  function initState(filter, shuffle, rng) {\n    filter = filter || 'all';\n    return {\n      v: SCHEMA,\n      order: buildOrder(filter, !!shuffle, rng),\n      filter: filter,\n      shuffle: !!shuffle,\n      results: {},\n      streak: 0,\n      best: 0\n    };\n  }\n\n  // 결과 기록 + streak/best 갱신\n  function recordResult(state, id, picks) {\n    var g = gradeQuestion(id, picks);\n    state.results[id] = { picks: picks.slice(), correct: g.correct };\n    if (g.correct) {\n      state.streak = (state.streak | 0) + 1;\n      if (state.streak > (state.best | 0)) state.best = state.streak;\n    } else {\n      state.streak = 0;\n    }\n    return state;\n  }\n\n  function computeStats(state) {\n    var answered = 0, correctCount = 0, stepHits = 0, stepTotal = 0;\n    for (var id in state.results) {\n      if (!state.results.hasOwnProperty(id)) continue;\n      var r = state.results[id];\n      answered++;\n      if (r.correct) correctCount++;\n      var q = byId(id);\n      if (q) {\n        for (var i = 0; i < q.steps.length; i++) {\n          stepTotal++;\n          if (r.picks[i] === q.steps[i].ans) stepHits++;\n        }\n      }\n    }\n    return {\n      answered: answered,\n      total: state.order.length,\n      correctCount: correctCount,\n      accuracy: answered ? Math.round((correctCount / answered) * 100) : 0,\n      stepHits: stepHits,\n      stepTotal: stepTotal,\n      stepAccuracy: stepTotal ? Math.round((stepHits / stepTotal) * 100) : 0,\n      streak: state.streak | 0,\n      best: state.best | 0\n    };\n  }\n\n  // order에서 아직 결과가 없는 첫 위치\n  function firstUnanswered(state) {\n    for (var i = 0; i < state.order.length; i++) {\n      if (!state.results[state.order[i]]) return i;\n    }\n    return state.order.length; // 전부 완료\n  }\n\n  /* ---------------- 직렬화 + 손상 거부 ---------------- */\n  function serialize(state) {\n    return JSON.stringify({\n      v: SCHEMA,\n      order: state.order,\n      filter: state.filter,\n      shuffle: !!state.shuffle,\n      results: state.results,\n      streak: state.streak | 0,\n      best: state.best | 0\n    });\n  }\n  function deserialize(raw) {\n    if (!raw || typeof raw !== 'string') return null;\n    var obj;\n    try { obj = JSON.parse(raw); } catch (e) { return null; }\n    if (!obj || typeof obj !== 'object') return null;\n    if (obj.v !== SCHEMA) return null;\n    if (!Array.isArray(obj.order)) return null;\n    var ids = questionIdSet();\n    for (var i = 0; i < obj.order.length; i++) if (!ids.has(obj.order[i])) return null;\n    if (typeof obj.results !== 'object' || obj.results === null) return null;\n    for (var k in obj.results) {\n      if (!obj.results.hasOwnProperty(k)) continue;\n      if (!ids.has(k)) return null;\n      var r = obj.results[k];\n      if (!r || !Array.isArray(r.picks) || typeof r.correct !== 'boolean') return null;\n      for (var j = 0; j < r.picks.length; j++) if (VALID.indexOf(r.picks[j]) < 0) return null;\n    }\n    return {\n      v: SCHEMA,\n      order: obj.order.slice(),\n      filter: typeof obj.filter === 'string' ? obj.filter : 'all',\n      shuffle: !!obj.shuffle,\n      results: obj.results,\n      streak: obj.streak | 0,\n      best: obj.best | 0\n    };\n  }\n\n  /* ---------------- 이중 저장(localStorage + window.storage) ---------------- */\n  function _ls() {\n    try {\n      if (typeof localStorage !== 'undefined' && localStorage) return localStorage;\n      if (typeof globalThis !== 'undefined' && globalThis.localStorage) return globalThis.localStorage;\n    } catch (e) {}\n    return null;\n  }\n  function _ws() {\n    try {\n      var w = (typeof window !== 'undefined') ? window\n            : (typeof globalThis !== 'undefined' ? globalThis.window : null);\n      if (w && w.storage) return w.storage;\n    } catch (e) {}\n    return null;\n  }\n  function saveState(state) {\n    var str = serialize(state);\n    var ls = _ls();\n    if (ls) { try { ls.setItem(APP_KEY, str); } catch (e) {} }\n    var ws = _ws();\n    if (ws && typeof ws.set === 'function') {\n      try {\n        var r = ws.set(APP_KEY, str);\n        if (r && typeof r.then === 'function') r.then(function () {}, function () {});\n      } catch (e) {}\n    }\n    return str;\n  }\n  function loadState() {\n    var ls = _ls();\n    var raw = null;\n    if (ls) { try { raw = ls.getItem(APP_KEY); } catch (e) {} }\n    return deserialize(raw);\n  }\n  function clearState() {\n    var ls = _ls();\n    if (ls) { try { ls.removeItem(APP_KEY); } catch (e) {} }\n    var ws = _ws();\n    if (ws && typeof ws.delete === 'function') {\n      try {\n        var r = ws.delete(APP_KEY);\n        if (r && typeof r.then === 'function') r.then(function () {}, function () {});\n      } catch (e) {}\n    }\n  }\n\n  return {\n    SCHEMA: SCHEMA,\n    APP_KEY: APP_KEY,\n    VALID: VALID,\n    DOMAINS: DOMAINS,\n    QUESTIONS: QUESTIONS,\n    byId: byId,\n    validateQuestions: validateQuestions,\n    gradeQuestion: gradeQuestion,\n    filteredIds: filteredIds,\n    buildOrder: buildOrder,\n    shuffleArr: shuffleArr,\n    initState: initState,\n    recordResult: recordResult,\n    computeStats: computeStats,\n    firstUnanswered: firstUnanswered,\n    serialize: serialize,\n    deserialize: deserialize,\n    saveState: saveState,\n    loadState: loadState,\n    clearState: clearState\n  };\n});\n\n<\/script>\n<script>\n/* ============================================================\n * UI 레이어 (DOM). window.DEP(로직)을 소비.\n * 단계별 누적 공개 → 답 → 인과 사슬 한 줄. 이중 저장.\n * Node --check 통과를 위해 document 없으면 즉시 종료(런타임만 DOM 사용).\n * ============================================================ */\n(function () {\n  'use strict';\n  if (typeof document === 'undefined' || typeof window === 'undefined') return;\n\n  var DEP = window.DEP;\n  if (!DEP) return;\n\n  /* ---------- 표시용 상수 ---------- */\n  var DOM_STYLE = {\n    '내분비':   ['var(--teal-soft)', 'var(--teal-d)'],\n    '삼투조절': ['var(--vio-soft)',  'var(--vio)'],\n    '순환':     ['var(--no-soft)',   'var(--no)'],\n    '신경':     ['var(--amb-soft)',  'var(--amb)'],\n    '호흡조절': ['var(--ok-soft)',   'var(--ok)'],\n    '유전자조절': ['var(--line2)',   'var(--ink2)']\n  };\n  var OPT = [\n    { val: 'up',   g: '↑',   l: '증가' },\n    { val: 'down', g: '↓',   l: '감소' },\n    { val: 'same', g: '불변', l: '변화 없음' }\n  ];\n\n  /* ---------- 모듈 상태 ---------- */\n  var state = null;          // 로직 상태(order/results/streak/best/filter/shuffle)\n  var ui = { viewIdx: 0, picks: [], qid: null };\n  var app = null;\n\n  // 도메인별 문항 수 (1회 계산)\n  var DOM_COUNT = {};\n  DEP.DOMAINS.forEach(function (d) { DOM_COUNT[d] = DEP.filteredIds(d).length; });\n  var TOTAL_ALL = DEP.QUESTIONS.length;\n\n  /* ---------- 유틸 ---------- */\n  function esc(s) {\n    return String(s)\n      .replace(/&/g, '&amp;').replace(/<\\/g, '&lt;')\n      .replace(/>/g, '&gt;').replace(/\"/g, '&quot;');\n  }\n  function arrowize(s) {\n    var e = esc(s);\n    e = e.split('↑').join('<span class=\"ar up\">↑<\\/span>');\n    e = e.split('↓').join('<span class=\"ar dn\">↓<\\/span>');\n    return e;\n  }\n  function syncView() {\n    if (ui.viewIdx < 0) ui.viewIdx = 0;\n    if (ui.viewIdx >= state.order.length) { ui.qid = null; ui.picks = []; return; }\n    ui.qid = state.order[ui.viewIdx];\n    var r = state.results[ui.qid];\n    ui.picks = r ? r.picks.slice() : [];\n  }\n  // 현재 필터(order) 한정 진행/정답 통계\n  function orderStats() {\n    var inOrder = 0, oa = 0, oc = 0, wc = 0, sh = 0, stt = 0;\n    state.order.forEach(function (id) {\n      var r = state.results[id];\n      if (!r) return;\n      inOrder++; oa++;\n      if (r.correct) oc++; else wc++;\n      var q = DEP.byId(id);\n      if (q) q.steps.forEach(function (st, k) { stt++; if (r.picks[k] === st.ans) sh++; });\n    });\n    return {\n      inOrder: inOrder, answered: oa, correct: oc, wrong: wc,\n      total: state.order.length,\n      acc: oa ? Math.round(oc / oa * 100) : 0,\n      stepAcc: stt ? Math.round(sh / stt * 100) : 0\n    };\n  }\n\n  /* ---------- 부분 렌더 ---------- */\n  function headerHTML(s) {\n    var bar = s.total ? Math.round(s.inOrder / s.total * 100) : 0;\n    return '<header><div class=\"htop\">'\n      + '<div class=\"brand\"><h1>하류 효과 예측<\\/h1>'\n      + '<p>한 변화 → 하류 방향 예측 · ↑ · ↓ · 불변<\\/p><\\/div>'\n      + '<div class=\"acc\"><b>' + s.acc + '%<\\/b><span>정답률<\\/span><\\/div>'\n      + '<\\/div>'\n      + '<div class=\"bar\"><i style=\"width:' + bar + '%\"><\\/i><\\/div>'\n      + '<div class=\"cnt\">' + s.inOrder + ' / ' + s.total + '<\\/div>'\n      + '<\\/header>';\n  }\n  function chip(val, label, n) {\n    return '<button class=\"chip\" data-act=\"filter\" data-val=\"' + esc(val) + '\"'\n      + ' aria-pressed=\"' + (state.filter === val ? 'true' : 'false') + '\">'\n      + esc(label) + '<span class=\"n\">' + n + '<\\/span><\\/button>';\n  }\n  function chipsHTML() {\n    var out = '<div class=\"chips\">' + chip('all', '전체', TOTAL_ALL);\n    DEP.DOMAINS.forEach(function (d) { out += chip(d, d, DOM_COUNT[d]); });\n    return out + '<\\/div>';\n  }\n  function optsActive() {\n    var b = '<div class=\"opts\">';\n    OPT.forEach(function (o) {\n      b += '<button class=\"opt\" data-act=\"pick\" data-val=\"' + o.val + '\">'\n        + '<span class=\"g\">' + o.g + '<\\/span><span class=\"l\">' + o.l + '<\\/span><\\/button>';\n    });\n    return b + '<\\/div>';\n  }\n  function optsResolved(pick, ans) {\n    var b = '<div class=\"opts\">';\n    OPT.forEach(function (o) {\n      var cls = 'opt', mk = '';\n      if (o.val === pick) {\n        cls += (pick === ans) ? ' pick right' : ' pick wrong';\n        mk = (pick === ans) ? '정답' : '내 선택';\n      }\n      if (o.val === ans && pick !== ans) { cls += ' solution'; mk = '정답'; }\n      if (o.val !== pick && o.val !== ans) { cls += ' dim'; }\n      b += '<button class=\"' + cls + '\" disabled>'\n        + '<span class=\"g\">' + o.g + '<\\/span><span class=\"l\">' + o.l + '<\\/span>'\n        + (mk ? '<span class=\"mk\">' + mk + '<\\/span>' : '') + '<\\/button>';\n    });\n    return b + '<\\/div>';\n  }\n  function stepsHTML(q, picks, complete) {\n    var html = '<div class=\"steps\">';\n    for (var j = 0; j < q.steps.length; j++) {\n      var st = q.steps[j];\n      if (j < picks.length) {\n        var right = picks[j] === st.ans;\n        html += '<div class=\"step done ' + (right ? 'right' : 'wrong') + '\">'\n          + '<div class=\"srow\"><div class=\"num\">' + (j + 1) + '<\\/div>'\n          + '<div class=\"node\">' + esc(st.node) + '<\\/div><\\/div>'\n          + optsResolved(picks[j], st.ans) + '<\\/div>';\n      } else if (j === picks.length && !complete) {\n        html += '<div class=\"step active\">'\n          + '<div class=\"srow\"><div class=\"num\">' + (j + 1) + '<\\/div>'\n          + '<div class=\"node\">' + esc(st.node) + '<\\/div><\\/div>'\n          + optsActive() + '<\\/div>';\n      } else {\n        html += '<div class=\"step locked\">'\n          + '<div class=\"srow\"><div class=\"num\">' + (j + 1) + '<\\/div>'\n          + '<div class=\"lockmsg\">🔒 이전 단계를 먼저 예측<\\/div><\\/div><\\/div>';\n      }\n    }\n    return html + '<\\/div>';\n  }\n  function questionHTML() {\n    var q = DEP.byId(ui.qid);\n    var picks = ui.picks;\n    var complete = picks.length >= q.steps.length;\n    var style = DOM_STYLE[q.domain] || ['var(--line2)', 'var(--ink2)'];\n    var chainBadge = (q.steps.length >= 2)\n      ? '<span class=\"badge chain\">연쇄 ' + q.steps.length + '단계<\\/span>'\n      : '<span class=\"badge\">단일 단계<\\/span>';\n\n    var html = '<div class=\"card\">'\n      + '<div class=\"ctag\">'\n      + '<span class=\"dot\" style=\"background:' + style[0] + ';color:' + style[1] + '\">' + esc(q.domain) + '<\\/span>'\n      + chainBadge + '<\\/div>'\n      + '<div class=\"premise\">' + arrowize(q.premise)\n      + ' <span class=\"q\">— 방향은?<\\/span><\\/div>'\n      + stepsHTML(q, picks, complete);\n\n    if (complete) {\n      var r = state.results[ui.qid];\n      var ok = r && r.correct;\n      html += '<div class=\"reveal\">'\n        + '<div class=\"' + (ok ? 'outcome right' : 'outcome wrong') + '\">'\n        + (ok ? '✓ 정답 · 모든 단계 통과' : '✗ 오답 · 사슬을 확인') + '<\\/div>'\n        + '<div class=\"lab\">인과 사슬<\\/div>'\n        + '<div class=\"chain\">' + esc(q.chain) + '<\\/div>'\n        + '<div class=\"src\">' + esc(q.src) + '<\\/div>'\n        + '<\\/div>';\n    }\n\n    var last = ui.viewIdx >= state.order.length - 1;\n    html += '<div class=\"nav\">'\n      + '<button class=\"btn prev\" data-act=\"prev\"' + (ui.viewIdx <= 0 ? ' disabled' : '') + '>‹ 이전<\\/button>'\n      + '<button class=\"btn primary\" data-act=\"next\"' + (complete ? '' : ' disabled') + '>'\n      + (last ? '결과 보기' : '다음 문항 ›') + '<\\/button>'\n      + '<\\/div>';\n\n    html += '<div class=\"foot\">'\n      + '<div class=\"streak\">현재 연속 <b>' + (state.streak | 0) + '<\\/b> · 최고 <b>' + (state.best | 0) + '<\\/b><\\/div>'\n      + '<div class=\"fbtns\">'\n      + '<button class=\"tool\" data-act=\"shuffle\" aria-pressed=\"' + (state.shuffle ? 'true' : 'false') + '\">🔀 셔플<\\/button>'\n      + '<button class=\"tool\" data-act=\"restart\">↺ 처음부터<\\/button>'\n      + '<\\/div><\\/div>';\n\n    return html + '<\\/div>';\n  }\n  function kpi(b, s) { return '<div class=\"kpi\"><b>' + b + '<\\/b><span>' + s + '<\\/span><\\/div>'; }\n  function completionHTML(s) {\n    var label = state.filter === 'all' ? '전체' : state.filter;\n    var head = s.acc >= 80 ? '🎉' : '💪';\n    var html = '<div class=\"card done-card\">'\n      + '<div class=\"em\">' + head + '<\\/div>'\n      + '<h2>학습 완료<\\/h2>'\n      + '<div class=\"sub\">' + esc(label) + ' · ' + s.total + '문항<\\/div>'\n      + '<div class=\"kgrid\">'\n      + kpi(s.correct + '/' + s.total, '문항 정답')\n      + kpi(s.acc + '%', '정답률')\n      + kpi(s.stepAcc + '%', '단계 정답')\n      + '<\\/div>'\n      + '<div class=\"kgrid\">'\n      + kpi(state.best | 0, '최고 연속')\n      + kpi(s.wrong, '오답 수')\n      + kpi(s.total, '총 문항')\n      + '<\\/div>'\n      + '<div class=\"nav\">';\n    if (s.wrong > 0) {\n      html += '<button class=\"btn primary\" data-act=\"retry\">오답만 다시 (' + s.wrong + ')<\\/button>'\n        + '<button class=\"btn\" data-act=\"restart\">처음부터<\\/button>';\n    } else {\n      html += '<button class=\"btn primary\" data-act=\"restart\">처음부터<\\/button>';\n    }\n    return html + '<\\/div><\\/div>';\n  }\n\n  function render() {\n    var s = orderStats();\n    var body;\n    if (state.order.length === 0) {\n      body = '<div class=\"card done-card\"><div class=\"em\">📭<\\/div><h2>문항이 없습니다<\\/h2>'\n        + '<div class=\"sub\">다른 영역을 선택하세요<\\/div><\\/div>';\n    } else if (ui.viewIdx >= state.order.length) {\n      body = completionHTML(s);\n    } else {\n      body = questionHTML();\n    }\n    app.innerHTML = '<div class=\"wrap\">' + headerHTML(s) + chipsHTML() + body + '<\\/div>';\n  }\n\n  /* ---------- 액션 ---------- */\n  function pickAnswer(val) {\n    if (ui.viewIdx >= state.order.length) return;\n    var q = DEP.byId(ui.qid);\n    if (!q || ui.picks.length >= q.steps.length) return;   // 이미 완료/리뷰 → 무시\n    ui.picks.push(val);\n    if (ui.picks.length === q.steps.length) {\n      DEP.recordResult(state, ui.qid, ui.picks);            // streak/best 갱신 + 결과 기록\n      DEP.saveState(state);                                 // 이중 저장\n    }\n    render();\n  }\n  function next() {\n    if (ui.viewIdx >= state.order.length) return;\n    if (!state.results[ui.qid]) return;                     // 미완 → 차단\n    ui.viewIdx++;\n    syncView();\n    render();\n  }\n  function prev() {\n    if (ui.viewIdx <= 0) return;\n    ui.viewIdx--;\n    syncView();\n    render();\n  }\n  function setFilter(f) {\n    state.order = DEP.buildOrder(f, state.shuffle);\n    state.filter = f;\n    ui.viewIdx = DEP.firstUnanswered(state);\n    syncView();\n    DEP.saveState(state);\n    render();\n  }\n  function toggleShuffle() {\n    state.shuffle = !state.shuffle;\n    state.order = DEP.buildOrder(state.filter, state.shuffle);\n    ui.viewIdx = DEP.firstUnanswered(state);\n    syncView();\n    DEP.saveState(state);\n    render();\n  }\n  function restart() {\n    var f = state.filter, sh = state.shuffle;\n    DEP.clearState();\n    state = DEP.initState(f, sh);\n    ui.viewIdx = 0;\n    syncView();\n    DEP.saveState(state);\n    render();\n  }\n  function retryWrong() {\n    var wrong = [];\n    state.order.forEach(function (id) {\n      var r = state.results[id];\n      if (r && !r.correct) wrong.push(id);\n    });\n    if (!wrong.length) return;\n    wrong.forEach(function (id) { delete state.results[id]; });\n    state.order = state.shuffle ? DEP.shuffleArr(wrong) : wrong;\n    state.streak = 0;\n    ui.viewIdx = 0;\n    syncView();\n    DEP.saveState(state);\n    render();\n  }\n\n  /* ---------- 부팅 ---------- */\n  function boot() {\n    app = document.getElementById('app');\n    if (!app) { app = document.createElement('div'); document.body.appendChild(app); }\n\n    state = DEP.loadState() || DEP.initState('all', false);\n    ui.viewIdx = DEP.firstUnanswered(state);\n    syncView();\n\n    // 단일 위임 리스너 (재렌더에도 유지)\n    app.addEventListener('click', function (e) {\n      var t = e.target.closest && e.target.closest('[data-act]');\n      if (!t) return;\n      var act = t.getAttribute('data-act');\n      if (act === 'pick') pickAnswer(t.getAttribute('data-val'));\n      else if (act === 'next') next();\n      else if (act === 'prev') prev();\n      else if (act === 'filter') setFilter(t.getAttribute('data-val'));\n      else if (act === 'shuffle') toggleShuffle();\n      else if (act === 'restart') restart();\n      else if (act === 'retry') retryWrong();\n    });\n\n    // window.storage 비동기 하이드레이션(있고 localStorage가 비었을 때만 보강)\n    try {\n      var ws = window.storage;\n      if (ws && typeof ws.get === 'function') {\n        var p = ws.get(DEP.APP_KEY);\n        if (p && typeof p.then === 'function') {\n          p.then(function (rec) {\n            if (!rec) return;\n            var raw = (typeof rec === 'string') ? rec : (rec && rec.value);\n            var loaded = DEP.deserialize(raw);\n            if (!loaded) return;\n            var cur = DEP.computeStats(state).answered;\n            var inc = DEP.computeStats(loaded).answered;\n            if (inc > cur) {                 // 더 진행된 기록이면 채택\n              state = loaded;\n              ui.viewIdx = DEP.firstUnanswered(state);\n              syncView();\n              render();\n            }\n          }, function () {});\n        }\n      }\n    } catch (e) {}\n\n    render();\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', boot);\n  } else {\n    boot();\n  }\n})();\n\n<\/script>\n<\/body>\n<\/html>\n"</script>
<script type="application/json" id="ann8">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<meta name=\"theme-color\" content=\"#0F766E\">\n<title>캠벨 OX 즉답<\/title>\n<style>\n:root{--ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;--bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;--vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;--ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;--sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace}\n*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:var(--sans);color:var(--ink);\n  background:radial-gradient(120% 80% at 50% -10%, #F2F7F5 0%, var(--bg) 52%, #E2EAE7 100%);\n  min-height:100vh;min-height:100dvh;line-height:1.5;\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\n}\n.wrap{max-width:760px;margin:0 auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom));min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}\nbutton{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}\n.hide{display:none!important}\n\n/* ---- 상단 식별 ---- */\n.brand{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}\n.brand h1{font-size:17px;font-weight:800;letter-spacing:-.02em;margin:0;color:var(--ink)}\n.brand .tag{font-size:11.5px;font-weight:600;color:var(--teal);background:var(--teal-soft);border:1px solid var(--line);padding:3px 9px;border-radius:999px;white-space:nowrap}\n\n/* ---- 카드 ---- */\n.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(16,48,46,.04),0 10px 26px -16px rgba(16,48,46,.18)}\n\n/* ===== HOME ===== */\n#home{flex:1;display:flex;flex-direction:column;gap:14px}\n.hero{padding:22px 20px}\n.hero .klabel{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}\n.hero .htitle{font-size:27px;font-weight:800;letter-spacing:-.03em;margin:6px 0 4px;line-height:1.15}\n.hero .hsub{font-size:14px;color:var(--ink2);margin:0}\n.hero .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}\n.chip{font-size:12px;font-weight:600;color:var(--ink2);background:var(--line2);border-radius:999px;padding:5px 10px}\n.chip b{color:var(--ink);font-weight:800}\n\n.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}\n.stat{padding:14px 14px}\n.stat .v{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--teal-d);font-variant-numeric:tabular-nums}\n.stat .l{font-size:12px;color:var(--ink3);font-weight:600;margin-top:2px}\n\n.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border-radius:14px;font-weight:800;font-size:16px;padding:16px;border:1px solid transparent;transition:transform .08s ease,filter .15s ease}\n.btn:active{transform:translateY(1px)}\n.btn.primary{background:var(--teal);color:#fff;box-shadow:0 8px 20px -10px rgba(15,118,110,.7)}\n.btn.primary:hover{filter:brightness(1.05)}\n.btn.ghost{background:var(--card);color:var(--ink);border-color:var(--line)}\n.btn.ghost:hover{background:var(--teal-soft)}\n.btn.small{font-size:14px;padding:13px}\n.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n\n.resume{padding:14px 16px;display:flex;flex-direction:column;gap:10px;border:1px dashed var(--line);background:var(--teal-soft)}\n.resume .rtxt{font-size:13.5px;color:var(--ink2)}\n.resume .rtxt b{color:var(--ink)}\n\n.howto{font-size:12.5px;color:var(--ink3);text-align:center;line-height:1.7;margin-top:auto;padding-top:8px}\n.howto kbd{font-family:var(--mono);font-size:11px;background:var(--card);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--ink2)}\n\n/* ===== PLAY ===== */\n#play{flex:1;display:flex;flex-direction:column}\n.hud{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}\n.hud .pill{font-size:12.5px;font-weight:700;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-variant-numeric:tabular-nums}\n.hud .combo{color:var(--amb);background:var(--amb-soft);border-color:var(--line);transition:transform .12s ease}\n.hud .combo.dim{color:var(--ink3);background:var(--line2)}\n.hud .combo.pulse{transform:scale(1.12)}\n.hud .score{color:var(--teal-d);background:var(--teal-soft)}\n\n.timerbar{height:8px;border-radius:999px;background:var(--line2);overflow:hidden;margin-bottom:14px}\n.timerbar > i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--teal),var(--teal-d));border-radius:999px}\n.timerbar.warn > i{background:linear-gradient(90deg,#D89B2E,var(--amb))}\n.timerbar.danger > i{background:linear-gradient(90deg,#D85C4E,var(--no))}\n\n.stage{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}\n.qcard{padding:26px 22px;position:relative;transition:background .12s ease,border-color .12s ease;min-height:190px;display:flex;flex-direction:column;justify-content:center}\n.qcard.flash-ok{background:var(--ok-soft);border-color:#BFE3D2}\n.qcard.flash-no{background:var(--no-soft);border-color:#F2C9C4}\n.qcat{font-size:11.5px;font-weight:700;letter-spacing:.04em;color:var(--ink3);text-transform:uppercase;margin-bottom:10px}\n.qtext{font-size:21px;line-height:1.45;font-weight:600;letter-spacing:-.01em;color:var(--ink);word-break:keep-all}\n@media (min-width:560px){.qtext{font-size:23px}}\n\n.verdict{margin-top:16px;border-top:1px solid var(--line2);padding-top:13px;display:none}\n.verdict.show{display:block;animation:fade .18s ease both}\n.verdict .vhead{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px}\n.verdict .vhead.ok{color:var(--ok)}\n.verdict .vhead.no{color:var(--no)}\n.verdict .vbadge{font-size:12px;font-weight:800;color:#fff;border-radius:6px;padding:2px 8px;letter-spacing:.02em}\n.verdict .vbadge.ok{background:var(--ok)}\n.verdict .vbadge.no{background:var(--no)}\n.verdict .vfix{font-size:14px;color:var(--ink2);margin-top:7px;line-height:1.5}\n.verdict .vnext{font-size:11.5px;color:var(--ink3);margin-top:9px}\n@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}\n\n.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}\n.ans{position:relative;border-radius:16px;padding:18px 12px 14px;font-weight:800;border:1.5px solid;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .07s ease,filter .12s ease;user-select:none}\n.ans:active{transform:translateY(1px) scale(.99)}\n.ans .glyph{font-size:30px;line-height:1}\n.ans .lab{font-size:15px}\n.ans .key{font-size:11px;font-weight:700;color:var(--ink3)}\n.ans.o{background:var(--teal-soft);border-color:#BFE0DB;color:var(--teal-d)}\n.ans.o:hover{filter:brightness(.98)}\n.ans.x{background:var(--amb-soft);border-color:#EBD7AC;color:var(--amb)}\n.ans.x:hover{filter:brightness(.99)}\n.ans:disabled{opacity:.45;cursor:default}\n.ans:focus-visible{outline:3px solid var(--teal);outline-offset:2px}\n\n/* ===== SUMMARY ===== */\n#summary{flex:1;display:flex;flex-direction:column;gap:14px}\n.sumhead{padding:22px 20px;text-align:center}\n.sumhead .sklabel{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}\n.sumhead .sscore{font-size:42px;font-weight:800;letter-spacing:-.03em;color:var(--teal-d);font-variant-numeric:tabular-nums;line-height:1.1;margin:4px 0}\n.sumhead .sline{font-size:14px;color:var(--ink2)}\n.sumhead .snew{display:inline-block;margin-top:8px;font-size:12px;font-weight:800;color:#fff;background:var(--amb);border-radius:999px;padding:3px 11px}\n.sumgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}\n.sg{padding:13px 10px;text-align:center}\n.sg .v{font-size:21px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}\n.sg .l{font-size:11.5px;color:var(--ink3);font-weight:600;margin-top:2px}\n\n.wronglist{padding:6px 6px}\n.wronglist .wtitle{font-size:13px;font-weight:800;color:var(--ink2);padding:10px 12px 6px}\n.witem{padding:11px 12px;border-top:1px solid var(--line2)}\n.witem:first-of-type{border-top:0}\n.witem .wq{font-size:14px;color:var(--ink);font-weight:600;line-height:1.45;word-break:keep-all}\n.witem .wq .wans{font-size:11px;font-weight:800;border-radius:5px;padding:1px 7px;margin-right:7px;vertical-align:middle;color:#fff;background:var(--ink2)}\n.witem .wfix{font-size:13px;color:var(--ink2);margin-top:5px;line-height:1.45}\n.allclear{padding:18px;text-align:center;color:var(--ok);font-weight:700;font-size:14px;background:var(--ok-soft);border-color:#BFE3D2}\n\n.footnote{font-size:11px;color:var(--ink3);text-align:center;line-height:1.6;padding:4px 0 2px}\n\n@media (prefers-reduced-motion:reduce){\n  *{transition:none!important;animation:none!important}\n}\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n  <div class=\"brand\">\n    <h1>캠벨 OX 즉답<\/h1>\n    <span class=\"tag\">7초 안에 O · X<\/span>\n  <\/div>\n\n  <!-- ===== HOME ===== -->\n  <section id=\"home\">\n    <div class=\"card hero\">\n      <div class=\"klabel\">RAPID RECALL<\/div>\n      <div class=\"htitle\">진술이 옳은지<br>7초 안에 판단하기<\/div>\n      <p class=\"hsub\">전 범위 단문 진술이 하나씩 뜹니다. 절반은 참, 절반은 거짓(흔한 오개념)이에요. 한 라운드는 20문제.<\/p>\n      <div class=\"meta\" id=\"homeMeta\"><\/div>\n    <\/div>\n\n    <div class=\"stats\">\n      <div class=\"card stat\"><div class=\"v\" id=\"hsCombo\">0<\/div><div class=\"l\">최고 콤보<\/div><\/div>\n      <div class=\"card stat\"><div class=\"v\" id=\"hsScore\">0<\/div><div class=\"l\">최고 점수<\/div><\/div>\n      <div class=\"card stat\"><div class=\"v\" id=\"hsRounds\">0<\/div><div class=\"l\">완료한 라운드<\/div><\/div>\n      <div class=\"card stat\"><div class=\"v\" id=\"hsAcc\">—<\/div><div class=\"l\">누적 정답률<\/div><\/div>\n    <\/div>\n\n    <div class=\"card resume hide\" id=\"resumeBox\">\n      <div class=\"rtxt\">진행 중인 라운드가 있어요. <b id=\"resumeAt\"><\/b><\/div>\n      <div class=\"btnrow\">\n        <button class=\"btn primary small\" id=\"btnResume\">이어서 풀기<\/button>\n        <button class=\"btn ghost small\" id=\"btnDiscard\">새로 시작<\/button>\n      <\/div>\n    <\/div>\n\n    <button class=\"btn primary\" id=\"btnStart\">라운드 시작<\/button>\n\n    <div class=\"howto\">\n      답하기 — 화면의 <b>옳음 / 거짓<\/b> 버튼, 또는 키보드<br>\n      <kbd>O<\/kbd> <kbd>←<\/kbd> 옳음 &nbsp;·&nbsp; <kbd>X<\/kbd> <kbd>→<\/kbd> 거짓\n    <\/div>\n  <\/section>\n\n  <!-- ===== PLAY ===== -->\n  <section id=\"play\" class=\"hide\">\n    <div class=\"hud\">\n      <span class=\"pill\" id=\"hudCount\">1 / 20<\/span>\n      <span class=\"pill combo dim\" id=\"hudCombo\">콤보 0<\/span>\n      <span class=\"pill score\" id=\"hudScore\">0점<\/span>\n    <\/div>\n    <div class=\"timerbar\" id=\"timerBar\"><i id=\"timerFill\"><\/i><\/div>\n\n    <div class=\"stage\">\n      <div class=\"card qcard\" id=\"qcard\" aria-live=\"polite\">\n        <div class=\"qcat\" id=\"qcat\"><\/div>\n        <div class=\"qtext\" id=\"qtext\"><\/div>\n        <div class=\"verdict\" id=\"verdict\">\n          <div class=\"vhead\" id=\"vhead\"><\/div>\n          <div class=\"vfix\" id=\"vfix\"><\/div>\n          <div class=\"vnext\">아무 키나 누르면 다음 →<\/div>\n        <\/div>\n      <\/div>\n\n      <div class=\"answers\" id=\"answers\">\n        <button class=\"ans o\" id=\"ansO\" aria-label=\"옳음\">\n          <span class=\"glyph\">O<\/span><span class=\"lab\">옳음<\/span><span class=\"key\">O · ←<\/span>\n        <\/button>\n        <button class=\"ans x\" id=\"ansX\" aria-label=\"거짓\">\n          <span class=\"glyph\">X<\/span><span class=\"lab\">거짓<\/span><span class=\"key\">X · →<\/span>\n        <\/button>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ===== SUMMARY ===== -->\n  <section id=\"summary\" class=\"hide\">\n    <div class=\"card sumhead\">\n      <div class=\"sklabel\" id=\"sumKind\">ROUND COMPLETE<\/div>\n      <div class=\"sscore\" id=\"sumScore\">0<\/div>\n      <div class=\"sline\" id=\"sumLine\"><\/div>\n      <div id=\"sumNew\"><\/div>\n    <\/div>\n    <div class=\"sumgrid\">\n      <div class=\"card sg\"><div class=\"v\" id=\"sgAcc\">0/20<\/div><div class=\"l\">정답<\/div><\/div>\n      <div class=\"card sg\"><div class=\"v\" id=\"sgCombo\">0<\/div><div class=\"l\">최고 콤보<\/div><\/div>\n      <div class=\"card sg\"><div class=\"v\" id=\"sgAvg\">0.0s<\/div><div class=\"l\">평균 응답<\/div><\/div>\n    <\/div>\n\n    <div id=\"wrongWrap\"><\/div>\n\n    <button class=\"btn primary\" id=\"btnRetry\">오답 다시 풀기<\/button>\n    <div class=\"btnrow\">\n      <button class=\"btn ghost\" id=\"btnAgain\">새 라운드<\/button>\n      <button class=\"btn ghost\" id=\"btnHome\">홈으로<\/button>\n    <\/div>\n    <div class=\"footnote\">내용은 캠벨 본문·기출·지엽 노트에 근거. 진행도는 자동 저장돼요.<\/div>\n  <\/section>\n<\/div>\n\n<!-- 진술 풀 -->\n<script>\n/* ===========================================================================\n * 캠벨 OX 즉답 — 진술 풀  (프로젝트 캠벨 본문/기출/지엽 노트 근거)\n *   t : 화면에 뜨는 진술 | a : 정답(true=O/옳음, false=X/거짓)\n *   f : 틀림/시간초과 시 한 줄 정정 | c : 분류(전 범위 분산용)\n * 거짓 진술은 실제로 거짓(흔한 오개념·개념쌍 스왑), 옳은 진술은 실제로 옳음.\n * =========================================================================== */\n(function (root) {\n  var STATEMENTS = [\n    /* ---------- 세포막 / 수송 ---------- */\n    { id: 's001', c: '막', a: true,  t: '단순확산은 수송단백질 없이 농도 기울기를 따라 물질이 이동한다.', f: '맞다. 비극성·지용성 분자는 막을 직접 통과한다.' },\n    { id: 's002', c: '막', a: false, t: '촉진확산은 ATP를 소모하여 물질을 운반한다.', f: '촉진확산은 수송단백질은 필요하지만 에너지는 쓰지 않는 수동수송이다.' },\n    { id: 's003', c: '막', a: true,  t: '능동수송은 농도 기울기를 거슬러 용질을 옮기며 ATP를 사용한다.', f: '맞다. 운반단백질이 인산화되며 농도 역행 수송을 한다.' },\n    { id: 's004', c: '막', a: false, t: '동물세포를 저장액(저장성 환경)에 넣으면 물이 빠져나가 쪼그라든다.', f: '저장액에서는 물이 들어와 부풀어 터진다. 쪼그라드는 것은 고장액이다.' },\n    { id: 's005', c: '막', a: true,  t: '아쿠아포린은 물 분자가 통과하는 통로단백질이다.', f: '맞다. 동일한 폴리펩타이드 소단위체 4개가 물 통로를 만든다.' },\n    { id: 's006', c: '막', a: false, t: '나트륨-칼륨 펌프는 나트륨을 세포 안으로, 칼륨을 세포 밖으로 퍼낸다.', f: '나트륨을 밖으로, 칼륨을 안으로 옮긴다(세포 안: 칼륨↑·나트륨↓).' },\n    { id: 's007', c: '막', a: true,  t: '막전위는 세포 안쪽이 바깥쪽보다 음전하를 띤다.', f: '맞다. 세포 안은 바깥보다 약 −50~−200mV 음전하를 띤다.' },\n    { id: 's008', c: '막', a: true,  t: '콜레스테롤은 체온(37°C)에서 막 유동성을 낮추고 낮은 온도에서는 고체화를 막는다.', f: '맞다. 콜레스테롤은 온도 완충 역할을 한다.' },\n\n    /* ---------- 세포호흡 ---------- */\n    { id: 's009', c: '호흡', a: true,  t: '해당과정은 세포질에서 일어나며 산소가 필요 없다.', f: '맞다. 해당과정은 산소 없이 세포질에서 진행된다.' },\n    { id: 's010', c: '호흡', a: false, t: '시트르산 회로는 미토콘드리아 외막에서 일어난다.', f: '시트르산 회로는 미토콘드리아 기질(matrix)에서 일어난다.' },\n    { id: 's011', c: '호흡', a: false, t: '전자전달계는 미토콘드리아 외막에 위치한다.', f: '전자전달계는 미토콘드리아 내막(크리스테)에 박혀 있다.' },\n    { id: 's012', c: '호흡', a: true,  t: '호기성 호흡에서 최종 전자수용체는 산소이다.', f: '맞다. 사슬 끝에서 전자는 산소·수소이온과 만나 물이 된다.' },\n    { id: 's013', c: '호흡', a: false, t: '세포호흡에서 이산화탄소는 해당과정에서 처음 방출된다.', f: '해당과정에서는 CO₂가 나오지 않고, 피루브산 산화에서 처음 방출된다.' },\n    { id: 's014', c: '호흡', a: true,  t: 'NAD⁺는 산화형이고 NADH는 환원형이다.', f: '맞다. NAD⁺가 수소·전자를 받아 NADH로 환원된다.' },\n    { id: 's015', c: '호흡', a: false, t: '기질수준 인산화는 전자전달계에서 일어난다.', f: '기질수준 인산화는 해당과정·시트르산 회로에서 일어난다(ETS는 산화적 인산화).' },\n    { id: 's016', c: '호흡', a: true,  t: '현대 값으로 NADH 1분자는 약 2.5 ATP, FADH₂ 1분자는 약 1.5 ATP를 만든다.', f: '맞다. 포도당 1분자당 총 약 30~32 ATP가 만들어진다.' },\n    { id: 's017', c: '호흡', a: false, t: 'FADH₂는 복합체 I로 들어가 NADH와 같은 양의 ATP를 만든다.', f: 'FADH₂는 복합체 II로 들어가 I을 건너뛰므로 더 적은(약 1.5) ATP를 만든다.' },\n    { id: 's018', c: '호흡', a: true,  t: '발효는 NAD⁺를 재생하기 위해 피루브산(또는 유도체)에 전자를 전달한다.', f: '맞다. NAD⁺ 재생으로 해당과정을 계속 돌릴 수 있다.' },\n    { id: 's019', c: '호흡', a: false, t: '젖산 발효에서는 이산화탄소가 방출된다.', f: '알코올 발효에서 CO₂가 나오고, 젖산 발효에서는 CO₂가 나오지 않는다.' },\n    { id: 's020', c: '호흡', a: true,  t: '갈색지방의 비짝물림 단백질(UCP)은 ATP 대신 열을 생성한다.', f: '맞다. 양성자가 ATP 합성효소를 거치지 않고 되돌아오며 열을 낸다.' },\n    { id: 's021', c: '호흡', a: false, t: 'ATP 합성효소는 전자전달사슬에서 전자를 직접 받아 ATP를 만든다.', f: 'ATP 합성효소는 양성자 농도 기울기(화학삼투)를 동력으로 ATP를 만든다.' },\n\n    /* ---------- 광합성 ---------- */\n    { id: 's022', c: '광합성', a: true,  t: '명반응은 틸라코이드 막에서, 캘빈 회로는 스트로마에서 일어난다.', f: '맞다.' },\n    { id: 's023', c: '광합성', a: false, t: '광합성에서 방출되는 산소(O₂)는 이산화탄소(CO₂)에서 유래한다.', f: 'O₂는 물(H₂O)에서 유래한다(반 닐의 실험).' },\n    { id: 's024', c: '광합성', a: false, t: '명반응의 주요 산물은 포도당이다.', f: '명반응은 ATP·NADPH를 만들고, 당은 캘빈 회로가 만든다.' },\n    { id: 's025', c: '광합성', a: true,  t: '캘빈 회로가 직접 만드는 탄수화물은 포도당이 아니라 G3P이다.', f: '맞다. 3탄당인 G3P가 직접 산물이다.' },\n    { id: 's026', c: '광합성', a: false, t: '선형 전자 흐름에서는 광계 I이 광계 II보다 먼저 작용한다.', f: '이름과 달리 실제로는 광계 II가 먼저 작용한다.' },\n    { id: 's027', c: '광합성', a: true,  t: '순환적 전자 흐름은 ATP는 만들지만 NADPH와 산소는 만들지 않는다.', f: '맞다. 광계 I만 사용해 ATP만 생성한다.' },\n    { id: 's028', c: '광합성', a: true,  t: '엽록소 a는 적색·청색광을 흡수하고 녹색광을 반사해 잎이 초록으로 보인다.', f: '맞다. 녹색광은 흡수가 가장 비효율적이다.' },\n    { id: 's029', c: '광합성', a: false, t: '광호흡은 당과 ATP를 추가로 생산해 광합성 효율을 높인다.', f: '광호흡은 당·ATP를 만들지 않고 오히려 ATP를 소모하며 효율을 낮춘다.' },\n    { id: 's030', c: '광합성', a: true,  t: 'C4 식물의 PEP 카르복실화효소는 루비스코보다 CO₂ 친화도가 높고 O₂와는 결합하지 않는다.', f: '맞다. 기공이 닫혀도 CO₂를 포장할 수 있다.' },\n    { id: 's031', c: '광합성', a: false, t: 'CAM 식물은 낮에 기공을 열고 밤에 닫는다.', f: 'CAM 식물은 밤에 기공을 열고 낮에 닫는다.' },\n    { id: 's032', c: '광합성', a: true,  t: '엽록체 화학삼투에서 양성자는 틸라코이드 내부(루멘)에 축적되고 ATP는 스트로마에서 만들어진다.', f: '맞다.' },\n\n    /* ---------- 세포 신호전달 ---------- */\n    { id: 's033', c: '신호', a: true,  t: 'G단백질은 GTP가 결합하면 활성, GDP가 결합하면 비활성이다.', f: '맞다. GTP가 GDP로 가수분해되면 신호가 꺼진다.' },\n    { id: 's034', c: '신호', a: false, t: 'cAMP는 세포 밖 수용체에 결합하는 1차 신호전달자이다.', f: 'cAMP는 2차 신호전달자이고, 1차 전달자는 리간드(호르몬)이다.' },\n    { id: 's035', c: '신호', a: true,  t: '사람에서 가장 종류가 많은 세포 표면 수용체는 G단백질 결합 수용체(GPCR)이다.', f: '맞다. 800종 이상이 알려져 있다.' },\n    { id: 's036', c: '신호', a: false, t: '스테로이드 호르몬은 막을 통과하지 못해 세포 표면 수용체에 결합한다.', f: '지용성인 스테로이드는 막을 통과해 세포 내 수용체에 결합한다.' },\n    { id: 's037', c: '신호', a: true,  t: '타이로신 인산화효소 수용체(RTK)는 타이로신을, 세포질 인산화효소는 주로 세린/트레오닌을 인산화한다.', f: '맞다.' },\n    { id: 's038', c: '신호', a: false, t: '세포질의 칼슘 이온 농도는 보통 소포체나 세포외액보다 높다.', f: '세포질 Ca²⁺ 농도는 소포체·세포외액보다 훨씬 낮게 유지된다.' },\n    { id: 's039', c: '신호', a: true,  t: '아폽토시스는 단일 세포에서 일어나며 염증을 유발하지 않는다.', f: '맞다. 괴사(necrosis)와 달리 염증을 일으키지 않는다.' },\n    { id: 's040', c: '신호', a: true,  t: '캐스페이즈는 아폽토시스를 수행하는 주요 단백질분해효소이다.', f: '맞다. C. elegans의 Ced-3이 대표적 캐스페이즈다.' },\n\n    /* ---------- 세포 구조 ---------- */\n    { id: 's041', c: '세포', a: false, t: '리보솜은 단일막으로 둘러싸인 세포소기관이다.', f: '리보솜은 막이 없어 엄밀히는 소기관이라 하지 않는다.' },\n    { id: 's042', c: '세포', a: false, t: '진핵세포의 리보솜은 70S, 원핵세포는 80S이다.', f: '진핵 80S(60S+40S), 원핵 70S(50S+30S)이다.' },\n    { id: 's043', c: '세포', a: true,  t: '미토콘드리아와 엽록체는 모두 이중막 구조이다.', f: '맞다. 핵·엽록체·미토콘드리아가 이중막이다.' },\n    { id: 's044', c: '세포', a: true,  t: '인(nucleolus)에서 rRNA가 합성되고 리보솜 소단위체가 조립된다.', f: '맞다. 인은 막이 없는 구조다.' },\n    { id: 's045', c: '세포', a: false, t: '중간섬유(중간세사)는 식물세포를 포함한 모든 진핵세포에 존재한다.', f: '중간섬유는 척추동물 등 일부 동물에만 있고 식물에는 없다.' },\n    { id: 's046', c: '세포', a: true,  t: '미세소관은 압축에 저항하고, 미세섬유는 장력(당기는 힘)에 저항한다.', f: '맞다.' },\n    { id: 's047', c: '세포', a: false, t: '리소좀의 가수분해효소는 중성 pH에서 가장 잘 작동한다.', f: '리소좀 효소는 산성 환경에서 잘 작동한다.' },\n    { id: 's048', c: '세포', a: true,  t: '콜라겐은 동물 몸에서 가장 풍부한 단백질로 전체 단백질의 약 40%를 차지한다.', f: '맞다. 세포 외부에 강한 섬유를 형성한다.' },\n    { id: 's049', c: '세포', a: false, t: '식물세포는 간극연접으로, 동물세포는 원형질연락사로 세포를 연결한다.', f: '식물은 원형질연락사, 동물은 간극연접으로 연결한다.' },\n    { id: 's050', c: '세포', a: true,  t: '섬모와 편모는 9+2 미세소관 배열을 가지며 디네인이 운동을 일으킨다.', f: '맞다. 기저체는 중심립처럼 9개 3중관 구조다.' },\n    { id: 's051', c: '세포', a: false, t: '활면소포체는 분비단백질 합성을, 조면소포체는 지질 합성을 담당한다.', f: '조면소포체가 분비단백질을, 활면소포체가 지질 합성·해독·칼슘 저장을 담당한다.' },\n    { id: 's052', c: '세포', a: true,  t: '히스톤 단백질은 고세균과 진핵생물에는 있지만 진정세균에는 없다.', f: '맞다.' },\n\n    /* ---------- 유전자 발현 ---------- */\n    { id: 's053', c: '발현', a: true,  t: '전사는 DNA를 주형으로 RNA를, 번역은 mRNA를 이용해 폴리펩타이드를 만든다.', f: '맞다.' },\n    { id: 's054', c: '발현', a: false, t: 'RNA는 염기로 티민(T)을 가진다.', f: 'RNA는 티민 대신 우라실(U)을 가진다.' },\n    { id: 's055', c: '발현', a: false, t: '진핵세포에서는 전사와 번역이 같은 장소에서 동시에 일어난다.', f: '진핵은 핵에서 전사·세포질에서 번역으로 분리되고, 동시 진행은 원핵의 특징이다.' },\n    { id: 's056', c: '발현', a: true,  t: '개시 코돈은 AUG(메티오닌)이고, 종결 코돈은 UAA·UAG·UGA이다.', f: '맞다. 종결 코돈은 아미노산을 지정하지 않는다.' },\n    { id: 's057', c: '발현', a: true,  t: 'mRNA 가공에서 인트론은 제거되고 엑손은 남아 이어진다.', f: '맞다.' },\n    { id: 's058', c: '발현', a: false, t: '스플라이싱은 엑손을 제거하고 인트론을 이어 붙이는 과정이다.', f: '스플라이싱은 인트론을 제거하고 엑손을 이어 붙인다.' },\n    { id: 's059', c: '발현', a: true,  t: '선택적 스플라이싱 덕분에 한 유전자가 두 종류 이상의 폴리펩타이드를 만들 수 있다.', f: '맞다. 그래서 단백질 종류가 유전자 수보다 많다.' },\n    { id: 's060', c: '발현', a: true,  t: '리보자임은 효소 기능을 하는 RNA 분자이다.', f: '맞다. 일부 인트론은 스스로를 잘라낸다.' },\n    { id: 's061', c: '발현', a: false, t: '아미노산은 tRNA의 안티코돈 부위에 결합한다.', f: '아미노산은 tRNA의 3′ 말단(CCA)에 결합하고, 안티코돈은 mRNA 코돈과 짝짓는다.' },\n    { id: 's062', c: '발현', a: true,  t: '리보솜의 A·P·E 자리 중 A는 들어오는 아미노아실 tRNA를, P는 펩티딜 tRNA를 잡는다.', f: '맞다. E는 tRNA가 빠져나가는 자리다.' },\n    { id: 's063', c: '발현', a: false, t: '폴리펩타이드는 C 말단에서 N 말단 방향으로 합성된다.', f: 'N 말단에서 C 말단 방향으로 합성된다.' },\n    { id: 's064', c: '발현', a: true,  t: '번역의 일부 단계에는 ATP가 아니라 GTP가 에너지원으로 쓰인다.', f: '맞다.' },\n    { id: 's065', c: '발현', a: false, t: '침묵 돌연변이는 단백질의 아미노산 서열을 바꾼다.', f: '침묵 돌연변이는 같은 아미노산을 지정해 서열이 바뀌지 않는다(바꾸는 것은 과오 돌연변이).' },\n    { id: 's066', c: '발현', a: true,  t: '틀이동(프레임시프트) 돌연변이는 삽입·결실로 이후 코돈 전체가 달라진다.', f: '맞다. 그래서 대개 기능이 다른 단백질을 만든다.' },\n    { id: 's067', c: '발현', a: true,  t: '신호펩타이드는 SRP에 인식되어 폴리펩타이드를 소포체로 인도한다.', f: '맞다.' },\n\n    /* ---------- 발현 조절 ---------- */\n    { id: 's068', c: '조절', a: true,  t: '트립토판 오페론은 억제성 오페론으로, 트립토판이 없을 때 전사가 일어난다.', f: '맞다. 트립토판이 보조억제자로 작용한다.' },\n    { id: 's069', c: '조절', a: false, t: '젖당(lac) 오페론은 젖당이 없을 때 활성화되는 억제성 오페론이다.', f: 'lac 오페론은 젖당이 있을 때 활성화되는 유도성 오페론이다.' },\n    { id: 's070', c: '조절', a: true,  t: '히스톤 아세틸화는 염색질 구조를 느슨하게 해 전사를 촉진한다.', f: '맞다.' },\n    { id: 's071', c: '조절', a: false, t: 'DNA의 사이토신 메틸화는 일반적으로 전사를 촉진한다.', f: 'DNA 메틸화는 일반적으로 전사를 억제한다.' },\n    { id: 's072', c: '조절', a: true,  t: 'miRNA와 siRNA는 표적 mRNA를 분해하거나 번역을 억제한다.', f: '맞다(RNAi).' },\n    { id: 's073', c: '조절', a: true,  t: '유비퀴틴이 붙은 단백질은 프로테아좀에 의해 분해된다.', f: '맞다.' },\n    { id: 's074', c: '조절', a: false, t: '인핸서는 반드시 프로모터 바로 옆에 위치해야 작동한다.', f: '인핸서는 유전자에서 수천 뉴클레오타이드 떨어져 있거나 인트론 안에 있어도 작동한다.' },\n\n    /* ---------- 멘델 유전 ---------- */\n    { id: 's075', c: '유전', a: true,  t: '검정교배는 미지의 유전자형을 알기 위해 열성 동형접합체와 교배한다.', f: '맞다.' },\n    { id: 's076', c: '유전', a: false, t: 'ABO 혈액형의 항체(응집소)는 IgG여서 태반을 통과한다.', f: 'ABO 항체는 IgM으로 분자량이 커서 태반을 통과하지 못한다(Rh 항체 IgG는 통과).' },\n    { id: 's077', c: '유전', a: true,  t: '보인자(이형접합체)는 열성 대립유전자를 가지지만 정상 표현형을 보인다.', f: '맞다. 우성 대립유전자 하나로 충분한 단백질이 만들어진다.' },\n    { id: 's078', c: '유전', a: false, t: '치사 우성 대립유전자는 치사 열성 대립유전자보다 집단에서 더 흔하다.', f: '치사 우성은 보통 생식 전에 사망시키므로 치사 열성보다 훨씬 드물다.' },\n    { id: 's079', c: '유전', a: true,  t: '다유전자 유전(피부색·키 등 양적형질)은 여러 유전자가 누적적으로 한 형질에 영향을 준다.', f: '맞다.' },\n    { id: 's080', c: '유전', a: true,  t: '상위(epistasis)는 한 유전자가 다른 유전자의 표현형 발현을 가린다(예: 래브라도 털색).', f: '맞다. 9:3:4 비율로 나타난다.' },\n\n    /* ---------- 세포분열 / 감수분열 ---------- */\n    { id: 's081', c: '분열', a: true,  t: 'DNA 복제(S기) 후 염색체 수는 그대로이고 DNA 양만 2배가 된다.', f: '맞다. 자매염색분체가 생겨도 염색체 수는 같다.' },\n    { id: 's082', c: '분열', a: false, t: '동물세포의 세포질분열은 세포판(cell plate)을 형성하여 일어난다.', f: '동물세포는 분열구(수축환), 식물세포가 세포판을 형성한다.' },\n    { id: 's083', c: '분열', a: true,  t: '식물세포는 골지체 유래 소낭이 모여 세포판을 만들어 세포질분열을 한다.', f: '맞다. 세포판이 새 세포벽으로 발달한다.' },\n    { id: 's084', c: '분열', a: false, t: 'MPF는 사이클린 없이 Cdk 단독으로 활성을 가진다.', f: 'Cdk는 사이클린이 결합해야 활성화되며, MPF는 사이클린+Cdk 복합체이다.' },\n    { id: 's085', c: '분열', a: true,  t: '사이클린 농도는 주기적으로 변동하지만 Cdk 양은 비교적 일정하다.', f: '맞다.' },\n    { id: 's086', c: '분열', a: false, t: '암세포는 밀도의존성 억제와 부착의존성이 정상세포보다 강하다.', f: '암세포는 이 조절에 둔감해 겹쳐 자라고 부착 없이도 증식한다.' },\n    { id: 's087', c: '분열', a: true,  t: '교차(crossing over)는 감수분열 1 전기에 비자매염색분체 사이에서 일어난다.', f: '맞다. 그 흔적이 교차점(키아스마)이다.' },\n    { id: 's088', c: '분열', a: false, t: '감수분열 후기 I에서 자매염색분체가 분리된다.', f: '후기 I에서는 상동염색체가 분리되고, 자매염색분체는 후기 II에서 분리된다.' },\n    { id: 's089', c: '분열', a: false, t: '감수 1분열과 2분열 사이에 DNA 복제가 한 번 더 일어난다.', f: '감수 I과 II 사이에는 DNA 복제가 일어나지 않는다.' },\n    { id: 's090', c: '분열', a: true,  t: '감수분열은 4개의 반수체 딸세포를, 유사분열은 2개의 유전적으로 동일한 2배체 세포를 만든다.', f: '맞다.' },\n    { id: 's091', c: '분열', a: true,  t: '유전적 다양성의 세 원천은 염색체의 독립적 분리, 교차, 무작위 수정이다.', f: '맞다.' },\n\n    /* ---------- 연관 / 성결정 ---------- */\n    { id: 's092', c: '연관', a: false, t: '완전연관이든 불완전연관이든 교차율은 항상 50%이다.', f: '교차율은 0%(완전연관)~50%(독립유전) 사이이며, 독립유전이 50%이다.' },\n    { id: 's093', c: '연관', a: true,  t: 'ZW 성결정 체계(조류 등)에서는 암컷이 이형배우자성(이형접합)이다.', f: '맞다. XY 체계는 수컷이 이형배우자성이다.' },\n    { id: 's094', c: '연관', a: false, t: 'Y 염색체의 SRY 유전자가 없어야 정소가 발달한다.', f: 'SRY 유전자가 정소 발달을 유도하므로, 이것이 있어야 정소가 만들어진다.' },\n    { id: 's095', c: '연관', a: true,  t: '포유류 암컷은 한쪽 X 염색체가 불활성화되어 바소체를 형성한다(삼색 고양이).', f: '맞다. 어느 X가 불활성화될지는 무작위다.' },\n    { id: 's096', c: '연관', a: false, t: '초파리의 야생형 눈 색(빨강)이라는 것은 곧 우성 형질을 의미한다.', f: '야생형이 반드시 우성인 것은 아니다(흰 눈이 빨간 눈에 대해 열성일 뿐).' },\n\n    /* ---------- 핵산 / DNA ---------- */\n    { id: 's097', c: '핵산', a: false, t: '허시-체이스 실험에서 35S는 DNA를, 32P는 단백질을 표지했다.', f: '35S는 단백질, 32P는 DNA를 표지했다.' },\n    { id: 's098', c: '핵산', a: true,  t: 'DNA에서 A는 T와 2개, G는 C와 3개의 수소결합을 형성한다.', f: '맞다.' },\n    { id: 's099', c: '핵산', a: false, t: 'DNA 합성은 3′에서 5′ 방향으로 일어난다.', f: 'DNA 합성은 항상 5′에서 3′ 방향으로 일어난다.' },\n    { id: 's100', c: '핵산', a: true,  t: 'DNA 중합효소는 프라이머 없이는 합성을 시작할 수 없다.', f: '맞다.' },\n    { id: 's101', c: '핵산', a: false, t: '지연가닥(lagging strand)은 끊김 없이 연속적으로 합성된다.', f: '지연가닥은 오카자키 절편으로 불연속 합성되고, 선도가닥이 연속 합성된다.' },\n    { id: 's102', c: '핵산', a: true,  t: 'DNA 복제는 반보존적이어서 각 분자가 옛 가닥 하나와 새 가닥 하나를 가진다.', f: '맞다(메셀슨-스탈 실험).' },\n    { id: 's103', c: '핵산', a: true,  t: '텔로미어를 재생하는 텔로머라아제는 암세포에서 흔히 활성화되어 있다.', f: '맞다.' },\n\n    /* ---------- 동물의 몸 / 조직 ---------- */\n    { id: 's104', c: '조직', a: true,  t: '혈액은 결합조직에 속한다.', f: '맞다. 액체 기질에 혈구가 떠 있는 결합조직이다.' },\n    { id: 's105', c: '조직', a: false, t: '힘줄(tendon)은 뼈와 뼈를, 인대(ligament)는 뼈와 근육을 연결한다.', f: '힘줄은 근육-뼈, 인대는 뼈-뼈를 연결한다.' },\n    { id: 's106', c: '조직', a: true,  t: '골격근 세포는 여러 핵을 가진 다핵 세포이다.', f: '맞다. 발생 때 여러 세포가 융합해 생긴다.' },\n    { id: 's107', c: '조직', a: false, t: '심장근에는 가로무늬가 없고 수의근이다.', f: '심장근은 가로무늬가 있고 불수의근이며 개재판을 가진다.' },\n    { id: 's108', c: '조직', a: false, t: '내온/외온과 항온/변온은 서로 같은 개념이다.', f: '둘은 별개 개념으로, 외온이면서 항온이거나 내온이면서 체온을 낮추는 경우가 있다.' },\n    { id: 's109', c: '조직', a: true,  t: '역류교환은 반대 방향으로 흐르는 두 액체 사이의 교환 효율을 최대화한다.', f: '맞다. 열·물질 교환에 모두 쓰인다.' },\n\n    /* ---------- 내분비 ---------- */\n    { id: 's110', c: '내분비', a: false, t: '칼시토닌은 혈중 칼슘 농도를 높이고 PTH는 낮춘다.', f: '칼시토닌이 칼슘을 낮추고, PTH(부갑상샘호르몬)가 높인다.' },\n    { id: 's111', c: '내분비', a: false, t: '인슐린은 혈당을 높이고 글루카곤은 혈당을 낮춘다.', f: '인슐린이 혈당을 낮추고 글루카곤이 높인다.' },\n    { id: 's112', c: '내분비', a: true,  t: '이자섬에서 알파세포는 글루카곤을, 베타세포는 인슐린을 만든다.', f: '맞다.' },\n    { id: 's113', c: '내분비', a: false, t: '혈당을 낮추는(강하시키는) 호르몬은 인슐린 외에도 여러 종류가 있다.', f: '혈당을 낮추는 호르몬은 인슐린이 유일하며, 혈당을 높이는 호르몬이 여럿이다.' },\n    { id: 's114', c: '내분비', a: false, t: '항이뇨호르몬(ADH)과 옥시토신은 뇌하수체 전엽에서 합성된다.', f: '둘은 시상하부에서 합성되어 뇌하수체 후엽에서 저장·분비된다.' },\n    { id: 's115', c: '내분비', a: true,  t: '부신수질은 에피네프린 같은 아민 호르몬을, 부신피질은 스테로이드 호르몬을 분비한다.', f: '맞다.' },\n    { id: 's116', c: '내분비', a: false, t: '알도스테론은 신장에서 나트륨 배출과 칼륨 재흡수를 촉진한다.', f: '알도스테론은 나트륨 재흡수와 칼륨 배출을 촉진한다.' },\n    { id: 's117', c: '내분비', a: true,  t: '1형 당뇨는 자가면역으로 베타세포가 파괴되고, 2형 당뇨는 표적세포의 인슐린 저항이 문제이다.', f: '맞다.' },\n    { id: 's118', c: '내분비', a: false, t: '호르몬은 종(種) 특이성이 강해 다른 종에는 작용하지 않는다.', f: '호르몬은 종 특이성이 없어 보편적으로 작용한다.' },\n    { id: 's119', c: '내분비', a: true,  t: '멜라토닌은 송과샘에서 분비되며 생체리듬을 조절한다.', f: '맞다. 밤이 긴 겨울에 많이 분비된다.' },\n    { id: 's120', c: '내분비', a: true,  t: '그렐린은 식욕을 촉진하고, 렙틴은 식욕을 억제한다.', f: '맞다. 렙틴은 지방조직에서 분비된다.' },\n    { id: 's121', c: '내분비', a: false, t: '프로스타글란딘은 단백질로 이루어진 국소 조절자이다.', f: '프로스타글란딘은 지방산(아라키돈산)에서 유래한 국소 조절자이다.' },\n\n    /* ---------- 소화 ---------- */\n    { id: 's122', c: '소화', a: false, t: '위에서 펩시노겐을 분비하는 세포는 벽세포, 염산을 분비하는 세포는 주세포이다.', f: '주세포가 펩시노겐을, 벽세포가 염산(양성자펌프)을 분비한다.' },\n    { id: 's123', c: '소화', a: true,  t: '대부분의 화학적 소화는 소장에서 일어난다.', f: '맞다.' },\n    { id: 's124', c: '소화', a: false, t: '담즙은 쓸개(담낭)에서 만들어져 간에 저장된다.', f: '담즙은 간에서 만들어져 쓸개에 저장·농축된다.' },\n    { id: 's125', c: '소화', a: true,  t: '담즙산염은 계면활성제로 작용해 지방 덩어리를 잘게 쪼갠다.', f: '맞다. 그래서 라이페이스가 작용할 표면적이 넓어진다.' },\n    { id: 's126', c: '소화', a: true,  t: '트립신과 키모트립신은 비활성 전구체로 분비되어 십이지장에서 활성화된다.', f: '맞다(트립시노겐·키모트립시노겐).' },\n    { id: 's127', c: '소화', a: false, t: '셀룰로오스는 사람의 소화효소로 분해되어 에너지를 공급한다.', f: '사람은 셀룰로오스 분해효소가 없어 에너지원으로 쓰지 못한다(이동을 도울 뿐).' },\n    { id: 's128', c: '소화', a: true,  t: '지용성 영양분은 암죽관(림프관)으로, 수용성 영양분은 간문맥으로 흡수된다.', f: '맞다. 지방은 킬로미크론으로 림프관에 들어간다.' },\n    { id: 's129', c: '소화', a: true,  t: '내인성 인자(intrinsic factor)가 없으면 비타민 B12 흡수가 안 되어 악성빈혈이 생긴다.', f: '맞다. 내인성 인자는 벽세포에서 분비된다.' },\n\n    /* ---------- 순환 / 혈액 ---------- */\n    { id: 's130', c: '순환', a: false, t: '심방은 혈액을 내보내고 심실은 혈액을 받아들인다.', f: '심방이 받아들이고 심실이 내보낸다.' },\n    { id: 's131', c: '순환', a: false, t: '어류는 2심방 1심실의 심장을 가진다.', f: '어류는 1심방 1심실이다(2심방 1심실은 양서류).' },\n    { id: 's132', c: '순환', a: true,  t: '동방결절(SA node)이 박동원이며, 전도는 동방결절→방실결절→히스색→푸르키네 섬유 순이다.', f: '맞다.' },\n    { id: 's133', c: '순환', a: false, t: '교감신경은 심박수를 낮추고 부교감신경은 심박수를 높인다.', f: '교감신경이 높이고 부교감신경이 낮춘다.' },\n    { id: 's134', c: '순환', a: true,  t: '혈류 속도는 동맥>정맥>모세혈관 순이고, 단면적은 모세혈관이 가장 크다.', f: '맞다. 모세혈관에서 가장 느리다.' },\n    { id: 's135', c: '순환', a: false, t: '정맥은 동맥보다 벽이 두껍고 판막이 없다.', f: '정맥은 동맥보다 벽이 얇고 판막이 있다.' },\n    { id: 's136', c: '순환', a: true,  t: '포유류의 성숙한 적혈구에는 핵과 미토콘드리아가 없다.', f: '맞다. 산소 손실을 줄이려 무산소 대사로 ATP를 만든다.' },\n    { id: 's137', c: '순환', a: false, t: '혈액 응고에서 와파린은 트롬빈을, 헤파린은 비타민 K를 억제한다.', f: '와파린은 비타민 K를, 헤파린은 트롬빈을 억제한다.' },\n    { id: 's138', c: '순환', a: true,  t: '적혈구 생성을 촉진하는 EPO는 산소가 부족할 때 신장에서 분비된다.', f: '맞다.' },\n\n    /* ---------- 호흡계 ---------- */\n    { id: 's139', c: '호흡계', a: false, t: '사람은 양압 호흡으로 공기를 폐 안으로 밀어넣는다.', f: '포유류는 음압 호흡으로 흉강을 넓혀 공기를 빨아들인다
