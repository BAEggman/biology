q": "조건부 혐기성 생물(facultative anaerobe)이란?", "a": "산소 유무에 따라 호흡과 발효를 모두 할 수 있는 생물"}, {"id": "B1-185", "q": "조건부 혐기성 생물이 발효할 때 호흡보다 당을 더 빨리 써야 하는 이유는?", "a": "동일 ATP를 얻는 효율이 훨씬 낮기 때문"}, {"id": "B1-186", "q": "무기호흡과 발효의 공통점은?", "a": "산소 없이 ATP 생산이 가능하다"}, {"id": "B1-187", "q": "무기호흡과 발효의 차이는?", "a": "무기호흡은 전자전달사슬을 쓰지만 발효는 쓰지 않는다"}, {"id": "B1-188", "q": "해당과정과 시트르산 회로는 무엇과 연결되어 있다고 정리되는가?", "a": "다양한 물질대사 경로"}, {"id": "B1-189", "q": "아미노산이 세포호흡 경로로 들어가려면 먼저 무엇을 거치는가?", "a": "탈아미노 반응(deamination)으로 아미노기 제거 — 떨어진 NH3는 요소로 배출"}, {"id": "B1-190", "q": "지방의 글리세롤과 지방산은 각각 어디로 들어가는가?", "a": "글리세롤→G3P(해당과정), 지방산→β-산화→아세틸-CoA"}, {"id": "B1-191", "q": "β-산화(beta oxidation)란?", "a": "지방산을 2탄소씩 잘라 아세틸-CoA로 만드는 경로 — 자를 때마다 NADH·FADH2 1개씩 생성"}, {"id": "B1-192", "q": "팔미트산(C16)의 β-산화 산물은?", "a": "7회 β-산화 → 아세틸-CoA 8개 (+ NADH 7, FADH2 7)"}, {"id": "B1-193", "q": "기질수준 인산화가 일어나는 세 단계 전체를 쓰면?", "a": "1,3-BPG→3PG, PEP→피루브산, 숙시닐-CoA→숙신산"}, {"id": "B1-194", "q": "포도당 1분자당 NADH 생성 수를 단계별로 쓰면?", "a": "해당 2개 + 피루브산 산화 2개 + TCA 6개 = 10개"}, {"id": "B1-195", "q": "포도당 1분자당 FADH2 생성 수는?", "a": "2개"}, {"id": "B1-196", "q": "포도당 1분자당 직접 ATP(기질수준 인산화) 생성 수는?", "a": "4개"}, {"id": "B1-197", "q": "포도당 1분자당 CO2 생성 수는?", "a": "6개"}, {"id": "B1-198", "q": "포도당 1분자당 물 생성은 주로 어느 단계에서 일어나는가?", "a": "전자전달계 마지막"}, {"id": "B1-199", "q": "세포호흡에서 ATP 대부분의 직접 원천은?", "a": "양성자 기울기"}, {"id": "B1-200", "q": "세포호흡 단계들을 장소로 정리하면?", "a": "해당=세포질, 피루브산 산화/TCA=기질, ETS=내막"}, {"id": "B1-201", "q": "포도당 완전 산화가 끝난 뒤 탄소는 최종적으로 어떤 형태가 되는가?", "a": "CO2"}, {"id": "B1-202", "q": "포도당에서 추출한 대부분의 에너지는 한때 어디에 저장되는가?", "a": "NADH와 FADH2"}, {"id": "B1-203", "q": "전자전달계는 해당과정·TCA와 무엇으로 연결되는가?", "a": "NADH와 FADH2"}, {"id": "B1-204", "q": "산화적 인산화와 기질수준 인산화의 가장 큰 차이는?", "a": "전자전달계/화학삼투 필요 여부"}, {"id": "B1-205", "q": "세포호흡을 chapter 제목 기준으로 10.1~10.6 순서대로 쓰면?", "a": "이화 반응 경로, 해당과정, 피루브산 산화·시트르산 회로, 산화적 인산화, 발효·무기호흡, 대사 연결"}, {"id": "B1-206", "q": "코리 회로(Cori cycle)란?", "a": "근육에서 생긴 젖산이 간으로 이동해 포도당으로 재합성(당신생)된 뒤 다시 근육으로 순환하는 경로"}, {"id": "B1-207", "q": "케톤체(ketone body)는 언제·어디서 생기고 어디에 쓰이는가?", "a": "단식·당뇨 등 아세틸-CoA 과잉 시 간에서 생성(아세토아세테이트·β-하이드록시부티르산) → 뇌·근육의 에너지원"}, {"id": "B1-208", "q": "당신생(gluconeogenesis)이란?", "a": "젖산·아미노산·글리세롤 같은 비당질로부터 포도당을 합성(주로 간·신장); TCA 중간체(옥살로아세트산 등)도 원료로 사용"}, {"id": "B1-209", "q": "오탄당 인산 경로(PPP/HMP shunt)의 두 산물과 특징은?", "a": "포도당 6-인산에서 NADPH(지방산·환원 합성용)와 리보스 5-인산(핵산 재료) 생성; ATP는 만들지 않음"}]}]}, {"id": "C", "name": "광합성과 세포분열", "chapters": [{"label": "11 광합성", "cards": [{"id": "C0-0", "q": "광합성의 정의는?", "a": "빛에너지를 화학에너지로 바꾸어 유기물을 합성하는 과정"}, {"id": "C0-1", "q": "광합성의 전체 반응식을 쓰면?", "a": "6 CO2 + 6 H2O + 빛에너지 -> C6H12O6 + 6 O2"}, {"id": "C0-2", "q": "광합성이 생물권에 중요한 가장 큰 이유는?", "a": "유기물과 산소를 공급하기 때문"}, {"id": "C0-3", "q": "독립영양생물(autotroph)이란?", "a": "CO2와 무기물로부터 자신의 유기물을 만드는 생물"}, {"id": "C0-4", "q": "종속영양생물(heterotroph)이란?", "a": "다른 생물이 만든 유기물을 먹어야 하는 생물"}, {"id": "C0-5", "q": "대부분의 식물이 속하는 영양 방식은?", "a": "광독립영양"}, {"id": "C0-6", "q": "광합성은 어떤 소기관에서 일어나는가?", "a": "엽록체"}, {"id": "C0-7", "q": "광합성의 두 단계는?", "a": "빛반응과 캘빈 회로"}, {"id": "C0-8", "q": "빛반응의 핵심 산물 3가지는?", "a": "ATP, NADPH, O2"}, {"id": "C0-9", "q": "캘빈 회로의 핵심 역할은?", "a": "CO2를 고정하고 환원해 G3P를 만드는 것"}, {"id": "C0-10", "q": "캘빈 회로가 직접 빛을 쓰지 않는다고 해도 빛이 필요한 이유는?", "a": "필요한 ATP와 NADPH가 빛반응에서 만들어지기 때문"}, {"id": "C0-11", "q": "광인산화(photo-phosphorylation)란?", "a": "빛반응에서 ATP를 만드는 과정"}, {"id": "C0-12", "q": "광합성의 최종 당 합성은 주로 어느 단계에서 이루어지는가?", "a": "캘빈 회로"}, {"id": "C0-13", "q": "광합성 부산물인 O2는 어디에서 유래하는가?", "a": "물(H2O)"}, {"id": "C0-14", "q": "van Niel의 세균 연구가 밝힌 광합성의 중요한 결론은?", "a": "광합성에서 방출되는 O2는 물에서 유래한다는 점"}, {"id": "C0-15", "q": "닐(van Niel)의 결론을 검증한 실험 방법은?", "a": "방사성 산소 동위원소(¹⁸O) 추적"}, {"id": "C0-16", "q": "자색황세균 같은 무산소 광합성 세균은 O₂를 만드는가?", "a": "아니오 — H₂S를 전자공여체로 사용(O₂ 미발생); O₂ 발생형은 시아노박테리아"}, {"id": "C0-17", "q": "광합성의 환원력은 주로 어떤 분자에 저장되는가?", "a": "NADPH"}, {"id": "C0-18", "q": "광합성에서 에너지는 주로 어떤 두 분자 형태로 저장되는가?", "a": "ATP와 NADPH"}, {"id": "C0-19", "q": "광합성에서 CO2를 유기물로 바꾸는 과정을 무엇이라 하는가?", "a": "탄소고정"}, {"id": "C0-20", "q": "광합성의 직접 산물은 포도당인가 G3P인가?", "a": "G3P"}, {"id": "C0-21", "q": "광합성은 지구상 생명에 필수적인데 그 이유 두 가지는?", "a": "먹이 공급과 산소 공급"}, {"id": "C0-22", "q": "엽록체는 주로 잎의 어떤 조직 세포에 많은가?", "a": "엽육조직(mesophyll) 세포"}, {"id": "C0-23", "q": "기공(stoma)의 기능은?", "a": "CO2를 들이고 O2를 내보내는 통로"}, {"id": "C0-24", "q": "기공의 복수형은?", "a": "stomata"}, {"id": "C0-25", "q": "잎으로 물을 전달하는 조직계는?", "a": "관다발조직계"}, {"id": "C0-26", "q": "엽록체는 몇 겹의 막으로 둘러싸여 있는가?", "a": "이중막"}, {"id": "C0-27", "q": "엽록체 내부의 액상 공간은?", "a": "스트로마"}, {"id": "C0-28", "q": "캘빈 회로는 어디에서 일어나는가?", "a": "스트로마"}, {"id": "C0-29", "q": "틸라코이드는 무엇인가?", "a": "엽록체 내부의 막으로 된 납작한 주머니 구조"}, {"id": "C0-30", "q": "틸라코이드 여러 개가 쌓인 구조는?", "a": "그라나"}, {"id": "C0-31", "q": "그라나의 단수형은?", "a": "그라눔(granum)"}, {"id": "C0-32", "q": "틸라코이드 내부 공간은?", "a": "루멘"}, {"id": "C0-33", "q": "빛반응은 주로 어디에서 일어나는가?", "a": "틸라코이드막"}, {"id": "C0-34", "q": "엽록소는 주로 어디에 존재하는가?", "a": "틸라코이드막"}, {"id": "C0-35", "q": "ATP 합성효소는 엽록체의 어디에 박혀 있는가?", "a": "틸라코이드막"}, {"id": "C0-36", "q": "빛반응 산물 ATP와 NADPH가 바로 캘빈 회로에 쓰일 수 있는 이유는?", "a": "둘 다 스트로마 쪽에서 이용 가능하기 때문"}, {"id": "C0-37", "q": "엽록체 구조 문제에서 꼭 구분해야 할 세 공간은?", "a": "스트로마, 틸라코이드막, 틸라코이드 루멘"}, {"id": "C0-38", "q": "빛반응과 캘빈 회로의 장소를 비교하면?", "a": "빛반응은 틸라코이드막, 캘빈 회로는 스트로마"}, {"id": "C0-39", "q": "루멘의 정의를 한 문장으로 쓰면?", "a": "틸라코이드 내부 수용성 공간"}, {"id": "C0-40", "q": "그라나가 중요한 이유는?", "a": "틸라코이드막 표면적을 늘려 광반응에 유리하기 때문"}, {"id": "C0-41", "q": "스트로마가 중요한 이유는?", "a": "캘빈 회로 효소와 기질이 존재하는 공간이기 때문"}, {"id": "C0-42", "q": "엽록체를 둘러싼 가장 바깥쪽 막은?", "a": "엽록체 외막"}, {"id": "C0-43", "q": "빛반응 산물 O2는 어디에서 만들어져 빠져나가는가?", "a": "물 분해 후 틸라코이드막에서 생성되어 세포 밖으로 방출"}, {"id": "C0-44", "q": "엽록체가 잎의 초록색과 직접 관련된 이유는?", "a": "틸라코이드막의 엽록소 때문"}, {"id": "C0-45", "q": "색소(pigment)란?", "a": "가시광선 일부 파장을 흡수하고 일부를 반사·투과하는 물질"}, {"id": "C0-46", "q": "잎이 초록색으로 보이는 이유는?", "a": "엽록소가 녹색광을 반사·투과하기 때문"}, {"id": "C0-47", "q": "흡수 스펙트럼이란?", "a": "파장에 따라 색소가 빛을 얼마나 흡수하는지 나타낸 그래프"}, {"id": "C0-48", "q": "작용 스펙트럼이란?", "a": "파장에 따라 광합성이 얼마나 일어나는지 나타낸 그래프"}, {"id": "C0-49", "q": "광합성에 가장 효율적인 빛 영역 두 개는?", "a": "청색광과 적색광"}, {"id": "C0-50", "q": "광합성에 가장 비효율적인 빛 영역은?", "a": "녹색광"}, {"id": "C0-51", "q": "엥겔만 실험의 결론은?", "a": "청색광과 적색광에서 광합성이 가장 활발하다는 것"}, {"id": "C0-52", "q": "엥겔만 실험에서 홍기성 세균이 모여든 이유는?", "a": "산소가 많이 발생한 곳으로 이동했기 때문"}, {"id": "C0-53", "q": "엥겔만 실험 재료로 쓰인 것은?", "a": "사상조류"}, {"id": "C0-54", "q": "엥겔만 실험이 보여준 것은 흡수 스펙트럼인가 작용 스펙트럼인가?", "a": "작용 스펙트럼의 원리"}, {"id": "C0-55", "q": "주된 광합성 색소 세 종류는?", "a": "엽록소 a, 엽록소 b, 카로티노이드"}, {"id": "C0-56", "q": "빛반응의 반응중심에 직접 쓰이는 주된 색소는?", "a": "엽록소 a"}, {"id": "C0-57", "q": "엽록소 a와 b의 공통 구조 핵심은?", "a": "Mg를 중심에 둔 포르피린 고리와 긴 탄화수소 꼬리"}, {"id": "C0-58", "q": "엽록소 a와 b의 차이는 주로 어디에 있는가?", "a": "한 개의 작용기"}, {"id": "C0-59", "q": "엽록소 a의 해당 작용기는?", "a": "메틸기(CH3)"}, {"id": "C0-60", "q": "엽록소 b의 해당 작용기는?", "a": "포르밀기(CHO)"}, {"id": "C0-61", "q": "엽록소 a와 b의 작용기 차이가 중요한 이유는?", "a": "흡수하는 빛의 파장이 약간 달라지기 때문"}, {"id": "C0-62", "q": "포르피린 고리의 기능은?", "a": "빛을 흡수하는 머리 부분"}, {"id": "C0-63", "q": "탄화수소 꼬리의 기능은?", "a": "틸라코이드막의 소수성 부위와 상호작용해 색소를 막에 고정"}, {"id": "C0-64", "q": "카로티노이드의 주요 기능 두 가지는?", "a": "보조 색소 역할과 광보호 역할"}, {"id": "C0-65", "q": "카로티노이드가 넓혀 주는 것은?", "a": "광합성에 이용 가능한 빛의 스펙트럼"}, {"id": "C0-66", "q": "카로티노이드가 주로 흡수하는 빛 영역은?", "a": "자색광과 청록색광"}, {"id": "C0-67", "q": "보조 색소(accessory pigment)란?", "a": "엽록소 a가 놓치는 파장의 빛을 흡수해 에너지 전달을 돕는 색소"}, {"id": "C0-68", "q": "작용 스펙트럼이 엽록소 a 흡수 스펙트럼과 완전히 같지 않은 이유는?", "a": "엽록소 b와 카로티노이드 같은 보조 색소도 기여하기 때문"}, {"id": "C0-69", "q": "엽록소 d, f가 언급되는 이유는?", "a": "더 긴 파장의 빛을 흡수하는 특수 예시이기 때문"}, {"id": "C0-70", "q": "광계(photosystem)란?", "a": "집광복합체와 반응중심복합체가 결합한 틸라코이드막 복합체"}, {"id": "C0-71", "q": "광계의 두 핵심 부분은?", "a": "집광복합체와 반응중심복합체"}, {"id": "C0-72", "q": "집광복합체(light-harvesting complex)의 역할은?", "a": "다양한 색소로 빛에너지를 모아 반응중심으로 전달"}, {"id": "C0-73", "q": "반응중심복합체(reaction-center complex)의 역할은?", "a": "특수 엽록소 a 쌍이 전자를 들뜨게 해 1차 전자수용체로 전달"}, {"id": "C0-74", "q": "반응중심복합체에 꼭 있는 두 요소는?", "a": "특수 엽록소 a 쌍과 1차 전자수용체"}, {"id": "C0-75", "q": "광계에서 빛을 직접 화학에너지 전환으로 연결하는 첫 단계는?", "a": "특수 엽록소 a가 들뜬 전자를 1차 전자수용체에 넘기는 것"}, {"id": "C0-76", "q": "광계 II의 특수 엽록소 이름은?", "a": "P680"}, {"id": "C0-77", "q": "광계 I의 특수 엽록소 이름은?", "a": "P700"}, {"id": "C0-78", "q": "P680이란 이름의 뜻은?", "a": "680 nm 빛을 가장 잘 흡수하는 반응중심 엽록소 a"}, {"id": "C0-79", "q": "P700이란 이름의 뜻은?", "a": "700 nm 빛을 가장 잘 흡수하는 반응중심 엽록소 a"}, {"id": "C0-80", "q": "빛반응에서 실제로 먼저 작동하는 것은 광계 I인가 II인가?", "a": "광계 II"}, {"id": "C0-81", "q": "광계 II와 광계 I의 엽록소 a는 분자적으로 같은데도 흡수 파장이 다른 이유는?", "a": "서로 다른 단백질 환경에 결합해 있기 때문"}, {"id": "C0-82", "q": "집광복합체 색소가 하는 일은?", "a": "빛에너지를 분자 사이에서 전달해 반응중심의 특수 엽록소 a에 모은다"}, {"id": "C0-83", "q": "1차 전자수용체가 중요한 이유는?", "a": "들뜬 전자를 빠르게 받아 열이나 빛으로 에너지가 소실되지 않게 하기 때문"}, {"id": "C0-84", "q": "광계가 화학에너지 전환 장치인 이유를 한 문장으로 쓰면?", "a": "빛에너지를 이용해 전자를 높은 위치에너지 상태로 올려 전자전달을 시작하기 때문"}, {"id": "C0-85", "q": "광계 II와 I의 공통점은?", "a": "둘 다 집광복합체와 반응중심복합체를 가진다"}, {"id": "C0-86", "q": "광계 II와 I의 차이 핵심은?", "a": "반응중심 엽록소와 전자 흐름 내 위치가 다르다"}, {"id": "C0-87", "q": "빛반응에서 두 광계가 모두 필요한 이유는?", "a": "한 번의 광여기로는 물에서 NADP+까지 전자를 올릴 에너지가 부족하기 때문"}, {"id": "C0-88", "q": "P680+가 매우 강한 산화제인 이유는?", "a": "잃은 전자를 되찾기 위해 물에서도 전자를 뽑아올 수 있기 때문"}, {"id": "C0-89", "q": "선형 전자 흐름의 시작 물질은?", "a": "물(H2O)"}, {"id": "C0-90", "q": "선형 전자 흐름의 최종 전자 수용체는?", "a": "NADP+"}, {"id": "C0-91", "q": "선형 전자 흐름의 최종 환원 산물은?", "a": "NADPH"}, {"id": "C0-92", "q": "선형 전자 흐름의 부산물은?", "a": "산소(O2)"}, {"id": "C0-93", "q": "선형 전자 흐름에서 물이 분해될 때 생성되는 것은?", "a": "전자, H+, O2"}, {"id": "C0-94", "q": "물 분해는 어느 광계와 직접 연결되는가?", "a": "광계 II"}, {"id": "C0-95", "q": "P680에서 전자를 잃은 뒤의 형태는?", "a": "P680+"}, {"id": "C0-96", "q": "P680+가 전자를 보충받는 직접 원천은?", "a": "물"}, {"id": "C0-97", "q": "물 분해로 나온 H+는 어디에 축적되는가?", "a": "틸라코이드 루멘"}, {"id": "C0-98", "q": "물 분해로 나온 산소 원자는 어떻게 되는가?", "a": "서로 결합해 O2가 된다"}, {"id": "C0-99", "q": "물이 분해되어 전자·H⁺·O₂를 내놓는 반응의 정식 명칭은?", "a": "광분해(photolysis)"}, {"id": "C0-100", "q": "선형 전자 흐름에서 광계 II 다음 전자운반체는?", "a": "플라스토퀴논(Pq)"}, {"id": "C0-101", "q": "Pq 다음 전자운반체는?", "a": "사이토크롬 복합체"}, {"id": "C0-102", "q": "광합성 전자전달계의 '사이토크롬 복합체'의 정식 명칭은?", "a": "사이토크롬 b6f 복합체"}, {"id": "C0-103", "q": "사이토크롬 복합체 다음 전자운반체는?", "a": "플라스토시아닌(Pc)"}, {"id": "C0-104", "q": "Pc 다음에 전자를 받는 것은?", "a": "광계 I의 P700"}, {"id": "C0-105", "q": "광계 I 다음 전자운반체는?", "a": "페레독신(Fd)"}, {"id": "C0-106", "q": "Fd 다음 효소는?", "a": "NADP+ 환원효소"}, {"id": "C0-107", "q": "NADP+ 환원효소의 역할은?", "a": "NADP+를 NADPH로 환원한다"}, {"id": "C0-108", "q": "선형 전자 흐름의 전체 경로를 쓰면?", "a": "H2O -> PSII(P680) -> Pq -> 사이토크롬 복합체 -> Pc -> PSI(P700) -> Fd -> NADP+ 환원효소 -> NADPH"}, {"id": "C0-109", "q": "선형 전자 흐름에서 ATP가 생성되는 원리는?", "a": "전자전달이 만든 H+ 기울기에 의한 화학삼투"}, {"id": "C0-110", "q": "선형 전자 흐름에서 H+ 기울기 형성에 기여하는 두 원천은?", "a": "물 분해와 Pq/사이토크롬 복합체를 통한 H+ 이동"}, {"id": "C0-111", "q": "ATP 합성효소를 통과하는 H+의 방향은?", "a": "루멘 -> 스트로마"}, {"id": "C0-112", "q": "엽록체 ATP 합성효소로 ATP가 생성되는 장소는?", "a": "스트로마"}, {"id": "C0-113", "q": "스트로마에서 ATP가 생성되어 유리한 이유는?", "a": "캘빈 회로가 스트로마에서 일어나기 때문"}, {"id": "C0-114", "q": "빛반응에서 광계 I이 한 번 더 필요한 이유는?", "a": "광계 II만으로는 NADP+를 환원할 만큼 전자를 충분히 높게 올릴 수 없기 때문"}, {"id": "C0-115", "q": "선형 전자 흐름이 만드는 세 가지 결과를 쓰면?", "a": "ATP 생성, NADPH 생성, O2 방출"}, {"id": "C0-116", "q": "선형 전자 흐름이 '선형'이라 불리는 이유는?", "a": "전자가 물에서 출발해 NADP+로 일방향 이동하기 때문"}, {"id": "C0-117", "q": "빛반응 요약에서 전자의 시작과 끝을 쓰면?", "a": "물에서 시작해 NADPH에 저장된다"}, {"id": "C0-118", "q": "전자전달 중 사이토크롬 복합체의 중요한 기능은?", "a": "H+ 기울기 형성에 기여한다"}, {"id": "C0-119", "q": "Pq가 중요한 이유는?", "a": "전자와 함께 H+ 이동에 관여해 루멘 산성화에 기여하기 때문"}, {"id": "C0-120", "q": "빛반응 중 루멘 pH가 낮아지는 이유는?", "a": "H+가 루멘에 축적되기 때문"}, {"id": "C0-121", "q": "빛반응 중 스트로마 pH가 높아지는 이유는?", "a": "NADPH 형성과 H+ 이동으로 스트로마 H+가 상대적으로 감소하기 때문"}, {"id": "C0-122", "q": "순환적 전자 흐름(cyclic electron flow)은 어떤 광계만 사용하는가?", "a": "광계 I"}, {"id": "C0-123", "q": "순환적 전자 흐름에서 전자는 어디로 되돌아오는가?", "a": "광계 I의 P700 쪽"}, {"id": "C0-124", "q": "순환적 전자 흐름에서 Fd 다음에 전자가 향하는 쪽은?", "a": "사이토크롬 복합체 쪽"}, {"id": "C0-125", "q": "순환적 전자 흐름에서 생성되지 않는 두 가지는?", "a": "NADPH와 O2"}, {"id": "C0-126", "q": "순환적 전자 흐름에서 생성되는 것은?", "a": "ATP"}, {"id": "C0-127", "q": "순환적 전자 흐름이 필요한 이유는?", "a": "캘빈 회로가 ATP를 더 많이 요구하므로 ATP/NADPH 비를 보정하기 위해"}, {"id": "C0-128", "q": "순환적 전자 흐름에서 물 분해가 일어나는가?", "a": "아니오"}, {"id": "C0-129", "q": "순환적 전자 흐름에서 산소 방출이 없는 이유는?", "a": "물 분해가 없기 때문"}, {"id": "C0-130", "q": "순환적 전자 흐름의 전체 경로를 쓰면?", "a": "PSI(P700) -> Fd -> 사이토크롬 복합체 -> Pc -> PSI"}, {"id": "C0-131", "q": "순환적 전자 흐름은 왜 '순환적'이라 불리는가?", "a": "전자가 광계 I로 되돌아오기 때문"}, {"id": "C0-132", "q": "선형 전자 흐름과 순환적 전자 흐름의 공통점은?", "a": "둘 다 빛을 이용하고 ATP 생성에 기여한다"}, {"id": "C0-133", "q": "선형 전자 흐름과 순환적 전자 흐름의 차이 핵심은?", "a": "선형은 NADPH와 O2를 만들지만 순환은 ATP만 만든다"}, {"id": "C0-134", "q": "광합성 세균 중 일부에서 순환적 전자 흐름이 특히 중요한 이유는?", "a": "광계 하나만 가진 경우 ATP를 얻는 유일한 방법일 수 있기 때문"}, {"id": "C0-135", "q": "빛반응에서 순환적 전자 흐름이 늘어나면 상대적으로 무엇이 더 많이 만들어지는가?", "a": "ATP"}, {"id": "C0-136", "q": "빛반응에서 선형과 순환 경로를 함께 쓰는 이유는?", "a": "캘빈 회로가 요구하는 ATP와 NADPH의 균형을 맞추기 위해"}, {"id": "C0-137", "q": "광합성의 화학삼투와 세포호흡의 화학삼투 공통점은?", "a": "전자전달계가 만든 H+ 기울기로 ATP 합성효소가 ATP를 만든다"}, {"id": "C0-138", "q": "광합성 화학삼투에서 H+ 저장고는?", "a": "틸라코이드 루멘"}, {"id": "C0-139", "q": "세포호흡 화학삼투에서 H+ 저장고는?", "a": "막사이공간"}, {"id": "C0-140", "q": "광합성에서 ATP 합성효소를 지나는 H+ 방향은?", "a": "루멘에서 스트로마로"}, {"id": "C0-141", "q": "세포호흡에서 ATP 합성효소를 지나는 H+ 방향은?", "a": "막사이공간에서 기질로"}, {"id": "C0-142", "q": "광합성의 전자 출발점은?", "a": "물"}, {"id": "C0-143", "q": "세포호흡의 전자 출발점은?", "a": "유기물로부터 나온 NADH/FADH2"}, {"id": "C0-144", "q": "광합성의 최종 전자 저장체는?", "a": "NADPH"}, {"id": "C0-145", "q": "세포호흡의 최종 전자수용체는?", "a": "산소"}, {"id": "C0-146", "q": "엽록체와 미토콘드리아 전자전달계의 최종 전자수용체를 각각 쓰면?", "a": "엽록체=NADP⁺, 미토콘드리아=O₂"}, {"id": "C0-147", "q": "광합성과 세포호흡의 전자 흐름 차이를 한 문장으로 쓰면?", "a": "광합성은 물에서 전자를 빼내 NADPH에 저장하고, 세포호흡은 유기물 전자를 산소에 넘긴다"}, {"id": "C0-148", "q": "광합성의 ATP가 스트로마 쪽에서 생성되는 이유는?", "a": "캘빈 회로가 스트로마에서 ATP를 사용하기 때문"}, {"id": "C0-149", "q": "광합성 화학삼투가 빛과 연결되는 이유는?", "a": "빛이 전자를 들뜨게 해 전자전달계를 가동하기 때문"}, {"id": "C0-150", "q": "광인산화와 산화적 인산화의 공통점은?", "a": "둘 다 화학삼투를 이용한 ATP 합성이다"}, {"id": "C0-151", "q": "광인산화와 산화적 인산화의 차이 핵심은?", "a": "전자와 최종 저장체/수용체가 다르다"}, {"id": "C0-152", "q": "빛반응 중 루멘의 pH가 약 5, 스트로마가 약 8로 변하는 의미는?", "a": "강한 H+ 기울기가 형성된다는 뜻"}, {"id": "C0-153", "q": "캘빈 회로의 3단계는?", "a": "탄소고정, 환원, RuBP 재생"}, {"id": "C0-154", "q": "캘빈 회로의 CO2 수용체는?", "a": "RuBP"}, {"id": "C0-155", "q": "RuBP의 풀네임은?", "a": "리불로오스-1,5-이인산"}, {"id": "C0-156", "q": "탄소고정 단계에서 CO2를 RuBP에 붙이는 효소는?", "a": "루비스코"}, {"id": "C0-157", "q": "루비스코(Rubisco)란?", "a": "RuBP에 CO2를 붙이는 캘빈 회로 효소"}, {"id": "C0-158", "q": "루비스코가 지구상에서 가장 풍부한 단백질로 언급되는 이유는?", "a": "광합성 생물에 매우 많이 존재하기 때문"}, {"id": "C0-159", "q": "탄소고정 직후 생기는 불안정한 6탄소 중간체는 어떻게 되는가?", "a": "두 분자의 3-PGA로 쪼개진다"}, {"id": "C0-160", "q": "3 CO2가 들어오면 생성되는 3-PGA 수는?", "a": "6개"}, {"id": "C0-161", "q": "환원 단계에서 3-PGA가 먼저 ATP를 받아 되는 것은?", "a": "1,3-BPG"}, {"id": "C0-162", "q": "그다음 NADPH의 환원력을 받아 생성되는 것은?", "a": "G3P"}, {"id": "C0-163", "q": "캘빈 회로에서 직접 배출되는 당은?", "a": "G3P"}, {"id": "C0-164", "q": "3 CO2가 들어온 캘빈 회로에서 순생성 G3P는 몇 개인가?", "a": "1개"}, {"id": "C0-165", "q": "나머지 5개의 G3P는 어디에 쓰이는가?", "a": "RuBP 재생"}, {"id": "C0-166", "q": "RuBP 재생 단계에서 ATP가 필요한 이유는?", "a": "G3P 탄소골격을 RuBP로 재배열·인산화하기 위해"}, {"id": "C0-167", "q": "3 CO2당 필요한 ATP 수는?", "a": "9개"}, {"id": "C0-168", "q": "3 CO2당 필요한 NADPH 수는?", "a": "6개"}, {"id": "C0-169", "q": "포도당 1분자를 만들려면 캘빈 회로에 필요한 CO2는?", "a": "6개"}, {"id": "C0-170", "q": "포도당 1분자를 만들려면 필요한 ATP는?", "a": "18개"}, {"id": "C0-171", "q": "포도당 1분자를 만들려면 필요한 NADPH는?", "a": "12개"}, {"id": "C0-172", "q": "캘빈 회로가 '회로'인 이유는?", "a": "CO2 수용체 RuBP가 재생되기 때문"}, {"id": "C0-173", "q": "캘빈 회로에서 ATP가 쓰이는 두 단계는?", "a": "3-PGA -> 1,3-BPG와 RuBP 재생"}, {"id": "C0-174", "q": "캘빈 회로에서 NADPH가 쓰이는 단계는?", "a": "1,3-BPG -> G3P 환원 단계"}, {"id": "C0-175", "q": "캘빈 회로의 환원 단계에서 NADPH가 하는 일은?", "a": "전자(환원력)를 제공해 G3P를 만든다"}, {"id": "C0-176", "q": "캘빈 회로의 ATP는 어디에서 공급되는가?", "a": "빛반응"}, {"id": "C0-177", "q": "캘빈 회로의 NADPH는 어디에서 공급되는가?", "a": "빛반응"}, {"id": "C0-178", "q": "캘빈 회로가 빛비의존성 반응이라 불려도 완전히 빛과 무관하지 않은 이유는?", "a": "ATP와 NADPH 공급이 빛반응에 의존하기 때문"}, {"id": "C0-179", "q": "캘빈 회로의 직접 산물 G3P는 무엇의 전구체인가?", "a": "포도당 및 다른 유기물"}, {"id": "C0-180", "q": "캘빈 회로에서 6분자의 3-PGA가 모두 최종 산물로 나가지 않는 이유는?", "a": "대부분이 RuBP 재생에 쓰이기 때문"}, {"id": "C0-181", "q": "루비스코가 중요한 동시에 문제를 일으키는 이유는?", "a": "CO2뿐 아니라 O2도 결합시킬 수 있기 때문"}, {"id": "C0-182", "q": "캘빈 회로 3단계와 각 핵심 산물을 연결하면?", "a": "탄소고정-3PGA, 환원-G3P, 재생-RuBP"}, {"id": "C0-183", "q": "캘빈 회로에서 탄소 수를 따라가면 3 CO2 투입 후 어떤 흐름인가?", "a": "6개의 3탄소 분자 생성 후 1개 G3P 배출, 나머지 5개 재배열"}, {"id": "C0-184", "q": "캘빈 회로에서 ADP와 NADP+가 다시 생기는 이유는?", "a": "ATP와 NADPH가 소비되기 때문"}, {"id": "C0-185", "q": "C3 식물이란?", "a": "첫 안정적 탄소고정 산물이 3-PGA인 식물"}, {"id": "C0-186", "q": "대표적 C3 작물 예시는?", "a": "벼, 밀, 대두"}, {"id": "C0-187", "q": "광호흡(photorespiration)이란?", "a": "루비스코가 CO2 대신 O2를 붙여 당 생산에 비효율적인 경로가 진행되는 현상"}, {"id": "C0-188", "q": "광호흡은 왜 일어나는가?", "a": "루비스코가 O2와도 반응할 수 있기 때문"}, {"id": "C0-189", "q": "광호흡이 심해지는 환경 조건은?", "a": "덥고 건조하여 기공이 닫히고 CO2가 부족할 때"}, {"id": "C0-190", "q": "기공이 닫히면 잎 안에서 CO2는 어떻게 되는가?", "a": "감소한다"}, {"id": "C0-191", "q": "기공이 닫히면 잎 안에서 O2는 어떻게 되는가?", "a": "상대적으로 증가한다"}, {"id": "C0-192", "q": "광호흡이 문제인 이유는?", "a": "ATP를 소모하고 CO2를 방출하며 당 생산 효율을 낮추기 때문"}, {"id": "C0-193", "q": "광호흡에는 어떤 세 기관이 관여하는가?", "a": "엽록체, 퍼옥시좀, 미토콘드리아"}, {"id": "C0-194", "q": "광호흡에서 발생하는 과산화수소(H₂O₂)는 어디서 처리되는가?", "a": "퍼옥시좀"}, {"id": "C0-195", "q": "광호흡에서 O2는 소모되는가 생성되는가?", "a": "소모된다"}, {"id": "C0-196", "q": "광호흡에서 CO2는 소모되는가 방출되는가?", "a": "방출된다"}, {"id": "C0-197", "q": "광호흡이 캘빈 회로와 반대되는 측면 한 가지는?", "a": "탄소를 고정하는 대신 일부를 잃는다"}, {"id": "C0-198", "q": "루비스코의 산소화 반응이 늘어나면 식물에 어떤 결과가 생기는가?", "a": "순당 생산량이 감소한다"}, {"id": "C0-199", "q": "C3 식물이 더운 날씨에 불리할 수 있는 이유는?", "a": "광호흡이 증가하기 때문"}, {"id": "C0-200", "q": "광호흡을 줄이는 적응 방식 두 가지는?", "a": "C4 광합성과 CAM 광합성"}, {"id": "C0-201", "q": "C4 식물이란?", "a": "첫 탄소고정 산물이 4탄소 화합물인 식물"}, {"id": "C0-202", "q": "대표적 C4 식물 두 가지는?", "a": "옥수수와 사탕수수"}, {"id": "C0-203", "q": "C4 식물에서 처음 CO2를 고정하는 효소는?", "a": "PEP 카르복실화효소"}, {"id": "C0-204", "q": "PEP 카르복실화효소의 장점은?", "a": "CO2 친화도가 높고 O2와 반응하지 않는다"}, {"id": "C0-205", "q": "C4 식물의 첫 고정 산물은 몇 탄소인가?", "a": "4탄소"}, {"id": "C0-206", "q": "C4 식물에서 PEP에 CO₂가 붙어 처음 생기는 4탄소 화합물은?", "a": "옥살아세트산(OAA)"}, {"id": "C0-207", "q": "C4 식물에서 첫 탄소고정은 어느 세포에서 일어나는가?", "a": "엽육세포"}, {"id": "C0-208", "q": "C4 식물에서 캘빈 회로는 어느 세포에서 일어나는가?", "a": "유관속초세포"}, {"id": "C0-209", "q": "C4 식물에서 4탄소 화합물이 엽육세포→유관속초세포로 이동하는 통로는?", "a": "원형질연락사"}, {"id": "C0-210", "q": "C4 유관속초세포에서 CO₂를 방출한 뒤 생기는 3탄소 물질의 운명은?", "a": "피루브산 → ATP를 소모해 PEP로 재생 → 엽육세포로 복귀"}, {"id": "C0-211", "q": "C4 식물의 핵심 전략을 한 문장으로 쓰면?", "a": "탄소고정과 캘빈 회로를 서로 다른 세포에서 분리한다"}, {"id": "C0-212", "q": "C4 식물의 전략이 광호흡을 줄이는 이유는?", "a": "루비스코 주변 CO2 농도를 높여 O2 결합 가능성을 낮추기 때문"}, {"id": "C0-213", "q": "C4 식물에서 탄소고정과 캘빈 회로의 분리를 무엇이라 하는가?", "a": "공간적 분리"}, {"id": "C0-214", "q": "C4 식물 그림에서 꼭 외워야 할 두 세포는?", "a": "엽육세포와 유관속초세포"}, {"id": "C0-215", "q": "C4 식물은 왜 덥고 건조한 환경에 유리한가?", "a": "기공을 덜 열어도 CO2를 효과적으로 농축해 광호흡을 줄일 수 있기 때문"}, {"id": "C0-216", "q": "C4 식물의 단점은?", "a": "추가 ATP가 더 필요하다"}, {"id": "C0-217", "q": "C4 식물의 성장 속도가 빠를 수 있는 이유는?", "a": "광호흡 손실이 적어 고온 강광 환경에서 광합성 효율이 높기 때문"}, {"id": "C0-218", "q": "C4 식물에서 유관속초세포가 중요한 이유는?", "a": "루비스코와 캘빈 회로가 위치하는 CO2 농축 장소이기 때문"}, {"id": "C0-219", "q": "C4 유관속초세포가 순환적 전자흐름만 쓰는 이유는?", "a": "광계 II가 없어 — PEP 재생용 추가 ATP가 필요하기 때문"}, {"id": "C0-220", "q": "CAM 식물이란?", "a": "밤과 낮에 탄소고정 과정을 시간적으로 분리하는 식물"}, {"id": "C0-221", "q": "CAM은 무엇의 약자인가?", "a": "돌나물과 유기산대사(Crassulacean Acid Metabolism)"}, {"id": "C0-222", "q": "대표적 CAM 식물 예시는?", "a": "파인애플, 선인장, 다육식물"}, {"id": "C0-223", "q": "CAM 식물은 밤에 기공을 여는 이유는?", "a": "수분 손실을 줄이면서 CO2를 들이기 위해"}, {"id": "C0-224", "q": "CAM 식물은 낮에 기공을 닫는 이유는?", "a": "고온 건조 시 수분 손실을 막기 위해"}, {"id": "C0-225", "q": "CAM 식물은 밤에 흡수한 CO2를 무엇의 형태로 저장하는가?", "a": "유기산"}, {"id": "C0-226", "q": "CAM 식물이 밤에 CO₂를 고정하는 효소와 첫 산물은?", "a": "PEP 카르복실화효소 → 옥살아세트산 → 말산(액포 저장)"}, {"id": "C0-227", "q": "CAM 식물에서 저장된 유기산은 어디에 저장되는가?", "a": "액포"}, {"id": "C0-228", "q": "CAM 식물은 낮에 저장된 유기산으로부터 무엇을 방출하는가?", "a": "CO2"}, {"id": "C0-229", "q": "CAM 식물에서 캘빈 회로는 주로 언제 진행되는가?", "a": "낮"}, {"id": "C0-230", "q": "CAM 식물의 핵심 전략을 한 문장으로 쓰면?", "a": "탄소고정과 캘빈 회로를 서로 다른 시간대에 분리한다"}, {"id": "C0-231", "q": "CAM 식물의 전략이 광호흡을 줄이는 이유는?", "a": "낮에 기공을 닫은 상태에서도 내부 CO2 공급이 가능하기 때문"}, {"id": "C0-232", "q": "CAM 식물에서 탄소고정과 캘빈 회로의 분리를 무엇이라 하는가?", "a": "시간적 분리"}, {"id": "C0-233", "q": "CAM 식물과 C4 식물의 공통점은?", "a": "둘 다 먼저 유기산에 CO2를 결합시키고 루비스코 주변 CO2를 높여 광호흡을 줄인다"}, {"id": "C0-234", "q": "CAM 식물과 C4 식물의 차이 핵심은?", "a": "CAM은 시간적 분리, C4는 공간적 분리"}, {"id": "C0-235", "q": "CAM 식물 그림에서 꼭 외워야 할 키워드 3개는?", "a": "밤, 낮, 유기산 저장"}, {"id": "C0-236", "q": "CAM 식물이 건조지 적응 식물인 이유는?", "a": "밤에만 기공을 열어 물 손실을 최소화하기 때문"}, {"id": "C0-237", "q": "빛반응과 캘빈 회로를 비교하면?", "a": "빛반응은 ATP·NADPH·O2 생성, 캘빈 회로는 CO2 고정과 G3P 생성"}, {"id": "C0-238", "q": "엽록체 구조와 기능을 연결하면 스트로마는 무엇, 틸라코이드막은 무엇인가?", "a": "스트로마는 캘빈 회로, 틸라코이드막은 빛반응"}, {"id": "C0-239", "q": "선형 전자 흐름과 캘빈 회로를 연결하는 두 분자는?", "a": "ATP와 NADPH"}, {"id": "C0-240", "q": "광합성에서 물과 CO2의 역할을 비교하면?", "a": "물은 전자·H+ 공급원, CO2는 탄소 공급원"}, {"id": "C0-241", "q": "광합성에서 O2와 G3P의 차이는?", "a": "O2는 부산물, G3P는 유용한 유기물 전구체"}, {"id": "C0-242", "q": "광호흡과 캘빈 회로를 비교하면?", "a": "광호흡은 탄소와 에너지를 잃게 하고, 캘빈 회로는 탄소를 고정해 당을 만든다"}, {"id": "C0-243", "q": "C3·C4·CAM을 구분하는 핵심 기준은?", "a": "광호흡 회피 방식과 탄소고정 분리 방식"}, {"id": "C0-244", "q": "광계 II와 광계 I의 틸라코이드막 내 분포 차이는?", "a": "광계 II는 주로 그라나(쌓인) 틸라코이드, 광계 I·ATP 합성효소는 스트로마(비쌓인) 틸라코이드에 분포 — '고르게 분포'는 틀린 설명"}, {"id": "C0-245", "q": "캘빈 회로의 다른 이름은?", "a": "캘빈-벤슨 회로(Calvin-Benson cycle)"}, {"id": "C0-246", "q": "광합성 산물(G3P)의 이후 저장·수송 형태는?", "a": "포도당으로 조합되어 쓰이고, 남으면 엽록체에 전분(녹말)으로 저장 / 다른 조직으로는 주로 자당(수크로스) 형태로 수송"}]}, {"label": "12 세포분열", "cards": [{"id": "C1-0", "q": "세포 주기의 4단계 순서는?", "a": "G1기 - S기 - G2기 - M기"}, {"id": "C1-1", "q": "세포 주기 중 DNA 복제가 일어나는 시기는?", "a": "S기 (Synthesis phase)"}, {"id": "C1-2", "q": "세포 주기 중 단백질 합성과 세포 성장이 가장 활발한 시기는?", "a": "G1기"}, {"id": "C1-3", "q": "세포 주기 중 복제된 DNA의 이상 여부를 점검하고 분열을 준비하는 시기는?", "a": "G2기"}, {"id": "C1-4", "q": "세포 분열이 멈춘 정지 상태의 시기를 무엇이라 하는가?", "a": "G0기"}, {"id": "C1-5", "q": "체세포 분열(Mitosis)의 5단계 순서는?", "a": "전기 - 전중기 - 중기 - 후기 - 말기"}, {"id": "C1-6", "q": "염색질이 응축되어 염색체가 나타나기 시작하는 시기는?", "a": "전기 (Prophase)"}, {"id": "C1-7", "q": "핵막과 인이 사라지기 시작하는 시기는?", "a": "전기 (Prophase)"}, {"id": "C1-8", "q": "방추사가 형성되기 시작하는 시기는?", "a": "전기 (Prophase)"}, {"id": "C1-9", "q": "핵막이 완전히 소실되고 방추사가 동원체에 결합하는 시기는?", "a": "전중기 (Prometaphase)"}, {"id": "C1-10", "q": "방추사가 염색체에 결합하는 부위의 명칭은?", "a": "동원체 (Kinetochore)"}, {"id": "C1-11", "q": "중심절(centromere)과 동원체(kinetochore)의 차이는?", "a": "중심절=자매염색분체가 결합하는 DNA 부위 / 동원체=중심절에 형성되어 방추사가 부착하는 단백질 복합체 (같은 말이 아님)"}, {"id": "C1-12", "q": "염색체가 세포의 중앙(적도면)에 배열되는 시기는?", "a": "중기 (Metaphase)"}, {"id": "C1-13", "q": "염색체의 핵형 분석을 하기에 가장 좋은 시기는?", "a": "중기 (Metaphase)"}, {"id": "C1-14", "q": "자매 염색분체가 분리되어 양극으로 이동하는 시기는?", "a": "후기 (Anaphase)"}, {"id": "C1-15", "q": "염색분체를 끌어당기는 방추사의 구성 성분은?", "a": "미세소관 (Microtubule)"}, {"id": "C1-16", "q": "염색체가 다시 염색질로 풀리고 핵막이 재형성되는 시기는?", "a": "말기 (Telophase)"}, {"id": "C1-17", "q": "세포 주기 조절의 핵심 효소인 Cdk의 풀네임은?", "a": "사이클린 의존성 인산화효소 (Cyclin-dependent kinase)"}, {"id": "C1-18", "q": "Cdk가 활성화되기 위해 반드시 결합해야 하는 단백질은?", "a": "사이클린 (Cyclin)"}, {"id": "C1-19", "q": "세포 주기 중 '가장 중요한 검문소'로 불리는 지점은?", "a": "G1 검문소 (제한점, Restriction point)"}, {"id": "C1-20", "q": "G1 검문소에서 DNA 복제 시작(S기 진입)을 막는 억제 단백질은?", "a": "Rb 단백질 (Retinoblastoma protein)"}, {"id": "C1-21", "q": "Rb 단백질이 Cdk에 의해 인산화되면 해방되는 전사인자는?", "a": "E2F"}, {"id": "C1-22", "q": "DNA 손상을 감지하여 세포 주기를 멈추거나 사멸을 유도하는 단백질은?", "a": "p53 단백질"}, {"id": "C1-23", "q": "p53이 전사를 촉진하여 Cdk 활성을 억제하는 단백질은?", "a": "p21"}, {"id": "C1-24", "q": "M기(방추사) 검문소에서 모든 염색체가 방추사에 붙었는지 확인하는 복합체는?", "a": "APC/C (Anaphase-promoting complex)"}, {"id": "C1-25", "q": "APC/C에 의해 파괴되어 세퍼레이스(Separase)를 활성화시키는 단백질은?", "a": "시큐린 (Securin)"}, {"id": "C1-26", "q": "자매 염색분체를 묶어주고 있는 단백질 고리는?", "a": "코헤신 (Cohesin)"}, {"id": "C1-27", "q": "코헤신을 절단하여 염색분체 분리를 직접 수행하는 효소는?", "a": "세퍼레이스 (Separase)"}, {"id": "C1-28", "q": "동물세포의 세포질 분열 방식은?", "a": "수축환 형성을 통한 세포막 함입"}, {"id": "C1-29", "q": "동물세포 수축환을 구성하는 주요 미세필라멘트 성분은?", "a": "액틴과 마이오신"}, {"id": "C1-30", "q": "식물세포의 세포질 분열 방식은?", "a": "세포판(Cell plate) 형성"}, {"id": "C1-31", "q": "식물세포판 형성을 위해 소낭을 운반해오는 구조는?", "a": "프라그모플라스트 (Phragmoplast)"}, {"id": "C1-32", "q": "세균의 이분법(binary fission)이 진핵 유사분열과 다른 점은?", "a": "방추체와 핵막 붕괴 없이 분열 — 원형 염색체가 복제 후 세포막 성장과 함께 양쪽으로 분리"}, {"id": "C1-33", "q": "감수 분열의 목적은?", "a": "생식세포 형성 및 유전적 다양성 확보"}, {"id": "C1-34", "q": "감수 분열 결과 2n 세포는 어떤 핵상을 갖게 되는가?", "a": "n (반수체)"}, {"id": "C1-35", "q": "감수 1분열 전기에서 상동 염색체가 쌍을 이루어 접합하는 현상은?", "a": "시냅시스 (Synapsis)"}, {"id": "C1-36", "q": "접합된 상동 염색체 쌍을 무엇이라 부르는가?", "a": "2가 염색체 (또는 4분체)"}, {"id": "C1-37", "q": "감수 1분열 전기에 상동 염색체 사이에서 유전자가 교환되는 현상은?", "a": "교차 (Crossing over)"}, {"id": "C1-38", "q": "교차가 일어나는 지점을 무엇이라 하는가?", "a": "키아즈마 (Chiasmata)"}, {"id": "C1-39", "q": "감수 1분열 후기에 분리되는 구조는?", "a": "상동 염색체"}, {"id": "C1-40", "q": "감수 2분열 후기에 분리되는 구조는?", "a": "자매 염색분체"}, {"id": "C1-41", "q": "유전적 다양성을 만드는 3가지 기전은?", "a": "교차, 상동 염색체의 무작위 배열, 무작위 수정"}, {"id": "C1-42", "q": "감수 1분열 전기의 5세부 단계 순서는?", "a": "세사기 - 접합기 - 태사기 - 복사기 - 이동기"}, {"id": "C1-43", "q": "상동 염색체 접합(시냅시스)이 일어나는 단계는?", "a": "접합기 (Zygotene)"}, {"id": "C1-44", "q": "실제 교차(유전자 교환)가 활발히 일어나는 단계는?", "a": "태사기 (Pachytene)"}, {"id": "C1-45", "q": "여성의 제1난모세포가 출생 전 멈춰있는 시기는?", "a": "감수 1분열 전기 복사기 (Diplotene)"}, {"id": "C1-46", "q": "교차된 염색체들이 살짝 떨어지며 키아즈마가 관찰되는 단계는?", "a": "복사기 (Diplotene)"}, {"id": "C1-47", "q": "염색체 비분리(Nondisjunction)란?", "a": "분열 시 염색체가 양극으로 정상적으로 분리되지 않는 현상"}, {"id": "C1-48", "q": "감수 1분열 비분리 시 생성되는 생식세포 핵상 구성은?", "a": "n+1, n+1, n-1, n-1 (모두 비정상)"}, {"id": "C1-49", "q": "감수 2분열 비분리 시 생성되는 생식세포 핵상 구성은?", "a": "n+1, n-1, n, n (절반은 정상)"}, {"id": "C1-50", "q": "21번 염색체가 3개인 질환은?", "a": "다운 증후군"}, {"id": "C1-51", "q": "성염색체 구성이 XXY인 질환은?", "a": "클라인펠터 증후군"}, {"id": "C1-52", "q": "성염색체 구성이 XO인 질환은?", "a": "터너 증후군"}, {"id": "C1-53", "q": "암세포가 좁은 공간에서도 계속 분열하는 특성은?", "a": "밀도 의존성 억제 상실"}, {"id": "C1-54", "q": "암세포가 바닥에 붙지 않아도 분열하는 특성은?", "a": "발판 의존성 상실"}, {"id": "C1-55", "q": "암세포가 혈관을 새로 만들어 영양을 공급받는 현상은?", "a": "혈관 신생 (Angiogenesis)"}, {"id": "C1-56", "q": "양성종양과 악성종양의 차이는?", "a": "양성=국소에 머묾 / 악성=주변 조직 침윤·전이 가능"}, {"id": "C1-57", "q": "암세포가 원래 위치를 벗어나 멀리 퍼지는 과정은?", "a": "전이(metastasis)"}, {"id": "C1-58", "q": "정상세포가 암세포로 바뀌는 과정을 무엇이라 하는가?", "a": "형질전환(transformation)"}, {"id": "C1-59", "q": "원형암유전자(Proto-oncogene)가 돌연변이로 활성화된 상태는?", "a": "암유전자 (Oncogene)"}, {"id": "C1-60", "q": "대표적인 암유전자 예시는?", "a": "Ras, Myc"}, {"id": "C1-61", "q": "대표적인 종양억제유전자 예시는?", "a": "p53, Rb, BRCA1"}, {"id": "C1-62", "q": "세포 사멸(Apoptosis)의 정의는?", "a": "프로그램된 세포 죽음"}, {"id": "C1-63", "q": "사멸 신호 시 미토콘드리아에서 방출되는 인자는?", "a": "시토크롬 c"}, {"id": "C1-64", "q": "시토크롬 c와 Apaf-1이 결합하여 형성하는 복합체는?", "a": "아폽토좀 (Apoptosome)"}, {"id": "C1-65", "q": "세포 사멸을 직접 집행하는 단백질 분해효소 군은?", "a": "카스파아제 (Caspase)"}, {"id": "C1-66", "q": "세포 사멸 시 세포막에서 뒤집혀 노출되는 인지질은?", "a": "포스파티딜세린 (PS)"}, {"id": "C1-67", "q": "체세포 분열 중 DNA 상대량이 1에서 2로 늘어나는 시기는?", "a": "S기"}, {"id": "C1-68", "q": "G2기 세포의 DNA 상대량은 G1기 세포의 몇 배인가?", "a": "2배"}, {"id": "C1-69", "q": "중기 염색체 1개는 몇 개의 염색분체로 구성되는가?", "a": "2개"}, {"id": "C1-70", "q": "방추사가 동원체에 붙는 방향을 결정하는 단백질 복합체는?", "a": "동원체 (Kinetochore)"}, {"id": "C1-71", "q": "방추사 미세소관 중 염색체에 붙지 않고 세포 길이를 늘리는 것은?", "a": "극성 미세소관"}, {"id": "C1-72", "q": "중심체(Centrosome)는 몇 개의 중심립으로 구성되는가?", "a": "2개 (직각 배열)"}, {"id": "C1-73", "q": "중심립의 미세소관 배열 구조는?", "a": "9+0 (3개씩 9쌍)"}, {"id": "C1-74", "q": "미세소관의 단량체는?", "a": "알파 및 베타 튜불린 이량체"}, {"id": "C1-75", "q": "미세소관 중합 시 소모되는 에너지는?", "a": "GTP"}, {"id": "C1-76", "q": "식물세포에는 존재하지 않으나 동물세포 분열 시 나타나는 성상체 구조는?", "a": "별모양체 (Aster)"}, {"id": "C1-77", "q": "세포 주기를 연구할 때 세포 내 DNA 양을 측정하는 장비는?", "a": "유세포 분석기 (FACS)"}, {"id": "C1-78", "q": "유세포 분석 결과 세포 수가 가장 많은 구간은 보통 어느 기인가?", "a": "G1기 (머무는 시간이 가장 김)"}, {"id": "C1-79", "q": "콜히친(Colchicine) 처리 시 세포 분열은 어느 단계에서 멈추는가?", "a": "중기 (방추사 형성 방해)"}, {"id": "C1-80", "q": "택솔(Taxol)의 작용 기전은?", "a": "미세소관 탈중합 억제 (방추사를 굳혀버림)"}, {"id": "C1-81", "q": "MPF의 정체는?", "a": "Cyclin B + Cdk1 복합체"}, {"id": "C1-82", "q": "MPF의 농도가 정점을 찍는 시기는?", "a": "M기 중기"}, {"id": "C1-83", "q": "[2024 동신대] 성숙 촉진 인자(MPF, Maturation Promoting Factor)의 존재를 최초로 증명한 생물학 실험에서 사용된 모델 생물과 실험 방식은?", "a": "개구리 M기 난모세포의 세포질을 G2기 난모세포에 주사"}, {"id": "C1-84", "q": "MPF를 불활성화시키는 방법은?", "a": "사이클린 B의 유비퀴틴화 및 파괴"}, {"id": "C1-85", "q": "단백질 파괴를 유도하는 표지 물질은?", "a": "유비퀴틴 (Ubiquitin)"}, {"id": "C1-86", "q": "유비퀴틴화된 단백질을 실제로 분해하는 거대 복합체는?", "a": "프로테아좀 (Proteasome)"}, {"id": "C1-87", "q": "DNA 복제 시 지연가닥에서 만들어지는 짧은 조각은?", "a": "오카자키 절편"}, {"id": "C1-88", "q": "오카자키 절편들을 연결해주는 효소는?", "a": "DNA 리게이스"}, {"id": "C1-89", "q": "텔로미어(Telomere)의 역할은?", "a": "염색체 말단 보호 및 정보 소실 방지"}, {"id": "C1-90", "q": "암세포에서 텔로미어 길이를 유지해주는 효소는?", "a": "텔로머레이스 (Telomerase)"}, {"id": "C1-91", "q": "난할(Cleavage)의 특징은?", "a": "G1, G2기 없이 S, M기만 반복하여 세포 크기가 작아짐"}, {"id": "C1-92", "q": "난할 결과 만들어진 작은 세포 하나하나를 무엇이라 하는가?", "a": "할구 (Blastomere)"}, {"id": "C1-93", "q": "상동 염색체가 쌍을 이루고 있는 상태의 핵상은?", "a": "2n"}, {"id": "C1-94", "q": "자매 염색분체끼리의 유전 정보는 동일한가?", "a": "예 (돌연변이 제외)"}, {"id": "C1-95", "q": "상동 염색체끼리의 유전 정보는 동일한가?", "a": "아니오 (대립 유전자가 다를 수 있음)"}, {"id": "C1-96", "q": "감수 1분열 결과 핵상은 어떻게 변하는가?", "a": "2n -> n"}, {"id": "C1-97", "q": "감수 2분열 결과 DNA 양은 어떻게 변하는가?", "a": "절반으로 감소"}, {"id": "C1-98", "q": "사람의 정자 형성 과정 중 감수 1분열을 마친 세포는?", "a": "제2정모세포"}, {"id": "C1-99", "q": "사람의 난자 형성 과정 중 감수 2분열 중기에 멈춰 배란되는 세포는?", "a": "제2난모세포"}, {"id": "C1-100", "q": "감수 분열 중 자매 염색분체가 분리되는 시기는?", "a": "감수 2분열 후기"}, {"id": "C1-101", "q": "체세포 분열과 감수 2분열의 공통점은?", "a": "자매 염색분체 분리"}, {"id": "C1-102", "q": "콜히친은 미세소관의 무엇을 방해하는가?", "a": "중합 (조립)"}, {"id": "C1-103", "q": "감수 1분열 전기 중 시냅토네마 복합체가 형성되는 시기는?", "a": "접합기 (Zygotene)"}, {"id": "C1-104", "q": "접합사(Synaptonemal complex)의 역할은?", "a": "상동 염색체를 정교하게 결착시켜 교차를 도움"}, {"id": "C1-105", "q": "중심체 복제는 세포 주기 중 어느 시기에 일어나는가?", "a": "S기 (DNA 복제와 동시)"}, {"id": "C1-106", "q": "염색체 응축을 주도하는 단백질은?", "a": "콘덴신 (Condensin)"}, {"id": "C1-107", "q": "동원체 부위에 방추사가 부착되도록 돕는 단백질은?", "a": "코헤신 (그 자리에 남아있음)"}, {"id": "C1-108", "q": "M기 후기에 양극으로 이동하는 동력 단백질(모터)은?", "a": "다이닌, 키네신"}, {"id": "C1-109", "q": "후기 A(Anaphase A)란?", "a": "염색체가 극 쪽으로 이동하는 것"}, {"id": "C1-110", "q": "후기 B(Anaphase B)란?", "a": "극성 미세소관에 의해 양극 사이가 멀어지는 것"}, {"id": "C1-111", "q": "중기판(Metaphase plate)이란?", "a": "염색체들이 배열되는 가상의 중앙 평면"}, {"id": "C1-112", "q": "다배체(Polyploidy)란?", "a": "염색체 세트 전체가 배수성으로 증가한 상태 (예: 3n, 4n)"}, {"id": "C1-113", "q": "이수성(Aneuploidy)이란?", "a": "특정 번호의 염색체 개수만 비정상인 상태 (예: 2n+1) — 이배체(diploid, 2n)와 혼동 금지"}, {"id": "C1-114", "q": "상염색체 비분리에 의한 18번 삼염색체 증후군은?", "a": "에드워드 증후군"}, {"id": "C1-115", "q": "상염색체 비분리에 의한 13번 삼염색체 증후군은?", "a": "파타우 증후군"}, {"id": "C1-116", "q": "세포 자살 시 핵이 쪼개지는 현상은?", "a": "핵붕괴 (Karyorrhexis)"}, {"id": "C1-117", "q": "Bcl-2 패밀리 중 사멸을 촉진하는 대표 인자는?", "a": "Bax, Bak"}, {"id": "C1-118", "q": "세포 주기를 진행시키는 외부 신호 물질(성장인자)은?", "a": "미토젠 (Mitogen)"}, {"id": "C1-119", "q": "p53 유전자에 변이가 생기면 나타나는 현상은?", "a": "손상된 DNA를 가진 세포가 계속 분열하여 암 발생"}, {"id": "C1-120", "q": "DNA 복제 오류를 수정하는 기전은?", "a": "미스매치 수선 (Mismatch repair)"}, {"id": "C1-121", "q": "M기 검문소에서 아직 방추사가 붙지 않은 '텅 빈 동원체'에 결합하여 대기 신호를 보내는 핵심 단백질은?", "a": "Mad2"}, {"id": "C1-122", "q": "Mad2 단백질이 직접 결합하여 활성을 억제해버리는 표적 단백질은?", "a": "Cdc20"}, {"id": "C1-123", "q": "Cdc20이 정상적으로 결합해야만 활성화되어 분열 후기(Anaphase) 진입을 이끄는 거대 효소 복합체는?", "a": "APC/C (후기촉진복합체)"}, {"id": "C1-124", "q": "모든 동원체에 방추사가 결합하여 '장력(Tension)'이 발생하면 활성을 잃고 동원체에서 떨어져 나가는 단백질은?", "a": "Mad2"}, {"id": "C1-125", "q": "DNA 손상 시 가장 먼저 손상 부위를 인식하여 비상벨을 울리는 마스터 인산화효소(Kinase) 쌍은?", "a": "ATM / ATR"}, {"id": "C1-126", "q": "ATM/ATR에 의해 인산화되어 활성화되며, 종양 억제 유전자의 제왕이라 불리는 전사인자는?", "a": "p53 단백질"}, {"id": "C1-127", "q": "M기 진입 전, MPF(Cdk1)에 억제적 인산기를 붙여 분열기 진입을 막고 대기시키는 효소는?", "a": "Wee1 키네이스"}, {"id": "C1-128", "q": "DNA 복제가 완전히 끝난 후, MPF의 억제적 인산기를 떼어내어 M기 진입의 최종 방아쇠를 당기는 효소는?", "a": "Cdc25 포스파테이스"}, {"id": "C1-129", "q": "DNA 복제 과정에서 S기가 한 주기당 정확히 '단 1회'만 일어나도록 G1기에 복제 원점에 결합하여 면허(Licensing)를 부여하는 복합체는?", "a": "MCM 헬리케이스"}, {"id": "C1-130", "q": "감수 1분열 후기에 코헤신이 절단될 때, 동원체 부위의 코헤신만은 잘리지 않도록 세퍼레이스로부터 보호하는 단백질은?", "a": "슈고신 (Shugoshin)"}, {"id": "C1-131", "q": "세포가 바닥에 부착되지 않으면 분열하지 않는 '발판 의존성' 신호를 세포 내로 전달하는 세포막 수용체 단백질은?", "a": "인테그린 (Integrin)"}, {"id": "C1-132", "q": "옆 세포와 물리적으로 맞닿으면 분열을 멈추는 '밀도 의존성 억제(접촉 저해)' 신호에 관여하는 세포 연접 단백질은?", "a": "캐드헤린 (Cadherin)"}, {"id": "C1-133", "q": "G1 검문소를 무사히 통과하기 위해, 외부에서 주어지는 성장 인자(Growth Factor)를 수용하는 가장 대표적인 수용체 종류는?", "a": "수용체 티로신 키네이스 (RTK)"}, {"id": "C1-134", "q": "상처가 났을 때 혈소판이 방출하여 결합조직 세포(섬유아세포)의 분열을 강력하게 자극하는 성장 인자는?", "a": "PDGF (혈소판 유래 성장 인자)"}, {"id": "C1-135", "q": "포유류 세포 주기를 순차적으로 진행시키는 주된 사이클린(Cyclin) 4가지의 발현 순서는?", "a": "Cyclin D → Cyclin E → Cyclin A → Cyclin B (암기: DEAB)"}, {"id": "C1-136", "q": "G1기에 주로 발현되어 세포가 분열 주기에 진입하도록 이끄는 G1-Cdk의 구성은?", "a": "Cyclin D + Cdk4 또는 Cdk6"}, {"id": "C1-137", "q": "G1기 후반에 발현되어 제한점(Restriction point)을 통과하고 S기 진입을 결정짓는 G1/S-Cdk의 구성은?", "a": "Cyclin E + Cdk2"}, {"id": "C1-138", "q": "S기 내내 활성화되어 DNA 복제를 직접적으로 개시하는 S-Cdk의 구성은?", "a": "Cyclin A + Cdk2"}, {"id": "C1-139", "q": "G2기를 거쳐 M기 진입을 폭발적으로 주도하는 M-Cdk (MPF)의 구성은?", "a": "Cyclin B + Cdk1"}, {"id": "C1-140", "q": "G1-Cdk (Cyclin D-Cdk4/6)가 가장 먼저 표적으로 삼아 인산화시켜 무력화시키는 단백질은?", "a": "Rb 단백질 (인산화되면 E2F를 놓아줌)"}, {"id": "C1-141", "q": "S-Cdk (Cyclin A 복합체)가 DNA 복제가 '단 한 번만' 일어나도록 인산화하여 억제/파괴하는 표적 단백질은?", "a": "ORC(복제원점 인식 복합체) 및 Cdc6"}, {"id": "C1-142", "q": "M-Cdk (Cyclin B-Cdk1)가 핵막을 붕괴시키기 위해 인산화하는 표적 단백질은?", "a": "핵층 단백질 (Nuclear lamins)"}, {"id": "C1-143", "q": "M기 후기에 분열기를 끝내기 위해 M-사이클린(Cyclin B)을 유비퀴틴화하여 파괴하는 단백질 복합체는?", "a": "APC/C (후기촉진복합체)"}, {"id": "C1-144", "q": "G1기에서 S기로 넘어갈 때, 주기를 억제하고 있던 CKI(예: p27 단백질)를 유비퀴틴화하여 파괴함으로써 S기 진입을 돕는 단백질 복합체는?", "a": "SCF 복합체"}, {"id": "C1-145", "q": "동원체(Centromere) 영역에서 방추사 결합의 뼈대 역할을 하는 특수 히스톤 변이체는?", "a": "CENP-A (Centromere protein A)"}, {"id": "C1-146", "q": "세포융합 실험(cell fusion)이 보여준 것은?", "a": "S기 세포와 G1 세포를 융합하면 G1 핵에서도 DNA 합성이 유도됨 → 세포질 속 조절인자가 주기 진행을 유도한다는 증거"}, {"id": "C1-147", "q": "세포주기가 G0에 머무는 대표적 세포는?", "a": "분화가 끝난 신경세포·근육세포(성숙 후 분열 정지)"}, {"id": "C1-148", "q": "사이토칼라신 B(cytochalasin B)의 작용과 결과는?", "a": "미세섬유(액틴) 중합을 억제 → 수축환 형성·세포질분열 저해 (방추사=미세소관에는 작용하지 않음 — 함정 주의)"}, {"id": "C1-149", "q": "텔로미어가 복제를 거듭할수록 짧아지는 이유는?", "a": "말단 복제 문제 — DNA 중합효소가 지연가닥 5' 끝을 완성하지 못해 매 복제마다 말단이 짧아짐(텔로머레이스로 보완)"}]}]}, {"id": "D", "name": "감수분열과 멘델 유전", "chapters": [{"label": "13 성·생활사와 감수분열", "cards": [{"id": "D0-0", "q": "한 세대에서 다음 세대로 형질이 전달되는 현상은?", "a": "유전(heredity)"}, {"id": "D0-1", "q": "부모가 자손에게 물려주는 유전단위의 명칭은?", "a": "유전자(gene)"}, {"id": "D0-2", "q": "유전정보가 기록된 물질은?", "a": "DNA"}, {"id": "D0-3", "q": "DNA를 구성하는 기본 단위체 4종이 속한 범주는?", "a": "뉴클레오타이드"}, {"id": "D0-4", "q": "자손에게 전달되는 정보는 각 유전자의 무엇의 형태로 주어지는가?", "a": "DNA 뉴클레오타이드 서열"}, {"id": "D0-5", "q": "유전형질 전달의 기초가 되는 과정은?", "a": "DNA 복제"}, {"id": "D0-6", "q": "동식물에서 유전자를 한 세대에서 다음 세대로 전달하는 운반체는?", "a": "생식세포(gamete)"}, {"id": "D0-7", "q": "진핵세포의 DNA는 핵 안에서 무엇으로 응축되어 존재하는가?", "a": "염색체"}, {"id": "D0-8", "q": "한 염색체에 포함될 수 있는 것은?", "a": "수백~수천 개의 유전자"}, {"id": "D0-9", "q": "염색체에서 유전자의 특정 위치를 무엇이라 하는가?", "a": "유전좌위(locus)"}, {"id": "D0-10", "q": "무성생식의 핵심 특징은?", "a": "한 개체가 부모 하나로서 자신과 유전적으로 동일한 자손을 만든다"}, {"id": "D0-11", "q": "무성생식의 대표적인 세 가지 방식은?", "a": "이분법(단세포 원핵생물), 출아법(효모·히드라·말미잘), 영양생식(식물의 뿌리·줄기·잎)"}, {"id": "D0-12", "q": "무성생식에서도 가끔 생기는 예외적 변이는?", "a": "돌연변이"}, {"id": "D0-13", "q": "응축된 염색체를 나열한 것을 무엇이라 하는가?", "a": "핵형(karyotype)"}, {"id": "D0-14", "q": "같은 길이, 같은 동원체 위치, 같은 염색 양상을 가지는 한 쌍의 염색체는?", "a": "상동염색체"}, {"id": "D0-15", "q": "상동염색체 쌍의 두 염색체가 공통적으로 가지는 것은?", "a": "같은 유전적 특성을 조절하는 유전자들"}, {"id": "D0-16", "q": "상동염색체가 같은 유전좌위에 가질 수 있는 다른 버전의 유전자는?", "a": "대립유전자(allele)"}, {"id": "D0-17", "q": "사람의 상염색체 수는?", "a": "44개"}, {"id": "D0-18", "q": "사람의 성염색체 수는?", "a": "2개"}, {"id": "D0-19", "q": "사람 체세포 46개 염색체가 두 벌인 이유는?", "a": "어머니에게서 온 한 벌과 아버지에게서 온 한 벌을 각각 물려받기 때문"}, {"id": "D0-20", "q": "한 벌의 염색체 수를 기호로 나타내면?", "a": "n"}, {"id": "D0-21", "q": "염색체 두 벌을 가진 세포를 무엇이라 하는가?", "a": "2배체 세포(diploid cell)"}, {"id": "D0-22", "q": "염색체 한 벌만 가진 세포를 무엇이라 하는가?", "a": "반수체 세포(haploid cell)"}, {"id": "D0-23", "q": "사람의 체세포 염색체 수를 배수식으로 쓰면?", "a": "2n = 46"}, {"id": "D0-24", "q": "사람의 생식세포 염색체 수를 배수식으로 쓰면?", "a": "n = 23"}, {"id": "D0-25", "q": "체세포가 2n=10인 생물의 생식세포(n=5)가 갖는 상염색체 수는?", "a": "4개 (n=5 중 성염색체 1개 제외)"}, {"id": "D0-26", "q": "수정되지 않은 사람 난자가 가지는 성염색체는?", "a": "X"}, {"id": "D0-27", "q": "사람 정자가 가질 수 있는 성염색체 두 종류는?", "a": "X 또는 Y"}, {"id": "D0-28", "q": "두 생식세포의 융합을 무엇이라 하는가?", "a": "수정(fertilization)"}, {"id": "D0-29", "q": "수정란의 다른 이름은?", "a": "접합자(zygote)"}, {"id": "D0-30", "q": "접합자가 2배체인 이유는?", "a": "모계와 부계에서 온 두 벌의 반수체 염색체 세트를 함께 가지기 때문"}, {"id": "D0-31", "q": "유사분열로 만들어지지 않는 유일한 세포 유형은?", "a": "생식세포"}, {"id": "D0-32", "q": "난소와 정소에서 배우자를 만드는 특별한 세포는?", "a": "생식세포(germ cell)"}, {"id": "D0-33", "q": "생식세포가 2배체라면 세대를 거치며 생길 문제는?", "a": "염색체 수가 세대마다 계속 증가한다"}, {"id": "D0-34", "q": "유성생식 생물에서 염색체 수 증가가 일어나지 않는 이유는?", "a": "감수분열이 배우자의 염색체 수를 반으로 줄이기 때문"}, {"id": "D0-35", "q": "감수분열과 수정이 교대로 일어나는 의미는?", "a": "염색체 수를 세대 사이에 일정하게 유지한다"}, {"id": "D0-36", "q": "성생활 주기에서 핵심적으로 교대하는 두 과정은?", "a": "감수분열과 수정"}, {"id": "D0-37", "q": "감수분열의 큰 목적은?", "a": "염색체 세트 수를 반으로 줄여 반수체 세포를 만드는 것"}, {"id": "D0-38", "q": "감수분열의 여러 단계는 무엇과 유사한가?", "a": "유사분열의 해당 단계"}, {"id": "D0-39", "q": "감수분열은 몇 번의 연속적인 분열로 이루어지는가?", "a": "두 번(감수 I, 감수 II)"}, {"id": "D0-40", "q": "감수분열 전 DNA 복제는 언제 일어나는가?", "a": "감수 I 시작 전 간기"}, {"id": "D0-41", "q": "감수 II 전에는 DNA 복제가 일어나는가?", "a": "아니오"}, {"id": "D0-42", "q": "감수 I과 감수 II의 핵심 차이는?", "a": "감수 I은 상동염색체 분리, 감수 II는 자매염색분체 분리"}, {"id": "D0-43", "q": "감수 I과 감수 II를 분열 성격으로 부르면?", "a": "감수 I=환원분열(2n→n, 상동염색체 분리) / 감수 II=동형분열(n→n, 자매염색분체 분리)"}, {"id": "D0-44", "q": "감수 I이 끝난 뒤 각 딸세포의 염색체 수는?", "a": "반수체"}, {"id": "D0-45", "q": "감수 I 종료 시 각 염색체는 복제된 상태인가?", "a": "예, 자매염색분체 2개로 이루어져 있다"}, {"id": "D0-46", "q": "감수 II 종료 시 각 염색체는 복제된 상태인가?", "a": "아니오, 자매염색분체가 분리되어 비복제 상태이다"}, {"id": "D0-47", "q": "하나의 부모세포가 감수분열을 마치면 최종적으로 몇 개의 딸세포가 생기는가?", "a": "4개"}, {"id": "D0-48", "q": "감수분열 최종 산물 4개가 공통적으로 가지는 염색체 세트는?", "a": "비복제된 반수체 염색체 세트"}, {"id": "D0-49", "q": "감수분열 최종 딸 id": "D0-130", "q": "감수분열의 딸세포 수와 유전적 구성은?", "a": "4개, 유전적으로 서로 다름"}, {"id": "D0-131", "q": "유사분열 후 딸세포의 염색체 수는 부모세포와 비교해 어떤가?", "a": "같다"}, {"id": "D0-132", "q": "감수분열 후 딸세포의 염색체 수는 부모세포와 비교해 어떤가?", "a": "절반이다"}, {"id": "D0-133", "q": "유사분열에서 중기판에 배열되는 것은?", "a": "개별 염색체"}, {"id": "D0-134", "q": "감수분열 중기 I에서 중기판에 배열되는 것은?", "a": "상동염색체쌍"}, {"id": "D0-135", "q": "유사분열 후기에서 분리되는 것은?", "a": "자매염색분체"}, {"id": "D0-136", "q": "감수분열 후기 I에서 분리되는 것은?", "a": "상동염색체"}, {"id": "D0-137", "q": "감수분열 후기 II에서 분리되는 것은?", "a": "자매염색분체"}, {"id": "D0-138", "q": "동식균류에서 유사분열의 역할 3가지는?", "a": "생장, 수선, 일부 균류의 무성생식 세포 생성"}, {"id": "D0-139", "q": "배우체 식물에서 유사분열이 하는 역할은?", "a": "생식세포 생산"}, {"id": "D0-140", "q": "감수분열의 역할 2가지는?", "a": "생식세포/포자 형성, 염색체 수 감소와 유전적 다양성 제공"}, {"id": "D0-141", "q": "정자형성(spermatogenesis)의 최종 산물 수는?", "a": "정자 4개 (모두 기능성)"}, {"id": "D0-142", "q": "난자형성(oogenesis)의 최종 산물 수는?", "a": "난세포 1개 + 극체(polar body) 3개 (극체는 퇴화)"}, {"id": "D0-143", "q": "정자형성과 난자형성의 공통점은?", "a": "감수분열로 생기는 세포 수가 4개라는 점 (정자=4 기능 / 난자=1 기능+극체 3)"}, {"id": "D0-144", "q": "비분리(nondisjunction)란?", "a": "감수분열에서 상동염색체(감수 I) 또는 자매염색분체(감수 II)가 분리되지 않는 것 → 이수성(aneuploidy) 초래"}, {"id": "D0-145", "q": "성생활 주기에서 형성된 유전적 변이가 기여하는 것은?", "a": "진화"}, {"id": "D0-146", "q": "자손에게 다양성을 부여하는 세 가지 기전은?", "a": "염색체의 독립적 분리, 교차, 무작위 수정"}, {"id": "D0-147", "q": "독립적 분리가 일어나는 핵심 단계는?", "a": "중기 I"}, {"id": "D0-148", "q": "독립적 분리의 결과 첫 번째 감수분열에서 각 딸세포는 무엇을 받는가?", "a": "각 상동염색체쌍 중 모계 또는 부계 염색체 하나씩"}, {"id": "D0-149", "q": "독립적 분리로 가능한 배우자 조합 수를 일반식으로 쓰면?", "a": "2^n"}, {"id": "D0-150", "q": "사람에서 독립적 분리만 고려한 배우자 종류 수는?", "a": "2^23"}, {"id": "D0-151", "q": "2^23은 대략 얼마인가?", "a": "약 840만"}, {"id": "D0-152", "q": "무작위 수정의 의미는?", "a": "어떤 정자와 어떤 난자가 만날지 무작위라는 것"}, {"id": "D0-153", "q": "사람에서 무작위 수정과 독립적 분리만 계산한 접합자 수는?", "a": "약 70조 개"}, {"id": "D0-154", "q": "70조 개를 식으로 쓰면?", "a": "2^23 × 2^23"}, {"id": "D0-155", "q": "독립적 분리와 무작위 수정만으로도 엄청난 다양성이 생기는 이유는?", "a": "부모 양쪽 배우자 조합이 기하급수적으로 많기 때문"}, {"id": "D0-156", "q": "교차가 독립적 분리와 다른 점은?", "a": "염색체 내부 유전자 조합 자체를 바꾼다"}, {"id": "D0-157", "q": "독립적 분리와 교차의 공통점은?", "a": "둘 다 감수분열이 자손의 유전적 다양성을 높이는 기전이다"}, {"id": "D0-158", "q": "감수분열 단계 중 상동염색체 접합이 일어나는 단계는?", "a": "전기 I"}, {"id": "D0-159", "q": "감수분열 단계 중 상동염색체쌍이 중기판에 정렬되는 단계는?", "a": "중기 I"}, {"id": "D0-160", "q": "감수분열 단계 중 상동염색체가 서로 갈라지는 단계는?", "a": "후기 I"}, {"id": "D0-161", "q": "감수분열 단계 중 자매염색분체가 중기판에 정렬되는 단계는?", "a": "중기 II"}, {"id": "D0-162", "q": "감수분열 단계 중 자매염색분체가 갈라지는 단계는?", "a": "후기 II"}, {"id": "D0-163", "q": "감수분열 단계 중 DNA 복제가 일어나는 시점은?", "a": "감수 I 전 간기"}, {"id": "D0-164", "q": "감수분열 단계 중 DNA 복제가 일어나지 않는 구간은?", "a": "감수 I과 감수 II 사이"}, {"id": "D0-165", "q": "감수분열에서 자매염색분체가 한동안 붙어 있게 하는 구조적 근거는?", "a": "코헤신에 의한 자매 염색분체 결합"}, {"id": "D0-166", "q": "후기 I까지 자매염색분체가 함께 움직이는 이유는?", "a": "동원체 부위 결합이 유지되기 때문"}, {"id": "D0-167", "q": "감수분열의 핵심 요약을 한 문장으로 하면?", "a": "감수 I에서 상동염색체를, 감수 II에서 자매염색분체를 분리한다"}, {"id": "D0-168", "q": "감수분열 최종 딸세포가 부모세포와 유전적으로 다른 직접 이유 2가지는?", "a": "교차와 독립적 분리"}, {"id": "D0-169", "q": "감수분열이 없었다면 유성생식에서 어떤 문제가 생기는가?", "a": "세대가 지날수록 염색체 수가 계속 증가한다"}, {"id": "D0-170", "q": "수정이 하는 일은?", "a": "두 반수체 세트를 결합해 2배체 상태를 회복한다"}, {"id": "D0-171", "q": "유성생식 생활사의 3가지 유형은?", "a": "① 2배체 우세형(동물): 성체 2n, 배우자만 반수체(감수분열로 직접 형성) ② 반수체 우세형(대부분 균류·일부 원생생물·조류): 성체 n, 접합자만 2n이며 곧바로 감수분열 ③ 세대교번형(식물·일부 조류): 2n 포자체와 n 배우체가 교대"}, {"id": "D0-172", "q": "식물의 세대교번(alternation of generations) 흐름은?", "a": "포자체(2n) → 감수분열 → 포자(n) → (발생) 배우체(n) → 배우자(n) → 수정 → 접합자(2n) → 포자체(2n)"}, {"id": "D0-173", "q": "동물과 식물에서 '배우자'를 만드는 분열 방식의 차이는?", "a": "동물=감수분열로 배우자를 직접 생성 / 식물=반수체 배우체가 체세포분열(유사분열)로 배우자를 생성"}]}, {"label": "14 멘델 유전학", "cards": [{"id": "D1-0", "q": "멘델 유전학에서 character란?", "a": "개체 간 차이가 나타나는 특징"}, {"id": "D1-1", "q": "멘델 유전학에서 trait란?", "a": "하나의 character에 대한 구체적 변이"}, {"id": "D1-2", "q": "멘델이 실험 재료로 완두를 선택한 이유 3가지는?", "a": "구별되는 형질이 뚜렷함, 세대가 짧음, 교배를 인위적으로 조절하기 쉬움"}, {"id": "D1-3", "q": "여러 세대 자가수분해도 같은 형질만 나오는 계통을 무엇이라 하는가?", "a": "순종(true-breeding)"}, {"id": "D1-4", "q": "서로 다른 형질을 가진 순종끼리 교배시키는 것을 무엇이라 하는가?", "a": "잡종형성(hybridization)"}, {"id": "D1-5", "q": "잡종형성에서 부모 세대를 무엇이라 하는가?", "a": "P 세대"}, {"id": "D1-6", "q": "P 세대의 첫 자손 세대를 무엇이라 하는가?", "a": "F1 세대"}, {"id": "D1-7", "q": "F1을 자가교배해 얻는 다음 세대를 무엇이라 하는가?", "a": "F2 세대"}, {"id": "D1-8", "q": "유전자형이 같은 대립유전자 두 개를 가진 개체는?", "a": "동형접합체(homozygote)"}, {"id": "D1-9", "q": "유전자형이 서로 다른 대립유전자 두 개를 가진 개체는?", "a": "이형접합체(heterozygote)"}, {"id": "D1-10", "q": "겉으로 관찰되는 형질은?", "a": "표현형(phenotype)"}, {"id": "D1-11", "q": "실제로 가진 대립유전자 조합은?", "a": "유전자형(genotype)"}, {"id": "D1-12", "q": "겉으로 우성 표현형을 보이는 개체의 정확한 유전자형을 알아볼 때 쓰는 교배는?", "a": "검정교배(testcross)"}, {"id": "D1-13", "q": "검정교배의 상대 개체 유전자형은?", "a": "열성 동형접합"}, {"id": "D1-14", "q": "검정교배 결과 자손이 모두 우성 표현형이면 미지 개체 유전자형은?", "a": "우성 동형접합"}, {"id": "D1-15", "q": "검정교배 결과 우성과 열성이 함께 나오면 미지 개체 유전자형은?", "a": "이형접합"}, {"id": "D1-16", "q": "멘델의 제1법칙은?", "a": "분리의 법칙"}, {"id": "D1-17", "q": "멘델의 제2법칙으로 보통 배우는 것은?", "a": "우열의 법칙"}, {"id": "D1-18", "q": "멘델의 제3법칙은?", "a": "독립의 법칙"}, {"id": "D1-19", "q": "분리의 법칙이 뜻하는 바는?", "a": "한 유전자의 두 대립유전자가 배우자 형성 시 분리된다는 것"}, {"id": "D1-20", "q": "멘델 이전의 혼합유전설(blending)이 틀린 이유는?", "a": "형질이 한 세대 건너뛴 뒤 다시 나타남 — 섞여 희석된다면 사라져야 함"}, {"id": "D1-21", "q": "우열의 법칙이 뜻하는 바는?", "a": "이형접합체에서 한 대립유전자가 다른 하나의 효과를 가릴 수 있다는 것"}, {"id": "D1-22", "q": "독립의 법칙이 뜻하는 바는?", "a": "한 유전자의 대립유전자는 다른 유전자의 대립유전자와 독립적으로 배우자에 분리된다는 것"}, {"id": "D1-23", "q": "멘델이 실제로 발견한 '두 가지' 법칙은?", "a": "분리의 법칙 + 독립의 법칙 (우열의 법칙은 예외가 많아 법칙에서 빼기도 함)"}, {"id": "D1-24", "q": "단성잡종 교배에서 F2 표현형 비율의 기본형은?", "a": "3:1"}, {"id": "D1-25", "q": "단성잡종 교배에서 F2 유전자형 비율의 기본형은?", "a": "1:2:1"}, {"id": "D1-26", "q": "우성 순종 × 열성 순종의 F1은 보통 어떤 유전자형인가?", "a": "모두 이형접합"}, {"id": "D1-27", "q": "우성 순종 × 열성 순종의 F1 표현형은?", "a": "모두 우성 표현형"}, {"id": "D1-28", "q": "Pp × Pp에서 PP가 나올 확률은?", "a": "1/4"}, {"id": "D1-29", "q": "Pp × Pp에서 Pp가 나올 확률은?", "a": "1/2"}, {"id": "D1-30", "q": "Pp × Pp에서 pp가 나올 확률은?", "a": "1/4"}, {"id": "D1-31", "q": "Pp × Pp에서 우성 표현형이 나올 확률은?", "a": "3/4"}, {"id": "D1-32", "q": "Pp × Pp에서 열성 표현형이 나올 확률은?", "a": "1/4"}, {"id": "D1-33", "q": "Aa × aa 검정교배의 표현형 비율은?", "a": "1:1"}, {"id": "D1-34", "q": "AA × aa 교배의 자손 표현형은?", "a": "모두 우성"}, {"id": "D1-35", "q": "AA × aa 교배의 자손 유전자형은?", "a": "모두 Aa"}, {"id": "D1-36", "q": "유전자형과 표현형이 항상 1대1로 대응하지 않는 이유는?", "a": "같은 표현형을 여러 유전자형이 만들 수 있기 때문"}, {"id": "D1-37", "q": "우성 표현형이 항상 우성 동형접합을 뜻하는가?", "a": "아니오"}, {"id": "D1-38", "q": "둥근 완두(우성)와 주름진 완두의 분자적 차이는?", "a": "우성=녹말 합성효소 정상 / 주름(열성 동형)=효소 결함→아밀로오스 축적→삼투로 물 유입→쭈그러짐"}, {"id": "D1-39", "q": "열성 표현형을 보이는 개체의 유전자형은?", "a": "열성 동형접합"}, {"id": "D1-40", "q": "멘델 유전 문제에서 동시에 두 사건이 모두 일어날 확률은 어떤 법칙을 쓰는가?", "a": "곱셈 법칙"}, {"id": "D1-41", "q": "서로 배타적인 여러 사건 중 하나가 일어날 확률은 어떤 법칙을 쓰는가?", "a": "덧셈 법칙"}, {"id": "D1-42", "q": "Pp × Pp에서 우성 표현형이면서 이형접합일 확률은?", "a": "1/2"}, {"id": "D1-43", "q": "Pp × Pp에서 우성 표현형 개체 중 동형접합일 확률은?", "a": "1/3"}, {"id": "D1-44", "q": "Pp × Pp에서 우성 표현형 개체 중 이형접합일 확률은?", "a": "2/3"}, {"id": "D1-45", "q": "두 아이가 모두 열성 표현형일 확률을 구할 때 주로 쓰는 법칙은?", "a": "곱셈 법칙"}, {"id": "D1-46", "q": "두 아이 중 적어도 한 명이 열성 표현형일 확률을 구할 때 자주 쓰는 전략은?", "a": "전체 1에서 아무도 열성이 아닐 확률을 빼기"}, {"id": "D1-47", "q": "Aa × Aa에서 자녀가 열성 표현형일 확률은?", "a": "1/4"}, {"id": "D1-48", "q": "Aa × Aa에서 자녀 두 명이 모두 열성 표현형일 확률은?", "a": "1/16"}, {"id": "D1-49", "q": "Aa × Aa에서 자녀 두 명 중 한 명만 열성 표현형일 확률은?", "a": "3/8"}, {"id": "D1-50", "q": "Aa × Aa에서 자녀 세 명이 모두 우성 표현형일 확률은?", "a": "27/64"}, {"id": "D1-51", "q": "유전상담 문제에서 aa가 아닌 형제자매가 보인자일 확률이 2/3인 이유는?", "a": "가능한 유전자형이 AA:Aa:Aa로 3개이고 그중 2개가 보인자이기 때문"}, {"id": "D1-52", "q": "보인자끼리 결혼한 집안에서 정상 표현형 자녀가 보인자일 확률은?", "a": "2/3"}, {"id": "D1-53", "q": "두 유전자에 대한 이형접합체를 무엇이라 하는가?", "a": "이중잡종(dihybrid)"}, {"id": "D1-54", "q": "YyRr × YyRr의 F2 표현형 비율은?", "a": "9:3:3:1"}, {"id": "D1-55", "q": "YyRr 개체가 만들 수 있는 배우자 종류는?", "a": "YR, Yr, yR, yr"}, {"id": "D1-56", "q": "YyRr 개체가 만들 수 있는 배우자 종류 수는?", "a": "4개"}, {"id": "D1-57", "q": "독립의 법칙이 성립할 때 두 유전자는 보통 어떤 상태인가?", "a": "서로 다른 염색체에 있거나 같은 염색체여도 충분히 멀리 떨어져 있다"}, {"id": "D1-58", "q": "이중잡종 교배에서 두 형질이 모두 열성일 확률은?", "a": "1/16"}, {"id": "D1-59", "q": "이중잡종 교배에서 두 형질이 모두 우성 표현형일 확률은?", "a": "9/16"}, {"id": "D1-60", "q": "이중잡종 교배에서 한 형질은 우성·다른 형질은 열성인 특정 조합의 확률은?", "a": "3/16 (두 가지 혼합형을 합치면 6/16)"}, {"id": "D1-61", "q": "YyRr × yyrr 검정교배에서 독립분리라면 자손 비율은?", "a": "1:1:1:1"}, {"id": "D1-62", "q": "독립분리가 성립하면 중기판에서 각 상동염색체쌍의 배열은 어떤 관계인가?", "a": "서로 독립적이다"}, {"id": "D1-63", "q": "분리의 법칙을 염색체 수준에서 설명하면?", "a": "상동염색체가 감수분열 때 분리되면서 대립유전자도 갈라진다"}, {"id": "D1-64", "q": "독립의 법칙을 염색체 수준에서 설명하면?", "a": "서로 다른 염색체쌍이 감수분열 중기 I에서 독립적으로 배열된다"}, {"id": "D1-65", "q": "멘델 법칙이 감수분열과 연결되는 핵심 단계는?", "a": "중기 I과 후기 I"}, {"id": "D1-66", "q": "대립유전자가 서로 분리되는 직접적 세포분열 사건은?", "a": "상동염색체 분리"}, {"id": "D1-67", "q": "독립분리가 성립하면 서로 다른 염색체쌍의 배열은 어디서 결정되는가?", "a": "중기 I"}, {"id": "D1-68", "q": "불완전우성이란?", "a": "이형접합체 표현형이 두 동형접합체의 중간형으로 나타나는 것"}, {"id": "D1-69", "q": "금어초 꽃색이 불완전우성의 예인 이유는?", "a": "빨강 × 흰색의 F1이 분홍으로 나타나기 때문"}, {"id": "D1-70", "q": "불완전우성에서 F2 유전자형 비율과 표현형 비율의 관계는?", "a": "둘 다 1:2:1"}, {"id": "D1-71", "q": "공동우성이란?", "a": "이형접합체에서 두 대립유전자의 효과가 모두 표현되는 것"}, {"id": "D1-72", "q": "AB형 혈액형은 어떤 유전 현상의 예인가?", "a": "공동우성"}, {"id": "D1-73", "q": "MN 혈액형이 보여주는 유전 현상은?", "a": "공동우성 — M·N 항원이 둘 다 발현(이형접합 MN형)"}, {"id": "D1-74", "q": "ABO 혈액형에 존재하는 대립유전자 수는?", "a": "3개"}, {"id": "D1-75", "q": "ABO 혈액형 대립유전자는?", "a": "IA, IB, i"}, {"id": "D1-76", "q": "ABO 혈액형에서 IA와 IB의 관계는?", "a": "서로 공동우성"}, {"id": "D1-77", "q": "ABO 혈액형에서 i와 IA 또는 IB의 관계는?", "a": "열성"}, {"id": "D1-78", "q": "A형 혈액형의 가능한 유전자형은?", "a": "IAIA 또는 IAi"}, {"id": "D1-79", "q": "B형 혈액형의 가능한 유전자형은?", "a": "IBIB 또는 IBi"}, {"id": "D1-80", "q": "AB형 혈액형의 유전자형은?", "a": "IAIB"}, {"id": "D1-81", "q": "O형 혈액형의 유전자형은?", "a": "ii"}, {"id": "D1-82", "q": "복대립유전자란?", "a": "한 유전자에 대해 집단 수준에서 두 개보다 많은 대립유전자가 존재하는 경우"}, {"id": "D1-83", "q": "ABO 혈액형이 복대립유전자의 예인 이유는?", "a": "한 유전자좌위에 IA, IB, i가 존재하기 때문"}, {"id": "D1-84", "q": "다면발현(pleiotropy)이란?", "a": "하나의 유전자가 여러 형질에 영향을 주는 것"}, {"id": "D1-85", "q": "겸상적혈구 유전자가 다면발현의 예인 이유는?", "a": "혈액세포 모양뿐 아니라 다양한 생리 기능에 영향을 주기 때문"}, {"id": "D1-86", "q": "겸상적혈구 보인자(이형접합)가 말라리아에 강한 현상은?", "a": "이형접합자 우세(heterozygote advantage) — 보인자는 정상+겸상 적혈구를 모두 만듦"}, {"id": "D1-87", "q": "상위(epistasis)란?", "a": "한 유전자가 다른 유전자의 표현을 가리는 현상"}, {"id": "D1-88", "q": "래브라도 털색 9:3:4 비율은 무엇의 예인가?", "a": "열성 상위"}, {"id": "D1-89", "q": "다유전자 유전(polygenic inheritance)이란?", "a": "여러 유전자가 하나의 형질에 함께 영향을 주는 것"}, {"id": "D1-90", "q": "피부색이나 키가 다유전자 유전의 예인 이유는?", "a": "연속적인 변이를 보이기 때문"}, {"id": "D1-91", "q": "양적형질(quantitative character)이란?", "a": "키·피부색처럼 연속적으로 변이하는 형질 — 다유전자 유전의 결과"}, {"id": "D1-92", "q": "환경이 다유전자 형질에 중요한 이유는?", "a": "표현형이 유전자뿐 아니라 환경의 영향을 함께 받기 때문"}, {"id": "D1-93", "q": "연관유전자(linked genes)란?", "a": "같은 염색체에 있어 함께 유전되는 경향이 있는 유전자"}, {"id": "D1-94", "q": "연관이 독립의 법칙의 예외로 보이는 이유는?", "a": "같은 염색체의 유전자들이 함께 이동하기 쉽기 때문"}, {"id": "D1-95", "q": "연관유전자도 항상 완전히 함께 유전되는가?", "a": "아니오, 교차가 일어나면 재조합될 수 있다"}, {"id": "D1-96", "q": "완전연관과 불완전연관의 차이는?", "a": "완전연관=교차 없이 함께 유전 / 불완전연관=감수 I 전기 교차로 일부 재조합"}, {"id": "D1-97", "q": "상인연관(cis)이란? (생식세포·표현형 비율)", "a": "한 염색체에 우성끼리·열성끼리(AB//ab) → 배우자 AB·ab → 표현형 3:1"}, {"id": "D1-98", "q": "상반연관(trans)이란? (생식세포·표현형 비율)", "a": "한 염색체에 우성+열성(Ab//aB) → 배우자 Ab·aB → 표현형 1:2:1"}, {"id": "D1-99", "q": "초파리 교배 문제에서 부모형 자손과 재조합형 자손을 구분하는 기준은?", "a": "가장 많이 나온 유형은 부모형, 적게 나온 유형은 재조합형"}, {"id": "D1-100", "q": "재조합 빈도(recombination frequency)의 계산식은?", "a": "재조합형 자손 수 / 전체 자손 수 × 100"}, {"id": "D1-101", "q": "1%의 재조합 빈도는 유전자 지도에서 몇 map unit인가?", "a": "1 map unit(1 cM)"}, {"id": "D1-102", "q": "연관유전자 사이 거리가 멀수록 재조합 빈도는 어떻게 되는가?", "a": "증가한다"}, {"id": "D1-103", "q": "재조합 빈도의 이론적 최대값은?", "a": "50%"}, {"id": "D1-104", "q": "재조합 빈도가 50%이면 두 유전자 관계를 어떻게 해석하는가?", "a": "독립분리처럼 보일 정도로 멀리 떨어져 있거나 다른 염색체에 있다"}, {"id": "D1-105", "q": "재조합 빈도가 10%라면 두 유전자 지도거리는?", "a": "10 cM"}, {"id": "D1-106", "q": "재조합 빈도가 17%라면 두 유전자 지도거리는?", "a": "17 cM"}, {"id": "D1-107", "q": "재조합 빈도가 22.5%라면 두 유전자 지도거리는?", "a": "22.5 cM"}, {"id": "D1-108", "q": "초파리 연관 문제에서 검정교배를 자주 쓰는 이유는?", "a": "재조합형과 부모형을 표현형으로 바로 구별하기 쉽기 때문"}, {"id": "D1-109", "q": "이형접합 초파리 × 이중 열성 초파리 교배는 무엇의 전형적인 형태인가?", "a": "연관 검정교배"}, {"id": "D1-110", "q": "재조합형 자손 비율이 낮다는 것은 무엇을 뜻하는가?", "a": "두 유전자가 서로 가깝게 연관되어 있다는 뜻"}, {"id": "D1-111", "q": "초파리 연관 문제에서 교차는 어느 염색분체 사이에서 일어나는가?", "a": "비자매 염색분체"}, {"id": "D1-112", "q": "교차가 연관유전자의 완전한 동행을 깨는 이유는?", "a": "염색체 조각을 서로 교환해 새로운 조합을 만들기 때문"}, {"id": "D1-113", "q": "재조합 빈도가 0%라면 어떻게 해석할 수 있는가?", "a": "매우 가깝게 연관되어 있거나 사실상 교차가 관찰되지 않은 경우"}, {"id": "D1-114", "q": "재조합 빈도가 50%에 가까우면 지도 작성이 왜 어려워지는가?", "a": "연관 여부를 구분하기 어려워지기 때문"}, {"id": "D1-115", "q": "유전자지도(gene map)란?", "a": "재조합 빈도를 이용해 유전자 간 상대적 거리를 나타낸 지도"}, {"id": "D1-116", "q": "스터트번트(Sturtevant)가 한 핵심 업적은?", "a": "재조합 빈도로 유전자 지도를 만든 것"}, {"id": "D1-117", "q": "모건(Morgan)의 초파리 연구가 중요한 이유는?", "a": "유전자가 염색체에 있다는 염색체설을 강하게 지지했기 때문"}, {"id": "D1-118", "q": "모건의 초파리 흰눈 실험 결론은?", "a": "흰눈은 빨간눈(야생형)에 대해 열성이고 X염색체에 연관됨 (수컷에만 나타남)"}, {"id": "D1-119", "q": "야생형(wild type)이 곧 우성형질을 뜻하는가?", "a": "아니오 — 야생형은 집단에서 가장 흔한 형일 뿐, 우성 여부와 무관"}, {"id": "D1-120", "q": "성 결정 4체계와 이형(hetero) 성은?", "a": "XY(포유류)·XO(메뚜기)=수컷 hetero / ZW(조류·어류·나비)=암컷 hetero / 반수체-2배체(벌·개미)=수컷이 반수체"}, {"id": "D1-121", "q": "포유류에서 정소 발달을 유도하는 Y염색체 유전자는?", "a": "SRY(성 결정 부위, Sex-determining Region of Y)"}, {"id": "D1-122", "q": "반성유전(성-연관 유전)이란?", "a": "성염색체(주로 X)에 있는 유전자의 유전 — 남녀 발현 빈도가 다름 (예: 혈우병, 색맹, 뒤셴 근위축증)"}, {"id": "D1-123", "q": "반접합성(hemizygous)이란?", "a": "남성(XY)은 X연관 유전자를 1개만 가져 동형·이형을 따질 수 없는 상태"}, {"id": "D1-124", "q": "남성의 X연관 형질은 누구에게서 오며 누구에게 전달되는가?", "a": "X를 어머니로부터만 받음 → 아들에게는 전달되지 않고 딸에게만 전달"}, {"id": "D1-125", "q": "한성유전(sex-limited)이란?", "a": "상염색체 유전자지만 한 성에서만 발현 (예: 닭 벼슬 — 암탉도 테스토스테론 주면 발현)"}, {"id": "D1-126", "q": "종성유전(sex-influenced)이란?", "a": "상염색체지만 성에 따라 우열이 바뀜 (예: 대머리 — 남성은 Bb도 대머리, 여성은 BB만 대머리)"}, {"id": "D1-127", "q": "포유류 암컷의 X 염색체 불활성화 결과는?", "a": "두 X 중 하나가 불활성화되어 바소체(Barr body) 형성 → 삼색(calico) 고양이 무늬의 원인"}, {"id": "D1-128", "q": "초파리 검정교배에서 자손 1000마리 중 재조합형이 180마리였다. 교차율은?", "a": "18%"}, {"id": "D1-129", "q": "초파리 검정교배에서 자손 800마리 중 재조합형이 64마리였다. 지도거리는?", "a": "8 cM"}, {"id": "D1-130", "q": "초파리 검정교배에서 자손 400마리 중 부모형이 310마리였다. 재조합형 수는?", "a": "90마리"}, {"id": "D1-131", "q": "초파리 검정교배에서 자손 400마리 중 부모형이 310마리였다. 교차율은?", "a": "22.5%"}, {"id": "D1-132", "q": "초파리 검정교배에서 재조합형이 48마리와 42마리, 부모형이 160마리와 150마리였다. 총 교차율은?", "a": "22.5%"}, {"id": "D1-133", "q": "초파리 검정교배에서 자손 유형이 41, 9, 8, 42로 나왔다. 가장 많은 두 유형은 무엇으로 해석하는가?", "a": "부모형"}, {"id": "D1-134", "q": "초파리 검정교배에서 자손 유형이 41, 9, 8, 42로 나왔다. 가장 적은 두 유형은 무엇으로 해석하는가?", "a": "재조합형"}, {"id": "D1-135", "q": "초파리 검정교배에서 재조합형이 총 17마리, 전체가 100마리라면 유전자 거리는?", "a": "17 cM"}, {"id": "D1-136", "q": "초파리 검정교배에서 재조합형이 125마리, 전체가 500마리라면 교차율은?", "a": "25%"}, {"id": "D1-137", "q": "초파리 검정교배에서 교차율이 12%라면 1000마리 중 재조합형 예상 수는?", "a": "120마리"}, {"id": "D1-138", "q": "초파리 검정교배에서 유전자 거리 6 cM는 재조합형 비율 몇 %를 뜻하는가?", "a": "6%"}, {"id": "D1-139", "q": "초파리 검정교배에서 전체 1200마리 중 재조합형이 60마리면 유전자 거리는?", "a": "5 cM"}, {"id": "D1-140", "q": "초파리 검정교배에서 부모형 두 클래스가 각각 460, 440이고 재조합형 두 클래스가 각각 52, 48이면 총 교차율은?", "a": "10%"}, {"id": "D1-141", "q": "초파리 검정교배에서 교차율이 30%면 부모형 비율은 총 몇 %인가?", "a": "70%"}, {"id": "D1-142", "q": "초파리 검정교배에서 교차율이 7%면 전체 2000마리 중 재조합형은 몇 마리 예상되는가?", "a": "140마리"}, {"id": "D1-143", "q": "초파리 연관 문제에서 부모형이 490, 505이고 재조합형이 3, 2라면 두 유전자는 어떤 관계인가?", "a": "매우 가깝게 연관"}, {"id": "D1-144", "q": "초파리 연관 문제에서 재조합 빈도가 49%라면 시험에서는 보통 어떻게 해석하는가?", "a": "거의 독립분리처럼 행동"}, {"id": "D1-145", "q": "초파리 연관 문제에서 12 cM와 18 cM 떨어진 두 구간이 직선상에서 이어지면 총 거리는?", "a": "30 cM"}, {"id": "D1-146", "q": "가계도에서 보통 사각형은 무엇을 뜻하는가?", "a": "남성"}, {"id": "D1-147", "q": "가계도에서 보통 원은 무엇을 뜻하는가?", "a": "여성"}, {"id": "D1-148", "q": "가계도에서 음영이 칠해진 개체는 보통 무엇을 뜻하는가?", "a": "특정 형질 또는 질환의 발현자"}, {"id": "D1-149", "q": "가계도에서 수평선으로 연결된 남녀는?", "a": "부부"}, {"id": "D1-150", "q": "가계도에서 자손으로 내려가는 수직선은?", "a": "부모-자식 관계"}, {"id": "D1-151", "q": "열성 유전병이 나타나려면 보통 어떤 유전자형이어야 하는가?", "a": "열성 동형접합"}, {"id": "D1-152", "q": "열성 유전병에서 이형접합체가 정상 표현형인 이유는?", "a": "정상 대립유전자 하나로 충분한 기능 단백질이 만들어지기 때문"}, {"id": "D1-153", "q": "열성 유전병의 이형접합체를 무엇이라 하는가?", "a": "보인자(carrier)"}, {"id": "D1-154", "q": "근친결혼이 열성 유전병 위험을 높이는 이유는?", "a": "같은 열성 대립유전자를 공유할 가능성이 높기 때문"}, {"id": "D1-155", "q": "우성 유전병은 보통 어떤 유전자형에서도 발현될 수 있는가?", "a": "이형접합만으로도 발현될 수 있다"}, {"id": "D1-156", "q": "치명적인 우성 유전병이 드문 이유는?", "a": "대립유전자가 다음 세대로 전달되기 전에 생존과 번식이 제한되기 쉽기 때문"}, {"id": "D1-157", "q": "황색 생쥐(Yy)끼리 교배 시 자손 비율이 황색:회색 = 2:1인 이유는?", "a": "황색 동형접합(YY)이 치사라 죽기 때문 (Yy 황색 : yy 회색 = 2:1)"}, {"id": "D1-158", "q": "헌팅턴 무도병이 세대에 남는 이유는?", "a": "증상이 늦게 발현되어 번식 후에 질병이 드러날 수 있기 때문"}, {"id": "D1-159", "q": "낭포성 섬유증(CF)은 주로 어떤 유형의 유전병으로 다뤄지는가?", "a": "상염색체 열성"}, {"id": "D1-160", "q": "테이-삭스병(Tay-Sachs)은 주로 어떤 유형의 유전병으로 다뤄지는가?", "a": "상염색체 열성"}, {"id": "D1-161", "q": "PKU는 주로 어떤 유형의 유전병으로 다뤄지는가?", "a": "상염색체 열성"}, {"id": "D1-162", "q": "겸상적혈구병은 멘델 파트에서 어떤 주제로 자주 연결되는가?", "a": "다면발현"}, {"id": "D1-163", "q": "열성 유전병 가계도에서 정상 부모에게서 환자 자녀가 나오면 부모는 보통 무엇인가?", "a": "둘 다 보인자"}, {"id": "D1-164", "q": "우성 유전병 가계도에서 환자 자녀가 있으면 보통 부모 중 최소 한 명은?", "a": "환자"}, {"id": "D1-165", "q": "상염색체 열성 가계도의 전형적 특징은?", "a": "세대를 건너뛰어 나타날 수 있다"}, {"id": "D1-166", "q": "상염색체 우성 가계도의 전형적 특징은?", "a": "대체로 세대마다 나타난다"}, {"id": "D1-167", "q": "Rh 혈액형에서 Rh+는 어떤 대립유전자 상태를 뜻하는가?", "a": "우성 대립유전자가 하나 이상 있는 상태"}, {"id": "D1-168", "q": "Rh 혈액형에서 Rh-는 어떤 유전자형인가?", "a": "열성 동형접합"}, {"id": "D1-169", "q": "Rh 음성 산모와 Rh 양성 태아의 문제는 무엇이라 하는가?", "a": "신생아 용혈성 질환(적아세포증) 관련 Rh 부적합"}, {"id": "D1-170", "q": "Rh 부적합 문제의 핵심 원인은?", "a": "산모 면역계가 태아 적혈구 항원을 외래로 인식할 수 있기 때문"}, {"id": "D1-171", "q": "AB형은 어떤 항원을 적혈구 표면에 가지는가?", "a": "A와 B 둘 다"}, {"id": "D1-172", "q": "O형은 어떤 항원을 적혈구 표면에 가지는가?", "a": "없다"}, {"id": "D1-173", "q": "A형 혈액이 적혈구 표면에 가지는 항원은?", "a": "A 항원"}, {"id": "D1-174", "q": "B형 혈액이 적혈구 표면에 가지는 항원은?", "a": "B 항원"}, {"id": "D1-175", "q": "ABO 혈액형에서 O형이 열성인 이유는?", "a": "i 대립유전자가 IA와 IB에 대해 열성이기 때문"}, {"id": "D1-176", "q": "AB형 부모(IAIB)와 O형 부모(ii) 사이 자녀의 가능한 혈액형은?", "a": "A형 또는 B형"}, {"id": "D1-177", "q": "A형(IAi)과 B형(IBi) 부모 사이 자녀에게 가능한 ABO 혈액형은?", "a": "A, B, AB, O 모두 가능"}, {"id": "D1-178", "q": "O형 부모 두 명 사이에서 나올 수 있는 자녀 혈액형은?", "a": "O형만 가능"}, {"id": "D1-179", "q": "AB형 부모 두 명 사이에서 O형 자녀가 나올 수 있는가?", "a": "아니오"}, {"id": "D1-180", "q": "Rh- 부모 두 명 사이에서 Rh+ 자녀가 나올 수 있는가?", "a": "아니오"}, {"id": "D1-181", "q": "초파리 연관 검정교배에서 네 클래스가 375, 374, 126, 125라면 교차율은?", "a": "25.1%"}, {"id": "D1-182", "q": "초파리 연관 검정교배에서 네 클래스가 486, 497, 9, 8이라면 지도거리는?", "a": "1.7 cM"}, {"id": "D1-183", "q": "초파리 연관 검정교배에서 네 클래스가 280, 290, 215, 215라면 두 유전자는 어떻게 해석하는가?", "a": "연관이 약하거나 거의 독립분리처럼 보인다"}, {"id": "D1-184", "q": "초파리 연관 문제에서 부모형이 비슷한 수로 두 클래스, 재조합형도 비슷한 수로 두 클래스가 나오는 이유는?", "a": "각 유형이 서로 상보적인 배우자 조합을 반영하기 때문"}, {"id": "D1-185", "q": "독립분리와 연관을 구별하는 가장 쉬운 수치 기준은?", "a": "검정교배 결과가 1:1:1:1에 가까운지, 재조합 빈도가 50% 근처인지 본다"}, {"id": "D1-186", "q": "순종(true-breeding) 개체의 유전자형 상태는?", "a": "동형접합(homozygous)"}, {"id": "D1-187", "q": "불완전우성과 공동우성의 공통점은?", "a": "둘 다 이형접합체가 단순 우열 관계로 설명되지 않는다"}, {"id": "D1-188", "q": "불완전우성과 공동우성의 차이는?", "a": "불완전우성은 중간형, 공동우성은 두 형질이 함께 나타난다"}, {"id": "D1-189", "q": "이수성(aneuploidy)이란? (1염색체성·3염색체성)", "a": "비분리로 염색체 수 이상 — 1염색체성(2n-1), 3염색체성(2n+1); 감수 I 비분리면 정상 배우자가 0"}, {"id": "D1-190", "q": "대표적 염색체 수 이상 질환 3가지는?", "a": "다운증후군=21번 3염색체성 / 클라인펠터=XXY(성염색체 3염색체성) / 터너=XO(성염색체 1염색체성)"}, {"id": "D1-191", "q": "염색체 구조 이상 4종과 필라델피아 염색체는?", "a": "결실·중복·역위·전좌 / 필라델피아 염색체=9번·22번 전좌(만성골수성백혈병)"}, {"id": "D1-192", "q": "침투도(penetrance)와 불완전 침투도란?", "a": "침투도=특정 유전자형을 가진 개체 중 실제로 그 표현형을 나타내는 비율 / 불완전 침투도=유전자형이 있어도 일부 개체에서만 표현형이 나타나는 것"}, {"id": "D1-193", "q": "발현도(expressivity)와 가변 발현도란?", "a": "발현도=표현형이 나타나는 정도(강도) / 가변 발현도=같은 유전자형이라도 개체마다 표현 정도가 다르게 나타나는 것 (예: 다지증)"}, {"id": "D1-194", "q": "우성 상위(dominant epistasis)의 F2 표현형 비율은?", "a": "12:3:1 — 한 유전자의 우성 대립유전자가 다른 유전자의 표현을 가림 (참고: 열성 상위는 9:3:4)"}]}]}, {"id": "E", "name": "연관·염색체와 핵산", "chapters": [{"label": "15 연관과 염색체", "cards": [{"id": "E0-0", "q": "염색체이론에서 멘델의 유전자가 염색체 상에 존재한다는 뜻은?", "a": "유전자는 염색체의 특정 유전자좌(locus)를 가진다는 뜻"}, {"id": "E0-1", "q": "염색체와 유전자가 모두 2배체 세포에 쌍으로 존재한다는 점이 설명하는 멘델 법칙은?", "a": "분리의 법칙과 독립의 법칙의 물질적 근거"}, {"id": "E0-2", "q": "감수분열 동안 상동염색체가 분리되는 것은 무엇의 분리를 의미하는가?", "a": "대립유전자의 분리"}, {"id": "E0-3", "q": "수정을 통해 염색체가 다시 쌍을 이루는 것은 무엇의 재결합을 의미하는가?", "a": "유전자의 재결합"}, {"id": "E0-4", "q": "유전자가 같은 염색체 상에 가까이 있으면 어떤 경향을 보이는가?", "a": "함께 유전되는 연관(linkage) 경향"}, {"id": "E0-5", "q": "연관유전자가 멘델의 완전독립과 다른 이유는?", "a": "같은 염색체 위에 있어 함께 배우자로 가기 쉽기 때문"}, {"id": "E0-6", "q": "연관유전자도 완전히 함께만 유전되지 않는 이유는?", "a": "교차로 인해 재조합이 일어날 수 있기 때문"}, {"id": "E0-7", "q": "완전연관과 불완전연관의 차이는?", "a": "완전연관=교차 없이 함께 유전 / 불완전연관=감수 I 전기 교차로 일부 재조합"}, {"id": "E0-8", "q": "상인연관(cis)이란? (생식세포·표현형 비율)", "a": "한 염색체에 우성끼리·열성끼리(AB//ab) → 배우자 AB·ab → 표현형 3:1"}, {"id": "E0-9", "q": "상반연관(trans)이란? (생식세포·표현형 비율)", "a": "한 염색체에 우성+열성(Ab//aB) → 배우자 Ab·aB → 표현형 1:2:1"}, {"id": "E0-10", "q": "재조합빈도가 높다는 것은 유전자 거리가 어떻다는 뜻인가?", "a": "멀다는 뜻"}, {"id": "E0-11", "q": "재조합빈도가 낮다는 것은 유전자 거리가 어떻다는 뜻인가?", "a": "가깝다는 뜻"}, {"id": "E0-12", "q": "유전자 지도는 무엇을 나타내는가?", "a": "특정 염색체 위 유전자들의 상대적 순서와 거리"}, {"id": "E0-13", "q": "유전자 지도 거리의 단위로 쓰는 것은?", "a": "map unit 또는 centimorgan(cM)"}, {"id": "E0-14", "q": "재조합빈도 1%는 지도거리 몇 cM인가?", "a": "1 cM"}, {"id": "E0-15", "q": "재조합빈도의 이론적 최대값은?", "a": "50%"}, {"id": "E0-16", "q": "재조합빈도가 50%에 가까우면 어떻게 해석하는가?", "a": "독립유전처럼 행동하거나 매우 멀리 떨어져 있다고 해석"}, {"id": "E0-17", "q": "지도거리가 50 cM를 넘는 두 유전자의 실제 관측 재조합빈도는?", "a": "약 50%에서 포화(독립처럼 보임) — 지도거리는 짧은 인접 구간의 합으로 구함"}, {"id": "E0-18", "q": "재조합빈도가 0%면 어떻게 해석하는가?", "a": "매우 가깝게 연관되었거나 교차가 관찰되지 않은 경우"}, {"id": "E0-19", "q": "모건이 초파리를 연구 재료로 사용한 이유 2가지는?", "a": "한 번 교배로 자손 수가 많고 세대가 짧기 때문"}, {"id": "E0-20", "q": "초파리의 야생형 눈 색은?", "a": "빨간눈"}, {"id": "E0-21", "q": "초파리에서 w+는 무엇을 뜻하는가?", "a": "야생형(빨간눈) 대립유전자"}, {"id": "E0-22", "q": "초파리에서 w는 무엇을 뜻하는가?", "a": "흰눈 대립유전자"}, {"id": "E0-23", "q": "야생형이 항상 우성을 뜻하는가?", "a": "아니오, 야생형은 자연계에 흔한 형질일 뿐이다"}, {"id": "E0-24", "q": "모건의 초파리 실험에서 F1 암컷과 수컷은 어떤 눈색을 가졌는가?", "a": "둘 다 빨간눈"}, {"id": "E0-25", "q": "초파리 연관 실험에서 부모형 자손이 재조합형보다 많이 나오는 이유는?", "a
