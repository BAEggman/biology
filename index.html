<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>생물 통합 암기 원정</title>
<style>
:root{
  --ink:#10302E; --ink2:#41605C; --ink3:#6E8884; --line:#D7E0DE; --line2:#E6ECEA;
  --bg:#EAF0EE; --card:#FFFFFF;
  --teal:#0F766E; --teal-d:#0E4F4A; --teal-soft:#E2F0EE;
  --vio:#6A50B0; --vio-d:#4E3A87; --vio-soft:#ECE7F8;
  --amb:#B26B00; --amb-soft:#FBEFD9;
  --ok:#12805C; --ok-soft:#E2F3EC; --no:#C0392B; --no-soft:#FBEAE8;
  --gold:#E0A100;
  --shadow:0 6px 22px rgba(16,48,46,.10), 0 1px 3px rgba(16,48,46,.07);
  --shadow-lg:0 14px 40px rgba(16,48,46,.16);
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono','Menlo','Consolas',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;
  background-image:radial-gradient(circle at 10% -6%,rgba(106,80,176,.06),transparent 42%),radial-gradient(circle at 94% 0%,rgba(15,118,110,.08),transparent 40%);
  min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
:focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:10px}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 72px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* header */
.top{display:flex;align-items:center;gap:13px;margin-bottom:6px}
.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(140deg,var(--teal-d),var(--teal));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:21px;box-shadow:var(--shadow);flex:none}
.ttl h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.025em}
.ttl p{margin:1px 0 0;font-size:12.5px;color:var(--ink2);letter-spacing:.01em}

/* overall progress */
.over{margin:16px 0 22px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
.over .lab{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.over .lab b{font-size:13px;font-weight:700;letter-spacing:.02em}
.over .lab span{font-size:12.5px;color:var(--ink2)}
.bar{height:9px;background:var(--line2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),#1FA38F);border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* expedition trail */
.trail{position:relative;padding-left:6px}
.node{position:relative;display:flex;gap:15px;align-items:stretch;padding-bottom:14px}
.node::before{content:"";position:absolute;left:27px;top:54px;bottom:-2px;width:2px;
  background:repeating-linear-gradient(var(--line) 0 5px,transparent 5px 11px)}
.node:last-child::before{display:none}
.ring{position:relative;width:56px;height:56px;flex:none;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--teal) var(--deg,0deg), var(--line) 0);box-shadow:var(--shadow)}
.ring i{width:46px;height:46px;border-radius:50%;background:var(--card);display:grid;place-items:center;
  font-weight:800;font-size:20px;color:var(--teal-d);font-style:normal}
.node.done .ring i{background:var(--teal);color:#fff}
.gcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;
  box-shadow:var(--shadow);text-align:left;transition:transform .12s ease,box-shadow .12s ease;min-width:0}
.gcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.gcard:active{transform:translateY(0)}
.gcard .gn{font-size:16px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px}
.gcard .gc{font-size:12px;color:var(--ink2);margin:0 0 8px;line-height:1.45}
.gcard .gm{display:flex;align-items:center;gap:10px}
.gcard .gm .pct{font-size:12px;color:var(--ink3);font-family:var(--mono)}
.stars{font-size:13px;letter-spacing:1px;color:var(--gold)}
.stars .e{color:var(--line)}
.tag{display:inline-block;font-size:10.5px;font-weight:700;color:var(--vio-d);background:var(--vio-soft);
  border-radius:99px;padding:2px 8px;margin-left:6px;vertical-align:1px}

/* generic screen */
.scr-top{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;box-shadow:var(--shadow);flex:none;font-size:18px;color:var(--ink2)}
.scr-top h2{font-size:18px;font-weight:800;margin:0;letter-spacing:-.02em}
.scr-top .sub{font-size:12px;color:var(--ink2);margin-top:1px}

/* gate screen */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{font-size:12.5px;font-weight:600;color:var(--ink2);background:var(--card);border:1px solid var(--line);
  border-radius:99px;padding:7px 13px;box-shadow:var(--shadow);transition:all .12s ease}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.chip .n{opacity:.7;font-size:11px;margin-left:3px}
.chip.on .n{opacity:.85}
.acts{display:grid;gap:12px}
.act{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:16px;padding:16px 17px;box-shadow:var(--shadow);text-align:left;transition:transform .12s,box-shadow .12s}
.act:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.act .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex:none;font-size:21px}
.act.quest .ic{background:var(--vio-soft);color:var(--vio-d)}
.act.flip .ic{background:var(--amb-soft);color:var(--amb)}
.act .tx b{display:block;font-size:15.5px;font-weight:800;letter-spacing:-.01em}
.act .tx span{font-size:12.5px;color:var(--ink2)}
.act .go{margin-left:auto;color:var(--ink3);font-size:20px}
.note{font-size:12px;color:var(--ink3);margin-top:18px;line-height:1.5;text-align:center}

/* quest */
.qbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qbar .pill{font-size:11.5px;font-weight:700;color:var(--vio-d);background:var(--vio-soft);border-radius:99px;padding:4px 11px;flex:none}
.qbar .bar{flex:1}
.qbar .bar>i{background:linear-gradient(90deg,var(--vio),#8E74D8)}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px 22px;box-shadow:var(--shadow-lg);margin-bottom:16px}
.qcard .qeyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--vio);margin-bottom:10px}
.qcard .q{font-size:19px;font-weight:700;line-height:1.5;letter-spacing:-.01em;word-break:keep-all}
.opts{display:grid;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;background:var(--card);
  border:1.5px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--shadow);
  transition:transform .1s,border-color .12s,background .12s;word-break:keep-all;line-height:1.45;font-size:14.5px}
.opt:hover{border-color:var(--teal);transform:translateY(-1px)}
.opt .k{width:24px;height:24px;border-radius:8px;background:var(--teal-soft);color:var(--teal-d);
  font-weight:800;font-size:13px;display:grid;place-items:center;flex:none;font-family:var(--mono)}
.opt.ok{border-color:var(--ok);background:var(--ok-soft)}
.opt.ok .k{background:var(--ok);color:#fff}
.opt.no{border-color:var(--no);background:var(--no-soft)}
.opt.no .k{background:var(--no);color:#fff}
.opt.dim{opacity:.55}
.opt[disabled]{cursor:default}
.opt[disabled]:hover{transform:none;border-color:var(--line)}
.opt.ok[disabled]:hover{border-color:var(--ok)}
.opt.no[disabled]:hover{border-color:var(--no)}
.feed{margin-top:16px;display:flex;align-items:center;gap:12px}
.feed .msg{font-size:13.5px;font-weight:700;flex:1}
.feed .msg.good{color:var(--ok)} .feed .msg.bad{color:var(--no)}
.btn{background:var(--teal);color:#fff;font-weight:700;font-size:15px;border-radius:13px;padding:13px 24px;
  box-shadow:var(--shadow);transition:transform .1s,filter .12s}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px)} .btn:active{transform:translateY(0)}
.btn.ghost{background:var(--card);color:var(--teal-d);border:1px solid var(--line)}
.btn.block{width:100%;text-align:center}

/* results */
.res{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:22px;
  padding:30px 22px 26px;box-shadow:var(--shadow-lg);margin-bottom:18px}
.res .bigstars{font-size:46px;letter-spacing:6px;color:var(--gold);margin:4px 0 14px;line-height:1}
.res .bigstars .e{color:var(--line)}
.res h3{font-size:21px;font-weight:800;margin:0 0 6px;letter-spacing:-.02em}
.res .rsub{font-size:13.5px;color:var(--ink2);margin:0 0 20px}
.res .grid{display:flex;justify-content:center;gap:0;margin-bottom:6px}
.res .stat{flex:1;padding:0 6px}
.res .stat .v{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--teal-d)}
.res .stat .l{font-size:11.5px;color:var(--ink3);margin-top:2px}
.res .stat+.stat{border-left:1px solid var(--line2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* flip */
.flip{perspective:1400px;margin-bottom:16px}
.flip .inner{position:relative;width:100%;min-height:240px;transition:transform .5s cubic-bezier(.3,.7,.2,1);
  transform-style:preserve-3d}
.flip.on .inner{transform:rotateY(180deg)}
.flip .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);
  padding:26px 22px;display:flex;flex-direction:column;justify-content:center}
.flip .face .fe{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.flip .front .fe{color:var(--vio)} .flip .back .fe{color:var(--teal)}
.flip .front{}
.flip .back{transform:rotateY(180deg);background:linear-gradient(180deg,#fff,var(--teal-soft))}
.flip .face .ft{font-size:18.5px;font-weight:700;line-height:1.55;word-break:keep-all}
.flip .back .ft{font-weight:600}
.flip .hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11.5px;color:var(--ink3)}
.fnav{display:flex;align-items:center;gap:10px}
.fnav .btn{flex:none}
.fnav .ctr{flex:1;text-align:center;font-size:13px;color:var(--ink2);font-family:var(--mono)}

.foot{margin-top:30px;text-align:center}
.reset{font-size:11.5px;color:var(--ink3);text-decoration:underline;background:none}
@media (max-width:420px){
  .qcard .q{font-size:17.5px} .opt{font-size:14px}
  .res .stat .v{font-size:21px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* ===== merged: review + streak + calendar ===== */
.rev{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:14px 15px;margin:16px 0 18px}
.rev-h{font-weight:800;font-size:14px;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.rev-chips{display:flex;flex-direction:column;gap:8px}
.rchip{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;transition:border-color .12s}
.rchip:hover{border-color:var(--teal)}
.rchip .b{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
.rchip .nm{flex:1;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rchip .tg{flex:none;font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
.rchip .tg.over{color:var(--no);background:var(--no-soft)}
.rchip .tg.new{color:var(--vio);background:var(--vio-soft)}
.rev-none{font-size:13px;background:var(--ok-soft);border:1px solid #BFE3D2;border-radius:11px;padding:11px 13px;color:var(--ok);font-weight:600}
.rev-more{font-size:11.5px;color:var(--ink3);margin-top:9px;text-align:center}

.rec{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:15px 16px;margin-bottom:18px}
.rec-h{font-weight:800;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sts{display:flex;gap:10px;margin-bottom:14px}
.sts .st{flex:1;text-align:center;background:var(--bg);border:1px solid var(--line2);border-radius:12px;padding:10px 6px}
.sts .st .v{font-family:var(--mono);font-weight:800;font-size:22px;color:var(--teal);line-height:1}
.sts .st .v .u{font-size:12px;font-weight:700;color:var(--ink3);margin-left:1px}
.sts .st .l{font-size:11px;color:var(--ink2);margin-top:5px;font-weight:600}
.sts .st.fire .v{color:var(--amb)}

.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cal-top .mo{font-weight:700;font-size:13.5px}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:28px;height:28px;border-radius:8px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;font-size:16px;color:var(--ink2);line-height:1}
.cal-nav button:disabled{opacity:.32}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-grid .dow{text-align:center;font-size:10.5px;color:var(--ink3);font-weight:700;padding:2px 0}
.cell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent}
.cell.has{background:var(--teal-soft);cursor:pointer}
.cell.today{outline:2px solid var(--teal);outline-offset:-2px}
.cell .dn{font-weight:700;color:var(--ink3);font-family:var(--mono);font-size:11.5px}
.cell.has .dn{color:var(--teal-d)}
.cell .dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:84%}
.cell .dot{width:5px;height:5px;border-radius:50%}
.cal-detail{margin-top:11px;padding:11px 12px;background:var(--bg);border:1px solid var(--line);border-radius:11px;font-size:12.5px;display:none}
.cal-detail.on{display:block}
.cal-detail .dt{font-weight:700;margin-bottom:7px}
.cal-detail .it{display:flex;align-items:center;gap:8px;padding:3px 0}
.cal-detail .it .d{width:9px;height:9px;border-radius:50%;flex:none}

/* ===== mode launcher ===== */
.modes{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:15px 16px;margin:18px 0}
.modes-h{font-weight:800;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.mgrid{display:flex;flex-direction:column;gap:9px}
.mtile{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:11px 13px;transition:border-color .12s,transform .08s}
.mtile:hover{border-color:var(--teal)} .mtile:active{transform:scale(.99)}
.mtile .mi{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:19px;color:#fff;box-shadow:var(--shadow)}
.mtile .mt{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.mtile .mt b{font-size:14.5px;font-weight:700}
.mtile .mt small{font-size:11.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtile .mg{flex:none;color:var(--ink3);font-size:18px;font-weight:700}
.mhost{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column}
.mhost[hidden]{display:none}
.mbar{flex:none;display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--line)}
.mclose{font-size:14px;font-weight:700;color:var(--teal-d);background:var(--teal-soft);border-radius:10px;padding:7px 13px}
.mclose:active{transform:scale(.98)}
.mttl{font-size:13px;font-weight:700;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#modeFrame{flex:1;width:100%;border:none;background:var(--bg)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="mhost" id="modeHost" hidden>
  <div class="mbar"><button class="mclose" data-mclose>← 홈으로</button><span class="mttl" id="modeTitle"></span></div>
  <iframe id="modeFrame" title="훈련 모드"></iframe>
</div>
<script>
const DATA = {"gates": [{"id": "A", "name": "세포의 구조와 막", "chapters": [{"label": "7 세포의 구조와 기능", "cards": [{"id": "A0-0", "q": "세포의 최대 크기를 제한하는 요인은?", "a": "표면적/부피 비(S/V) — 커질수록 S/V가 작아져 물질교환이 비효율적"}, {"id": "A0-1", "q": "세포가 작을수록 유리한 이유는?", "a": "표면적/부피 비가 커서 물질 출입·교환 효율이 높다"}, {"id": "A0-2", "q": "세포 크기 스케일(세균/진핵세포/미토콘드리아)은?", "a": "세균 1~10μm, 진핵세포 10~100μm, 미토콘드리아 1~5μm"}, {"id": "A0-3", "q": "세포막(원형질막)의 두께는 약?", "a": "5~8nm"}, {"id": "A0-4", "q": "미세소관의 지름은?", "a": "25 nm (내부 공간 15 nm)"}, {"id": "A0-5", "q": "미세섬유의 지름은?", "a": "7 nm"}, {"id": "A0-6", "q": "중간섬유의 지름은?", "a": "8~12 nm"}, {"id": "A0-7", "q": "미세소관의 구조는?", "a": "속이 빈 관"}, {"id": "A0-8", "q": "미세섬유의 구조는?", "a": "두 개의 서로 꼬인 액틴 나선"}, {"id": "A0-9", "q": "중간섬유의 구조는?", "a": "케이블로 꼬인 섬유성 단백질"}, {"id": "A0-10", "q": "미세소관의 단백질 소단위체는?", "a": "α-와 β-튜불린으로 구성된 이합체"}, {"id": "A0-11", "q": "미세섬유의 단백질 소단위체는?", "a": "액틴"}, {"id": "A0-12", "q": "중간섬유의 단백질 소단위체는?", "a": "세포에 따라 다른 섬유성 단백질(예: 케라틴)"}, {"id": "A0-13", "q": "미세소관의 주요 기능 4가지는?", "a": "세포의 모양 유지, 세포의 운동, 세포분열 시 염색체의 이동, 세포소기관의 이동"}, {"id": "A0-14", "q": "미세섬유의 주요 기능 6가지는?", "a": "세포의 모양 유지, 세포 모양에서의 변화, 근육의 수축, 세포 이동, 식물의 세포질 유동, 동물세포의 분열"}, {"id": "A0-15", "q": "중간섬유의 주요 기능 3가지는?", "a": "세포 모양 유지(장력에 견디는 요소), 핵과 여러 소기관의 고정, 핵막 하층 형성"}, {"id": "A0-16", "q": "세포골격 3요소를 지름이 큰 순서대로 쓰면?", "a": "미세소관 > 중간섬유 > 미세섬유"}, {"id": "A0-17", "q": "세포골격 3요소를 구조 기준으로 짝지으면?", "a": "미세소관=속 빈 관, 미세섬유=꼬인 액틴 나선, 중간섬유=케이블형 섬유성 단백질"}, {"id": "A0-18", "q": "핵막 하층 형성에 특히 중요한 세포골격 요소는?", "a": "중간섬유"}, {"id": "A0-19", "q": "세포 연구에 사용하는 도구 2가지?", "a": "현미경, 생화학적 도구"}, {"id": "A0-20", "q": "진핵세포가 소기관 기능을 분리하는 구조적 특징은?", "a": "내막(막성 소기관)으로 구획을 나눔"}, {"id": "A0-21", "q": "진핵세포 유전정보 위치와 번역 장소?", "a": "유전정보는 핵 안, 번역은 리보솜에서"}, {"id": "A0-22", "q": "내막계(endomembrane system)의 역할 2가지?", "a": "단백질 이동 조절, 세포 물질대사 기능 수행"}, {"id": "A0-23", "q": "미토콘드리아·엽록체의 공통 기능?", "a": "에너지를 한 형태에서 다른 형태로 변환"}, {"id": "A0-24", "q": "세포골격의 본질적 특징?", "a": "섬유들의 그물망 구조로 세포 내 구조·활동을 조직화"}, {"id": "A0-25", "q": "세포 간 연결의 의미?", "a": "세포외 구성물질 및 세포활동을 조정"}, {"id": "A0-26", "q": "골지체의 막 구조 분류?", "a": "단일막"}, {"id": "A0-27", "q": "단일막 소기관 예시 1개", "a": "골지체"}, {"id": "A0-28", "q": "소포체의 막 구조 분류?", "a": "단일막"}, {"id": "A0-29", "q": "리소좀의 막 구조 분류?", "a": "단일막"}, {"id": "A0-30", "q": "액포의 막 구조 분류?", "a": "단일막"}, {"id": "A0-31", "q": "세포막의 막 구조 분류?", "a": "단일막"}, {"id": "A0-32", "q": "핵의 막 구조 분류?", "a": "이중막"}, {"id": "A0-33", "q": "이중막 소기관 예시 1개", "a": "핵"}, {"id": "A0-34", "q": "엽록체의 막 구조 분류?", "a": "이중막"}, {"id": "A0-35", "q": "미토콘드리아의 막 구조 분류?", "a": "이중막"}, {"id": "A0-36", "q": "리보솜의 막 구조 분류?", "a": "무막(막없음)"}, {"id": "A0-37", "q": "무막(막없음) 소기관 예시 1개", "a": "리보솜"}, {"id": "A0-38", "q": "인의 막 구조 분류?", "a": "무막(막없음)"}, {"id": "A0-39", "q": "중심체의 막 구조 분류?", "a": "무막(막없음)"}, {"id": "A0-40", "q": "염색체의 막 구조 분류?", "a": "무막(막없음)"}, {"id": "A0-41", "q": "막구조 암기: 단일막/이중막/무막 두문자?", "a": "단일막=골소리액세 / 이중막=핵엽미 / 무막=보인중염"}, {"id": "A0-42", "q": "원핵세포를 이루는 생물군 2가지?", "a": "세균, 고세균"}, {"id": "A0-43", "q": "진핵세포로 구성되는 생물군 4가지?", "a": "원생생물, 균류, 동물, 식물"}, {"id": "A0-44", "q": "진핵세포에서 '세포질(cytoplasm)'의 범위?", "a": "핵과 원형질막 사이의 영역"}, {"id": "A0-45", "q": "원형질막(plasma membrane)의 역할 1줄?", "a": "선택적 장벽으로서 물질의 출입을 조절(산소·양분 공급/노폐물 제거)"}, {"id": "A0-46", "q": "핵막(nuclear envelope)의 막 구조?", "a": "이중막(핵공으로 뚫림)"}, {"id": "A0-47", "q": "핵공(nuclear pore)의 기능?", "a": "mRNA 등 물질의 출입을 통제"}, {"id": "A0-48", "q": "핵막은 어떤 소기관과 연속적인가?", "a": "소포체(ER)와 연속"}, {"id": "A0-49", "q": "염색체/염색질의 구성?", "a": "DNA와 단백질(히스톤)의 복합체 = 염색질, 염색질이 염색체를 이룸"}, {"id": "A0-50", "q": "인(nucleolus)의 주요 기능?", "a": "rRNA 합성 및 리보솜 소단위체/대단위체 조립에 관여"}, {"id": "A0-51", "q": "핵막층(nuclear lamina)의 역할?", "a": "핵막을 기계적으로 지지해 핵의 모양 유지(동물: 중간섬유 망상구조)"}, {"id": "A0-52", "q": "핵 기질(nuclear matrix)은?", "a": "핵 내부에 섬유구조를 형성한다는 증거가 있음"}, {"id": "A0-53", "q": "리보솜 소단위체·대단위체는 어디서 조립되고 어디로 이동?", "a": "인에서 조립(분리) → 핵공 통해 세포질로 나가 결합해 리보솜 형성"}, {"id": "A0-54", "q": "리보솜은 막성 소기관인가?", "a": "아님(막으로 둘러싸이지 않음) — 단백질 합성 기계"}, {"id": "A0-55", "q": "리보솜의 기능?", "a": "단백질 합성(번역)"}, {"id": "A0-56", "q": "리보솜 위치 2가지?", "a": "자유 리보솜(세포질) / 부착 리보솜(조면소포체·핵외막)"}, {"id": "A0-57", "q": "진핵/원핵 리보솜 크기와 소단위체?", "a": "진핵 80S=60S+40S, 원핵 70S=50S+30S"}, {"id": "A0-58", "q": "단백질 합성률이 높은 세포의 특징(리보솜/인)?", "a": "큰 인 + 많은 리보솜(예: 췌장 세포는 수백만 개)"}, {"id": "A0-59", "q": "내막계 구성 소기관 5가지?", "a": "핵막, 소포체, 골지체, 리소좀, 액포(+여러 소낭)"}, {"id": "A0-60", "q": "내막계 막의 기능 4가지?", "a": "①단백질 합성 ②단백질 수송(막/소기관/세포 밖) ③지질 대사·이동 ④독소 해독"}, {"id": "A0-61", "q": "소포체(ER)는 어떤 구조의 네트워크?", "a": "막성 주머니와 관의 광대한 네트워크(세포질과 ER 내강을 분리)"}, {"id": "A0-62", "q": "소포체는 무엇과 연속적으로 붙어있는가?", "a": "핵막과 연속"}, {"id": "A0-63", "q": "소포체 종류 2가지와 구분 기준?", "a": "활면소포체(smooth ER, 리보솜X) / 조면소포체(rough ER, 리보솜O)"}, {"id": "A0-64", "q": "활면소포체 기능 4가지(두문자)?", "a": "지질합성·탄수화물대사·칼슘이온저장·독성물질제거 (L카칼독)"}, {"id": "A0-65", "q": "활면소포체가 특히 발달한 기관/세포 2곳?", "a": "정소·난소·부신(스테로이드), 간(해독)"}, {"id": "A0-66", "q": "근육세포에서 활면소포체의 역할?", "a": "Ca2+를 내강에 저장 → 자극 시 Ca2+ 방출해 근수축 촉진"}, {"id": "A0-67", "q": "조면소포체 기능 3가지(두문자)?", "a": "분비단백질/다른 단백질 합성, 탄수화물 첨가, 새로운 막 합성 (분당막)"}, {"id": "A0-68", "q": "조면소포체에서 분비 단백질이 들어가는 곳?", "a": "리보솜에서 나온 폴리펩타이드가 막 단백질 복합체 구멍 통해 ER 내강으로 들어감"}, {"id": "A0-69", "q": "분비 단백질이 ER 내강에서 일어나는 과정 2가지?", "a": "접힘(folding) + (대부분) 당단백질화(탄수화물 공유결합)"}, {"id": "A0-70", "q": "전이성 소포체(transitional ER)에서 생성되는 소낭 이름?", "a": "수송소포(transitional vesicle)"}, {"id": "A0-71", "q": "소포체 막은 어떻게 성장하는가?", "a": "막단백질·인지질을 추가(막 내 효소가 세포질 전구체로부터 인지질 합성)"}, {"id": "A0-72", "q": "골지체(Golgi apparatus)의 핵심 기능 4단어?", "a": "생산·저장·분류·수송(발송/접수 센터)"}, {"id": "A0-73", "q": "골지체의 구조적 단위(납작한 주머니) 이름?", "a": "시스터나(cisterna)들이 쌓인 구조"}, {"id": "A0-74", "q": "골지체의 극성: 시스면/트랜스면 특징?", "a": "시스면: 소포체 쪽(받음) / 트랜스면: 소낭 출아(보냄)"}, {"id": "A0-75", "q": "시스터나 성숙 모델(cisternal maturation model) 요지?", "a": "시스터나가 시스→트랜스로 이동하며 단백질을 운반·가공"}, {"id": "A0-76", "q": "골지체 트랜스면의 역할 2가지?", "a": "소낭에 넣을 산물 분류 + 목적지 표식 부여"}, {"id": "A0-77", "q": "리소좀(lysosome)의 정의?", "a": "가수분해효소가 들어있는 막성 소낭(소화성 소기관)"}, {"id": "A0-78", "q": "리소좀의 주요 분해 대상 3가지(두문자)?", "a": "재활용 위해 흡수된 물질, 세포 고분자, 손상된 소기관 (재·고·손)"}, {"id": "A0-79", "q": "리소좀 효소가 잘 작동하는 환경?", "a": "리소좀 내 산성 환경"}, {"id": "A0-80", "q": "리소좀 내용물이 세포질로 새도 비교적 안전한 이유?", "a": "세포질은 중성 pH라 효소 활성이 낮음(단 과다 방출 시 자기소화 위험)"}, {"id": "A0-81", "q": "가수분해효소와 리소좀 막은 어디서 만들어지는가?", "a": "조면소포체에서 합성 → 골지체에서 가공"}, {"id": "A0-82", "q": "식세포작용(phagocytosis)에서 리소좀 역할?", "a": "식포와 융합해 음식(입자)을 소화"}, {"id": "A0-83", "q": "식세포작용을 하는 인간 세포 예시?", "a": "대식세포(macrophage)"}, {"id": "A0-84", "q": "자기소화작용(autophagy)이란?", "a": "손상된 소기관/세포질 일부를 막으로 격리 후 리소좀과 융합해 재활용"}, {"id": "A0-85", "q": "액포(vacuole)의 정의?", "a": "커다란 막성 주머니(ER·골지체에서 유래)"}, {"id": "A0-86", "q": "액포 기능 6가지(두문자)?", "a": "물의 균형, 세포성장, 보호, 저장, 소화, 축적/노폐물 저장 (균성보저소축)"}, {"id": "A0-87", "q": "성숙한 식물세포의 대표적 액포?", "a": "중심액포(central vacuole)"}, {"id": "A0-88", "q": "세포 수액(cell sap)이란?", "a": "중심액포에 있는 용액"}, {"id": "A0-89", "q": "중심액포의 무기이온 저장 예시?", "a": "칼슘(Ca2+), 염소(Cl−) 이온 등"}, {"id": "A0-90", "q": "중심액포가 식물세포 성장에 기여하는 방식?", "a": "물 흡수로 세포 부피를 키워 새 세포질을 크게 늘리지 않아도 성장 가능"}, {"id": "A0-91", "q": "식물 액포에 저장될 수 있는 물질 예시 2가지?", "a": "저장 단백질(씨앗), 방어물질(캡사이신·니코틴), 색소(꽃잎) 등"}, {"id": "A0-92", "q": "원생생물에서 삼투압을 조절하는 액포는?", "a": "수축포(contractile vacuole)"}, {"id": "A0-93", "q": "액포를 둘러싼 막의 이름은?", "a": "액포막(tonoplast)"}, {"id": "A0-94", "q": "미토콘드리아의 기능?", "a": "세포호흡을 통해 대부분의 ATP 생산"}, {"id": "A0-95", "q": "미토콘드리아에서 분해되어 ATP를 얻는 기질 3가지?", "a": "당, 지방(L-카르니틴 관련), 아미노산"}, {"id": "A0-96", "q": "미토콘드리아 분포 특징?", "a": "거의 모든 진핵세포(식물·동물·균류·원생생물)에 존재, 세포당 1개~수천개"}, {"id": "A0-97", "q": "미토콘드리아 수와 어떤 것의 관계?", "a": "물질대사(활동/수축 세포일수록 더 많음)"}, {"id": "A0-98", "q": "미토콘드리아 막 구조와 내막 특징?", "a": "이중막, 내막은 크리스테(cristae)로 주름짐"}, {"id": "A0-99", "q": "미토콘드리아 내막이 구분하는 2구획?", "a": "막간공간(intermembrane space), 미토콘드리아 기질(matrix)"}, {"id": "A0-100", "q": "미토콘드리아 기질에 있는 것 3가지?", "a": "효소, 미토콘드리아 DNA, 리보솜"}, {"id": "A0-101", "q": "세포 내 미토콘드리아의 형태(최근 관찰)?", "a": "따로 노는 점이 아니라 튜브형 연결망(network) 형태"}, {"id": "A0-102", "q": "엽록체의 기능 1줄?", "a": "빛에너지를 화학에너지로 전환해 CO2와 물로부터 당 등 유기화합물 합성"}, {"id": "A0-103", "q": "엽록체가 발견되는 곳?", "a": "식물의 잎/녹색 구조 및 조류"}, {"id": "A0-104", "q": "엽록체의 주요 막 구조 2개?", "a": "이중막 + 틸라코이드(thylakoid) 막"}, {"id": "A0-105", "q": "그라나(grana)란?", "a": "틸라코이드가 여러 겹 쌓인 구조(granum의 복수)"}, {"id": "A0-106", "q": "스트로마(stroma)란?", "a": "그라나 바깥의 액체 영역(효소·엽록체 DNA·리보솜 포함)"}, {"id": "A0-107", "q": "광합성 명반응/암반응 위치?", "a": "명반응: 그라나(틸라코이드) / 암반응: 스트로마"}, {"id": "A0-108", "q": "암반응이 낮에도 일어나는 이유(노트 기준)?", "a": "암반응에 필요한 에너지를 명반응에서 만들기 때문"}, {"id": "A0-109", "q": "엽록체의 행동(동적 성질) 2가지?", "a": "자라며 둘로 갈라져 복제, 세포골격 트랙 따라 이동"}, {"id": "A0-110", "q": "미토콘드리아·엽록체의 진화적 기원?", "a": "세포내 공생설: 초기 진핵세포가 원핵세포를 삼켜 공생체로 됨"}, {"id": "A0-111", "q": "세포내 공생설의 증거 3가지(노트 기준)?", "a": "이중막, 자체 리보솜, 내막에 붙은 자체 DNA, 세포내 독립적 성장·복제"}, {"id": "A0-112", "q": "세포내공생설을 주장한 학자는?", "a": "린 마걸리스(Lynn Margulis)"}, {"id": "A0-113", "q": "미토콘드리아의 진화적 기원(세균 종류)은?", "a": "호기성 세균(α-프로테오박테리아)"}, {"id": "A0-114", "q": "엽록체의 진화적 기원(세균 종류)은?", "a": "시아노박테리아(남세균)"}, {"id": "A0-115", "q": "미토콘드리아·엽록체의 리보솜 크기는?", "a": "70S(원핵형) — 세균과 같음(공생설 근거)"}, {"id": "A0-116", "q": "미토콘드리아·엽록체 DNA의 특징은?", "a": "히스톤 없는 환형(원핵형)"}, {"id": "A0-117", "q": "미토콘드리아 외막에 수용성 통로를 형성하는 단백질은?", "a": "포린(porin)"}, {"id": "A0-118", "q": "퍼옥시좀(peroxisome)의 막 구조?", "a": "단일막"}, {"id": "A0-119", "q": "퍼옥시좀의 핵심 특징 1줄?", "a": "특화된 대사 반응 수행, 과산화수소(H2O2) 생성 후 카탈라아제로 물로 전환"}, {"id": "A0-120", "q": "카탈라아제 반응식(노트 표기)?", "a": "2H2O2 → 2H2O + O2"}, {"id": "A0-121", "q": "글리옥시좀(glyoxysome)이란?", "a": "씨앗의 지방을 당으로 바꾸어 초기 영양 공급하는 특화된 퍼옥시좀"}, {"id": "A0-122", "q": "미세융모(microvilli)의 기능?", "a": "세포 표면적을 증가시켜 물질대사에 유리"}, {"id": "A0-123", "q": "세포골격의 주요 역할 2가지?", "a": "세포 모양 지지(특히 동물세포) + 세포/소기관 운동성에 관여"}, {"id": "A0-124", "q": "세포 운동성(cell mobility)의 의미 2가지(넓은/좁은)?", "a": "넓게: 세포의 위치 이동, 좁게: 세포 내 소기관 이동"}, {"id": "A0-125", "q": "세포골격 3요소?", "a": "미세소관, 미세섬유(액틴 필라멘트), 중간섬유"}, {"id": "A0-126", "q": "미세소관의 길이 변화 특징?", "a": "튜불린이 양끝에 붙어 중합되며, 탈중합(분해)도 가능"}, {"id": "A0-127", "q": "미세소관의 방향성(플러스/마이너스) 의미?", "a": "플러스: 튜불린이 잘 붙는 쪽 / 마이너스: 해리되기 쉬운 쪽"}, {"id": "A0-128", "q": "동물세포에서 미세소관이 뻗어 나오는 곳?", "a": "핵 근처 중심체(centrosome)"}, {"id": "A0-129", "q": "중심체(centrosome)의 구성?", "a": "한 쌍의 중심립(centriole) 포함"}, {"id": "A0-130", "q": "중심립(centriole)의 미세소관 배열?", "a": "3개가 한 단위(삼중소관) × 9세트가 원형 배열"}, {"id": "A0-131", "q": "중심체/미세소관이 세포분열에서 하는 일(노트 표현)?", "a": "방추사를 만들어 염색체를 잡아당김"}, {"id": "A0-132", "q": "모든 진핵세포가 중심체를 갖는가?", "a": "아님 — 많은 진핵세포는 다른 수단으로 미세소관을 조직화"}, {"id": "A0-133", "q": "섬모(cilia)·편모(flagella)의 공통점(노트)?", "a": "운동 부속지이며 미세소관의 특이한 배열과 관련"}, {"id": "A0-134", "q": "섬모/편모의 미세구조 패턴?", "a": "9 + 2 패턴(주변 9쌍관체 + 중심 2미세소관)"}, {"id": "A0-135", "q": "섬모·편모에서 기저체(basal body)의 역할?", "a": "섬유(미세소관)를 고정(구조는 중심립과 유사)"}, {"id": "A0-136", "q": "섬모·편모의 운동을 일으키는 단백질?", "a": "디네인(dynein) 운동 단백질"}, {"id": "A0-137", "q": "사람에서 섬모의 대표적 기능?", "a": "점액(찌꺼기)을 폐의 바깥으로 내보냄"}, {"id": "A0-138", "q": "신호 수용 '안테나'로 작동하는 섬모는?", "a": "비운동성 섬모 — 1차 섬모(primary cilium), 세포당 1개"}, {"id": "A0-139", "q": "섬모와 편모의 차이 3가지(노트)?", "a": "길이, 세포당 수, 움직임 패턴은 다르나 미세구조는 유사"}, {"id": "A0-140", "q": "편모를 가지는 예시 생물/세포 3가지?", "a": "원생생물, 동물 정자, 조류(및 몇 식물)"}, {"id": "A0-141", "q": "미세섬유가 저항하는 힘?", "a": "장력(당기는 힘)에 저항"}, {"id": "A0-142", "q": "미세섬유가 만드는 구조적 특징?", "a": "3차원 네트워크 형성(세포 모양 지지), 가지치기 네트워크도 형성 가능"}, {"id": "A0-143", "q": "미세융모의 핵심 구성 요소?", "a": "미세섬유(액틴 필라멘트)"}, {"id": "A0-144", "q": "근육 수축에서 미세섬유의 배열/상호작용?", "a": "미세섬유가 근세포 길이 따라 평행 배열, 마이오신 두꺼운 섬유와 얽혀 수축"}, {"id": "A0-145", "q": "아메바 운동(amoeboid movement)의 원리(노트)?", "a": "액틴·마이오신에 의한 제한적 수축으로 세포가 이동"}, {"id": "A0-146", "q": "중간섬유가 존재하는 생물군?", "a": "척추동물을 포함한 일부 동물(식물에는 없음)"}, {"id": "A0-147", "q": "식물 세포의 세포골격 구성은?", "a": "미세섬유와 미세소관만 (중간섬유는 식물에 없음)"}, {"id": "A0-148", "q": "중간섬유의 주요 기능?", "a": "장력 유지 + 오래가는 세포 지지물"}, {"id": "A0-149", "q": "케라틴(keratin)은 어떤 세포골격 요소와 관련?", "a": "중간섬유를 이루는 단백질 그룹"}, {"id": "A0-150", "q": "피부 각질/핵 위치 고정과 중간섬유의 관계(노트)?", "a": "피부 각질은 케라틴 풍부, 핵은 중간섬유 망 안에 놓여 위치가 고정"}, {"id": "A0-151", "q": "식물세포만이 가지는 구조 4가지?", "a": "액포, 엽록체, 원형질연락사, 세포벽"}, {"id": "A0-152", "q": "세포벽(cell wall)이 있는 세포?", "a": "식물세포(노트 기준)"}, {"id": "A0-153", "q": "세포벽의 기능 4가지?", "a": "개별세포 보호, 형태 유지, 물 과다 흡수 저지(팽압), 중력에 저항해 식물 지지"}, {"id": "A0-154", "q": "세포벽의 주요 구성(노트 비유)?", "a": "셀룰로오스 미세섬유가 다른 다당류·단백질 기질에 박혀 구조 형성(콘크리트+유리섬유 비유)"}, {"id": "A0-155", "q": "세포벽의 물질 투과 특성은?", "a": "전투과성(물질이 자유롭게 통과) — 선택적 장벽 역할은 세포막"}, {"id": "A0-156", "q": "중간 라멜라(middle lamella)의 성분과 기능?", "a": "펙틴(끈적 다당류) 층 — 이웃 세포를 붙임"}, {"id": "A0-157", "q": "1차 세포벽(primary cell wall) 특징?", "a": "얇고 구부러지기 쉬움(어린 세포가 분비)"}, {"id": "A0-158", "q": "2차 세포벽(secondary cell wall)은 언제/어떤 특징?", "a": "성장 멈춘 뒤 1차 벽 안쪽에 합성, 더 강하고 내구성 있음(목재의 주성분)"}, {"id": "A0-159", "q": "동물세포는 세포벽 대신 무엇을 갖는가?", "a": "세포외기질(ECM, extracellular matrix)"}, {"id": "A0-160", "q": "세포외기질(ECM)의 주요 구성 성분 2부류?", "a": "당단백질 + 세포가 분비한 탄수화물을 포함한 분자들"}, {"id": "A0-161", "q": "ECM에서 가장 많은 당단백질(노트)?", "a": "콜라젠(collagen) — 강한 섬유 형성(인체 단백질의 약 40%)"}, {"id": "A0-162", "q": "콜라젠 섬유가 들어가는 그물 구조(노트)?", "a": "프로테오글리칸(proteoglycan) 그물"}, {"id": "A0-163", "q": "세포가 ECM에 붙도록 돕는 당단백질 예시?", "a": "파이브로넥틴(fibronectin)"}, {"id": "A0-164", "q": "인테그린(integrin)이란?", "a": "세포막의 수용체 단백질로 ECM 단백질(예: 파이브로넥틴)과 결합"}, {"id": "A0-165", "q": "인테그린의 위치적 역할 1줄?", "a": "ECM과 세포골격 사이에서 변화/신호를 전달해 세포외·세포내 변화를 조율"}, {"id": "A0-166", "q": "ECM이 세포 행동/유전자 활동에 미치는 영향(노트)?", "a": "물리·화학적 경로로 핵에 정보 전달 → 신호전달 경로 변화 → 생성 단백질 종류가 바뀜"}, {"id": "A0-167", "q": "식물세포에서 세포 간 통신 경로?", "a": "원형질연락사(plasmodesmata)"}, {"id": "A0-168", "q": "원형질연락사의 특징 2가지?", "a": "인접 세포의 원형질막이 채널로 연속, 통로가 세포막으로 덮여 세포질이 연결됨"}, {"id": "A0-169", "q": "동물세포의 3가지 세포연접?", "a": "밀착연접(tight junction), 데스모솜(desmosome), 간극연접(gap junction)"}, {"id": "A0-170", "q": "밀착연접(tight junction)의 기능?", "a": "세포 주변을 연속적으로 밀봉해 세포외용액이 새는 것을 방지"}, {"id": "A0-171", "q": "데스모솜(desmosome)의 기능(비유 포함)?", "a": "세포를 고정시키는 못처럼 작용; 중간섬유(케라틴)가 데스모솜을 잡음"}, {"id": "A0-172", "q": "간극연접(gap junction)=소통연접의 특징?", "a": "작은 분자(이온·당·아미노산 등) 통과, 막으로 통로를 감싸진 않음(노트)"}, {"id": "A0-173", "q": "간극연접이 중요한 조직/상황 예시?", "a": "심장근육, 동물 배아세포의 세포 간 소통"}, {"id": "A0-174", "q": "원핵세포에서 세포호흡이 일어나는 장소는?", "a": "세포막(미토콘드리아가 없으므로)"}, {"id": "A0-175", "q": "세포막 인지질의 결합 방식을 3영역으로 비교하면?", "a": "세균=에스테르(곧은 사슬) / 고세균=에테르(가지 곁사슬) / 진핵(식물·동물)=에스테르"}, {"id": "A0-176", "q": "세포벽 성분을 4군으로 비교하면?", "a": "세균=펩티도글리칸 / 고세균=수도펩티도글리칸 / 식물=셀룰로오스·펙틴 / 동물=없음"}, {"id": "A0-177", "q": "세포벽의 당 결합 방식을 비교하면?", "a": "세균=β1-4 / 고세균=β1-3 / 식물=β1-4"}, {"id": "A0-178", "q": "핵막 유무를 3영역으로 비교하면?", "a": "세균 없음 / 고세균 없음 / 진핵 있음"}, {"id": "A0-179", "q": "히스톤 단백질 유무를 3영역으로 비교하면?", "a": "세균 없음 / 고세균 있음 / 진핵 있음"}, {"id": "A0-180", "q": "인트론·엑손 유무를 3영역으로 비교하면?", "a": "세균 없음 / 고세균 있음 / 진핵 있음"}, {"id": "A0-181", "q": "번역 개시 아미노산을 3영역으로 비교하면?", "a": "세균=fMet(포르밀메티오닌) / 고세균=Met / 진핵=Met"}, {"id": "A0-182", "q": "막성 세포소기관 유무를 3영역으로 비교하면?", "a": "세균 없음 / 고세균 없음 / 진핵 있음"}, {"id": "A0-183", "q": "RNA 중합효소(mRNA 합성효소)를 3영역으로 비교하면?", "a": "세균 1종 / 고세균 1종 / 진핵 여러 종류(I·II·III)"}, {"id": "A0-184", "q": "오페론 유무를 3영역으로 비교하면?", "a": "세균 O / 고세균 O / 진핵 X"}, {"id": "A0-185", "q": "리보솜을 3영역으로 비교하면?", "a": "세균 70S(50+30) / 고세균 70S(50+30) / 진핵 80S(60+40)"}, {"id": "A0-186", "q": "고세균이 진핵세포와 닮은(공유하는) 특징은?", "a": "히스톤 있음, 개시 아미노산 Met, 인트론 있음, RNA 중합효소가 진핵형(구조 복잡)"}, {"id": "A0-187", "q": "고세균이 진정세균(세균)과 같은 특징은?", "a": "핵막·막성 소기관 없음, 오페론 있음, 70S 리보솜"}, {"id": "A0-188", "q": "고세균만의 독특한 막지질 특징은?", "a": "에테르 결합(가지 친 곁사슬) — 세균·진핵은 에스테르"}, {"id": "A0-189", "q": "세포분획법(cell fractionation)의 목적은?", "a": "세포를 균질화(파쇄)한 뒤 원심분리로 소기관을 크기·밀도별로 분리하는 기법"}, {"id": "A0-190", "q": "차등(분별)원심분리에서 소기관이 침전되는 순서(저속→고속)는?", "a": "핵 → 미토콘드리아·엽록체 → 소포체·리보솜(마이크로솜)"}, {"id": "A0-191", "q": "간세포 균질액을 저속(약 800~1000×g)으로 돌리면 가장 먼저 침전되는 소기관은?", "a": "핵 (가장 크고 무거움)"}, {"id": "A0-192", "q": "가장 높은 원심력(약 100,000×g)에서 침전되는 분획은?", "a": "소포체 조각·리보솜(마이크로솜)"}, {"id": "A0-193", "q": "소기관의 침강 정도를 결정하는 두 요인은?", "a": "크기와 밀도 (무겁고 클수록 낮은 속도에서 먼저 침전)"}, {"id": "A0-194", "q": "광학현미경(LM)과 전자현미경(EM)의 결정적 차이는?", "a": "전자현미경이 분해능이 훨씬 높음(파장 짧은 전자빔 사용)"}, {"id": "A0-195", "q": "배율(magnification)과 분해능(resolution)의 차이는?", "a": "배율=상을 확대하는 정도 / 분해능=가까운 두 점을 구별하는 능력"}, {"id": "A0-196", "q": "표면을 금속으로 도금하고 방출 전자로 3차원 표면 영상을 얻는 현미경은?", "a": "주사전자현미경(SEM)"}, {"id": "A0-197", "q": "얇은 절편을 투과한 전자로 세포 내부 초미세구조를 보는 현미경은?", "a": "투과전자현미경(TEM)"}, {"id": "A0-198", "q": "리소좀 저장질환(lysosomal storage disease)의 근본 원인은?", "a": "리소좀 가수분해효소 결핍 → 기질이 분해되지 못하고 축적됨"}, {"id": "A0-199", "q": "테이삭스병(Tay-Sachs)의 결핍 효소와 축적 물질은?", "a": "헥소사미니다제 결핍 → 신경세포에 강글리오시드(지질) 축적"}, {"id": "A0-200", "q": "봉입세포병(I-cell disease)의 원인은?", "a": "만노스-6-인산(M6P) 표지 결함 → 효소가 리소좀으로 전달되지 못함"}, {"id": "A0-201", "q": "세포질의 잘못 접힌·수명 다한 단백질을 분해하는 통 모양 기구는?", "a": "프로테아좀(proteasome)"}, {"id": "A0-202", "q": "프로테아좀의 분해 대상에 붙는 표지 단백질은?", "a": "유비퀴틴(ubiquitin) — 보통 여러 개가 사슬로 붙음"}, {"id": "A0-203", "q": "리소좀 분해 vs 프로테아좀 분해의 대상 차이는?", "a": "리소좀=세포외 유입물·손상 소기관(자가포식) / 프로테아좀=유비퀴틴 표지된 세포질 단백질"}, {"id": "A0-204", "q": "운동성 섬모·편모(축사, axoneme)의 미세소관 배열은?", "a": "9+2 (주변 9쌍관체 + 중심 미세소관 2개)"}, {"id": "A0-205", "q": "중심립·기저체의 미세소관 배열은?", "a": "9×3 삼중체 = 9+0 (중심 미세소관 없음)"}, {"id": "A0-206", "q": "분비·막 단백질을 조면소포체로 유도하는 신호와 인식 인자는?", "a": "N말단 신호서열(signal sequence)을 SRP(신호인식입자)가 인식"}, {"id": "A0-207", "q": "단백질을 소포체에 머무르게 하는 C말단 잔류 신호서열은?", "a": "KDEL 서열"}]}, {"label": "8 세포막", "cards": [{"id": "A1-0", "q": "세포막을 한 문장으로 정의하면?", "a": "지질과 단백질로 구성된 유동 모자이크이다."}, {"id": "A1-1", "q": "세포막 구성의 두 축은?", "a": "지질 + 단백질"}, {"id": "A1-2", "q": "인지질의 핵심 화학적 성질은?", "a": "양친매성(amphipathic)"}, {"id": "A1-3", "q": "양친매성이란?", "a": "친수성 부분과 소수성 부분을 동시에 가진 성질"}, {"id": "A1-4", "q": "유동 모자이크 모델에 따르면 막은 무엇인가?", "a": "인지질 이중층에서 단백질이 움직이는 모자이크"}, {"id": "A1-5", "q": "세포막이 '유동적'이라는 말의 뜻은?", "a": "막 분자들이 특정 위치에 고정되지 않고 옆으로 움직인다는 뜻"}, {"id": "A1-6", "q": "세포막이 '모자이크'라는 말의 뜻은?", "a": "여러 종류의 단백질이 인지질 이중층에 섞여 박혀 있다는 뜻"}, {"id": "A1-7", "q": "막 유동성에 영향을 주는 대표 요인 2가지는?", "a": "인지질 꼬리의 포화도 + 콜레스테롤"}, {"id": "A1-8", "q": "불포화 탄화수소 꼬리가 막 유동성을 높이는 이유는?", "a": "꼬리가 꺾여 있어 인지질이 촘촘히 쌓이는 것을 방해하기 때문"}, {"id": "A1-9", "q": "포화 탄화수소 꼬리가 많은 막의 성질은?", "a": "더 조밀하고 덜 유동적이다."}, {"id": "A1-10", "q": "불포화 꼬리가 풍부한 막은 어떤 온도에서 유동성을 더 잘 유지하는가?", "a": "낮은 온도"}, {"id": "A1-11", "q": "콜레스테롤은 상온/체온에서 막에 어떤 효과를 주는가?", "a": "인지질 이동을 억제해 막을 덜 유동적으로 만든다."}, {"id": "A1-12", "q": "콜레스테롤은 낮은 온도에서 막에 어떤 효과를 주는가?", "a": "인지질이 정상적으로 채워지는 것을 방해해 고체화를 막는다."}, {"id": "A1-13", "q": "콜레스테롤을 막의 '완충장치'라고 볼 수 있는 이유는?", "a": "높은 온도에선 유동성을 낮추고 낮은 온도에선 고체화를 막기 때문"}, {"id": "A1-14", "q": "콜레스테롤의 막 내 위치는?", "a": "인지질 분자들 사이에 끼어 있음"}, {"id": "A1-15", "q": "막이 제대로 작동하려면 왜 유동성이 필요한가?", "a": "막 투과성과 막 단백질 이동·기능 유지에 필요하기 때문"}, {"id": "A1-16", "q": "막이 고체화되면 생길 수 있는 문제 2가지는?", "a": "투과성 변화 + 효소 단백질 불활성화"}, {"id": "A1-17", "q": "막이 너무 유동적이어도 문제가 되는 이유는?", "a": "막 단백질의 안정적 기능을 지지하지 못하기 때문"}, {"id": "A1-18", "q": "소기름과 돼지기름의 대표 지방산으로 언급된 것은?", "a": "소기름=스테아르산(C18), 돼지기름=팔미트산(C16)"}, {"id": "A1-19", "q": "막 단백질의 큰 두 종류는?", "a": "내재단백질 + 주변부단백질"}, {"id": "A1-20", "q": "내재단백질(integral protein)이란?", "a": "지질 이중층 안에 박혀 있는 단백질"}, {"id": "A1-21", "q": "막관통단백질(transmembrane protein)이란?", "a": "지질 이중층을 끝에서 끝까지 관통하는 내재단백질"}, {"id": "A1-22", "q": "주변부단백질(peripheral protein)이란?", "a": "막 표면에 느슨하게 붙어 있는 단백질"}, {"id": "A1-23", "q": "주변부단백질은 막을 관통하는가?", "a": "아니오"}, {"id": "A1-24", "q": "막관통단백질의 소수성 부분은 주로 어떤 구조를 이루는가?", "a": "소수성 알파나선"}, {"id": "A1-25", "q": "막 단백질의 주요 기능 6가지는?", "a": "수송, 효소 활성, 신호전달, 세포-세포 인식, 세포 간 결합, 세포골격/ECM 부착"}, {"id": "A1-26", "q": "막 단백질 기능 중 '수송'이란?", "a": "특정 용질에 대해 막을 가로지르는 선택적 통로·운반 기능 제공"}, {"id": "A1-27", "q": "막 단백질 기능 중 '효소 활성'이란?", "a": "막에 내장된 효소가 반응물과 만나 반응을 촉진하는 기능"}, {"id": "A1-28", "q": "막 단백질 기능 중 '신호전달'이란?", "a": "수용체가 신호분자 결합을 받아 세포 안으로 신호를 전달하는 기능"}, {"id": "A1-29", "q": "막 단백질 기능 중 '세포-세포 인식'이란?", "a": "다른 세포가 인식할 수 있는 식별 표지 역할"}, {"id": "A1-30", "q": "막 단백질 기능 중 '세포 간 결합'이란?", "a": "인접 세포의 막 단백질끼리 연접을 형성하는 기능"}, {"id": "A1-31", "q": "막 단백질 기능 중 '세포골격/ECM 부착'이란?", "a": "세포 형태를 유지하고 막 단백질 위치를 안정화하는 기능"}, {"id": "A1-32", "q": "세포호흡 전자전달효소복합체는 막 단백질 기능 중 어디에 해당하는가?", "a": "효소 활성"}, {"id": "A1-33", "q": "면역글로불린(항체) 당단백질은 막 단백질 기능 중 어디와 관련되는가?", "a": "세포-세포 인식"}, {"id": "A1-34", "q": "간극연접(gap junction)과 밀착연접(tight junction)은 막 단백질 기능 중 어디에 해당하는가?", "a": "세포 간 결합"}, {"id": "A1-35", "q": "미세섬유가 막단백질에 비공유 결합하는 이유는?", "a": "세포 형태 유지와 특정 막 단백질 위치 안정화"}, {"id": "A1-36", "q": "ECM 분자에 결합하는 막단백질의 의미는?", "a": "세포 밖 변화와 세포 안 변화를 조화롭게 연결"}, {"id": "A1-37", "q": "당단백질(glycoprotein)이란?", "a": "막단백질에 탄수화물이 결합한 것"}, {"id": "A1-38", "q": "당지질(glycolipid)이란?", "a": "막지질에 탄수화물이 결합한 것"}, {"id": "A1-39", "q": "세포막의 안쪽 면과 바깥쪽 면은 대칭인가?", "a": "비대칭 — 탄수화물(당사슬·당단백질·당지질)은 바깥쪽 면에만 위치"}, {"id": "A1-40", "q": "막의 선택적 투과성(selective permeability)이란?", "a": "일부 물질은 통과시키고 다른 물질은 막는 성질"}, {"id": "A1-41", "q": "세포가 물질 교환을 해야 하는 이유 2가지는?", "a": "영양물질 유입 + 노폐물 배출"}, {"id": "A1-42", "q": "세포가 무기 이온 농도를 막을 가로질러 조절하는 이유는?", "a": "세포내 전하와 생리 기능을 유지하기 위해"}, {"id": "A1-43", "q": "지질 이중층을 쉽게 통과하는 분자는?", "a": "비극성 소수성 분자"}, {"id": "A1-44", "q": "지질 이중층을 쉽게 통과하는 비극성 분자 예시는?", "a": "탄화수소, CO2, O2"}, {"id": "A1-45", "q": "비극성 분자가 막 단백질 없이도 통과 가능한 이유는?", "a": "지질 이중층의 소수성 내부에 용해될 수 있기 때문"}, {"id": "A1-46", "q": "지용성(스테로이드) 호르몬이 세포막을 통과하는 방식은?", "a": "단순확산 — 소수성이라 지질 이중층에 직접 용해"}, {"id": "A1-47", "q": "수용성 호르몬과 지용성 호르몬의 수용 방식 차이는?", "a": "지용성=막을 통과해 세포 내 수용체 / 수용성=막 표면 수용체(GPCR)에 결합"}, {"id": "A1-48", "q": "물은 비극성 분자만큼 빠르게 통과하는가?", "a": "아니오"}, {"id": "A1-49", "q": "극성 친수성 분자가 막을 잘 통과하지 못하는 이유는?", "a": "인지질 이중층의 소수성 중심부를 지나기 어렵기 때문"}, {"id": "A1-50", "q": "이온이 막을 특히 통과하기 어려운 이유는?", "a": "전하 자체와 수화껍질 때문에 효과적인 크기가 커지기 때문"}, {"id": "A1-51", "q": "친수성 분자가 지질 이중층 접촉을 피하며 통과하는 방법은?", "a": "수송 단백질 이용"}, {"id": "A1-52", "q": "수송 단백질의 두 큰 종류는?", "a": "통로단백질(channel protein) + 운반단백질(carrier protein)"}, {"id": "A1-53", "q": "통로단백질(channel protein)이란?", "a": "막을 가로지르는 친수성 통로를 제공하는 단백질"}, {"id": "A1-54", "q": "운반단백질(carrier protein)이란?", "a": "통과 물질이 결합하면 모양이 바뀌어 물질을 이동시키는 단백질"}, {"id": "A1-55", "q": "아쿠아포린(aquaporin)의 기능은?", "a": "물 분자가 매우 빠르게 이동하도록 돕는 통로 제공"}, {"id": "A1-56", "q": "아쿠아포린 1개의 폴리펩타이드가 하는 일은?", "a": "물 분자가 일렬로 통과하는 통로 형성"}, {"id": "A1-57", "q": "아쿠아포린은 몇 개의 소단위체로 구성되는가?", "a": "4개의 동일한 폴리펩타이드(각각 물 통로 형성)"}, {"id": "A1-58", "q": "수송 단백질은 대체로 어떤 성질을 가지는가?", "a": "높은 특이성"}, {"id": "A1-59", "q": "수동 수송(passive transport)이란?", "a": "에너지 투입 없이 농도 기울기를 따라 일어나는 막 통과 이동"}, {"id": "A1-60", "q": "수동 수송의 대표 2가지는?", "a": "확산 + 삼투"}, {"id": "A1-61", "q": "확산(diffusion)이란?", "a": "용질 입자가 농도 기울기를 따라 퍼지는 현상"}, {"id": "A1-62", "q": "삼투(osmosis)란?", "a": "선택적 투과막을 통한 물의 확산"}, {"id": "A1-63", "q": "삼투에서 물은 어느 방향으로 이동하는가?", "a": "용질 농도가 낮은 쪽(물 농도 높은 쪽)에서 높은 쪽으로"}, {"id": "A1-64", "q": "단순확산과 촉진확산의 공통점은?", "a": "둘 다 에너지 없이 농도 기울기를 따라 일어나는 수동 수송"}, {"id": "A1-65", "q": "단순확산과 촉진확산의 차이는?", "a": "촉진확산은 수송단백질이 필요하지만 단순확산은 필요 없다"}, {"id": "A1-66", "q": "촉진 확산(facilitated diffusion)이란?", "a": "막 단백질 도움을 받는 수동 수송"}, {"id": "A1-67", "q": "촉진 확산은 에너지를 쓰는가?", "a": "아니오"}, {"id": "A1-68", "q": "촉진 확산의 대표 운반 대상은?", "a": "수용성 극성 물질과 이온"}, {"id": "A1-69", "q": "촉진확산과 단순확산의 속도 특성 차이는?", "a": "촉진확산은 운반체 수가 한정돼 최대속도(포화)가 있음; 단순확산은 농도차에 비례해 직선 증가"}, {"id": "A1-70", "q": "포도당이 적혈구 막을 통과하는 방식과 운반체는?", "a": "촉진확산, GLUT 운반단백질"}, {"id": "A1-71", "q": "이온통로(ion channel)란?", "a": "이온을 통과시키는 통로 단백질"}, {"id": "A1-72", "q": "개폐성 통로(gated channel)란?", "a": "자극에 따라 열리거나 닫히는 통로"}, {"id": "A1-73", "q": "개폐성 통로를 여닫는 자극 2가지는?", "a": "전기적 자극 + 화학적 자극"}, {"id": "A1-74", "q": "전기적 자극에 반응하는 관문 통로의 예로 노트에 언급된 것은?", "a": "신경세포에서 칼륨 관련 통로"}, {"id": "A1-75", "q": "화학적 자극에 반응하는 관문 통로란?", "a": "수송 물질이 아닌 다른 물질이 결합해 열리고 닫히는 통로"}, {"id": "A1-76", "q": "등장성(isotonic) 환경이란?", "a": "세포와 외액의 상대적 용질 농도가 같아 물의 순이동이 없는 상태"}, {"id": "A1-77", "q": "고장성(hypertonic) 환경이란?", "a": "세포 바깥의 용질 농도가 더 높은 환경"}, {"id": "A1-78", "q": "저장성(hypotonic) 환경이란?", "a": "세포 바깥의 용질 농도가 더 낮은 환경"}, {"id": "A1-79", "q": "세포벽이 없는 동물세포를 등장성 용액에 넣으면?", "a": "물의 순이동이 없어 부피 변화가 거의 없다"}, {"id": "A1-80", "q": "세포벽이 없는 동물세포를 고장성 용액에 넣으면?", "a": "물이 빠져나가 쪼그라든다"}, {"id": "A1-81", "q": "세포벽이 없는 동물세포를 저장성 용액에 넣으면?", "a": "물이 들어와 터질 수 있다"}, {"id": "A1-82", "q": "식물세포가 저장성 환경에서 터지지 않는 이유는?", "a": "세포벽이 팽압을 견디기 때문"}, {"id": "A1-83", "q": "팽압(turgor pressure)이란?", "a": "들어오는 물의 압력에 맞서 세포벽이 가하는 압력"}, {"id": "A1-84", "q": "팽압이 식물에 주는 효과는?", "a": "세포가 더 이상 지나치게 팽창하지 않게 하고 지지력을 준다"}, {"id": "A1-85", "q": "식물세포를 고장액에 담그면 일어나는 현상은?", "a": "원형질분리(plasmolysis)"}, {"id": "A1-86", "q": "원형질분리(plasmolysis)란?", "a": "세포막이 세포벽에서 떨어져 나오는 현상"}, {"id": "A1-87", "q": "식물세포가 팽팽(turgid)하게 가장 건강한 상태가 되는 환경은?", "a": "저장성(hypotonic) — 등장성에선 늘어지고(flaccid), 고장성에선 원형질분리로 죽음 (※기본서 '고장성' 표기는 오류)"}, {"id": "A1-88", "q": "능동 수송(active transport)이란?", "a": "에너지를 사용해 농도 기울기에 거슬러 용질을 이동시키는 수송"}, {"id": "A1-89", "q": "능동 수송에서 에너지가 필요한 이유는?", "a": "낮은 농도에서 높은 농도로 옮겨야 하기 때문"}, {"id": "A1-90", "q": "능동 수송을 매개하는 수송 단백질은 통로형인가 운반형인가?", "a": "운반 단백질"}, {"id": "A1-91", "q": "능동 수송은 세포에 어떤 이점을 주는가?", "a": "바깥과 다른 세포내 농도를 유지하게 해 준다"}, {"id": "A1-92", "q": "동물 세포질은 세포외액에 비해 K+와 Na+ 농도가 어떻게 다른가?", "a": "K+는 높고 Na+는 낮다"}, {"id": "A1-93", "q": "이온 기울기 유지를 위해 세포막이 하는 일은?", "a": "Na+를 밖으로, K+를 안으로 옮긴다"}, {"id": "A1-94", "q": "능동 수송의 직접 에너지원은?", "a": "ATP"}, {"id": "A1-95", "q": "ATP가 능동 수송에 동력을 공급하는 일반적 방법은?", "a": "운반 단백질에 인산기를 전달(인산화)"}, {"id": "A1-96", "q": "전압(voltage)이란?", "a": "반대 전하들의 격리에 따른 전기적 위치에너지"}, {"id": "A1-97", "q": "막전위(membrane potential)란?", "a": "막을 가로질러 생기는 전압"}, {"id": "A1-98", "q": "세포 내부는 바깥보다 보통 어떤 전하를 띠는가?", "a": "더 음전하"}, {"id": "A1-99", "q": "막전위 범위로 노트에 제시된 값은?", "a": "-50 mV ~ -200 mV"}, {"id": "A1-100", "q": "막전위가 배터리처럼 작용한다는 말의 뜻은?", "a": "막을 통과하는 전하성 물질 이동에 에너지원 역할을 한다는 뜻"}, {"id": "A1-101", "q": "막전위는 양이온과 음이온의 수동 이동에 각각 어떤 방향성을 주는가?", "a": "양이온은 안으로, 음이온은 밖으로"}, {"id": "A1-102", "q": "나트륨-칼륨 펌프는 1회 작동 시 Na+와 K+를 각각 몇 개 이동시키는가?", "a": "Na+ 3개 밖으로, K+ 2개 안으로"}, {"id": "A1-103", "q": "나트륨-칼륨 펌프는 직접 ATP를 쓰는가?", "a": "예"}, {"id": "A1-104", "q": "나트륨-칼륨 펌프의 첫 단계는?", "a": "세포질 쪽 Na+ 3개가 펌프에 결합"}, {"id": "A1-105", "q": "나트륨-칼륨 펌프의 두 번째 단계는?", "a": "ATP에 의한 인산화가 단백질을 자극"}, {"id": "A1-106", "q": "인산화 후 펌프에 일어나는 변화는?", "a": "형태가 바뀌어 Na+ 친화성이 감소"}, {"id": "A1-107", "q": "인산화 후 Na+는 어디로 이동하는가?", "a": "세포 밖으로 방출"}, {"id": "A1-108", "q": "Na+ 방출 뒤 펌프가 K+에 대해 갖는 성질은?", "a": "K+ 친화성이 높아진다"}, {"id": "A1-109", "q": "K+가 결합한 뒤 펌프가 원래 모양으로 돌아가는 계기는?", "a": "인산기 탈리"}, {"id": "A1-110", "q": "원래 모양으로 돌아간 펌프는 K+를 어디로 내보내는가?", "a": "세포 안"}, {"id": "A1-111", "q": "나트륨-칼륨 펌프가 막전위 유지에 기여하는 이유는?", "a": "3개를 내보내고 2개를 들여보내 순전하를 밖으로 더 많이 이동시키기 때문"}, {"id": "A1-112", "q": "전하를 만들어내는 이러한 펌프를 무엇이라 하는가?", "a": "전기발생성 펌프(electrogenic pump)"}, {"id": "A1-113", "q": "동반 수송(cotransport)이란?", "a": "한 물질의 기울기를 이용해 다른 물질의 수송을 결합시키는 방식"}, {"id": "A1-114", "q": "생물체가 동반수송을 이용하는 이유는?", "a": "자연적인 이온 기울기의 에너지를 활용해 영양물질을 들이기 위해"}, {"id": "A1-115", "q": "식물 세포의 동반수송 예시는?", "a": "H+와 설탕의 공동수송"}, {"id": "A1-116", "q": "동물 세포의 동반수송 예시는?", "a": "Na+ 기울기를 이용한 포도당 수송"}, {"id": "A1-117", "q": "경구수액이 동반수송 예시인 이유는?", "a": "NaCl과 포도당을 함께 넣어 흡수를 촉진하기 때문"}, {"id": "A1-118", "q": "덩어리 수송(bulk transport)이 필요한 이유는?", "a": "큰 분자는 확산이나 수송단백질로 막을 통과하기 어렵기 때문"}, {"id": "A1-119", "q": "덩어리 수송의 두 큰 종류는?", "a": "세포외배출작용(exocytosis) + 세포내섭취작용(endocytosis)"}, {"id": "A1-120", "q": "세포외배출작용(exocytosis)이란?", "a": "소낭이 세포막과 융합하여 물질을 밖으로 분비하는 과정"}, {"id": "A1-121", "q": "세포내섭취작용(endocytosis)이란?", "a": "세포막이 안쪽으로 함입되어 소낭을 만들고 물질을 들이는 과정"}, {"id": "A1-122", "q": "세포외배출작용의 핵심 단계는?", "a": "소낭과 원형질막의 융합"}, {"id": "A1-123", "q": "단백질과 다당류 같은 큰 분자는 보통 어떻게 이동하는가?", "a": "소낭에 포장되어 덩어리째 이동"}, {"id": "A1-124", "q": "노트에서 유전자변이 대장균이 인슐린을 어떻게 내보낸다고 했는가?", "a": "세포외배출작용"}, {"id": "A1-125", "q": "세포내섭취작용의 세 가지 종류는?", "a": "식세포작용, 음세포작용, 수용체 매개 세포내섭취작용"}, {"id": "A1-126", "q": "식세포작용(phagocytosis)이란?", "a": "세포가 큰 입자를 둘러싸 먹는 작용"}, {"id": "A1-127", "q": "음세포작용(pinocytosis)이란?", "a": "세포가 액체 방울과 그 속 용질을 계속적으로 들이마시는 작용"}, {"id": "A1-128", "q": "수용체 매개 세포내섭취작용이란?", "a": "특정 수용체를 통해 표적 물질을 선택적으로 들이는 작용"}, {"id": "A1-129", "q": "백혈구는 어떤 방식으로 항원을 제거하는가?", "a": "식세포작용"}, {"id": "A1-130", "q": "음세포작용에서 세포막의 형태 변화는?", "a": "막의 만입(infolding)"}, {"id": "A1-131", "q": "음세포작용 소낭이 '코팅되었다'는 말의 뜻은?", "a": "세포질 쪽 면에 외피 단백질 층이 덧대어졌다는 뜻"}, {"id": "A1-132", "q": "수용체 매개 세포내섭취작용의 장점은?", "a": "세포외 물질 농도가 낮아도 특정 물질을 대량 획득 가능"}, {"id": "A1-133", "q": "수용체 매개 세포내섭취작용의 대표 예시는?", "a": "저밀도 지질단백질(LDL) 흡수"}, {"id": "A1-134", "q": "LDL이 수용체 매개 세포내섭취작용을 통해 흡수된 뒤 수용체는 어떻게 되는가?", "a": "재활용된다"}, {"id": "A1-135", "q": "수용체 매개 내포작용(LDL)의 경로 순서는?", "a": "피막소공(클라트린) 결합 → 소낭 함입 → 엔도솜에서 수용체 분리 → 수용체 재활용 / 내용물은 리소좀 분해"}, {"id": "A1-136", "q": "LDL 수용체 결함으로 생기는 대표 질환은?", "a": "가족성 고콜레스테롤혈증"}, {"id": "A1-137", "q": "식세포작용으로 형성되는 소낭은?", "a": "식포(food vacuole)"}, {"id": "A1-138", "q": "식세포작용에서 입자를 둘러싸는 세포 돌기는?", "a": "위족(pseudopod)"}, {"id": "A1-139", "q": "식세포작용, 음세포작용, 수용체 매개 세포내섭취작용을 큰 입자/액체/특이적 흡수로 짝지으면?", "a": "식세포작용=큰 입자, 음세포작용=액체, 수용체 매개=특이적 흡수"}, {"id": "A1-140", "q": "단순확산 vs 촉진확산 vs 능동수송을 에너지 사용 기준으로 비교하면?", "a": "단순/촉진확산은 무에너지, 능동수송은 ATP 필요"}, {"id": "A1-141", "q": "단순확산 vs 촉진확산 vs 능동수송을 단백질 필요 여부 기준으로 비교하면?", "a": "단순확산은 불필요, 촉진확산·능동수송은 필요"}, {"id": "A1-142", "q": "촉진확산 vs 능동수송을 기울기 방향 기준으로 비교하면?", "a": "촉진확산은 기울기 순행, 능동수송은 기울기 역행"}, {"id": "A1-143", "q": "통로단백질 vs 운반단백질의 차이는?", "a": "통로는 친수성 구멍 제공, 운반체는 결합 후 모양 변화"}, {"id": "A1-144", "q": "등장성/고장성/저장성을 물 이동 방향으로 비교하면?", "a": "등장성=순이동 없음, 고장성=세포 밖으로, 저장성=세포 안으로"}, {"id": "A1-145", "q": "세포외배출작용 vs 세포내섭취작용의 차이는?", "a": "밖으로 내보냄 vs 안으로 들임"}, {"id": "A1-146", "q": "식세포작용 vs 음세포작용의 차이는?", "a": "큰 입자 vs 액체 방울"}, {"id": "A1-147", "q": "음세포작용 vs 수용체 매개 세포내섭취작용의 차이는?", "a": "비특이적 액체 흡수 vs 특정 수용체 의존 선택적 흡수"}, {"id": "A1-148", "q": "콜레스테롤이 막 유동성에 미치는 효과를 온도별로 정리하면?", "a": "상온에선 유동성 감소, 저온에선 고체화 방지"}, {"id": "A1-149", "q": "세포막에서 '선택적 투과성'과 '수송 단백질'의 관계는?", "a": "막은 친수성/이온성 물질을 잘 통과시키지 않으므로 수송 단백질이 필요하다."}, {"id": "A1-150", "q": "막전위와 동반수송의 관계는?", "a": "막전위·이온기울기라는 저장된 에너지가 다른 물질 수송에 이용될 수 있다."}, {"id": "A1-151", "q": "왜 많은 능동수송 단백질이 운반단백질이지 통로단백질이 아닌가?", "a": "인산화에 따른 구조변화로 역행 수송을 수행해야 하기 때문"}, {"id": "A1-152", "q": "Na⁺/K⁺ 펌프를 억제하는 대표 약물(강심배당체)은?", "a": "우아바인(ouabain)·디곡신(digoxin)"}, {"id": "A1-153", "q": "우아바인으로 Na⁺/K⁺ 펌프를 막으면 세포 내 이온은 어떻게 되는가?", "a": "Na⁺를 못 퍼내 세포내 Na⁺가 축적되고 K⁺ 기울기·막전위가 무너진다"}, {"id": "A1-154", "q": "강심배당체(디곡신)가 심근 수축력을 높이는 기전은?", "a": "세포내 Na⁺↑ → Na⁺/Ca²⁺ 교환↓ → 세포내 Ca²⁺↑ → 수축력 증가"}, {"id": "A1-155", "q": "인지질의 두 이동 방식과 속도 차이는?", "a": "측면확산(lateral)은 매우 빠름 / 플립플롭(flip-flop, 층 사이 뒤집기)은 드물고 느림"}, {"id": "A1-156", "q": "인지질 이중층의 안쪽·바깥쪽 조성이 비대칭으로 유지되는 이유(효소)는?", "a": "플립페이스(flippase)가 특정 인지질을 한쪽 층으로 옮겨 비대칭을 유지"}, {"id": "A1-157", "q": "포스파티딜세린(PS)의 정상 위치와 아폽토시스 때 변화는?", "a": "평소 안쪽(세포질 쪽) → 아폽토시스 시 플립페이스 불활성·스크램블레이스 활성으로 PS가 바깥에 노출(대식세포 제거 신호)"}, {"id": "A1-158", "q": "uniport·symport·antiport를 이동 물질과 방향으로 구분하면?", "a": "uniport=한 물질만 / symport(공수송)=두 물질 같은 방향 / antiport(역수송·대향수송)=두 물질 반대 방향"}, {"id": "A1-159", "q": "antiport(역수송)의 예를 들면?", "a": "Na⁺/H⁺ 교환체(수정란 pH 상승), Na⁺/Ca²⁺ 교환체(심근) 등"}, {"id": "A1-160", "q": "소장·신장에서 포도당을 흡수·재흡수하는 2차 능동수송체는?", "a": "SGLT(Na⁺-포도당 공수송체) — Na⁺ 기울기를 동력으로 사용"}, {"id": "A1-161", "q": "포도당·과당을 촉진확산으로 옮기는 수송체 계열과 과당 담당은?", "a": "GLUT 계열(예: 적혈구 GLUT1) / 과당은 GLUT5"}, {"id": "A1-162", "q": "소장에서 포도당과 과당의 흡수 방식 차이는?", "a": "포도당=SGLT로 Na⁺ 공수송(2차 능동) / 과당=GLUT5 촉진확산"}, {"id": "A1-163", "q": "막 유동성을 높이는 요인 3가지는?", "a": "불포화 지방산↑, 꼬리 사슬이 짧을수록, 온도↑"}]}]}, {"id": "B", "name": "세포의 신호와 호흡", "chapters": [{"label": "9 세포의 신호 교환", "cards": [{"id": "B0-0", "q": "세포외 신호가 세포내 반응으로 전환되는 전체 과정을 무엇이라 하는가?", "a": "세포 신호전달"}, {"id": "B0-1", "q": "세포 신호전달의 3단계는?", "a": "신호수용, 신호전달, 세포반응"}, {"id": "B0-2", "q": "신호수용(signal reception)이란?", "a": "신호 분자가 수용체에 결합하여 수용체의 구조 변화를 일으키는 단계"}, {"id": "B0-3", "q": "신호전달(signal transduction)이란?", "a": "분자 간의 연쇄적 상호작용으로 수용체의 변화를 세포내 중계 분자로 전달하는 단계"}, {"id": "B0-4", "q": "세포반응(cellular response)이란?", "a": "세포질 내 활성이나 전사를 조절해 특정 반응을 일으키는 단계"}, {"id": "B0-5", "q": "아폽토시스(세포예정사)는 무엇의 통합 결과로 일어나는가?", "a": "여러 세포 신호전달 경로의 통합"}, {"id": "B0-6", "q": "동물 신경계의 특성화된 근거리 신호전달 양상은?", "a": "시냅스 신호전달"}, {"id": "B0-7", "q": "시냅스 신호전달에서 전기 신호가 분비를 유도하는 물질은?", "a": "신경전달물질"}, {"id": "B0-8", "q": "신경전달물질은 흥분성인가 억제성인가?", "a": "결합하는 수용체 종류에 따라 흥분성 또는 억제성으로 작용"}, {"id": "B0-9", "q": "시냅스란?", "a": "신경세포와 표적세포 사이의 좁은 틈"}, {"id": "B0-10", "q": "축삭돌기 내에서 전기신호가 이동하는 것을 무엇이라 하는가?", "a": "전도"}, {"id": "B0-11", "q": "한 신경세포에서 다른 신경세포로 신경전달물질을 보내는 것을 무엇이라 하는가?", "a": "전달"}, {"id": "B0-12", "q": "외분비와 내분비의 차이는?", "a": "외분비는 신체 외부로, 내분비는 혈액을 타고 신체 내부로 분비"}, {"id": "B0-13", "q": "에피네프린의 대표 효과 중 하나는?", "a": "저장된 연료를 동원하여 투쟁-도피 반응을 준비시키는 것"}, {"id": "B0-14", "q": "에피네프린은 간과 골격근에서 무엇의 분해를 촉진하는가?", "a": "글리코젠"}, {"id": "B0-15", "q": "글리코젠 분해 산물로 먼저 만들어지는 것은?", "a": "포도당 1-인산"}, {"id": "B0-16", "q": "포도당 1-인산은 세포 내에서 무엇으로 바뀌는가?", "a": "포도당 6-인산"}, {"id": "B0-17", "q": "서덜랜드 실험에서 글리코젠 분해가 일어나기 위해 필요했던 것은?", "a": "완전한 세포막으로 둘러싸인 세포"}, {"id": "B0-18", "q": "에피네프린을 가인산분해효소와 글리코젠만 있는 용액에 넣었을 때 분해가 일어나지 않은 이유는?", "a": "신호전달이 세포막과 세포 내부 과정을 필요로 하기 때문"}, {"id": "B0-19", "q": "세포 신호전달 단계의 공통 핵심 구조는?", "a": "리간드-수용체 결합과 그에 따른 세포내 변화"}, {"id": "B0-20", "q": "세포반응의 예 3가지는?", "a": "효소 촉매작용 변화, 세포골격 재배열, 핵 내 특정 유전자 활성화"}, {"id": "B0-21", "q": "신호수용이 일어나려면 무엇이 필요하나?", "a": "신호분자와 수용체 단백질의 특이적 결합"}, {"id": "B0-22", "q": "신호수용에서 '특이성'이란?", "a": "신호분자가 딱 맞는 수용체에만 결합하는 성질"}, {"id": "B0-23", "q": "수용체에 결합하는 신호분자를 무엇이라 하는가?", "a": "리간드(ligand)"}, {"id": "B0-24", "q": "리간드란?", "a": "주로 큰 분자에 특이적으로 결합하는 분자"}, {"id": "B0-25", "q": "리간드 결합이 수용체에 일으키는 직접 변화는?", "a": "입체구조(형태) 변화"}, {"id": "B0-26", "q": "수용체의 형태 변화가 중요한 이유는?", "a": "수용체를 활성화시켜 다른 분자와 상호작용하게 하기 때문"}, {"id": "B0-27", "q": "일부 수용체에서 리간드 결합이 유도하는 추가 현상은?", "a": "두 개 이상 수용체 분자의 결합"}, {"id": "B0-28", "q": "인간 세포표면 수용체 중 가장 많은 종류는?", "a": "G 단백질 결합 수용체(GPCR)"}, {"id": "B0-29", "q": "인간의 GPCR은 몇 종 이상으로 언급되었는가?", "a": "800종 이상"}, {"id": "B0-30", "q": "세포막 수용체의 주요 3종은?", "a": "GPCR, 타이로신 인산화효소 수용체(RTK), 이온통로 수용체"}, {"id": "B0-31", "q": "세포내 수용체는 주로 어디에 존재하는가?", "a": "세포질이나 핵 내부"}, {"id": "B0-32", "q": "세포내 수용체에 도달하려면 신호분자가 통과해야 하는 구조는?", "a": "세포막"}, {"id": "B0-33", "q": "세포내 수용체에 결합하는 대표적 지용성 신호분자 2가지는?", "a": "갑상선호르몬, 스테로이드호르몬"}, {"id": "B0-34", "q": "스테로이드 호르몬 수용체의 평소 위치는?", "a": "세포질 (호르몬 결합 후 핵으로 이동) — '원래 핵에 있다'는 틀림"}, {"id": "B0-35", "q": "작아서 세포막을 통과할 수 있는 신호분자 예시는?", "a": "산화질소(NO)"}, {"id": "B0-36", "q": "세포내 수용체와 결합한 호르몬-수용체 복합체의 대표 기능은?", "a": "특정 유전자 발현 유도 또는 억제"}, {"id": "B0-37", "q": "알도스테론이 몸 전체 세포에 도달해도 신장에서만 반응하는 이유는?", "a": "신장세포에만 알도스테론 세포내수용체가 있기 때문"}, {"id": "B0-38", "q": "알도스테론-수용체 복합체는 핵 안에서 어떤 역할을 하는가?", "a": "전사인자로 작용하여 특정 유전자의 전사를 유도"}, {"id": "B0-39", "q": "알도스테론 작용의 최종 생리적 결과는?", "a": "혈액의 부피 조절"}, {"id": "B0-40", "q": "GPCR은 어떤 단백질의 도움을 받아 작용하는가?", "a": "G 단백질"}, {"id": "B0-41", "q": "G 단백질의 활성 여부를 결정하는 결합 분자는?", "a": "GDP 또는 GTP"}, {"id": "B0-42", "q": "GDP가 결합한 G 단백질의 상태는?", "a": "불활성 상태"}, {"id": "B0-43", "q": "불활성 G 단백질은 어디에 존재하는가?", "a": "세포막을 따라"}, {"id": "B0-44", "q": "리간드가 GPCR에 결합하면 GPCR에 일어나는 변화는?", "a": "활성화와 형태 변화"}, {"id": "B0-45", "q": "활성화된 GPCR에 G 단백질이 결합하면 G 단백질에서 일어나는 변화는?", "a": "GDP가 GTP로 바뀌어 활성화됨"}, {"id": "B0-46", "q": "신호분자의 GPCR 결합은 가역적인가?", "a": "예, 여러 번 결합하고 분리될 수 있다"}, {"id": "B0-47", "q": "세포외 리간드 농도는 무엇을 결정하는가?", "a": "리간드가 얼마나 자주 결합해 신호를 일으키는가"}, {"id": "B0-48", "q": "활성화된 G 단백질은 GPCR에서 분리된 뒤 무엇을 하는가?", "a": "막을 따라 확산하며 효소에 결합해 효소 활성 변화를 일으킨다"}, {"id": "B0-49", "q": "G 단백질이 스스로 가지는 효소 활성은?", "a": "GTP 가수분해효소 활성"}, {"id": "B0-50", "q": "G 단백질의 GTP 가수분해는 어떤 의미를 가지는가?", "a": "신호경로를 빠르게 차단하는 종료 기전"}, {"id": "B0-51", "q": "GPCR 경로에서 G 단백질의 직접 표적이 되는 것은?", "a": "효소"}, {"id": "B0-52", "q": "GPCR 경로에서 신호를 종료시키는 1차 기작은?", "a": "G 단백질의 GTP 가수분해"}, {"id": "B0-53", "q": "RTK는 무엇의 약자인가?", "a": "receptor tyrosine kinase"}, {"id": "B0-54", "q": "RTK의 본질은 어떤 성질을 가진 세포막수용체인가?", "a": "효소 활성을 가진 세포막수용체"}, {"id": "B0-55", "q": "RTK가 수행하는 촉매 기능은?", "a": "ATP의 인산기를 다른 단백질의 타이로신에 전달"}, {"id": "B0-56", "q": "RTK는 몇 개의 인산기를 다양한 단백질에 줄 수 있다고 언급되었는가?", "a": "6개"}, {"id": "B0-57", "q": "변형된 RTK가 암과 관련되는 이유는?", "a": "신호분자가 없어도 활성화되어 여러 신호전달 경로를 켤 수 있기 때문"}, {"id": "B0-58", "q": "RTK의 구조적 공통 요소 3가지는?", "a": "세포외 신호결합부위, 막관통 α-나선, 여러 타이로신이 있는 세포내 꼬리"}, {"id": "B0-59", "q": "리간드 결합 전 RTK의 상태는?", "a": "단량체(monomer)"}, {"id": "B0-60", "q": "생장인자 결합 후 RTK가 만드는 복합체는?", "a": "이합체(dimer)"}, {"id": "B0-61", "q": "RTK 이합체화 후 활성화되는 부위는?", "a": "타이로신 인산화효소 부위"}, {"id": "B0-62", "q": "RTK 이합체화 후 일어나는 대표 반응은?", "a": "상대편 단량체 꼬리의 타이로신 인산화"}, {"id": "B0-63", "q": "RTK가 완전히 활성화된 후 인식하는 것은?", "a": "중계단백질"}, {"id": "B0-64", "q": "RTK에 결합한 중계단백질의 역할은?", "a": "여러 전달 경로를 활성화해 다양한 세포반응 유도"}, {"id": "B0-65", "q": "RTK 신호전달의 핵심 흐름은?", "a": "리간드 결합 → 이합체화 → 타이로신 인산화 → 중계단백질 결합"}, {"id": "B0-66", "q": "RTK와 GPCR의 가장 큰 차이 한 가지는?", "a": "RTK는 자체 효소활성이 있지만 GPCR은 G 단백질 도움을 받는다"}, {"id": "B0-67", "q": "이온통로 수용체의 다른 이름은?", "a": "리간드 개폐성 이온 통로(LGIC)"}, {"id": "B0-68", "q": "LGIC에서 리간드 결합 전 통로 상태는?", "a": "닫힘"}, {"id": "B0-69", "q": "LGIC에 리간드가 결합하면 통로는 어떻게 되는가?", "a": "열리거나 닫힌다"}, {"id": "B0-70", "q": "LGIC를 통해 이동하는 대표 이온 2가지는?", "a": "Na+, Ca2+"}, {"id": "B0-71", "q": "LGIC 활성화의 직접 결과는?", "a": "세포 내 특정 이온 농도의 빠른 변화"}, {"id": "B0-72", "q": "리간드가 LGIC에서 떨어지면 일어나는 일은?", "a": "통로가 다시 닫힌다"}, {"id": "B0-73", "q": "LGIC의 큰 특징을 한 문장으로 말하면?", "a": "리간드 결합이 곧 이온 이동 변화를 빠르게 일으킨다"}, {"id": "B0-74", "q": "LGIC와 GPCR의 공통점은?", "a": "둘 다 세포표면 수용체이다"}, {"id": "B0-75", "q": "LGIC와 RTK의 공통점은?", "a": "둘 다 리간드 결합으로 세포내 반응을 유도한다"}, {"id": "B0-76", "q": "LGIC가 주로 빠른 반응에 적합한 이유는?", "a": "특정 이온 농도를 즉시 변화시키기 때문"}, {"id": "B0-77", "q": "세포표면 수용체가 인간 단백질에서 차지하는 비율로 언급된 것은?", "a": "약 30%"}, {"id": "B0-78", "q": "세포표면 수용체 구조를 X선 결정법으로 밝히기 어려운 이유는?", "a": "유연하고 구조가 잘 변해 결정화하기 어렵기 때문"}, {"id": "B0-79", "q": "막수용체 신호전달 경로가 보통 다단계인 이유는?", "a": "여러 분자가 연쇄적으로 참여해 신호를 세포내로 전달하기 때문"}, {"id": "B0-80", "q": "다단계 신호전달 경로의 대표 이점은?", "a": "신호 증폭"}, {"id": "B0-81", "q": "각 단계에서 신호는 주로 무엇의 변화로 바뀌는가?", "a": "인산화된 단백질의 입체구조 변화"}, {"id": "B0-82", "q": "신호전달경로(signal transduction pathway)란?", "a": "수용체 결합 후 세포내 특정 반응까지 이어지는 연속적인 분자 상호작용"}, {"id": "B0-83", "q": "신호전달에서 흔히 포함되는 과정 2가지는?", "a": "단백질 인산화/탈인산화, 작은 분자·이온 방출"}, {"id": "B0-84", "q": "적은 수의 신호분자가 큰 반응을 낼 수 있는 이유는?", "a": "연쇄반응(cascade)에 의한 증폭 때문"}, {"id": "B0-85", "q": "증폭 결과 경로 끝에서 활성화된 분자는 어떻게 되는가?", "a": "기하급수적으로 증가한다"}, {"id": "B0-86", "q": "ATP에서 인산기를 떼어 단백질로 옮겨주는 효소의 일반 명칭은?", "a": "단백질 인산화효소(protein kinase)"}, {"id": "B0-87", "q": "RTK는 어떤 특별한 종류의 단백질 인산화효소인가?", "a": "타이로신 인산화효소"}, {"id": "B0-88", "q": "세포질의 대부분 단백질 인산화효소는 주로 어떤 아미노산을 인산화하는가?", "a": "세린 또는 트레오닌"}, {"id": "B0-89", "q": "단백질 인산화와 탈인산화는 무엇을 조절하는 데 널리 쓰이는가?", "a": "단백질의 활성"}, {"id": "B0-90", "q": "인산화의 반대 과정은?", "a": "탈인산화"}, {"id": "B0-91", "q": "RTK의 타이로신 인산화와 일반 세포질 kinase의 차이를 한 문장으로?", "a": "RTK는 타이로신을, 일반 세포질 kinase는 주로 세린/트레오닌을 인산화한다"}, {"id": "B0-92", "q": "2차 신호전달자(second messenger)란?", "a": "단백질이 아닌 수용성 분자나 이온으로서 세포내에서 신호를 전달하는 물질"}, {"id": "B0-93", "q": "1차 신호전달자와 2차 신호전달자의 차이는?", "a": "1차는 세포막 밖 수용체에 결합하는 리간드, 2차는 세포내로 퍼지는 작은 분자/이온"}, {"id": "B0-94", "q": "2차 신호전달자가 세포내에서 잘 퍼질 수 있는 이유는?", "a": "작고 수용성이어서 확산에 유리하기 때문"}, {"id": "B0-95", "q": "가장 많이 사용되는 2가지 2차 신호전달자는?", "a": "cAMP와 Ca2+"}, {"id": "B0-96", "q": "대표적인 2차 신호전달자 5가지는?", "a": "cAMP, cGMP, Ca²⁺, IP3, DAG"}, {"id": "B0-97", "q": "2차 신호전달자가 아닌 것은 보통 무엇인가?", "a": "큰 단백질"}, {"id": "B0-98", "q": "cAMP는 무엇의 약자인가?", "a": "고리형 AMP(cyclic AMP)"}, {"id": "B0-99", "q": "GPCR에 에피네프린이 결합하면 무엇의 농도가 증가하는가?", "a": "cAMP"}, {"id": "B0-100", "q": "에피네프린-GPCR 경로에서 cAMP 합성을 촉진하는 효소는?", "a": "아데닐산 고리화효소(adenylyl cyclase)"}, {"id": "B0-101", "q": "아데닐산 고리화효소는 무엇으로부터 cAMP를 만드는가?", "a": "ATP"}, {"id": "B0-102", "q": "활성화된 G 단백질이 cAMP 경로에서 직접 활성화하는 것은?", "a": "아데닐산 고리화효소"}, {"id": "B0-103", "q": "cAMP를 다시 AMP로 분해하는 효소는?", "a": "인산이에스테르 가수분해효소(phosphodiesterase)"}, {"id": "B0-104", "q": "호르몬이 없을 때 cAMP가 오래 유지되지 않는 이유는?", "a": "phosphodiesterase에 의해 AMP로 분해되기 때문"}, {"id": "B0-105", "q": "cAMP의 세포질 내 농도는 무엇에 의존하는가?", "a": "세포막 밖 1차 전달자의 농도"}, {"id": "B0-106", "q": "cAMP 농도 증가는 어떤 kinase를 활성화하는가?", "a": "단백질인산화효소 A(PKA)"}, {"id": "B0-107", "q": "PKA는 어떤 종류의 kinase인가?", "a": "세린/트레오닌 인산화효소"}, {"id": "B0-108", "q": "아데닐산 고리화효소를 억제하는 G 단백질도 존재하는가?", "a": "예, 억제성 G 단백질이 존재한다"}, {"id": "B0-109", "q": "콜레라균이 설사를 일으키는 신호전달 기전은?", "a": "G 단백질의 GTP 가수분해를 막아 cAMP가 계속 생성되게 함"}, {"id": "B0-110", "q": "콜레라에서 높은 cAMP의 직접 결과는?", "a": "장세포의 염과 물 배출 증가"}, {"id": "B0-111", "q": "비아그라 관련 문맥에서 산화질소(NO)가 유도하는 것은?", "a": "cGMP 생성"}, {"id": "B0-112", "q": "cGMP가 2차 전달자로 작용하는 결과는?", "a": "동맥벽 근육 이완"}, {"id": "B0-113", "q": "cAMP 경로의 핵심 흐름은?", "a": "리간드 → GPCR → G단백질 → 아데닐산 고리화효소 → cAMP → PKA"}, {"id": "B0-114", "q": "cAMP를 만드는 효소와 분해하는 효소를 짝지으면?", "a": "아데닐산 고리화효소 / phosphodiesterase"}, {"id": "B0-115", "q": "칼슘이온은 cAMP와 비교해 어떤 2차 전달자인가?", "a": "더 많이 사용되는 2차 전달자"}, {"id": "B0-116", "q": "세포질 특정 부위의 Ca2+ 농도 증가가 유도하는 반응 3가지는?", "a": "근세포 수축, 세포외배출(분비), 세포분열"}, {"id": "B0-117", "q": "Ca2+를 2차 전달자로 사용하는 경로 2가지는?", "a": "GPCR 경로와 RTK 경로"}, {"id": "B0-118", "q": "신호전달에 반응한 세포질 Ca2+ 증가는 주로 어디로부터 오는가?", "a": "소포체(ER)"}, {"id": "B0-119", "q": "칼슘 방출을 일으키는 경로에 관여하는 다른 2차 전달자 2가지는?", "a": "IP3와 DAG"}, {"id": "B0-120", "q": "IP3의 풀네임은?", "a": "이노시톨 3인산"}, {"id": "B0-121", "q": "DAG의 풀네임은?", "a": "디아실글리세롤"}, {"id": "B0-122", "q": "IP3와 DAG는 어떻게 생성되는가?", "a": "세포막의 특정 인지질이 분해되어 생성"}, {"id": "B0-123", "q": "IP3와 DAG를 생성하는 효소는?", "a": "인지질가수분해효소 C(phospholipase C, PLC) — 막 인지질을 분해"}, {"id": "B0-124", "q": "평상시 세포질 Ca2+ 농도는 세포외액·ER에 비해 어떤가?", "a": "매우 낮다"}, {"id": "B0-125", "q": "세포질 Ca2+를 낮게 유지하는 구조 2가지는?", "a": "세포막 펌프와 ER 막 펌프"}, {"id": "B0-126", "q": "세포막/ER 막의 Ca2+ 펌프는 무엇을 사용해 Ca2+를 이동시키는가?", "a": "ATP"}, {"id": "B0-127", "q": "미토콘드리아는 Ca2+ 항상성에 어떻게 관여하는가?", "a": "세포질 Ca2+가 크게 증가하면 화학삼투로 작동하는 펌프로 Ca2+를 받아들인다"}, {"id": "B0-128", "q": "Ca2+가 중요한 2차 전달자인 이유를 한 문장으로?", "a": "세포질 농도 변화가 근수축·분비·분열 같은 다양한 반응을 빠르게 유발하기 때문"}, {"id": "B0-129", "q": "신호전달 경로의 반응은 어디에서 일어날 수 있는가?", "a": "세포질 또는 핵"}, {"id": "B0-130", "q": "핵 내 반응의 대표 결과는?", "a": "특정 유전자 발현 유도 또는 정지"}, {"id": "B0-131", "q": "세포질 반응의 대표 결과는?", "a": "기존 단백질의 활성 조절"}, {"id": "B0-132", "q": "최종적으로 활성화된 스테로이드 호르몬 수용체는 무엇으로 기능하는가?", "a": "전사인자"}, {"id": "B0-133", "q": "전사인자는 항상 전사촉진인자인가?", "a": "아니오, 전사억제인자도 있다"}, {"id": "B0-134", "q": "신호전달 경로가 단백질 합성을 조절하는 두 방식은?", "a": "유전자 발현 활성화 / 세포질 단백질 활성 직접 조절"}, {"id": "B0-135", "q": "반응 조절의 4가지는?", "a": "신호의 증폭, 다단계 경로에서의 조절, 골격단백질에 의한 반응효율 증가, 신호의 종결"}, {"id": "B0-136", "q": "신호 증폭(cascade)이 가능한 이유는?", "a": "각 단계 단백질이 불활성화되기 전 여러 기질을 처리할 수 있기 때문"}, {"id": "B0-137", "q": "에피네프린 몇 개가 GPCR에 결합해도 무엇이 수억 개 방출될 수 있는가?", "a": "글리코젠으로부터 포도당 분자"}, {"id": "B0-138", "q": "세포신호전달의 특이성은 무엇에 의존하는가?", "a": "세포마다 다른 수용체·중계단백질·반응단백질 조합"}, {"id": "B0-139", "q": "에피네프린이 간과 심장에서 다른 반응을 일으키는 이유는?", "a": "세포마다 신호수용체·중계단백질·반응담당 단백질 조합이 다르기 때문"}, {"id": "B0-140", "q": "에피네프린은 간과 심장에서 각각 어떤 반응을 일으키는가?", "a": "간=글리코젠 분해 촉진, 심장=심박수 증가"}, {"id": "B0-141", "q": "골격단백질이 신호전달 효율을 높이는 이유는?", "a": "확산해야 할 단백질들을 한데 묶어 반응을 빠르게 하기 때문"}, {"id": "B0-142", "q": "점도 높은 세포질에서 scaffold가 유리한 이유는?", "a": "고분자 단백질들이 자유 확산만으로 만나기 어렵기 때문"}, {"id": "B0-143", "q": "세포가 다시 새 신호에 반응할 수 있게 하려면 무엇이 필요하나?", "a": "중계분자들의 불활성화와 신호 종결"}, {"id": "B0-144", "q": "신호의 종료에서 G 단백질 수준의 종료 기작은?", "a": "GTP가 GDP로 가수분해됨"}, {"id": "B0-145", "q": "신호의 종료에서 cAMP 수준의 종료 기작은?", "a": "cAMP가 AMP로 전환됨"}, {"id": "B0-146", "q": "신호의 종료에서 인산화 단백질 수준의 종료 기작은?", "a": "단백질 탈인산화효소에 의한 탈인산화"}, {"id": "B0-147", "q": "신호가 나타나려면 수용체 농도는 어떤 조건을 만족해야 하나?", "a": "일정한 역치 이상이어야 한다"}, {"id": "B0-148", "q": "아폽토시스와 괴사의 가장 큰 범위 차이는?", "a": "아폽토시스는 단일세포, 괴사는 세포군에서 일어남"}, {"id": "B0-149", "q": "리소좀 파괴 여부에서 apoptosis와 necrosis의 차이는?", "a": "아폽토시스는 파괴되지 않고 스무스, 괴사는 파괴됨"}, {"id": "B0-150", "q": "염증반응에서 apoptosis와 necrosis의 차이는?", "a": "아폽토시스는 없음, 괴사는 있음"}, {"id": "B0-151", "q": "식균작용에서 apoptosis와 necrosis의 차이는?", "a": "아폽토시스는 있음, 괴사는 없음"}, {"id": "B0-152", "q": "DNA 분획에서 apoptosis와 necrosis의 차이는?", "a": "아폽토시스는 있음, 괴사는 없음"}, {"id": "B0-153", "q": "수포(blebbing)에서 apoptosis와 necrosis의 차이는?", "a": "아폽토시스는 있음, 괴사는 없음"}, {"id": "B0-154", "q": "아폽토시스와 괴사의 에너지(ATP) 차이는?", "a": "아폽토시스=ATP 필요(능동적·조절됨), 괴사=ATP 불필요(수동적 손상)"}, {"id": "B0-155", "q": "아폽토시스 과정 동안 DNA에 일어나는 변화는?", "a": "절단(DNA 분획)"}, {"id": "B0-156", "q": "아폽토시스 과정 동안 세포질·소기관에 일어나는 변화는?", "a": "조각남"}, {"id": "B0-157", "q": "아폽토시스에서 blebbing 이후 세포는 어떻게 되는가?", "a": "막으로 둘러싸인 소낭으로 나뉜다"}, {"id": "B0-158", "q": "아폽토시스 소낭의 최종 운명은?", "a": "특수 식세포에 의해 흡수·소화되어 흔적 없이 사라짐"}, {"id": "B0-159", "q": "아폽토시스가 주변 세포를 보호하는 이유는?", "a": "효소가 새어나와 주변 세포를 손상시키지 않기 때문"}, {"id": "B0-160", "q": "아폽토시스를 시작하는 신호는 어디서 올 수 있는가?", "a": "세포 외부와 세포 내부 모두"}, {"id": "B0-161", "q": "외부 유래 아폽토시스 신호는 무엇을 시작할 수 있는가?", "a": "세포사멸 관련 유전자·단백질을 활성화하는 신호전달 경로"}, {"id": "B0-162", "q": "외부 신호로 시작되는(외인성) 아폽토시스 경로의 대표 수용체–리간드는?", "a": "Fas–FasL"}, {"id": "B0-163", "q": "내부 유래 아폽토시스 신호의 대표 원인은?", "a": "수선 불가능한 DNA 손상"}, {"id": "B0-164", "q": "예쁜꼬마선충(C. elegans)의 정상발달 과정에서 아폽토시스는 몇 번 일어나는가?", "a": "131번"}, {"id": "B0-165", "q": "C. elegans 아폽토시스의 두 주요 유전자는?", "a": "ced-3, ced-4"}, {"id": "B0-166", "q": "ced-3과 ced-4 유전자가 만드는 단백질은?", "a": "Ced-3과 Ced-4"}, {"id": "B0-167", "q": "대부분의 아폽토시스 단백질은 평소 어떤 상태인가?", "a": "불활성 상태"}, {"id": "B0-168", "q": "C. elegans 아폽토시스 조절은 주로 어느 수준에서 일어나는가?", "a": "단백질의 활성/비활성 수준"}, {"id": "B0-169", "q": "Ced-9은 어디에 있는 어떤 역할의 단백질인가?", "a": "미토콘드리아 외막의 아폽토시스 조절자"}, {"id": "B0-170", "q": "포유류에서 미토콘드리아 아폽토시스를 조절하는 단백질(C. elegans Ced-9의 상동체)은?", "a": "Bcl-2 (family)"}, {"id": "B0-171", "q": "세포가 예정사 신호를 받으면 Ced-9에는 어떤 변화가 생기는가?", "a": "Ced-4를 더 이상 불활성화할 수 없게 된다"}, {"id": "B0-172", "q": "Ced-9에 의한 Ced-4 해제의 결과는?", "a": "단백질과 핵산을 분해하는 효소 활성화"}, {"id": "B0-173", "q": "아폽토시스를 일으키는 주요 단백질분해효소의 총칭은?", "a": "캐스페이즈(caspase)"}, {"id": "B0-174", "q": "C. elegans에서 주요 캐스페이즈는?", "a": "Ced-3"}, {"id": "B0-175", "q": "인간과 포유동물에서 아폽토시스에 관여하는 캐스페이즈는 몇 종류 이상인가?", "a": "15종류 이상"}, {"id": "B0-176", "q": "포유동물 아폽토시스 경로가 다양한 이유는?", "a": "세포 종류와 유발 신호에 따라 사용하는 경로가 다르기 때문"}, {"id": "B0-177", "q": "포유동물의 주요 아폽토시스 경로 중 하나에 사용되는 소기관 단백질은?", "a": "미토콘드리아 단백질"}, {"id": "B0-178", "q": "아폽토시스를 유도하는 일부 단백질이 미토콘드리아에서 하는 일은?", "a": "외막에 구멍을 뚫어 아폽토시스를 촉진하는 다른 단백질을 방출시킴"}, {"id": "B0-179", "q": "미토콘드리아 경로에서 방출되어 아폽토시스를 촉진하는 대표 단백질은?", "a": "시토크롬 c(cytochrome c)"}, {"id": "B0-180", "q": "신호수용-신호전달-세포반응을 리간드 관점에서 한 줄로 연결하면?", "a": "리간드 결합 → 수용체 변화 → 세포내 연쇄반응 → 세포반응"}, {"id": "B0-181", "q": "GPCR, RTK, LGIC를 모두 묶는 공통점은?", "a": "세포표면 수용체로서 리간드 결합에 반응한다"}, {"id": "B0-182", "q": "GPCR, RTK, LGIC 중 G 단백질을 직접 사용하는 것은?", "a": "GPCR"}, {"id": "B0-183", "q": "GPCR, RTK, LGIC 중 자체 효소활성을 가진 것은?", "a": "RTK"}, {"id": "B0-184", "q": "GPCR, RTK, LGIC 중 이온 흐름을 직접 바꾸는 것은?", "a": "LGIC"}, {"id": "B0-185", "q": "GPCR 경로의 직접 종료 기작과 cAMP 경로의 종료 기작을 짝지으면?", "a": "GTP 가수분해 / cAMP의 AMP 전환"}, {"id": "B0-186", "q": "RTK에서 리간드 결합 후 가장 먼저 구조적으로 일어나는 사건은?", "a": "단량체의 이합체화"}, {"id": "B0-187", "q": "RTK 경로에서 ATP의 직접 용도는?", "a": "타이로신 인산화에 인산기 제공"}, {"id": "B0-188", "q": "세포내 수용체와 세포표면 수용체의 가장 큰 차이는?", "a": "세포내 수용체는 리간드가 막을 통과해야 한다"}, {"id": "B0-189", "q": "세포내 수용체에 결합하는 신호분자의 공통 성질은?", "a": "지용성이거나 매우 작다"}, {"id": "B0-190", "q": "NO와 알도스테론이 공통으로 보여주는 점은?", "a": "세포막을 통과해 세포내 수용체 또는 세포내 표적에 작용할 수 있다"}, {"id": "B0-191", "q": "cAMP와 Ca2+의 공통점은?", "a": "둘 다 대표적 2차 신호전달자이다"}, {"id": "B0-192", "q": "cAMP와 Ca2+의 차이는?", "a": "cAMP는 ATP 유래 작은 분자, Ca2+는 이온"}, {"id": "B0-193", "q": "IP3와 DAG의 공통점은?", "a": "막 인지질 분해로 생성되는 2차 전달자"}, {"id": "B0-194", "q": "신호증폭과 특이성은 어떻게 동시에 가능한가?", "a": "증폭은 cascade로, 특이성은 세포별 단백질 조합 차이로 보장된다"}, {"id": "B0-195", "q": "Scaffold 단백질의 장점과 신호 증폭의 장점을 비교하면?", "a": "scaffold는 효율·속도 증가, 증폭은 적은 신호를 큰 반응으로 확대"}, {"id": "B0-196", "q": "아폽토시스 조절이 유전자 발현 수준이 아니라 단백질 활성 수준이라는 뜻은?", "a": "관련 단백질은 이미 존재하며 켜짐/꺼짐으로 조절된다는 뜻"}, {"id": "B0-197", "q": "세포 신호전달의 거리별 유형은?", "a": "직접접촉, 측분비(paracrine), 시냅스, 내분비(endocrine) (+ 자가분비)"}, {"id": "B0-198", "q": "측분비(paracrine) 신호전달이란?", "a": "분비세포가 인근 표적세포에 작용하는 국소 신호전달(예: 성장인자)"}, {"id": "B0-199", "q": "자가분비(autocrine) 신호전달이란?", "a": "분비한 세포 자신(또는 같은 종류 세포)에 작용하는 신호전달"}, {"id": "B0-200", "q": "직접접촉(세포연접) 신호전달의 통로는?", "a": "동물=간극연접(gap junction), 식물=원형질연락사(plasmodesmata)"}, {"id": "B0-201", "q": "GPCR의 막관통 구조는?", "a": "7회 막관통 α-나선(7-transmembrane)"}, {"id": "B0-202", "q": "G 단백질 3유형과 각 표적은?", "a": "Gs=아데닐산고리화효소 활성화 / Gi=아데닐산고리화효소 억제 / Gq=PLC 활성화"}, {"id": "B0-203", "q": "콜레라 독소와 백일해(pertussis) 독소의 표적 차이는?", "a": "콜레라=Gs 변형(GTP가수분해 억제) / 백일해=Gi 변형 — 둘 다 cAMP↑"}, {"id": "B0-204", "q": "cAMP와 cGMP를 각각 만드는 효소는?", "a": "cAMP=아데닐산 고리화효소(adenylyl cyclase) / cGMP=구아닐산 고리화효소(guanylyl cyclase)"}, {"id": "B0-205", "q": "PLC가 분해하는 막 인지질(기질)은?", "a": "PIP2(포스파티딜이노시톨 2인산)"}, {"id": "B0-206", "q": "PIP2가 PLC에 의해 분해되면 생기는 두 2차 전달자는?", "a": "IP3 + DAG"}, {"id": "B0-207", "q": "IP3의 작용 기전은?", "a": "ER 막의 IP3-개폐성 Ca²⁺ 통로를 열어 Ca²⁺을 세포질로 방출"}, {"id": "B0-208", "q": "DAG의 작용은?", "a": "단백질인산화효소 C(PKC)를 활성화"}, {"id": "B0-209", "q": "칼모듈린(calmodulin)이란?", "a": "Ca²⁺과 결합해 표적 효소(예: CaM 인산화효소)를 활성화하는 Ca²⁺ 수용 단백질"}, {"id": "B0-210", "q": "NO(산화질소)의 합성과 작용 기전은?", "a": "아르기닌에서 NOS로 합성 → 구아닐산고리화효소 활성화 → cGMP↑ → 혈관 평활근 이완"}, {"id": "B0-211", "q": "인산화 연쇄(phosphorylation cascade)란?", "a": "kinase가 다음 단백질을 차례로 인산화·활성화하는 다단계 증폭 경로"}, {"id": "B0-212", "q": "RTK 하류의 대표 인산화 연쇄는?", "a": "MAP 인산화효소 연쇄(MAPK cascade)"}, {"id": "B0-213", "q": "RTK 신호를 중계하는 대표 소형 GTP가수분해효소는?", "a": "Ras — 돌연변이로 지속 활성화되면 암 유발"}, {"id": "B0-214", "q": "단백질 탈인산화효소(protein phosphatase)의 역할은?", "a": "인산기를 제거해 신호를 끄고 kinase를 재사용 가능하게 함"}, {"id": "B0-215", "q": "캐스페이즈(caspase) 이름의 유래(절단 특이성)는?", "a": "시스테인 단백질분해효소이며 아스파르트산(Asp) 뒤를 절단"}, {"id": "B0-216", "q": "내인성(미토콘드리아) 아폽토시스 경로의 흐름은?", "a": "세포 손상 → 시토크롬 c 방출 → apoptosome 형성 → caspase-9 활성화"}, {"id": "B0-217", "q": "외인성(사멸수용체) 아폽토시스 경로의 흐름은?", "a": "Fas–FasL(사멸수용체) 결합 → caspase-8 활성화"}, {"id": "B0-218", "q": "내인성·외인성 경로의 개시 캐스페이즈는?", "a": "내인성=caspase-9, 외인성=caspase-8 (실행 캐스페이즈=caspase-3)"}, {"id": "B0-219", "q": "Bcl-2 family의 두 그룹은?", "a": "항아폽토시스(Bcl-2, Bcl-xL) vs 전아폽토시스(Bax, Bak)"}, {"id": "B0-220", "q": "아세틸콜린 수용체의 두 종류와 작동 방식 차이는?", "a": "니코틴성(nAChR)=이온통로 직결형(LGIC)·골격근 수축 / 무스카린성(mAChR)=GPCR 방식·예 M2(심장 박동 느리게)"}, {"id": "B0-221", "q": "로돕신을 통한 빛 신호 전환(광전환) 경로는?", "a": "빛 → 로돕신(GPCR) 활성 → 트랜스듀신(Gt) 활성 → PDE 활성 → cGMP↓ → 양이온(Na⁺) 통로 닫힘 → 과분극"}, {"id": "B0-222", "q": "칼모듈린(calmodulin) 한 분자가 결합하는 Ca²⁺ 수는?", "a": "4개"}]}, {"label": "10 세포호흡", "cards": [{"id": "B1-0", "q": "세포호흡의 정의는?", "a": "유기 연료를 산화시켜 ATP를 생성하는 과정"}, {"id": "B1-1", "q": "세포호흡의 노폐물은?", "a": "이산화탄소와 물"}, {"id": "B1-2", "q": "복잡한 큰 분자를 분해하여 에너지를 방출하는 물질대사 경로를 무엇이라 하는가?", "a": "이화 반응 경로(catabolic pathway)"}, {"id": "B1-3", "q": "세포호흡의 전체 4단계는?", "a": "해당과정, 피루브산 산화, 시트르산 회로, 산화적 인산화"}, {"id": "B1-4", "q": "강의 노트에서 세포호흡의 3단계로 묶은 것은?", "a": "해당과정, TCA(시트르산 회로), ETS(전자전달계)"}, {"id": "B1-5", "q": "해당과정은 어디서 일어나는가?", "a": "세포질"}, {"id": "B1-6", "q": "시트르산 회로는 어디서 일어나는가?", "a": "미토콘드리아 기질(matrix)"}, {"id": "B1-7", "q": "전자전달계(ETS)는 어디에 있는가?", "a": "미토콘드리아 내막"}, {"id": "B1-8", "q": "미토콘드리아 내막의 주름 구조 이름은?", "a": "크리스테(cristae)"}, {"id": "B1-9", "q": "크리스테의 기능적 의미는?", "a": "전자전달계 성분이 많이 박힐 수 있도록 표면적을 증가시킨다"}, {"id": "B1-10", "q": "원핵생물에서 세포호흡은 주로 어디서 일어나는가?", "a": "세포질"}, {"id": "B1-11", "q": "세포호흡을 탄소 관점에서 표현하면?", "a": "탄소가 수소를 잃고 산소를 얻는 과정"}, {"id": "B1-12", "q": "전자공여체(electron donor)는 무엇이라고도 하는가?", "a": "환원제(reducing agent)"}, {"id": "B1-13", "q": "전자수용체(electron acceptor)는 무엇이라고도 하는가?", "a": "산화제(oxidizing agent)"}, {"id": "B1-14", "q": "NAD+가 전자 2개와 양성자 1개를 받아 형성되는 것은?", "a": "NADH"}, {"id": "B1-15", "q": "세포호흡에서 NAD+는 어떤 역할을 하는가?", "a": "산화제로서 전자와 수소를 받는 전자 운반체"}, {"id": "B1-16", "q": "NAD+와 NADH의 관계를 한 문장으로 말하면?", "a": "산화형 NAD+와 환원형 NADH는 전자 운반체로 순환한다"}, {"id": "B1-17", "q": "탈수소효소가 하는 일은?", "a": "기질로부터 전자와 수소를 떼어내어 NAD+나 FAD에 전달한다"}, {"id": "B1-18", "q": "NAD+가 기질에서 제거하는 것은 보통 무엇인가?", "a": "2개의 전자와 2개의 양성자"}, {"id": "B1-19", "q": "NADH 형성 시 용액으로 방출되는 것은?", "a": "추가 양성자 1개(H+)"}, {"id": "B1-20", "q": "세포호흡 단계 미리보기에서 포도당 분해가 이산화탄소로 완결되는 시점은?", "a": "피루브산 산화와 시트르산 회로를 거칠 때"}, {"id": "B1-21", "q": "전자전달계의 마지막에서 전자들은 무엇과 반응하는가?", "a": "산소 분자와 수소 이온"}, {"id": "B1-22", "q": "전자전달계 마지막 반응의 생성물은?", "a": "물"}, {"id": "B1-23", "q": "기질수준 인산화란?", "a": "효소가 기질 분자로부터 ADP에 직접 인산기를 전달해 ATP를 만드는 방식"}, {"id": "B1-24", "q": "산화적 인산화란?", "a": "전자전달사슬의 산화환원 반응과 화학삼투에 의해 ATP를 합성하는 방식"}, {"id": "B1-25", "q": "세포호흡 전체에서 ATP 대부분은 어느 단계에서 생성되는가?", "a": "산화적 인산화"}, {"id": "B1-26", "q": "세포호흡에서 소량의 ATP가 직접 만들어지는 단계들은?", "a": "해당과정과 시트르산 회로"}, {"id": "B1-27", "q": "해당과정, 피루브산 산화, 시트르산 회로의 공통점은?", "a": "유기 연료를 산화하여 전자를 떼어내는 이화 경로이다"}, {"id": "B1-28", "q": "해당과정(glycolysis)의 뜻은?", "a": "당을 분해한다는 뜻"}, {"id": "B1-29", "q": "해당과정의 출발물질은?", "a": "포도당(6탄당)"}, {"id": "B1-30", "q": "해당과정의 최종 생성물은?", "a": "피루브산 2분자"}, {"id": "B1-31", "q": "해당과정에서 포도당은 몇 탄소 화합물 2개로 나뉘는가?", "a": "3탄소 화합물 2개"}, {"id": "B1-32", "q": "해당과정은 산소가 필요한가?", "a": "아니오"}, {"id": "B1-33", "q": "해당과정은 어떤 두 시기로 나뉘는가?", "a": "에너지 투자기와 에너지 회수기"}, {"id": "B1-34", "q": "해당과정의 에너지 투자기에서 소비되는 ATP는?", "a": "2개"}, {"id": "B1-35", "q": "해당과정의 에너지 회수기에서 생성되는 ATP는?", "a": "4개"}, {"id": "B1-36", "q": "해당과정의 순 ATP 수지는?", "a": "2개"}, {"id": "B1-37", "q": "해당과정에서 생성되는 NADH는?", "a": "2개"}, {"id": "B1-38", "q": "해당과정에서 생성되는 CO2는?", "a": "0개"}, {"id": "B1-39", "q": "강의 노트에서 해당과정의 총 에너지 생성률로 같이 적은 것은?", "a": "ATP 2개와 NADH 2개"}, {"id": "B1-40", "q": "해당과정에서 ATP가 투입되는 두 단계는?", "a": "포도당→포도당 6-인산, 과당 6-인산→과당 1,6-이인산"}, {"id": "B1-41", "q": "포도당을 포도당 6-인산으로 만드는 효소는?", "a": "헥소키나아제(hexokinase)"}, {"id": "B1-42", "q": "포도당인산이성질화효소(isomerase)가 하는 일은?", "a": "포도당 유도체를 과당 유도체로 바꾼다"}, {"id": "B1-43", "q": "과당 6-인산에 ATP를 더 써서 인산기를 붙이는 효소는?", "a": "PFK(인산과당인산화효소)"}, {"id": "B1-44", "q": "해당과정에서 가장 중요한 조절 효소로 자주 묻는 것은?", "a": "PFK"}, {"id": "B1-45", "q": "PFK의 다른자리입체성(allosteric) 조절은?", "a": "ATP·시트르산이 붙으면 억제, AMP·ADP가 붙으면 활성 — 해당과정의 속도조절 단계"}, {"id": "B1-46", "q": "PFK가 작용하는 기질과 생성물은?", "a": "과당 6-인산 → 과당 1,6-이인산"}, {"id": "B1-47", "q": "알도레이스가 하는 일은?", "a": "과당 1,6-이인산을 두 개의 3탄당으로 쪼갠다"}, {"id": "B1-48", "q": "알도레이스 반응으로 생기는 두 3탄당은?", "a": "G3P와 DHAP"}, {"id": "B1-49", "q": "DHAP는 결국 무엇으로 전환되어 이후 과정을 계속하는가?", "a": "G3P"}, {"id": "B1-50", "q": "에너지 회수기에서 NADH가 생성되는 단계는?", "a": "G3P → 1,3-BPG"}, {"id": "B1-51", "q": "G3P를 1,3-BPG로 산화하며 NADH를 만드는 효소는?", "a": "3탄당인산 탈수소효소(G3P 탈수소효소) — 이때 ATP가 아닌 무기인산(Pi)이 결합"}, {"id": "B1-52", "q": "해당과정의 기질수준 인산화 단계 2개는?", "a": "1,3-BPG→3PG, PEP→피루브산"}, {"id": "B1-53", "q": "1,3-BPG에서 ATP가 생성되는 다음 산물은?", "a": "3-PG"}, {"id": "B1-54", "q": "1,3-BPG에서 ATP를 만드는(기질수준 인산화) 효소는?", "a": "인산글리세르산 인산화효소(phosphoglycerate kinase)"}, {"id": "B1-55", "q": "3-PG를 2-PG로 바꾸는(인산기 위치 이동) 효소는?", "a": "자리옮김효소(인산글리세르산 자리옮김효소, mutase)"}, {"id": "B1-56", "q": "2-PG에서 물을 빼 PEP(고에너지 이중결합)를 만드는 효소는?", "a": "에놀레이스(enolase)"}, {"id": "B1-57", "q": "PEP에서 ATP가 생성되며 만들어지는 최종 산물은?", "a": "피루브산"}, {"id": "B1-58", "q": "PEP에서 ATP를 만들며 피루브산을 생성하는 효소는?", "a": "피루브산 인산화효소(pyruvate kinase)"}, {"id": "B1-59", "q": "해당과정에서 직접 ATP를 만드는 단계 수는?", "a": "2단계"}, {"id": "B1-60", "q": "해당과정에서 한 포도당이 두 G3P를 거치므로 회수기 반응은 몇 번씩 일어나는가?", "a": "각각 2번씩"}, {"id": "B1-61", "q": "해당과정을 포도당 1분자 기준으로 요약하면?", "a": "피루브산 2개, ATP 순 2개, NADH 2개"}, {"id": "B1-62", "q": "해당과정에서 미토콘드리아에 바로 들어갈 수 없는 생성물은?", "a": "포도당 자체"}, {"id": "B1-63", "q": "해당과정의 목적을 한 문장으로 말하면?", "a": "포도당을 피루브산으로 산화해 소량의 ATP와 NADH를 수확하는 것"}, {"id": "B1-64", "q": "피루브산은 미토콘드리아로 들어간 뒤 무엇으로 바뀌는가?", "a": "아세틸-CoA"}, {"id": "B1-65", "q": "피루브산이 미토콘드리아로 들어가는 수송 방식은?", "a": "능동수송"}, {"id": "B1-66", "q": "피루브산을 아세틸-CoA로 산화하는 효소복합체는?", "a": "피루브산 탈수소효소 복합체(PDH) — 3개 반응을 촉매하는 다효소 복합체"}, {"id": "B1-67", "q": "피루브산 탈수소효소 복합체(PDH)의 보조인자 5가지는?", "a": "TPP(비타민 B1)·리포산·CoA·FAD·NAD⁺"}, {"id": "B1-68", "q": "CoA(조효소 A)는 어떤 비타민에서 유래하는가?", "a": "비타민 B(판토텐산) — 황(S)을 포함"}, {"id": "B1-69", "q": "피루브산 산화는 어디서 일어나는가?", "a": "미토콘드리아 기질"}, {"id": "B1-70", "q": "피루브산 1분자 산화 시 생성되는 NADH는?", "a": "1개"}, {"id": "B1-71", "q": "피루브산 1분자 산화 시 생성되는 CO2는?", "a": "1개"}, {"id": "B1-72", "q": "피루브산 1분자 산화 시 생성되는 ATP는?", "a": "0개"}, {"id": "B1-73", "q": "피루브산 산화 후 시트르산 회로로 들어가는 분자는?", "a": "아세틸-CoA"}, {"id": "B1-74", "q": "포도당 1분자에서 생성된 피루브산은 몇 개인가?", "a": "2개"}, {"id": "B1-75", "q": "따라서 포도당 1분자 기준 피루브산 산화의 총 생성물은?", "a": "아세틸-CoA 2개, NADH 2개, CO2 2개"}, {"id": "B1-76", "q": "세포호흡에서 CO2가 처음 나오는 단계는?", "a": "피루브산 산화"}, {"id": "B1-77", "q": "피루브산 산화의 본질을 한 문장으로 하면?", "a": "피루브산을 산화하여 아세틸-CoA로 전환하는 연결반응"}, {"id": "B1-78", "q": "시트르산 회로의 다른 이름 3가지는?", "a": "크렙스 회로, 구연산 회로, TCA 회로"}, {"id": "B1-79", "q": "시트르산 회로는 1회전에 무엇이 들어가는가?", "a": "아세틸-CoA 1분자"}, {"id": "B1-80", "q": "시트르산 회로 1회전에서 생성되는 NADH는?", "a": "3개"}, {"id": "B1-81", "q": "시트르산 회로 1회전에서 생성되는 FADH2는?", "a": "1개"}, {"id": "B1-82", "q": "시트르산 회로 1회전에서 생성되는 ATP(GTP)는?", "a": "1개"}, {"id": "B1-83", "q": "시트르산 회로 1회전에서 생성되는 CO2는?", "a": "2개"}, {"id": "B1-84", "q": "아세틸-CoA 1분자 기준 TCA 산출물은?", "a": "NADH 3, FADH2 1, ATP 1, CO2 2"}, {"id": "B1-85", "q": "피루브산 1분자 기준 연결반응+TCA 산출물은?", "a": "NADH 4, FADH2 1, ATP 1, CO2 3"}, {"id": "B1-86", "q": "포도당 1분자 기준 TCA 자체 산출물은?", "a": "NADH 6, FADH2 2, ATP 2, CO2 4"}, {"id": "B1-87", "q": "포도당 1분자 기준 전체(해당+연결+TCA) 산출물은?", "a": "NADH 10, FADH2 2, ATP 4, CO2 6"}, {"id": "B1-88", "q": "시트르산 회로에서 기질수준 인산화가 일어나는 단계는?", "a": "숙시닐-CoA → 숙신산"}, {"id": "B1-89", "q": "강의 노트에서 TCA의 본질을 한 문장으로 표현하면?", "a": "탄소에 산소를 붙여 이산화탄소로 만드는 과정"}, {"id": "B1-90", "q": "시트르산 회로에서 대부분의 에너지가 어디에 저장되는가?", "a": "NADH와 FADH2"}, {"id": "B1-91", "q": "TCA에서 FADH2가 생기는 단계는?", "a": "숙신산 → 푸마르산"}, {"id": "B1-92", "q": "숙신산을 푸마르산으로 산화하는 효소(=전자전달계 복합체 II)는?", "a": "숙신산 탈수소효소(succinate dehydrogenase) — TCA 효소 중 유일하게 내막에 있고 FAD 사용"}, {"id": "B1-93", "q": "TCA에서 NADH가 생기는 세 단계는?", "a": "이소시트르산→α-케토글루타르산, α-케토글루타르산→숙시닐-CoA, 말산→옥살로아세트산"}, {"id": "B1-94", "q": "TCA에서 CO2가 나오는 두 단계는?", "a": "이소시트르산→α-케토글루타르산, α-케토글루타르산→숙시닐-CoA"}, {"id": "B1-95", "q": "TCA에서 회로를 다시 시작하게 해 주는 4탄소 수용체는?", "a": "옥살로아세트산"}, {"id": "B1-96", "q": "아세틸-CoA의 아세틸기 탄소 수는?", "a": "2개"}, {"id": "B1-97", "q": "시트르산 회로의 시작에서 2탄소 아세틸기는 무엇과 결합하는가?", "a": "4탄소 옥살로아세트산"}, {"id": "B1-98", "q": "그 결과 처음 형성되는 6탄소 화합물은?", "a": "시트르산"}, {"id": "B1-99", "q": "시트르산 회로의 1회전이 끝나면 재생되는 것은?", "a": "옥살로아세트산"}, {"id": "B1-100", "q": "포도당 1분자당 시트르산 회로는 몇 번 돈다고 보는가?", "a": "2번"}, {"id": "B1-101", "q": "강의 노트에서 TCA로 요약된 의미는?", "a": "미토콘드리아 기질에서 유기물을 산화하며 NADH·FADH2·ATP·CO2를 만드는 과정"}, {"id": "B1-102", "q": "시트르산 회로 시작에서 아세틸-CoA와 옥살로아세트산이 결합해 만들어지는 것은?", "a": "시트르산"}, {"id": "B1-103", "q": "시트르산은 어떤 6탄소 이성질체로 바뀌는가?", "a": "이소시트르산"}, {"id": "B1-104", "q": "이소시트르산이 산화·탈탄산되며 생성되는 5탄소 화합물은?", "a": "α-케토글루타르산"}, {"id": "B1-105", "q": "α-케토글루타르산이 산화·탈탄산되며 생성되는 4탄소 화합물은?", "a": "숙시닐-CoA"}, {"id": "B1-106", "q": "숙시닐-CoA가 기질수준 인산화 후 만드는 물질은?", "a": "숙신산"}, {"id": "B1-107", "q": "숙신산의 다음 산물은?", "a": "푸마르산"}, {"id": "B1-108", "q": "푸마르산에 물이 첨가되어 생성되는 것은?", "a": "말산"}, {"id": "B1-109", "q": "말산이 산화되어 회로를 마무리하며 생성되는 것은?", "a": "옥살로아세트산"}, {"id": "B1-110", "q": "TCA에서 6탄소→5탄소로 줄어드는 단계는?", "a": "이소시트르산 → α-케토글루타르산"}, {"id": "B1-111", "q": "TCA에서 5탄소→4탄소로 줄어드는 단계는?", "a": "α-케토글루타르산 → 숙시닐-CoA"}, {"id": "B1-112", "q": "TCA에서 물이 첨가되는 대표 단계는?", "a": "푸마르산 → 말산"}, {"id": "B1-113", "q": "TCA에서 마지막 NADH를 만드는 단계는?", "a": "말산 → 옥살로아세트산"}, {"id": "B1-114", "q": "산화적 인산화의 두 요소는?", "a": "전자전달과 화학삼투"}, {"id": "B1-115", "q": "전자전달계(ETS)의 위치는?", "a": "미토콘드리아 내막"}, {"id": "B1-116", "q": "NADH에서 나온 전자의 ETC 경로는?", "a": "I → Q → III → IV"}, {"id": "B1-117", "q": "FADH2에서 나온 전자의 ETC 경로는?", "a": "II → Q → III → IV"}, {"id": "B1-118", "q": "전자전달계에서 단백질이 아닌 유일한 전자 운반체는?", "a": "유비퀴논(Q)"}, {"id": "B1-119", "q": "유비퀴논(Q)의 특징은?", "a": "작은 소수성 분자로 특정 복합체에 속하지 않고 내막에서 이동한다"}, {"id": "B1-120", "q": "사이토크롬 이름 순서는?", "a": "b → c1 → c → a → a3"}, {"id": "B1-121", "q": "사이토크롬의 전자 운반 중심은?", "a": "헤므의 철(Fe)"}, {"id": "B1-122", "q": "전자전달계의 마지막 사이토크롬은?", "a": "cyt a3"}, {"id": "B1-123", "q": "cyt a3이 최종적으로 전자를 전달하는 대상은?", "a": "산소(O2)"}, {"id": "B1-124", "q": "전자전달계의 최종 전자수용체는?", "a": "산소"}, {"id": "B1-125", "q": "전자전달계 마지막에서 산소가 양성자를 받아 생성하는 것은?", "a": "물"}, {"id": "B1-126", "q": "NADH가 전자를 처음 전달하는 복합체는?", "a": "복합체 I"}, {"id": "B1-127", "q": "FADH2가 전자를 처음 전달하는 복합체는?", "a": "복합체 II"}, {"id": "B1-128", "q": "복합체 I의 특징적 보결분자단은?", "a": "FMN(플라빈 모노뉴클레오타이드)"}, {"id": "B1-129", "q": "보결분자단(prosthetic group)이란?", "a": "효소의 촉매 기능에 필수적인 비단백질 구성요소(예: FMN, 헴, Fe-S)"}, {"id": "B1-130", "q": "복합체 I을 부르는 다른 이름은?", "a": "플라보단백질(flavoprotein) — FMN을 가짐"}, {"id": "B1-131", "q": "복합체 I 다음에 전자를 받는 단백질성 보조 성분은?", "a": "철-황 단백질"}, {"id": "B1-132", "q": "복합체 I에서 FMN 다음 전자 이동 대상은?", "a": "철-황 단백질"}, {"id": "B1-133", "q": "복합체 I과 III, IV의 공통 기능은?", "a": "양성자(H+)를 막간공간으로 퍼낸다"}, {"id": "B1-134", "q": "복합체 II가 복합체 I과 다른 점은?", "a": "H+를 퍼내지 않는다"}, {"id": "B1-135", "q": "전자전달계에서 H+를 퍼내는 복합체는?", "a": "I, III, IV"}, {"id": "B1-136", "q": "전자전달계에서 H+를 퍼내지 않는 복합체는?", "a": "II"}, {"id": "B1-137", "q": "(저해제) 복합체 I을 차단하는 물질은?", "a": "로테논(rotenone), 아미탈(amytal)"}, {"id": "B1-138", "q": "(저해제) 복합체 III을 차단하는 물질은?", "a": "안티마이신 A(antimycin A)"}, {"id": "B1-139", "q": "(저해제) 복합체 IV(사이토크롬 산화효소)를 차단하는 물질은?", "a": "사이안화물(CN⁻), 일산화탄소(CO), 아자이드(N₃⁻)"}, {"id": "B1-140", "q": "(저해제) ATP 합성효소를 차단하는 물질은?", "a": "올리고마이신(oligomycin)"}, {"id": "B1-141", "q": "(저해제) 짝풀림제(uncoupler)로 작용하는 물질은?", "a": "DNP(2,4-디니트로페놀) — 비짝물림 단백질처럼 H+를 새게 함"}, {"id": "B1-142", "q": "전자전달 저해제와 짝풀림제의 효과 차이는?", "a": "저해제=전자전달·ATP 합성 모두 정지 / 짝풀림제=전자전달은 계속되나 ATP 합성은 끊기고 열 발생"}, {"id": "B1-143", "q": "전자전달계에서 방출된 에너지는 무엇의 형태로 저장되는가?", "a": "양성자 기울기(양성자 구동력)"}, {"id": "B1-144", "q": "화학삼투(chemiosmosis)란?", "a": "양성자 기울기에 저장된 에너지를 이용해 ATP를 합성하는 과정"}, {"id": "B1-145", "q": "양성자 구동력(proton-motive force)이란?", "a": "막을 사이에 둔 H+의 전기화학적 기울기"}, {"id": "B1-146", "q": "ATP 합성효소가 하는 일은?", "a": "H+가 기울기를 따라 흐를 때 ATP를 합성한다"}, {"id": "B1-147", "q": "ATP 합성효소는 어디에 있는가?", "a": "미토콘드리아 내막"}, {"id": "B1-148", "q": "전자전달계와 ATP 합성의 짝물림을 한 문장으로 표현하면?", "a": "전자전달이 H+ 기울기를 만들고, 그 기울기가 ATP 합성효소를 돌린다"}, {"id": "B1-149", "q": "NADH 1분자로부터 대략 몇 개의 ATP를 얻는가?", "a": "2.5개"}, {"id": "B1-150", "q": "FADH2 1분자로부터 대략 몇 개의 ATP를 얻는가?", "a": "1.5개"}, {"id": "B1-151", "q": "NADH가 FADH2보다 ATP를 더 많이 만드는 이유는?", "a": "복합체 I부터 시작해 더 많은 H+ 펌핑을 유도하기 때문"}, {"id": "B1-152", "q": "노트 기준 NADH 1개는 몇 개의 H+와 연결되는가?", "a": "10개"}, {"id": "B1-153", "q": "노트 기준 FADH2 1개는 몇 개의 H+와 연결되는가?", "a": "6개"}, {"id": "B1-154", "q": "포도당 1분자의 총 ATP를 이론적으로 32개로 볼 수 있는 조건은?", "a": "퍼낸 모든 H+가 ATP 합성효소를 돌리는 데 사용될 때"}, {"id": "B1-155", "q": "고전 교과서의 NADH·FADH2당 ATP 값(현대값과 비교)은?", "a": "고전: NADH=3, FADH2=2 / 현대: NADH=2.5, FADH2=1.5"}, {"id": "B1-156", "q": "고전값 기준 포도당 1분자 총 ATP는?", "a": "38(말산-아스파르트산)/36(글리세롤 인산) — 현대값은 32/30"}, {"id": "B1-157", "q": "포도당 1분자 총 ATP가 30개가 될 수 있는 이유는?", "a": "세포질 NADH 전자의 비효율적 왕복(셔틀)"}, {"id": "B1-158", "q": "세포질 NADH가 미토콘드리아 기질로 직접 못 들어가는 이유와 해결책은?", "a": "내막을 통과하지 못함 → 셔틀(전달기구)로 전자만 전달"}, {"id": "B1-159", "q": "말산-아스파르트산 셔틀의 조직과 ATP 수율은?", "a": "심장·간·신장 — 세포질 NADH를 미토 NADH로 전달 → 2.5 ATP (포도당 총 32)"}, {"id": "B1-160", "q": "글리세롤 인산 셔틀의 조직과 ATP 수율은?", "a": "뇌·골격근 — 세포질 NADH를 미토 FADH2로 전달 → 1.5 ATP (포도당 총 30)"}, {"id": "B1-161", "q": "강의 노트에서 포도당 에너지의 ATP 전환 효율은 약 몇 %로 언급되는가?", "a": "약 34%"}, {"id": "B1-162", "q": "세포호흡 효율이 낮아져도 이득일 수 있는 예시는?", "a": "갈색 지방의 열 생산"}, {"id": "B1-163", "q": "갈색 지방 세포에 많은 소기관은?", "a": "미토콘드리아"}, {"id": "B1-164", "q": "갈색지방 미토콘드리아의 특수 단백질은?", "a": "비짝물림 단백질(uncoupling protein)"}, {"id": "B1-165", "q": "비짝물림 단백질의 기능은?", "a": "ATP 생성 없이 H+가 기울기를 따라 되돌아가게 한다"}, {"id": "B1-166", "q": "비짝물림 단백질 활성의 결과는?", "a": "ATP 대신 열 생성"}, {"id": "B1-167", "q": "비짝물림 단백질이 있어도 연료 산화가 증가하는 이유는?", "a": "양성자 기울기를 유지하려고 더 많은 전자전달과 연료 산화가 일어나기 때문"}, {"id": "B1-168", "q": "발효의 정의는?", "a": "산소도 전자전달사슬도 사용하지 않고 화학에너지를 수확하는 방식"}, {"id": "B1-169", "q": "발효의 목적은 ATP를 많이 만드는 것보다 무엇에 있는가?", "a": "NAD+ 재생"}, {"id": "B1-170", "q": "발효에서 ATP는 어느 과정에서만 생성되는가?", "a": "해당과정"}, {"id": "B1-171", "q": "발효 자체는 전자전달계를 사용하는가?", "a": "아니오"}, {"id": "B1-172", "q": "알코올 발효의 최종 생성물 2가지는?", "a": "에탄올과 CO2"}, {"id": "B1-173", "q": "알코올 발효에서 피루브산은 먼저 무엇으로 바뀌는가?", "a": "아세트알데하이드"}, {"id": "B1-174", "q": "알코올 발효에서 아세트알데하이드가 하는 역할은?", "a": "NADH의 전자를 받아 에탄올로 환원된다"}, {"id": "B1-175", "q": "젖산 발효의 최종 생성물은?", "a": "젖산"}, {"id": "B1-176", "q": "젖산 발효에서 전자수용체는?", "a": "피루브산"}, {"id": "B1-177", "q": "젖산 발효의 목적을 한 문장으로 하면?", "a": "피루브산을 환원시켜 NAD+를 재생하는 것"}, {"id": "B1-178", "q": "젖산 발효는 산업적으로 어디에 쓰이는가?", "a": "낙농 산업"}, {"id": "B1-179", "q": "포유동물 무산소 조건에서 백근에 많이 생성되는 것은?", "a": "젖산"}, {"id": "B1-180", "q": "생성된 젖산은 일부 어디에서 다시 산화되는가?", "a": "옆의 적근"}, {"id": "B1-181", "q": "남은 젖산은 간/신장에서 무엇 생성에 이용되는가?", "a": "포도당"}, {"id": "B1-182", "q": "운동 생리학자가 젖산 생성에 '발효'라는 말을 꺼리는 이유는?", "a": "실제 ATP는 해당과정에서 나오기 때문"}, {"id": "B1-183", "q": "절대 혐기성 생물(obligate anaerobe)이란?", "a": "발효나 무기호흡만 수행하고 산소가 있으면 살 수 없는 생물"}, {"id": "B1-184", "
