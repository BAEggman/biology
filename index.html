.' },\n    { id: 's140', c: '호흡계', a: true,  t: '보어효과는 낮은 pH(높은 CO₂)에서 헤모글로빈의 산소 친화도를 낮춰 산소를 더 방출시킨다.', f: '맞다. 활발히 호흡하는 조직에 산소를 더 공급한다.' },\n    { id: 's141', c: '호흡계', a: false, t: '헤모시아닌은 철(Fe)을 산소결합 성분으로 가지는 척추동물의 호흡색소이다.', f: '헤모시아닌은 구리를 가지며 절지·연체동물의 색소이고, 척추동물은 철 기반 헤모글로빈을 쓴다.' },\n    { id: 's142', c: '호흡계', a: true,  t: '이산화탄소의 대부분은 탄산수소이온(HCO₃⁻) 형태로 운반되며 탄산탈수효소가 관여한다.', f: '맞다.' },\n    { id: 's143', c: '호흡계', a: false, t: '미오글로빈은 4개의 소단위체로 이루어진 4차구조 단백질이다.', f: '미오글로빈은 단일 사슬의 3차구조이고, 4차구조는 헤모글로빈이다.' },\n    { id: 's144', c: '호흡계', a: true,  t: '일산화탄소(CO)는 헤모글로빈에 대한 친화도가 산소보다 수백 배 높다.', f: '맞다. 그래서 적은 양으로도 치명적이다.' },\n\n    /* ---------- 배설 ---------- */\n    { id: 's145', c: '배설', a: false, t: '암모니아는 독성이 약해 물 손실을 최소화하며 배출된다.', f: '암모니아는 독성이 강해 바로 배출해야 하며, 물 손실 최소화는 요산의 특징이다.' },\n    { id: 's146', c: '배설', a: true,  t: '요소는 척추동물의 간에서 암모니아와 이산화탄소가 결합해 만들어진다.', f: '맞다. 독성이 암모니아보다 훨씬 낮다.' },\n    { id: 's147', c: '배설', a: true,  t: '네프론은 사구체, 보먼주머니, 세뇨관으로 구성된다.', f: '맞다.' },\n    { id: 's148', c: '배설', a: false, t: '헨레고리 하행지에서는 염화나트륨만, 상행지에서는 물만 빠져나간다.', f: '하행지에서는 물만(AQP1), 상행지에서는 염화나트륨만 빠져나간다.' },\n    { id: 's149', c: '배설', a: true,  t: '항이뇨호르몬(ADH)은 집합관에서 물의 재흡수를 촉진한다.', f: '맞다.' },\n    { id: 's150', c: '배설', a: true,  t: '헨레고리 굵은 상행지는 물에 불투과성이며, 루프 이뇨제의 표적인 NKCC2가 있다.', f: '맞다.' },\n\n    /* ---------- 면역 ---------- */\n    { id: 's151', c: '면역', a: false, t: '선천성 면역은 특이성과 기억이 강하고, 적응 면역은 빠르지만 기억이 약하다.', f: '선천성 면역이 빠르지만 기억이 약하고, 적응 면역이 특이성·기억이 강하다.' },\n    { id: 's152', c: '면역', a: true,  t: 'B세포는 항원을 직접 인식하고, T세포는 MHC에 제시된 항원 조각을 인식한다.', f: '맞다.' },\n    { id: 's153', c: '면역', a: false, t: 'MHC I은 도움 T세포(CD4)와, MHC II는 세포독성 T세포(CD8)와 연결된다.', f: 'MHC I은 CD8 세포독성 T세포, MHC II는 CD4 도움 T세포와 연결된다.' },\n    { id: 's154', c: '면역', a: true,  t: '항체는 병원체를 직접 죽이기보다 중화·옵소닌화·보체 활성화를 돕는다.', f: '맞다.' },\n    { id: 's155', c: '면역', a: false, t: '백신은 이미 만들어진 항체를 주입하는 수동 면역이다.', f: '백신은 스스로 기억세포를 만드는 능동 면역이고, 항체를 받는 것이 수동 면역이다.' },\n    { id: 's156', c: '면역', a: true,  t: '모체 IgG는 태반을, IgA는 모유를 통해 전달되는 자연 수동 면역이다.', f: '맞다.' },\n    { id: 's157', c: '면역', a: true,  t: '세포독성 T세포는 퍼포린과 그랜자임으로 감염세포의 세포사멸을 유도한다.', f: '맞다.' },\n    { id: 's158', c: '면역', a: false, t: '알레르기에서 비만세포에 결합해 히스타민 방출을 일으키는 항체는 IgG이다.', f: '알레르기에서는 IgE가 비만세포에 결합한다.' },\n    { id: 's159', c: '면역', a: true,  t: 'HIV는 주로 CD4+ T세포를 감염시켜 체액성·세포성 면역을 모두 약화시킨다.', f: '맞다.' },\n    { id: 's160', c: '면역', a: true,  t: '2차 면역반응은 1차보다 빠르고 강하며, 기억세포가 이를 가능하게 한다.', f: '맞다.' },\n\n    /* ---------- 식물 / 생태 / 다양성 (지엽) ---------- */\n    { id: 's161', c: '식물생태', a: false, t: '외떡잎식물은 형성층을 가져 2차 생장(부피 생장)을 한다.', f: '외떡잎식물은 형성층이 없어 2차 생장을 하지 못한다(쌍떡잎식물이 함).' },\n    { id: 's162', c: '식물생태', a: true,  t: '속씨식물의 중복수정에서 정핵과 극핵 2개가 만나 3n 배젖이 형성된다.', f: '맞다. 정핵+난세포는 2n 배가 된다.' },\n    { id: 's163', c: '식물생태', a: false, t: '옥신은 기공을 닫고 종자 휴면을 유지하는 스트레스 호르몬이다.', f: '그것은 앱시스산(ABA)이고, 옥신은 신장 생장·정단우성을 담당한다.' },\n    { id: 's164', c: '식물생태', a: true,  t: '에틸렌은 기체 호르몬으로 과일 성숙과 낙엽 형성을 촉진한다.', f: '맞다.' },\n    { id: 's165', c: '식물생태', a: false, t: '오징어와 문어는 연체동물이므로 개방순환계를 가진다.', f: '두족류(오징어·문어)는 연체동물이지만 예외적으로 폐쇄순환계를 가진다.' },\n    { id: 's166', c: '식물생태', a: true,  t: '곤충의 배설기관은 말피기관이고, 편형동물(플라나리아)은 불꽃세포를 쓴다.', f: '맞다.' },\n    { id: 's167', c: '식물생태', a: false, t: '프리온은 짧은 RNA만으로 이루어진 감염원이다.', f: '프리온은 핵산 없이 단백질만으로 감염하며, 짧은 RNA로만 된 것은 비로이드이다.' },\n    { id: 's168', c: '식물생태', a: true,  t: '지수 성장(J자)은 자원이 무한할 때, 로지스틱 성장(S자)은 환경수용력(K)에 도달할 때 나타난다.', f: '맞다.' },\n    { id: 's169', c: '식물생태', a: false, t: '질소 고정은 질산이온(NO₃⁻)을 질소 기체(N₂)로 바꾸는 과정이다.', f: '그것은 탈질작용이고, 질소 고정은 N₂를 암모니아(NH₃)로 바꾸는 것이다.' },\n\n    /* ---------- 효소반응속도론 (지엽, S-tier) ---------- */\n    { id: 's170', c: '효소', a: false, t: '경쟁적 저해제는 Vmax를 감소시키고 Km은 변화시키지 않는다.', f: '경쟁적 저해제는 Vmax는 그대로이고 Km을 증가시킨다.' },\n    { id: 's171', c: '효소', a: true,  t: '비경쟁적 저해제는 Vmax를 감소시키고 Km은 변화시키지 않는다.', f: '맞다.' },\n    { id: 's172', c: '효소', a: false, t: '무경쟁적 저해제는 Km과 Vmax를 모두 증가시킨다.', f: '무경쟁적 저해제는 Km과 Vmax를 모두 감소시킨다(라인위버-버크에서 평행 이동).' },\n    { id: 's173', c: '효소', a: true,  t: 'S자형(시그모이드) 곡선을 보이는 알로스테릭 효소에는 라인위버-버크 작도를 적용할 수 없다.', f: '맞다. 미카엘리스-멘텐 식을 따르지 않아 직선이 되지 않는다.' },\n\n    /* ---------- 근육 생리 (지엽) ---------- */\n    { id: 's174', c: '근육', a: true,  t: '코리 회로는 근육에서 생긴 젖산이 간으로 가서 다시 포도당으로 전환되는 과정이다.', f: '맞다.' },\n    { id: 's175', c: '근육', a: false, t: '지근(Type I)은 미오글로빈이 적은 백색 근육으로 해당과정 중심이다.', f: '지근은 미오글로빈이 많은 적색 근육으로 산화적 인산화 중심이고, 속근(Type IIb)이 백색·해당과정 중심이다.' },\n    { id: 's176', c: '근육', a: true,  t: '평활근은 트로포닌이 없어 칼모듈린-MLCK 경로로 수축한다.', f: '맞다.' }\n  ];\n\n  if (typeof module !== 'undefined' && module.exports) {\n    module.exports = STATEMENTS;\n  }\n  root.OX_STATEMENTS = STATEMENTS;\n})(typeof window !== 'undefined' ? window : globalThis);\n\n<\/script>\n<!-- 핵심 로직 -->\n<script>\n/* ===========================================================================\n * 캠벨 OX 즉답 — 핵심 로직 (DOM 비의존, Node 검증 가능)\n * 라운드 생성 / 채점 / 콤보 / 점수 / 직렬화 / 저장 스키마\n * =========================================================================== */\n(function (root) {\n  'use strict';\n\n  var APP_KEY = 'bio_campbell_ox_quiz_v1';\n  var SCHEMA = 2;\n  var ROUND_SIZE = 20;\n  var TIME_LIMIT_MS = 7000;\n\n  /* ---- 통계 도우미 ---- */\n  function makeRng(seed) {\n    // 결정적 PRNG (mulberry32) — 테스트 재현성용. seed 없으면 Math.random.\n    if (seed == null) return Math.random;\n    var s = seed >>> 0;\n    return function () {\n      s |= 0; s = (s + 0x6D2B79F5) | 0;\n      var t = Math.imul(s ^ (s >>> 15), 1 | s);\n      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;\n      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;\n    };\n  }\n\n  function shuffle(arr, rng) {\n    var a = arr.slice();\n    for (var i = a.length - 1; i > 0; i--) {\n      var j = Math.floor(rng() * (i + 1));\n      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;\n    }\n    return a;\n  }\n\n  function pickN(arr, n, rng) {\n    return shuffle(arr, rng).slice(0, n);\n  }\n\n  /* ---- 라운드 생성: 절반 참 / 절반 거짓 보장 ---- */\n  function buildRound(pool, size, rng) {\n    size = size || ROUND_SIZE;\n    rng = rng || Math.random;\n    var trues = pool.filter(function (q) { return q.a === true; });\n    var falses = pool.filter(function (q) { return q.a === false; });\n    var halfT = Math.floor(size / 2);\n    var halfF = size - halfT;\n    // 풀이 한쪽으로 부족하면 보정\n    if (trues.length < halfT) { halfF += (halfT - trues.length); halfT = trues.length; }\n    if (falses.length < halfF) { halfT += (halfF - falses.length); halfF = falses.length; }\n    var chosen = pickN(trues, halfT, rng).concat(pickN(falses, halfF, rng));\n    return shuffle(chosen, rng);\n  }\n\n  /* ---- 점수: 정답 100 + 콤보 보너스 + 속도 보너스 ---- */\n  function pointsFor(correct, comboAfter, elapsedMs, limitMs) {\n    if (!correct) return 0;\n    limitMs = limitMs || TIME_LIMIT_MS;\n    var base = 100;\n    var comboBonus = Math.min(comboAfter, 10) * 10;\n    var frac = 1 - (elapsedMs / limitMs);\n    if (frac < 0) frac = 0; if (frac > 1) frac = 1;\n    var speedBonus = Math.round(frac * 50);\n    return base + comboBonus + speedBonus;\n  }\n\n  /* ---- 라운드 상태 ---- */\n  function createRoundState(questions, isRetry) {\n    return {\n      questions: questions,\n      index: 0,\n      combo: 0,\n      maxCombo: 0,\n      correct: 0,\n      answered: 0,\n      score: 0,\n      times: [],     // 답한 문항의 ms (시간초과는 null)\n      wrong: [],     // 틀림/시간초과 문항 id\n      finished: questions.length === 0,\n      isRetry: !!isRetry\n    };\n  }\n\n  function currentQuestion(state) {\n    return state.questions[state.index] || null;\n  }\n\n  // saidTrue: 사용자가 O(옳음)를 골랐는가. timedOut: 시간초과 여부.\n  function submitAnswer(state, saidTrue, elapsedMs, timedOut) {\n    var stmt = state.questions[state.index];\n    if (!stmt || state.finished) return null;\n    var correct = !timedOut && (saidTrue === stmt.a);\n    state.answered++;\n    state.times.push(timedOut ? null : elapsedMs);\n    if (correct) {\n      state.correct++;\n      state.combo++;\n      if (state.combo > state.maxCombo) state.maxCombo = state.combo;\n      state.score += pointsFor(true, state.combo, elapsedMs, TIME_LIMIT_MS);\n    } else {\n      state.combo = 0;\n      state.wrong.push(stmt.id);\n    }\n    state.index++;\n    if (state.index >= state.questions.length) state.finished = true;\n    return { correct: correct, stmt: stmt, comboNow: state.combo };\n  }\n\n  function roundSummary(state) {\n    var valid = state.times.filter(function (t) { return t != null; });\n    var sum = valid.reduce(function (a, b) { return a + b; }, 0);\n    var avgMs = valid.length ? Math.round(sum / valid.length) : 0;\n    var total = state.questions.length;\n    return {\n      total: total,\n      correct: state.correct,\n      accuracy: total ? Math.round((state.correct / total) * 100) : 0,\n      maxCombo: state.maxCombo,\n      avgMs: avgMs,\n      score: state.score,\n      wrongIds: state.wrong.slice(),\n      isRetry: !!state.isRetry\n    };\n  }\n\n  /* ---- 라운드 직렬화(진행 중 저장/재개) ---- */\n  function serializeRound(state) {\n    return {\n      qids: state.questions.map(function (q) { return q.id; }),\n      index: state.index, combo: state.combo, maxCombo: state.maxCombo,\n      correct: state.correct, answered: state.answered, score: state.score,\n      times: state.times, wrong: state.wrong, isRetry: !!state.isRetry\n    };\n  }\n\n  function deserializeRound(obj, byId) {\n    if (!obj || !Array.isArray(obj.qids)) return null;\n    var questions = obj.qids.map(function (id) { return byId[id]; }).filter(Boolean);\n    if (questions.length !== obj.qids.length) return null; // 항목 누락 -> 거부\n    var st = createRoundState(questions, !!obj.isRetry);\n    st.index = obj.index | 0;\n    st.combo = obj.combo | 0;\n    st.maxCombo = obj.maxCombo | 0;\n    st.correct = obj.correct | 0;\n    st.answered = obj.answered | 0;\n    st.score = obj.score | 0;\n    st.times = Array.isArray(obj.times) ? obj.times.slice() : [];\n    st.wrong = Array.isArray(obj.wrong) ? obj.wrong.slice() : [];\n    st.finished = st.index >= questions.length;\n    if (st.index < 0 || st.index > questions.length) return null; // 손상 거부\n    return st;\n  }\n\n  /* ---- 저장 스키마 ---- */\n  function blankSave() {\n    return {\n      v: SCHEMA,\n      bestCombo: 0,\n      bestScore: 0,\n      rounds: 0,\n      lifeCorrect: 0,\n      lifeTotal: 0,\n      lifeTimeMs: 0,\n      lifeTimeN: 0,\n      perItem: {},      // id -> {seen, wrong}\n      inProgress: null, // 직렬화된 라운드 또는 null\n      updated: 0\n    };\n  }\n\n  function validateSave(obj) {\n    if (!obj || typeof obj !== 'object') return false;\n    if (obj.v !== SCHEMA) return false;\n    var nums = ['bestCombo', 'bestScore', 'rounds', 'lifeCorrect', 'lifeTotal', 'lifeTimeMs', 'lifeTimeN'];\n    for (var i = 0; i < nums.length; i++) {\n      var k = nums[i];\n      if (typeof obj[k] !== 'number' || !isFinite(obj[k]) || obj[k] < 0) return false;\n    }\n    if (typeof obj.perItem !== 'object' || obj.perItem === null) return false;\n    return true;\n  }\n\n  function serializeSave(save) { return JSON.stringify(save); }\n\n  function deserializeSave(str) {\n    if (typeof str !== 'string' || !str) return null;\n    var o;\n    try { o = JSON.parse(str); } catch (e) { return null; }\n    if (!validateSave(o)) return null;\n    // 결손 필드 보강\n    if (!o.perItem) o.perItem = {};\n    if (o.inProgress === undefined) o.inProgress = null;\n    return o;\n  }\n\n  // 두 저장본 중 최신(updated 큰 쪽) 선택\n  function mergeSave(a, b) {\n    if (!a) return b || null;\n    if (!b) return a;\n    return (b.updated || 0) > (a.updated || 0) ? b : a;\n  }\n\n  // 라운드 종료 결과를 누적 통계에 반영 (재시도 라운드는 통계 미반영, perItem만 갱신)\n  function applyRoundResult(save, state) {\n    var sum = roundSummary(state);\n    // perItem 갱신 (재시도 포함)\n    for (var i = 0; i < state.questions.length; i++) {\n      var q = state.questions[i];\n      var rec = save.perItem[q.id] || { seen: 0, wrong: 0 };\n      rec.seen += 1;\n      if (sum.wrongIds.indexOf(q.id) >= 0) rec.wrong += 1;\n      save.perItem[q.id] = rec;\n    }\n    if (!state.isRetry) {\n      save.rounds += 1;\n      save.lifeCorrect += sum.correct;\n      save.lifeTotal += sum.total;\n      var valid = state.times.filter(function (t) { return t != null; });\n      save.lifeTimeMs += valid.reduce(function (a, b) { return a + b; }, 0);\n      save.lifeTimeN += valid.length;\n      if (sum.maxCombo > save.bestCombo) save.bestCombo = sum.maxCombo;\n      if (sum.score > save.bestScore) save.bestScore = sum.score;\n    }\n    save.inProgress = null;\n    return sum;\n  }\n\n  function indexById(pool) {\n    var m = {};\n    for (var i = 0; i < pool.length; i++) m[pool[i].id] = pool[i];\n    return m;\n  }\n\n  var API = {\n    APP_KEY: APP_KEY,\n    SCHEMA: SCHEMA,\n    ROUND_SIZE: ROUND_SIZE,\n    TIME_LIMIT_MS: TIME_LIMIT_MS,\n    makeRng: makeRng,\n    shuffle: shuffle,\n    pickN: pickN,\n    buildRound: buildRound,\n    pointsFor: pointsFor,\n    createRoundState: createRoundState,\n    currentQuestion: currentQuestion,\n    submitAnswer: submitAnswer,\n    roundSummary: roundSummary,\n    serializeRound: serializeRound,\n    deserializeRound: deserializeRound,\n    blankSave: blankSave,\n    validateSave: validateSave,\n    serializeSave: serializeSave,\n    deserializeSave: deserializeSave,\n    mergeSave: mergeSave,\n    applyRoundResult: applyRoundResult,\n    indexById: indexById\n  };\n\n  if (typeof module !== 'undefined' && module.exports) {\n    module.exports = API;\n  }\n  root.OXLogic = API;\n})(typeof window !== 'undefined' ? window : globalThis);\n\n<\/script>\n<!-- 저장 + UI -->\n<script>\n(function () {\n  'use strict';\n  var L = window.OXLogic;\n  var POOL = window.OX_STATEMENTS;\n  var BYID = L.indexById(POOL);\n  var $ = function (id) { return document.getElementById(id); };\n\n  /* ---------------- 저장: localStorage + window.storage 이중화 ---------------- */\n  var KEY = L.APP_KEY;\n  function hasRemote(){ try { return !!(window.storage && typeof window.storage.get === 'function'); } catch(e){ return false; } }\n  function writeLocal(str){ try { localStorage.setItem(KEY, str); } catch(e){} }\n  function readLocal(){ try { return localStorage.getItem(KEY); } catch(e){ return null; } }\n  function writeRemote(str){ try { if (hasRemote()) { var p = window.storage.set(KEY, str, false); if (p && p.catch) p.catch(function(){}); } } catch(e){} }\n  function readRemote(cb){\n    try {\n      if (hasRemote()) {\n        window.storage.get(KEY).then(function (r) { cb(r && r.value ? r.value : null); }).catch(function(){ cb(null); });\n        return;\n      }\n    } catch(e){}\n    cb(null);\n  }\n  function persist(){\n    save.updated = Date.now();\n    var str = L.serializeSave(save);\n    writeLocal(str);   // 즉시(동기) — 재오픈 보장\n    writeRemote(str);  // 베스트에포트(비동기)\n  }\n  // 시작: 로컬 즉시 로드 후, 원격이 더 최신이면 병합\n  function bootLoad(done){\n    var local = L.deserializeSave(readLocal()) || L.blankSave();\n    save = local;\n    readRemote(function (remoteStr) {\n      var remote = L.deserializeSave(remoteStr);\n      if (remote) {\n        var merged = L.mergeSave(local, remote);\n        if (merged && merged !== save) { save = merged; }\n        // 두 저장소 동기화\n        var str = L.serializeSave(save); writeLocal(str); writeRemote(str);\n      }\n      done();\n    });\n  }\n\n  /* ---------------- 앱 상태 ---------------- */\n  var save = null;\n  var round = null;\n  var locked = false;          // 입력 잠금(채점 연출 중)\n  var awaitingNext = false;    // 정정 표시 후 다음 대기\n  var screen = 'home';\n  var timer = { raf: 0, start: 0, dur: L.TIME_LIMIT_MS, running: false };\n\n  /* ---------------- 화면 전환 ---------------- */\n  function show(name){\n    screen = name;\n    $('home').classList.toggle('hide', name !== 'home');\n    $('play').classList.toggle('hide', name !== 'play');\n    $('summary').classList.toggle('hide', name !== 'summary');\n  }\n\n  /* ---------------- HOME ---------------- */\n  function renderHome(){\n    $('hsCombo').textContent = save.bestCombo;\n    $('hsScore').textContent = save.bestScore;\n    $('hsRounds').textContent = save.rounds;\n    $('hsAcc').textContent = save.lifeTotal ? Math.round(save.lifeCorrect / save.lifeTotal * 100) + '%' : '—';\n\n    var meta = $('homeMeta');\n    meta.innerHTML = '';\n    addChip(meta, '문항 풀', POOL.length + '개');\n    addChip(meta, '제한시간', '7초');\n    if (save.lifeTotal) addChip(meta, '누적', save.lifeCorrect + '/' + save.lifeTotal);\n\n    // 진행 중 라운드 재개 안내\n    var ip = save.inProgress ? L.deserializeRound(save.inProgress, BYID) : null;\n    if (ip && !ip.finished) {\n      $('resumeBox').classList.remove('hide');\n      $('resumeAt').textContent = ip.questions.length + '문제 중 ' + ip.index + '번째' + (ip.isRetry ? ' (오답 복습)' : '');\n    } else {\n      $('resumeBox').classList.add('hide');\n      if (save.inProgress) { save.inProgress = null; persist(); }\n    }\n    show('home');\n  }\n  function addChip(parent, label, val){\n    var s = document.createElement('span');\n    s.className = 'chip';\n    s.innerHTML = label + ' <b>' + val + '<\/b>';\n    parent.appendChild(s);\n  }\n\n  /* ---------------- 라운드 시작/재개 ---------------- */\n  function startNewRound(){\n    round = L.createRoundState(L.buildRound(POOL, L.ROUND_SIZE, Math.random), false);\n    save.inProgress = L.serializeRound(round); persist();\n    show('play'); nextQuestion();\n  }\n  function startRetryRound(wrongIds){\n    var qs = wrongIds.map(function (id) { return BYID[id]; }).filter(Boolean);\n    round = L.createRoundState(qs, true);\n    save.inProgress = L.serializeRound(round); persist();\n    show('play'); nextQuestion();\n  }\n  function resumeRound(){\n    var ip = L.deserializeRound(save.inProgress, BYID);\n    if (!ip || ip.finished) { save.inProgress = null; persist(); renderHome(); return; }\n    round = ip;\n    show('play'); nextQuestion();\n  }\n\n  /* ---------------- 문제 표시 ---------------- */\n  function nextQuestion(){\n    if (round.finished) { endRound(); return; }\n    var q = L.currentQuestion(round);\n    awaitingNext = false; locked = false;\n\n    $('qcard').classList.remove('flash-ok', 'flash-no');\n    $('verdict').classList.remove('show');\n    $('answers').style.visibility = 'visible';\n    setAns(false);\n\n    $('qcat').textContent = q.c;\n    $('qtext').textContent = q.t;\n\n    var total = round.questions.length;\n    $('hudCount').textContent = (round.index + 1) + ' / ' + total;\n    updateCombo(round.combo, false);\n    $('hudScore').textContent = round.score + '점';\n\n    startTimer();\n  }\n  function setAns(disabled){\n    $('ansO').disabled = disabled; $('ansX').disabled = disabled;\n  }\n  function updateCombo(n, pulse){\n    var el = $('hudCombo');\n    el.textContent = '콤보 ' + n;\n    el.classList.toggle('dim', n === 0);\n    if (pulse) { el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); }\n  }\n\n  /* ---------------- 타이머 ---------------- */\n  function startTimer(){\n    stopTimer();\n    timer.start = (typeof performance !== 'undefined' ? performance.now() : Date.now());\n    timer.running = true;\n    var bar = $('timerBar'), fill = $('timerFill');\n    bar.classList.remove('warn', 'danger');\n    function frame(now){\n      if (!timer.running) return;\n      var t = (typeof performance !== 'undefined' ? performance.now() : Date.now());\n      var elapsed = t - timer.start;\n      var remain = Math.max(0, timer.dur - elapsed);\n      var frac = remain / timer.dur;\n      fill.style.width = (frac * 100) + '%';\n      bar.classList.toggle('warn', frac <= 0.45 && frac > 0.2);\n      bar.classList.toggle('danger', frac <= 0.2);\n      if (remain <= 0) { timer.running = false; onTimeout(); return; }\n      timer.raf = requestAnimationFrame(frame);\n    }\n    timer.raf = requestAnimationFrame(frame);\n  }\n  function stopTimer(){\n    timer.running = false;\n    if (timer.raf) { cancelAnimationFrame(timer.raf); timer.raf = 0; }\n  }\n  function elapsedMs(){\n    var t = (typeof performance !== 'undefined' ? performance.now() : Date.now());\n    return Math.max(0, Math.min(timer.dur, t - timer.start));\n  }\n\n  /* ---------------- 응답 ---------------- */\n  function answer(saidTrue){\n    if (locked || awaitingNext || round.finished) return;\n    locked = true;\n    var ms = elapsedMs();\n    stopTimer();\n    var res = L.submitAnswer(round, saidTrue, ms, false);\n    save.inProgress = L.serializeRound(round); persist();\n    reveal(res);\n  }\n  function onTimeout(){\n    if (locked || awaitingNext || round.finished) return;\n    locked = true;\n    var res = L.submitAnswer(round, null, timer.dur, true);\n    save.inProgress = L.serializeRound(round); persist();\n    reveal(res, true);\n  }\n\n  function reveal(res, timedOut){\n    setAns(true);\n    var qcard = $('qcard');\n    $('hudScore').textContent = round.score + '점';\n\n    if (res.correct) {\n      qcard.classList.add('flash-ok');\n      updateCombo(round.combo, true);\n      // 정답: 가볍고 빠르게 다음으로 (리듬 유지)\n      window.setTimeout(function () { nextQuestion(); }, 300);\n    } else {\n      qcard.classList.add('flash-no');\n      updateCombo(0, false);\n      // 오답/시간초과: 한 줄 정정 표시 후 대기\n      $('answers').style.visibility = 'hidden';\n      var vh = $('vhead');\n      vh.className = 'vhead no';\n      vh.innerHTML = '<span class=\"vbadge no\">' + (timedOut ? '시간초과' : '오답') + '<\/span> '\n                   + '정답은 ' + (res.stmt.a ? 'O (옳음)' : 'X (거짓)');\n      $('vfix').textContent = res.stmt.f;\n      $('verdict').classList.add('show');\n      awaitingNext = true; locked = false;\n    }\n  }\n  function advanceFromVerdict(){\n    if (!awaitingNext) return;\n    awaitingNext = false; locked = true;\n    nextQuestion();\n  }\n\n  /* ---------------- 라운드 종료 ---------------- */\n  function endRound(){\n    stopTimer();\n    var isRetry = round.isRetry;\n    var preBestScore = save.bestScore, preBestCombo = save.bestCombo;\n    var sum = L.applyRoundResult(save, round);\n    persist();\n\n    $('sumKind').textContent = isRetry ? 'REVIEW COMPLETE' : 'ROUND COMPLETE';\n    $('sumScore').textContent = sum.score;\n    $('sumLine').textContent = isRetry\n      ? ('오답 ' + sum.total + '문제 복습 · ' + sum.correct + '개 정답')\n      : (sum.total + '문제 중 ' + sum.correct + '개 정답');\n    $('sgAcc').textContent = sum.correct + '/' + sum.total;\n    $('sgCombo').textContent = sum.maxCombo;\n    $('sgAvg').textContent = (sum.avgMs / 1000).toFixed(1) + 's';\n\n    var nb = $('sumNew'); nb.innerHTML = '';\n    if (!isRetry && (sum.score > preBestScore || sum.maxCombo > preBestCombo)) {\n      var b = document.createElement('span'); b.className = 'snew';\n      b.textContent = (sum.score > preBestScore && sum.maxCombo > preBestCombo) ? '최고 점수 · 콤보 갱신!'\n                    : (sum.score > preBestScore ? '최고 점수 갱신!' : '최고 콤보 갱신!');\n      nb.appendChild(b);\n    }\n\n    // 오답 목록\n    var wrap = $('wrongWrap'); wrap.innerHTML = '';\n    if (sum.wrongIds.length) {\n      var box = document.createElement('div'); box.className = 'card wronglist';\n      var tt = document.createElement('div'); tt.className = 'wtitle';\n      tt.textContent = '놓친 문항 ' + sum.wrongIds.length + '개';\n      box.appendChild(tt);\n      sum.wrongIds.forEach(function (id) {\n        var q = BYID[id]; if (!q) return;\n        var it = document.createElement('div'); it.className = 'witem';\n        var qd = document.createElement('div'); qd.className = 'wq';\n        qd.innerHTML = '<span class=\"wans\">정답 ' + (q.a ? 'O' : 'X') + '<\/span>' + escapeHtml(q.t);\n        var fx = document.createElement('div'); fx.className = 'wfix'; fx.textContent = q.f;\n        it.appendChild(qd); it.appendChild(fx); box.appendChild(it);\n      });\n      wrap.appendChild(box);\n      $('btnRetry').classList.remove('hide');\n      $('btnRetry').textContent = '놓친 ' + sum.wrongIds.length + '개 다시 풀기';\n      $('btnRetry')._wrong = sum.wrongIds.slice();\n    } else {\n      var clear = document.createElement('div'); clear.className = 'card allclear';\n      clear.textContent = '전부 정답! 놓친 문항이 없어요.';\n      wrap.appendChild(clear);\n      $('btnRetry').classList.add('hide');\n      $('btnRetry')._wrong = [];\n    }\n    round = null;\n    show('summary');\n  }\n  function escapeHtml(s){ return s.replace(/[&<>\"']/g, function (c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'})[c]; }); }\n\n  /* ---------------- 입력 바인딩 ---------------- */\n  $('ansO').addEventListener('click', function () { answer(true); });\n  $('ansX').addEventListener('click', function () { answer(false); });\n\n  // 정정 표시 중 탭하면 다음으로\n  $('qcard').addEventListener('click', function () { if (awaitingNext) advanceFromVerdict(); });\n\n  document.addEventListener('keydown', function (e) {\n    if (screen !== 'play') return;\n    var k = e.key;\n    if (awaitingNext) {\n      if (k === ' ' || k === 'Enter' || k === 'ArrowLeft' || k === 'ArrowRight'\n          || k === 'o' || k === 'O' || k === 'x' || k === 'X' || k === 'ㅐ' ) {\n        e.preventDefault(); advanceFromVerdict();\n      }\n      return;\n    }\n    if (k === 'o' || k === 'O' || k === 'ArrowLeft') { e.preventDefault(); answer(true); }\n    else if (k === 'x' || k === 'X' || k === 'ArrowRight') { e.preventDefault(); answer(false); }\n  });\n\n  // HOME 버튼\n  $('btnStart').addEventListener('click', startNewRound);\n  $('btnResume').addEventListener('click', resumeRound);\n  $('btnDiscard').addEventListener('click', function () { save.inProgress = null; persist(); startNewRound(); });\n\n  // SUMMARY 버튼\n  $('btnRetry').addEventListener('click', function () {\n    var w = $('btnRetry')._wrong || [];\n    if (w.length) startRetryRound(w);\n  });\n  $('btnAgain').addEventListener('click', startNewRound);\n  $('btnHome').addEventListener('click', function () { renderHome(); });\n\n  // 라운드 중 이탈 시 진행도 보존(이미 매 응답마다 저장하지만 안전망)\n  window.addEventListener('pagehide', function () { if (round && !round.finished) { save.inProgress = L.serializeRound(round); persist(); } });\n  window.addEventListener('visibilitychange', function () { if (document.hidden && round && !round.finished) { save.inProgress = L.serializeRound(round); persist(); } });\n\n  /* ---------------- 시작 ---------------- */\n  bootLoad(function () { renderHome(); });\n})();\n<\/script>\n<\/body>\n<\/html>\n"</script>
