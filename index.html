buildChoiceInput(ansBox, q, reveal);\n    else if (q.type === \"lwb\") buildLWBInput(ansBox, q, reveal);\n\n    if (STATE.settings.timer > 0) {\n      startTimer(STATE.settings.timer, tbar, tlab, function () { reveal(null, false, true); });\n    }\n  }\n\n  /* ----- \uc785\ub825: \uc22b\uc790 ----- */\n  function buildNumInput(box, q, reveal) {\n    var row = el(\"div\", \"numrow\");\n    var inp = el(\"input\", \"numinput\"); inp.type = \"text\"; inp.inputMode = \"decimal\";\n    inp.placeholder = \"\uc22b\uc790 \uc785\ub825\" + (q.unit ? \" (\" + q.unit + \")\" : \"\");\n    var btn = el(\"button\", \"btn primary\", \"\uc81c\ucd9c\");\n    var submit = function () {\n      var raw = inp.value.trim().replace(/,/g, \"\");\n      var v = raw === \"\" ? NaN : Number(raw);\n      reveal(raw === \"\" ? null : v, Core.checkAnswer(q, v), false);\n    };\n    btn.onclick = submit;\n    inp.addEventListener(\"keydown\", function (e) { if (e.key === \"Enter\") submit(); });\n    row.appendChild(inp); row.appendChild(btn);\n    box.appendChild(row);\n    setTimeout(function () { try { inp.focus(); } catch (e) {} }, 30);\n  }\n\n  /* ----- \uc785\ub825: \uc120\ud0dd\ud615 ----- */\n  function buildChoiceInput(box, q, reveal) {\n    var grid = el(\"div\", \"choices\");\n    q.choices.forEach(function (txt, i) {\n      var b = el(\"button\", \"choice\", \"<span class='ci'>\" + (i + 1) + \"<\/span>\" + txt);\n      b.onclick = function () { reveal(i, Core.checkAnswer(q, i), false); };\n      grid.appendChild(b);\n    });\n    box.appendChild(grid);\n  }\n\n  /* ----- \uc785\ub825: \ub77c\uc778\uc704\ubc84-\ubc84\ud06c \uc778\ud130\ub799\ud2f0\ube0c ----- */\n  function buildLWBInput(box, q, reveal) {\n    var L = q.lwb;\n    // \ud654\uba74 \uc88c\ud45c\uacc4\n    var W = 320, H = 240, padL = 46, padB = 34, padT = 14, padR = 14;\n    var x0 = -1 / L.Km;                 // x\uc808\ud3b8\n    var xMax = 1 / (L.sList[0]);        // \uac00\uc7a5 \ud070 1/[S]\n    var xMin = x0 * 1.25;\n    var yMax = (L.Km / L.Vmax) * xMax + 1 / L.Vmax;\n    yMax = yMax * 1.18;\n    function sx(x) { return padL + (x - xMin) / (xMax - xMin) * (W - padL - padR); }\n    function sy(y) { return H - padB - (y - 0) / (yMax - 0) * (H - padT - padB); }\n    function dataX(px) { return xMin + (px - padL) / (W - padL - padR) * (xMax - xMin); }\n    function dataY(py) { return 0 + (H - padB - py) / (H - padT - padB) * (yMax - 0); }\n\n    var pts = Core.lwbPoints(L.Vmax, L.Km, L.sList);\n\n    var svgNS = \"http://www.w3.org/2000/svg\";\n    var svg = document.createElementNS(svgNS, \"svg\");\n    svg.setAttribute(\"viewBox\", \"0 0 \" + W + \" \" + H);\n    svg.setAttribute(\"class\", \"lwb\");\n\n    function line(x1, y1, x2, y2, cls) { var n = document.createElementNS(svgNS, \"line\"); n.setAttribute(\"x1\", x1); n.setAttribute(\"y1\", y1); n.setAttribute(\"x2\", x2); n.setAttribute(\"y2\", y2); n.setAttribute(\"class\", cls); return n; }\n    function txt(x, y, s, cls) { var n = document.createElementNS(svgNS, \"text\"); n.setAttribute(\"x\", x); n.setAttribute(\"y\", y); n.setAttribute(\"class\", cls); n.textContent = s; return n; }\n    function circ(x, y, r, cls) { var n = document.createElementNS(svgNS, \"circle\"); n.setAttribute(\"cx\", x); n.setAttribute(\"cy\", y); n.setAttribute(\"r\", r); n.setAttribute(\"class\", cls); return n; }\n\n    // \ucd95\n    var yAxisX = sx(0), xAxisY = sy(0);\n    svg.appendChild(line(padL, padT, padL, H - padB, \"axis faint\"));\n    svg.appendChild(line(yAxisX, padT, yAxisX, H - padB, \"axis\"));     // x=0 (y\ucd95)\n    svg.appendChild(line(padL, xAxisY, W - padR, xAxisY, \"axis\"));     // y=0 (x\ucd95)\n    svg.appendChild(txt(padL + 2, padT + 10, \"1/V\", \"axlab\"));\n    svg.appendChild(txt(W - padR - 2, xAxisY - 6, \"1/[S]\", \"axlab end\"));\n\n    // \ub370\uc774\ud130 \uc810\n    pts.forEach(function (p) { svg.appendChild(circ(sx(p.x), sy(p.y), 4.5, \"datapt\")); });\n\n    // \ub4dc\ub798\uadf8 \uc9c1\uc120: \ub450 \uc190\uc7a1\uc774 (\ucd08\uae30\uc5d4 \uc77c\ubd80\ub7ec \uc5b4\uae0b\ub098\uac8c)\n    var hA = { x: 0, y: 1 / L.Vmax * 1.6 };                 // y\ucd95 \uadfc\ucc98\n    var hB = { x: xMax * 0.85, y: yMax * 0.55 };\n    var theLine = line(0, 0, 0, 0, \"fitline\");\n    svg.appendChild(theLine);\n    var hAe = circ(0, 0, 8, \"handle\"); var hBe = circ(0, 0, 8, \"handle\");\n    svg.appendChild(hAe); svg.appendChild(hBe);\n\n    var readout = el(\"div\", \"readout\", \"\");\n    var inWrap = el(\"div\", \"lwbinputs\");\n    var vIn = el(\"input\", \"numinput sm\"); vIn.type = \"text\"; vIn.inputMode = \"decimal\"; vIn.placeholder = \"Vmax\";\n    var kIn = el(\"input\", \"numinput sm\"); kIn.type = \"text\"; kIn.inputMode = \"decimal\"; kIn.placeholder = \"Km (mM)\";\n    var fillBtn = el(\"button\", \"btn ghost sm\", \"\uc808\ud3b8\uac12 \uc790\ub3d9 \ucc44\uc6b0\uae30\");\n    var submit = el(\"button\", \"btn primary\", \"\uc81c\ucd9c\");\n\n    function recompute() {\n      // \uc9c1\uc120 m,b (\ub370\uc774\ud130 \uc88c\ud45c)\n      if (Math.abs(hB.x - hA.x) < 1e-6) hB.x = hA.x + 1e-3;\n      var L2 = Core.lineFromPoints(hA.x, hA.y, hB.x, hB.y);\n      var k = Core.readKineticsFromLine(L2.m, L2.b);\n      // \uc808\ud3b8 \uadf8\ub798\ud504 \uc88c\ud45c\ub85c \uc9c1\uc120 \uc5f0\uc7a5\n      var X1 = xMin, X2 = xMax;\n      theLine.setAttribute(\"x1\", sx(X1)); theLine.setAttribute(\"y1\", sy(L2.m * X1 + L2.b));\n      theLine.setAttribute(\"x2\", sx(X2)); theLine.setAttribute(\"y2\", sy(L2.m * X2 + L2.b));\n      hAe.setAttribute(\"cx\", sx(hA.x)); hAe.setAttribute(\"cy\", sy(hA.y));\n      hBe.setAttribute(\"cx\", sx(hB.x)); hBe.setAttribute(\"cy\", sy(hB.y));\n      var yint = L2.b, xint = -L2.b / L2.m;\n      readout.innerHTML = \"y\uc808\ud3b8 \" + Core.round(yint, 4) + \" \u00b7 x\uc808\ud3b8 \" + Core.round(xint, 4) +\n        \" \u2192 <b>Vmax \u2248 \" + (isFinite(k.Vmax) ? Core.round(k.Vmax, 1) : \"\u2014\") + \"<\/b>, <b>Km \u2248 \" + (isFinite(k.Km) ? Core.round(k.Km, 2) : \"\u2014\") + \"<\/b>\";\n      return k;\n    }\n\n    // \ub4dc\ub798\uadf8\n    var dragging = null;\n    function pointerPos(evt) {\n      var r = svg.getBoundingClientRect();\n      var cx = (evt.touches ? evt.touches[0].clientX : evt.clientX) - r.left;\n      var cy = (evt.touches ? evt.touches[0].clientY : evt.clientY) - r.top;\n      return { px: cx / r.width * W, py: cy / r.height * H };\n    }\n    function startDrag(which) { return function (e) { e.preventDefault(); dragging = which; }; }\n    function moveDrag(e) {\n      if (!dragging) return; e.preventDefault();\n      var p = pointerPos(e);\n      var h = dragging === \"A\" ? hA : hB;\n      h.x = Math.max(xMin, Math.min(xMax, dataX(p.px)));\n      h.y = Math.max(0, Math.min(yMax, dataY(p.py)));\n      recompute();\n    }\n    function endDrag() { dragging = null; }\n    hAe.addEventListener(\"mousedown\", startDrag(\"A\")); hAe.addEventListener(\"touchstart\", startDrag(\"A\"), { passive: false });\n    hBe.addEventListener(\"mousedown\", startDrag(\"B\")); hBe.addEventListener(\"touchstart\", startDrag(\"B\"), { passive: false });\n    window.addEventListener(\"mousemove\", moveDrag); window.addEventListener(\"touchmove\", moveDrag, { passive: false });\n    window.addEventListener(\"mouseup\", endDrag); window.addEventListener(\"touchend\", endDrag);\n\n    fillBtn.onclick = function () { var k = recompute(); if (isFinite(k.Vmax)) vIn.value = Core.round(k.Vmax, 1); if (isFinite(k.Km)) kIn.value = Core.round(k.Km, 2); };\n    submit.onclick = function () {\n      var v = Number(vIn.value), kk = Number(kIn.value);\n      var user = { Vmax: vIn.value.trim() === \"\" ? NaN : v, Km: kIn.value.trim() === \"\" ? NaN : kk };\n      reveal(user, Core.checkAnswer(q, user), false);\n    };\n\n    box.appendChild(svg);\n    box.appendChild(readout);\n    inWrap.appendChild(vIn); inWrap.appendChild(kIn); inWrap.appendChild(fillBtn);\n    box.appendChild(inWrap);\n    var sub = el(\"div\", \"numrow\"); sub.appendChild(submit); box.appendChild(sub);\n    recompute();\n  }\n\n  /* ----- \uc815\uc624/\ud480\uc774 \ud45c\uc2dc ----- */\n  function renderResultBox(box, q, userVal, ok, timedOut, onNext) {\n    box.innerHTML = \"\";\n    var head = el(\"div\", \"verdict \" + (ok ? \"ok\" : \"no\"),\n      (ok ? \"\u2713 \uc815\ub2f5\" : (timedOut ? \"\u2715 \uc2dc\uac04 \ucd08\uacfc\" : \"\u2715 \uc624\ub2f5\")));\n    box.appendChild(head);\n\n    // \uc815\ub2f5 \ud45c\uae30\n    var ansStr;\n    if (q.type === \"choice\") ansStr = (q.answer + 1) + \") \" + q.choices[q.answer];\n    else if (q.type === \"lwb\") ansStr = \"Vmax = \" + q.answer.Vmax + \", Km = \" + q.answer.Km + \" mM\";\n    else ansStr = q.answer + (q.unit ? \" \" + q.unit : \"\");\n    box.appendChild(el(\"div\", \"answerline\", \"\uc815\ub2f5: <b>\" + ansStr + \"<\/b>\"));\n\n    var st = el(\"div\", \"steps\");\n    st.appendChild(el(\"div\", \"steps-h\", \"\ud480\uc774\"));\n    var ol = el(\"ol\", \"steplist\");\n    q.steps.forEach(function (s) { ol.appendChild(el(\"li\", null, s)); });\n    st.appendChild(ol);\n    st.appendChild(el(\"div\", \"formula\", \"\uacf5\uc2dd \u00b7 \" + q.formula));\n    st.appendChild(el(\"div\", \"src\", \"\uadfc\uac70 \u00b7 \" + q.source));\n    box.appendChild(st);\n\n    var next = el(\"button\", \"btn primary wide\", \"\ub2e4\uc74c \u2192\");\n    next.onclick = onNext;\n    box.appendChild(next);\n    setTimeout(function () { box.scrollIntoView({ behavior: \"smooth\", block: \"nearest\" }); }, 20);\n  }\n\n  /* ============================================================ \uacb0\uacfc */\n  function renderResult() {\n    clear();\n    var sess = STATE.session;\n    var total = sess ? sess.queue.length : 0;\n    var score = sess ? sess.score : 0;\n    var wrap = el(\"div\", \"screen\");\n    var card = el(\"div\", \"card center\");\n    card.appendChild(el(\"div\", \"eyebrow\", \"\uc138\uc158 \uc644\ub8cc\"));\n    card.appendChild(el(\"div\", \"score-big\", score + \" / \" + total));\n    card.appendChild(el(\"div\", \"muted\", \"\uc815\ub2f5\ub960 \" + (total ? Math.round(score / total * 100) : 0) + \"% \u00b7 \ucd5c\uace0 \uc5f0\uc18d \" + (STATE.best || 0)));\n\n    // \uc774\ubc88 \uc138\uc158 \uce74\ud14c\uace0\ub9ac \ubd84\ud3ec\n    var byCat = {};\n    if (sess) sess.queue.forEach(function (x) { byCat[x.cat] = (byCat[x.cat] || 0) + 1; });\n    var dist = el(\"div\", \"distrow\");\n    Object.keys(byCat).forEach(function (c) { dist.appendChild(el(\"span\", \"tag \" + c, Core.CAT_LABEL[c] + \" \" + byCat[c])); });\n    card.appendChild(dist);\n\n    var actions = el(\"div\", \"actions\");\n    var again = el(\"button\", \"btn primary\", \"\ub2e4\uc2dc \ud480\uae30\");\n    again.onclick = function () { newSession(); };\n    var home = el(\"button\", \"btn ghost\", \"\ud648\uc73c\ub85c\");\n    home.onclick = function () { STATE.session = null; persist(); renderHome(); };\n    actions.appendChild(again); actions.appendChild(home);\n    card.appendChild(actions);\n    wrap.appendChild(card);\n    app.appendChild(wrap);\n    STATE.session = null; persist();\n  }\n\n  /* ============================================================ \ubd80\ud2b8 */\n  restore().then(function (loaded) {\n    if (loaded) {\n      STATE = Object.assign(defaultState(), loaded);\n      if (!STATE.settings) STATE.settings = defaultState().settings;\n      if (!STATE.settings.cats || !STATE.settings.cats.length) STATE.settings.cats = Core.CATS.slice();\n      ensureStats();\n    }\n    renderHome();\n  });\n})();\n<\/script>\n<\/body>\n<\/html>"</script>
<script type="application/json" id="ann3">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<title>\uc21c\uc11c \ub9de\ucd94\uae30 \u00b7 \ucea0\ubca8 \uc0dd\ubb3c (\ud3b8\uc785\u00b7\ud55c\uc758\ub300)<\/title>\n<style>\n:root{--ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;--bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;--vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;--ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;--sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace}\n*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nhtml,body{margin:0;padding:0}\nbody{font-family:var(--sans);color:var(--ink);background:linear-gradient(160deg,#EFF4F2 0%,var(--bg) 45%,#E4ECE9 100%);background-attachment:fixed;min-height:100vh;line-height:1.5;-webkit-text-size-adjust:100%}\n.wrap{max-width:760px;margin:0 auto;padding:16px 14px 64px}\nheader.top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin:4px 2px 14px}\nheader.top h1{font-size:18px;margin:0;letter-spacing:-.2px}\nheader.top .sub{font-size:12px;color:var(--ink3);margin-top:3px}\n.progress-pill{flex:0 0 auto;background:var(--teal-soft);color:var(--teal-d);border:1px solid #CBE3DF;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:600;white-space:nowrap}\n.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(16,48,46,.04),0 6px 18px rgba(16,48,46,.06);padding:14px;margin-bottom:14px}\n.qhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}\n.badge{font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;border:1px solid transparent}\n.badge.cat{background:var(--vio-soft);color:var(--vio);border-color:#DCD3F2}\n.badge.solved{background:var(--ok-soft);color:var(--ok);border-color:#C7E7D7}\n.qtitle{font-size:17px;font-weight:700;margin:6px 0 2px;letter-spacing:-.2px}\n.qhint{font-size:12.5px;color:var(--ink3);margin:0 0 4px}\n.navrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}\n.navrow .counter{font-size:12px;color:var(--ink3);flex:1;text-align:center}\n.btn{font-family:inherit;cursor:pointer;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14px;font-weight:600;padding:10px 12px;transition:transform .04s ease,background .15s ease,border-color .15s}\n.btn:active{transform:translateY(1px)}\n.btn.ghost{background:#fff}\n.btn.small{padding:7px 11px;font-size:13px;border-radius:10px}\n.btn.teal{background:var(--teal);border-color:var(--teal);color:#fff}\n.btn.teal:active{background:var(--teal-d)}\n.btn.vio{background:var(--vio);border-color:var(--vio);color:#fff}\n.btn:disabled{opacity:.45;cursor:default}\n.iconbtn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0;flex:0 0 auto}\n.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}\n.step{display:flex;align-items:stretch;gap:8px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden;touch-action:none;user-select:none;transition:box-shadow .12s,border-color .12s,opacity .12s}\n.step .grip{flex:0 0 auto;width:34px;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:17px;cursor:grab;background:var(--line2)}\n.step .body{flex:1;padding:11px 4px 11px 2px;display:flex;align-items:center;gap:9px;min-width:0}\n.step .num{flex:0 0 auto;width:23px;height:23px;border-radius:7px;background:var(--teal-soft);color:var(--teal-d);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}\n.step .txt{font-size:14.5px;font-weight:600;letter-spacing:-.2px;word-break:keep-all}\n.step .arrows{flex:0 0 auto;display:flex;flex-direction:column;gap:2px;padding-right:8px}\n.step .arrows button{width:30px;height:21px;line-height:1;border:1px solid var(--line);background:#fff;border-radius:7px;color:var(--ink2);font-size:12px;cursor:pointer;padding:0}\n.step .arrows button:active{background:var(--line2)}\n.step .arrows button:disabled{opacity:.3}\n.step.dragging{box-shadow:0 10px 24px rgba(16,48,46,.18);border-color:var(--teal);opacity:.96}\n.step.ph{outline:2px dashed var(--teal);outline-offset:-2px;opacity:.5}\n.step.good .num{background:var(--ok-soft);color:var(--ok)}\n.step.good{border-color:#BBE3CE}\n.step.bad .num{background:var(--no-soft);color:var(--no)}\n.actions{display:flex;gap:9px;margin-top:14px}\n.actions .btn{flex:1}\n.result{margin-top:13px;border-radius:13px;padding:12px 13px;font-size:13.5px;display:none}\n.result.show{display:block}\n.result.partial{background:var(--amb-soft);border:1px solid #EEDDB8;color:#7a4a00}\n.result.win{background:var(--ok-soft);border:1px solid #C7E7D7;color:#0c5a40}\n.result .score{font-weight:800;font-size:15px;margin-bottom:3px}\n.result .why{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(0,0,0,.12);font-size:13px;line-height:1.55}\n.result .why b{color:inherit}\n.result .trap{margin-top:7px;font-size:12.5px;color:#7a4a00}\n.result .src{margin-top:8px;font-size:11px;color:var(--ink3);font-family:var(--mono)}\ndetails.allbox{margin-top:6px}\ndetails.allbox>summary{cursor:pointer;list-style:none;font-size:13px;font-weight:700;color:var(--teal-d);padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:14px;display:flex;justify-content:space-between;align-items:center}\ndetails.allbox>summary::-webkit-details-marker{display:none}\n.allgrid{display:grid;grid-template-columns:1fr;gap:7px;margin-top:9px}\n.allitem{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer;font-size:13.5px}\n.allitem:active{background:var(--line2)}\n.allitem .dot{width:9px;height:9px;border-radius:50%;background:var(--line);flex:0 0 auto}\n.allitem.solved .dot{background:var(--ok)}\n.allitem.current{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}\n.allitem .ac{font-size:10px;font-weight:800;color:var(--vio);background:var(--vio-soft);border-radius:5px;padding:1px 5px}\n.allitem .nm{flex:1;font-weight:600}\n.foot{text-align:center;font-size:11px;color:var(--ink3);margin-top:18px;line-height:1.6;font-family:var(--mono)}\n.cat-filter{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}\n.chip{flex:0 0 auto;font-size:12px;font-weight:700;border-radius:999px;padding:6px 12px;border:1px solid var(--line);background:#fff;color:var(--ink2);cursor:pointer;white-space:nowrap}\n.chip.on{background:var(--teal);border-color:var(--teal);color:#fff}\n.reset{display:block;margin:14px auto 0;background:none;border:none;color:var(--ink3);font-size:11.5px;text-decoration:underline;cursor:pointer;font-family:inherit}\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n  <header class=\"top\">\n    <div>\n      <h1>\uc21c\uc11c \ub9de\ucd94\uae30 \u2014 \ucea0\ubca8 \uc0dd\ubb3c<\/h1>\n      <div class=\"sub\">\uc11e\uc778 \ub2e8\uacc4\ub97c \ub4dc\ub798\uadf8(\ub610\ub294 \u25b2\u25bc)\ud574\uc11c \uc62c\ubc14\ub978 \uc21c\uc11c\ub85c \u00b7 \ud3b8\uc785\u00b7\ud55c\uc758\ub300<\/div>\n    <\/div>\n    <div class=\"progress-pill\" id=\"progPill\">0 / 0 \uc644\ub8cc<\/div>\n  <\/header>\n\n  <div class=\"cat-filter\" id=\"catFilter\"><\/div>\n\n  <div class=\"card\" id=\"qcard\">\n    <div class=\"qhead\" id=\"qhead\"><\/div>\n    <div class=\"qtitle\" id=\"qtitle\"><\/div>\n    <p class=\"qhint\" id=\"qhint\"><\/p>\n\n    <div class=\"navrow\">\n      <button class=\"btn iconbtn ghost\" id=\"prevBtn\" aria-label=\"\uc774\uc804\">\u2039<\/button>\n      <div class=\"counter\" id=\"counter\"><\/div>\n      <button class=\"btn iconbtn ghost\" id=\"nextBtn\" aria-label=\"\ub2e4\uc74c\">\u203a<\/button>\n      <button class=\"btn small ghost\" id=\"shuffleBtn\">\uc11e\uae30<\/button>\n    <\/div>\n\n    <ul class=\"list\" id=\"list\"><\/ul>\n\n    <div class=\"actions\">\n      <button class=\"btn teal\" id=\"checkBtn\">\ucc44\uc810<\/button>\n      <button class=\"btn ghost\" id=\"revealBtn\">\uc815\ub2f5 \ubcf4\uae30<\/button>\n    <\/div>\n\n    <div class=\"result\" id=\"result\"><\/div>\n  <\/div>\n\n  <details class=\"allbox\">\n    <summary><span>\uc804\uccb4 \uacfc\uc815 \ubaa9\ub85d<\/span><span id=\"allCount\"><\/span><\/summary>\n    <div class=\"allgrid\" id=\"allGrid\"><\/div>\n  <\/details>\n\n  <button class=\"reset\" id=\"resetBtn\">\uc9c4\ud589\ub3c4 \ucd08\uae30\ud654<\/button>\n\n  <div class=\"foot\">\uadfc\uac70: \uc774 \ud504\ub85c\uc81d\ud2b8\uc758 \ucea0\ubca8 \ubcf8\ubb38\u00b7\uae30\ucd9c\uc740\ud589\u00b7\uc9c0\uc5fd\ub178\ud2b8<br>\uc9c4\ud589\ub3c4\ub294 \uc774 \uae30\uae30\uc5d0 \uc800\uc7a5\ub429\ub2c8\ub2e4 (localStorage)<\/div>\n<\/div>\n\n<script>\n/* ===== PURE LOGIC (identical to node-tested logic.js) ===== */\nfunction shuffleOrder(n){\n  var a=[]; for(var i=0;i<n;i++)a.push(i);\n  for(var k=a.length-1;k>0;k--){var j=Math.floor(Math.random()*(k+1));var t=a[k];a[k]=a[j];a[j]=t;}\n  if(n>1){var sorted=true;for(var m=0;m<n;m++){if(a[m]!==m){sorted=false;break;}}if(sorted)return shuffleOrder(n);}\n  return a;\n}\nfunction scoreOrder(order){var c=0;for(var i=0;i<order.length;i++){if(order[i]===i)c++;}return c;}\nfunction isSolved(order){return order.length>0 && scoreOrder(order)===order.length;}\nfunction moveItem(order,from,to){\n  if(to<0||to>=order.length)return order.slice();\n  var a=order.slice();var v=a.splice(from,1)[0];a.splice(to,0,v);return a;\n}\nfunction makeStore(localStorageImpl,windowImpl,KEY){\n  function save(p){\n    var s=JSON.stringify(p);\n    try{localStorageImpl.setItem(KEY,s);}catch(e){}\n    try{if(windowImpl&&windowImpl.storage&&windowImpl.storage.set){windowImpl.storage.set(KEY,s,false);}}catch(e){}\n  }\n  function loadSync(){\n    try{var s=localStorageImpl.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}\n    return null;\n  }\n  return {save:save,loadSync:loadSync};\n}\n\n/* ===== CONTENT (grounded in project files) =====\n   steps[] are in CORRECT order. why = \ud55c \uc904 \uc778\uacfc \uc0ac\uc2ac. trap = grounded \ud568\uc815(\uc120\ud0dd). src = \uadfc\uac70 \ud45c\uc2dc. */\nvar PROCESSES=[\n {id:\"resp_overview\",cat:\"\ub300\uc0ac\",title:\"\uc138\ud3ec\ud638\ud761 \uc804\uccb4 \ud750\ub984\",hint:\"\ud3ec\ub3c4\ub2f9\uc774 ATP\uac00 \ub418\uae30\uae4c\uc9c0 4\ub2e8\uacc4\",\n  steps:[\"\ud574\ub2f9\uacfc\uc815 (\uc138\ud3ec\uc9c8)\",\"\ud53c\ub8e8\ube0c\uc0b0 \uc0b0\ud654 (\uc544\uc138\ud2f8-CoA \ud615\uc131)\",\"\uc2dc\ud2b8\ub974\uc0b0 \ud68c\ub85c (TCA)\",\"\uc0b0\ud654\uc801 \uc778\uc0b0\ud654 (\uc804\uc790\uc804\ub2ec\u00b7\ud654\ud559\uc0bc\ud22c)\"],\n  why:\"\ud3ec\ub3c4\ub2f9\uc758 \ud0c4\uc18c\ub97c \ub2e8\uacc4\uc801\uc73c\ub85c \uc0b0\ud654\ud574 <b>NADH\u00b7FADH\u2082\uc5d0 \uc804\uc790\ub97c \ubaa8\uc740 \ub4a4<\/b>, \ub9c8\uc9c0\ub9c9\uc5d0 \uadf8 \uc804\uc790\ub85c ATP\ub97c \ud55c\uaebc\ubc88\uc5d0 \ud569\uc131\ud558\uae30 \ub54c\ubb38.\",\n  src:\"\ucea0\ubca8 10\uc7a5 (10.1 \ub2e8\uacc4 \ubbf8\ub9ac\ubcf4\uae30)\"},\n\n {id:\"glycolysis\",cat:\"\ub300\uc0ac\",title:\"\ud574\ub2f9\uacfc\uc815 \uc8fc\uc694 \uc911\uac04\uc0b0\ubb3c\",hint:\"6\ud0c4\ub2f9 \u2192 2 \ud53c\ub8e8\ube0c\uc0b0\",\n  steps:[\"\ud3ec\ub3c4\ub2f9\",\"\ud3ec\ub3c4\ub2f9 6-\uc778\uc0b0 (G6P)\",\"\uacfc\ub2f9 1,6-\uc774\uc778\uc0b0 (F1,6BP)\",\"\uae00\ub9ac\uc138\ub974\uc54c\ub370\ud788\ub4dc 3-\uc778\uc0b0 (G3P)\",\"1,3-\ube44\uc2a4\ud3ec\uc2a4\ud3ec\uae00\ub9ac\uc138\ub974\uc0b0 (1,3-BPG)\",\"\ud53c\ub8e8\ube0c\uc0b0\"],\n  why:\"\uc55e\uc5d0\uc11c ATP\ub97c \uc368\uc11c 6\ud0c4\ub2f9\uc744 \uc778\uc0b0\ud654\u00b7\ubc18\uc73c\ub85c \ucabc\uac1c\uace0(\ud22c\uc790\uae30), \ub4a4\uc5d0\uc11c \uc0b0\ud654\ud558\uba70 \uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654\ub85c ATP\ub97c \ud68c\uc218(\ud68c\uc218\uae30)\ud558\ub294 \uc21c\uc11c.\",\n  trap:\"G3P\u21921,3-BPG\uc5d0\uc11c ATP\uac00 \uc544\ub2c8\ub77c <b>\ubb34\uae30\uc778\uc0b0<\/b>\uc774 \ubd99\ub294\ub2e4(\uc720\uc77c\ud55c NADH \uc0dd\uc131 \ub2e8\uacc4).\",\n  src:\"\ucea0\ubca8 10.2 \ud574\ub2f9\uacfc\uc815 \ubcf8\ubb38\"},\n\n {id:\"tca\",cat:\"\ub300\uc0ac\",title:\"\uc2dc\ud2b8\ub974\uc0b0 \ud68c\ub85c (TCA)\",hint:\"\uc544\uc138\ud2f8-CoA\uac00 \ub4e4\uc5b4\uc640 \ud68c\ub85c\ub97c \ud55c \ubc14\ud034\",\n  steps:[\"\uc625\uc0b4\uc544\uc138\ud2b8\uc0b0\",\"\uc2dc\ud2b8\ub974\uc0b0\",\"\uc774\uc18c\uc2dc\ud2b8\ub974\uc0b0\",\"\u03b1-\ucf00\ud1a0\uae00\ub8e8\ud0c0\ub974\uc0b0\",\"\uc219\uc2dc\ub2d0-CoA\",\"\uc219\uc2e0\uc0b0\",\"\ud478\ub9c8\ub974\uc0b0\",\"\ub9d0\uc0b0\"],\n  why:\"\uc544\uc138\ud2f8\uae30\ub97c \ubc1b\uc544 \ub450 \ubc88 \ud0c8\ud0c4\uc0b0(CO\u2082 \ubc29\ucd9c)\ud558\uba70 NADH\ub97c \ubaa8\uc73c\uace0, \ub2e4\uc2dc \uc625\uc0b4\uc544\uc138\ud2b8\uc0b0\uc73c\ub85c <b>\uc7ac\uc0dd\ub418\uc5b4 \ud68c\ub85c\uac00 \ub2eb\ud788\uae30<\/b> \ub54c\ubb38.\",\n  trap:\"\uc219\uc2dc\ub2d0-CoA\u2192\uc219\uc2e0\uc0b0\uc774 \uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654(ATP/GTP), \uc219\uc2e0\uc0b0\u2192\ud478\ub9c8\ub974\uc0b0\uc774 \uc720\uc77c\ud55c FADH\u2082 \uc0dd\uc131 \ub2e8\uacc4.\",\n  src:\"\ucea0\ubca8 10.3 \uc2dc\ud2b8\ub974\uc0b0 \ud68c\ub85c \ub2e8\uacc4\ud45c\"},\n\n {id:\"light_rx\",cat:\"\ub300\uc0ac\",title:\"\uad11\ud569\uc131 \uba85\ubc18\uc751 \uc120\ud615 \uc804\uc790\uc804\ub2ec\",hint:\"\ubb3c\uc5d0\uc11c \ubf51\uc740 \uc804\uc790\uac00 NADPH\ub85c\",\n  steps:[\"\uad11\uacc4 II (P680) \ube5b \ud761\uc218\",\"\ubb3c\uc758 \uad11\ubd84\ud574 (O\u2082 \ubc29\ucd9c)\",\"\ud50c\ub77c\uc2a4\ud1a0\ud034\ub17c (Pq)\",\"\uc0ac\uc774\ud1a0\ud06c\ub86c \ubcf5\ud569\uccb4\",\"\ud50c\ub77c\uc2a4\ud1a0\uc2dc\uc544\ub2cc (Pc)\",\"\uad11\uacc4 I (P700)\",\"\ud398\ub808\ub3c5\uc2e0 (Fd)\",\"NADP\u207a \u2192 NADPH\"],\n  why:\"\ubb3c\uc5d0\uc11c \ube80 \ub0ae\uc740 \uc5d0\ub108\uc9c0 \uc804\uc790\ub97c \ube5b\uc73c\ub85c <b>\ub450 \ubc88 \ub04c\uc5b4\uc62c\ub824<\/b>, \uc911\uac04 \uc0ac\uc2ac\uc5d0\uc11c \uc591\uc131\uc790 \uae30\uc6b8\uae30(ATP)\ub97c \ub9cc\ub4e4\uace0 \ucd5c\uc885\uc801\uc73c\ub85c NADPH\uc5d0 \uc800\uc7a5\ud558\uae30 \ub54c\ubb38.\",\n  trap:\"PSI=P700, PSII=P680\uc744 \uc11c\ub85c \ubc14\uafd4\uce58\uae30\ud558\ub294 \ubcf4\uae30\uac00 \ub2e8\uace8 \ud568\uc815(\uc2e4\uc81c \uc791\ub3d9\uc740 PSII\uac00 \uba3c\uc800).\",\n  src:\"\ucea0\ubca8 11\uc7a5 \uc120\ud615 \uc804\uc790 \ud750\ub984\"},\n\n {id:\"calvin\",cat:\"\ub300\uc0ac\",title:\"\uce98\ube48 \ud68c\ub85c 3\ub2e8\uacc4\",hint:\"CO\u2082\ub97c \ub2f9\uc73c\ub85c \ud658\uc6d0\",\n  steps:[\"\ud0c4\uc18c \uace0\uc815 (RuBP + CO\u2082 \u2192 3-PGA)\",\"\ud658\uc6d0 (ATP\u00b7NADPH \u2192 G3P)\",\"RuBP \uc7ac\uc0dd\uc131\"],\n  why:\"CO\u2082\ub97c \uba3c\uc800 \uace0\uc815\ud55c \ub4a4 \uba85\ubc18\uc751 \uc0b0\ubb3c(ATP\u00b7NADPH)\ub85c \ud658\uc6d0\ud574 \ub2f9\uc744 \ub9cc\ub4e4\uace0, \ud68c\ub85c\uac00 \uacc4\uc18d \ub3cc\ub3c4\ub85d <b>\uc218\uc6a9\uccb4(RuBP)\ub97c \ub418\uc0b4\ub9ac\uae30<\/b> \ub54c\ubb38.\",\n  trap:\"CO\u2082 \uace0\uc815 \uc790\uccb4\uc5d0\ub294 ATP\uac00 \uc4f0\uc774\uc9c0 \uc54a\ub294\ub2e4(\ud658\uc6d0\u00b7\uc7ac\uc0dd \ub2e8\uacc4\uc5d0\uc11c ATP \uc0ac\uc6a9).\",\n  src:\"\ucea0\ubca8 11\uc7a5 \uce98\ube48 \ud68c\ub85c\"},\n\n {id:\"transcription\",cat:\"\ubd84\uc790\",title:\"\uc804\uc0ac + RNA \uac00\uacf5 (\uc9c4\ud575)\",hint:\"DNA \u2192 \uc131\uc219 mRNA\",\n  steps:[\"\uc804\uc0ac\uc778\uc790\u00b7RNA \uc911\ud569\ud6a8\uc18c II \ud504\ub85c\ubaa8\ud130 \uacb0\ud569 (\uac1c\uc2dc\ubcf5\ud569\uccb4)\",\"\uc2e0\uc7a5 (5'\u21923' RNA \ud569\uc131)\",\"\uc885\uacb0\",\"5' \ucea1 \ud615\uc131\",\"\uc778\ud2b8\ub860 \uc2a4\ud50c\ub77c\uc774\uc2f1\",\"3' \ud3f4\ub9ac-A \uaf2c\ub9ac\"],\n  why:\"DNA\ub97c \ud480\uc5b4 mRNA\ub97c \ud569\uc131\ud55c \ub4a4, \ud575\uc744 \ube60\uc838\ub098\uac00 <b>\ubd84\ud574\ub97c \uacac\ub514\ub3c4\ub85d \uc591 \ub05d\uc744 \uac00\uacf5<\/b>\ud558\uace0 \uc778\ud2b8\ub860\uc744 \uc81c\uac70\ud574 \uc131\uc219 mRNA\ub97c \ub9cc\ub4e4\uae30 \ub54c\ubb38.\",\n  trap:\"\uc138\uade0\uc740 \ucea1\u00b7\ud14c\uc77c\ub9c1\u00b7\uc2a4\ud50c\ub77c\uc774\uc2f1\uc774 \uc5c6\uc5b4 \uc804\uc0ac\ubb3c\uc774 \uace7\ubc14\ub85c mRNA\ub85c \uc4f0\uc778\ub2e4.\",\n  src:\"\ucea0\ubca8 17.2~17.3 \uc804\uc0ac\u00b7\uac00\uacf5\"},\n\n {id:\"translation\",cat:\"\ubd84\uc790\",title:\"\ubc88\uc5ed (translation)\",hint:\"\ub9ac\ubcf4\uc19c A\u00b7P\u00b7E \uc790\ub9ac\",\n  steps:[\"\uc791\uc740 \uc18c\ub2e8\uc704\uccb4 + \uac1c\uc2dc tRNA + mRNA \uacb0\ud569\",\"\ud070 \uc18c\ub2e8\uc704\uccb4 \uacb0\ud569 (\uac1c\uc2dc\ubcf5\ud569\uccb4)\",\"\ucf54\ub3c8 \uc778\uc2dd (A\uc790\ub9ac)\",\"\ud3a9\ud2f0\ub4dc \uacb0\ud569 \ud615\uc131 (P\uc790\ub9ac)\",\"\uc804\uc88c (translocation)\",\"\ubc29\ucd9c\uc778\uc790(RF)\uc5d0 \uc758\ud55c \uc885\uacb0\"],\n  why:\"\uac1c\uc2dc tRNA\ub85c \ud2c0(AUG)\uc744 \ub9de\ucd98 \ub4a4 <b>A\u2192P\u2192\uc804\uc88c\ub97c \ubc18\ubcf5<\/b>\ud574 \uc0ac\uc2ac\uc744 \ub298\ub9ac\uace0, \uc885\uacb0\ucf54\ub3c8\uc5d0\uc11c \ubc29\ucd9c\uc778\uc790\uac00 \uc0ac\uc2ac\uc744 \ub04a\uae30 \ub54c\ubb38.\",\n  trap:\"\ud3a9\ud2f0\ub4dc \uacb0\ud569\uc740 P-A \uc790\ub9ac(\ud3a9\ud2f0\ub51c \uc804\uc774\ud6a8\uc18c)\uc5d0\uc11c \u2014 E\uc790\ub9ac\uac00 \uc544\ub2c8\ub2e4. \uc5f0\uc7a5 \uc5d0\ub108\uc9c0\ub294 GTP(ATP \uc544\ub2d8).\",\n  src:\"\ucea0\ubca8 17.4 \ud3f4\ub9ac\ud3a9\ud0c0\uc774\ub4dc \ud569\uc131\"},\n\n {id:\"secretion\",cat:\"\uc138\ud3ec\",title:\"\ubd84\ube44 \ub2e8\ubc31\uc9c8\uc758 \uc774\ub3d9 \uacbd\ub85c\",hint:\"\uc2e0\ud638\ud3a9\ud0c0\uc774\ub4dc\ub85c \uc18c\ud3ec\uccb4 \uc9c4\uc785\",\n  steps:[\"\ub9ac\ubcf4\uc19c\uc5d0\uc11c \uc2e0\ud638\ud3a9\ud0c0\uc774\ub4dc \ud569\uc131\",\"\uc2e0\ud638\uc778\uc2dd\uc785\uc790(SRP) \uacb0\ud569\",\"\uc870\uba74\uc18c\ud3ec\uccb4(RER) \ub9c9 \uc218\uc6a9\uccb4 \ub3c4\ud0b9\",\"\uc18c\ud3ec\uccb4 \ub0b4\uac15 \uc9c4\uc785\u00b7\uac00\uacf5\",\"\uace8\uc9c0\uccb4 \uc218\uc1a1\u00b7\ubcc0\ud615\",\"\ubd84\ube44 \uc18c\ub0ad \u2192 \uc138\ud3ec\uc678 \ubc30\ucd9c\"],\n  why:\"\uc2e0\ud638\uc11c\uc5f4\uc774 \ub2e8\ubc31\uc9c8\uc744 \uc18c\ud3ec\uccb4\ub85c \ub04c\uc5b4\ub4e4\uc774\uace0, <b>\uc18c\ud3ec\uccb4\u2192\uace8\uc9c0\uccb4\u2192\uc18c\ub0ad<\/b>\uc758 \ub0b4\ub9c9\uacc4 \ud750\ub984\uc744 \ub530\ub77c \uc138\ud3ec \ubc16\uc73c\ub85c \ubcf4\ub0b4\uae30 \ub54c\ubb38.\",\n  src:\"\ucea0\ubca8 17.4 \ud3f4\ub9ac\ud3a9\ud0c0\uc774\ub4dc \uc774\ub3d9 / \uc2e0\ud638\ud3a9\ud0c0\uc774\ub4dc\u00b7SRP\"},\n\n {id:\"clotting\",cat:\"\uc0dd\ub9ac\",title:\"\ud608\uc561 \uc751\uace0 \uce90\uc2a4\ucf00\uc774\ub4dc\",hint:\"\uc591\uc131 \ub418\uba39\uc784\uc73c\ub85c \ud608\ubcd1 \ud615\uc131\",\n  steps:[\"\ud608\uad00 \uc190\uc0c1\u00b7\ucf5c\ub77c\uac90 \ub178\ucd9c\",\"\ud608\uc18c\ud310 \ubd80\ucc29\u00b7\ud65c\uc131\ud654\",\"\ud504\ub85c\ud2b8\ub86c\ube48 \u2192 \ud2b8\ub86c\ube48 (Ca\u00b2\u207a\u00b7\ube44\ud0c0\ubbfc K)\",\"\ud53c\ube0c\ub9ac\ub178\uac90 \u2192 \ud53c\ube0c\ub9b0\",\"\ud53c\ube0c\ub9b0 \uadf8\ubb3c\u00b7\ud608\ubcd1 \ud615\uc131\"],\n  why:\"\uc190\uc0c1 \uc2e0\ud638\uac00 \ud608\uc18c\ud310\uc744 \ubaa8\uc73c\uace0, <b>\ud2b8\ub86c\ube48\uc774 \ud53c\ube0c\ub9ac\ub178\uac90\uc744 \uc2e4 \ubaa8\uc591 \ud53c\ube0c\ub9b0<\/b>\uc73c\ub85c \ubc14\uafd4 \ud608\uad6c\ub97c \uc5bd\uc5b4 \ub9c8\uac1c\ub97c \ub9cc\ub4e4\uae30 \ub54c\ubb38(\uc591\uc131 \ub418\uba39\uc784\uc73c\ub85c \uc99d\ud3ed).\",\n  trap:\"\ud2b8\ub86c\ube48\uc774 \ud53c\ube0c\ub9ac\ub178\uac90\uc744 \ud53c\ube0c\ub9b0\uc73c\ub85c \u2014 \ubc29\ud5a5\uc744 \uac70\uafb8\ub85c \uc801\uc740 \ubcf4\uae30 \uc8fc\uc758. \ube44\ud0c0\ubbfc K\ub294 \uc751\uace0\uc778\uc790 2\u00b77\u00b79\u00b710 \ud569\uc131 \uc870\ud6a8\uc18c.\",\n  src:\"\ucea0\ubca8 43\uc7a5 \ud608\uc561 \uc751\uace0 / \uc9c0\uc5fd\ub178\ud2b8\"},\n\n {id:\"action_potential\",cat:\"\uc0dd\ub9ac\",title:\"\ud65c\ub3d9\uc804\uc704\",hint:\"\uc2e4\ubb34\uc728, \u221270mV\uc5d0\uc11c \ucd9c\ubc1c\",\n  steps:[\"\ud734\uc9c0\uc804\uc704 (\u221270mV)\",\"\uc5ed\uce58 \uc790\uadf9 \ub3c4\ub2ec\",\"\ud0c8\ubd84\uadf9 (Na\u207a \uc720\uc785)\",\"\uc815\uc810 (+30mV)\",\"\uc7ac\ubd84\uadf9 (K\u207a \uc720\ucd9c)\",\"\uacfc\ubd84\uadf9\",\"\ud734\uc9c0\uc804\uc704 \ubcf5\uadc0\"],\n  why:\"\uc5ed\uce58\uc5d0\uc11c <b>Na\u207a \ucc44\ub110\uc774 \uc5f4\ub824 \uc548\ucabd\uc774 +<\/b>\ub85c \ubc14\ub00c\uace0, \uace7 \ub2eb\ud788\uba70 K\u207a\uc774 \ub098\uac00 \ub2e4\uc2dc \u2212\ub85c \ubcf5\uad6c\ub418\ub294 \uc2e4\ubb34\uc728\uc801 \ud30c\ub3d9\uc774\uae30 \ub54c\ubb38.\",\n  trap:\"\uc0c1\uc2b9\uae30(\ud0c8\ubd84\uadf9)\ub294 Na\u207a \ud22c\uacfc\ub3c4 \uc99d\uac00, \uc7ac\ubd84\uadf9\uc740 K\u207a \uc720\ucd9c \u2014 \ub458\uc744 \ubc14\uafb8\uba74 \uc624\ub2f5.\",\n  src:\"\ucea0\ubca8 \uc2e0\uacbd\uacc4 / \uae30\ucd9c \ud65c\ub3d9\uc804\uc704\"},\n\n {id:\"synapse\",cat:\"\uc0dd\ub9ac\",title:\"\ud654\ud559\uc801 \uc2dc\ub0c5\uc2a4 \uc2e0\uacbd\uc804\ub2ec\",hint:\"\uc804\uae30 \u2192 \ud654\ud559 \u2192 \uc804\uae30\",\n  steps:[\"\ud65c\ub3d9\uc804\uc704 \ucd95\uc0ad\ub9d0\ub2e8 \ub3c4\ub2ec\",\"\uc804\uc555\uc758\uc874\uc131 Ca\u00b2\u207a \ucc44\ub110 \uc5f4\ub9bc\",\"\uc2dc\ub0c5\uc2a4 \uc18c\ud3ec \uc735\ud569\",\"\uc2e0\uacbd\uc804\ub2ec\ubb3c\uc9c8 \ubc29\ucd9c\",\"\uc2dc\ub0c5\uc2a4\ud6c4\ub9c9 \uc218\uc6a9\uccb4 \uacb0\ud569\",\"\uc774\uc628 \ucc44\ub110 \uc5f4\ub9bc (EPSP/IPSP)\"],\n  why:\"\uc804\uae30 \uc2e0\ud638\uac00 <b>Ca\u00b2\u207a \uc720\uc785\uc73c\ub85c \uc804\ud658<\/b>\ub418\uc5b4 \uc18c\ud3ec\ub97c \ud130\ub728\ub9ac\uace0, \ud654\ud559\ubb3c\uc9c8\uc774 \ub2e4\uc74c \ub274\ub7f0\uc758 \ub9c9\uc804\uc704\ub97c \ubc14\uafb8\uae30 \ub54c\ubb38.\",\n  src:\"\ucea0\ubca8 \uc2e0\uacbd\uacc4 / \uae30\ucd9c \uc2dc\ub0c5\uc2a4\"},\n\n {id:\"raas\",cat:\"\uc0dd\ub9ac\",title:\"\ub808\ub2cc-\uc548\uc9c0\uc624\ud150\uc2e0-\uc54c\ub3c4\uc2a4\ud14c\ub860\uacc4 (RAAS)\",hint:\"\ud608\uc555 \uc800\ud558 \u2192 \ud608\uc555 \ud68c\ubcf5\",\n  steps:[\"\ud608\uc555 \uc800\ud558\",\"\uc2e0\uc7a5 \uc0ac\uad6c\uccb4\uc606\uc7a5\uce58(JGA) \ub808\ub2cc \ubd84\ube44\",\"\uc548\uc9c0\uc624\ud150\uc2dc\ub178\uac90 \u2192 \uc548\uc9c0\uc624\ud150\uc2e0 I\",\"ACE(\ud3d0) \u2192 \uc548\uc9c0\uc624\ud150\uc2e0 II\",\"\ubd80\uc2e0\ud53c\uc9c8 \uc54c\ub3c4\uc2a4\ud14c\ub860 \ubd84\ube44\",\"Na\u207a\u00b7\ubb3c \uc7ac\ud761\uc218 \u2192 \ud608\uc555 \uc0c1\uc2b9\"],\n  why:\"\ud608\uc555\uc774 \ub5a8\uc5b4\uc9c0\uba74 \ub808\ub2cc\uc774 \ud6a8\uc18c \uc5f0\uc1c4\ub97c \ucf1c\uace0, <b>\uc548\uc9c0\uc624\ud150\uc2e0 II\u00b7\uc54c\ub3c4\uc2a4\ud14c\ub860\uc774 \ud608\uad00 \uc218\ucd95\u00b7\uc218\ubd84 \ubcf4\uc874<\/b>\uc73c\ub85c \ud608\uc555\uc744 \ub418\ub3cc\ub9ac\uae30 \ub54c\ubb38.\",\n  trap:\"\uc548\uc9c0\uc624\ud150\uc2e0 I\u2192II \uc804\ud658\uc744 '\uc911\ud569\ud6a8\uc18c'\ub85c \uc801\uc740 \ubcf4\uae30\ub294 \uc624\ub2f5 \u2014 \uc804\ud658\ud6a8\uc18c(ACE).\",\n  src:\"\uae30\ucd9c(\uc804\ub0a8\ub300 730) / \ucea0\ubca8 44\uc7a5\"},\n\n {id:\"thyroid_feedback\",cat:\"\uc0dd\ub9ac\",title:\"\uac11\uc0c1\uc120 \ud638\ub974\ubaac \uc74c\uc131 \ud53c\ub4dc\ubc31\",hint:\"\uc2dc\uc0c1\ud558\ubd80\u2013\ub1cc\ud558\uc218\uccb4\u2013\uac11\uc0c1\uc120 \ucd95\",\n  steps:[\"\ud608\uc911 \uac11\uc0c1\uc120\ud638\ub974\ubaac(T\u2083\u00b7T\u2084) \uc800\ud558\",\"\uc2dc\uc0c1\ud558\ubd80 TRH \ubd84\ube44\",\"\ub1cc\ud558\uc218\uccb4 \uc804\uc5fd TSH \ubd84\ube44\",\"\uac11\uc0c1\uc120 T\u2083\u00b7T\u2084 \ubd84\ube44\",\"\ub300\uc0ac\uc728 \uc99d\uac00\",\"T\u2083\u00b7T\u2084 \uc0c1\uc2b9 \u2192 TRH\u00b7TSH \uc5b5\uc81c\"],\n  why:\"\ud638\ub974\ubaac\uc774 \ubd80\uc871\ud558\uba74 \uc704 \ub2e8\uacc4\uac00 \ucc28\ub840\ub85c \uc790\uadf9\ubc1b\uace0, \ucda9\ubd84\ud574\uc9c0\uba74 <b>\uadf8 \ud638\ub974\ubaac\uc774 \uc0c1\uc704 \ub2e8\uacc4\ub97c \uc5b5\ub20c\ub7ec<\/b> \uc77c\uc815 \uc218\uc900\uc744 \uc720\uc9c0\ud558\uae30 \ub54c\ubb38(\uc74c\uc131 \ud53c\ub4dc\ubc31).\",\n  trap:\"TSH\ub294 \ub1cc\ud558\uc218\uccb4 '\uc804\uc5fd' \ubd84\ube44. \uc694\uc624\ub4dc \ubd80\uc871 \uc2dc \uc74c\uc131\ud53c\ub4dc\ubc31\uc774 \ud480\ub824 TSH\u2191 \u2192 \uac11\uc0c1\uc120\uc885.\",\n  src:\"\ucea0\ubca8 41\uc7a5 \uac11\uc0c1\uc0d8 \uc870\uc808\"},\n\n {id:\"development\",cat:\"\ubc1c\uc0dd\",title:\"\ub3d9\ubb3c \ubc1c\uc0dd \ub2e8\uacc4\",hint:\"\uc218\uc815\ub780\uc5d0\uc11c \uae30\uad00\uae4c\uc9c0\",\n  steps:[\"\uc218\uc815\",\"\ub09c\ud560 (cleavage)\",\"\ud3ec\ubc30 (blastula)\",\"\ub0ad\ubc30 (gastrula)\",\"\uc2e0\uacbd\ubc30 (\uc2e0\uacbd\uad00 \ud615\uc131)\",\"\uae30\uad00\ud615\uc131\"],\n  why:\"\uc218\uc815\ub780\uc774 \ubd84\uc5f4\ub85c \uc138\ud3ec \uc218\ub97c \ub298\ub824 \ube48 \uacf5(\ud3ec\ubc30)\uc744 \ub9cc\ub4e4\uace0, <b>\ud568\uc785\uc73c\ub85c 3\ubc30\uc5fd(\ub0ad\ubc30)\uc744 \ud615\uc131<\/b>\ud55c \ub4a4 \uc2e0\uacbd\uad00\u00b7\uae30\uad00\uc744 \uc9d3\uae30 \ub54c\ubb38.\",\n  trap:\"'\uc218\uc815\u2192\ud3ec\ubc30\u2192\ub09c\ud560'\ucc98\ub7fc \ub09c\ud560\u00b7\ud3ec\ubc30\ub97c \ub4a4\ubc14\uafbc \ubcf4\uae30\uac00 \ub2e8\uace8 \ud568\uc815.\",\n  src:\"\uae30\ucd9c(2003) \ubc1c\uc0dd \uc21c\uc11c\"},\n\n {id:\"mammal_dev\",cat:\"\ubc1c\uc0dd\",title:\"\ud3ec\uc720\ub958 \ucd08\uae30 \ubc1c\uc0dd\",hint:\"\uc0c1\uc2e4\ubc30 \u2192 \ubc30\ubc18\ud3ec \u2192 \ub0ad\ubc30\",\n  steps:[\"\uc218\uc815\ub780 (\uc138\ud3ec\uae30)\",\"\uc0c1\uc2e4\uae30 (morula)\",\"\ud3ec\ubc30\uae30 (blastocyst)\",\"\ub0ad\ubc30\uae30 (gastrula)\"],\n  why:\"\ud3ec\uc720\ub958\ub294 \ub09c\ud560\ub85c \uc624\ub514 \ubaa8\uc591 <b>\uc0c1\uc2e4\ubc30\ub97c \ub9cc\ub4e0 \ub4a4 \uc18d\uc774 \ube48 \ubc30\ubc18\ud3ec<\/b>(\ud3ec\ubc30\uae30)\ub97c \uac70\uccd0 \ub0ad\ubc30\ub97c \ud615\uc131\ud558\uae30 \ub54c\ubb38.\",\n  src:\"\uae30\ucd9c(\uc870\uc120\ub300) \ud3ec\uc720\ub958 \ucd08\uae30 \ubc1c\uc0dd\"},\n\n {id:\"heart_conduction\",cat:\"\uc0dd\ub9ac\",title:\"\uc2ec\uc7a5 \ud765\ubd84 \uc804\ub3c4\uacc4\",hint:\"\ubc15\ub3d9\uc6d0\uc5d0\uc11c \uc2ec\uadfc\uae4c\uc9c0\",\n  steps:[\"\ub3d9\ubc29\uacb0\uc808 (SA node, \ubc15\ub3d9\uc6d0)\",\"\ubc29\uc2e4\uacb0\uc808 (AV node)\",\"\ud788\uc2a4\uc18d (His)\",\"\ud478\ub974\ud0a4\ub124 \uc12c\uc720\",\"\uc2ec\uadfc \uc218\ucd95\"],\n  why:\"\ubc15\ub3d9\uc6d0\uc758 \uc804\uae30 \uc2e0\ud638\uac00 <b>\ubc29\uc2e4\uacb0\uc808\uc5d0\uc11c \uc7a0\uc2dc \uc9c0\uc5f0<\/b>\ub41c \ub4a4 \ube60\ub978 \uc804\ub3c4\ub85c\ub97c \ub530\ub77c \uc2ec\uc2e4 \uc804\uccb4\ub85c \ud37c\uc838 \ub3d9\uc2dc\uc5d0 \uc218\ucd95\uc2dc\ud0a4\uae30 \ub54c\ubb38.\",\n  src:\"\uae30\ucd9c(2001) \uc2ec\uc7a5 \ubc15\ub3d9 \uc21c\uc11c\"},\n\n {id:\"pcr\",cat:\"\uc2e4\ud5d8\",title:\"PCR \ud55c \uc8fc\uae30\",hint:\"\uc628\ub3c4 \uc21c\ud658 3\ub2e8\uacc4\",\n  steps:[\"\ubcc0\uc131 (denaturation, 94\u00b0C)\",\"\ud480\ub9bc (annealing, ~55\u00b0C, \ud504\ub77c\uc774\uba38 \uacb0\ud569)\",\"\uc2e0\uc7a5 (extension, 72\u00b0C, Taq \uc911\ud569)\"],\n  why:\"\uc774\uc911\uac00\ub2e5\uc744 \uc5f4\ub85c \ub5bc\uc5b4\ub0b8 \ub4a4 \ud504\ub77c\uc774\uba38\ub97c \ubd99\uc774\uace0 <b>\ub0b4\uc5f4\uc131 Taq\ub85c \ud569\uc131<\/b>\ud558\ub294 \uc628\ub3c4 \uc21c\ud658\uc774\uae30 \ub54c\ubb38.\",\n  trap:\"Taq\ub294 \uace0\uc628 \ubcc0\uc131\uc5d0\uc11c\ub3c4 \ud65c\uc131 \uc720\uc9c0(\ub0b4\uc5f4\uc131). \ub9ac\uac00\uc544\uc81c\ub294 PCR\uc5d0 \ubd88\ud544\uc694.\",\n  src:\"\uae30\ucd9c PCR \uc21c\uc11c / \ub3d9\uad6d\ub300\"},\n\n {id:\"cdna\",cat:\"\uc2e4\ud5d8\",title:\"cDNA \ud569\uc131 \uacfc\uc815\",hint:\"mRNA \u2192 \uc774\uc911\uac00\ub2e5 DNA\",\n  steps:[\"\uc870\uc9c1\uc5d0\uc11c mRNA \ubd84\ub9ac\",\"\ud3f4\ub9ac-T \ud504\ub77c\uc774\uba38 \uc7a1\uc885\ud654\",\"\uc5ed\uc804\uc0ac\ud6a8\uc18c\ub85c \uccab \uac00\ub2e5 cDNA \ud569\uc131\",\"RNase H\ub85c mRNA \uc81c\uac70\",\"DNA \uc911\ud569\ud6a8\uc18c\ub85c \ub458\uc9f8 \uac00\ub2e5 \ud569\uc131\"],\n  why:\"mRNA\ub97c \uc8fc\ud615\uc73c\ub85c \uc5ed\uc804\uc0ac\ud574 <b>\uc778\ud2b8\ub860 \uc5c6\ub294 DNA<\/b>\ub97c \ub9cc\ub4e0 \ub4a4, \uc8fc\ud615 RNA\ub97c \uc5c6\uc560\uace0 \uc774\uc911\uac00\ub2e5\uc73c\ub85c \uc644\uc131\ud558\uae30 \ub54c\ubb38.\",\n  trap:\"\uccab \uac00\ub2e5\uc740 DNA \uc911\ud569\ud6a8\uc18c\uac00 \uc544\ub2c8\ub77c '\uc5ed\uc804\uc0ac\ud6a8\uc18c'\ub85c \ub9cc\ub4e0\ub2e4(\uae30\ucd9c \ud568\uc815).\",\n  src:\"\uae30\ucd9c(2012) cDNA \ub2e8\uacc4\"},\n\n {id:\"cortex_reading\",cat:\"\uc0dd\ub9ac\",title:\"\ub2e8\uc5b4\ub97c \uc18c\ub9ac\ub0b4\uc5b4 \uc77d\uc744 \ub54c \ub300\ub1cc \ucc98\ub9ac\",hint:\"\ubcf4\uace0\u2192\uc774\ud574\u2192\uacc4\ud68d\u2192\ubc1c\ud654\",\n  steps:[\"\uc2dc\uac01\ud53c\uc9c8\",\"\ubca0\ub974\ub2c8\ucf00 \uc601\uc5ed (\uc774\ud574)\",\"\ube0c\ub85c\uce74 \uc601\uc5ed (\ub9d0 \uacc4\ud68d)\",\"\uc77c\ucc28 \uc6b4\ub3d9\ub839 (\ubc1c\ud654)\"],\n  why:\"\uae00\uc790\ub97c \ubcf4\uace0(\uc2dc\uac01) \u2192 <b>\ub73b\uc744 \uc774\ud574(\ubca0\ub974\ub2c8\ucf00)<\/b> \u2192 \ub9d0\ud560 \ub0b4\uc6a9\uc744 \uad6c\uc131(\ube0c\ub85c\uce74) \u2192 \uc2e4\uc81c \ubc1c\uc74c(\uc6b4\ub3d9\ub839)\ud558\ub294 \uc21c\uc11c.\",\n  src:\"\uae30\ucd9c(\uc601\ub0a8\ub300) \ub300\ub1cc \ud53c\uc9c8 \uc791\ub3d9 \uc21c\uc11c\"},\n\n {id:\"gpcr\",cat:\"\uc138\ud3ec\",title:\"GPCR \uc2e0\ud638\uc804\ub2ec (\uc5d0\ud53c\ub124\ud504\ub9b0\u2192\uae00\ub9ac\ucf54\uac90 \ubd84\ud574)\",hint:\"1\ucc28 \uc804\ub2ec\uc790 \u2192 2\ucc28 \uc804\ub2ec\uc790 \uc99d\ud3ed\",\n  steps:[\"\uc5d0\ud53c\ub124\ud504\ub9b0 (1\ucc28 \uc804\ub2ec\uc790)\",\"GPCR \uacb0\ud569\",\"G \ub2e8\ubc31\uc9c8 \ud65c\uc131\ud654\",\"\uc544\ub370\ub2d0\uc0b0 \uace0\ub9ac\ud654\ud6a8\uc18c \ud65c\uc131\ud654\",\"cAMP (2\ucc28 \uc804\ub2ec\uc790) \uc0dd\uc131\",\"\ub2e8\ubc31\uc9c8 \uc778\uc0b0\ud654\ud6a8\uc18c A(PKA) \ud65c\uc131\ud654\",\"\uae00\ub9ac\ucf54\uac90 \ubd84\ud574 \ud6a8\uc18c \ud65c\uc131\ud654\"],\n  why:\"\uc138\ud3ec \ubc16 \uc2e0\ud638\uac00 \ub9c9 \uc218\uc6a9\uccb4\u2192<b>2\ucc28 \uc804\ub2ec\uc790(cAMP)\ub85c \uc99d\ud3ed<\/b>\ub418\uc5b4, \uc778\uc0b0\ud654 \uc5f0\uc1c4\ub85c \ud45c\uc801 \ud6a8\uc18c\ub97c \ucf1c \ud3ec\ub3c4\ub2f9\uc744 \ubc29\ucd9c\ud558\uae30 \ub54c\ubb38.\",\n  src:\"\ucea0\ubca8 9\uc7a5 \uc2e0\ud638\uc804\ub2ec / cAMP \uacbd\ub85c\"}\n];\n\nvar CATS=[\"\uc804\uccb4\",\"\ub300\uc0ac\",\"\ubd84\uc790\",\"\uc138\ud3ec\",\"\uc0dd\ub9ac\",\"\ubc1c\uc0dd\",\"\uc2e4\ud5d8\"];\n\n/* ===== STATE ===== */\nvar KEY='drag_order_bio_v1';\nvar store=makeStore(window.localStorage,window,KEY);\nvar progress=store.loadSync()||{solved:{},best:{}};\nif(!progress.solved)progress.solved={};\nif(!progress.best)progress.best={};\n\nvar filter=\"\uc804\uccb4\";\nvar view=[];                 // indices into PROCESSES under current filter\nvar vpos=0;                  // position within view\nvar order=[];                // current arrangement (permutation of step indices)\nvar checked=false;\n\nfunction curProc(){ return PROCESSES[view[vpos]]; }\n\nfunction buildView(){\n  view=[];\n  for(var i=0;i<PROCESSES.length;i++){ if(filter===\"\uc804\uccb4\"||PROCESSES[i].cat===filter) view.push(i); }\n  if(view.length===0){ view=[0]; }\n  if(vpos>=view.length) vpos=0;\n}\n\nfunction newRound(keepPos){\n  if(!keepPos){} // pos already set by caller\n  var p=curProc();\n  order=shuffleOrder(p.steps.length);\n  checked=false;\n  render();\n}\n\n/* ===== RENDER ===== */\nvar listEl=document.getElementById('list');\nvar resultEl=document.getElementById('result');\n\nfunction saveAll(){ store.save(progress); updateProgressPill(); }\n\nfunction updateProgressPill(){\n  var n=0; for(var i=0;i<PROCESSES.length;i++){ if(progress.solved[PROCESSES[i].id]) n++; }\n  document.getElementById('progPill').textContent=n+' / '+PROCESSES.length+' \uc644\ub8cc';\n}\n\nfunction renderHead(){\n  var p=curProc();\n  var head=document.getElementById('qhead');\n  head.innerHTML='';\n  var b=document.createElement('span'); b.className='badge cat'; b.textContent=p.cat; head.appendChild(b);\n  if(progress.solved[p.id]){ var s=document.createElement('span'); s.className='badge solved'; s.textContent='\u2713 \uc644\ub8cc'; head.appendChild(s); }\n  document.getElementById('qtitle').textContent=p.title;\n  document.getElementById('qhint').textContent=p.hint;\n  document.getElementById('counter').textContent=(vpos+1)+' / '+view.length+'  \u00b7  '+(filter===\"\uc804\uccb4\"?\"\uc804\uccb4\":filter);\n}\n\nfunction renderList(){\n  var p=curProc();\n  listEl.innerHTML='';\n  for(var pos=0;pos<order.length;pos++){\n    (function(pos){\n      var stepIdx=order[pos];\n      var li=document.createElement('li');\n      li.className='step';\n      li.setAttribute('data-pos',pos);\n      if(checked){ li.classList.add(stepIdx===pos?'good':'bad'); }\n      var grip=document.createElement('div'); grip.className='grip'; grip.textContent='\u283f'; li.appendChild(grip);\n      var body=document.createElement('div'); body.className='body';\n      var num=document.createElement('div'); num.className='num'; num.textContent=(pos+1); body.appendChild(num);\n      var txt=document.createElement('div'); txt.className='txt'; txt.textContent=p.steps[stepIdx]; body.appendChild(txt);\n      li.appendChild(body);\n      var arr=document.createElement('div'); arr.className='arrows';\n      var up=document.createElement('button'); up.textContent='\u25b2'; up.disabled=(pos===0); up.setAttribute('aria-label','\uc704\ub85c');\n      var dn=document.createElement('button'); dn.textContent='\u25bc'; dn.disabled=(pos===order.length-1); dn.setAttribute('aria-label','\uc544\ub798\ub85c');\n      up.addEventListener('click',function(e){e.stopPropagation();order=moveItem(order,pos,pos-1);checked=false;renderList();renderResultClear();});\n      dn.addEventListener('click',function(e){e.stopPropagation();order=moveItem(order,pos,pos+1);checked=false;renderList();renderResultClear();});\n      arr.appendChild(up); arr.appendChild(dn); li.appendChild(arr);\n      attachDrag(li);\n      listEl.appendChild(li);\n    })(pos);\n  }\n}\n\nfunction renderResultClear(){ resultEl.className='result'; resultEl.innerHTML=''; }\n\nfunction render(){ renderHead(); renderList(); renderResultClear(); }\n\n/* ===== POINTER DRAG (touch + mouse) ===== */\nvar drag=null;\nfunction attachDrag(li){\n  li.addEventListener('pointerdown',function(ev){\n    if(ev.target.closest('.arrows')) return;       // arrows handle their own clicks\n    ev.preventDefault();\n    var startPos=parseInt(li.getAttribute('data-pos'),10);\n    drag={el:li,startPos:startPos};\n    li.classList.add('dragging');\n    try{ li.setPointerCapture(ev.pointerId); }catch(e){}\n  });\n  li.addEventListener('pointermove',function(ev){\n    if(!drag) return;\n    ev.preventDefault();\n    var y=ev.clientY;\n    var items=Array.prototype.slice.call(listEl.children);\n    var overEl=null;\n    for(var i=0;i<items.length;i++){\n      var r=items[i].getBoundingClientRect();\n      if(y>=r.top && y<=r.bottom){ overEl=items[i]; break; }\n    }\n    if(overEl && overEl!==drag.el){\n      var r2=overEl.getBoundingClientRect();\n      var before=(y < r2.top + r2.height/2);\n      if(before) listEl.insertBefore(drag.el, overEl);\n      else listEl.insertBefore(drag.el, overEl.nextSibling);\n    }\n  });\n  function end(ev){\n    if(!drag) return;\n    drag.el.classList.remove('dragging');\n    // rebuild order from current DOM sequence\n    var items=Array.prototype.slice.call(listEl.children);\n    var newOrder=[];\n    for(var i=0;i<items.length;i++){ newOrder.push(order[parseInt(items[i].getAttribute('data-pos'),10)]); }\n    order=newOrder;\n    checked=false;\n    drag=null;\n    renderList();\n    renderResultClear();\n  }\n  li.addEventListener('pointerup',end);\n  li.addEventListener('pointercancel',end);\n}\n\n/* ===== CHECK / REVEAL ===== */\nfunction doCheck(){\n  var p=curProc();\n  checked=true;\n  renderList();\n  var sc=scoreOrder(order);\n  var total=order.length;\n  var won=isSolved(order);\n  if(won){\n    if(!progress.solved[p.id]){ progress.solved[p.id]=true; }\n    progress.best[p.id]=total;\n    saveAll();\n    renderHead(); renderAllGrid();\n  } else {\n    if(sc>(progress.best[p.id]||0)) progress.best[p.id]=sc;\n    saveAll();\n  }\n  showResult(won,sc,total,p);\n}\n\nfunction showResult(won,sc,total,p){\n  resultEl.className='result show '+(won?'win':'partial');\n  var html='';\n  html+='<div class=\"score\">'+(won?'\u2713 \uc815\ub2f5! \uc644\uc131\ud588\uc2b5\ub2c8\ub2e4':'\uc790\ub9ac \ub9de\uc740 \uac1c\uc218 '+sc+' / '+total)+'<\/div>';\n  if(!won){ html+='<div>\uc81c\uc790\ub9ac\uc5d0 \uc628 \ub2e8\uacc4\ub294 \ucd08\ub85d, \uc544\uc9c1 \uc5b4\uae0b\ub09c \ub2e8\uacc4\ub294 \ube68\uac15\uc73c\ub85c \ud45c\uc2dc\ub429\ub2c8\ub2e4. \ub2e4\uc2dc \uc62e\uaca8\ubcf4\uc138\uc694.<\/div>'; }\n  if(won){\n    html+='<div class=\"why\"><b>\uc65c \uc774 \uc21c\uc11c\uc77c\uae4c:<\/b> '+p.why+'<\/div>';\n    if(p.trap){ html+='<div class=\"trap\">\u26a0 \ud568\uc815: '+p.trap+'<\/div>'; }\n    html+='<div class=\"src\">\uadfc\uac70 \u00b7 '+p.src+'<\/div>';\n  }\n  resultEl.innerHTML=html;\n}\n\nfunction doReveal(){\n  var p=curProc();\n  order=[]; for(var i=0;i<p.steps.length;i++) order.push(i);\n  checked=true;\n  renderList();\n  resultEl.className='result show partial';\n  resultEl.innerHTML='<div class=\"score\">\uc815\ub2f5 \uc21c\uc11c\ub97c \ud45c\uc2dc\ud588\uc2b5\ub2c8\ub2e4<\/div>'+\n    '<div class=\"why\"><b>\uc65c \uc774 \uc21c\uc11c\uc77c\uae4c:<\/b> '+p.why+'<\/div>'+\n    (p.trap?'<div class=\"trap\">\u26a0 \ud568\uc815: '+p.trap+'<\/div>':'')+\n    '<div class=\"src\">\uadfc\uac70 \u00b7 '+p.src+'<\/div>';\n}\n\n/* ===== NAV / FILTER / ALL LIST ===== */\nfunction goRel(d){\n  vpos=(vpos+d+view.length)%view.length;\n  newRound();\n}\n\nfunction renderCatFilter(){\n  var box=document.getElementById('catFilter'); box.innerHTML='';\n  for(var i=0;i<CATS.length;i++){\n    (function(c){\n      var chip=document.createElement('button');\n      chip.className='chip'+(c===filter?' on':'');\n      chip.textContent=c;\n      chip.addEventListener('click',function(){ filter=c; vpos=0; buildView(); newRound(); renderCatFilter(); renderAllGrid(); });\n      box.appendChild(chip);\n    })(CATS[i]);\n  }\n}\n\nfunction renderAllGrid(){\n  var grid=document.getElementById('allGrid'); grid.innerHTML='';\n  document.getElementById('allCount').textContent=PROCESSES.length+'\uac1c';\n  for(var i=0;i<PROCESSES.length;i++){\n    (function(i){\n      var p=PROCESSES[i];\n      var row=document.createElement('div');\n      var isCur=(view[vpos]===i);\n      row.className='allitem'+(progress.solved[p.id]?' solved':'')+(isCur?' current':'');\n      var dot=document.createElement('span'); dot.className='dot'; row.appendChild(dot);\n      var nm=document.createElement('span'); nm.className='nm'; nm.textContent=p.title; row.appendChild(nm);\n      var ac=document.createElement('span'); ac.className='ac'; ac.textContent=p.cat; row.appendChild(ac);\n      row.addEventListener('click',function(){\n        // jump: switch filter to \uc804\uccb4 if needed so item is in view\n        if(filter!==\"\uc804\uccb4\" && p.cat!==filter){ filter=\"\uc804\uccb4\"; renderCatFilter(); }\n        buildView();\n        for(var k=0;k<view.length;k++){ if(view[k]===i){ vpos=k; break; } }\n        newRound(); renderAllGrid();\n        document.getElementById('qcard').scrollIntoView({behavior:'smooth',block:'start'});\n      });\n      grid.appendChild(row);\n    })(i);\n  }\n}\n\n/* ===== WIRE UP ===== */\ndocument.getElementById('prevBtn').addEventListener('click',function(){goRel(-1);});\ndocument.getElementById('nextBtn').addEventListener('click',function(){goRel(1);});\ndocument.getElementById('shuffleBtn').addEventListener('click',function(){newRound();});\ndocument.getElementById('checkBtn').addEventListener('click',doCheck);\ndocument.getElementById('revealBtn').addEventListener('click',doReveal);\ndocument.getElementById('resetBtn').addEventListener('click',function(){\n  if(confirm('\uc644\ub8cc \uae30\ub85d\uc744 \ubaa8\ub450 \ucd08\uae30\ud654\ud560\uae4c\uc694?')){ progress={solved:{},best:{}}; saveAll(); render(); renderAllGrid(); }\n});\n\n/* ===== best-effort async hydrate from window.storage (e.g. artifact env) ===== */\n(function(){\n  try{\n    if(window.storage && window.storage.get && !store.loadSync()){\n      window.storage.get(KEY,false).then(function(r){\n        if(r && r.value){\n          try{ var p=JSON.parse(r.value); progress=p; if(!progress.solved)progress.solved={}; if(!progress.best)progress.best={}; updateProgressPill(); renderHead(); renderAllGrid(); }catch(e){}\n        }\n      }).catch(function(){});\n    }\n  }catch(e){}\n})();\n\n/* ===== INIT ===== */\nbuildView();\nrenderCatFilter();\nnewRound();\nrenderAllGrid();\nupdateProgressPill();\n<\/script>\n<\/body>\n<\/html>\n"</script>
