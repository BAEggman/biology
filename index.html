melatonin); 생체리듬·수면 조절(밤에 분비↑)"}, {"id": "Q0-35", "q": "심방(ANP)의 기능은?", "a": "심방나트륨이뇨펩티드; 혈액량 증가 시 분비, 신장 Na⁺·물 배설↑·혈관 확장으로 혈압↓"}, {"id": "Q0-36", "q": "자율신경 절후 신경전달물질(교감·부교감)은?", "a": "교감=노르에피네프린, 부교감=아세틸콜린(ACh)"}]}, {"label": "46 동물의 생식", "cards": [{"id": "Q1-1", "q": "무성생식의 4방식은?", "a": "출아, 분열, 단편화+재생, 단위생식(parthenogenesis)"}, {"id": "Q1-2", "q": "단위생식(parthenogenesis)이란?", "a": "미수정란이 발생; 꿀벌 수컷(드론)은 반수체 단위생식"}, {"id": "Q1-3", "q": "자웅동체(hermaphroditism)와 성전환의 예는?", "a": "자웅동체=따개비·촌충(암수 모두) / 성전환=놀래기(암→수), 굴(수→암)"}, {"id": "Q1-4", "q": "유성생식이 2배의 비용에도 유지되는 이유는?", "a": "감수분열 재조합·수정으로 유전적 다양성을 만들어 변화하는 환경·기생체에 대응"}, {"id": "Q1-5", "q": "난자와 정자의 특징 차이는?", "a": "난자=크고 비운동성·양분 저장 / 정자=작고 운동성"}, {"id": "Q1-6", "q": "체외수정과 체내수정의 차이는?", "a": "체외=물 환경에 배우자 방출(다산·보호 적음) / 체내=교미로 정자 전달(알 적고 보호·발생 지원, 육상 적응)"}, {"id": "Q1-7", "q": "남성 생식기관에서 정자의 이동 경로는?", "a": "정소(세정관)→부정소(성숙·저장)→정관→사정관→요도"}, {"id": "Q1-8", "q": "정소의 두 세포와 기능은?", "a": "세정관(정자 생성), 간질세포(테스토스테론)"}, {"id": "Q1-9", "q": "남성 부속샘 3가지는?", "a": "정낭(과당 등 영양), 전립선, 요도구선(쿠퍼선)"}, {"id": "Q1-10", "q": "여성 생식기관에서 난자의 경로는?", "a": "난소→수란관(난관, 수정이 일어나는 곳)→자궁(자궁내막)→자궁경부→질"}, {"id": "Q1-11", "q": "정자형성에서 1차 정모세포가 만드는 정자 수는?", "a": "정자 4개(균등 분열)"}, {"id": "Q1-12", "q": "세르톨리세포(Sertoli cell)의 역할은?", "a": "정자형성에 영양 공급"}, {"id": "Q1-13", "q": "정자의 구조 3부분은?", "a": "머리(반수체 핵+첨체 acrosome), 중편(미토콘드리아=ATP), 꼬리(편모)"}, {"id": "Q1-14", "q": "첨체(acrosome)의 기능은?", "a": "난자 침투 효소"}, {"id": "Q1-15", "q": "난자형성에서 1차 난모세포가 만드는 난자 수는?", "a": "난자 1개 + 극체(퇴화), 불균등 세포질분열"}, {"id": "Q1-16", "q": "난자형성의 감수분열 2회 정지 시점은?", "a": "감수1 전기에서 정지(출생 전), 감수2 중기에서 정지(배란)"}, {"id": "Q1-17", "q": "난자형성에서 감수2가 완료되는 시점은?", "a": "정자가 침투해야 완료"}, {"id": "Q1-18", "q": "정자형성과 난자형성의 산물·분열 차이는?", "a": "정자형성=정자 4개(균등)·연속 / 난자형성=난자 1개+극체(불균등)·2회 정지"}, {"id": "Q1-19", "q": "배란 후 빈 여포가 되는 구조와 분비물은?", "a": "황체(corpus luteum); 에스트라디올·프로게스테론 분비"}, {"id": "Q1-20", "q": "남성 호르몬 조절 경로는?", "a": "시상하부 GnRH→전엽 FSH·LH→정소(LH=테스토스테론/FSH+테스토스테론=정자형성)"}, {"id": "Q1-21", "q": "남성에서 FSH를 억제하는 물질은?", "a": "세르톨리세포의 인히빈(inhibin)"}, {"id": "Q1-22", "q": "난소주기(ovarian cycle)의 3단계는?", "a": "여포기(follicular)→배란(ovulation)→황체기(luteal)"}, {"id": "Q1-23", "q": "배란(ovulation)의 방아쇠는?", "a": "LH 급증(LH surge)"}, {"id": "Q1-24", "q": "자궁주기(uterine cycle)의 3단계는?", "a": "월경기→증식기(에스트로겐, 자궁내막 재생)→분비기(프로게스테론, 착상 대비)"}, {"id": "Q1-25", "q": "여포기 말 고농도 에스트로겐의 피드백 전환은?", "a": "평소 음성 피드백이지만 고농도에서 양성 피드백으로 LH 급증(배란)"}, {"id": "Q1-26", "q": "착상 후 배아·태반이 분비하는 호르몬과 역할은?", "a": "hCG(융모성선자극호르몬); 황체를 유지→프로게스테론 지속(임신 진단 키트가 검출)"}, {"id": "Q1-27", "q": "태반(placenta)의 기능은?", "a": "모체-태아 물질 교환(영양·O₂·노폐물), 호르몬 분비(프로게스테론·에스트로겐)"}, {"id": "Q1-28", "q": "출산(labor)을 진행시키는 양성 피드백 호르몬은?", "a": "옥시토신(과 프로스타글란딘)이 자궁 수축 강화; 에스트로겐이 옥시토신 수용체를 늘림"}]}]}]};

/* ---------- state ---------- */
const S = {screen:'home', gateId:null, scope:'all'};
/* ===== persistence: localStorage (standalone file) + window.storage (claude.ai) ===== */
const K_PROG='bio_quest_v1', K_ACT='bio_quest_act_v1';
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function wsSet(k,v){ try{ if(typeof window!=="undefined" && window.storage){ window.storage.set(k,v); } }catch(e){} }
function loadProgress(){ try{ const r=lsGet(K_PROG); if(r) return JSON.parse(r); }catch(e){} return {}; }
function saveProgress(){ const s=JSON.stringify(PROG); lsSet(K_PROG,s); wsSet(K_PROG,s); }
function loadAct(){ try{ const r=lsGet(K_ACT); if(r) return JSON.parse(r); }catch(e){} return {}; }
function saveAct(){ const s=JSON.stringify(ACT); lsSet(K_ACT,s); wsSet(K_ACT,s); }
let PROG = loadProgress();
let ACT  = loadAct();
async function hydrate(){
  if(typeof window==="undefined" || !window.storage) return;
  let ch=false;
  try{ if(Object.keys(PROG).length===0){ const r=await window.storage.get(K_PROG); if(r&&r.value){ PROG=JSON.parse(r.value); ch=true; } } }catch(e){}

/* ===== daily activity + streak ===== */
function dkey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function recordStudy(gid){
  const k=dkey(new Date());
  if(!ACT[k]) ACT[k]=[];
  if(!ACT[k].includes(gid)) ACT[k].push(gid);
  saveAct();
}
function studiedDaysCount(){ return Object.keys(ACT).filter(k=>ACT[k]&&ACT[k].length).length; }
function curStreak(){
  const t=new Date(); let anchor=null;
  if(ACT[dkey(t)]&&ACT[dkey(t)].length) anchor=new Date(t);
  else { const y=new Date(t); y.setDate(y.getDate()-1); if(ACT[dkey(y)]&&ACT[dkey(y)].length) anchor=y; }
  if(!anchor) return 0;
  let n=0, d=new Date(anchor);
  while(ACT[dkey(d)]&&ACT[dkey(d)].length){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function longestStreak(){
  const days=Object.keys(ACT).filter(k=>ACT[k]&&ACT[k].length).sort();
  if(!days.length) return 0;
  let best=1,cur=1;
  for(let i=1;i<days.length;i++){
    const diff=Math.round((new Date(days[i]+'T00:00:00')-new Date(days[i-1]+'T00:00:00'))/86400000);
    if(diff===1){ cur++; if(cur>best)best=cur; } else if(diff!==0){ cur=1; }
  }
  return best;
}

function daysSinceKey(k){ if(!k) return Infinity; const a=new Date(k+'T00:00:00'), b=new Date(dkey(new Date())+'T00:00:00'); return Math.round((b-a)/86400000); }

/* ---------- helpers ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function gateById(id){ return DATA.gates.find(g=>g.id===id); }
function gateCards(g){ const o=[]; g.chapters.forEach(c=>c.cards.forEach(k=>o.push(k))); return o; }
function gateCount(g){ return g.chapters.reduce((s,c)=>s+c.cards.length,0); }
function gateMastery(g){
  const m=masteredSet(g.id); let done=0; const tot=gateCount(g);
  gateCards(g).forEach(k=>{ if(m[k.id]) done++; });
  return {done, tot, pct: tot? done/tot : 0};
}
function overall(){
  let d=0,t=0; DATA.gates.forEach(g=>{const x=gateMastery(g); d+=x.done; t+=x.tot;});
  return {d,t,pct: t? d/t:0};
}
function starStr(pct){
  const n = pct>=1?3 : pct>=0.8?2 : pct>=0.5?1 : 0;
  return '★★★'.slice(0,n) + '<span class="e">'+'★★★'.slice(n)+'</span>';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ---------- quest ---------- */
const ROUND=12;
function makeOptions(card, pool){
  const correct=card.a, L=correct.length;
  const cands=pool.filter(c=>c.a!==correct);
  cands.sort((a,b)=>Math.abs(a.a.length-L)-Math.abs(b.a.length-L));
  const win=cands.slice(0, Math.min(cands.length, 16));
  shuffle(win);
  const seen=new Set([correct]); const ds=[];
  for(const c of win){ if(!seen.has(c.a)){seen.add(c.a);ds.push(c.a);} if(ds.length>=3)break; }
  if(ds.length<3){ for(const c of cands){ if(!seen.has(c.a)){seen.add(c.a);ds.push(c.a);} if(ds.length>=3)break; } }
  return shuffle([correct,...ds]);
}
function startQuest(){
  const pool=scopeCards(); const m=masteredSet(S.gateId);
  let un=pool.filter(c=>!m[c.id]), dn=pool.filter(c=>m[c.id]);
  shuffle(un); shuffle(dn);
  const N=Math.min(ROUND, pool.length);
  let round=un.slice(0,N);
  if(round.length<N) round=round.concat(dn.slice(0,N-round.length));
  shuffle(round);
  S.roundCards=round;
  S.queue=round.map((_,i)=>i);
  S.first={}; round.forEach(c=>S.first[c.id]='pending');
  S.dpool=pool;
  S.revealed=false; S.chosen=null; S.lastCorrect=false;
  prepCard();
  S.screen='quest'; render();
}
function curCard(){ return S.roundCards[S.queue[0]]; }
function prepCard(){ S.opts=makeOptions(curCard(), S.dpool); }
function answer(i){
  if(S.revealed) return;
  const card=curCard();
  S.chosen=i; S.revealed=true; S.lastCorrect=(S.opts[i]===card.a);
  if(S.first[card.id]==='pending'){
    S.first[card.id]=S.lastCorrect?'correct':'wrong';
    if(S.lastCorrect) addMastered(S.gateId, card.id);
  }
  render();
}
function nextCard(){
  if(!S.revealed) return;
  const idx=S.queue.shift();
  if(!S.lastCorrect) S.queue.push(idx);
  S.revealed=false; S.chosen=null;
  if(S.queue.length===0){ recordStudy(S.gateId); S.screen='results'; render(); return; }
  prepCard(); render();
}
function renderQuest(){
  const card=curCard();
  const total=S.roundCards.length;
  const solved=total - new Set(S.queue).size + (S.revealed&&S.lastCorrect?0:0);
  const remainUnique=new Set(S.queue).size;
  const doneU=total-remainUnique;
  const prog=Math.round((doneU/total)*100);
  const kk=['A','B','C','D'];
  let opts='';
  S.opts.forEach((o,i)=>{
    let cls='opt';
    if(S.revealed){
      if(o===card.a) cls+=' ok';
      else if(i===S.chosen) cls+=' no';
      else cls+=' dim';
    }
    opts+=`<button class="${cls}" data-act="answer" data-opt="${i}" ${S.revealed?'disabled':''}>
      <span class="k">${kk[i]}</span><span>${esc(o)}</span></button>`;
  });
  let feed='';
  if(S.revealed){
    feed=`<div class="feed">
      <div class="msg ${S.lastCorrect?'good':'bad'}">${S.lastCorrect?'정답! 마스터에 기록':'아쉬워요 — 이 카드는 다시 나옵니다'}</div>
      <button class="btn" data-act="next">${S.queue.length>1||!S.lastCorrect?'다음':'결과 보기'}</button></div>`;
  }
  app.innerHTML=`
    <div class="scr-top">
      <button class="back" data-act="gate2">←</button>
      <div><h2>퀘스트</h2><div class="sub">${scopeLabel()}</div></div>
    </div>
    <div class="qbar"><span class="pill">${doneU} / ${total}</span>
      <div class="bar"><i style="width:${prog}%"></i></div></div>

      <div class="q">${esc(card.q)}</div></div>
    <div class="opts">${opts}</div>
    ${feed}`;
}

        <div class="face back"><div class="fe">정답</div>
          <div class="ft">${esc(c.a)}</div><div class="hint">탭하면 질문</div></div>
      </div>
    </div>
    <div class="fnav">
      <button class="btn ghost" data-act="flipPrev">이전</button>
      <div class="ctr">${S.fi+1} / ${S.fcards.length}</div>
      <button class="btn" data-act="flipNext">다음</button>
    </div>`;
}

/* ---------- event delegation ---------- */
app.addEventListener('click', e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const a=el.dataset.act;
  if(a==='gate'){ S.gateId=el.dataset.gate; S.scope='all'; S.screen='gate'; render(); }
  else if(a==='home'){ S.screen='home'; render(); }
  else if(a==='gate2'){ S.screen='gate'; render(); }
  else if(a==='scope'){ S.scope=(el.dataset.scope==='all')?'all':(+el.dataset.scope); render(); }
  else if(a==='quest'){ startQuest(); }
  else if(a==='flip'){ startFlip(); }
  else if(a==='answer'){ answer(+el.dataset.opt); }
  else if(a==='next'){ nextCard(); }
  else if(a==='flipCard'){ S.fflip=!S.fflip; render(); }
  else if(a==='flipNext'){ S.fi=(S.fi+1)%S.fcards.length; S.fflip=false; render(); }
  else if(a==='flipPrev'){ S.fi=(S.fi-1+S.fcards.length)%S.fcards.length; S.fflip=false; render(); }
  else if(a==='calPrev'){ calNav(-1); }
  else if(a==='calNext'){ calNav(1); }
  else if(a==='calDay'){ showDay(el.dataset.day); }
  else if(a==='mode'){ openMode(+el.dataset.mode); }
  else if(a==='reset'){
    if(confirm('모든 관문의 진행도(마스터 기록)를 지울까요? 되돌릴 수 없어요.')){
      PROG={}; saveProgress(); render();
    }
  }
});

/* ===== mode launcher (iframe overlay) ===== */
const MODE_META={1:'옥지 않은 것 — 부정문항 훈련',2:'수치 드릴 — 계산 문제',3:'순서 맞추기',4:'해부 빈칸 채우기',5:'비교표 빈칸 채우기',6:'그래프·실험 해석',7:'하류 효과 예측',8:'캠벨 OX 즉답'};
function openMode(n){
  const holder=document.getElementById('ann'+n); if(!holder) return;
  let html; try{ html=JSON.parse(holder.textContent); }catch(e){ console.error('mode parse',e); return; }
  const f=document.getElementById('modeFrame'); f.srcdoc=html;
  const t=document.getElementById('modeTitle'); if(t) t.textContent=MODE_META[n]||'';
  document.getElementById('modeHost').hidden=false;
  document.body.style.overflow='hidden';
}
function closeMode(){
  document.getElementById('modeHost').hidden=true;
  const f=document.getElementById('modeFrame');
  try{ f.removeAttribute('srcdoc'); f.src='about:blank'; }catch(e){}
  document.body.style.overflow='';
}
(function(){
  const host=document.getElementById('modeHost');
  if(host) host.addEventListener('click', e=>{ if(e.target.closest('[data-mclose]')) closeMode(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ const h2=document.getElementById('modeHost'); if(h2 && !h2.hidden) closeMode(); } });
})();

/*__SPACEBAR_NAV__*/
document.addEventListener('keydown',function(e){
  if(e.key!==' '&&e.code!=='Space')return;
  var mh=document.getElementById('modeHost');
  if(mh&&!mh.hidden)return;
  var t=e.target;
  if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
  if(typeof S==='undefined')return;
  if(S.screen==='flip'){
    e.preventDefault();
    if(!S.fflip){S.fflip=true;render();}
    else{S.fi=(S.fi+1)%S.fcards.length;S.fflip=false;render();}
  }else if(S.screen==='quest'){
    if(S.revealed){e.preventDefault();nextCard();}
  }
});

render();
hydrate();
</script>
<script type="application/json" id="ann1">"<!DOCTYPE html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>\uc633\uc9c0 \uc54a\uc740 \uac83 \u2014 \ubd80\uc815\ubb38\ud56d \ud6c8\ub828 (\ucea0\ubca8)<\/title>\n<link rel=\"preconnect\" href=\"https://cdn.jsdelivr.net\">\n<link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css\">\n<style>\n:root{--ink:#10302E;--ink2:#41605C;--ink3:#6E8884;--line:#D7E0DE;--line2:#E6ECEA;--bg:#EAF0EE;--card:#FFF;--teal:#0F766E;--teal-d:#0E4F4A;--teal-soft:#E2F0EE;--vio:#6A50B0;--vio-soft:#ECE7F8;--amb:#B26B00;--amb-soft:#FBEFD9;--ok:#12805C;--ok-soft:#E2F3EC;--no:#C0392B;--no-soft:#FBEAE8;--sans:'Pretendard',-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;--mono:ui-monospace,Menlo,Consolas,monospace}\n*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nhtml,body{margin:0;padding:0}\nbody{font-family:var(--sans);color:var(--ink);background:linear-gradient(180deg,#EEF3F1 0%,var(--bg) 38%,#E4ECE9 100%);background-attachment:fixed;line-height:1.55;-webkit-font-smoothing:antialiased;font-size:16px}\n.wrap{max-width:760px;margin:0 auto;padding:18px 16px calc(28px + env(safe-area-inset-bottom))}\n/* header */\nheader{padding:6px 2px 14px}\n.kic{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--teal-d);background:var(--teal-soft);border:1px solid #CFE3DF;padding:5px 11px;border-radius:999px}\n.kic .dot{width:7px;height:7px;border-radius:50%;background:var(--teal)}\nh1{font-size:23px;font-weight:800;letter-spacing:-.01em;margin:13px 0 3px;line-height:1.2}\n.sub{color:var(--ink2);font-size:13.5px;margin:0}\n/* progress */\n.prog{margin-top:15px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(16,48,46,.04),0 6px 18px -10px rgba(16,48,46,.12);padding:13px 15px}\n.prog .row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:9px}\n.prog .lbl{font-size:12.5px;color:var(--ink2);font-weight:600}\n.prog .stat{font-size:12.5px;color:var(--ink3)}\n.prog .stat b{color:var(--teal-d)}\n.bar{height:8px;border-radius:999px;background:var(--line2);overflow:hidden}\n.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),#16a394);border-radius:999px;transition:width .35s cubic-bezier(.2,.7,.3,1)}\n/* card */\n.card{margin-top:15px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(16,48,46,.04),0 10px 28px -16px rgba(16,48,46,.18);overflow:hidden}\n.card .top{padding:15px 17px 4px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}\n.chip{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.01em}\n.chip.cat{background:var(--vio-soft);color:var(--vio)}\n.chip.num{background:var(--line2);color:var(--ink3);font-variant-numeric:tabular-nums}\n.q{padding:8px 17px 4px;font-size:17px;font-weight:700;letter-spacing:-.005em;line-height:1.4}\n.hint{padding:2px 17px 12px;font-size:12.5px;color:var(--ink3)}\n.opts{padding:4px 13px 14px;display:flex;flex-direction:column;gap:9px}\n.opt{position:relative;text-align:left;width:100%;font-family:inherit;font-size:15px;line-height:1.45;color:var(--ink);background:#FBFCFC;border:1.5px solid var(--line);border-radius:14px;padding:13px 14px 13px 42px;cursor:pointer;transition:border-color .14s,background .14s,transform .06s}\n.opt:hover{border-color:#BFD3CF;background:#F6F9F8}\n.opt:active{transform:scale(.992)}\n.opt:focus-visible{outline:3px solid #9CCFC8;outline-offset:2px}\n.opt .mk{position:absolute;left:13px;top:12.5px;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink3);background:#fff}\n.opt[disabled]{cursor:default}\n/* graded states */\n.opt.is-wrong{border-color:var(--teal);background:var(--teal-soft)}\n.opt.is-wrong .mk{background:var(--teal);border-color:var(--teal);color:#fff}\n.opt.is-right{border-color:var(--line);background:#F4F7F6;color:var(--ink2)}\n.opt.is-right .mk{border-color:#CBDAD7;color:var(--ink3)}\n.opt.picked-bad{border-color:var(--no);background:var(--no-soft)}\n.opt.picked-bad .mk{background:var(--no);border-color:var(--no);color:#fff}\n.tag{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px}\n.tag.answer{background:var(--ok-soft);color:var(--ok)}\n.tag.trap{background:var(--amb-soft);color:var(--amb)}\n.tag.bad{background:var(--no-soft);color:var(--no)}\n.tag.fine{background:var(--line2);color:var(--ink3)}\n.why{margin-top:7px;font-size:13px;line-height:1.5;color:var(--ink2)}\n.why b{color:var(--ink);font-weight:700}\n/* verdict */\n.verdict{margin:0 13px 13px;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:700;display:none;align-items:center;gap:9px}\n.verdict.show{display:flex}\n.verdict.good{background:var(--ok-soft);color:var(--ok)}\n.verdict.miss{background:var(--no-soft);color:var(--no)}\n.verdict .em{font-size:18px;line-height:1}\n.verdict small{display:block;font-weight:500;font-size:12.5px;color:var(--ink2);margin-top:2px}\n/* nav */\n.nav{margin-top:14px;display:flex;gap:9px;align-items:stretch}\n.btn{flex:1;font-family:inherit;font-size:14px;font-weight:700;border-radius:14px;padding:13px 12px;cursor:pointer;border:1.5px solid var(--line);background:var(--card);color:var(--ink);transition:border-color .14s,background .14s,transform .06s;box-shadow:0 1px 2px rgba(16,48,46,.04)}\n.btn:active{transform:scale(.985)}\n.btn:focus-visible{outline:3px solid #9CCFC8;outline-offset:2px}\n.btn:disabled{opacity:.4;cursor:default}\n.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;flex:1.5}\n.btn.primary:hover{background:var(--teal-d)}\n.btn.ghost{flex:0 0 auto;color:var(--ink2)}\n.btn.ghost:hover{border-color:#BFD3CF;background:#F4F7F6}\n/* footer meta */\n.meta{margin-top:18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:0 2px}\n.meta .traps{font-size:11.5px;color:var(--ink3);line-height:1.5}\n.meta .traps b{color:var(--ink2)}\n.linkbtn{font-family:inherit;background:none;border:none;color:var(--ink3);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:4px}\n.linkbtn:hover{color:var(--no)}\n.done-all{margin-top:14px;background:var(--ok-soft);border:1px solid #CBE6DA;border-radius:16px;padding:15px 16px;font-size:13.5px;color:var(--ink2);display:none}\n.done-all.show{display:block}\n.done-all b{color:var(--ok)}\n.jump{display:inline-block;margin-top:9px;font-size:12.5px}\n@media (max-width:380px){h1{font-size:21px}.q{font-size:16px}.opt{font-size:14.5px}}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n  <header>\n    <span class=\"kic\"><span class=\"dot\"><\/span>\ucea0\ubca8 \uae30\ubc18 \u00b7 \ud568\uc815 \ud574\ubd80\ub3c4\uac10<\/span>\n    <h1>\uc633\uc9c0 \uc54a\uc740 \uac83<\/h1>\n    <p class=\"sub\">\ubd80\uc815\ubb38\ud56d \ud6c8\ub828 \u00b7 \ud55c \uc8fc\uc81c\uc758 \ubcf4\uae30 \uc911 <b>\ubbf8\ubb18\ud558\uac8c \ud2c0\ub9b0 \ud558\ub098<\/b>\ub97c \ucc3e\uc544 \ud0ed\ud558\uc138\uc694.<\/p>\n  <\/header>\n\n  <div class=\"prog\">\n    <div class=\"row\">\n      <span class=\"lbl\" id=\"progLbl\">\uc9c4\ud589<\/span>\n      <span class=\"stat\"><b id=\"doneN\">0<\/b>/<span id=\"totN\">0<\/span> \uc644\ub8cc \u00b7 \uc815\ub2f5 <b id=\"hitN\">0<\/b><\/span>\n    <\/div>\n    <div class=\"bar\"><i id=\"barFill\"><\/i><\/div>\n  <\/div>\n\n  <main class=\"card\" id=\"card\" aria-live=\"polite\">\n    <div class=\"top\">\n      <span class=\"chip cat\" id=\"catChip\">\u2014<\/span>\n      <span class=\"chip num\" id=\"numChip\">\u2014<\/span>\n    <\/div>\n    <p class=\"q\" id=\"qText\">\ub85c\ub529 \uc911\u2026<\/p>\n    <p class=\"hint\">\uc633\uc9c0 \uc54a\uc740 \ubcf4\uae30\ub97c \uace0\ub974\uba74, \uadf8\uac83\uc774 \uc5b4\ub5a4 <b>\ud568\uc815 \uc720\ud615<\/b>\uc778\uc9c0\uc640 \uc774\uc720\ub97c \ubcf4\uc5ec\uc90d\ub2c8\ub2e4.<\/p>\n    <div class=\"opts\" id=\"opts\"><\/div>\n    <div class=\"verdict\" id=\"verdict\"><\/div>\n  <\/main>\n\n  <div class=\"nav\">\n    <button class=\"btn ghost\" id=\"prevBtn\" aria-label=\"\uc774\uc804 \uc8fc\uc81c\">\u2039 \uc774\uc804<\/button>\n    <button class=\"btn primary\" id=\"nextBtn\">\ub2e4\uc74c \u203a<\/button>\n    <button class=\"btn ghost\" id=\"jumpBtn\" aria-label=\"\uc548 \ud47c \uc8fc\uc81c\ub85c\">\uc548 \ud47c \ubb38\uc81c<\/button>\n  <\/div>\n\n  <div class=\"done-all\" id=\"doneAll\">\n    <b>\uc804 \uc8fc\uc81c \uc644\uc8fc!<\/b> 36\uac1c \uc8fc\uc81c\ub97c \ubaa8\ub450 \ud480\uc5c8\uc5b4\uc694. \ud568\uc815 \uc720\ud615\ubcc4\ub85c \uc57d\ud588\ub358 \uacf3\uc744 \ub2e4\uc2dc \ubcf4\ub824\uba74 <span class=\"jump\"><button class=\"linkbtn\" id=\"reviewBtn\">\ucc98\uc74c\ubd80\ud130 \ubcf5\uc2b5<\/button><\/span>\ud558\uac70\ub098, \uc544\ub798\uc5d0\uc11c \uc9c4\ud589\uc744 \ucd08\uae30\ud654\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4.\n  <\/div>\n\n  <div class=\"meta\">\n    <p class=\"traps\">\ud568\uc815 \uc720\ud615: <b>\ubc29\ud5a5 \ub4a4\uc9d1\uae30 \u00b7 \uc218\uce58 \ubc14\uafd4\uce58\uae30 \u00b7 \uc778\uacfc \ud63c\ub3d9 \u00b7 \uacfc\uc789 \uc77c\ubc18\ud654 \u00b7 \uac1c\ub150 \ub9de\ubc14\uafb8\uae30 \u00b7 \uc704\uce58 \uc624\ub958 \u00b7 \uc608\uc678 \ubb34\uc2dc<\/b><\/p>\n    <button class=\"linkbtn\" id=\"resetBtn\">\uc9c4\ud589 \ucd08\uae30\ud654<\/button>\n  <\/div>\n<\/div>\n\n<script>\n/* =========================================================\n   \uc633\uc9c0 \uc54a\uc740 \uac83 \u2014 \ubd80\uc815\ubb38\ud56d \ud6c8\ub828 (\ucea0\ubca8 \uae30\ubc18)\n   \ubb38\ud56d \uadfc\uac70: \ud504\ub85c\uc81d\ud2b8\uc758 \ucea0\ubca8 \ubcf8\ubb38 / \uae30\ucd9c(BM\ud3b8\uc785\u00b7\ub3d9\uad6d\u00b7\uc6d0\uad11\u00b7\ubaa8\uc758) /\n   \uc9c0\uc5fd_\uc815\ub9ac / \ud568\uc815 \ud3ec\uc778\ud2b8. \ucd94\uce21\uc73c\ub85c \uc9c0\uc5b4\ub0b8 \ud56d\ubaa9 \uc5c6\uc74c.\n   \uac01 \uc8fc\uc81c: \ubcf4\uae30 4~5\uac1c \uc911 wrong:true \uac00 \uc815\ud655\ud788 1\uac1c(=\uc633\uc9c0 \uc54a\uc740 \ubcf4\uae30, \uc815\ub2f5).\n   ========================================================= */\nvar QUESTIONS = [\n/* ---- \uc138\ud3ec (\ub9c9\u00b7\uc2e0\ud638\u00b7\uc18c\uae30\uad00) ---- */\n{id:\"membrane\",cat:\"\uc138\ud3ec\ub9c9\",q:\"\uc138\ud3ec\ub9c9\uc758 \uad6c\uc870\uc640 \uc720\ub3d9\uc131\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc778\uc9c0\uc9c8\uc740 \uce5c\uc218\uc131 \uba38\ub9ac\uc640 \uc18c\uc218\uc131 \uaf2c\ub9ac\ub97c \ud568\uaed8 \uac00\uc9c4 \uc591\uce5c\ub9e4\uc131 \ubd84\uc790\ub2e4.\",wrong:false,why:\"\uc778\uc9c0\uc9c8\uc758 \uc591\uce5c\ub9e4\uc131\uc774 \uc774\uc911\uce35 \ud615\uc131\uc758 \uadfc\uac70\ub2e4.\"},\n {t:\"\ub9c9\uad00\ud1b5 \ub2e8\ubc31\uc9c8\uc758 \uc18c\uc218\uc131 \ubd80\ubd84\uc740 \uc9c0\uc9c8 \uc774\uc911\uce35\uc758 \ub0b4\ubd80\uc5d0 \uc790\ub9ac\ud55c\ub2e4.\",wrong:false,why:\"\ub0b4\uc7ac \ub2e8\ubc31\uc9c8\uc740 \uc18c\uc218\uc131 \u03b1-\ub098\uc120\uc774 \uc774\uc911\uce35\uc5d0 \ubc15\ud78c\ub2e4.\"},\n {t:\"\ubd88\ud3ec\ud654 \uc9c0\ubc29\uc0b0 \uaf2c\ub9ac\uac00 \ub9ce\uc740 \uc778\uc9c0\uc9c8\uc774 \ud48d\ubd80\ud560\uc218\ub85d \ub9c9\uc758 \uc720\ub3d9\uc131\uc774 \ub0ae\uc544\uc9c4\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"<b>\ubc18\ub300<\/b>\ub2e4. \ubd88\ud3ec\ud654 \uaf2c\ub9ac\ub294 \uaebe\uc5ec \uc788\uc5b4 \ub9c9\uc744 \ub35c \uc870\ubc00\ud558\uac8c \ub9cc\ub4e4\uc5b4 <b>\uc720\ub3d9\uc131\uc744 \ub192\uc778\ub2e4<\/b>.\"},\n {t:\"\ucf5c\ub808\uc2a4\ud14c\ub864\uc740 \uccb4\uc628(\uc57d 37\u2103)\uc5d0\uc11c \uc778\uc9c0\uc9c8 \uc774\ub3d9\uc744 \uc5b5\uc81c\ud574 \ub9c9\uc744 \ub35c \uc720\ub3d9\uc801\uc774\uac8c \ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\ub300\ub85c \uace0\uc628\uc5d0\uc11c\ub294 \uc720\ub3d9\uc131\uc744 \ub0ae\ucd94\ub294 \uc644\ucda9 \uc5ed\ud560.\"},\n {t:\"\uc8fc\ubcc0\ubd80 \ub2e8\ubc31\uc9c8\uc740 \uc774\uc911\uce35\uc744 \uad00\ud1b5\ud558\uc9c0 \uc54a\uace0 \ub9c9 \ud45c\uba74\uc5d0 \ub290\uc2a8\ud788 \ubd99\ub294\ub2e4.\",wrong:false,why:\"peripheral protein\uc758 \uc815\uc758.\"}]},\n\n{id:\"transport\",cat:\"\ub9c9 \uc218\uc1a1\",q:\"\uc138\ud3ec\ub9c9\uc744 \ud1b5\ud55c \ubb3c\uc9c8 \uc218\uc1a1\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ub2e8\uc21c\ud655\uc0b0\uc740 \ub18d\ub3c4 \uae30\uc6b8\uae30\ub97c \ub530\ub77c ATP \uc5c6\uc774 \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\uc218\ub3d9\uc218\uc1a1\uc758 \uae30\ubcf8\ud615.\"},\n {t:\"\ucd09\uc9c4\ud655\uc0b0\uc740 \uc218\uc1a1\ub2e8\ubc31\uc9c8\uc744 \uac70\uce58\ubbc0\ub85c ATP\ub97c \uc18c\ubaa8\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\ucd09\uc9c4\ud655\uc0b0\uc740 \uc6b4\ubc18\u00b7\ud1b5\ub85c \ub2e8\ubc31\uc9c8\uc744 \uc4f0\uc9c0\ub9cc \ub18d\ub3c4 \uae30\uc6b8\uae30\ub97c \ub530\ub974\ubbc0\ub85c <b>ATP\uac00 \ud544\uc694 \uc5c6\ub2e4<\/b>. ATP\ub97c \uc4f0\ub294 \uac74 \ub2a5\ub3d9\uc218\uc1a1.\"},\n {t:\"\ub2a5\ub3d9\uc218\uc1a1\uc740 \ub18d\ub3c4 \uae30\uc6b8\uae30\ub97c \uac70\uc2ac\ub7ec ATP\ub97c \uc0ac\uc6a9\ud55c\ub2e4.\",wrong:false,why:\"\ub2a5\ub3d9\uc218\uc1a1\uc758 \uc815\uc758.\"},\n {t:\"\ub18d\ub3c4 \uae30\uc6b8\uae30\ub97c \uac70\uc2ac\ub7ec \uc6a9\uc9c8\uc744 \uc62e\uae30\ub294 \uc218\uc1a1\ub2e8\ubc31\uc9c8\uc740 \ud1b5\ub85c\ub2e8\ubc31\uc9c8\uc774 \uc544\ub2c8\ub77c \ubaa8\ub450 \uc6b4\ubc18\ub2e8\ubc31\uc9c8\uc774\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub2a5\ub3d9\uc218\uc1a1\uc740 carrier protein\uc774 \ub2f4\ub2f9.\"},\n {t:\"2\ucc28 \ub2a5\ub3d9\uc218\uc1a1\uc740 1\ucc28 \ub2a5\ub3d9\uc218\uc1a1\uc73c\ub85c \ub9cc\ub4e0 \uc774\uc628 \uae30\uc6b8\uae30\uc758 \uc5d0\ub108\uc9c0\ub97c \uc774\uc6a9\ud55c\ub2e4.\",wrong:false,why:\"\uacf5\ub3d9\uc218\uc1a1\uc758 \uc815\uc758.\"}]},\n\n{id:\"signal\",cat:\"\uc138\ud3ec \uc2e0\ud638\uc804\ub2ec\",q:\"\ub3d9\ubb3c \uc138\ud3ec\uc758 \ud638\ub974\ubaac \uc2e0\ud638\uc804\ub2ec\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc218\uc6a9\uc131 \ud638\ub974\ubaac\uc740 \uc138\ud3ec \ud45c\uba74\uc758 \uc218\uc6a9\uccb4 \ub2e8\ubc31\uc9c8\uc5d0 \uacb0\ud569\ud55c\ub2e4.\",wrong:false,why:\"\uc218\uc6a9\uc131\uc740 \ub9c9\uc744 \ubabb \ub6ab\uc5b4 \ud45c\uba74 \uc218\uc6a9\uccb4 \uc774\uc6a9.\"},\n {t:\"\uc5d0\ud53c\ub124\ud504\ub9b0\uc774 GPCR\uc5d0 \uacb0\ud569\ud558\uba74 cAMP\uac00 2\ucc28 \uc804\ub2ec\uc790\ub85c \ud569\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: ATP\u2192cAMP \ud569\uc131 \uc99d\uac00.\"},\n {t:\"\uc2a4\ud14c\ub85c\uc774\ub4dc(\uc9c0\uc6a9\uc131) \ud638\ub974\ubaac\uc740 cAMP\ub97c 2\ucc28 \uc804\ub2ec\uc790\ub85c \uc368\uc11c \ubc18\uc751\uc744 \uc77c\uc73c\ud0a8\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc2a4\ud14c\ub85c\uc774\ub4dc\ub294 \ub9c9\uc744 \ud1b5\uacfc\ud574 <b>\uc138\ud3ec \ub0b4 \uc218\uc6a9\uccb4<\/b>\uc5d0 \uc9c1\uc811 \uacb0\ud569\u00b7\uc720\uc804\uc790 \ubc1c\ud604\uc744 \uc870\uc808\ud55c\ub2e4. 2\ucc28 \uc804\ub2ec\uc790(cAMP)\ub294 \uc4f0\uc9c0 \uc54a\ub294\ub2e4.\"},\n {t:\"\uc778\uc0b0\ud654 \ud6a8\uc18c\ub4e4\uc774 \uc5f0\uc1c4(cascade)\ud558\uc5ec \uc2e0\ud638\ub97c \uc99d\ud3ed\uc2dc\ud0a8\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uac01 \ub2e8\uacc4\uc5d0\uc11c \uc2e0\ud638 \uc99d\ud3ed.\"},\n {t:\"\uc5d0\ud53c\ub124\ud504\ub9b0 \uc790\uccb4\ub294 1\ucc28 \uc804\ub2ec\uc790\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: \ud638\ub974\ubaac\uc740 1\ucc28 \uc804\ub2ec\uc790.\"}]},\n\n{id:\"organelle\",cat:\"\uc138\ud3ec\uc18c\uae30\uad00\",q:\"\uc9c4\ud575\uc138\ud3ec \uc18c\uae30\uad00\uc758 \ub9c9 \uad6c\uc870\uc640 \uae30\ub2a5\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ud575\u00b7\ubbf8\ud1a0\ucf58\ub4dc\ub9ac\uc544\u00b7\uc5fd\ub85d\uccb4\ub294 \uc774\uc911\ub9c9 \uad6c\uc870\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38 \ubd84\ub958: \ud575\u00b7\uc5fd\ub85d\uc18c\u00b7\ubbf8\ud1a0 = \uc774\uc911\ub9c9.\"},\n {t:\"\ub9ac\ubcf4\uc19c\uc740 \ub9c9\uc73c\ub85c \uc2f8\uc5ec \uc788\uc9c0 \uc54a\uc544 \uc5c4\ubc00\ud788\ub294 \uc18c\uae30\uad00\uc73c\ub85c \ubd84\ub958\ud558\uc9c0 \uc54a\ub294\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubb34\ub9c9 \uad6c\uc870.\"},\n {t:\"\uc870\uba74\uc18c\ud3ec\uccb4\ub294 \uc9c0\uc9c8\u00b7\uc2a4\ud14c\ub85c\uc774\ub4dc \ud569\uc131\uacfc \ud574\ub3c5\u00b7\uce7c\uc298 \uc800\uc7a5\uc744 \ub2f4\ub2f9\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uadf8 \uae30\ub2a5\ub4e4\uc740 <b>\ud65c\uba74\uc18c\ud3ec\uccb4<\/b>\uc758 \uac83. \uc870\uba74\uc18c\ud3ec\uccb4\ub294 \ub9ac\ubcf4\uc19c\uc774 \ubd99\uc5b4 <b>\ubd84\ube44 \ub2e8\ubc31\uc9c8\uc744 \ud569\uc131<\/b>\ud55c\ub2e4.\"},\n {t:\"\uace8\uc9c0\uccb4\ub294 \ub2e8\ubc31\uc9c8\uc5d0 \ub2f9\uc0ac\uc2ac\uc744 \ubd99\uc774\uace0 \ubd84\ub958\u00b7\ud3ec\uc7a5\u00b7\ubd84\ube44\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: \uace8\uc9c0\uccb4 = \ub2f9\ud654\u00b7\ubd84\ub958.\"},\n {t:\"\ub9ac\uc18c\uc880\uc740 \uc0b0\uc131 \ud658\uacbd\uc5d0\uc11c \ud65c\uc131\uc744 \uac16\ub294 \uac00\uc218\ubd84\ud574\ud6a8\uc18c\ub97c \uac00\uc9c4\ub2e4.\",wrong:false,why:\"\uae30\ucd9c\ub300\ub85c.\"}]},\n\n/* ---- \uc5d0\ub108\uc9c0 (\ud638\ud761\u00b7\uad11\ud569\uc131) ---- */\n{id:\"glycolysis\",cat:\"\uc138\ud3ec\ud638\ud761\",q:\"\ud574\ub2f9\uacfc\uc815(glycolysis)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc138\ud3ec\uc9c8\uc5d0\uc11c \uc77c\uc5b4\ub098\uba70 \uc0b0\uc18c\uac00 \ud544\uc694\ud558\uc9c0 \uc54a\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud574\ub2f9\uacfc\uc815\uc740 \uc138\ud3ec\uc9c8\u00b7\ubb34\uc0b0\uc18c.\"},\n {t:\"\ud3ec\ub3c4\ub2f9 1\ubd84\uc790\ub2f9 \uc21c ATP 2\uac1c\uc640 NADH 2\uac1c\uac00 \uc0dd\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38 \uc218\uc9c0.\"},\n {t:\"\ud574\ub2f9\uacfc\uc815\uc740 \uc9c4\ud575\uc138\ud3ec\uc5d0\uc11c\ub9cc \uc77c\uc5b4\ub09c\ub2e4.\",wrong:true,trap:\"\uc704\uce58 \uc624\ub958\",why:\"<b>\uc6d0\ud575\uc138\ud3ec\uc5d0\uc11c\ub3c4<\/b> \uc77c\uc5b4\ub09c\ub2e4(\ubc1c\ud6a8\u00b7\uc138\ud3ec\ud638\ud761\uc758 \uacf5\ud1b5 \uacbd\ub85c). \uae30\ucd9c 109\ubc88 \ud568\uc815.\"},\n {t:\"\uc5d0\ub108\uc9c0 \ud22c\uc790\uae30\uc5d0 ATP 2\uac1c\ub97c \uc18c\ube44\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud22c\uc790\uae30 2 ATP \uc18c\ubaa8.\"},\n {t:\"1,3-BPG\u21923-PG, PEP\u2192\ud53c\ub8e8\ube0c\uc0b0\uc5d0\uc11c \uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654\ub85c ATP\uac00 \ub9cc\ub4e4\uc5b4\uc9c4\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654 \uc9c0\uc810.\"}]},\n\n{id:\"tca\",cat:\"\uc138\ud3ec\ud638\ud761\",q:\"\uc2dc\ud2b8\ub974\uc0b0 \ud68c\ub85c(TCA)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ubbf8\ud1a0\ucf58\ub4dc\ub9ac\uc544 \uae30\uc9c8(matrix)\uc5d0\uc11c \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: TCA\ub294 \uae30\uc9c8.\"},\n {t:\"\ud55c \ubc14\ud034\ub2f9 \uae30\uc9c8\uc218\uc900 \uc778\uc0b0\ud654\ub85c ATP(\ub3d9\ubb3c\uc740 GTP) 1\ubd84\uc790\uac00 \ub9cc\ub4e4\uc5b4\uc9c4\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc219\uc2dc\ub2d0CoA\u2192\uc219\uc2e0\uc0b0\uc5d0\uc11c \uc0dd\uc131.\"},\n {t:\"\uc544\uc138\ud2f8 CoA\ub294 \uc2dc\ud2b8\ub974\uc0b0 \ud68c\ub85c\uc5d0\uc11c \uc625\uc0b4\uc544\uc138\ud2b8\uc0b0\uc73c\ub85c \uc804\ud658\ub41c\ub2e4.\",wrong:true,trap:\"\uc778\uacfc \ud63c\ub3d9\",why:\"\uc544\uc138\ud2f8 CoA\ub294 <b>\uc625\uc0b4\uc544\uc138\ud2b8\uc0b0\uacfc \uacb0\ud569\ud574 \uc2dc\ud2b8\ub974\uc0b0\uc744 \ud615\uc131<\/b>\ud55c\ub2e4. OAA\ub85c '\uc804\ud658'\ub418\ub294 \uac8c \uc544\ub2c8\ub2e4(\uae30\ucd9c 110\ubc88).\"},\n {t:\"\ud68c\ub85c\ub97c \ub3cc\uba70 NADH\uc640 FADH\u2082\uac00 \uc0dd\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc0b0\ud654\ud658\uc6d0\uc73c\ub85c \uc804\uc790\uc6b4\ubc18\uccb4 \ud658\uc6d0.\"},\n {t:\"\ud53c\ub8e8\ube0c\uc0b0\uc774 \uc544\uc138\ud2f8 CoA\ub85c \ubc14\ub014 \ub54c CO\u2082 \ud55c \ubd84\uc790\uac00 \ubc29\ucd9c\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uccab CO\u2082 \ubc29\ucd9c \ub2e8\uacc4.\"}]},\n\n{id:\"etc\",cat:\"\uc138\ud3ec\ud638\ud761\",q:\"\uc804\uc790\uc804\ub2ec\uacc4\uc640 \uc0b0\ud654\uc801 \uc778\uc0b0\ud654\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc804\uc790\uc804\ub2ec\uacc4\ub294 \ubbf8\ud1a0\ucf58\ub4dc\ub9ac\uc544 \ub0b4\ub9c9\uc5d0 \ubc15\ud600 \uc788\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub0b4\ub9c9\u00b7\ud06c\ub9ac\uc2a4\ud14c.\"},\n {t:\"\ucd5c\uc885 \uc804\uc790\uc218\uc6a9\uccb4\ub294 \uc0b0\uc18c\uc774\uba70 \ubb3c\uc774 \uc0dd\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: cyt a3\u2192O\u2082\u2192H\u2082O.\"},\n {t:\"\uc804\uc790\uac00 \uc804\ub2ec\uacc4\ub97c \uc9c0\ub098\uba70 \uac00\uc9c4 \uc790\uc720\uc5d0\ub108\uc9c0\ub294 \uc810\ucc28 \uc99d\uac00\ud55c\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"\uc804\uc790\uc758 \uc790\uc720\uc5d0\ub108\uc9c0\ub294 <b>\uc810\ucc28 \uac10\uc18c<\/b>\ud55c\ub2e4. \uadf8 \ubc29\ucd9c \uc5d0\ub108\uc9c0\ub85c \uc591\uc131\uc790\ub97c \ud37c\ub0b8\ub2e4(\uae30\ucd9c 94\ubc88).\"},\n {t:\"\uc591\uc131\uc790 \uae30\uc6b8\uae30\ub97c \uc774\uc6a9\ud55c \ud654\ud559\uc0bc\ud22c\ub85c ATP\uac00 \ud569\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud654\ud559\uc0bc\ud22c \uae30\uc791.\"},\n {t:\"NADH\ub294 \ubcf5\ud569\uccb4 I\ub85c, FADH\u2082\ub294 \ubcf5\ud569\uccb4 II\ub85c \uc804\uc790\ub97c \uc804\ub2ec\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: FADH\u2082\ub294 I\uc744 \uac74\ub108\ub700.\"}]},\n\n{id:\"ferment\",cat:\"\ubc1c\ud6a8\",q:\"\ubc1c\ud6a8(fermentation)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc0b0\uc18c\u00b7\uc804\uc790\uc804\ub2ec\uc0ac\uc2ac \uc5c6\uc774 NAD\u207a\ub97c \uc7ac\uc0dd\ud574 \ud574\ub2f9\uacfc\uc815\uc744 \uc9c0\uc18d\uc2dc\ud0a8\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: NAD\u207a \uc7ac\uc0dd\uc774 \ud575\uc2ec.\"},\n {t:\"\uc54c\ucf54\uc62c \ubc1c\ud6a8\uc5d0\uc11c\ub294 CO\u2082\uac00 \ubc29\ucd9c\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc544\uc138\ud2b8\uc54c\ub370\ud788\ub4dc \uc0dd\uc131 \uc2dc CO\u2082.\"},\n {t:\"\uc816\uc0b0 \ubc1c\ud6a8\uc5d0\uc11c\ub294 \ud53c\ub8e8\ube0c\uc0b0\uc774 \uc544\uc138\ud2b8\uc54c\ub370\ud788\ub4dc\ub97c \uac70\uccd0 \uc816\uc0b0\uc73c\ub85c \ud658\uc6d0\ub41c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc544\uc138\ud2b8\uc54c\ub370\ud788\ub4dc\ub97c \uac70\uce58\ub294 \uac74 <b>\uc54c\ucf54\uc62c \ubc1c\ud6a8<\/b>. \uc816\uc0b0 \ubc1c\ud6a8\ub294 \ud53c\ub8e8\ube0c\uc0b0\uc774 <b>\uc9c1\uc811<\/b> \uc816\uc0b0\uc73c\ub85c \ud658\uc6d0\ub41c\ub2e4.\"},\n {t:\"\uc816\uc0b0 \ubc1c\ud6a8\ub294 NADH\uc758 \uc804\uc790\ub97c \ud53c\ub8e8\ube0c\uc0b0\uc5d0 \uc9c1\uc811 \ub118\uae34\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud53c\ub8e8\ube0c\uc0b0\uc744 \uc0b0\ud654\uc81c\ub85c \uc9c1\uc811 \uc0ac\uc6a9.\"},\n {t:\"\ubc1c\ud6a8\ub294 \uc804\uc790\uc804\ub2ec\uc0ac\uc2ac\uc744 \uc0ac\uc6a9\ud558\uc9c0 \uc54a\ub294\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubc1c\ud6a8\uc758 \uc815\uc758.\"}]},\n\n{id:\"atpyield\",cat:\"ATP \uc218\uc728\",q:\"\ud3ec\ub3c4\ub2f9 \uc644\uc804 \uc0b0\ud654\uc758 ATP \uc218\uc728\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ud3ec\ub3c4\ub2f9 1\ubd84\uc790\uac00 \uc644\uc804 \uc0b0\ud654\ub418\uba74 \ucd1d 10 NADH\uac00 \uc0dd\uc131\ub41c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 106\ubc88: 10 NADH.\"},\n {t:\"NADH 1\ubd84\uc790\ub294 \uc57d 2.5 ATP, FADH\u2082\ub294 \uc57d 1.5 ATP\uc5d0 \ud574\ub2f9\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38(\ud604\ub300\uac12): NADH 2.5, FADH\u2082 1.5.\"},\n {t:\"FADH\u2082\ub294 NADH\ubcf4\ub2e4 \ub354 \ub9ce\uc740 ATP\ub97c \uc0dd\uc131\ud55c\ub2e4.\",wrong:true,trap:\"\uc218\uce58 \ubc14\uafd4\uce58\uae30\",why:\"FADH\u2082\ub294 \ubcf5\ud569\uccb4 I\uc744 \uac74\ub108\ub6f0\uc5b4 \uc591\uc131\uc790\ub97c \uc801\uac8c \ud37c\ub0b4\ubbc0\ub85c <b>NADH(2.5)\ubcf4\ub2e4 \uc801\uc740 1.5 ATP<\/b>\uc5d0 \ud574\ub2f9\ud55c\ub2e4.\"},\n {t:\"\ud3ec\ub3c4\ub2f9 1\ubd84\uc790\ub2f9 \ucd5c\ub300 \uc57d 30~32 ATP\uac00 \uc0dd\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud6a8\uc728\uc801 \uc655\ubcf5\uae30\uad6c \uae30\uc900 30~32.\"},\n {t:\"\ub098\uba38\uc9c0 \uc5d0\ub108\uc9c0\uc758 \ub300\ubd80\ubd84\uc740 \uc5f4\ub85c \ubc29\ucd9c\ub41c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 107\ubc88: \ud6a8\uc728 \uc57d 34~40%, \ub098\uba38\uc9c0 \uc5f4.\"}]},\n\n{id:\"lightrx\",cat:\"\uad11\ud569\uc131\",q:\"\uad11\ud569\uc131 \uba85\ubc18\uc751\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ud2f8\ub77c\ucf54\uc774\ub4dc \ub9c9\uc5d0\uc11c \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uba85\ubc18\uc751\uc740 \ud2f8\ub77c\ucf54\uc774\ub4dc.\"},\n {t:\"\ubb3c\uc758 \uad11\ubd84\ud574\ub85c \uc0b0\uc18c\uac00 \ubc1c\uc0dd\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: O\u2082\ub294 \ubb3c\uc5d0\uc11c \uc720\ub798.\"},\n {t:\"\uad11\uacc4 I\uc758 \ubc18\uc751\uc911\uc2ec \uc0c9\uc18c\ub294 P680\uc774\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uad11\uacc4 I\uc740 <b>P700<\/b>\uc774 \ubc18\uc751\uc911\uc2ec\uc774\ub2e4. P680\uc740 <b>\uad11\uacc4 II<\/b>(\uae30\ucd9c 159\ubc88).\"},\n {t:\"\uba85\ubc18\uc751\uc758 \ucd5c\uc885 \uc804\uc790\uc218\uc6a9\uccb4\ub294 NADP\u207a\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: \uad11\ud569\uc131 \ucd5c\uc885 \uc218\uc6a9\uccb4 = NADP\u207a.\"},\n {t:\"\uad11\uc778\uc0b0\ud654\ub85c ATP\uac00 \ud569\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud654\ud559\uc0bc\ud22c \uad11\uc778\uc0b0\ud654.\"}]},\n\n{id:\"eflow\",cat:\"\uad11\ud569\uc131\",q:\"\uc21c\ud658\uc801\u00b7\ube44\uc21c\ud658\uc801 \uc804\uc790 \ud750\ub984\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ube44\uc21c\ud658\uc801 \uc804\uc790 \ud750\ub984\uc740 ATP\uc640 NADPH\ub97c \ubaa8\ub450 \uc0dd\uc131\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub458 \ub2e4 \uc0dd\uc131.\"},\n {t:\"\uc21c\ud658\uc801 \uc804\uc790 \ud750\ub984\uc740 NADPH\ub97c \uc0dd\uc131\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc21c\ud658\uc801 \ud750\ub984\uc740 <b>ATP\ub9cc<\/b> \ub9cc\ub4e4\uace0 NADPH\u00b7\uc0b0\uc18c\ub294 \ub9cc\ub4e4\uc9c0 \uc54a\ub294\ub2e4(\ubcf8\ubb38).\"},\n {t:\"\uc21c\ud658\uc801 \uc804\uc790 \ud750\ub984\uc740 \uad11\uacc4 I\ub9cc \uc0ac\uc6a9\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\u00b7\uae30\ucd9c: PSI\ub9cc \uad00\uc5ec.\"},\n {t:\"\uc21c\ud658\uc801 \ud750\ub984\uc5d0\uc11c\ub294 \uc0b0\uc18c\uac00 \ubc29\ucd9c\ub418\uc9c0 \uc54a\ub294\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubb3c \uad11\ubd84\ud574\uac00 \uc5c6\uc5b4 O\u2082 \uc5c6\uc74c.\"},\n {t:\"\ube44\uc21c\ud658\uc801 \ud750\ub984\uc5d0\uc11c \uc804\uc790\ub294 \uad81\uadf9\uc801\uc73c\ub85c \ubb3c\uc5d0\uc11c \uc720\ub798\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 162\ubc88: \uc804\uc790 \uae30\uc6d0\uc740 \ubb3c.\"}]},\n\n{id:\"calvin\",cat:\"\uad11\ud569\uc131\",q:\"\uce98\ube48 \ud68c\ub85c(\uc554\ubc18\uc751)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc5fd\ub85d\uccb4\uc758 \uc2a4\ud2b8\ub85c\ub9c8\uc5d0\uc11c \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uce98\ube48 \ud68c\ub85c = \uc2a4\ud2b8\ub85c\ub9c8.\"},\n {t:\"\ub8e8\ube44\uc2a4\ucf54\uac00 CO\u2082\ub97c RuBP\uc5d0 \uace0\uc815\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud0c4\uc18c\uace0\uc815 \ud6a8\uc18c.\"},\n {t:\"\ud0c4\uc18c \uace0\uc815 \ub2e8\uacc4\uc5d0\uc11c ATP\uac00 \uc9c1\uc811 \uc18c\ubaa8\ub41c\ub2e4.\",wrong:true,trap:\"\uc704\uce58 \uc624\ub958\",why:\"\uace0\uc815(\uce74\ub974\ubcf5\uc2e4\ud654)\uc5d0\ub294 ATP\uac00 \uc9c1\uc811 \uc4f0\uc774\uc9c0 \uc54a\ub294\ub2e4. ATP\ub294 <b>\ud658\uc6d0\u00b7RuBP \uc7ac\uc0dd \ub2e8\uacc4<\/b>\uc5d0\uc11c \uc4f0\uc778\ub2e4(\uae30\ucd9c 146\ubc88).\"},\n {t:\"\ud68c\ub85c\uc5d0\uc11c \uc9c1\uc811 \ub9cc\ub4e4\uc5b4\uc9c0\ub294 \ud0c4\uc218\ud654\ubb3c\uc740 \ud3ec\ub3c4\ub2f9\uc774 \uc544\ub2c8\ub77c G3P\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc9c1\uc811 \uc0b0\ubb3c\uc740 3\ud0c4\ub2f9 G3P.\"},\n {t:\"RuBP \uc7ac\uc0dd\uc5d0 ATP\uac00 \ud544\uc694\ud558\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc7ac\uc0dd \ub2e8\uacc4 ATP \uc18c\ubaa8.\"}]},\n\n{id:\"c4cam\",cat:\"C4\u00b7CAM\",q:\"C4 \uc2dd\ubb3c\uacfc CAM \uc2dd\ubb3c\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"C4 \uc2dd\ubb3c\uc740 PEP \uce74\ub974\ubcf5\uc2e4\ud654\ud6a8\uc18c\ub85c CO\u2082\ub97c \uba3c\uc800 \uace0\uc815\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: PEP carboxylase\uac00 \uccab \uace0\uc815.\"},\n {t:\"C4\uc758 \ucd5c\ucd08 \uace0\uc815 \uc0b0\ubb3c\uc740 \uc625\uc0b4\uc544\uc138\ud2b8\uc0b0(OAA)\uc774\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 174\ubc88: PEP\u2192OAA.\"},\n {t:\"CAM \uc2dd\ubb3c\uc740 \uc5fd\uc721\uc138\ud3ec\uc640 \uc720\uad00\uc18d\ucd08\uc138\ud3ec\ub85c CO\u2082 \uace0\uc815\uc744 \uacf5\uac04\uc801\uc73c\ub85c \ubd84\ub9ac\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uacf5\uac04 \ubd84\ub9ac\ub294 <b>C4<\/b>\uc758 \uc804\ub7b5. CAM\uc740 \ubc24(\uace0\uc815)\uacfc \ub0ae(\uce98\ube48)\uc73c\ub85c <b>\uc2dc\uac04\uc801<\/b>\uc73c\ub85c \ubd84\ub9ac\ud55c\ub2e4(\uae30\ucd9c 154\ubc88).\"},\n {t:\"C4\ub294 CO\u2082 \ub18d\ucd95\uc5d0 C3\ubcf4\ub2e4 ATP\ub97c \ub354 \uc18c\ubaa8\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 175\ubc88: C4\uac00 \ucd94\uac00 ATP \uc0ac\uc6a9.\"},\n {t:\"CAM \uc2dd\ubb3c\uc740 \ubc24\uc5d0 \uae30\uacf5\uc744 \uc5f4\uc5b4 CO\u2082\ub97c \uc720\uae30\uc0b0\uc5d0 \uc800\uc7a5\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: CAM\uc740 \uc57c\uac04 \uae30\uacf5 \uac1c\ubc29.\"}]},\n\n{id:\"photoresp\",cat:\"\uad11\ud638\ud761\",q:\"\uad11\ud638\ud761(photorespiration)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ub8e8\ube44\uc2a4\ucf54\uac00 CO\u2082 \ub300\uc2e0 O\u2082\uc640 \uacb0\ud569\ud558\uc5ec \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c\u00b7\ubcf8\ubb38: \ub8e8\ube44\uc2a4\ucf54\uc758 \uc0b0\uc18c\uace0\uc815.\"},\n {t:\"\ube5b\uc774 \uc788\ub294 \ub0ae\uc5d0 \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 160\ubc88: \ub0ae\uc5d0\ub9cc.\"},\n {t:\"\uad11\ud638\ud761\uc740 ATP\uc640 \ub2f9\uc744 \uc0dd\uc131\ud558\uc5ec \uc2dd\ubb3c \uc0dd\uc0b0\uc131\uc744 \ub192\uc778\ub2e4.\",wrong:true,trap:\"\uc778\uacfc \ud63c\ub3d9\",why:\"\uad11\ud638\ud761\uc740 \ub2f9\u00b7ATP\ub97c <b>\ub9cc\ub4e4\uc9c0 \uc54a\uace0 \uc624\ud788\ub824 \uc18c\ubaa8<\/b>\ud558\uba70 \uace0\uc815 \ud0c4\uc18c\ub97c \ube7c\ub3cc\ub824 \uc0dd\uc0b0\uc131\uc744 <b>\ub5a8\uc5b4\ub728\ub9b0\ub2e4<\/b>(\ubcf8\ubb38).\"},\n {t:\"\ub365\uace0 \uac74\uc870\ud574 \uae30\uacf5\uc774 \ub2eb\ud788\uba74 \uad11\ud638\ud761\uc774 \uc99d\uac00\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 152\ubc88: \uae30\uacf5 \ud3d0\uc1c4\u2192\uad11\ud638\ud761\u2191.\"},\n {t:\"\ud37c\uc625\uc2dc\uc880\uacfc \ubbf8\ud1a0\ucf58\ub4dc\ub9ac\uc544\uac00 \uad00\uc5ec\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub450 \uc18c\uae30\uad00\uc5d0\uc11c \uc7ac\ubc30\uc5f4\u00b7\ubd84\ud574.\"}]},\n\n/* ---- \uc138\ud3ec\ubd84\uc5f4\u00b7\uc720\uc804 ---- */\n{id:\"cellcycle\",cat:\"\uc138\ud3ec\uc8fc\uae30\",q:\"\uc138\ud3ec\uc8fc\uae30 \uc870\uc808\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc138\ud3ec\uc8fc\uae30\ub294 G1\u00b7S\u00b7G2\u00b7M\uc73c\ub85c \uc774\ub8e8\uc5b4\uc9c4\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: 4\ub2e8\uacc4.\"},\n {t:\"DNA \ubcf5\uc81c\ub294 S\uae30\uc5d0 \uc77c\uc5b4\ub09c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: S\uae30 = DNA \ubcf5\uc81c.\"},\n {t:\"\uc138\ud3ec\uc8fc\uae30 \ub3d9\uc548 \uc8fc\uae30\uc801\uc73c\ub85c \ud569\uc131\u00b7\ubd84\ud574\ub418\ub294 \uac83\uc740 CDK\uc774\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc8fc\uae30\uc801\uc73c\ub85c \ubcc0\ub3d9\ud558\ub294 \uac83\uc740 <b>\uc0ac\uc774\ud074\ub9b0<\/b>. CDK \ub18d\ub3c4\ub294 \ube44\uad50\uc801 \uc77c\uc815\ud558\ub2e4(\uae30\ucd9c 315\ubc88).\"},\n {t:\"G1 \uac80\ubb38\uc810\uc744 \ud1b5\uacfc\ud558\uc9c0 \ubabb\ud558\uba74 G0\ub85c \ube60\uc9c8 \uc218 \uc788\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubbf8\ud1b5\uacfc \uc2dc G0.\"},\n {t:\"MPF\ub294 \uc0ac\uc774\ud074\ub9b0\uacfc CDK\uc758 \ubcf5\ud569\uccb4\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: MPF \uad6c\uc131.\"}]},\n\n{id:\"mitosis\",cat:\"\uc720\uc0ac\ubd84\uc5f4\",q:\"\uc720\uc0ac\ubd84\uc5f4(\uccb4\uc138\ud3ec\ubd84\uc5f4)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc5fc\uc0c9\uccb4\uac00 \uac00\uc7a5 \uc751\ucd95\ub418\uc5b4 \uad00\ucc30\uc774 \uc26c\uc6b4 \uc2dc\uae30\ub294 \uc911\uae30\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud575\ud615 \uad00\ucc30\uc740 \uc911\uae30.\"},\n {t:\"\uc790\ub9e4\uc5fc\uc0c9\ubd84\uccb4\uac00 \ucc98\uc74c \ubd84\ub9ac\ub418\ub294 \uc2dc\uae30\ub294 \ud6c4\uae30\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ud6c4\uae30 = \ubd84\uccb4 \ubd84\ub9ac.\"},\n {t:\"\uc911\uc2ec\uc808(centromere)\uacfc \ub3d9\uc6d0\uccb4(kinetochore)\ub294 \uac19\uc740 \uad6c\uc870\ub97c \uac00\ub9ac\ud0a4\ub294 \ub9d0\uc774\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\ub2e4\ub978 \ub9d0\uc774\ub2e4. \uc911\uc2ec\uc808\uc740 \uc790\ub9e4\uc5fc\uc0c9\ubd84\uccb4 <b>\uacb0\ud569 \ubd80\uc704<\/b>, \ub3d9\uc6d0\uccb4\ub294 \uadf8 \uc704\uc5d0 \ud615\uc131\ub418\ub294 <b>\ubc29\ucd94\uc0ac \ubd80\ucc29 \ub2e8\ubc31\uc9c8 \ubcf5\ud569\uccb4<\/b>(\uae30\ubcf8\uc11c \ud568\uc815).\"},\n {t:\"\ub3d9\ubb3c\uc138\ud3ec\ub294 \ubd84\uc5f4\uad6c(\uc218\ucd95\ud658), \uc2dd\ubb3c\uc138\ud3ec\ub294 \uc138\ud3ec\ud310\uc73c\ub85c \uc138\ud3ec\uc9c8\ubd84\uc5f4\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub3d9\ubb3c vs \uc2dd\ubb3c \uad6c\ubd84.\"},\n {t:\"\uc804\uc911\uae30\uc5d0 \ud575\ub9c9\uc774 \ubd95\uad34\ub418\uace0 \ubc29\ucd94\uc0ac\uac00 \ub3d9\uc6d0\uccb4\uc5d0 \ubd80\ucc29\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc804\uc911\uae30 \uc0ac\uac74.\"}]},\n\n{id:\"meiosis\",cat:\"\uac10\uc218\ubd84\uc5f4\",q:\"\uac10\uc218\ubd84\uc5f4\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uac10\uc218 I \uc804\uae30\uc5d0 \uc0c1\ub3d9\uc5fc\uc0c9\uccb4\uac00 \uc811\ud569\ud574 2\uac00(\uc0ac\ubd84)\uc5fc\uc0c9\uccb4\ub97c \ud615\uc131\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc804\uae30 I \uc811\ud569\u00b7\uad50\ucc28.\"},\n {t:\"\ud6c4\uae30 I\uc5d0 \uc0c1\ub3d9\uc5fc\uc0c9\uccb4\uac00, \ud6c4\uae30 II\uc5d0 \uc790\ub9e4\uc5fc\uc0c9\ubd84\uccb4\uac00 \ubd84\ub9ac\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubd84\ub9ac \uc21c\uc11c.\"},\n {t:\"\uad50\ucc28\ub294 \uc790\ub9e4\uc5fc\uc0c9\ubd84\uccb4 \uc0ac\uc774\uc5d0\uc11c \uc77c\uc5b4\ub09c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uad50\ucc28\ub294 <b>\ube44\uc790\ub9e4<\/b>\uc5fc\uc0c9\ubd84\uccb4 \uc0ac\uc774\uc5d0\uc11c \uc77c\uc5b4\ub09c\ub2e4(\uae30\ucd9c 335\ubc88 \ud568\uc815).\"},\n {t:\"\uac10\uc218 I\uacfc II \uc0ac\uc774\uc5d0\ub294 DNA \ubcf5\uc81c\uac00 \uc5c6\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: I\u2194II \uc0ac\uc774 S\uae30 \uc5c6\uc74c.\"},\n {t:\"\ud55c \ubaa8\uc138\ud3ec\uc5d0\uc11c 4\uac1c\uc758 \ubc18\uc218\uccb4 \ub538\uc138\ud3ec\uac00 \ub9cc\ub4e4\uc5b4\uc9c4\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub538\uc138\ud3ec 4\uac1c(n).\"}]},\n\n{id:\"mendel\",cat:\"\uba58\ub378 \uc720\uc804\",q:\"\uba58\ub378 \uc720\uc804\uacfc \uc720\uc804 \uc591\uc0c1\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ubd84\ub9ac\uc758 \ubc95\uce59\uc5d0 \ub530\ub77c \ud55c \uc30d\uc758 \ub300\ub9bd\uc720\uc804\uc790\ub294 \ubc30\uc6b0\uc790 \ud615\uc131 \uc2dc \ubd84\ub9ac\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubd84\ub9ac\uc758 \ubc95\uce59.\"},\n {t:\"\ub2e8\uc131\uc7a1\uc885 \uc790\uac00\uad50\ubc30 \uc2dc \ud45c\ud604\ud615\uc740 3:1\ub85c \ub098\uc628\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub2e8\uc131\uc7a1\uc885 3:1.\"},\n {t:\"\ub2e4\uba74\ubc1c\ud604\uc740 \uc5ec\ub7ec \uc720\uc804\uc790\uac00 \ud558\ub098\uc758 \ud615\uc9c8\uc5d0 \ud568\uaed8 \uc791\uc6a9\ud558\ub294 \ud604\uc0c1\uc774\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uadf8\uac74 <b>\ub2e4\uc778\uc790\uc720\uc804<\/b>. \ub2e4\uba74\ubc1c\ud604\uc740 <b>\ud55c \uc720\uc804\uc790\uac00 \uc5ec\ub7ec \ud615\uc9c8<\/b>\uc5d0 \uc601\ud5a5\uc744 \ubbf8\uce58\ub294 \uac83(\uae30\ucd9c 1053\ubc88).\"},\n {t:\"\uc591\uc131\uc7a1\uc885 \uac80\uc815\uad50\ubc30 \uc2dc \ud45c\ud604\ud615\uc740 1:1:1:1\ub85c \ub098\uc628\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uac80\uc815\uad50\ubc30 1:1:1:1.\"},\n {t:\"\uac19\uc740 \ud45c\ud604\ud615\uc774\ub77c\ub3c4 \uc720\uc804\uc790\ud615\uc740 \ub2e4\ub97c \uc218 \uc788\uc5b4 \uad6c\ubd84\ud574\uc57c \ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc720\uc804\uc790\ud615 vs \ud45c\ud604\ud615.\"}]},\n\n{id:\"blood\",cat:\"\ud608\uc561\ud615\",q:\"\uc6b0\uc5f4 \uad00\uacc4\uc640 ABO\u00b7Rh \ud608\uc561\ud615\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"ABO \ud608\uc561\ud615\uc758 A\u00b7B \ub300\ub9bd\uc720\uc804\uc790\ub294 \uacf5\ub3d9\uc6b0\uc131(codominance)\uc774\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 1057\ubc88.\"},\n {t:\"\uc801\uc0c9\u00b7\ubc31\uc0c9 \uae08\uc5b4\ucd08 \uad50\ubc30\uc5d0\uc11c \ubd84\ud64d\uc0c9\uc774 \ub098\uc624\ub294 \uac83\uc740 \ubd88\uc644\uc804\uc6b0\uc131\uc774\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubd88\uc644\uc804\uc6b0\uc131 \uc608.\"},\n {t:\"\ud608\uc561\ud615 \ud56d\uccb4(IgM)\ub294 \ubd84\uc790\ub7c9\uc774 \uc791\uc544 \ud0dc\ubc18\uc744 \uc27d\uac8c \ud1b5\uacfc\ud55c\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"IgM\uc740 \ubd84\uc790\ub7c9\uc774 <b>\ucee4\uc11c \ud0dc\ubc18\uc744 \ud1b5\uacfc\ud558\uc9c0 \ubabb\ud55c\ub2e4<\/b>. \uadf8\ub798\uc11c ABO \ubd80\uc801\ud569\uc73c\ub85c\ub294 \uc801\uc544\uc138\ud3ec\uc99d\uc774 \uc798 \uc548 \uc0dd\uae34\ub2e4(\ubcf8\ubb38).\"},\n {t:\"\uc801\ud608\uad6c \ud45c\uba74\uc5d0\ub294 \ud56d\uc6d0(\uc751\uc9d1\uc6d0), \ud608\uc7a5\uc5d0\ub294 \ud56d\uccb4(\uc751\uc9d1\uc18c)\uac00 \uc788\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc6d0\uc2ec\ubd84\ub9ac \uacb0\uacfc.\"},\n {t:\"O\ud615\uc740 \uc801\ud608\uad6c \ud45c\uba74\uc5d0 A\u00b7B \ud56d\uc6d0\uc774 \uc5c6\uc5b4 \uc801\ud608\uad6c \uacf5\uc5ec \ubc94\uc704\uac00 \ub113\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: O\ud615 \ub18d\ucd95\uc801\ud608\uad6c.\"}]},\n\n{id:\"linkage\",cat:\"\uc5f0\uad00\u00b7\uad50\ucc28\",q:\"\uc720\uc804\uc790 \uc5f0\uad00\uacfc \uad50\ucc28\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc5f0\uad00\ub41c \uc720\uc804\uc790\ub294 \uac19\uc740 \uc5fc\uc0c9\uccb4 \uc704\uc5d0 \uc788\uc5b4 \ud568\uaed8 \uc720\uc804\ub418\ub294 \uacbd\ud5a5\uc774 \uc788\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\u00b7\uae30\ucd9c: \uc5f0\uad00\uc758 \uc815\uc758.\"},\n {t:\"\uc7ac\uc870\ud569\ube48\ub3c4\uac00 50%\uba74 \ub3c5\ub9bd\uc720\uc804(\uc644\uc804 \ube44\uc5f0\uad00)\uc73c\ub85c \ubcf8\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: 50% = \ub3c5\ub9bd.\"},\n {t:\"\ub450 \uc720\uc804\uc790 \uc0ac\uc774\uc758 \uc7ac\uc870\ud569\ube48\ub3c4\ub294 \uc720\uc804\uc790 \uac04 \uac70\ub9ac\uc5d0 \ubc18\ube44\ub840\ud55c\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"\uc7ac\uc870\ud569\ube48\ub3c4\ub294 \uac70\ub9ac\uc5d0 <b>\ube44\ub840<\/b>\ud55c\ub2e4. \uba40\uc218\ub85d \uad50\ucc28\uac00 \uc7a6\uc544 \uc7ac\uc870\ud569\uc774 \ub298\uc5b4\ub09c\ub2e4(\uae30\ucd9c 1068\ubc88).\"},\n {t:\"\uc644\uc804\uc5f0\uad00\uc740 \uad50\ucc28\uc728\uc774 0%\uc77c \ub54c\ub97c \uc758\ubbf8\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: \uc644\uc804\uc5f0\uad00 = 0%.\"},\n {t:\"\uc7ac\uc870\ud569\ube48\ub3c4\ub97c \uc774\uc6a9\ud574 \uc720\uc804\uc790 \uc9c0\ub3c4\ub97c \ub9cc\ub4e4 \uc218 \uc788\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc5f0\uad00 \uc9c0\ub3c4 \uc791\uc131.\"}]},\n\n{id:\"sexlink\",cat:\"\uc131\uc5fc\uc0c9\uccb4\",q:\"\uc131\uc5fc\uc0c9\uccb4 \uc720\uc804\uacfc \uc5fc\uc0c9\uccb4 \uc774\uc0c1\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc0ac\ub78c \ub0a8\uc131\uc740 X\uc5f0\uad00 \ud615\uc9c8\uc5d0 \ub300\ud574 \ubc18\uc811\ud569\uc131(hemizygous)\uc774\ub77c \uc5f4\uc131\ub3c4 \ud558\ub098\ub9cc \uc788\uc73c\uba74 \ubc1c\ud604\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub0a8\uc131 hemizygous.\"},\n {t:\"\uc544\ubc84\uc9c0\uc758 X\uc5f0\uad00 \ub300\ub9bd\uc720\uc804\uc790\ub294 \uc544\ub4e4\uc5d0\uac8c \uc804\ub2ec\ub418\uc9c0 \uc54a\ub294\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc544\ub4e4\uc740 \uc544\ubc84\uc9c0\uc758 Y\ub97c \ubc1b\uc74c.\"},\n {t:\"\ubc18\uc131\uc720\uc804\uc740 \uba58\ub378\uc758 \uc720\uc804 \ubc95\uce59\uc5d0 \uc5b4\uae0b\ub098\ub294 \ub300\ud45c\uc801 \uc608\uc678\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\ubc18\uc131\uc720\uc804\uc740 \uc131\uc5fc\uc0c9\uccb4 \uc704 \uc720\uc804\uc790\uac00 <b>\uba58\ub378\uc2dd\uc73c\ub85c \ubd84\ub9ac<\/b>\ub418\ubbc0\ub85c \uc608\uc678\uac00 \uc544\ub2c8\ub2e4. \ubaa8\uacc4\uc720\uc804\u00b7\uac01\uc778 \ub4f1\uc774 \uc9c4\uc9dc \uc608\uc678(\uae30\ucd9c 1041\ubc88).\"},\n {t:\"\ub2e4\uc6b4\uc99d\ud6c4\uad70\uc740 21\ubc88 \uc5fc\uc0c9\uccb4 3\uc5fc\uc0c9\uccb4\uc131(trisomic)\uc774\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: 21 trisomy.\"},\n {t:\"\ud130\ub108\uc99d\ud6c4\uad70\uc740 X \uc5fc\uc0c9\uccb4\uac00 \ud558\ub098\ubfd0\uc778 XO\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 1088\ubc88: XO(45,X).\"}]},\n\n/* ---- \ubd84\uc790\uc0dd\ubb3c\ud559 (\ubcf5\uc81c\u00b7\uc804\uc0ac\u00b7\ubc88\uc5ed\u00b7\ub3cc\uc5f0\ubcc0\uc774\u00b7\uc870\uc808) ---- */\n{id:\"replication\",cat:\"DNA \ubcf5\uc81c\",q:\"DNA \ubcf5\uc81c\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ubcf5\uc81c\ub294 \ubc18\ubcf4\uc874\uc801(semiconservative)\uc774\ub2e4.\",wrong:false,why:\"\uba54\uc140\uc2a8-\uc2a4\ud0c8 \uc2e4\ud5d8.\"},\n {t:\"DNA \uc911\ud569\ud6a8\uc18c\ub294 5'\u21923' \ubc29\ud5a5\uc73c\ub85c\ub9cc \uc0c8 \uac00\ub2e5\uc744 \ud569\uc131\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: 3' \ub9d0\ub2e8\uc5d0\ub9cc \ucd94\uac00.\"},\n {t:\"\uc120\ub3c4\uac00\ub2e5(leading strand)\uc740 \uc624\uce74\uc790\ud0a4 \uc808\ud3b8\uc73c\ub85c \ubd88\uc5f0\uc18d \ud569\uc131\ub41c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc624\uce74\uc790\ud0a4 \uc808\ud3b8\uc73c\ub85c \ubd88\uc5f0\uc18d \ud569\uc131\ub418\ub294 \uac83\uc740 <b>\uc9c0\uc5f0\uac00\ub2e5<\/b>. \uc120\ub3c4\uac00\ub2e5\uc740 \uc5f0\uc18d \ud569\uc131\ub41c\ub2e4(\uae30\ubcf8\uc11c).\"},\n {t:\"\ud504\ub9ac\uba54\uc774\uc2a4\uac00 RNA \ud504\ub77c\uc774\uba38\ub97c \ud569\uc131\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ubcf8\uc11c: primase \uae30\ub2a5.\"},\n {t:\"DNA \uc5f0\uacb0\ud6a8\uc18c(ligase)\uac00 \uc808\ud3b8 \uc0ac\uc774\uc758 \ub2f9-\uc778\uc0b0 \uace8\uaca9\uc744 \uc787\ub294\ub2e4.\",wrong:false,why:\"\uae30\ubcf8\uc11c: ligase \uae30\ub2a5.\"}]},\n\n{id:\"transcription\",cat:\"\uc804\uc0ac\",q:\"\uc804\uc0ac(transcription)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"RNA \uc911\ud569\ud6a8\uc18c\ub294 \uc8fc\ud615\uac00\ub2e5\uc744 3'\u21925'\ub85c \uc77d\uc5b4 RNA\ub97c 5'\u21923'\ub85c \ud569\uc131\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\u00b7\uae30\ucd9c: \uc77d\uae30/\ud569\uc131 \ubc29\ud5a5.\"},\n {t:\"\uc9c4\ud575\uc0dd\ubb3c\uc740 \uc804\uc0ac \ud6c4 5' \ucea1\uacfc 3' \ud3f4\ub9acA \uaf2c\ub9ac\uac00 \ubd99\ub294\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uac00\uacf5.\"},\n {t:\"\uc9c4\ud575\uc138\ud3ec\uc5d0\uc11c\ub294 \uc804\uc0ac\uc640 \ubc88\uc5ed\uc774 \ub3d9\uc2dc\uc5d0 \uc77c\uc5b4\ub09c\ub2e4.\",wrong:true,trap:\"\uc704\uce58 \uc624\ub958\",why:\"\uc804\uc0ac-\ubc88\uc5ed \ub3d9\uc2dc \uc9c4\ud589\uc740 <b>\uc6d0\ud575<\/b>\uc758 \ud2b9\uc9d5. \uc9c4\ud575\uc740 \ud575(\uc804\uc0ac)\uacfc \uc138\ud3ec\uc9c8(\ubc88\uc5ed)\ub85c \ubd84\ub9ac\ub3fc \uc788\ub2e4(\uae30\ucd9c 460\ubc88).\"},\n {t:\"\uc9c4\ud575\uc138\ud3ec \uc804\uc0ac \uac1c\uc2dc\uc5d0\ub294 \uc804\uc0ac\uc778\uc790\uac00 \ud544\uc694\ud558\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc804\uc0ac \uac1c\uc2dc\ubcf5\ud569\uccb4.\"},\n {t:\"mRNA\uc758 \uc5fc\uae30\uc11c\uc5f4\uc740 \uc554\ud638\ud654\uac00\ub2e5\uacfc \uac19\uace0 T \ub300\uc2e0 U\ub97c \uac16\ub294\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: mRNA = \uc554\ud638\ud654\uac00\ub2e5(T\u2192U).\"}]},\n\n{id:\"translation\",cat:\"\ubc88\uc5ed\",q:\"\ubc88\uc5ed(translation)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"tRNA\uac00 \uc138\ud3ec\uc9c8\uc758 \uc544\ubbf8\ub178\uc0b0\uc744 \ub9ac\ubcf4\uc19c\uc73c\ub85c \uc6b4\ubc18\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: tRNA \uae30\ub2a5.\"},\n {t:\"\ud3a9\ud0c0\uc774\ub4dc \uacb0\ud569\uc740 \ub9ac\ubcf4\uc19c \ub300\ub2e8\uc704\uccb4\uc758 rRNA(\ud3a9\ud2f0\ub51c \uc804\uc774\ud6a8\uc18c)\uac00 \ucd09\ub9e4\ud55c\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: \ub9ac\ubcf4\uc790\uc784\uc774 \ucd09\ub9e4.\"},\n {t:\"\ubc88\uc5ed\uc758 \uc5f0\uc7a5(elongation) \uacfc\uc815\uc740 ATP\ub97c \uc18c\ubaa8\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc5f0\uc7a5\uc740 <b>GTP<\/b>\ub97c \uc18c\ubaa8\ud55c\ub2e4(EF-Tu\u00b7EF-G). ATP\uac00 \uc544\ub2c8\ub2e4(\uc9c0\uc5fd \ub9c8\uc2a4\ud130).\"},\n {t:\"\uc885\uacb0\ucf54\ub3c8(UAA\u00b7UAG\u00b7UGA)\uc5d0\ub294 \ub300\uc751\ud558\ub294 tRNA\uac00 \uc5c6\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: \ubc29\ucd9c\uc778\uc790\uac00 \uc778\uc2dd.\"},\n {t:\"\uc6d0\ud575\uc0dd\ubb3c\uc758 \uac1c\uc2dc \uc544\ubbf8\ub178\uc0b0\uc740 \ud3ec\ub974\ubc00\uba54\ud2f0\uc624\ub2cc(fMet)\uc774\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: \uc6d0\ud575 fMet, \uc9c4\ud575 Met.\"}]},\n\n{id:\"splicing\",cat:\"RNA \uac00\uacf5\",q:\"RNA \uac00\uacf5\uacfc \uc2a4\ud50c\ub77c\uc774\uc2f1\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc2a4\ud50c\ub77c\uc774\uc2f1\uc740 \uc778\ud2b8\ub860\uc744 \uc81c\uac70\ud558\uace0 \uc5d1\uc190\uc744 \uc787\ub294 \uacfc\uc815\uc774\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 389\ubc88.\"},\n {t:\"\uc120\ud0dd\uc801 \uc2a4\ud50c\ub77c\uc774\uc2f1\uc73c\ub85c \ud55c \uc720\uc804\uc790\uc5d0\uc11c \uc5ec\ub7ec \ub2e8\ubc31\uc9c8\uc774 \ub9cc\ub4e4\uc5b4\uc9c4\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: alternative splicing.\"},\n {t:\"\uc778\ud2b8\ub860\uc740 \ub2e8\ubc31\uc9c8\ub85c \ubc88\uc5ed\ub418\ub294 \ubd80\uc704\uc774\uace0 \uc5d1\uc190\uc740 \uc798\ub824 \ub098\uac04\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"<b>\ubc18\ub300<\/b>\ub2e4. \ud575 \ubc16\uc73c\ub85c \ub098\uac00 \ubc88\uc5ed\ub418\ub294 \uac74 <b>\uc5d1\uc190<\/b>, \uc798\ub824 \ub098\uac00\ub294 \uac74 <b>\uc778\ud2b8\ub860<\/b>(\ubcf8\ubb38).\"},\n {t:\"\uc2a4\ud50c\ub77c\uc774\uc2f1\uc740 snRNP\ub85c \uc774\ub8e8\uc5b4\uc9c4 \uc2a4\ud50c\ub77c\uc774\uc18c\uc19c\uc774 \uc218\ud589\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\u00b7\uc9c0\uc5fd: spliceosome.\"},\n {t:\"5' \ucea1\uc740 7-\uba54\ud2f8\uad6c\uc544\ub178\uc2e0\uc774\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: 7-methylguanosine.\"}]},\n\n{id:\"mutation\",cat:\"\ub3cc\uc5f0\ubcc0\uc774\",q:\"\uc810\ub3cc\uc5f0\ubcc0\uc774\uc758 \uc885\ub958\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uce68\ubb35(silent) \ub3cc\uc5f0\ubcc0\uc774\ub294 \uc544\ubbf8\ub178\uc0b0\uc774 \ubc14\ub00c\uc9c0 \uc54a\ub294\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uac19\uc740 \uc544\ubbf8\ub178\uc0b0 \ucf54\ub3c8.\"},\n {t:\"\uacfc\uc624(missense) \ub3cc\uc5f0\ubcc0\uc774\ub294 \uc544\ubbf8\ub178\uc0b0 \ud558\ub098\uac00 \ubc14\ub010\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: missense.\"},\n {t:\"\uc885\uacb0\ucf54\ub3c8\uc744 \uc0c8\ub85c \ub9cc\ub4dc\ub294 \ub3cc\uc5f0\ubcc0\uc774\ub97c \uce68\ubb35 \ub3cc\uc5f0\ubcc0\uc774\ub77c \ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc885\uacb0\ucf54\ub3c8\uc744 \uc0dd\uc131\ud558\ub294 \uac83\uc740 <b>\uc815\uc9c0(nonsense)<\/b> \ub3cc\uc5f0\ubcc0\uc774. \uce68\ubb35\uc740 \uc544\ubbf8\ub178\uc0b0\uc774 \uc548 \ubc14\ub00c\ub294 \ubcc0\uc774(\uae30\ucd9c 471\ubc88).\"},\n {t:\"\uc0bd\uc785\u00b7\uacb0\uc2e4\uc740 \ud2c0\uc774\ub3d9(frameshift) \ub3cc\uc5f0\ubcc0\uc774\ub97c \uc77c\uc73c\ud0a8\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc0bd\uc785/\uacb0\uc2e4 = frameshift.\"},\n {t:\"\uce58\ud658\uc740 \uc810(\uac1c\ubcc4 \uc5fc\uae30)\ub3cc\uc5f0\ubcc0\uc774\uc774\uba70 \uc5fc\uc0c9\uccb4 \uad6c\uc870 \ubcc0\ud654\uac00 \uc544\ub2c8\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 1084\ubc88: \uce58\ud658 = \uc810\ub3cc\uc5f0\ubcc0\uc774.\"}]},\n\n{id:\"lac\",cat:\"lac \uc624\ud398\ub860\",q:\"\ub300\uc7a5\uade0 lac \uc624\ud398\ub860\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"lac \uc624\ud398\ub860\uc740 \uc720\ub3c4\uc131\uc73c\ub85c, \uc816\ub2f9\uc774 \uc788\uc744 \ub54c \ubc1c\ud604\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: inducible operon.\"},\n {t:\"\uc720\ub3c4\uc790(\uc54c\ub85c\ub77d\ud1a0\uc624\uc2a4)\uac00 \uc5b5\uc81c\uc790\uc5d0 \uacb0\ud569\ud558\uba74 \uc5b5\uc81c\uc790\uac00 \ube44\ud65c\uc131\ud654\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: inducer \uc791\uc6a9.\"},\n {t:\"\ud3ec\ub3c4\ub2f9 \ub18d\ub3c4\uac00 \ub192\uc544\uc9c0\uba74 cAMP\uac00 \uc99d\uac00\ud558\uc5ec \uc804\uc0ac\uac00 \ucd09\uc9c4\ub41c\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"\ud3ec\ub3c4\ub2f9\uc774 \ub9ce\uc73c\uba74 cAMP\ub294 <b>\uac10\uc18c<\/b>\u2192CAP \ubd88\ud65c\uc131\u2192\uc804\uc0ac\uac00 <b>\uc5b5\uc81c<\/b>\ub41c\ub2e4(\uae30\ucd9c 454\ubc88).\"},\n {t:\"lac \uc624\ud398\ub860\uc740 \uc791\ub3d9\uc790\u00b7\uad6c\uc870\uc720\uc804\uc790\u00b7\uc870\uc808\uc720\uc804\uc790\ub85c \uad6c\uc131\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc624\ud398\ub860 \uad6c\uc870.\"},\n {t:\"\ud3ec\ub3c4\ub2f9\uacfc \uc816\ub2f9\uc774 \ud568\uaed8 \uc788\uc73c\uba74 \ud3ec\ub3c4\ub2f9\uc774 \uba3c\uc800 \uc774\uc6a9\ub41c\ub2e4(\uc774\uc911\uc131\uc7a5).\",wrong:false,why:\"\uae30\ucd9c 455\ubc88: diauxie.\"}]},\n\n{id:\"trp\",cat:\"trp \uc624\ud398\ub860\",q:\"\ub300\uc7a5\uade0 trp \uc624\ud398\ub860\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"trp \uc624\ud398\ub860\uc740 \uc5b5\uc81c\uc131\uc73c\ub85c, \ud2b8\ub9bd\ud1a0\ud310\uc774 \uc788\uc744 \ub54c \ubc1c\ud604\uc774 \uc5b5\uc81c\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: repressive operon.\"},\n {t:\"\ud2b8\ub9bd\ud1a0\ud310\uc740 \ubcf4\uc870\uc5b5\uc81c\uc790(corepressor)\ub85c \uc791\uc6a9\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 452\ubc88.\"},\n {t:\"\ud2b8\ub9bd\ud1a0\ud310\uc740 trp \uc624\ud398\ub860\uc758 \uc804\uc0ac\ub97c \ucf1c\ub294 \uc720\ub3c4\uc790\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"\ud2b8\ub9bd\ud1a0\ud310\uc740 \uc804\uc0ac\ub97c <b>\uc5b5\uc81c<\/b>\ud558\ub294 \ubcf4\uc870\uc5b5\uc81c\uc790\ub2e4. \ucf1c\ub294 \uc720\ub3c4\uc790\uac00 \uc544\ub2c8\ub2e4(\uae30\ucd9c 457\ubc88).\"},\n {t:\"\uc5b5\uc81c\uc790 \ub2e8\ubc31\uc9c8\uc774 \ud65c\uc131\ud654\ub418\uc5b4 \uc791\ub3d9\uc790\uc5d0 \uacb0\ud569\ud558\uba74 \uc804\uc0ac\uac00 \ub9c9\ud78c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc5b5\uc81c \uae30\uc791.\"},\n {t:\"lac \uc624\ud398\ub860\uacfc \ud568\uaed8 \uc74c\uc131(negative) \uc870\uc808\uc758 \uc608\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub458 \ub2e4 \uc74c\uc131\uc870\uc808.\"}]},\n\n{id:\"eukreg\",cat:\"\uc9c4\ud575 \uc870\uc808\",q:\"\uc9c4\ud575\uc0dd\ubb3c \uc720\uc804\uc790 \ubc1c\ud604 \uc870\uc808\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc804\uc0ac\u00b7RNA \uac00\uacf5\u00b7\ubc88\uc5ed \ub4f1 \uc5ec\ub7ec \ub2e8\uacc4\uc5d0\uc11c \uc870\uc808\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub2e4\ub2e8\uacc4 \uc870\uc808.\"},\n {t:\"\ud788\uc2a4\ud1a4 \uc544\uc138\ud2f8\ud654\ub294 \uc5fc\uc0c9\uc9c8\uc744 \uc774\uc644\uc2dc\ucf1c \uc804\uc0ac\ub97c \ucd09\uc9c4\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\u00b7\uae30\ucd9c: \uc544\uc138\ud2f8\ud654\u2192\uc774\uc644.\"},\n {t:\"\ud788\uc2a4\ud1a4\uc774 \uc778\uc0b0\ud654\ub418\uba74 DNA\uc640 \ub354 \uac15\ud558\uac8c \uacb0\ud569\ud574 \uc774\uc9c8\uc5fc\uc0c9\uc9c8\uc774 \ub41c\ub2e4.\",wrong:true,trap:\"\ubc29\ud5a5 \ub4a4\uc9d1\uae30\",why:\"\uc778\uc0b0\uae30(\uc74c\uc804\ud558)\uac00 \ubd99\uc73c\uba74 \ud788\uc2a4\ud1a4-DNA \uacb0\ud569\uc774 <b>\uc57d\ud574\uc838<\/b> \uc5fc\uc0c9\uc9c8\uc774 \uc774\uc644\ub418\uace0 \uc804\uc0ac\uac00 \ucd09\uc9c4\ub41c\ub2e4(\uae30\ucd9c 458\ubc88).\"},\n {t:\"miRNA\u00b7siRNA\ub294 \ud45c\uc801 mRNA\ub97c \ubd84\ud574\ud558\uac70\ub098 \ubc88\uc5ed\uc744 \uc5b5\uc81c\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: RNA \uac04\uc12d.\"},\n {t:\"\uc9c4\uc815\uc5fc\uc0c9\uc9c8\uc740 \ubc1c\ud604\uc774 \uc27d\uace0 \uc774\uc9c8\uc5fc\uc0c9\uc9c8\uc740 \ubc1c\ud604\uc774 \uc5b5\uc81c\ub41c\ub2e4.\",wrong:false,why:\"\uae30\ubcf8\uc11c: euchromatin vs heterochromatin.\"}]},\n\n/* ---- \ub3d9\ubb3c\uc0dd\ub9ac ---- */\n{id:\"cellcomm\",cat:\"\uc138\ud3ec \uac04 \uc18c\ud1b5\",q:\"\ub3d9\ubb3c\uc758 \uc138\ud3ec \uac04 \uc2e0\ud638\uc804\ub2ec\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\ub0b4\ubd84\ube44 \uc2e0\ud638\ub294 \ud638\ub974\ubaac\uc774 \ud608\ub958\ub85c \ubd84\ube44\ub418\uc5b4 \uba3c \ud45c\uc801\uc138\ud3ec\uc5d0 \uc791\uc6a9\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub0b4\ubd84\ube44 \uc2e0\ud638.\"},\n {t:\"\ud504\ub85c\uc2a4\ud0c0\uae00\ub780\ub518 \uac19\uc740 \uad6d\uc18c\uc870\uc808\uc790\ub294 \uc9e7\uc740 \uac70\ub9ac\uc5d0\uc11c \uc791\uc6a9\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: local regulator.\"},\n {t:\"\uc2a4\ud14c\ub85c\uc774\ub4dc \ud638\ub974\ubaac\uc740 \uc218\uc6a9\uc131\uc774\ub77c \uc138\ud3ec\ub9c9 \ud45c\uba74 \uc218\uc6a9\uccb4\uc5d0 \uacb0\ud569\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\uc2a4\ud14c\ub85c\uc774\ub4dc\ub294 <b>\uc9c0\uc6a9\uc131<\/b>\uc774\ub77c \ub9c9\uc744 \ud1b5\uacfc\ud574 <b>\uc138\ud3ec \ub0b4 \uc218\uc6a9\uccb4<\/b>\uc5d0 \uacb0\ud569\ud55c\ub2e4(\ubcf8\ubb38).\"},\n {t:\"\uc0b0\ud654\uc9c8\uc18c(NO)\ub294 \uae30\uccb4 \uad6d\uc18c\uc870\uc808\uc790\ub85c \ud608\uad00 \ud3c9\ud65c\uadfc\uc744 \uc774\uc644\uc2dc\ud0a8\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: NO\u2192\ud608\uad00 \ud655\uc7a5.\"},\n {t:\"\uc2dc\ub0c5\uc2a4 \uc2e0\ud638\ub294 \uc2e0\uacbd\uc804\ub2ec\ubb3c\uc9c8\ub85c \ub9e4\uac1c\ub41c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: synaptic signaling.\"}]},\n\n{id:\"endocrine\",cat:\"\ub0b4\ubd84\ube44\",q:\"\ucc99\ucd94\ub3d9\ubb3c \ub0b4\ubd84\ube44\uacc4\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc778\uc290\ub9b0\uc740 \ud608\ub2f9\uc744 \ub0ae\ucd94\uace0 \uae00\ub8e8\uce74\uace4\uc740 \ud608\ub2f9\uc744 \ub192\uc778\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc774\uc790 \ud638\ub974\ubaac.\"},\n {t:\"\uce7c\uc2dc\ud1a0\ub2cc\uc740 \ud608\uc911 \uce7c\uc298\uc744 \ub0ae\ucd94\uace0 PTH\ub294 \ub192\uc778\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38\u00b7\uae30\ucd9c: \uae38\ud56d \uc791\uc6a9.\"},\n {t:\"\uc54c\ub3c4\uc2a4\ud14c\ub860\uc740 \uc2e0\uc7a5\uc5d0\uc11c \ud569\uc131\u00b7\ubd84\ube44\ub418\ub294 \ud638\ub974\ubaac\uc774\ub2e4.\",wrong:true,trap:\"\uc704\uce58 \uc624\ub958\",why:\"\uc54c\ub3c4\uc2a4\ud14c\ub860\uc740 <b>\ubd80\uc2e0\ud53c\uc9c8(\uc0ac\uad6c\ub300)<\/b>\uc5d0\uc11c \ubd84\ube44\ub41c\ub2e4. \uc2e0\uc7a5\uc740 \ud45c\uc801 \uae30\uad00\uc77c \ubfd0\uc774\ub2e4(\uae30\ucd9c 538\ubc88).\"},\n {t:\"ADH\ub294 \uc2e0\uc7a5\uc5d0\uc11c \ubb3c \uc7ac\ud761\uc218\ub97c \ucd09\uc9c4\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: ADH \uae30\ub2a5.\"},\n {t:\"\ubd80\uc2e0\uc218\uc9c8\uc740 \uc5d0\ud53c\ub124\ud504\ub9b0\u00b7\ub178\ub974\uc5d0\ud53c\ub124\ud504\ub9b0\uc744 \ubd84\ube44\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ubd80\uc2e0\uc218\uc9c8.\"}]},\n\n{id:\"digestion\",cat:\"\uc18c\ud654\uacc4\",q:\"\ub3d9\ubb3c \uc18c\ud654\uacc4\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc5d4\ud14c\ub85c\ud0a4\ub098\uc544\uc81c\ub294 \ud2b8\ub9bd\uc2dc\ub178\uac90\uc744 \ud2b8\ub9bd\uc2e0\uc73c\ub85c \ud65c\uc131\ud654\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 753\ubc88.\"},\n {t:\"\uc138\ud06c\ub808\ud2f4\uc740 \ucdcc\uc7a5\uc774 \uc2ed\uc774\uc9c0\uc7a5\uc73c\ub85c \uc911\ud0c4\uc0b0\uc5fc\uc744 \ubd84\ube44\ud558\ub3c4\ub85d \uc790\uadf9\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc138\ud06c\ub808\ud2f4 \uacbd\ub85c.\"},\n {t:\"\uae00\ub8e8\uce74\uace4\uc740 \uac04\uc5d0\uc11c \ubd84\ube44\ub418\ub294 \ud638\ub974\ubaac\uc774\ub2e4.\",wrong:true,trap:\"\uc704\uce58 \uc624\ub958\",why:\"\uae00\ub8e8\uce74\uace4\uc740 <b>\uc774\uc790(\ucdcc\uc7a5) \u03b1\uc138\ud3ec<\/b>\uc5d0\uc11c \ubd84\ube44\ub41c\ub2e4. \uac04\uc740 \ud45c\uc801\uc774\ub2e4(\uae30\ucd9c 755\ubc88).\"},\n {t:\"\uc18c\uc7a5\uc5d0\uc11c \ud3ec\ub3c4\ub2f9\u00b7\uc544\ubbf8\ub178\uc0b0\uc740 Na\u207a \uacf5\ub3d9\uc218\uc1a1\uc73c\ub85c \ud761\uc218\ub41c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c: 2\ucc28 \ub2a5\ub3d9\uc218\uc1a1.\"},\n {t:\"\ubc18\ucd94\uc704 \uc21c\uc11c\ub294 \ud639\uc704\u2192\ubc8c\uc9d1\uc704\u2192\uacb9\uc8fc\ub984\uc704\u2192\uc8fc\ub984\uc704\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 759\ubc88.\"}]},\n\n{id:\"circulation\",cat:\"\uc21c\ud658\uacc4\",q:\"\ub3d9\ubb3c \uc21c\ud658\uacc4\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc624\uc9d5\uc5b4\u00b7\ubb38\uc5b4\ub294 \uc5f0\uccb4\ub3d9\ubb3c\uc774\uc9c0\ub9cc \ud3d0\uc1c4\uc21c\ud658\uacc4\ub97c \uac00\uc9c4\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: \ub450\uc871\ub958 \uc608\uc678.\"},\n {t:\"\uc808\uc9c0\ub3d9\ubb3c\uacfc \ub300\ubd80\ubd84\uc758 \uc5f0\uccb4\ub3d9\ubb3c\uc740 \uac1c\ubc29\uc21c\ud658\uacc4\ub97c \uac00\uc9c4\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: \uac1c\ubc29\uc21c\ud658\uacc4.\"},\n {t:\"\uc81c1\uc2ec\uc74c(S1)\uc740 \ubc18\uc6d4\ud310\ub9c9\uc774 \ub2eb\ud788\ub294 \uc18c\ub9ac\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"S1\uc740 <b>\ubc29\uc2e4\ud310\ub9c9(AV)<\/b>\uc774 \ub2eb\ud788\ub294 \uc18c\ub9ac. <b>\ubc18\uc6d4\ud310<\/b> \ub2eb\ud798\uc740 S2\ub2e4(\uc9c0\uc5fd \uc704\uac70\uc2a4).\"},\n {t:\"\ud478\uc544\uc8c4\uc720 \ubc95\uce59\uc5d0 \ub530\ub77c \ud608\ub958 \uc800\ud56d\uc740 \ud608\uad00 \ubc18\uc9c0\ub984\uc758 4\uc81c\uacf1\uc5d0 \ubc18\ube44\ub840\ud55c\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: Poiseuille's Law.\"},\n {t:\"\ubcf4\uc5b4 \ud6a8\uacfc\ub294 \uc870\uc9c1\uc5d0\uc11c \uc0b0\uc18c \ud574\ub9ac \uace1\uc120\uc744 \uc6b0\uce21\uc73c\ub85c \uc774\ub3d9\uc2dc\ud0a8\ub2e4.\",wrong:false,why:\"\uc9c0\uc5fd: Bohr effect.\"}]},\n\n{id:\"kidney\",cat:\"\ubc30\uc124\uacc4\",q:\"\ud3ec\uc720\ub958 \uc2e0\uc7a5(\ub124\ud504\ub860)\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc131\uc778 \uc0ac\uad6c\uccb4 \uc5ec\uacfc\ub7c9\uc740 \uc57d 180 L/\uc77c, \ucd5c\uc885 \uc18c\ubcc0\ub7c9\uc740 \uc57d 1.5 L/\uc77c\uc774\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 760\ubc88.\"},\n {t:\"\ud3ec\ub3c4\ub2f9\uc740 \uc0ac\uad6c\uccb4\uc5d0\uc11c \uc5ec\uacfc\ub41c \ub4a4 100% \uc7ac\ud761\uc218\ub41c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 781\ubc88.\"},\n {t:\"ADH(\ubc14\uc18c\ud504\ub808\uc2e0)\ub294 \uc9d1\ud569\uad00\uc5d0\uc11c NaCl\uc758 \uc7ac\ud761\uc218\ub97c \ucd09\uc9c4\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"ADH\uac00 \ucd09\uc9c4\ud558\ub294 \uac83\uc740 <b>\ubb3c(\uc544\ucfe0\uc544\ud3ec\ub9b0)<\/b>\uc758 \uc7ac\ud761\uc218\ub2e4. NaCl\uc774 \uc544\ub2c8\ub2e4(\uae30\ucd9c 763\ubc88).\"},\n {t:\"\ud5e8\ub808\uace0\ub9ac \uc0c1\ud589\uc9c0\ub294 \ubb3c\uc5d0 \ubd88\ud22c\uacfc\uc131\uc774\uace0 NaCl\uc744 \ub2a5\ub3d9\uc218\uc1a1\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 762\u00b7764\ubc88.\"},\n {t:\"\uc54c\ub3c4\uc2a4\ud14c\ub860\uc740 \uc6d0\uc704\uc138\ub1e8\uad00\u00b7\uc9d1\ud569\uad00\uc5d0\uc11c Na\u207a \uc7ac\ud761\uc218\ub97c \ucd09\uc9c4\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 784\ubc88.\"}]},\n\n/* ---- \uba74\uc5ed ---- */\n{id:\"immune\",cat:\"\uba74\uc5ed\",q:\"\uc120\ucc9c\uba74\uc5ed\uacfc \uc801\uc751\uba74\uc5ed\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc120\ucc9c\uba74\uc5ed\uc740 \ube60\ub974\uac8c \uc791\ub3d9\ud558\uc9c0\ub9cc \ud2b9\uc774\uc131\uacfc \uae30\uc5b5\uc774 \uc57d\ud558\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc120\ucc9c vs \uc801\uc751.\"},\n {t:\"B\uc138\ud3ec\ub294 \ud56d\uc6d0\uc744 \uc9c1\uc811 \uc778\uc2dd\ud558\uace0, T\uc138\ud3ec\ub294 MHC\uc5d0 \uc81c\uc2dc\ub41c \ud56d\uc6d0\uc744 \uc778\uc2dd\ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \uc778\uc2dd \ubc29\uc2dd \ucc28\uc774.\"},\n {t:\"MHC I\uc740 \ub3c4\uc6c0 T\uc138\ud3ec(CD4)\uc640, MHC II\ub294 \uc138\ud3ec\ub3c5\uc131 T\uc138\ud3ec(CD8)\uc640 \uc5f0\uacb0\ub41c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"<b>\ubc18\ub300<\/b>\ub2e4. MHC I = <b>\uc138\ud3ec\ub3c5\uc131 T\uc138\ud3ec(CD8)<\/b>, MHC II = <b>\ub3c4\uc6c0 T\uc138\ud3ec(CD4)<\/b>(\ubcf8\ubb38\u00b7\uae30\ucd9c 868\ubc88).\"},\n {t:\"\ud56d\uccb4\ub294 B\uc138\ud3ec\uc5d0\uc11c \ubd84\ud654\ud55c \ud615\uc9c8\uc138\ud3ec\uac00 \uc0dd\uc0b0\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 886\ubc88.\"},\n {t:\"\ubc31\uc2e0(\ub2a5\ub3d9\uba74\uc5ed)\uc740 \uae30\uc5b5\uc138\ud3ec\ub97c \ud615\uc131\ud574 2\ucc28 \ubc18\uc751\uc744 \ube60\ub974\uac8c \ud55c\ub2e4.\",wrong:false,why:\"\ubcf8\ubb38: \ub2a5\ub3d9\uba74\uc5ed.\"}]},\n\n{id:\"innate2\",cat:\"\ube44\ud2b9\uc774 \ubc29\uc5b4\",q:\"\uc778\ud130\ud398\ub860\u00b7\ubcf4\uccb4 \ub4f1 \ube44\ud2b9\uc774\uc801 \ubc29\uc5b4\uc5d0 \ub300\ud55c \uc124\uba85 \uc911 \uc633\uc9c0 \uc54a\uc740 \uac83\uc740?\",opts:[\n {t:\"\uc778\ud130\ud398\ub860\uc740 \ubc14\uc774\ub7ec\uc2a4 \uac10\uc5fc \uc138\ud3ec\uac00 \ubd84\ube44\ud574 \uc8fc\ubcc0 \uc138\ud3ec\uc758 \ud56d\ubc14\uc774\ub7ec\uc2a4 \uc0c1\ud0dc\ub97c \uc720\ub3c4\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 844\ubc88.\"},\n {t:\"\uc778\ud130\ud398\ub860\uc740 \uc138\uade0 \uc138\ud3ec\ub9c9\uc5d0 \uad6c\uba4d\uc744 \ub0b4\ub294 \ub9c9\uacf5\uaca9\ubcf5\ud569\uccb4\ub97c \ud615\uc131\ud55c\ub2e4.\",wrong:true,trap:\"\uac1c\ub150 \ub9de\ubc14\uafb8\uae30\",why:\"\ub9c9\uc5d0 \uad6c\uba4d\uc744 \ub0b4\ub294 \ub9c9\uacf5\uaca9\ubcf5\ud569\uccb4(MAC)\ub294 <b>\ubcf4\uccb4<\/b>\uc758 \uc791\uc6a9\uc774\ub2e4. \uc778\ud130\ud398\ub860\uc774 \uc544\ub2c8\ub2e4(\uae30\ucd9c 845\ubc88).\"},\n {t:\"\ubcf4\uccb4\ub294 \ub9c9\uacf5\uaca9\ubcf5\ud569\uccb4(MAC)\ub97c \ud615\uc131\ud574 \uc138\ud3ec\ub97c \uc6a9\ud574\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 841\ubc88.\"},\n {t:\"\uc778\ud130\ud398\ub860\u00b7\ubcf4\uccb4\u00b7NK\uc138\ud3ec\u00b7\ub300\uc2dd\uc138\ud3ec\ub294 \ube44\ud2b9\uc774\uc801(\uc120\ucc9c) \ubc29\uc5b4\uc5d0 \uc18d\ud55c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 843\ubc88.\"},\n {t:\"\ud074\ub860\uc120\ud0dd\uc124\uc5d0\uc11c \ud56d\uccb4\uc758 \ud2b9\uc774\uc131\uc740 \ud56d\uc6d0 \ub178\ucd9c \uc804\uc5d0 \uc774\ubbf8 \uacb0\uc815\ub41c\ub2e4.\",wrong:false,why:\"\uae30\ucd9c 887\ubc88: \uc720\uc804\uc790 \uc7ac\ubc30\uc5f4\ub85c \uc0ac\uc804 \uacb0\uc815.\"}]}\n];\n\n/* ---------- \uc21c\uc218 \ub85c\uc9c1 (node \uac80\uc99d\uc6a9\uc73c\ub85c \ubd84\ub9ac) ---------- */\nvar STORE_KEY = \"bio_neg_trainer_campbell_v1\";\n\nfunction defaultState(){ return { v:1, results:{}, current:0 }; }\n\nfunction gradeAnswer(q, idx){\n  var opt = q.opts[idx];\n  return { correct: !!(opt && opt.wrong), picked: idx };\n}\n\nfunction serialize(state){ return JSON.stringify(state); }\nfunction deserialize(json){\n  if(!json) return defaultState();\n  try{\n    var s = JSON.parse(json);\n    if(!s || typeof s!==\"object\") return defaultState();\n    if(!s.results || typeof s.results!==\"object\") s.results={};\n    if(typeof s.current!==\"number\") s.current=0;\n    s.v = 1;\n    return s;\n  }catch(e){ return defaultState(); }\n}\n\nfunction validateAll(qs){\n  var errs=[]; var ids={};\n  if(!Array.isArray(qs)||qs.length<30) errs.push(\"need >=30 topics, got \"+(qs?qs.length:0));\n  (qs||[]).forEach(function(q,i){\n    if(!q.id){ errs.push(\"#\"+i+\" missing id\"); }\n    else { if(ids[q.id]) errs.push(\"dup id \"+q.id); ids[q.id]=1; }\n    if(!q.q || q.q.indexOf(\"\uc633\uc9c0 \uc54a\uc740\")===-1) errs.push((q.id||i)+\": question must ask \uc633\uc9c0 \uc54a\uc740\");\n    if(!Array.isArray(q.opts) || q.opts.length<4 || q.opts.length>5) errs.push((q.id||i)+\": needs 4-5 opts, got \"+(q.opts?q.opts.length:
